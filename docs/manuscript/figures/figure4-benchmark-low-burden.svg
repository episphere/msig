  <text x="990" y="850" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">The benchmark table supports moderate browser workflows: fitting and</text>
<text x="990" y="877.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">QC scale to hundreds of SBS96 spectra, but threshold sweeps,</text>
<text x="990" y="905" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">bootstrap analyses, and NMF rank selection require explicit runtime</text>
<text x="990" y="932.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">reporting. The low-burden stress test should be reported as</text>
<text x="990" y="960" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">controlled evidence; a real rare-cancer case study remains the</text>
<text x="990" y="987.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">preferred final validation.</text>

  <text x="90" y="1165" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400">Environment: ${HARDWARE_NOTE}</text>
  
