  <text x="90" y="120" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">Compute benchmarks quantify browser-suitable analysis costs, while the controlled low-burden stress test illustrates</text>
<text x="90" y="147.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">why mutation count, bootstrap uncertainty, and threshold sensitivity must accompany exposure interpretation.</text>

