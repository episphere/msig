<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0;background:white;}svg{display:block;}</style></head><body><?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950" role="img">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #16212f; letter-spacing: 0; }
    .white { fill: #ffffff !important; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #5d6978; }
    .label { font-size: 17px; }
    .small { font-size: 14px; fill: #5d6978; }
    .strong { font-weight: 700; fill: #16212f; }
    .value { font-size: 20px; font-weight: 700; }
    .axis-title { font-size: 15px; font-weight: 700; fill: #5d6978; }
  </style>
  <rect width="1400" height="950" fill="#ffffff"/>
  <text x="70" y="64" class="title">Figure 1. Architecture and data-residency boundary</text><text x="70" y="96" class="subtitle">Three residency classes are separated from browser execution paths and external hosts.</text>
  <rect x="40" y="100" width="680" height="640" rx="18" fill="#f8fbfd" stroke="#0072b2" stroke-width="3"/>
  <text x="70" y="802" class="label">Class i local-only: spectra, exposures, QC outputs, plots, and reports.</text>
  <rect x="765" y="100" width="570" height="640" rx="18" fill="#fffdf8" stroke="#e69f00" stroke-width="3" stroke-dasharray="14 10"/>
  <text x="795" y="802" class="label">Classes ii-iii: explicit fetches only; strictLocal blocks user-derived egress.</text>
  <g>
    <rect x="70" y="135" width="380" height="215" rx="14" fill="#ffffff" stroke="#0072b2" stroke-width="3"/>
    <text x="94" y="177" class="label strong">Native JavaScript tier</text>
    <text x="98" y="217" class="label">Matrix conversion</text><text x="98" y="247" class="label">NNLS / NMF native paths</text><text x="98" y="277" class="label">QC summaries</text><text x="98" y="307" class="label">JSON reports and plots</text>
  </g>
  <g>
    <rect x="70" y="405" width="380" height="215" rx="14" fill="#ffffff" stroke="#6f4aa2" stroke-width="3"/>
    <text x="94" y="447" class="label strong">Pyodide / WebR worker tier</text>
    <text x="98" y="487" class="label">Pinned runtime URLs</text><text x="98" y="517" class="label">Bundled wheels and R tgz</text><text x="98" y="547" class="label">SHA-256 verified installs</text><text x="98" y="577" class="label">Adapter execution</text>
  </g>
  <g>
    <rect x="825" y="115" width="445" height="170" rx="14" fill="#ffffff" stroke="#009e73" stroke-width="3"/>
    <text x="849" y="157" class="label strong">Public-data fetchers</text>
    <text x="853" y="197" class="label">mSigPortal public cohort/catalog APIs</text><text x="853" y="227" class="label">GDC project/gene/file queries</text><text x="853" y="257" class="label">Only public identifiers when invoked</text>
  </g>
  <g>
    <rect x="825" y="342" width="445" height="155" rx="14" fill="#ffffff" stroke="#e69f00" stroke-width="3"/>
    <text x="849" y="384" class="label strong">UCSC live context lookup</text>
    <text x="853" y="424" class="label">Genome build, chromosome, coordinate</text><text x="853" y="454" class="label">Disabled in strictLocal mode</text><text x="853" y="484" class="label">Use row or bundled contexts instead</text>
  </g>
  <g>
    <rect x="825" y="555" width="445" height="155" rx="14" fill="#ffffff" stroke="#8a939d" stroke-width="3"/>
    <text x="849" y="597" class="label strong">CDN/runtime module hosts</text>
    <text x="853" y="637" class="label">Version-pinned ESM modules</text><text x="853" y="667" class="label">No spectra/exposures/QC/reports sent</text><text x="853" y="697" class="label">Bundled package artifacts verified locally</text>
  </g>
  <defs><marker id="arrow-450-240" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#009e73"/></marker></defs>
    <line x1="450" y1="240" x2="825" y2="200" stroke="#009e73" stroke-width="3" marker-end="url(#arrow-450-240)"/>
    <text x="637.5" y="208" text-anchor="middle" class="small">public identifiers only when public fetcher is invoked</text>
  <defs><marker id="arrow-450-510" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e69f00"/></marker></defs>
    <line x1="450" y1="510" x2="825" y2="425" stroke="#e69f00" stroke-width="3" marker-end="url(#arrow-450-510)"/>
    <text x="637.5" y="455.5" text-anchor="middle" class="small">coordinates only for live MAF context lookup</text>
  <defs><marker id="arrow-450-560" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8a939d"/></marker></defs>
    <line x1="450" y1="560" x2="825" y2="630" stroke="#8a939d" stroke-width="3" marker-end="url(#arrow-450-560)"/>
    <text x="637.5" y="583" text-anchor="middle" class="small">runtime module/artifact retrieval; no user-derived analysis data</text>
  <line x1="720" y1="118" x2="720" y2="740" stroke="#d55e00" stroke-width="4"/>
  <text x="744" y="430" text-anchor="middle" class="axis-title" style="fill:#d55e00" transform="rotate(90 744 430)">Data-residency boundary</text>
  <g transform="translate(90 665)">
      <rect x="0" y="0" width="560" height="45" rx="8" fill="#ffffff" stroke="#e4e9ef"/>
      <circle cx="28" cy="23" r="8" fill="#009e73"/><text x="45" y="28" class="small">public IDs</text>
      <circle cx="178" cy="23" r="8" fill="#e69f00"/><text x="195" y="28" class="small">MAF coordinates</text>
      <circle cx="370" cy="23" r="8" fill="#0072b2"/><text x="387" y="28" class="small">local-only outputs</text>
    </g>
</svg>
</body></html>
