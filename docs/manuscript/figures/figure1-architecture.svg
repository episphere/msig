<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#182033" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2F80ED"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#008C95"/>
    </marker>
    <linearGradient id="browserFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FAFF"/>
    </linearGradient>
  </defs>
  <rect width="1800" height="1120" fill="#FFFFFF"/>
  
  <text x="90" y="80" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="42" font-weight="850">mSigSDK architecture and browser privacy boundary</text>
  <text x="90" y="122" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">Public resources can be queried through APIs, while private user spectra can be transformed, fitted,</text>
<text x="90" y="149.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400">quality-controlled, and reported locally in the browser.</text>

  <circle cx="90" cy="205" r="22" fill="#182033"/><text x="90" y="206" fill="#FFFFFF" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">A</text>
  <text x="128" y="213" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="850">Inputs</text>
  <rect x="90" y="245" width="375" height="570" rx="16" fill="#FFFFFF" stroke="#D6DEE8" stroke-width="2" filter="url(#softShadow)"/>
  <text x="114" y="281" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="800">Public resources</text>
  
    <rect x="125" y="305" width="260" height="42" rx="21" fill="#2F80ED18" stroke="#2F80ED" stroke-width="1.5"/><text x="255" y="332" fill="#2F80ED" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">mSigPortal APIs</text>
    <rect x="125" y="365" width="260" height="42" rx="21" fill="#008C9518" stroke="#008C95" stroke-width="1.5"/><text x="255" y="392" fill="#008C95" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">TCGA / GDC</text>
    <text x="125" y="450" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="400">Reference signatures, public</text>
<text x="125" y="473.75" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="400">cohort summaries, and</text>
<text x="125" y="497.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="400">portal-compatible data</text>
<text x="125" y="521.25" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="19" font-weight="400">structures.</text>
    <line x1="125" y1="545" x2="420" y2="545" stroke="#D6DEE8" stroke-width="2"/>
    <text x="125" y="600" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="800">User supplied</text>
    <rect x="125" y="630" width="180" height="42" rx="21" fill="#F2994A18" stroke="#F2994A" stroke-width="1.5"/><text x="215" y="657" fill="#F2994A" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">MAF files</text>
    <rect x="125" y="690" width="230" height="42" rx="21" fill="#7B61FF18" stroke="#7B61FF" stroke-width="1.5"/><text x="240" y="717" fill="#7B61FF" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Spectra matrices</text>
    <text x="125" y="765" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400">These inputs can remain</text>
<text x="125" y="787.5" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400">local during analysis.</text>
  

  <circle cx="562" cy="205" r="22" fill="#182033"/><text x="562" y="206" fill="#FFFFFF" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">B</text>
  <text x="600" y="213" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="850">Browser execution boundary</text>
  <rect x="540" y="245" width="720" height="705" rx="26" fill="url(#browserFill)" stroke="#2F80ED" stroke-width="4" filter="url(#softShadow)"/>
  <text x="590" y="303" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="30" font-weight="850">Local mSigSDK modules</text>
  <text x="590" y="338" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="400">Composable ES modules for analysis, visualization, and</text>
<text x="590" y="363" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="400">reporting.</text>
  <rect x="590" y="405" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#2F80ED55" stroke-width="2"/>
        <circle cx="618" cy="444" r="12" fill="#2F80ED"/>
        <text x="642" y="439" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Data access</text>
        <text x="642" y="464" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">mSigPortal, TCGA</text>
<rect x="905" y="405" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#F2994A55" stroke-width="2"/>
        <circle cx="933" cy="444" r="12" fill="#F2994A"/>
        <text x="957" y="439" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Input handling</text>
        <text x="957" y="464" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">io, MAF conversion</text>
<rect x="590" y="517" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#008C9555" stroke-width="2"/>
        <circle cx="618" cy="556" r="12" fill="#008C95"/>
        <text x="642" y="551" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Validation</text>
        <text x="642" y="576" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">contexts, coverage</text>
<rect x="905" y="517" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#27AE6055" stroke-width="2"/>
        <circle cx="933" cy="556" r="12" fill="#27AE60"/>
        <text x="957" y="551" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Fitting and QC</text>
        <text x="957" y="576" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">NNLS, burden, residuals</text>
<rect x="590" y="629" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#7B61FF55" stroke-width="2"/>
        <circle cx="618" cy="668" r="12" fill="#7B61FF"/>
        <text x="642" y="663" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Uncertainty</text>
        <text x="642" y="688" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">bootstrap, thresholds</text>
<rect x="905" y="629" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#D95F0255" stroke-width="2"/>
        <circle cx="933" cy="668" r="12" fill="#D95F02"/>
        <text x="957" y="663" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Extraction</text>
        <text x="957" y="688" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">NMF, rank, matching</text>
<rect x="590" y="741" width="275" height="82" rx="12" fill="#FFFFFF" stroke="#18203355" stroke-width="2"/>
        <circle cx="618" cy="780" r="12" fill="#182033"/>
        <text x="642" y="775" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="800">Reporting</text>
        <text x="642" y="800" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="400">provenance, exports</text>
  <line x1="900" y1="790" x2="900" y2="890" stroke="#2F80ED" stroke-width="4" stroke-dasharray="9 8"/>
  <text x="900" y="925" fill="#2F80ED" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="850" text-anchor="middle">Private spectra need not leave the browser</text>

  <circle cx="1350" cy="205" r="22" fill="#182033"/><text x="1350" y="206" fill="#FFFFFF" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">C</text>
  <text x="1388" y="213" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="850">Research outputs</text>
  <rect x="1330" y="245" width="380" height="570" rx="16" fill="#FFFFFF" stroke="#D6DEE8" stroke-width="2" filter="url(#softShadow)"/>
  <text x="1354" y="281" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="800">Analysis products</text>
  
    <circle cx="1370" cy="302" r="8" fill="#27AE60"/>
          <text x="1390" y="308" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Exposure tables</text>
<circle cx="1370" cy="365" r="8" fill="#2F80ED"/>
          <text x="1390" y="371" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">QC dashboards</text>
<circle cx="1370" cy="428" r="8" fill="#F2994A"/>
          <text x="1390" y="434" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Residual spectra</text>
<circle cx="1370" cy="491" r="8" fill="#7B61FF"/>
          <text x="1390" y="497" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Bootstrap intervals</text>
<circle cx="1370" cy="554" r="8" fill="#D95F02"/>
          <text x="1390" y="560" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">NMF signatures</text>
<circle cx="1370" cy="617" r="8" fill="#008C95"/>
          <text x="1390" y="623" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">HTML / JSON reports</text>
<circle cx="1370" cy="680" r="8" fill="#182033"/>
          <text x="1390" y="686" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Notebook examples</text>
  

  <circle cx="90" cy="915" r="22" fill="#182033"/><text x="90" y="916" fill="#FFFFFF" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">D</text>
  <text x="128" y="923" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="850">What crosses the boundary?</text>
  <rect x="90" y="955" width="770" height="105" rx="16" fill="#FFFFFF" stroke="#D6DEE8" stroke-width="2"/>
  <text x="114" y="991" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="800">Public API calls</text>
  
    <text x="125" y="1018" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="400">Reference signatures and public cohort summaries flow into the</text>
<text x="125" y="1044.25" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="400">browser.</text>
  
  <rect x="935" y="955" width="775" height="105" rx="16" fill="#FFFFFF" stroke="#D6DEE8" stroke-width="2"/>
  <text x="959" y="991" fill="#182033" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="800">Local analysis</text>
  
    <text x="970" y="1018" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="400">User spectra, fitted exposures, QC, and reports can remain</text>
<text x="970" y="1044.25" fill="#667085" font-family="Inter, Helvetica, Arial, sans-serif" font-size="21" font-weight="400">local.</text>
  

  <line x1="465" y1="430" x2="540" y2="430" stroke="#2F80ED" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="465" y1="695" x2="540" y2="695" stroke="#008C95" stroke-width="4" marker-end="url(#arrowTeal)"/>
  <line x1="1260" y1="600" x2="1330" y2="600" stroke="#2F80ED" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M 465 985 C 615 905, 720 870, 900 890" fill="none" stroke="#2F80ED" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
  <path d="M 1255 890 C 1370 885, 1450 915, 1540 955" fill="none" stroke="#008C95" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)"/>
  
</svg>
