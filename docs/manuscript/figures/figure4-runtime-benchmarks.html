<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Figure 4. Browser runtime benchmarks</title>
    <script src="../assets/d3.min.js"></script>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; color: #172026; background: #f7faf9; }
      main { max-width: 1320px; margin: 0 auto; padding: 28px; }
      .figure-frame { background: #ffffff; border: 1px solid #d8e2dc; border-radius: 8px; padding: 22px; box-shadow: 0 8px 24px rgba(16, 32, 27, 0.08); }
      h1 { margin: 0 0 8px; font-size: 25px; letter-spacing: 0; }
      .caption { margin: 0 0 20px; color: #53616f; max-width: 1120px; line-height: 1.45; font-size: 15px; }
      svg { width: 100%; height: auto; display: block; }
      .svg-shell svg { max-height: 760px; }
      .tick text { fill: #53616f; font-size: 11px; }
      .domain, .tick line { stroke: #aab6c2; }
    </style>
  </head>
  <body>
    <main>
      <div class="figure-frame">

        <div id="chart"></div>
      </div>
    </main>
    <script>
      const spec = {"rows":[{"scenario":"single_sample_fit_report","scenarioLabel":"Single sample","scenarioFull":"One SBS96 synthetic sample, 9-signature NNLS fit plus report generation.","browser":"chrome","browserLabel":"Chrome","medianMs":4.079999998211861,"repeatCount":5},{"scenario":"single_sample_fit_report","scenarioLabel":"Single sample","scenarioFull":"One SBS96 synthetic sample, 9-signature NNLS fit plus report generation.","browser":"edge","browserLabel":"Edge","medianMs":3.4600000008940697,"repeatCount":5},{"scenario":"single_sample_fit_report","scenarioLabel":"Single sample","scenarioFull":"One SBS96 synthetic sample, 9-signature NNLS fit plus report generation.","browser":"firefox","browserLabel":"Firefox","medianMs":2.259999999999991,"repeatCount":5},{"scenario":"medium_cohort_120","scenarioLabel":"120-sample cohort","scenarioFull":"120 SBS96 synthetic samples x 9 signatures.","browser":"chrome","browserLabel":"Chrome","medianMs":22.570000000298023,"repeatCount":5},{"scenario":"medium_cohort_120","scenarioLabel":"120-sample cohort","scenarioFull":"120 SBS96 synthetic samples x 9 signatures.","browser":"edge","browserLabel":"Edge","medianMs":22.5,"repeatCount":5},{"scenario":"medium_cohort_120","scenarioLabel":"120-sample cohort","scenarioFull":"120 SBS96 synthetic samples x 9 signatures.","browser":"firefox","browserLabel":"Firefox","medianMs":28.38000000000011,"repeatCount":5},{"scenario":"portal_scale_300x40","scenarioLabel":"300 x 40 refit","scenarioFull":"300 SBS96 synthetic samples x 40 signatures.","browser":"chrome","browserLabel":"Chrome","medianMs":1554.9150000065565,"repeatCount":5},{"scenario":"portal_scale_300x40","scenarioLabel":"300 x 40 refit","scenarioFull":"300 SBS96 synthetic samples x 40 signatures.","browser":"edge","browserLabel":"Edge","medianMs":1561.7950000017881,"repeatCount":5},{"scenario":"portal_scale_300x40","scenarioLabel":"300 x 40 refit","scenarioFull":"300 SBS96 synthetic samples x 40 signatures.","browser":"firefox","browserLabel":"Firefox","medianMs":2845,"repeatCount":5},{"scenario":"bootstrap_500","scenarioLabel":"Bootstrap 500","scenarioFull":"500 multinomial resamples of one SBS96 sample, NNLS refit per resample, exposure-interval workflow.","browser":"chrome","browserLabel":"Chrome","medianMs":255.9949999973178,"repeatCount":5},{"scenario":"bootstrap_500","scenarioLabel":"Bootstrap 500","scenarioFull":"500 multinomial resamples of one SBS96 sample, NNLS refit per resample, exposure-interval workflow.","browser":"edge","browserLabel":"Edge","medianMs":252.64499999582767,"repeatCount":5},{"scenario":"bootstrap_500","scenarioLabel":"Bootstrap 500","scenarioFull":"500 multinomial resamples of one SBS96 sample, NNLS refit per resample, exposure-interval workflow.","browser":"firefox","browserLabel":"Firefox","medianMs":222.83999999999992,"repeatCount":5},{"scenario":"nmf_rank_selection_rank4","scenarioLabel":"NMF rank/extract","scenarioFull":"80 SBS96 samples, rank grid plus rank-4 extraction.","browser":"chrome","browserLabel":"Chrome","medianMs":3178.1949999928474,"repeatCount":5},{"scenario":"nmf_rank_selection_rank4","scenarioLabel":"NMF rank/extract","scenarioFull":"80 SBS96 samples, rank grid plus rank-4 extraction.","browser":"edge","browserLabel":"Edge","medianMs":3151.89999999851,"repeatCount":5},{"scenario":"nmf_rank_selection_rank4","scenarioLabel":"NMF rank/extract","scenarioFull":"80 SBS96 samples, rank grid plus rank-4 extraction.","browser":"firefox","browserLabel":"Firefox","medianMs":2257.54,"repeatCount":5}],"scenarios":["single_sample_fit_report","medium_cohort_120","portal_scale_300x40","bootstrap_500","nmf_rank_selection_rank4"],"scenarioInfo":{"single_sample_fit_report":{"short":"Single sample","full":"One SBS96 synthetic sample, 9-signature NNLS fit plus report generation."},"medium_cohort_120":{"short":"120-sample cohort","full":"120 SBS96 synthetic samples x 9 signatures."},"portal_scale_300x40":{"short":"300 x 40 refit","full":"300 SBS96 synthetic samples x 40 signatures."},"bootstrap_500":{"short":"Bootstrap 500","full":"500 multinomial resamples of one SBS96 sample, NNLS refit per resample, exposure-interval workflow."},"nmf_rank_selection_rank4":{"short":"NMF rank/extract","full":"80 SBS96 samples, rank grid plus rank-4 extraction."}},"browsers":["chrome","edge","firefox"],"browserLabels":{"chrome":"Chrome","edge":"Edge","firefox":"Firefox"},"environment":{"node":"v24.13.0","platform":"win32","arch":"x64","hostname":"Aaron","cpus":32,"memoryGb":31.2,"cwd":"C:\\Users\\Aaron Ge\\Documents\\GitHub\\msig","browsers":[{"id":"chrome","label":"Chrome","engine":"chromium","executablePath":"C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"},{"id":"edge","label":"Edge","engine":"chromium","executablePath":"C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"},{"id":"firefox","label":"Firefox","engine":"firefox","executablePath":"C:\\Program Files\\Mozilla Firefox\\firefox.exe"}],"requestedBrowsers":["chrome","edge","firefox"],"repeats":5,"timeoutMs":240000},"firefoxNmfNote":"","palette":{"ink":"#111827","muted":"#4b5563","hairline":"#d1d5db","panel":"#ffffff","paper":"#f8fafc","blue":"#0072B2","sky":"#56B4E9","green":"#009E73","orange":"#E69F00","vermillion":"#D55E00","purple":"#CC79A7","yellow":"#F0E442","gray":"#6B7280","paleBlue":"#E7F3FA","paleGreen":"#E8F5F1","paleOrange":"#FFF4DB"}};

      const width = 1280, height = 760;
      const p = spec.palette;
      const svg = d3.select("#chart").append("svg").attr("viewBox", [0, 0, width, height]);
      svg.append("rect").attr("width", width).attr("height", height).attr("fill", p.paper);
      const margin = { top: 58, right: 42, bottom: 244, left: 102 };
      const completed = spec.rows;
      const color = d3.scaleOrdinal().domain(spec.browsers).range([p.blue, p.green, p.orange]);

      const x0 = d3.scaleBand().domain(spec.scenarios).range([margin.left, width - margin.right]).padding(0.22);
      const x1 = d3.scaleBand().domain(spec.browsers).range([0, x0.bandwidth()]).padding(0.14);
      const minVal = d3.min(completed, (row) => row.medianMs) || 0.1;
      const maxVal = d3.max(completed, (row) => row.medianMs) || 1000;
      const y = d3.scaleLog().domain([Math.max(0.05, minVal / 4), maxVal * 2.3]).range([height - margin.bottom, margin.top]);

      svg.append("rect").attr("x", margin.left).attr("y", margin.top).attr("width", width - margin.left - margin.right).attr("height", height - margin.top - margin.bottom).attr("fill", "#ffffff").attr("stroke", p.hairline);
      svg.append("g").attr("stroke", p.hairline).attr("stroke-dasharray", "3 4")
        .selectAll("line").data(y.ticks(8)).join("line")
        .attr("x1", margin.left).attr("x2", width - margin.right)
        .attr("y1", (tick) => y(tick)).attr("y2", (tick) => y(tick));
      svg.append("g").attr("transform", "translate(0," + (height - margin.bottom) + ")")
        .call(d3.axisBottom(x0).tickFormat((scenario) => spec.scenarioInfo[scenario].short))
        .selectAll("text").attr("font-size", 12).attr("font-weight", 700);
      svg.append("g").attr("transform", "translate(" + margin.left + ",0)")
        .call(d3.axisLeft(y).ticks(8, "~g"));
      svg.append("text").attr("transform", "rotate(-90)").attr("x", -(margin.top + (height - margin.bottom - margin.top) / 2)).attr("y", 34)
        .attr("text-anchor", "middle").attr("font-size", 14).attr("font-weight", 700).attr("fill", p.muted)
        .text("Median elapsed time (ms, log scale)");

      svg.selectAll("rect.bar").data(completed).join("rect")
        .attr("class", "bar")
        .attr("x", (row) => x0(row.scenario) + x1(row.browser))
        .attr("y", (row) => y(row.medianMs))
        .attr("width", x1.bandwidth())
        .attr("height", (row) => Math.max(3, height - margin.bottom - y(row.medianMs)))
        .attr("fill", (row) => color(row.browser));
      svg.selectAll("text.value").data(completed).join("text")
        .attr("class", "value")
        .attr("x", (row) => x0(row.scenario) + x1(row.browser) + x1.bandwidth() / 2)
        .attr("y", (row) => y(row.medianMs) - 8)
        .attr("text-anchor", "middle")
        .attr("font-size", 10.5)
        .attr("font-weight", 700)
        .attr("fill", p.ink)
        .text((row) => formatDuration(row.medianMs));

      const legend = svg.append("g").attr("transform", "translate(" + (width - 382) + ",22)");
      spec.browsers.forEach((browser, i) => {
        const item = legend.append("g").attr("transform", "translate(" + (i * 118) + ",0)");
        item.append("rect").attr("width", 15).attr("height", 15).attr("rx", 3).attr("fill", color(browser));
        item.append("text").attr("x", 23).attr("y", 13).attr("font-size", 13).attr("font-weight", 700).attr("fill", p.muted).text(spec.browserLabels[browser]);
      });

      const notes = svg.append("g").attr("transform", "translate(" + margin.left + "," + (height - 194) + ")");
      notes.append("text").attr("x", 0).attr("y", 0).attr("font-size", 14).attr("font-weight", 700).attr("fill", p.ink).text("Benchmark operations");
      spec.scenarios.forEach((scenario, i) => {
        const x = i < 3 ? 0 : 558;
        const y0 = 28 + (i % 3) * 50;
        notes.append("text").attr("x", x).attr("y", y0).attr("font-size", 12.5).attr("font-weight", 700).attr("fill", p.ink)
          .text(String(i + 1) + ". " + spec.scenarioInfo[scenario].short + ":");
        const detail = notes.append("text").attr("x", x + 142).attr("y", y0).attr("font-size", 12.5).attr("fill", p.muted);
        wrapDetail(detail, spec.scenarioInfo[scenario].full, i < 3 ? 46 : 42);
      });
      svg.append("text").attr("x", margin.left).attr("y", height - 42).attr("font-size", 12).attr("fill", p.muted)
        .text("Host: " + (spec.environment.cpus || "n/a") + " CPU threads, " + (spec.environment.memoryGb || "n/a") + " GB RAM, Node " + (spec.environment.node || "n/a") + ". Firefox uses the Playwright-managed browser binary for reproducible automation.");
      if (spec.firefoxNmfNote) {
        svg.append("text").attr("x", margin.left).attr("y", height - 22).attr("font-size", 12).attr("fill", p.vermillion)
          .text(spec.firefoxNmfNote);
      }

      function wrapDetail(selection, text, maxChars) {
        const words = String(text || "").split(/\s+/);
        let line = [];
        let tspan = selection.append("tspan").attr("x", selection.attr("x")).attr("dy", 0);
        for (const word of words) {
          const next = [...line, word].join(" ");
          if (next.length > maxChars && line.length) {
            tspan.text(line.join(" "));
            line = [word];
            tspan = selection.append("tspan").attr("x", selection.attr("x")).attr("dy", 15);
          } else {
            line.push(word);
          }
        }
        tspan.text(line.join(" "));
      }

      function formatDuration(ms) {
        if (ms < 1) return d3.format(".2f")(ms) + " ms";
        if (ms < 100) return d3.format(".1f")(ms) + " ms";
        if (ms < 1000) return d3.format(".0f")(ms) + " ms";
        return d3.format(".2f")(ms / 1000) + " s";
      }

    </script>
  </body>
</html>
