<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mSigSDK Browser Benchmark Harness</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      background: #ffffff;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.45;
    }
    button {
      border: 1px solid #111827;
      background: #111827;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 18px;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #d1d5db;
      padding: 5px 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
      font-weight: 700;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      padding: 12px;
      min-height: 120px;
    }
    .status {
      font-weight: 700;
      color: #111827;
    }
  </style>
</head>
<body>
<main>
  <h1>mSigSDK Browser Benchmark Harness</h1>
  <p>Scenario-calibrated browser timings for the manuscript compute table. Timings use the Web Performance API in the active browser runtime.</p>
  <button id="run">Run Benchmarks</button>
  <p class="status" id="status">Idle</p>
  <div id="table"></div>
  <pre id="results"></pre>
</main>
<script type="module">
import {
  bootstrapSignatureFit,
  calculateReconstructionError,
  fitSpectraWithNNLS,
  runThresholdSensitivity,
  summarizeMissingContexts,
  summarizeMutationBurden,
} from "../../../../mSigSDKScripts/qc.js";
import {
  computeFitQualityEvidence,
  recommendAnalysisStrategy,
  runCohortFit,
  runPanelWorkflow,
} from "../../../../mSigSDKScripts/guidance.js";
import {
  extractSignaturesNMF,
  selectNMFRank,
} from "../../../../mSigSDKScripts/signatureExtraction.js";
import { getExpectedContexts } from "../../../../mSigSDKScripts/validation.js";

const FITTING_SCENARIOS = [
  { id: "single_sample_wgs_review", useCase: "Single-sample WGS review", sequencing: "WGS", sampleCount: 1, signatureCount: 24, burden: 5000, seed: 2101, bootstrapIterations: [500] },
  { id: "panel_wes_batch", useCase: "Small panel/WES batch", sequencing: "Panel/WES", sampleCount: 24, signatureCount: 12, burden: 80, seed: 2102, bootstrapIterations: [100] },
  { id: "rare_cancer_cohort", useCase: "Rare-cancer cohort", sequencing: "WES/WGS", sampleCount: 40, signatureCount: 18, burden: 300, seed: 2103, bootstrapIterations: [100] },
  { id: "medium_research_cohort", useCase: "Medium research cohort", sequencing: "WGS/WES", sampleCount: 120, signatureCount: 24, burden: 1200, seed: 2104, bootstrapIterations: [100] },
  { id: "portal_review_cohort", useCase: "Portal-scale cohort review", sequencing: "WGS", sampleCount: 300, signatureCount: 40, burden: 1500, seed: 2105, bootstrapIterations: [100] },
];
const DISCOVERY_SCENARIOS = [
  { id: "small_discovery_cohort", useCase: "Exploratory discovery cohort", sequencing: "WGS/WES", sampleCount: 30, signatureCount: 6, burden: 1200, ranks: [2, 3, 4], nRuns: 3, maxIterations: 75, seed: 3101 },
  { id: "medium_discovery_cohort", useCase: "Medium exploratory discovery cohort", sequencing: "WGS", sampleCount: 80, signatureCount: 8, burden: 1500, ranks: [2, 3, 4], nRuns: 3, maxIterations: 75, seed: 3102 },
];
const WORKFLOW_SCENARIOS = [
  { id: "panel_wes_batch", useCase: "Small panel/WES batch", sequencing: "Panel/WES", sampleCount: 24, signatureCount: 12, burden: 80, seed: 4101, workflows: ["advisor", "fitQualityEvidence", "panel"] },
  { id: "rare_cancer_cohort", useCase: "Rare-cancer cohort", sequencing: "WES/WGS", sampleCount: 40, signatureCount: 18, burden: 300, seed: 4102, workflows: ["advisor", "fitQualityEvidence", "cohort"] },
  { id: "medium_research_cohort", useCase: "Medium research cohort", sequencing: "WGS/WES", sampleCount: 120, signatureCount: 24, burden: 1200, seed: 4103, workflows: ["advisor", "fitQualityEvidence", "cohort"] },
];

const statusElement = document.getElementById("status");
const resultsElement = document.getElementById("results");
const tableElement = document.getElementById("table");
const params = new URLSearchParams(location.search);

function seededRandom(seed) {
  let state = seed % 2147483647;
  if (state <= 0) {
    state += 2147483646;
  }
  return function random() {
    state = (state * 16807) % 2147483647;
    return (state - 1) / 2147483646;
  };
}

function sum(values) {
  return values.reduce((total, value) => total + value, 0);
}

function normalize(values) {
  const total = sum(values);
  return total === 0 ? values.map(() => 0) : values.map((value) => value / total);
}

function randomProbabilityVector(length, random) {
  return normalize(
    Array.from({ length }, () => -Math.log(Math.max(1 - random(), 1e-12)))
  );
}

function multinomialCounts(total, probabilities, random) {
  const cumulative = [];
  let running = 0;
  for (const probability of probabilities) {
    running += probability;
    cumulative.push(running);
  }
  const counts = Array(probabilities.length).fill(0);
  for (let drawIndex = 0; drawIndex < total; drawIndex++) {
    const draw = random();
    const index = cumulative.findIndex((value) => draw <= value);
    counts[index === -1 ? counts.length - 1 : index] += 1;
  }
  return counts;
}

function median(values) {
  const finite = values.filter(Number.isFinite).sort((a, b) => a - b);
  if (!finite.length) {
    return NaN;
  }
  const midpoint = Math.floor(finite.length / 2);
  return finite.length % 2
    ? finite[midpoint]
    : (finite[midpoint - 1] + finite[midpoint]) / 2;
}

function createBenchmarkData({ sampleCount, signatureCount = 12, burden = 500, seed = 123 }) {
  const random = seededRandom(seed);
  const contexts = getExpectedContexts({ profile: "SBS", matrix: 96 });
  const signatures = {};
  const signatureVectors = [];
  for (let signatureIndex = 0; signatureIndex < signatureCount; signatureIndex++) {
    const values = randomProbabilityVector(contexts.length, random);
    const signatureName = `SBS${signatureIndex + 1}`;
    signatureVectors.push(values);
    signatures[signatureName] = Object.fromEntries(
      contexts.map((context, contextIndex) => [context, values[contextIndex]])
    );
  }
  const spectra = {};
  for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex++) {
    const exposure = randomProbabilityVector(signatureCount, random).map(
      (value, index) => (index % 4 === sampleIndex % 4 ? value * 2 : value)
    );
    const normalizedExposure = normalize(exposure);
    const probabilities = contexts.map((_, contextIndex) =>
      signatureVectors.reduce(
        (acc, signatureVector, signatureIndex) =>
          acc + normalizedExposure[signatureIndex] * signatureVector[contextIndex],
        0
      )
    );
    const counts = multinomialCounts(burden, normalize(probabilities), random);
    spectra[`sample_${String(sampleIndex + 1).padStart(4, "0")}`] =
      Object.fromEntries(
        contexts.map((context, contextIndex) => [context, counts[contextIndex]])
      );
  }
  return { contexts, signatures, spectra };
}

function createMetadata(spectra) {
  return Object.fromEntries(
    Object.keys(spectra).map((sampleName, index) => [
      sampleName,
      { comparisonGroup: index % 2 === 0 ? "group_A" : "group_B" },
    ])
  );
}

function createCallableOpportunities(contexts) {
  return Object.fromEntries(
    contexts.map((context, index) => [context, index % 3 === 0 ? 1 : 0.4])
  );
}

async function readBrowserMemory() {
  if (performance.measureUserAgentSpecificMemory) {
    try {
      const memory = await performance.measureUserAgentSpecificMemory();
      return {
        method: "measureUserAgentSpecificMemory",
        heapMB: memory.bytes / 1024 / 1024,
        raw: memory,
      };
    } catch (error) {
      return {
        method: "measureUserAgentSpecificMemory_unavailable",
        heapMB: null,
        error: String(error?.message || error),
      };
    }
  }
  if (performance.memory && Number.isFinite(performance.memory.usedJSHeapSize)) {
    return {
      method: "performance.memory.usedJSHeapSize",
      heapMB: performance.memory.usedJSHeapSize / 1024 / 1024,
      raw: {
        usedJSHeapSize: performance.memory.usedJSHeapSize,
        totalJSHeapSize: performance.memory.totalJSHeapSize,
        jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
      },
    };
  }
  return {
    method: "unavailable",
    heapMB: null,
  };
}

async function measure(operation, scenario, fn, repeats = 3) {
  const runs = [];
  let value;
  for (let runIndex = 0; runIndex < repeats; runIndex++) {
    const before = await readBrowserMemory();
    const started = performance.now();
    value = await fn();
    const finished = performance.now();
    const after = await readBrowserMemory();
    runs.push({
      runtimeMs: finished - started,
      heapBeforeMB: before.heapMB,
      heapAfterMB: after.heapMB,
      heapDeltaMB:
        Number.isFinite(before.heapMB) && Number.isFinite(after.heapMB)
          ? after.heapMB - before.heapMB
          : null,
      memoryMethod: after.method,
      memoryBeforeMethod: before.method,
    });
    await new Promise((resolve) => setTimeout(resolve, 0));
  }
  const runtimeValues = runs.map((run) => run.runtimeMs);
  const heapDeltaValues = runs.map((run) => run.heapDeltaMB).filter(Number.isFinite);
  const heapAfterValues = runs.map((run) => run.heapAfterMB).filter(Number.isFinite);
  return {
    value,
    row: {
      ...scenario,
      operation,
      repeats,
      runtimeMedianMs: median(runtimeValues),
      runtimeMinMs: Math.min(...runtimeValues),
      runtimeMaxMs: Math.max(...runtimeValues),
      heapDeltaMB: heapDeltaValues.length ? median(heapDeltaValues) : null,
      heapAfterMB: heapAfterValues.length ? median(heapAfterValues) : null,
      memoryMethod: runs.find((run) => run.memoryMethod !== "unavailable")?.memoryMethod || runs[0]?.memoryMethod || "unavailable",
      runDetails: runs,
    },
  };
}

async function runScenario({ scenario, repeats }) {
  const { contexts, signatures, spectra } = createBenchmarkData({
    sampleCount: scenario.sampleCount,
    signatureCount: scenario.signatureCount,
    burden: scenario.burden,
    seed: scenario.seed,
  });
  const baseScenario = {
    id: scenario.id,
    useCase: scenario.useCase,
    sequencing: scenario.sequencing,
    samples: scenario.sampleCount,
    mutationsPerSample: scenario.burden,
    contexts: contexts.length,
    signatures: scenario.signatureCount,
    iterations: "",
    thresholds: "",
    ranks: "",
  };
  const rows = [];
  const validation = await measure(
    "validation_qc",
    baseScenario,
    () => ({
      burdenSummary: summarizeMutationBurden(spectra, {
        expectedContexts: contexts,
        lowBurdenThreshold: 100,
      }),
      missingContexts: summarizeMissingContexts(spectra, { expectedContexts: contexts }),
    }),
    repeats
  );
  rows.push(validation.row);
  const fit = await measure(
    "nnls_fit",
    baseScenario,
    () =>
      fitSpectraWithNNLS(signatures, spectra, {
        contexts,
        exposureThreshold: 0.01,
        exposureType: "relative",
        renormalize: true,
      }),
    repeats
  );
  rows.push(fit.row);
  const reconstruction = await measure(
    "reconstruction_metrics",
    baseScenario,
    () =>
      calculateReconstructionError(signatures, spectra, fit.value, {
        contexts,
        normalizeMode: "relative",
      }),
    repeats
  );
  rows.push(reconstruction.row);
  const thresholds = [0, 0.01, 0.03, 0.05, 0.1];
  const thresholdSensitivity = await measure(
    "threshold_sensitivity",
    { ...baseScenario, thresholds },
    () =>
      runThresholdSensitivity(signatures, spectra, {
        thresholds,
        contexts,
        exposureType: "relative",
        renormalize: true,
      }),
    repeats
  );
  rows.push(thresholdSensitivity.row);
  const firstSample = Object.keys(spectra)[0];
  for (const iterations of scenario.bootstrapIterations || [100]) {
    const bootstrap = await measure(
      "bootstrap_one_sample",
      { ...baseScenario, iterations },
      () =>
        bootstrapSignatureFit(signatures, spectra[firstSample], {
          iterations,
          contexts,
          exposureThreshold: 0.01,
          exposureType: "relative",
          renormalize: true,
          seed: 42,
        }),
      repeats
    );
    rows.push(bootstrap.row);
  }
  return rows;
}

async function runNMFScenario({ scenario, repeats }) {
  const { contexts, spectra } = createBenchmarkData({
    sampleCount: scenario.sampleCount,
    signatureCount: scenario.signatureCount,
    burden: scenario.burden,
    seed: scenario.seed,
  });
  const baseScenario = {
    id: scenario.id,
    useCase: scenario.useCase,
    sequencing: scenario.sequencing,
    samples: scenario.sampleCount,
    mutationsPerSample: scenario.burden,
    contexts: contexts.length,
    signatures: "",
    iterations: scenario.maxIterations,
    thresholds: "",
    ranks: scenario.ranks,
  };
  const rows = [];
  const rankSelection = await measure(
    "nmf_rank_selection",
    baseScenario,
    () =>
      selectNMFRank(spectra, {
        contexts,
        ranks: scenario.ranks,
        nRuns: scenario.nRuns,
        maxIterations: scenario.maxIterations,
        tolerance: 1e-5,
        seed: 9000,
      }),
    repeats
  );
  rows.push(rankSelection.row);
  const recommendedRank = rankSelection.value.recommendedRank || scenario.ranks[0];
  const extraction = await measure(
    "nmf_extract_recommended_rank",
    { ...baseScenario, ranks: [recommendedRank] },
    () =>
      extractSignaturesNMF(spectra, {
        contexts,
        rank: recommendedRank,
        nRuns: scenario.nRuns,
        maxIterations: scenario.maxIterations,
        tolerance: 1e-5,
        seed: 9500,
      }),
    repeats
  );
  rows.push(extraction.row);
  return rows;
}

async function runGuidanceScenario({ scenario, repeats }) {
  const { contexts, signatures, spectra } = createBenchmarkData({
    sampleCount: scenario.sampleCount,
    signatureCount: scenario.signatureCount,
    burden: scenario.burden,
    seed: scenario.seed,
  });
  const metadata = createMetadata(spectra);
  const baseScenario = {
    id: scenario.id,
    useCase: scenario.useCase,
    sequencing: scenario.sequencing,
    samples: scenario.sampleCount,
    mutationsPerSample: scenario.burden,
    contexts: contexts.length,
    signatures: scenario.signatureCount,
    iterations: "",
    thresholds: "",
    ranks: "",
  };
  const rows = [];
  if (scenario.workflows.includes("advisor")) {
    const advisor = await measure(
      "v03_analysis_advisor",
      baseScenario,
      () =>
        recommendAnalysisStrategy(spectra, {
          expectedContexts: contexts,
          lowBurdenThreshold: 100,
        }),
      repeats
    );
    rows.push(advisor.row);
  }
  const exposures = await fitSpectraWithNNLS(signatures, spectra, {
    contexts,
    exposureThreshold: 0.01,
    exposureType: "relative",
    renormalize: true,
  });
  if (scenario.workflows.includes("fitQualityEvidence")) {
    const fitQualityEvidence = await measure(
      "v03_fit_quality_evidence",
      baseScenario,
      () => computeFitQualityEvidence({ signatures, spectra, exposures, contexts }),
      repeats
    );
    rows.push(fitQualityEvidence.row);
  }
  if (scenario.workflows.includes("cohort")) {
    const cohort = await measure(
      "v03_cohort_fit_pipeline",
      baseScenario,
      () =>
        runCohortFit(
          { spectra, signatures, metadata },
          {
            contexts,
            groupKey: "comparisonGroup",
            comparison: { minGroupSize: 1, permutationIterations: 25 },
            runBootstrap: false,
            runThresholdSensitivity: false,
            runSubgroupDiscovery: false,
          }
        ),
      repeats
    );
    rows.push(cohort.row);
  }
  if (scenario.workflows.includes("panel")) {
    const panel = await measure(
      "v03_panel_workflow",
      baseScenario,
      () =>
        runPanelWorkflow(
          {
            spectra,
            signatures,
            callableOpportunities: createCallableOpportunities(contexts),
          },
          {
            contexts,
            runBootstrap: false,
            runThresholdSensitivity: false,
            runSubgroupDiscovery: false,
          }
        ),
      repeats
    );
    rows.push(panel.row);
  }
  return rows;
}

function renderTable(rows) {
  const headers = ["useCase", "sequencing", "samples", "mutationsPerSample", "signatures", "operation", "runtimeMedianMs", "heapDeltaMB", "memoryMethod"];
  tableElement.innerHTML = `<table><thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${headers.map((header) => {
    const value = row[header];
    const formatted = typeof value === "number" ? value.toFixed(2) : value ?? "";
    return `<td>${String(formatted).replaceAll("&", "&amp;").replaceAll("<", "&lt;")}</td>`;
  }).join("")}</tr>`).join("")}</tbody></table>`;
}

async function postResults(payload) {
  if (!params.get("postResults")) {
    return;
  }
  try {
    await fetch("/__msig_benchmark_results__", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(payload),
    });
  } catch (error) {
    console.warn("Could not post benchmark results", error);
  }
}

async function runBenchmarks() {
  const repeats = Number(params.get("repeats")) || 3;
  const rows = [];
  const startedAt = new Date().toISOString();
  statusElement.textContent = "Running benchmark scenarios";
  for (const scenario of FITTING_SCENARIOS) {
    statusElement.textContent = `Running ${scenario.useCase}`;
    rows.push(...(await runScenario({ scenario, repeats })));
    renderTable(rows);
  }
  for (const scenario of DISCOVERY_SCENARIOS) {
    statusElement.textContent = `Running ${scenario.useCase}`;
    rows.push(...(await runNMFScenario({ scenario, repeats })));
    renderTable(rows);
  }
  for (const scenario of WORKFLOW_SCENARIOS) {
    statusElement.textContent = `Running ${scenario.useCase}`;
    rows.push(...(await runGuidanceScenario({ scenario, repeats })));
    renderTable(rows);
  }
  const payload = {
    generatedAt: new Date().toISOString(),
    startedAt,
    repeats,
    userAgent: navigator.userAgent,
    browser: params.get("browser") || "interactive",
    rows,
  };
  window.__MSIG_BENCHMARK_RESULTS__ = payload;
  resultsElement.textContent = JSON.stringify(payload, null, 2);
  renderTable(rows);
  statusElement.textContent = "Complete";
  await postResults(payload);
}

document.getElementById("run").addEventListener("click", () => {
  runBenchmarks().catch((error) => {
    statusElement.textContent = "Failed";
    resultsElement.textContent = String(error?.stack || error);
    postResults({
      generatedAt: new Date().toISOString(),
      browser: params.get("browser") || "interactive",
      error: String(error?.stack || error),
      rows: [],
    });
  });
});

if (params.get("autorun") === "1") {
  runBenchmarks().catch((error) => {
    statusElement.textContent = "Failed";
    resultsElement.textContent = String(error?.stack || error);
    postResults({
      generatedAt: new Date().toISOString(),
      browser: params.get("browser") || "interactive",
      error: String(error?.stack || error),
      rows: [],
    });
  });
}
</script>
</body>
</html>
