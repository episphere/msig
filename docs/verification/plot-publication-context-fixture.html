<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mSigSDK Publication Plot Context Fixture</title>
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: Inter, Arial, sans-serif;
    }
    main {
      display: grid;
      gap: 24px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    section {
      display: grid;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>mSigSDK publication plot context fixture</h1>
    </header>
    <section>
      <h2>mSigPortal plot family</h2>
      <div id="fixture-public"></div>
    </section>
    <section>
      <h2>User data plot family</h2>
      <div id="fixture-user"></div>
    </section>
    <section>
      <h2>Signature fitting plot family</h2>
      <div id="fixture-fitting"></div>
    </section>
    <section>
      <h2>QC plot family</h2>
      <div id="fixture-qc"></div>
    </section>
    <section>
      <h2>Signature extraction plot family</h2>
      <div id="fixture-nmf"></div>
    </section>
  </main>
  <script type="module">
    import { mSigSDK } from "../../main.js";

    const contexts = mSigSDK.validation.getSBS96Contexts();
    const spectrum = Object.fromEntries(contexts.map((context, index) => [
      context,
      index % 7 === 0 ? 25 + index : index % 5,
    ]));
    const spectra = {
      SAMPLE_A: spectrum,
      SAMPLE_B: Object.fromEntries(contexts.map((context, index) => [
        context,
        index % 9 === 0 ? 18 + index : index % 3,
      ])),
    };
    const figureContext = {
      dataSource: "fixture spectra",
      study: "fixture",
      cancerType: "synthetic",
      strategy: "WGS",
      profile: "SBS",
      matrix: 96,
      signatureCatalog: "fixture catalog",
    };

    await mSigSDK.mSigPortal.mSigPortalPlots.plotCosineSimilarityHeatMap(
      spectra,
      "fixture",
      "WGS",
      "synthetic",
      "fixture-public",
      false,
      "Viridis",
      false,
      { figureContext }
    );

    await mSigSDK.userData.plotPatientMutationalSpectrumuserData(
      { SAMPLE_A: spectrum },
      96,
      "fixture-user",
      { figureContext }
    );

    await mSigSDK.signatureFitting.plotPatientMutationalSignaturesExposure(
      { SAMPLE_A: { SBS1: 0.35, SBS4: 0.5, SBS5: 0.15, rnorm: 0.04 } },
      "fixture-fitting",
      "SAMPLE_A",
      { figureContext }
    );

    const burden = mSigSDK.qc.summarizeMutationBurden(spectra, {
      expectedContexts: contexts,
      lowBurdenThreshold: 100,
    });
    mSigSDK.qcPlots.plotMutationBurdenSummary(
      "fixture-qc",
      burden,
      { figureContext }
    );

    await mSigSDK.signatureExtractionPlots.plotNMFExposureHeatmap(
      "fixture-nmf",
      {
        exposures: {
          SAMPLE_A: { NMF1: 0.72, NMF2: 0.28 },
          SAMPLE_B: { NMF1: 0.25, NMF2: 0.75 },
        },
      },
      { figureContext }
    );
  </script>
</body>
</html>
