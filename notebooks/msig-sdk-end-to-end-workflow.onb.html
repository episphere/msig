<script type="text/markdown">
# End-to-end workflow

Each tumor has a pattern of mutation types, and the workflow asks which known signature patterns could be mixed together to explain that observed pattern.

One way to think about it is a mystery-drink problem. The observed mutation spectrum is the drink you taste. The reference signatures are possible ingredients. The fitting method guesses a recipe, such as "40% apple, 30% cherry, 30% banana." The reconstruction check then asks: if we mix the ingredients using that guessed recipe, does it recreate the original drink? If the reconstruction is close, the guess is more plausible; if it is not close, the result needs review.

Start by loading a real public cohort through the mSigPortal APIs. The default selection is TCGA WES Lung-AdenoCa SBS96, but the menu lets you choose the public study, cancer type, sequencing strategy, mutation-pattern table, table size, and compatible reference signature catalog. You can also paste or upload your own spectra and signature catalog when adapting the workflow.

The fitting method menu can run the built-in SDK fit plus the four executable external package adapters in the SDK runtime manifest: SigProfilerAssignment and MuSiCal through Pyodide, and deconstructSigs and sigminer through WebR. Native JavaScript NMF remains the SDK discovery workflow in the NMF notebook rather than an external package adapter. The downstream mSigSDK checks, plots, reports, and exports stay the same around whichever fitting method produced the contribution table.

A close reconstruction is useful, but it is not the whole analysis. Some reference signatures look similar to each other, like two ingredients with similar flavor. The workflow also checks mutation counts, leftover pattern after fitting, uncertainty, cutoff sensitivity, and reference-signature similarity. These are review diagnostics: they tell you what deserves inspection before making a claim.
</script>

	    function parseNumber(value, fallback) {
	      const parsed = Number(value);
	      return Number.isFinite(parsed) ? parsed : fallback;
	    }

	    function parseOptionalNumber(value) {
	      const text = String(value ?? "").trim();
	      if (!text) return null;
	      const parsed = Number(text);
	      return Number.isFinite(parsed) ? parsed : null;
	    }

	    function parsePercentFraction(value, fallbackPercent = null) {
	      const parsed = parseOptionalNumber(value);
	      if (parsed === null) {
	        return fallbackPercent === null ? null : fallbackPercent / 100;
	      }
	      return parsed / 100;
	    }

    function parseThresholdGrid(value) {
      const parsed = String(value || "")
        .split(/[,\s]+/)
        .map(Number)
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
      return parsed.length ? [...new Set(parsed)] : [0, 0.01, 0.03, 0.05, 0.1];
    }

    function parsePackageList(value, fallback = []) {
      const packages = String(value || "")
        .split(/[\n,]+/)
        .map((item) => item.trim())
        .filter(Boolean);
      return packages.length ? packages : fallback;
    }

	    function ensureReviewParameterDraft() {

	      return workflowState.reviewParameterDraft;
	    }

	    function setReviewParameterDraftValues(values = {}) {
	      const draft = ensureReviewParameterDraft();
	      REVIEW_PARAMETER_KEYS.forEach((key) => {
	        if (Object.prototype.hasOwnProperty.call(values, key)) {
	          draft[key] = Array.isArray(values[key]) ? [...values[key]] : values[key];

	    }

	    function reviewParameterDraftDiffers() {
	      const draft = ensureReviewParameterDraft();
	      return REVIEW_PARAMETER_KEYS.some((key) => JSON.stringify(draft[key]) !== JSON.stringify(workflowState.parameters[key]));
	    }

	    function commitReviewParameterDraftToParameters({ mode = null } = {}) {
	      const draft = ensureReviewParameterDraft();
	      const changedKeys = [];
	      REVIEW_PARAMETER_KEYS.forEach((key) => {
	        const nextValue = Array.isArray(draft[key]) ? [...draft[key]] : draft[key];
	        if (JSON.stringify(workflowState.parameters[key]) !== JSON.stringify(nextValue)) {
	          workflowState.parameters[key] = nextValue;
	          changedKeys.push(key);
	        }
	      });
	      if (typeof syncWorkflowParameterControls === "function") {
	        REVIEW_PARAMETER_KEYS.forEach((key) => syncWorkflowParameterControls(key));
	      }
	      if (mode) {
	        workflowState.reviewSettingsMode = mode;
	      }
	      document.dispatchEvent(new CustomEvent("msig:endToEndReviewDraftChange"));
	      return changedKeys;
	    }

	    function sortedFiniteValues(values = []) {
	      return values
	        .map(Number)
	        .filter(Number.isFinite)
	        .sort((a, b) => a - b);
	    }

	    function quantile(values = [], probability = 0.5) {
	      const sorted = sortedFiniteValues(values);
	      if (!sorted.length) return null;
	      const index = Math.min(sorted.length - 1, Math.max(0, (sorted.length - 1) * probability));
	      const lower = Math.floor(index);
	      const upper = Math.ceil(index);
	      if (lower === upper) return sorted[lower];
	      return sorted[lower] + (sorted[upper] - sorted[lower]) * (index - lower);
	    }

	    function clampNumber(value, min, max) {
	      return Math.min(max, Math.max(min, value));
	    }

	    function niceRound(value, step = 1) {
	      if (!Number.isFinite(value)) return value;
	      return Math.round(value / step) * step;
	    }

	    function roundedQuantile(values = [], probability = 0.9, { step = 0.001, min = null, max = null } = {}) {
	      const value = quantile(values, probability);
	      if (!Number.isFinite(value)) return null;
	      const bounded = clampNumber(
	        value,
	        Number.isFinite(min) ? min : -Infinity,
	        Number.isFinite(max) ? max : Infinity
	      );
	      return Number(niceRound(bounded, step).toFixed(6));
	    }

	    function upperOutlierCutoffs(values = [], options = {}) {
	      const finiteValues = sortedFiniteValues(values).filter((value) => value > 0);
	      if (!finiteValues.length) {
	        return { check: "", priority: "", count: 0, pending: false };
	      }
	      const check = roundedQuantile(finiteValues, ADAPTIVE_REVIEW_POLICY.metricCheckQuantile, options);
	      const priority = roundedQuantile(finiteValues, ADAPTIVE_REVIEW_POLICY.metricPriorityQuantile, options);
	      return {
	        check: Number.isFinite(check) ? check : "",
	        priority: Number.isFinite(priority) ? Math.max(priority, check || priority) : "",
	        count: finiteValues.length,
	        pending: !Number.isFinite(check) && !Number.isFinite(priority),
	      };
	    }

	    function spectraMutationTotals() {
	      return Object.values(workflowState.spectra || {}).map((spectrum) =>
	        Object.values(spectrum || {}).reduce((sum, value) => sum + parseNumber(value, 0), 0)
	      );
	    }

	    function burdenGuardrails(totals = spectraMutationTotals()) {
	      const median = quantile(totals, 0.5) || 0;
	      const contextCount = workflowState.contexts?.length || 96;
	      const selectionText = JSON.stringify(workflowState.publicSelection || {}).toLowerCase();
	      if (contextCount < 96 || median < 250 || selectionText.includes("panel")) {
	        return { lowMin: 10, lowMax: 75, moderateMin: 50, moderateMax: 250, step: 5 };
	      }
	      if (median > 5000 || selectionText.includes("wgs") || selectionText.includes("whole genome")) {
	        return { lowMin: 500, lowMax: 5000, moderateMin: 2000, moderateMax: 15000, step: 100 };
	      }
	      return { lowMin: 50, lowMax: 300, moderateMin: 200, moderateMax: 1500, step: 25 };
	    }

	    function fitQualityComponentValues(component, field) {
	      return (workflowState.analysis?.fitQualityEvidence?.samples || [])
	        .map((sample) => sample.componentEvidence?.[component]?.[field])
	        .filter(Number.isFinite);
	    }

	    function computeAdaptiveReviewDefaults() {
	      const current = reviewParameterSnapshot();
	      const totals = spectraMutationTotals();
	      const guard = burdenGuardrails(totals);
	      const lowQuantile = quantile(totals, ADAPTIVE_REVIEW_POLICY.burdenLowQuantile);
	      const moderateQuantile = quantile(totals, ADAPTIVE_REVIEW_POLICY.burdenModerateQuantile);
	      const lowBurdenThreshold = Number.isFinite(lowQuantile)
	        ? niceRound(clampNumber(lowQuantile, guard.lowMin, guard.lowMax), guard.step)
	        : current.lowBurdenThreshold;
	      const moderateBurdenThreshold = Number.isFinite(moderateQuantile)
	        ? niceRound(
	          clampNumber(
	            Math.max(moderateQuantile, lowBurdenThreshold + guard.step),
	            guard.moderateMin,
	            guard.moderateMax
	          ),
	          guard.step
	          )
	        : current.moderateBurdenThreshold;
	      const adaptive = {
	        ...current,
	        lowBurdenThreshold,
	        moderateBurdenThreshold,
	      };
	      const meta = {
	        policy: ADAPTIVE_REVIEW_POLICY,
	        source: workflowState.source || "active dataset",
	        computedAt: new Date().toISOString(),
	        mode: workflowState.reviewSettingsMode || "adaptive",
	        values: {},
	        pending: [],
	      };
	      meta.values.lowBurdenThreshold = {
	        value: lowBurdenThreshold,
	        quantile: ADAPTIVE_REVIEW_POLICY.burdenLowQuantile,
	        source: "spectra mutation totals",
	        count: totals.filter(Number.isFinite).length,
	      };
	      meta.values.moderateBurdenThreshold = {
	        value: moderateBurdenThreshold,
	        quantile: ADAPTIVE_REVIEW_POLICY.burdenModerateQuantile,
	        source: "spectra mutation totals",
	        count: totals.filter(Number.isFinite).length,
	      };
	      const assignAdaptiveMetric = (metricName, keys, cutoffs) => {
	        adaptive[keys.check] = cutoffs.check;
	        adaptive[keys.priority] = cutoffs.priority;
	        if (cutoffs.pending) {
	          meta.pending.push(keys.check, keys.priority);
	          meta.values[keys.check] = {
	            value: "",
	            source: metricName,
	            status: "pending_fit",
	            quantile: ADAPTIVE_REVIEW_POLICY.metricCheckQuantile,
	            count: cutoffs.count,
	          };
	          meta.values[keys.priority] = {
	            value: "",
	            source: metricName,
	            status: "pending_fit",
	            quantile: ADAPTIVE_REVIEW_POLICY.metricPriorityQuantile,
	            count: cutoffs.count,
	          };
	          return;
	        }
	        meta.values[keys.check] = {
	          value: cutoffs.check,
	          source: metricName,
	          status: cutoffs.check === "" ? "off" : "active",
	          quantile: ADAPTIVE_REVIEW_POLICY.metricCheckQuantile,
	          count: cutoffs.count,
	        };
	        meta.values[keys.priority] = {
	          value: cutoffs.priority,
	          source: metricName,
	          status: cutoffs.priority === "" ? "off" : "active",
	          quantile: ADAPTIVE_REVIEW_POLICY.metricPriorityQuantile,
	          count: cutoffs.count,
	        };
	      };
	      const hasFitQualitySamples = (workflowState.analysis?.fitQualityEvidence?.samples || []).length > 0;
	      const residualValues = fitQualityComponentValues("residual", "unexplainedFraction").map((value) => value * 100);
	      const residualCutoffs = upperOutlierCutoffs(residualValues, { step: 0.1 });
	      const bootstrapValues = fitQualityComponentValues("bootstrap", "maxConfidenceWidth").map((value) => value * 100);
	      const bootstrapCutoffs = upperOutlierCutoffs(bootstrapValues, { step: 0.1 });
	      const cutoffDropValues = fitQualityComponentValues("threshold", "cosineDrop");
	      const cutoffDropCutoffs = upperOutlierCutoffs(cutoffDropValues, { step: 0.001 });
	      const nnValues = fitQualityComponentValues("ambiguity", "maxActivePairCosine");
	      const nnCutoffs = upperOutlierCutoffs(nnValues, { step: 0.001, min: 0, max: 0.999 });
	      [residualCutoffs, bootstrapCutoffs, cutoffDropCutoffs, nnCutoffs].forEach((cutoffs) => {
	        if (!hasFitQualitySamples && cutoffs.count === 0) {
	          cutoffs.pending = true;
	        }
	      });
	      assignAdaptiveMetric("residual unexplained percent", {
	        check: "residualUnexplainedCheckPercent",
	        priority: "residualUnexplainedPriorityPercent",
	      }, residualCutoffs);
	      assignAdaptiveMetric("bootstrap max CI width percent", {
	        check: "bootstrapCiCheckPercent",
	        priority: "bootstrapCiPriorityPercent",
	      }, bootstrapCutoffs);
	      assignAdaptiveMetric("cutoff cosine drop", {
	        check: "cutoffCosineDropCheck",
	        priority: "cutoffCosineDropPriority",
	      }, cutoffDropCutoffs);
	      assignAdaptiveMetric("nearest active-signature cosine", {
	        check: "nnCosineCheck",
	        priority: "nnCosinePriority",
	      }, nnCutoffs);
	      return { values: adaptive, meta };
	    }

	    function resetReviewDraftToAdaptive({ commit = false } = {}) {
	      const adaptive = computeAdaptiveReviewDefaults();
	      workflowState.adaptiveReviewDefaults = reviewParameterSnapshot(adaptive.values);
	      workflowState.adaptiveReviewMeta = adaptive.meta;
	      setReviewParameterDraftValues(adaptive.values);
	      if (commit) {
	        commitReviewParameterDraftToParameters({ mode: "adaptive" });
	      }
	      return adaptive.values;
	    }

	    function refreshAdaptiveReviewDefaults() {
	      const adaptive = computeAdaptiveReviewDefaults();
	      workflowState.adaptiveReviewDefaults = reviewParameterSnapshot(adaptive.values);
	      workflowState.adaptiveReviewMeta = adaptive.meta;
	      return adaptive.values;
	    }

	    function reviewSnapshotEquals(left, right) {
	      if (!left || !right) return false;
	      return REVIEW_PARAMETER_KEYS.every((key) => {
	        const leftValue = left[key];
	        const rightValue = right[key];
	        if (Array.isArray(leftValue) || Array.isArray(rightValue)) {
	          return JSON.stringify(leftValue) === JSON.stringify(rightValue);
	        }
	        if (leftValue === "" || rightValue === "" || leftValue == null || rightValue == null) {
	          return leftValue === rightValue;
	        }
	        return String(leftValue) === String(rightValue);
	      });
	    }

    function parseCsvLike(text) {
      const lines = String(text || "").trim().split(/\r?\n/).filter(Boolean);
      if (!lines.length) return [];
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(delimiter).map((header) => header.trim());
      return lines.slice(1).map((line) => {
        const values = line.split(delimiter);
        return Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]));
      });
    }

    function parseMetadata(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).map(([sample, fields]) => ({ sample, ...(fields || {}) }));
        }
      } catch (_error) {
        return parseCsvLike(trimmed);
      }
      return [];
    }

    function parseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind} input table is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Fall through to TSV import.
      }
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed)
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

      const firstSpectrum = Object.values(spectra || {}).find((record) => record && typeof record === "object");

      const firstSignature = Object.values(signatures || {}).find((record) => record && typeof record === "object");
      if (firstSignature && Object.keys(firstSignature).length) return Object.keys(firstSignature);
      return sbs96Contexts();
    }

    function bootstrapResultForSample(result, sample) {

    function bootstrapReviewSamples(selectedSample) {

    async function getBootstrapForSample(sample, statusElement = null, analysis = workflowState.analysis) {
      if (!sample) {
        throw new Error("Choose a sample before rendering uncertainty intervals.");
      }
      if (workflowState.bootstrapBySample?.[sample]) {
        return workflowState.bootstrapBySample[sample];
      }
      if (!workflowState.spectra?.[sample]) {
        throw new Error(`Sample ${sample} is not present in the active spectra table.`);
      }
      if (statusElement) {
        statusElement.textContent = `Running ${workflowState.parameters.bootstrapIterations} uncertainty refits for ${sample}...`;
      }
      const activeSignatures = activeAnalysisSignatures(analysis);
      const bootstrap = await mSigSDK.qc.bootstrapSignatureFit(
        activeSignatures,
        workflowState.spectra[sample],
        {
          contexts: workflowState.contexts,
          iterations: workflowState.parameters.bootstrapIterations,
          seed: workflowState.parameters.bootstrapSeed,
          exposureThreshold: workflowState.parameters.exposureThreshold,
          yieldEvery: 10,
          progressCallback: ({ iteration, iterations }) => {
            if (statusElement) {
              statusElement.textContent = `Running uncertainty refit ${iteration}/${iterations} for ${sample}...`;
            }
          },
        }
      );
      const annotated = {
        ...bootstrapResultForSample(bootstrap, sample),
        reviewBoundary:
          workflowState.analysis?.exposureEngine?.uncertaintyBasis ||
          "mSigSDK review bootstrap using the active spectra and signature catalog.",
      };
      workflowState.bootstrapBySample = {
        ...(workflowState.bootstrapBySample || {}),
        [sample]: annotated,
      };
      workflowState.bootstrap = annotated;
      return annotated;
    }

    async function runBootstrapReviewSet(analysis, selectedSample) {
      if (!analysis?.exposureEngine?.supportsBootstrap) return null;
      let selectedBootstrap = null;
      const samples = bootstrapReviewSamples(selectedSample);
      for (let index = 0; index < samples.length; index += 1) {
        const sample = samples[index];
        document.dispatchEvent(new CustomEvent("msig:endToEndProgress", {
          detail: {
            title: "Uncertainty review running",
            message: `Running uncertainty review ${index + 1}/${samples.length} after fitting ${Object.keys(analysis.fit?.exposures || {}).length || Object.keys(workflowState.spectra || {}).length} sample(s).`,
            details: `Current sample: ${sample}`,
          },
        }));
        await waitForWorkflowPaint();
        const bootstrap = await getBootstrapForSample(sample, null, analysis);
        if (sample === selectedSample) {
          selectedBootstrap = bootstrap;
        }
        await waitForWorkflowPaint();
      }
      return selectedBootstrap || workflowState.bootstrapBySample?.[selectedSample] || null;
    }

	    function refreshFitQualityEvidenceWithBootstrap(analysis) {
	      if (!analysis?.fit?.exposures || !workflowState.spectra) return analysis;
	      const activeSignatures = activeAnalysisSignatures(analysis);
	      const reviewOptions = reviewThresholdOptions();
	      const advisor = mSigSDK.advisor.recommendAnalysisStrategy(workflowState.spectra, {
	        expectedContexts: workflowState.contexts,
	        lowBurdenThreshold: workflowState.parameters.lowBurdenThreshold,
	        moderateBurdenThreshold: workflowState.parameters.moderateBurdenThreshold,
	      });
	      const residuals = mSigSDK.qc.calculateFitResiduals(
	        activeSignatures,
	        workflowState.spectra,
	        analysis.fit.exposures,
	        reviewOptions
	      );
	      const reconstructionError = mSigSDK.qc.calculateReconstructionError(
	        activeSignatures,
	        workflowState.spectra,
	        analysis.fit.exposures,
	        reviewOptions
	      );
	      const ambiguity = mSigSDK.advisor.computeSignatureIdentifiability(
	        activeSignatures,
	        { contexts: workflowState.contexts }
	      );
	      const catalogCheck = mSigSDK.advisor.detectOutOfReferenceSignal(
	        {
	          signatures: activeSignatures,
	          spectra: workflowState.spectra,
	          exposures: analysis.fit.exposures,
	          residuals,
	          reconstructionError,
	          contexts: workflowState.contexts,
	        },
	        reviewOptions
	      );
      const bootstrap = workflowState.bootstrapBySample || {};
      const fitQualityEvidence = mSigSDK.advisor.computeFitQualityEvidence(
        {
          signatures: activeSignatures,
          spectra: workflowState.spectra,
          exposures: analysis.fit.exposures,
          burdenSummary: advisor.mutationBurden,
          residuals,
          reconstructionError,
          bootstrap,
          thresholdSensitivity: analysis.thresholdSensitivity || analysis.qc?.thresholdSensitivity || null,
          ambiguity,
          catalogCheck,
          contexts: workflowState.contexts,
        },
        reviewOptions
      );
      const bootstrapWarnings = Object.values(bootstrap).flatMap((entry) => entry?.warnings || []);
      const thresholdWarnings = analysis.thresholdSensitivity?.warnings || analysis.qc?.thresholdSensitivity?.warnings || [];
      const advisorActions = Array.isArray(advisor.recommendedActions) ? advisor.recommendedActions : [];
      const catalogActions = Array.isArray(catalogCheck.recommendedActions) ? catalogCheck.recommendedActions : [];
      const fitQualityActions = Array.isArray(fitQualityEvidence.recommendedActions) ? fitQualityEvidence.recommendedActions : [];
      analysis.advisor = advisor;
      analysis.residuals = residuals;
      analysis.ambiguity = ambiguity;
      analysis.catalogCheck = catalogCheck;
      analysis.bootstrap = bootstrap;
      analysis.fitQualityEvidence = fitQualityEvidence;
      analysis.fit = {
        ...(analysis.fit || {}),
        signatures: activeSignatures,
        reconstructionError,
      };
      analysis.qc = {
        ...(analysis.qc || {}),
        mutationBurden: advisor.mutationBurden,
        reconstructionError,
        residuals,
        bootstrap,
        fitQualityEvidence: fitQualityEvidence.summary,
        catalogCheck: catalogCheck.summary,
      };
      if (analysis.report?.qc) {
        analysis.report.qc.mutationBurden = advisor.mutationBurden;
        analysis.report.qc.reconstructionError = reconstructionError;
        analysis.report.qc.residuals = residuals;
        analysis.report.qc.bootstrap = bootstrap;
        analysis.report.qc.fitQualityEvidence = fitQualityEvidence.summary;
      }
      analysis.warnings = dedupeWarnings([
        ...(advisor.warnings || []),
        ...(catalogCheck.warnings || []),
        ...thresholdWarnings,
        ...fitQualityEvidence.warnings,
        ...bootstrapWarnings,
      ]);
      analysis.primaryWarnings = analysis.warnings;
      analysis.recommendedActions = uniqueValues([
        ...advisorActions,
        ...catalogActions,
        ...fitQualityActions,
      ]);
      return analysis;
    }

    function uniqueValues(values = []) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))];
    }

    function dedupeWarnings(warnings = []) {
      const seen = new Set();
      return (Array.isArray(warnings) ? warnings : []).filter((warning) => {
        const key = `${warning?.code || warning?.warningCode || warning?.status || "warning"}|${warning?.message || ""}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function metadataBySample() {
      return Object.fromEntries((workflowState.metadata || []).map((row) => [row.sample, row]));
    }

    function completeExposureMatrix(exposures, { relative = true, signatures = workflowState.signatures } = {}) {
      const sampleNames = Object.keys(workflowState.spectra || {});
      const signatureNames = Object.keys(signatures || {});
      const source = exposures || {};
      const completed = Object.fromEntries(sampleNames.map((sample) => {
        const row = source[sample] || {};
        return [
          sample,
          Object.fromEntries(signatureNames.map((signature) => [
            signature,
            parseNumber(row[signature], 0),
          ])),
        ];
      }));
      return relative
        ? mSigSDK.qc.normalizeExposures(completed, { relative: true })
        : completed;
    }

    function activeAnalysisSignatures(analysis = workflowState.analysis) {
      return analysis?.fit?.signatures || workflowState.signatures || {};
    }

    function thresholdExposureMatrix(exposures, signatures, threshold) {
      const signatureNames = Object.keys(signatures || {});
      const completed = completeExposureMatrix(exposures, {
        relative: false,
        signatures,
      });
      return Object.fromEntries(Object.entries(completed).map(([sample, row]) => {
        const thresholded = Object.fromEntries(signatureNames.map((signature) => [
          signature,
          parseNumber(row?.[signature], 0) >= threshold
            ? parseNumber(row?.[signature], 0)
            : 0,
        ]));
        const total = Object.values(thresholded).reduce((sum, value) => sum + value, 0);
        return [
          sample,
          total > 0
            ? Object.fromEntries(signatureNames.map((signature) => [
              signature,
              thresholded[signature] / total,
            ]))
            : thresholded,
        ];
      }));
    }

    function summarizeCutoffDrift(exposures, baselineExposures, signatureNames) {
      const sampleNames = Object.keys(exposures || {}).filter((sample) => baselineExposures?.[sample]);
      if (!sampleNames.length) {
        return {
          sampleCount: 0,
          meanL1ExposureDrift: null,
          medianL1ExposureDrift: null,
          meanActiveSetJaccard: null,
        };
      }
      const l1Drifts = [];
      const activeSetJaccards = [];
      for (const sample of sampleNames) {
        const row = exposures[sample] || {};
        const baselineRow = baselineExposures[sample] || {};
        const l1 = signatureNames.reduce(
          (sum, signature) => sum + Math.abs((row[signature] || 0) - (baselineRow[signature] || 0)),
          0
        );
        const active = new Set(signatureNames.filter((signature) => (row[signature] || 0) > 0));
        const baselineActive = new Set(signatureNames.filter((signature) => (baselineRow[signature] || 0) > 0));
        const union = new Set([...active, ...baselineActive]);
        const intersection = [...active].filter((signature) => baselineActive.has(signature));
        l1Drifts.push(l1);
        activeSetJaccards.push(union.size === 0 ? 1 : intersection.length / union.size);
      }
      const sortedDrifts = [...l1Drifts].sort((a, b) => a - b);
      return {
        sampleCount: sampleNames.length,
        meanL1ExposureDrift: l1Drifts.reduce((sum, value) => sum + value, 0) / l1Drifts.length,
        medianL1ExposureDrift: sortedDrifts[Math.floor(sortedDrifts.length / 2)],
        meanActiveSetJaccard: activeSetJaccards.reduce((sum, value) => sum + value, 0) / activeSetJaccards.length,
      };
    }

    function calculateSelectedExposureCutoffSensitivity({
      signatures,
      spectra,
      exposures,
      engine,
      thresholds = workflowState.parameters.thresholdGrid,
    }) {
      const signatureNames = Object.keys(signatures || {});
      const normalizedThresholds = parseThresholdGrid(
        Array.isArray(thresholds) ? thresholds.join(", ") : thresholds
      );
      const runs = normalizedThresholds.map((threshold) => {
        const thresholdedExposures = thresholdExposureMatrix(exposures, signatures, threshold);
        const reconstructionError = mSigSDK.qc.calculateReconstructionError(
          signatures,
          spectra,
          thresholdedExposures,
          {
            contexts: workflowState.contexts,
            normalizeMode: "relative",
          }
        );
        const activeSignatureCounts = Object.values(thresholdedExposures).map((row) =>
          Object.values(row || {}).filter((value) => Number(value) > 0).length
        );
        return {
          threshold,
          exposures: thresholdedExposures,
          reconstructionError,
          averageActiveSignatures: activeSignatureCounts.length
            ? activeSignatureCounts.reduce((sum, value) => sum + value, 0) / activeSignatureCounts.length
            : 0,
          averageCosineSimilarity: reconstructionError.samples.length
            ? reconstructionError.samples.reduce((sum, sample) => sum + sample.cosineSimilarity, 0) / reconstructionError.samples.length
            : 0,
          averageRmse: reconstructionError.samples.length
            ? reconstructionError.samples.reduce((sum, sample) => sum + sample.rmse, 0) / reconstructionError.samples.length
            : 0,
        };
      });
      const baselineRun =
        runs.find((run) => run.threshold === workflowState.parameters.exposureThreshold) ||
        runs[0] ||
        null;
      for (const run of runs) {
        run.driftFromBaseline = baselineRun
          ? summarizeCutoffDrift(run.exposures, baselineRun.exposures, signatureNames)
          : null;
      }
      const driftValues = runs
        .map((run) => run.driftFromBaseline?.meanL1ExposureDrift)
        .filter(Number.isFinite);
      const activeSetValues = runs
        .map((run) => run.driftFromBaseline?.meanActiveSetJaccard)
        .filter(Number.isFinite);
      const activeCounts = runs
        .map((run) => run.averageActiveSignatures)
        .filter(Number.isFinite);
      return {
        schemaVersion: "msig.notebook.cutoffSensitivity.v0.3",
        workflowRole: "selected_exposure_cutoff_sensitivity",
        scopeStatement:

        thresholds: normalizedThresholds,

        driftUnits: "relative_exposure_l1_units",

        reportingMode: "standard_qc_review",

	        throw new Error(`${engine.label} returned signature contribution values, but none matched the active sample/signature names after import. Check sample IDs, signature names, and table orientation before reviewing fit evidence.`);

	      const advisor = mSigSDK.advisor.recommendAnalysisStrategy(workflowState.spectra, {

	      const reviewOptions = reviewThresholdOptions();
	      const residualOptions = {

        activeSignatures,

        exposures,

      const reconstructionError = mSigSDK.qc.calculateReconstructionError(
        activeSignatures,
        workflowState.spectra,
        exposures,
	        reviewOptions
	      );
      const ambiguity = mSigSDK.advisor.computeSignatureIdentifiability(
        activeSignatures,

      const catalogCheck = mSigSDK.advisor.detectOutOfReferenceSignal(
        {
          signatures: activeSignatures,

          residuals,
          reconstructionError,
          contexts: workflowState.contexts,

	      );

        ? calculateSelectedExposureCutoffSensitivity({
          signatures: activeSignatures,

          exposures,
          engine,

        : null;
      const fitQualityEvidence = mSigSDK.advisor.computeFitQualityEvidence(
        {
          signatures: activeSignatures,
          spectra: workflowState.spectra,
          exposures,
          burdenSummary: advisor.mutationBurden,
          residuals,
          reconstructionError,
          bootstrap: {},
          thresholdSensitivity,
          ambiguity,

      const sample = workflowState.selectedSample || Object.keys(workflowState.spectra)[0];
      workflowState.visualSamples = {
        residual: sample,
        bootstrap: sample,

      const bootstrap = await runBootstrapReviewSet(analysis, sample);
      const reviewedAnalysis = bootstrap
        ? refreshFitQualityEvidenceWithBootstrap(analysis)
        : analysis;
      workflowState.analysis = reviewedAnalysis;
      const adaptiveReviewDefaults = refreshAdaptiveReviewDefaults();
      if (workflowState.reviewSettingsMode === "adaptive") {
        setReviewParameterDraftValues(adaptiveReviewDefaults);
        commitReviewParameterDraftToParameters({ mode: "adaptive" });

      const finalReviewedAnalysis = refreshFitQualityEvidenceWithBootstrap(reviewedAnalysis);
      workflowState.analysis = annotateAnalysisReviewSettings(finalReviewedAnalysis);
      workflowState.bootstrap = bootstrap;
      workflowState.adaptiveReviewDefaults = reviewParameterSnapshot(adaptiveReviewDefaults);
      const interoperability = createWorkflowInteroperabilityBundle();
      const provenance = mSigSDK.provenance.createProvenance({

        dataSources: [

          `Fitting method: ${analysis.exposureEngine?.label || currentFitEngine().label}.`,
	          "Signature contribution estimates depend on the supplied spectra, active signature catalog, mutation context type, fitting settings, and cutoffs.",
        ],
      });
      workflowState.interoperability = interoperability;
      workflowState.provenance = provenance;
      workflowState.exposureEngineResult = workflowState.analysis.exposureEngineResult || engineResult;
      workflowState.runtimeMs = performance.now() - started;
      document.dispatchEvent(new CustomEvent("msig:endToEndRun"));

    const publicOptionsState = {

    const PUBLIC_API_BASE = "https://analysistools.cancer.gov/mutational-signatures/api/";

    function publicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, PUBLIC_API_BASE);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") url.searchParams.set(key, value);
      }
      return url;
    }

    async function fetchPublicApiRows(endpoint, params = {}, limit = 100000) {
      const rows = [];
      let offset = 0;
      for (let page = 0; page < 10; page += 1) {
        const url = publicApiUrl(endpoint, { ...params, limit, offset });
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${endpoint} API request failed with ${response.status}`);
        const pageRows = await response.json();
        if (!Array.isArray(pageRows)) throw new Error(`${endpoint} API response was not an array.`);
        rows.push(...pageRows);
        if (pageRows.length < limit) break;
        offset += limit;
      }
      return rows;
    }

    async function mapPublicFetches(items, mapper, { concurrency = 12, onProgress = null } = {}) {
      const results = new Array(items.length);
      let nextIndex = 0;
      let completed = 0;
      const workerCount = Math.min(Math.max(1, concurrency), items.length);
      await Promise.all(Array.from({ length: workerCount }, async () => {
        while (nextIndex < items.length) {
          const index = nextIndex;
          nextIndex += 1;
          results[index] = await mapper(items[index], index);
          completed += 1;
          if (onProgress) onProgress({ completed, total: items.length, item: items[index] });
          await waitForWorkflowPaint();
        }
      }));
      return results;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
        .map(String)
        .sort((a, b) => a.localeCompare(b));
    }

    function setSelectOptions(select, items, preferredValue = "") {
      const normalized = items.map((item) =>
        typeof item === "string" ? { label: item, value: item } : item
      );
      select.replaceChildren(...normalized.map((item) => optionNode(item.label, item.value)));
      const values = normalized.map((item) => String(item.value));
      if (preferredValue && values.includes(String(preferredValue))) {
        select.value = String(preferredValue);
      } else if (values.length) {
        select.value = values[0];
      }
      return select.value;
    }

    function selectedPublicRows() {
      const matrix = Number(matrixSelect.value);
      return publicOptionsState.spectra.filter((row) =>
        row.study === studySelect.value &&
        row.strategy === strategySelect.value &&
        row.profile === profileSelect.value &&
        Number(row.matrix) === matrix &&
        (cancerSelect.value === PANCANCER_VALUE || row.cancer === cancerSelect.value)
      );
    }

    function publicSampleOptions() {
      const bySample = new Map();
      for (const row of selectedPublicRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

    function updatePublicStatus() {
      const samples = publicSampleOptions();

        study: studySelect.value,
        cancer: cancerSelect.value === PANCANCER_VALUE ? "PanCancer" : cancerSelect.value,

        profile: profileSelect.value,
        matrix: matrixSelect.value,

    }

    function populatePublicMenus(preferred = {}) {
      const current = {
        study: studySelect.value || preferred.study || "TCGA",
        strategy: strategySelect.value || preferred.strategy || "WES",
        profile: profileSelect.value || preferred.profile || "SBS",
        matrix: matrixSelect.value || preferred.matrix || "96",
        cancer: cancerSelect.value || preferred.cancer || "Lung-AdenoCa",
        signatureSetName: signatureSetSelect.value || preferred.signatureSetName || "COSMIC_v3_Signatures_GRCh37_SBS96",
      };

      const study = setSelectOptions(studySelect, uniqueSorted(publicOptionsState.spectra.map((row) => row.study)), current.study);
      const studyRows = publicOptionsState.spectra.filter((row) => row.study === study);
      const strategy = setSelectOptions(strategySelect, uniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
      const strategyRows = studyRows.filter((row) => row.strategy === strategy);
      const profile = setSelectOptions(profileSelect, uniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
      const profileRows = strategyRows.filter((row) => row.profile === profile);
      const matrix = setSelectOptions(matrixSelect, uniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
      const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
      const cancerItems = uniqueSorted(matrixRows.map((row) => row.cancer)).map((value) => ({ label: value, value }));
      if (study === "PCAWG" || study === "TCGA") {
        cancerItems.unshift({ label: "PanCancer (all cancer types)", value: PANCANCER_VALUE });
      }
      setSelectOptions(cancerSelect, cancerItems, current.cancer);

      const exactSignatureRows = publicOptionsState.signatures.filter((row) =>
        row.strategy === strategy &&
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const fallbackSignatureRows = publicOptionsState.signatures.filter((row) =>
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const signatureRows = exactSignatureRows.length ? exactSignatureRows : fallbackSignatureRows;
      setSelectOptions(signatureSetSelect, uniqueSorted(signatureRows.map((row) => row.signatureSetName)), current.signatureSetName);

    async function loadPublicMenus() {
      publicStatus.textContent = "Loading public dataset options from mSigPortal APIs...";

    async function loadSelectedPublicDataset() {
      if (!publicOptionsState.loaded) await loadPublicMenus();

          { field: "Signature catalog", value: workflowState.publicSelection?.signatureSetName || "user supplied" },

        table([

        ], null, {
          title: "Input check counts",
          caption: false,
        }),
        details("Current spectra object", workflowState.spectra),
      ]));
    }

    for (const select of [studySelect, cancerSelect, strategySelect, profileSelect, matrixSelect, signatureSetSelect]) {
      select.addEventListener("change", () => {
        if (select !== signatureSetSelect) populatePublicMenus();
        updatePublicStatus();

    maxSamplesInput.addEventListener("input", updatePublicStatus);

    refreshPublic.addEventListener("click", loadPublicMenus);

    loadPublic.addEventListener("click", async () => {

    inputActions.append(clearInput);
    inputPanel.append(sourceChoice, publicGrid, publicStatus, inputGrid, inputActions, inputSummary);
    display(inputPanel);

      return analysis?.fitQualityEvidence?.warnings || [];

    function sampleActiveCaveatCount(sample) {
      const evidence = sample?.componentEvidence || {};
      let count = 0;
      if (["low", "insufficient"].includes(evidence.burden?.burdenClass)) count += 1;
      if (
        evidence.catalog?.fitReviewStatus === "review" ||
        evidence.catalog?.fitReviewStatus === "limited_by_low_burden"
      ) count += 1;
      if (
        evidence.bootstrap?.reviewSeverity === "concern" ||
        evidence.bootstrap?.reviewSeverity === "caution" ||
        (evidence.bootstrap?.warningCodes || []).length
      ) count += 1;
      if (
        evidence.threshold?.reviewSeverity === "concern" ||
        evidence.threshold?.reviewSeverity === "caution" ||
        (evidence.threshold?.warningCodes || []).length
      ) count += 1;
      if (
        evidence.ambiguity?.sampleAmbiguityStatus === "strong_active_confusable_pair" ||
        evidence.ambiguity?.sampleAmbiguityStatus === "active_confusable_pair"
      ) count += 1;
      return count;
    }

      return (analysis?.fitQualityEvidence?.samples || []).reduce(

	    function workflowParameterTargetObject(target = "parameters") {
	      return target === "reviewDraft"
	        ? ensureReviewParameterDraft()
	        : workflowState.parameters;
	    }

	    function formatWorkflowParameter(key, target = "parameters") {
	      const definition = PARAMETER_DEFINITIONS[key] || {};
	      const value = workflowParameterTargetObject(target)[key];
	      if (definition.format) return definition.format(value);
	      if (value === undefined || value === null) return "";
	      return String(value);
	    }

	    function workflowParameterEquals(left, right) {
	      return JSON.stringify(left) === JSON.stringify(right);
	    }

	    function workflowParameterControlId(key, target = "parameters") {
	      return `${target}:${key}`;
	    }

	    function registerWorkflowParameterControl(key, input, target = "parameters") {
	      input.dataset.workflowParameterKey = key;
	      input.dataset.workflowParameterTarget = target;
	      const controlId = workflowParameterControlId(key, target);
	      const controls = workflowParameterControls.get(controlId) || new Set();
	      controls.add(input);
	      workflowParameterControls.set(controlId, controls);
	    }

	    function syncWorkflowParameterControls(key, source = null, target = "parameters") {
	      const keys = key ? [key] : Object.keys(PARAMETER_DEFINITIONS);
	      for (const currentKey of keys) {
	        const controls = workflowParameterControls.get(workflowParameterControlId(currentKey, target));
	        if (!controls) continue;
	        const value = formatWorkflowParameter(currentKey, target);
	        for (const input of [...controls]) {
	          if (!input.isConnected) {
	            controls.delete(input);
	            continue;
	          }
	          if (input !== source) {
	            input.value = value;
	          }
	        }
	      }
	    }

	    function setWorkflowParameterFromInput(key, input, { trigger = true, source = input, target = "parameters" } = {}) {
	      const definition = PARAMETER_DEFINITIONS[key];
	      if (!definition) return;
	      const nextValue = definition.parse
	        ? definition.parse(input.value)
	        : input.value;
	      const targetObject = workflowParameterTargetObject(target);
	      if (workflowParameterEquals(targetObject[key], nextValue)) return;
	      targetObject[key] = nextValue;
	      syncWorkflowParameterControls(key, source, target);
	      if (target === "reviewDraft") {
	        document.dispatchEvent(new CustomEvent("msig:endToEndReviewDraftChange"));
	        return;
	      }
	      if (trigger) refreshAfterParameterChange(key);
	    }

	    function syncParametersFromControls({ target = "parameters" } = {}) {
	      for (const [key, controls] of workflowParameterControls.entries()) {
	        if (!key.startsWith(`${target}:`)) continue;
	        const parameterKey = key.slice(target.length + 1);
	        const input = [...controls].find((candidate) => candidate.isConnected);
	        if (input) setWorkflowParameterFromInput(parameterKey, input, { trigger: false, source: input, target });
	      }
	    }

	    function refreshAfterParameterChange(key) {

	    function parameterControl(key, overrides = {}) {

	      const input = document.createElement("input");
	      input.type = definition.type || "text";
	      input.value = formatWorkflowParameter(key, target);
	      if (definition.step !== undefined) input.step = String(definition.step);
	      if (definition.min !== undefined) input.min = String(definition.min);
	      if (definition.max !== undefined) input.max = String(definition.max);
	      if (definition.placeholder) input.placeholder = definition.placeholder;
	      registerWorkflowParameterControl(key, input, target);
	      const autoRefresh = overrides.autoRefresh !== false;
	      const update = () => setWorkflowParameterFromInput(key, input, { trigger: autoRefresh, source: input, target });
	      input.addEventListener("input", update);
	      input.addEventListener("change", update);
	      return field(
	        overrides.label || definition.label,
	        input,
	        overrides.help || definition.help || ""
	      );
	    }

	    function reviewParameterChipLabel(key) {
	      const labels = {
	        lowBurdenThreshold: "Low burden",
	        moderateBurdenThreshold: "Moderate burden",
	        residualUnexplainedCheckPercent: "Residual check",
	        residualUnexplainedPriorityPercent: "Residual priority",
	        bootstrapCiCheckPercent: "Bootstrap max CI check",
	        bootstrapCiPriorityPercent: "Bootstrap max CI priority",
	        cutoffCosineDropCheck: "Cutoff max drop check",
	        cutoffCosineDropPriority: "Cutoff max drop priority",
	        nnCosineCheck: "Nearest signature cosine check",
	        nnCosinePriority: "Nearest signature cosine priority",
	        activeSignaturePercent: "Active signature",
	        thresholdGrid: "Cutoffs",
	        bootstrapIterations: "Iterations",
	      };
	      return labels[key] || PARAMETER_DEFINITIONS[key]?.label || key;
	    }

	    function reviewParameterChipValue(key, target = "parameters") {
	      const value = formatWorkflowParameter(key, target);
	      if (value !== "") return value;
	      if (
	        ADAPTIVE_FIT_DEPENDENT_KEYS.includes(key) &&
	        (workflowState.adaptiveReviewMeta?.pending || []).includes(key)
	      ) {
	        return "pending fit";
	      }
	      return "off";
	    }

	    function reviewSettingChips(keys = [], target = "parameters") {
	      const wrapper = document.createElement("div");
	      wrapper.className = "workflow-review-setting-chips";
	      keys.forEach((key) => {
	        const chip = document.createElement("span");
	        chip.className = "workflow-review-setting-chip";
	        chip.textContent = `${reviewParameterChipLabel(key)}: ${reviewParameterChipValue(key, target)}`;
	        wrapper.append(chip);
	      });
	      return wrapper;
	    }

	    function compactReviewNumber(value, digits = 3) {
	      const numeric = Number(value);
	      if (!Number.isFinite(numeric)) return "n/a";
	      return numeric.toFixed(digits).replace(/\.?0+$/, "");
	    }

	    function compactReviewPercent(value, digits = 1) {
	      const numeric = Number(value);
	      if (!Number.isFinite(numeric)) return "n/a";
	      return `${(numeric * 100).toFixed(digits).replace(/\.?0+$/, "")}%`;
	    }

	    function reviewCueLabelsForSample(sample) {
	      const evidence = sample?.componentEvidence || {};
	      const cues = [];
	      if (["low", "insufficient"].includes(evidence.burden?.burdenClass)) {
	        cues.push(evidence.burden.burdenClass === "insufficient" ? "Very low mutation count" : "Low mutation count");
	      }
	      if (evidence.catalog?.fitReviewStatus === "review") {
	        cues.push("Residual or catalog fit");
	      } else if (evidence.catalog?.fitReviewStatus === "limited_by_low_burden") {
	        cues.push("Residual check limited by mutation count");
	      }
	      if (
	        evidence.bootstrap?.reviewSeverity === "concern" ||
	        evidence.bootstrap?.reviewSeverity === "caution" ||
	        (evidence.bootstrap?.warningCodes || []).length
	      ) {
	        cues.push("Uncertainty interval");
	      }
	      if (
	        evidence.threshold?.reviewSeverity === "concern" ||
	        evidence.threshold?.reviewSeverity === "caution" ||
	        (evidence.threshold?.warningCodes || []).length
	      ) {
	        cues.push("Cutoff sensitivity");
	      }
	      if (evidence.ambiguity?.sampleAmbiguityStatus === "strong_active_confusable_pair") {
	        cues.push("Very similar active signatures");
	      } else if (evidence.ambiguity?.sampleAmbiguityStatus === "active_confusable_pair") {
	        cues.push("Similar active signatures");
	      }
	      return cues;
	    }

	    function reviewSeverityForSample(sample) {
	      const evidence = sample?.componentEvidence || {};
	      if (
	        evidence.burden?.burdenClass === "insufficient" ||
	        evidence.catalog?.fitReviewStatus === "review" ||
	        evidence.bootstrap?.reviewSeverity === "concern" ||
	        evidence.threshold?.reviewSeverity === "concern" ||
	        evidence.ambiguity?.sampleAmbiguityStatus === "strong_active_confusable_pair"
	      ) {
	        return "priority";
	      }
	      return reviewCueLabelsForSample(sample).length ? "check" : "routine";
	    }

	    function mostCommonReviewCue(samples = []) {
	      const counts = new Map();
	      samples.flatMap(reviewCueLabelsForSample).forEach((label) => {
	        counts.set(label, (counts.get(label) || 0) + 1);
	      });
	      return [...counts.entries()].sort((a, b) => b[1] - a[1])[0] || null;
	    }

	    function reviewDiagnosticRows(samples = []) {
	      return [...samples].sort((a, b) => {
	        const severityRank = { priority: 2, check: 1, routine: 0 };
	        const severityDelta =
	          (severityRank[reviewSeverityForSample(b)] || 0) -
	          (severityRank[reviewSeverityForSample(a)] || 0);
	        if (severityDelta) return severityDelta;
	        return sampleActiveCaveatCount(b) - sampleActiveCaveatCount(a);
	      });
	    }

	    function reviewDiagnosticRowNode(sample) {
	      const row = document.createElement("div");
	      row.className = "workflow-diagnostics-row";
	      const evidence = sample?.componentEvidence || {};
	      const severity = reviewSeverityForSample(sample);
	      const cues = reviewCueLabelsForSample(sample);
	      const values = [
	        { className: "workflow-diagnostics-sample", text: sample.sample || "sample" },
	        {
	          node: (() => {
	            const badge = document.createElement("span");
	            badge.className = `workflow-diagnostics-badge ${severity}`;
	            badge.textContent = severity === "priority" ? "Priority" : severity === "check" ? "Check" : "Routine";
	            return badge;
	          })(),
	        },
	        { className: "workflow-diagnostics-cues", text: cues.join(", ") || "No active review cue" },
	        { text: compactReviewNumber(evidence.reconstruction?.cosineSimilarity, 3) },
	        { text: compactReviewPercent(evidence.residual?.unexplainedFraction, 1) },
	        { text: compactReviewPercent(evidence.bootstrap?.maxConfidenceWidth, 0) },
	        { text: compactReviewNumber(evidence.threshold?.cosineDrop, 3) },
	      ];
	      values.forEach((value) => {
	        const cell = document.createElement("div");
	        if (value.className) cell.className = value.className;
	        if (value.node) {
	          cell.append(value.node);
	        } else {
	          cell.textContent = value.text;
	        }
	        row.append(cell);
	      });
	      return row;
	    }

	    function renderCompactReviewDiagnostics(hostId, fitQualityEvidence) {
	      const host = typeof hostId === "string" ? document.getElementById(hostId) : hostId;
	      if (!host) return null;
	      const samples = fitQualityEvidence?.samples || [];
	      if (!samples.length) {
	        host.replaceChildren(placeholder("Run the workflow to see review diagnostics."));
	        return null;
	      }
	      const sortedSamples = reviewDiagnosticRows(samples);
	      const reviewCount = samples.filter((sample) => sampleActiveCaveatCount(sample) > 0).length;
	      const priorityCount = samples.filter((sample) => reviewSeverityForSample(sample) === "priority").length;
	      const caveatTotal = samples.reduce((sum, sample) => sum + sampleActiveCaveatCount(sample), 0);
	      const commonCue = mostCommonReviewCue(samples);
	      const shownRows = sortedSamples.slice(0, 8);

	      const panel = document.createElement("section");
	      panel.className = "workflow-diagnostics-compact";
	      const header = document.createElement("div");
	      header.className = "workflow-diagnostics-header";
	      const title = document.createElement("h4");
	      title.textContent = "Review diagnostics";
	      const summary = document.createElement("p");
	      summary.textContent = "Caveats mark samples that need inspection before reporting. They do not mean the fit failed.";
	      header.append(title, summary);

	      const stats = document.createElement("div");
	      stats.className = "workflow-diagnostics-summary";
	      [
	        ["Samples", samples.length],
	        ["Needs review", `${reviewCount}/${samples.length}`],
	        ["Priority", priorityCount],
	        ["Most common cue", commonCue ? `${commonCue[0]} (${commonCue[1]})` : "None"],
	      ].forEach(([label, value]) => {
	        const card = document.createElement("div");
	        card.className = "workflow-diagnostics-stat";
	        const labelNode = document.createElement("span");
	        labelNode.textContent = label;
	        const valueNode = document.createElement("strong");
	        valueNode.textContent = String(value);
	        card.append(labelNode, valueNode);
	        stats.append(card);
	      });

	      const rows = document.createElement("div");
	      rows.className = "workflow-diagnostics-table";
	      const headerRow = document.createElement("div");
	      headerRow.className = "workflow-diagnostics-row header";
	      ["Sample", "Status", "Review cue", "Fit cosine", "Residual", "Max CI", "Cutoff drop"].forEach((label) => {
	        const cell = document.createElement("div");
	        cell.textContent = label;
	        headerRow.append(cell);
	      });
	      rows.append(headerRow, ...shownRows.map(reviewDiagnosticRowNode));

	      const footnote = document.createElement("p");
	      footnote.className = "workflow-diagnostics-footnote";
	      footnote.textContent = `Showing ${shownRows.length} highest-priority sample${shownRows.length === 1 ? "" : "s"} of ${samples.length}. Fit cosine is higher when the reconstruction matches the observed spectrum; residual, max CI, and cutoff drop are smaller when the fitted recipe is more stable.`;
	      panel.append(header, stats, rows, footnote);
	      host.replaceChildren(panel);
	      return { data: sortedSamples, shownRows };
	    }

	    function appendPlotParameters(section, options = {}) {
	      if (options.parameterPanel) {
	        section.append(options.parameterPanel);
	        return;
	      }
	      if (Array.isArray(options.parameterGroups) && options.parameterGroups.length) {
	        section.append(plotParameterGroups(options.parameterGroups));
	        return;

	      if (Array.isArray(options.settingKeys) && options.settingKeys.length) {
	        section.append(reviewSettingChips(options.settingKeys));
	        return;
	      }
	      if (Array.isArray(options.parameterKeys) && options.parameterKeys.length) {
	        section.append(plotParameterGrid(options.parameterKeys));
	      }
	    }

	    function reviewAppliedCaveatSummary() {
	      const samples = workflowState.analysis?.fitQualityEvidence?.samples || [];
	      if (!samples.length) return "Run the workflow to apply these review settings.";
	      const counts = samples.map((sample) => sampleActiveCaveatCount(sample));
	      const sampleCount = counts.filter((count) => count > 0).length;
	      const total = counts.reduce((sum, count) => sum + count, 0);
	      return `${sampleCount}/${samples.length} samples need review; ${total} cue${total === 1 ? "" : "s"} active.`;
	    }

	      const modeText = workflowState.reviewSettingsMode === "manual"

	        ? ` Pending fit-derived defaults: ${pendingLabels.join(", ")}.`
