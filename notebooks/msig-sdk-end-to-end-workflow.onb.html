      const section = document.createElement("section");
      section.className = "workflow-plot-section";
      const heading = document.createElement("h3");
      heading.textContent = label;
      const host = document.createElement("div");
      host.id = `workflow-${label.toLowerCase().replace(/[^a-z0-9]+/g, "-")}-${Math.random().toString(36).slice(2)}`;
      host.className = "workflow-plot-host";
      const status = document.createElement("p");
      status.className = "workflow-plot-sample-status";
      section.append(heading);
      if (explanation) {
        section.append(collapsibleOutput(options.interpretLabel || "How to interpret this plot", paragraphNode(explanation, "workflow-plot-explanation")));
      }
	      appendPlotParameters(section, options);
      let selectedSample = options.sample || null;
      let sampleSelect = null;
      if (options.sampleControl) {
        const controls = document.createElement("div");
        controls.className = "workflow-plot-controls";
        sampleSelect = document.createElement("select");
        const samples = sampleOptions();
        sampleSelect.replaceChildren(...samples.map((sample) => {
          const option = document.createElement("option");
          option.value = sample;
          option.textContent = sample;
          return option;
        }));
        selectedSample = samples.includes(selectedSample) ? selectedSample : samples[0];
        if (selectedSample) sampleSelect.value = selectedSample;
        controls.append(field(
          options.sampleLabel || "Sample shown",
          sampleSelect,
          options.sampleHelp || "Change this to redraw the one-sample visual."
        ));
        section.append(controls, status);
        sampleSelect.addEventListener("change", async () => {
          selectedSample = sampleSelect.value;
          if (options.onSampleChange) options.onSampleChange(selectedSample);
          sampleSelect.disabled = true;
          try {
            await renderPlot();
          } finally {
            sampleSelect.disabled = false;
          }
        });
      }
      section.append(host);
      plotGrid.append(section);
      async function renderPlot() {
        const renderingStatus = selectedSample
          ? `Showing sample ${selectedSample}.`
          : "Choose a sample to render this plot.";
        host.replaceChildren(placeholder(`Rendering ${label}${selectedSample ? ` for ${selectedSample}` : ""}...`));
        if (options.sampleControl) {
          status.textContent = renderingStatus;
        }
        try {
          await renderer(host.id, selectedSample, status);
          if (options.sampleControl && selectedSample && status.textContent === renderingStatus) {
            status.textContent = renderingStatus;
          }
        } catch (error) {
          const fallbackNode = typeof fallback === "function" ? fallback(selectedSample) : fallback;
          host.replaceChildren(fallbackNode || placeholder(`Could not render ${label}: ${error.message}`));
          if (options.sampleControl) status.textContent = `Could not render ${selectedSample || "selected sample"}: ${error.message}`;
        }
      }
      await renderPlot();
    }

    async function renderReview() {
      plotGrid.replaceChildren();
      tableStack.replaceChildren();
      const analysis = workflowState.analysis;
      if (!analysis) {
        renderEmptyReview();
        return;
      }
      plotGrid.append(loadingPlaceholder("Rendering updated visual checks..."));
      tableStack.append(placeholder("Review tables will refresh after the plots finish."));
	      await waitForWorkflowPaint();
	      plotGrid.replaceChildren();
	      tableStack.replaceChildren();
		      await plotSection(
		        "Review summary",
		        (id) => renderCompactReviewDiagnostics(id, analysis.fitQualityEvidence),
		        fitQualityEvidenceTable(analysis.fitQualityEvidence, {
		          includeInterpretationEvidence: true,
		          maxRows: 8,
		          title: "Review-diagnostics values",
		          caption: "Lists the sample-level cues used in the compact review panel.",
		        }),
		        "Ranks samples by review cues so the highest-priority fits are inspected first."
		        , { parameterPanel: reviewSettingsPanel(), interpretLabel: "How to read this panel" }
		      );
		      await plotSection(
		        "Full-COSMIC cohort exposure landscape",
		        (id) => mSigSDK.qcPlots.plotCohortSignatureSummary(id, {
		          spectra: workflowState.spectra,
		          exposures: analysis.fit?.exposures,
		          fitQuality: analysis.fitQualityEvidence,
		          metadata: workflowState.metadata,
		          signatureNames: Object.keys(activeAnalysisSignatures(analysis) || {}),
		          dataset: workflowState.publicSelection
		            ? `${workflowState.publicSelection.study} ${workflowState.publicSelection.cancer} ${workflowState.publicSelection.profile || ""}`.trim()
		            : (workflowState.source || "Loaded cohort"),
		          signatureCatalog: workflowState.publicSelection?.signatureSetName || analysis.fit?.catalog || "active reference catalog",
		        }, {
		          topN: 8,
		          exposureThreshold: workflowState.parameters.exposureThreshold,
		          title: "Full-COSMIC cohort exposure landscape",
		          subtitle: "Full reference-catalog fit; display summarizes the top 8 cohort signatures plus Other.",
		          publication: {
		            compact: true,
		            rowHeight: 24,
		            cellWidth: 58,
		            sampleLabelWidth: 132,
		            sampleLabelMaxLength: 13,
		            burdenWidth: 82,
		            burdenValueWidth: 38,
		            fitWidth: 90,
		            bodyY: 306,
		            topPanelHeight: 216,
		            topPanelHeatmapGap: 40,
		            targetWidth: 960,
		            maxWidth: "960px",
		            scrollX: false,
		          },
		        }),
		        table(exposureRows(analysis.fit.exposures, { minExposure: 0, topN: 30 }), null, {
		          title: "Displayed cohort signatures",
		          caption: "The figure computes the full fitted catalog and displays the highest-total cohort signatures plus an Other column for lower-ranked fitted COSMIC SBS signatures.",
		        }),
		        "Shows the fitted signature landscape across all loaded samples. The computation uses the active full reference catalog; the visual compresses lower-ranked signatures into Other so the cohort pattern remains readable.",
		        { settingKeys: ["exposureThreshold"], interpretLabel: "How to read this cohort landscape" }
		      );
		      await plotSection(
		        "Mutation count",
	        (id) => mSigSDK.qcPlots.plotMutationBurdenSummary(id, analysis.qc.mutationBurden),
        table(burdenSampleRows(analysis.qc.mutationBurden), null, {
          title: "Mutation-count values behind the plot",
          caption: "Lists the same sample-level mutation-count evidence used in the mutation-count figure.",
	        }),
	        "Shows per-sample mutation counts. Lower counts make fitted contributions less stable."
	        , { settingKeys: MUTATION_COUNT_PARAMETER_KEYS }
	      );
	      await plotSection(
	        "Reconstruction quality",
	        (id) => mSigSDK.qcPlots.plotReconstructionError(id, analysis.qc.reconstructionError),
	        table(reconstructionRows(analysis.qc.reconstructionError), null, {
	          title: "Reconstruction values behind the plot",
	          caption: "Lists cosine similarity and RMSE for each sample. These values ask whether the guessed signature recipe can recreate the original mutation pattern.",
	        }),
	        "Compares the observed spectrum with the fitted reconstruction. Cosine is 0 to 1; higher is better. RMSE is average leftover mismatch; lower is better."
	      );
		      await plotSection(
	        "Residual spectrum",
	        (id, sample) => mSigSDK.qcPlots.plotFitResiduals(id, analysis.residuals, sample),
	        details("Residual object", analysis.residuals),
	        "Shows observed, reconstructed, and residual spectra for one sample.",
	        {
	          settingKeys: RESIDUAL_PARAMETER_KEYS,
	          sampleControl: true,
	          sample: workflowState.visualSamples?.residual || workflowState.selectedSample,
	          sampleLabel: "Residual sample",
	          sampleHelp: "Redraws the observed, reconstructed, and residual difference plot for one sample.",
	          onSampleChange: (sample) => {
	            workflowState.visualSamples.residual = sample;
	          },
	        }
	      );
      await plotSection(
        "Uncertainty intervals",
        async (id, sample, status) => {
          const bootstrap = await getBootstrapForSample(sample, status);
          await mSigSDK.qcPlots.plotBootstrapConfidenceIntervals(id, bootstrap);
          const rerunNote = workflowState.bootstrapNeedsRerun
            ? ` Cached intervals use ${bootstrap?.iterations || "the previous"} iterations; rerun the workflow to compute ${workflowState.parameters.bootstrapIterations}.`
            : "";
          status.textContent = `Showing uncertainty intervals for sample ${sample}.${rerunNote}`;
        },
	        (sample) => table(bootstrapRows(workflowState.bootstrapBySample?.[sample] || workflowState.bootstrap), null, {
	          title: "Uncertainty values for the selected sample",
	          caption: "Lists repeat-fit intervals and selection-frequency values for the sample selected above.",
	        }),
        `Shows repeat-fit confidence intervals for one sample. Values are signature-contribution percentages. ${analysis.exposureEngine?.uncertaintyBasis || "mSigSDK review bootstrap uses the active spectra and signature catalog."}`,
        {
          settingKeys: UNCERTAINTY_PARAMETER_KEYS,
          sampleControl: true,
          sample: workflowState.visualSamples?.bootstrap || workflowState.selectedSample,
          sampleLabel: "Uncertainty sample",
          sampleHelp: "All fitted samples are computed during the workflow. This selector changes which sample is displayed.",
          onSampleChange: (sample) => {
            workflowState.visualSamples.bootstrap = sample;
          },
        }
      );
      await plotSection(
        "Cutoff sensitivity",
        (id) => {
          if (!analysis.thresholdSensitivity) {
            throw new Error("Cutoff sensitivity is not available for this selected result.");
          }
          return mSigSDK.qcPlots.plotThresholdSensitivity(id, analysis.thresholdSensitivity);
        },
        analysis.thresholdSensitivity
	          ? table(thresholdRows(analysis.thresholdSensitivity), null, {
	            title: "Cutoff sensitivity values",
	            caption: "Lists how reconstruction, active signatures, and recipe estimates change across the cutoff values tested in this workflow.",
	          })
          : note("Cutoff sensitivity is not available for this selected result.", "warning"),
			        `Shows how reconstruction changes when small fitted contributions are removed. The review summary uses reconstruction cosine drop from the baseline cutoff. ${analysis.exposureEngine?.cutoffSensitivityBasis || "mSigSDK applies the configured cutoffs to the active contribution table."}`
			        , { settingKeys: CUTOFF_PARAMETER_KEYS }
			      );

	      tableStack.append(collapsibleOutput("Fitted recipe and sample review evidence", [
	        workflowOutputGuide(
	          "Fitting method used",
	          "The contribution table comes from the selected fitting method. mSigSDK adds input checks, reconstruction checks, residual review, tooltip reporting tables, run records, and tool export files around that table.",
	          engineRows(analysis)
	        ),
	        note("Do not copy signature contribution rows into a result section without the reporting mode, warning codes, reconstruction context, and cutoff/uncertainty context.", "warning"),
	        table(exposureRows(analysis.fit.exposures, { minExposure: 0, topN: 30 }), null, {
	          title: "Signature recipe estimates",
	          caption: "Shows the fitted recipe produced by the selected fitting method.",
	        }),
	        fitQualityMethodGuide(),
	        fitQualityEvidenceTable(analysis.fitQualityEvidence, {
	          includeActiveSignatures: true,
	          includeInterpretationEvidence: true,
	          maxRows: 12,
	          title: "Review diagnostics preview for reporting",
	          caption: "Shows how cautiously each sample should be interpreted and which review cues should accompany the fitted recipe.",
	        }),
	      ]));
	      tableStack.append(collapsibleOutput("Warnings and suggested review steps", [
	        workflowWarningTable(analysis.warnings),
	        table(actionRows(analysis.recommendedActions), null, {
	          title: "Suggested review steps",
	          caption: "Lists the follow-up checks generated from the workflow review evidence.",
	        }),
	      ]));
	      tableStack.append(collapsibleOutput("Reference-signature similarity evidence", [
	        workflowOutputGuide(
	          "Reference-catalog review evidence",
	          "This table explains similarity review cues from neighboring signatures, crowded catalog regions, broad profiles, and low-specificity signatures.",
	          catalogAmbiguityTable(analysis)
	        ),
	      ]));
	      tableStack.append(collapsibleOutput("Full workflow result object", details("Workflow result JSON", analysis)));
      markWorkflowUpdated(reviewPanel);
    }

	    function recomputeCachedCutoffSensitivity(analysis) {
	      if (!analysis?.fit?.exposures || !workflowState.spectra) return null;
	      const activeSignatures = activeAnalysisSignatures(analysis);
	      const thresholdSensitivity = calculateSelectedExposureCutoffSensitivity({
	        signatures: activeSignatures,
	        spectra: workflowState.spectra,
	        exposures: analysis.fit.exposures,
	        engine: analysis.exposureEngine || currentFitEngine(),
	        thresholds: workflowState.parameters.thresholdGrid,
	      });
	      analysis.thresholdSensitivity = thresholdSensitivity;
	      analysis.qc = {
	        ...(analysis.qc || {}),
	        thresholdSensitivity,
	      };
	      if (analysis.report?.qc) {
	        analysis.report.qc.thresholdSensitivity = thresholdSensitivity;
	      }
	      return thresholdSensitivity;
	    }

	    function cachedBootstrapMatchesIterations() {
	      const entries = Object.values(workflowState.bootstrapBySample || {}).filter(Boolean);
	      if (!entries.length) return false;
	      return entries.every((entry) => Number(entry.iterations) === Number(workflowState.parameters.bootstrapIterations));
	    }

	    function refreshCachedAnalysisForKeys(keys = []) {
	      const analysis = workflowState.analysis;
	      const changedKeys = [...new Set(keys)].filter((key) => PLOT_REFRESH_PARAMETER_KEYS.has(key));
	      if (changedKeys.some((key) => BURDEN_REFRESH_PARAMETER_KEYS.has(key))) {
	        validateCurrentInputs();
	        document.dispatchEvent(new CustomEvent("msig:endToEndInputs"));
	      }
	      if (!analysis) return analysis;
	      if (changedKeys.includes("thresholdGrid")) {
	        recomputeCachedCutoffSensitivity(analysis);
	      }
	      if (changedKeys.includes("bootstrapIterations")) {
	        workflowState.bootstrapNeedsRerun = !cachedBootstrapMatchesIterations();
	      }
	      if (changedKeys.some((key) => key !== "bootstrapIterations")) {
	        workflowState.analysis = refreshFitQualityEvidenceWithBootstrap(analysis);
	      }
	      return workflowState.analysis;
	    }

	    async function applyReviewSettings({ render = true } = {}) {
	      syncParametersFromControls({ target: "reviewDraft" });
	      const nextMode = reviewDraftMatchesAdaptiveDefaults() ? "adaptive" : "manual";
	      const changedKeys = commitReviewParameterDraftToParameters({ mode: nextMode });
	      refreshCachedAnalysisForKeys(changedKeys);
	      annotateAnalysisReviewSettings(workflowState.analysis);
	      if (render) {
	        await renderReview();
	      } else {
	        renderReviewSettingsStatus();
	      }
	      document.dispatchEvent(new CustomEvent("msig:endToEndParameterRefresh", {
	        detail: { keys: changedKeys },
	      }));
	      return changedKeys;
	    }

	    document.addEventListener("msig:endToEndReviewDraftChange", () => {
	      renderReviewSettingsStatus();
	    });

    function renderReviewRunning(event) {
      const engine = event.detail?.engine || "the selected fitting method";
      plotGrid.replaceChildren(loadingPlaceholder(`Running ${engine}. Visual checks will refresh when the fit finishes.`));
      tableStack.replaceChildren(placeholder("Review tables will refresh after the run finishes."));
      markWorkflowUpdated(reviewPanel);
    }

    document.addEventListener("msig:endToEndStart", renderReviewRunning);
    document.addEventListener("msig:endToEndRun", renderReview);
    renderEmptyReview();
    reviewPanel.append(plotGrid, tableStack);
    display(reviewPanel);
  </script>

<script type="text/markdown">
## Step 4. Save files needed to rerun or review

A complete result should preserve more than the fitted recipe. Save the input tables, signature recipe estimates, reconstruction and review evidence, uncertainty results, warnings, suggested review steps, report fields, a run record, and files that help compare or rerun the analysis in other tools.
</script>

  <script type="module" pinned id="5">
    const exportPanel = document.createElement("div");
    exportPanel.className = "workflow-panel";
    const exportStack = document.createElement("div");
    exportStack.id = "workflow-exports";
    exportStack.className = "workflow-output-stack";
    exportStack.setAttribute("aria-live", "polite");

    function handoffRows(bundle) {
      return [
        ...Object.entries(bundle?.tools || {}),
        ...Object.entries(bundle?.standaloneTools || {}),
      ].map(([tool, value]) => ({
        "tool or package": tool,
        files: Array.isArray(value.files) ? value.files.length : 0,
        "supporting details": Object.keys(value.manifest || {}).length,
      }));
    }

    function readableReportFieldRows(report) {
      const fieldLabels = {
        schemaVersion: "Report format version",
        title: "Report title",
        summary: "Summary",
        generatedAt: "Created time",
        parameters: "Run settings",
        validation: "Input checks",
        qc: "Quality checks",
        warnings: "Cautions",
        recommendedActions: "Suggested follow-up",
	        fitQualityEvidence: "Review diagnostics",
        thresholdSensitivity: "Cutoff sensitivity",
        bootstrap: "Uncertainty estimates",
        provenance: "Run record",
        citations: "Citations",
        notes: "Notes",
      };
      return reportFieldRows(report).map((row) => ({
        section: fieldLabels[row.field] || row.field,
        contents: row.summary,
      }));
    }

    function renderExports() {
      exportStack.replaceChildren();
      const analysis = workflowState.analysis;
      if (!analysis) {
        const previewBundle = createWorkflowInteroperabilityBundle();
        if (!previewBundle) {
          exportStack.append(placeholder("Load data to prepare external-tool run files, then run the workflow to create result exports."));
          return;
        }
        exportStack.append(note("External-tool run files are ready as soon as spectra and signatures are loaded.", "info"));
        exportStack.append(downloadMany([
          { filename: "end_to_end_interoperability_bundle.json", type: "json", value: previewBundle, label: "Download tool export bundle JSON" },
        ]));
        exportStack.append(collapsibleOutput("Prepared external-tool file formats", [
          table(handoffRows(previewBundle), null, {
            title: "External-tool export formats",
            caption: "Prepared before fitting so local package runs can feed back into the selected fitting method.",
          }),
        ]));
        markWorkflowUpdated(exportPanel);
        return;
      }
      const spectraTsv = mSigSDK.io.exportSigProfilerMatrix(workflowState.spectra, { contexts: workflowState.contexts });
      const signaturesForExport = analysis.fit?.signatures || workflowState.signatures;
      const signaturesTsv = mSigSDK.io.exportCOSMICSignatureMatrix(signaturesForExport, { contexts: workflowState.contexts });
      const exposuresCsv = rowsToCsv(exposureRows(analysis.fit.exposures, { minExposure: 0, topN: 1000 }));
      const reportBundle = {
        parameters: workflowState.parameters,
        validation: analysis.validation,
        qc: analysis.qc,
        fitQualityEvidence: analysis.fitQualityEvidence,
        warnings: analysis.warnings,
        recommendedActions: analysis.recommendedActions,
        bootstrap: workflowState.bootstrap,
        thresholdSensitivity: analysis.thresholdSensitivity,
        exposureEngine: analysis.exposureEngine,
        exposureEngineResult: {
          status: workflowState.exposureEngineResult?.status || null,
          runtime: workflowState.exposureEngineResult?.runtime || analysis.exposureEngine?.runtime || null,
          provenance: workflowState.exposureEngineResult?.provenance || null,
          preparedInput: workflowState.exposureEngineResult?.preparedInput || null,
          candidateExposureTables: workflowState.exposureEngineResult?.candidateExposureTables || null,
          methodBoundary: workflowState.exposureEngineResult?.methodBoundary || null,
        },
        report: analysis.report,
        provenance: workflowState.provenance,
        interoperability: workflowState.interoperability,
        standaloneToolHandoffs: workflowState.interoperability?.standaloneTools || {},
        crossToolReferenceSummary: crossToolSummary,
      };
	      exportStack.append(note("The download links are the main thing here. Supporting file-format and report-section tables are collapsed below.", "info"));
	      exportStack.append(note("Do not share the signature contributions CSV by itself when the run has warnings or needs cautious interpretation. Share the workflow report JSON with it so collaborators can see the reconstruction checks and caveats.", "warning"));
      exportStack.append(downloadMany([
        { filename: "end_to_end_spectra.tsv", text: spectraTsv, label: "Download spectra TSV" },
        { filename: "end_to_end_signatures.tsv", text: signaturesTsv, label: "Download signatures TSV" },
        { filename: "end_to_end_exposures.csv", text: exposuresCsv, label: "Download signature contributions CSV" },
        { filename: "end_to_end_workflow_report.json", type: "json", value: reportBundle, label: "Download workflow report JSON" },
        { filename: "end_to_end_interoperability_bundle.json", type: "json", value: workflowState.interoperability, label: "Download tool export bundle JSON" },
      ]));
      exportStack.append(collapsibleOutput("What each download preserves", [
        table([
          { file: "spectra TSV", reason: "Rerun or share the sample-by-context table" },
          { file: "signature TSV", reason: "Record the active signature catalog" },
          { file: "signature contributions CSV", reason: "Share fitted recipe estimates" },
          { file: "workflow report JSON", reason: "Preserve checks, warnings, report fields, and run record" },
          { file: "tool export bundle JSON", reason: "Prepare comparison or rerun files for external tools" },
        ], null, {
          title: "Downloadable files",
          caption: "Explains which files the workflow can save and why each file matters for review or rerun.",
        }),
      ]));
      exportStack.append(collapsibleOutput("External-tool handoff formats", [
        table(handoffRows(workflowState.interoperability), null, {
          title: "External-tool export formats",
          caption: "Shows which tool/package formats were prepared so the same data can be compared or rerun outside this browser page.",
        }),
      ]));
      exportStack.append(collapsibleOutput("Structured report sections and run record", [
        table(readableReportFieldRows(analysis.report), null, {
          title: "Structured report sections",
          caption: "Shows the main report sections preserved in the workflow JSON.",
        }),
        details("Run record", workflowState.provenance),
      ]));
      markWorkflowUpdated(exportPanel);
    }

    function renderExportsRunning(event) {
      const engine = event.detail?.engine || "the selected fitting method";
      exportStack.replaceChildren(loadingPlaceholder(`Running ${engine}. Downloads will refresh when the workflow finishes.`));
      markWorkflowUpdated(exportPanel);
    }

    document.addEventListener("msig:endToEndStart", renderExportsRunning);
    document.addEventListener("msig:endToEndRun", renderExports);
    document.addEventListener("msig:endToEndParameterRefresh", renderExports);
    document.addEventListener("msig:endToEndInputs", renderExports);
    exportStack.append(placeholder("Load data to prepare external-tool run files, then run the workflow to create result exports."));
    exportPanel.append(exportStack);
    display(exportPanel);
  </script>
