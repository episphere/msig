  <script type="text/markdown">
    # End-to-end workflow

    Each tumor has a pattern of mutation types, and the workflow asks which known signature patterns could be mixed together to explain that observed pattern.

    One way to think about it is a mystery-drink problem. The observed mutation spectrum is the drink you taste. The reference signatures are possible ingredients. The fitting method guesses a recipe, such as "40% apple, 30% cherry, 30% banana." The reconstruction check then asks: if we mix the ingredients using that guessed recipe, does it recreate the original drink? If the reconstruction is close, the guess is more plausible; if it is not close, the result needs review.

    Start by loading a real public cohort through the mSigPortal APIs. The default selection is TCGA WES Lung-AdenoCa SBS96, but the menu lets you choose the public study, cancer type, sequencing strategy, mutation-pattern table, table size, and compatible reference signature catalog. You can also paste or upload your own spectra and signature catalog when adapting the workflow.

    A close reconstruction is useful, but it is not the whole analysis. Some reference signatures look similar to each other, like two ingredients with similar flavor. The workflow also checks mutation counts, leftover pattern after fitting, uncertainty, cutoff sensitivity, and reference-signature similarity. These are review cues: they tell you what deserves inspection before making a claim.
  </script>

    function parseNumber(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function parseThresholdGrid(value) {
      const parsed = String(value || "")
        .split(/[,\s]+/)
        .map(Number)
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
      return parsed.length ? [...new Set(parsed)] : [0, 0.01, 0.03, 0.05, 0.1];
    }

    function parsePackageList(value, fallback = []) {
      const packages = String(value || "")
        .split(/[\n,]+/)
        .map((item) => item.trim())
        .filter(Boolean);
      return packages.length ? packages : fallback;
    }

    function currentFitEngine() {
      return FIT_ENGINE_DEFINITIONS[workflowState.parameters.fitEngine] || FIT_ENGINE_DEFINITIONS.sdk_nnls;
    }

    function stringify(value) {
      return JSON.stringify(value, null, 2);
    }

    function parseCsvLike(text) {
      const lines = String(text || "").trim().split(/\r?\n/).filter(Boolean);
      if (!lines.length) return [];
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(delimiter).map((header) => header.trim());
      return lines.slice(1).map((line) => {
        const values = line.split(delimiter);
        return Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]));
      });
    }

    function parseMetadata(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).map(([sample, fields]) => ({ sample, ...(fields || {}) }));
        }
      } catch (_error) {
        return parseCsvLike(trimmed);
      }
      return [];
    }

    function parseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind} input table is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Fall through to TSV import.
      }
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed)
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed);
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

    function normalizeMetadata(metadata) {
      return (Array.isArray(metadata) ? metadata : [])
        .map((row) => ({
          ...row,
          sample: row.sample || row.Sample || row.sample_id || row.sampleId || row.id,
        }))
        .filter((row) => row.sample);
    }

    function inferContexts(spectra, signatures) {
      const firstSpectrum = Object.values(spectra || {}).find((record) => record && typeof record === "object");
      if (firstSpectrum && Object.keys(firstSpectrum).length) return Object.keys(firstSpectrum);
      const firstSignature = Object.values(signatures || {}).find((record) => record && typeof record === "object");
      if (firstSignature && Object.keys(firstSignature).length) return Object.keys(firstSignature);
      return sbs96Contexts();
    }

    function setDataset({ spectra, signatures, metadata, source, contexts = null, publicSelection = null }) {
      workflowState.spectra = JSON.parse(JSON.stringify(spectra));
      workflowState.signatures = JSON.parse(JSON.stringify(signatures));
      workflowState.metadata = normalizeMetadata(metadata);
      workflowState.contexts = contexts?.length ? [...contexts] : inferContexts(workflowState.spectra, workflowState.signatures);
      workflowState.selectedSample = Object.keys(workflowState.spectra)[0] || null;
      workflowState.visualSamples = {
        residual: workflowState.selectedSample,
        bootstrap: workflowState.selectedSample,
      };
      workflowState.source = source;
      workflowState.publicSelection = publicSelection;
      workflowState.analysis = null;
      workflowState.bootstrap = null;
      workflowState.bootstrapBySample = {};
      workflowState.interoperability = null;
      workflowState.provenance = null;
      workflowState.exposureEngineResult = null;
      validateCurrentInputs();
      document.dispatchEvent(new CustomEvent("msig:endToEndInputs"));
    }

    function validateCurrentInputs() {
      if (!workflowState.spectra || !workflowState.signatures) return null;
      workflowState.validation = {
        spectra: mSigSDK.validation.validateSpectra(workflowState.spectra, {
          expectedContexts: workflowState.contexts,
          minTotalMutations: workflowState.parameters.lowBurdenThreshold,
        }),
        signatures: mSigSDK.validation.validateSignatureMatrix(workflowState.signatures, {
          expectedContexts: workflowState.contexts,
        }),
        burden: mSigSDK.qc.summarizeMutationBurden(workflowState.spectra, {
          expectedContexts: workflowState.contexts,
          lowBurdenThreshold: workflowState.parameters.lowBurdenThreshold,
          moderateBurdenThreshold: workflowState.parameters.moderateBurdenThreshold,
        }),
        contextCoverage: mSigSDK.qc.summarizeMissingContexts(workflowState.spectra, {
          expectedContexts: workflowState.contexts,
        }),
      };
      return workflowState.validation;
    }

    function workflowWarningRows(warnings = []) {
      const warningLabels = {
        CATALOG_INCOMPLETE_SUSPECTED: "catalog review cue",
        FIT_UNSTABLE: "fit stability review cue",
        FLAT_SIGNATURE_RISK: "flat-profile review cue",
        HIGH_RESIDUAL_STRUCTURE: "structured-residual review cue",
        INCOMPLETE_CONTEXTS: "context-basis review cue",
        INSUFFICIENT_SIGNAL: "low-signal review cue",
        LOW_BURDEN: "low mutation-count review cue",
        PANEL_SIGNATURE_NOT_ASSESSABLE: "restricted-assay review cue",
        SIGNATURE_AMBIGUITY: "similar-reference-signature review cue",
        THRESHOLD_DEPENDENT: "cutoff-sensitivity review cue",
      };
      return (Array.isArray(warnings) ? warnings : []).map((warning) => ({
        cue: warningLabels[warning.code || warning.warningCode || warning.status] || "review cue",
        "SDK code": warning.code || warning.warningCode || warning.status || "warning",
        message: warning.message || warning.detail || String(warning),
        "recommended action": warning.resolution || warning.recommendedAction || "",
      }));
    }

    function formatEvidenceNumber(value, digits = 3) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(digits) : "";
    }

    function signatureAmbiguityEvidenceRows(analysis, limit = 20) {
      const samples = analysis?.fitQualityEvidence?.samples || [];
      const activeSignatures = new Set(samples.flatMap((sample) => (
        sample.componentEvidence?.ambiguity?.activeSignatures || sample.metrics?.activeSignatures || []
      )));
      const signatures = analysis?.ambiguity?.signatures || [];
      return signatures
        .filter((signature) => activeSignatures.has(signature.signatureName) || signature.reviewRecommended)
        .sort((a, b) => {
          const reviewDelta = Number(Boolean(b.reviewRecommended)) - Number(Boolean(a.reviewRecommended));
          if (reviewDelta) return reviewDelta;
          return Number(b.confusabilityScore || 0) - Number(a.confusabilityScore || 0);
        })
        .slice(0, limit)
        .map((signature) => ({
          signature: signature.signatureName,
          "active in loaded samples": activeSignatures.has(signature.signatureName) ? "Yes" : "No",
          "similarity cues": (signature.evidenceTags || []).map((tag) => ({
            catalog_neighbor_confusable: "nearest-neighbor similarity cue",
            neighbor_crowded_catalog_region: "crowded-catalog-region cue",
            broad_or_flat_signature: "broad-profile cue",
            low_specificity_profile: "low-specificity-profile cue",
            near_review_boundary: "near-review-boundary cue",
          }[tag] || tag)).join(", ") || "no similarity cue",
          "similarity risk score": formatEvidenceNumber(signature.confusabilityScore),
          "catalog percentile": formatEvidenceNumber(signature.confusabilityPercentile),
          "nearest catalog neighbor": signature.nearestNeighbor || "",
          "nearest-neighbor similarity": formatEvidenceNumber(signature.nearestCosineSimilarity),
          "profile broadness": formatEvidenceNumber(signature.flatnessScore ?? signature.entropy),
        }));
    }

          {

            tooltipTerms: {

              "crowded-catalog-region cue": "Assigned because several nearby reference signatures have similar profiles under the configured rule. This is a review cue, not a distinct biological conclusion.",
              "broad-profile cue": "Assigned because this reference signature is broad or flat relative to the selected catalog.",
              "low-specificity-profile cue": "Assigned because this reference signature meets the low-specificity criterion under the configured summary statistic.",
              "near-review-boundary cue": "Assigned because the continuous score is close to the configured review boundary. Do not treat the boundary as a scientific cliff.",

          {
            key: "similarity risk score",
            label: "Score",

            key: "catalog percentile",
            label: "Percentile",

          },

            label: "Neighbor similarity",

    function workflowWarningTable(warnings, maxRows = 12, options = {}) {
      return tooltipTable(
        workflowWarningRows(warnings),
        [
          { key: "cue", label: "Review cue" },

    function actionRows(actions = []) {
      return (Array.isArray(actions) ? actions : []).map((action, index) => ({
        number: index + 1,

    function workflowOutputGuide(title, body, rows = []) {
      const section = document.createElement("section");
      section.className = "workflow-explanation";
      const heading = document.createElement("h3");
      heading.textContent = title;
      const paragraph = document.createElement("p");
      paragraph.textContent = body;
      section.append(heading, paragraph);
      if (rows instanceof Node) {
        section.append(rows);
      } else if (rows.length) {
        section.append(table(rows));
      }
      return section;
    }

	    function fitQualityMethodGuide() {
	      return workflowOutputGuide(
	        "Hover to read definitions",
	        "Hover or keyboard-focus table labels, review cues, similarity scores, and status words to see short definitions in place. The tables keep the page readable, while the tooltips explain the exact SDK meaning when you need it."
	      );
	    }

    function bootstrapResultForSample(result, sample) {
      return {
        ...result,
        sample,
        sampleName: sample,
        inputSummary: {
          ...(result.inputSummary || {}),
          sample,
        },
      };
    }

    async function getBootstrapForSample(sample, statusElement = null) {
      if (!sample) {
        throw new Error("Choose a sample before rendering uncertainty intervals.");
      }
      if (workflowState.bootstrapBySample?.[sample]) {
        return workflowState.bootstrapBySample[sample];
      }
      if (!workflowState.spectra?.[sample]) {
        throw new Error(`Sample ${sample} is not present in the active spectra table.`);
      }
      if (statusElement) {
        statusElement.textContent = `Running ${workflowState.parameters.bootstrapIterations} uncertainty refits for ${sample}...`;
      }
      const bootstrap = await mSigSDK.qc.bootstrapSignatureFit(
        workflowState.signatures,
        workflowState.spectra[sample],
        {
          contexts: workflowState.contexts,
          iterations: workflowState.parameters.bootstrapIterations,
          seed: workflowState.parameters.bootstrapSeed,
          exposureThreshold: workflowState.parameters.exposureThreshold,
        }
      );
      const annotated = bootstrapResultForSample(bootstrap, sample);
      workflowState.bootstrapBySample = {
        ...(workflowState.bootstrapBySample || {}),
        [sample]: annotated,
      };
      workflowState.bootstrap = annotated;
      return annotated;
    }

    function uniqueValues(values = []) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))];
    }

    function dedupeWarnings(warnings = []) {
      const seen = new Set();
      return (Array.isArray(warnings) ? warnings : []).filter((warning) => {
        const key = `${warning?.code || warning?.warningCode || warning?.status || "warning"}|${warning?.message || ""}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function metadataBySample() {
      return Object.fromEntries((workflowState.metadata || []).map((row) => [row.sample, row]));
    }

    function completeExposureMatrix(exposures, { relative = true } = {}) {
      const sampleNames = Object.keys(workflowState.spectra || {});
      const signatureNames = Object.keys(workflowState.signatures || {});
      const source = exposures || {};
      const completed = Object.fromEntries(sampleNames.map((sample) => {
        const row = source[sample] || {};
        return [
          sample,
          Object.fromEntries(signatureNames.map((signature) => [
            signature,
            parseNumber(row[signature], 0),
          ])),
        ];
      }));
      return relative
        ? mSigSDK.qc.normalizeExposures(completed, { relative: true })
        : completed;
    }

    function pyodideRuntimeRows() {
      const runtime = mSigSDK.runners?.pyodide?.detect
        ? mSigSDK.runners.pyodide.detect()
        : { available: false, missing: ["mSigSDK.runners.pyodide.detect"] };
      return [
        { item: "Can run work in the background", value: runtime.missing?.includes("Worker") ? "missing" : "available" },
        { item: "Can create temporary package files", value: runtime.missing?.includes("Blob") ? "missing" : "available" },
        { item: "Can load temporary package files", value: runtime.missing?.includes("URL.createObjectURL") ? "missing" : "available" },
        { item: "Pyodide source", value: runtime.defaultIndexURL || runtime.pyodideIndexURL || "configured by runner" },
      ];
    }

    function engineRows(analysis = workflowState.analysis) {
      const engine = analysis?.exposureEngine || currentFitEngine();
      const result = analysis?.exposureEngineResult || workflowState.exposureEngineResult;
	      return [
	        { field: "Selected fitting method", value: engine.label || engine.shortLabel },
	        { field: "Where it runs", value: engine.runtime },
	        { field: "Reusable SDK command", value: engine.command },
	        { field: "Who guessed the signature recipe", value: engine.exposureSource },
	        { field: "Run status", value: result?.status || analysis?.status || "completed" },
	        { field: "Contribution table", value: result?.exposures ? "available" : engine.command === "workflows.runCohortFit" ? "created by mSigSDK workflow" : "not available" },
        { field: "Cutoff sensitivity", value: engine.supportsThresholdSensitivity ? "available here" : "not available for this selected package" },
        { field: "Uncertainty intervals", value: engine.supportsBootstrap ? "shown for selected sample" : "use the package's own uncertainty workflow or switch to mSigSDK quick fit" },
      ];
    }

    async function runSelectedExposureEngine() {
      const engineKey = workflowState.parameters.fitEngine;
      const engine = currentFitEngine();
      if (engineKey === "sdk_nnls") {
        const analysis = await mSigSDK.workflows.runCohortFit(
          {
            spectra: workflowState.spectra,
            signatures: workflowState.signatures,
            metadata: workflowState.metadata,
          },
          {
            contexts: workflowState.contexts,
            groupKey: workflowState.parameters.groupKey,
            exposureThreshold: workflowState.parameters.exposureThreshold,
            lowBurdenThreshold: workflowState.parameters.lowBurdenThreshold,
            moderateBurdenThreshold: workflowState.parameters.moderateBurdenThreshold,
            thresholds: workflowState.parameters.thresholdGrid,
            runThresholdSensitivity: true,
            runBootstrap: false,
            reportFormat: "object",
          }
        );
        analysis.exposureEngine = engine;
        analysis.exposureEngineResult = {
          status: "completed",
          runtime: engine.runtime,
          exposures: analysis.fit?.exposures,
          provenance: {
            tool: "mSigSDK",
            runtime: engine.runtime,
            parameters: analysis.parameters?.fitOptions || {},
          },
        };
        return analysis;
      }

      const pyodideEngine = engineKey.includes("pyodide");
      if (pyodideEngine) {
        const runtime = mSigSDK.runners?.pyodide?.detect?.();
        if (runtime && runtime.available === false) {
          throw new Error(`Browser Python workers are not available in this browser. Missing: ${(runtime.missing || []).join(", ")}`);
        }
      }

      if (engineKey === "sigprofilerassignment_pyodide") {
        return await mSigSDK.adapters.sigProfilerAssignment.run(
          {
            spectra: workflowState.spectra,
            signatures: workflowState.signatures,
          },
          {
            contexts: workflowState.contexts,
            micropipPackages: parsePackageList(
              workflowState.parameters.sigProfilerAssignmentPackage,
              ["SigProfilerAssignment==1.1.3"]
            ),
            genomeBuild: workflowState.parameters.sigProfilerGenomeBuild,
            cosmicVersion: workflowState.parameters.sigProfilerCosmicVersion,
            exome: workflowState.parameters.sigProfilerExome,
            timeoutMs: workflowState.parameters.pyodideTimeoutMs,
          }
        );
      }

      if (engineKey === "musical_pyodide") {
        return await mSigSDK.adapters.musical.runRefit(
          {
            spectra: workflowState.spectra,
            signatures: workflowState.signatures,
          },
          {
            contexts: workflowState.contexts,
            runtime: "pyodide",
            method: workflowState.parameters.musicalMethod,
            threshold: workflowState.parameters.musicalThreshold,
            micropipPackages: parsePackageList(workflowState.parameters.musicalPackage, []),
            timeoutMs: workflowState.parameters.pyodideTimeoutMs,
          }
        );
      }

      if (engineKey === "musical_sparse_nnls") {
        return await mSigSDK.adapters.musical.runSparseNnlsRefit(
          {
            spectra: workflowState.spectra,
            signatures: workflowState.signatures,
          },
          {
            contexts: workflowState.contexts,
            threshold: workflowState.parameters.musicalThreshold,
          }
        );
      }

      throw new Error(`Unknown fitting method: ${engineKey}`);
    }

    function buildAnalysisFromExposureEngine(engineResult) {
      const engine = currentFitEngine();
      if (!engineResult?.exposures) {
	        throw new Error(`${engine.label} completed without a parsed sample-by-signature recipe table. Inspect the collected output files or use the tool export bundle to review the package output manually.`);
      }
      const exposures = completeExposureMatrix(engineResult.exposures);
      const positiveExposureCount = Object.values(exposures)
        .flatMap((row) => Object.values(row || {}))
        .filter((value) => Number(value) > 0).length;
      if (positiveExposureCount === 0) {
	        throw new Error(`${engine.label} returned signature contribution values, but none matched the active sample/signature names after import. Check sample IDs, signature names, and table orientation before reviewing fit evidence.`);
      }
      const advisor = mSigSDK.advisor.recommendAnalysisStrategy(workflowState.spectra, {
        expectedContexts: workflowState.contexts,
        lowBurdenThreshold: workflowState.parameters.lowBurdenThreshold,
        moderateBurdenThreshold: workflowState.parameters.moderateBurdenThreshold,
      });
      const residualOptions = {
        contexts: workflowState.contexts,
        normalizeMode: "relative",

    function publicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, PUBLIC_API_BASE);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") url.searchParams.set(key, value);
      }
      return url;
    }

    async function fetchPublicApiRows(endpoint, params = {}, limit = 100000) {
      const rows = [];
      let offset = 0;
      for (let page = 0; page < 10; page += 1) {
        const url = publicApiUrl(endpoint, { ...params, limit, offset });
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${endpoint} API request failed with ${response.status}`);
        const pageRows = await response.json();
        if (!Array.isArray(pageRows)) throw new Error(`${endpoint} API response was not an array.`);
        rows.push(...pageRows);
        if (pageRows.length < limit) break;
        offset += limit;
      }
      return rows;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
        .map(String)
        .sort((a, b) => a.localeCompare(b));
    }

    function setSelectOptions(select, items, preferredValue = "") {
      const normalized = items.map((item) =>
        typeof item === "string" ? { label: item, value: item } : item
      );
      select.replaceChildren(...normalized.map((item) => optionNode(item.label, item.value)));
      const values = normalized.map((item) => String(item.value));
      if (preferredValue && values.includes(String(preferredValue))) {
        select.value = String(preferredValue);
      } else if (values.length) {
        select.value = values[0];
      }
      return select.value;
    }

    function selectedPublicRows() {
      const matrix = Number(matrixSelect.value);
      return publicOptionsState.spectra.filter((row) =>
        row.study === studySelect.value &&
        row.strategy === strategySelect.value &&
        row.profile === profileSelect.value &&
        Number(row.matrix) === matrix &&
        (cancerSelect.value === PANCANCER_VALUE || row.cancer === cancerSelect.value)
      );
    }

    function publicSampleOptions() {
      const bySample = new Map();
      for (const row of selectedPublicRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

  <script type="module" pinned id="3">

    const validateButton = button("Check current input");

    setRunFeedback(

          const option = document.createElement("option");
          option.value = sample;
          option.textContent = sample;
          return option;
        }));
        selectedSample = samples.includes(selectedSample) ? selectedSample : samples[0];
        if (selectedSample) sampleSelect.value = selectedSample;
        controls.append(field(
          options.sampleLabel || "Sample shown",
          sampleSelect,
          options.sampleHelp || "Change this to redraw the one-sample visual."
        ));
        section.append(controls, status);
        sampleSelect.addEventListener("change", async () => {
          selectedSample = sampleSelect.value;
          if (options.onSampleChange) options.onSampleChange(selectedSample);
          sampleSelect.disabled = true;
          try {
            await renderPlot();
          } finally {
            sampleSelect.disabled = false;
          }
        });
      }
      section.append(host);
      plotGrid.append(section);
      async function renderPlot() {
        const renderingStatus = selectedSample
          ? `Showing sample ${selectedSample}.`
          : "Choose a sample to render this plot.";
        host.replaceChildren(placeholder(`Rendering ${label}${selectedSample ? ` for ${selectedSample}` : ""}...`));
        if (options.sampleControl) {
          status.textContent = renderingStatus;
        }
        try {
          await renderer(host.id, selectedSample, status);
          if (options.sampleControl && selectedSample && status.textContent === renderingStatus) {
            status.textContent = renderingStatus;
          }
        } catch (error) {
          const fallbackNode = typeof fallback === "function" ? fallback(selectedSample) : fallback;
          host.replaceChildren(fallbackNode || placeholder(`Could not render ${label}: ${error.message}`));
          if (options.sampleControl) status.textContent = `Could not render ${selectedSample || "selected sample"}: ${error.message}`;
        }
      }
      await renderPlot();
    }

    async function renderReview() {
      plotGrid.replaceChildren();
      tableStack.replaceChildren();
      const analysis = workflowState.analysis;
      if (!analysis) {
        plotGrid.append(placeholder("Run the workflow to see plots."));
        return;
      }
	      await plotSection(
	        "Mutation count",
        (id) => mSigSDK.qcPlots.plotMutationBurdenSummary(id, analysis.qc.mutationBurden),
        table(burdenSampleRows(analysis.qc.mutationBurden), null, {
          title: "Mutation-count values behind the plot",
          caption: "Lists the same sample-level mutation-count evidence used in the mutation-count figure.",
        }),
	        "Shows how many mutations were available for each sample. A very small sample is like tasting only a drop of the drink: the recipe guess can still be useful, but small random differences matter more."
	      );
	      await plotSection(
	        "Reconstruction quality",
	        (id) => mSigSDK.qcPlots.plotReconstructionError(id, analysis.qc.reconstructionError),
	        table(reconstructionRows(analysis.qc.reconstructionError), null, {
	          title: "Reconstruction values behind the plot",
	          caption: "Lists cosine similarity and RMSE for each sample. These values ask whether the guessed signature recipe can recreate the original mutation pattern.",
	        }),
	        "After the fitting method estimates a signature recipe, the selected reference signatures are mixed back together and compared with the original sample. Cosine similarity is a shape match score, where values closer to 1 mean the reconstructed pattern points in the same direction as the observed pattern. RMSE is the average leftover mismatch across mutation channels after profiles are normalized, where values closer to 0 are better. For SBS96 relative profiles, an RMSE such as 0.003 is usually small, but it is not a universal pass/fail cutoff. Read reconstruction quality with residual shape, mutation count, catalog choice, and review cues."
	      );
	      await plotSection(
	        "Review summary",
	        (id) => mSigSDK.qcPlots.plotFitQualityEvidenceDashboard(id, analysis.fitQualityEvidence),
	        fitQualityEvidenceTable(analysis.fitQualityEvidence, {
	          maxRows: 8,
	          title: "Review-summary values behind the plot",
	          caption: "Lists the reporting mode and review cues shown in the review-summary figure.",
	        }),
	        "Summarizes how cautiously each sample should be discussed. This is the main place to decide whether the fitted recipe can be reported plainly or only with extra caveats."
	      );
	      await plotSection(
	        "Residual spectrum",
        (id, sample) => mSigSDK.qcPlots.plotFitResiduals(id, analysis.residuals, sample),
        details("Residual object", analysis.residuals),
	        "Shows what is left over after the reconstructed pattern is subtracted from the observed sample. If the leftovers form a clear pattern, the chosen reference ingredients, input data, or fitted recipe may not fully explain the sample.",
        {
          sampleControl: true,
          sample: workflowState.visualSamples?.residual || workflowState.selectedSample,
          sampleLabel: "Residual sample",
          sampleHelp: "Redraws the observed-versus-reconstructed residual plot for one sample.",
          onSampleChange: (sample) => {
            workflowState.visualSamples.residual = sample;
          },
        }
      );
      await plotSection(
        "Uncertainty intervals",
        async (id, sample, status) => {
          if (!analysis.exposureEngine?.supportsBootstrap) {
            throw new Error("Uncertainty intervals are not run for the selected external fitting method.");
          }
          const bootstrap = await getBootstrapForSample(sample, status);
          await mSigSDK.qcPlots.plotBootstrapConfidenceIntervals(id, bootstrap);
          status.textContent = `Showing uncertainty intervals for sample ${sample}.`;
        },
	        (sample) => analysis.exposureEngine?.supportsBootstrap
	          ? table(bootstrapRows(workflowState.bootstrapBySample?.[sample] || workflowState.bootstrap), null, {
	            title: "Uncertainty values for the selected sample",
	            caption: "Lists repeat-fit intervals and selection-frequency values for the sample selected above.",
	          })
          : note("Uncertainty intervals are not shown for this selected fitting method. Use that package's own uncertainty workflow, or switch the fitting method to mSigSDK quick fit for browser-level uncertainty intervals.", "warning"),
	        "Shows whether the selected sample's fitted recipe stays similar when the sample is resampled and refit. Wide intervals mean the exact ingredient amounts are less stable. External packages should use their package-specific uncertainty workflows.",
        {
          sampleControl: true,
          sample: workflowState.visualSamples?.bootstrap || workflowState.selectedSample,
          sampleLabel: "Uncertainty sample",
          sampleHelp: "Changing this runs or reuses uncertainty intervals for one sample.",
          onSampleChange: (sample) => {
            workflowState.visualSamples.bootstrap = sample;
          },
        }
      );
      await plotSection(
        "Cutoff sensitivity",
        (id) => {
          if (!analysis.thresholdSensitivity) {
            throw new Error("Cutoff sensitivity is not run for the selected external fitting method.");
          }
          return mSigSDK.qcPlots.plotThresholdSensitivity(id, analysis.thresholdSensitivity);
        },
        analysis.thresholdSensitivity
	          ? table(thresholdRows(analysis.thresholdSensitivity), null, {
	            title: "Cutoff sensitivity values",
	            caption: "Lists how reconstruction, active signatures, and recipe estimates change across the cutoff values tested in this workflow.",
	          })
          : note("Cutoff sensitivity is not recomputed for this selected fitting method because different packages may apply cutoffs differently. Review that package's sensitivity settings or switch to mSigSDK quick fit for this check.", "warning"),
	        "Shows whether the fitted recipe changes when very small ingredients are kept or ignored. Stable results should change gradually rather than flip abruptly."
	      );

	      tableStack.append(note("Signature recipe estimates depend on the supplied catalog, spectra, cutoffs, and review evidence. Treat them as a fitted recipe, not as direct observation of the underlying biology."));
	      tableStack.append(workflowOutputGuide(
	        "Fitting method used",
	        "The contribution table below comes from the selected fitting method. mSigSDK then adds input checks, reconstruction checks, residual review, tooltip reporting tables, run records, and tool export files around that table.",
	        engineRows(analysis)
	      ));
	      tableStack.append(workflowOutputGuide(
	        "How to read the interpretation tables",
	        "Read these tables in order. Start with the fitted recipe only after the review evidence describes how much caution to apply to each sample.",
	        [
	          { table: "Signature recipe estimates", meaning: "The guessed recipe for each sample: which reference signatures were mixed and in what amounts. These are model estimates, not direct observations." },
	          { table: "Review evidence", meaning: "The reporting mode and review cues that qualify those recipe estimates." },
	          { table: "Warnings", meaning: "Rule-triggered review cautions emitted by the workflow." },
	          { table: "Suggested review steps", meaning: "Suggested checks before using the output in a report." },
	        ]
	      ));
	      tableStack.append(note("Do not copy signature contribution rows into a result section without the reporting mode, warning codes, reconstruction context, and cutoff/uncertainty context.", "warning"));
      tableStack.append(table(exposureRows(analysis.fit.exposures, { minExposure: 0, topN: 30 }), null, {
	        title: "Signature recipe estimates",
	        caption: "Shows the fitted recipe produced by the selected fitting method. These are model estimates and should be read with the review and warning tables below.",
	      }));
      tableStack.append(fitQualityMethodGuide());
      tableStack.append(fitQualityEvidenceTable(analysis.fitQualityEvidence, {
	        includeActiveSignatures: true,
	        maxRows: 12,
	        title: "Review evidence for reporting",
	        caption: "Shows how cautiously each sample should be interpreted and which review cues should accompany the fitted recipe.",
	      }));
      tableStack.append(workflowOutputGuide(
        "Reference-signature similarity evidence",
        "This is the reference-catalog evidence behind similarity review cues. It is not recomputed from the sample cosine; it comes from continuous scoring of similar neighboring signatures, crowded catalog regions, broad profiles, and low-specificity signatures.",
        catalogAmbiguityTable(analysis)
      ));
      tableStack.append(workflowWarningTable(analysis.warnings));
      tableStack.append(note("Warnings are review safeguards. They explain which configured rule was triggered and why the result may need caveats, residual review, a broader catalog, more mutations, or a different analysis strategy.", "warning"));
      tableStack.append(table(actionRows(analysis.recommendedActions), null, {
        title: "Suggested review steps",
        caption: "Lists the follow-up checks generated from the workflow review evidence. Treat these as a practical checklist before reporting.",
      }));
      tableStack.append(note("Suggested review steps are generated from the review evidence. Treat them as the checklist for a publication or project report.", "info"));
      tableStack.append(details("Full workflow result", analysis));
      markWorkflowUpdated(reviewPanel);
    }

    document.addEventListener("msig:endToEndRun", renderReview);
    plotGrid.append(placeholder("Run the workflow to see plots."));
    reviewPanel.append(plotGrid, tableStack);
    display(reviewPanel);
  </script>

  <script type="text/markdown">
    ## Step 4. Save files needed to rerun or review

	    A complete result should preserve more than the fitted recipe. Save the input tables, signature recipe estimates, reconstruction and review evidence, uncertainty results, warnings, suggested review steps, report fields, a run record, and files that help compare or rerun the analysis in other tools.
  </script>

  <script type="module" pinned id="5">
    const exportPanel = document.createElement("div");
    exportPanel.className = "workflow-panel";
    const exportStack = document.createElement("div");
    exportStack.id = "workflow-exports";
    exportStack.className = "workflow-output-stack";
    exportStack.setAttribute("aria-live", "polite");

    function handoffRows(bundle) {
      return Object.entries(bundle?.tools || {}).map(([tool, value]) => ({
        "tool or package": tool,
        files: Array.isArray(value.files) ? value.files.length : 0,
        "supporting details": Object.keys(value.manifest || {}).length,
      }));
    }

    function readableReportFieldRows(report) {
      const fieldLabels = {
        schemaVersion: "Report format version",
        title: "Report title",
        summary: "Summary",
        generatedAt: "Created time",
        parameters: "Run settings",
        validation: "Input checks",
        qc: "Quality checks",
        warnings: "Cautions",
        recommendedActions: "Suggested follow-up",
	        fitQualityEvidence: "Review evidence",
        thresholdSensitivity: "Cutoff sensitivity",
        bootstrap: "Uncertainty estimates",
        provenance: "Run record",
        citations: "Citations",
        notes: "Notes",
      };
      return reportFieldRows(report).map((row) => ({
        section: fieldLabels[row.field] || row.field,
        contents: row.summary,
      }));
    }

    function renderExports() {
      exportStack.replaceChildren();
      const analysis = workflowState.analysis;
      if (!analysis) {
        exportStack.append(placeholder("Run the workflow to create exports."));
        return;
      }
      const spectraTsv = mSigSDK.io.exportSigProfilerMatrix(workflowState.spectra, { contexts: workflowState.contexts });
      const signaturesTsv = mSigSDK.io.exportCOSMICSignatureMatrix(workflowState.signatures, { contexts: workflowState.contexts });
      const exposuresCsv = rowsToCsv(exposureRows(analysis.fit.exposures, { minExposure: 0, topN: 1000 }));
      const reportBundle = {
        parameters: workflowState.parameters,
        validation: analysis.validation,
        qc: analysis.qc,
        fitQualityEvidence: analysis.fitQualityEvidence,
        warnings: analysis.warnings,
        recommendedActions: analysis.recommendedActions,
        bootstrap: workflowState.bootstrap,
        thresholdSensitivity: analysis.thresholdSensitivity,
        exposureEngine: analysis.exposureEngine,
        exposureEngineResult: {
          status: workflowState.exposureEngineResult?.status || null,
          runtime: workflowState.exposureEngineResult?.runtime || analysis.exposureEngine?.runtime || null,
          provenance: workflowState.exposureEngineResult?.provenance || null,
          preparedInput: workflowState.exposureEngineResult?.preparedInput || null,
          candidateExposureTables: workflowState.exposureEngineResult?.candidateExposureTables || null,
          methodBoundary: workflowState.exposureEngineResult?.methodBoundary || null,
        },
        report: analysis.report,
        provenance: workflowState.provenance,
        interoperability: workflowState.interoperability,
        crossToolReferenceSummary: crossToolSummary,
      };
	      exportStack.append(workflowOutputGuide(
	        "What the export bundle preserves",
	        "These downloads are the review trail for the run. They keep the inputs, fitted recipe, reconstruction and review evidence, warnings, settings, and run record together so another person can reproduce and review the analysis.",
	        [
	          { file: "spectra TSV", meaning: "The active sample-by-context mutation-count table." },
	          { file: "signature TSV", meaning: "The reference catalog used for fitting." },
	          { file: "signature contributions CSV", meaning: "The fitted signature recipe. Read only with the review evidence." },
	          { file: "workflow report JSON", meaning: "The full structured report, including input checks, warnings, suggested review steps, uncertainty, cutoff sensitivity, and run record." },
	          { file: "tool export bundle JSON", meaning: "Information and files for other tools such as SigProfiler-style workflows." },
	        ]
      ));
	      exportStack.append(table([
	        { file: "spectra TSV", reason: "Rerun or share the sample-by-context table" },
	        { file: "signature TSV", reason: "Record the reference catalog" },
	        { file: "signature contributions CSV", reason: "Share fitted recipe estimates" },
	        { file: "workflow report JSON", reason: "Preserve checks, warnings, report fields, and run record" },
      ], null, {
        title: "Downloadable files",
        caption: "Explains which files the workflow can save and why each file matters for review or rerun.",
      }));
	      exportStack.append(note("Do not share the signature contributions CSV by itself when the run has warnings or needs cautious interpretation. Share the workflow report JSON with it so collaborators can see the reconstruction checks and caveats.", "warning"));
      exportStack.append(workflowOutputGuide(
        "Tool export table",
        "This table states which external-tool file formats were prepared. It does not mean those external tools were run here; it means the current tables were organized so the analysis can be compared or rerun elsewhere.",
        [
          { column: "tool or package", meaning: "External package or file format prepared." },
          { column: "files", meaning: "Number of generated files for that target." },
          { column: "supporting details", meaning: "How much supporting information is recorded with the export." },
        ]
      ));
      exportStack.append(table(handoffRows(workflowState.interoperability), null, {
        title: "External-tool export formats",
        caption: "Shows which tool/package formats were prepared so the same data can be compared or rerun outside this browser page.",
      }));
      exportStack.append(workflowOutputGuide(
        "Report section table",
        "These are the major sections in the structured report. They show what evidence is preserved before download.",
        [
          { section: "Run settings", meaning: "Cutoffs and workflow settings used for this run." },
	          { section: "Input checks and quality checks", meaning: "Input checks, mutation-count review, reconstruction, residual, and review evidence." },
          { section: "Cautions and suggested follow-up", meaning: "Interpretive cautions and follow-up steps." },
          { section: "Run record", meaning: "SDK version, data source, and run details." },
        ]
      ));
      exportStack.append(table(readableReportFieldRows(analysis.report), null, {
        title: "Structured report sections",
        caption: "Shows the main report sections preserved in the workflow JSON so another collaborator can inspect the run context, checks, warnings, and results.",
      }));
      exportStack.append(downloadMany([
        { filename: "end_to_end_spectra.tsv", text: spectraTsv, label: "Download spectra TSV" },
        { filename: "end_to_end_signatures.tsv", text: signaturesTsv, label: "Download signatures TSV" },
        { filename: "end_to_end_exposures.csv", text: exposuresCsv, label: "Download signature contributions CSV" },
        { filename: "end_to_end_workflow_report.json", type: "json", value: reportBundle, label: "Download workflow report JSON" },
        { filename: "end_to_end_interoperability_bundle.json", type: "json", value: workflowState.interoperability, label: "Download tool export bundle JSON" },
      ]));
      exportStack.append(details("Run record", workflowState.provenance));
      markWorkflowUpdated(exportPanel);
    }

    document.addEventListener("msig:endToEndRun", renderExports);
    exportStack.append(placeholder("Run the workflow to create exports."));
    exportPanel.append(exportStack);
    display(exportPanel);
  </script>
</notebook>
