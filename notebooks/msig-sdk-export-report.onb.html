<!doctype html>
<notebook theme="air">
  <title>mSigSDK report packet builder</title>

  <script type="text/markdown">
    # Report packet builder

    A report packet is the reviewable archive that sits beside a fitted mutational signature analysis. It keeps the selected samples, fitted exposures, report fields, provenance, and rerun files together so another researcher can inspect the result without reopening the original browser session.

    Build the packet from a compact public SBS96 analysis, choose the report sections and files to preserve, audit the archive, then download only the selected files.
  </script>

  <script type="module" pinned id="report-packet-builder">
    const packetSdkUrl = new URL("../main.js?v=2026-05-20-report-packet-builder", location.href).href;
    const { mSigSDK } = await import(packetSdkUrl);
    const { loadPublicSbs96Dataset } = await import("./msig-notebook-fixtures.js");

    const {
      exposureRows,
      formatNumber,
      reportFieldRows,
    } = mSigSDK.presentation;

    const PACKET_REQUIRED_FIELDS = [
      "schemaVersion",
      "title",
      "summary",
      "generatedAt",
      "parameters",
      "validation",
      "qc",
      "exposures",
      "provenance",
      "citations",
      "notes",
    ];

    const REPORT_SECTION_OPTIONS = [
      { key: "parameters", label: "Run settings", checked: true },
      { key: "validation", label: "Input checks", checked: true },
      { key: "qc", label: "Quality checks", checked: true },
      { key: "exposures", label: "Fitted exposures", checked: true },
      { key: "provenance", label: "Run record", checked: true },
      { key: "notes", label: "Citations and notes", checked: true },
    ];

    const EXPORT_OPTIONS = [
      { key: "reportJson", filename: "analysis_report.json", label: "Report JSON", checked: true },
      { key: "reportHtml", filename: "analysis_report.html", label: "Report HTML", checked: true },
      { key: "manifestCsv", filename: "packet_manifest.csv", label: "Packet manifest CSV", checked: true },
      { key: "spectraTsv", filename: "spectra.tsv", label: "Spectra TSV", checked: true },
      { key: "exposuresCsv", filename: "exposures.csv", label: "Exposures CSV", checked: true },
      { key: "runRecordJson", filename: "run_record.json", label: "Run record JSON", checked: true },
    ];

    const FIELD_LABELS = {
      schemaVersion: "Report schema",
      title: "Title",
      summary: "Summary",
      generatedAt: "Created time",
      parameters: "Run settings",
      validation: "Input checks",
      qc: "Quality checks",
      exposures: "Fitted exposures",
      provenance: "Run record",
      citations: "Citations",
      notes: "Notes",
    };

    const root = document.createElement("section");
    root.className = "report-packet-app";
    root.innerHTML = `
      <style>
        .report-packet-app {
          display: grid;
          gap: 18px;
        }

        .report-packet-step {
          border: 1px solid #d8e1e8;
          border-radius: 8px;
          background: #ffffff;
          padding: 16px;
        }

        .report-packet-step h2,
        .report-packet-step h3 {
          margin: 0 0 8px;
          color: #102033;
        }

        .report-packet-step p {
          max-width: 86ch;
          margin: 0 0 12px;
          color: #52616f;
          line-height: 1.55;
        }

        .report-packet-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          gap: 12px;
        }

        .report-packet-field {
          display: grid;
          gap: 6px;
          font-size: 14px;
          color: #102033;
        }

        .report-packet-field input,
        .report-packet-field select {
          width: 100%;
          border: 1px solid #c8d3dc;
          border-radius: 6px;
          padding: 8px 10px;
          font: inherit;
        }

        .report-packet-checks {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
          gap: 8px 12px;
        }

        .report-packet-check {
          display: flex;
          align-items: center;
          gap: 8px;
          border: 1px solid #d8e1e8;
          border-radius: 6px;
          padding: 8px 10px;
          background: #f8fbfd;
          font-size: 14px;
        }

        .report-packet-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 12px;
        }

        .report-packet-button {
          border: 1px solid #0f766e;
          border-radius: 6px;
          background: #0f766e;
          color: #ffffff;
          cursor: pointer;
          font: inherit;
          font-weight: 600;
          padding: 8px 12px;
        }

        .report-packet-button.secondary {
          background: #ffffff;
          color: #0f766e;
        }

        .report-packet-button:disabled {
          cursor: wait;
          opacity: 0.65;
        }

        .report-packet-output {
          display: grid;
          gap: 12px;
          margin-top: 12px;
        }

        .report-packet-metrics {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 8px;
        }

        .report-packet-metric {
          border: 1px solid #d8e1e8;
          border-radius: 6px;
          padding: 10px;
          background: #f8fbfd;
        }

        .report-packet-metric span {
          display: block;
          color: #52616f;
          font-size: 12px;
          text-transform: uppercase;
        }

        .report-packet-metric strong {
          color: #102033;
          font-size: 20px;
        }

        .report-packet-table-wrap {
          overflow-x: auto;
        }

        .report-packet-table {
          width: 100%;
          border-collapse: collapse;
          font-size: 13px;
        }

        .report-packet-table th,
        .report-packet-table td {
          border-bottom: 1px solid #d8e1e8;
          padding: 8px;
          text-align: left;
          vertical-align: top;
        }

        .report-packet-table th {
          color: #102033;
          background: #eef5f7;
          font-weight: 700;
        }

        .report-packet-preview {
          min-height: 220px;
          border: 1px solid #d8e1e8;
          border-radius: 6px;
          background: #fbfdfe;
          overflow: auto;
        }

        .report-packet-preview pre {
          margin: 0;
          padding: 12px;
          white-space: pre-wrap;
          word-break: break-word;
        }

        .report-packet-preview iframe {
          width: 100%;
          height: 420px;
          border: 0;
          background: #ffffff;
        }

        .report-packet-status {
          border-left: 4px solid #0072b2;
          background: #eef6fb;
          color: #17324d;
          margin: 0;
          padding: 10px 12px;
        }

        .report-packet-status.review {
          border-left-color: #d55e00;
          background: #fff5ee;
          color: #5f2d08;
        }
      </style>
      <section class="report-packet-step" aria-labelledby="packet-step-1">
        <h2 id="packet-step-1">1. Choose archive contents</h2>
        <p>Select the samples, report sections, and files that belong in the review packet.</p>
        <div class="report-packet-grid">
          <label class="report-packet-field">
            <span>Report title</span>
            <input id="packet-title" type="text" value="Lung SBS96 signature fitting report">
          </label>
          <label class="report-packet-field">
            <span>Mutation-count review cutoff</span>
            <input id="packet-burden-cutoff" type="number" min="1" step="50" value="500">
          </label>
        </div>
        <h3>Samples</h3>
        <div id="packet-sample-controls" class="report-packet-checks"></div>
        <h3>Report sections</h3>
        <div id="packet-section-controls" class="report-packet-checks"></div>
        <h3>Export files</h3>
        <div id="packet-export-controls" class="report-packet-checks"></div>
      </section>

      <section class="report-packet-step" aria-labelledby="packet-step-2">
        <h2 id="packet-step-2">2. Build packet</h2>
        <p>Run the compact fitting workflow with the selected samples and assemble a report packet from the workflow output.</p>
        <div class="report-packet-actions">
          <button id="packet-build" class="report-packet-button" type="button">Build packet</button>
        </div>
        <div id="packet-build-output" class="report-packet-output"></div>
      </section>

      <section class="report-packet-step" aria-labelledby="packet-step-3">
        <h2 id="packet-step-3">3. Audit packet</h2>
        <p>Review required fields, provenance, warnings, and the selected artifact before downloading the packet.</p>
        <label class="report-packet-field">
          <span>Artifact preview</span>
          <select id="packet-preview-select"></select>
        </label>
        <div id="packet-audit-output" class="report-packet-output"></div>
      </section>

      <section class="report-packet-step" aria-labelledby="packet-step-4">
        <h2 id="packet-step-4">4. Download packet</h2>
        <p>The download list is created after the packet has been built and audited.</p>
        <div class="report-packet-actions">
          <button id="packet-refresh-downloads" class="report-packet-button secondary" type="button">Refresh download list</button>
        </div>
        <div id="packet-download-output" class="report-packet-output"></div>
      </section>
    `;
    display(root);

    const titleInput = root.querySelector("#packet-title");
    const burdenCutoffInput = root.querySelector("#packet-burden-cutoff");
    const sampleControls = root.querySelector("#packet-sample-controls");
    const sectionControls = root.querySelector("#packet-section-controls");
    const exportControls = root.querySelector("#packet-export-controls");
    const buildButton = root.querySelector("#packet-build");
    const buildOutput = root.querySelector("#packet-build-output");
    const previewSelect = root.querySelector("#packet-preview-select");
    const auditOutput = root.querySelector("#packet-audit-output");
    const refreshDownloadsButton = root.querySelector("#packet-refresh-downloads");
    const downloadOutput = root.querySelector("#packet-download-output");

    const state = {
      dataset: null,
      selectedSamples: [],
      sectionInputs: {},
      exportInputs: {},
      packet: null,
    };

    function escapeText(value) {
      return String(value ?? "");
    }

    function makeStatus(message, review = false) {
      const node = document.createElement("p");
      node.className = `report-packet-status${review ? " review" : ""}`;
      node.textContent = message;
      return node;
    }

    function metricGrid(rows) {
      const grid = document.createElement("div");
      grid.className = "report-packet-metrics";
      for (const row of rows) {
        const item = document.createElement("div");
        item.className = "report-packet-metric";
        const label = document.createElement("span");
        label.textContent = row.label;
        const value = document.createElement("strong");
        value.textContent = row.value;
        item.append(label, value);
        grid.append(item);
      }
      return grid;
    }

    function renderTable(rows, columns) {
      const wrap = document.createElement("div");
      wrap.className = "report-packet-table-wrap";
      const table = document.createElement("table");
      table.className = "report-packet-table";
      const thead = document.createElement("thead");
      const header = document.createElement("tr");
      for (const column of columns) {
        const th = document.createElement("th");
        th.textContent = column.label;
        header.append(th);
      }
      thead.append(header);
      const tbody = document.createElement("tbody");
      for (const row of rows) {
        const tr = document.createElement("tr");
        for (const column of columns) {
          const td = document.createElement("td");
          td.textContent = escapeText(row[column.key]);
          tr.append(td);
        }
        tbody.append(tr);
      }
      table.append(thead, tbody);
      wrap.append(table);
      return wrap;
    }

    function makeCheckbox({ key, label, checked = true, name }) {
      const id = `${name}-${key}`;
      const labelNode = document.createElement("label");
      labelNode.className = "report-packet-check";
      const input = document.createElement("input");
      input.id = id;
      input.type = "checkbox";
      input.checked = checked;
      const span = document.createElement("span");
      span.textContent = label;
      labelNode.append(input, span);
      return { labelNode, input };
    }

    function selectedSection(key) {
      return Boolean(state.sectionInputs[key]?.checked);
    }

    function selectedExports() {
      return EXPORT_OPTIONS.filter((option) => state.exportInputs[option.key]?.checked);
    }

    function selectedSamples() {
      return Array.from(sampleControls.querySelectorAll("input[type='checkbox']"))
        .filter((input) => input.checked)
        .map((input) => input.value);
    }

    function subsetMatrix(matrix, samples) {
      return Object.fromEntries(samples.map((sample) => [sample, matrix[sample]]).filter(([, value]) => value));
    }

    function totalMutations(record = {}) {
      return Object.values(record || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function fieldHasContent(value) {
      if (value === null || value === undefined) return false;
      if (typeof value === "string") return value.trim().length > 0;
      if (Array.isArray(value)) return value.length > 0;
      if (typeof value === "object") return Object.keys(value).length > 0;
      return true;
    }

    function buildManifestRows(packet) {
      return selectedExports().map((option) => ({
        file: option.filename,
        purpose: {
          reportJson: "Structured report object for machine-readable review",
          reportHtml: "Standalone report preview for browser review",
          manifestCsv: "Packet file inventory and audit status",
          spectraTsv: "Selected SBS96 input spectra for rerun",
          exposuresCsv: "Fitted signature contribution table",
          runRecordJson: "SDK, runtime, source, and parameter provenance",
        }[option.key],
        samples: packet.selectedSamples.length,
        auditStatus: packet.reviewItems.length ? "Review" : "Pass",
      }));
    }

    function buildPacketFiles(packet) {
      const files = {
        reportJson: {
          filename: "analysis_report.json",
          type: "json",
          value: packet.report,
          label: "Download analysis_report.json",
        },
        reportHtml: {
          filename: "analysis_report.html",
          text: packet.reportHtml,
          label: "Download analysis_report.html",
        },
        manifestCsv: {
          filename: "packet_manifest.csv",
          text: rowsToCsv(packet.manifestRows),
          label: "Download packet_manifest.csv",
        },
        spectraTsv: {
          filename: "spectra.tsv",
          text: packet.spectraTsv,
          label: "Download spectra.tsv",
        },
        exposuresCsv: {
          filename: "exposures.csv",
          text: packet.exposuresCsv,
          label: "Download exposures.csv",
        },
        runRecordJson: {
          filename: "run_record.json",
          type: "json",
          value: packet.runRecord,
          label: "Download run_record.json",
        },
      };
      return selectedExports().map((option) => files[option.key]).filter(Boolean);
    }

    function renderPreview(packet) {
      const preview = document.createElement("div");
      preview.className = "report-packet-preview";
      const value = previewSelect.value;
      if (value === "reportHtml") {
        const frame = document.createElement("iframe");
        frame.title = "Analysis report HTML preview";
        frame.srcdoc = packet.reportHtml;
        preview.append(frame);
        return preview;
      }
      const pre = document.createElement("pre");
      const previewText = {
        reportJson: JSON.stringify(packet.report, null, 2),
        manifestCsv: rowsToCsv(packet.manifestRows),
        spectraTsv: packet.spectraTsv,
        exposuresCsv: packet.exposuresCsv,
        runRecordJson: JSON.stringify(packet.runRecord, null, 2),
      }[value] || "Build the packet to preview an artifact.";
      pre.textContent = previewText;
      preview.append(pre);
      return preview;
    }

    function renderAudit() {
      auditOutput.replaceChildren();
      if (!state.packet) {
        auditOutput.append(makeStatus("Build the packet to populate the audit."));
        return;
      }

      const packet = state.packet;
      const auditRows = PACKET_REQUIRED_FIELDS.map((field) => {
        const value = packet.report[field];
        const pass = fieldHasContent(value);
        return {
          field: FIELD_LABELS[field] || field,
          status: pass ? "Pass" : "Review",
          contents: pass ? reportFieldRows({ [field]: value })[0]?.summary || "recorded" : "not included",
        };
      });

      const statusRows = [
        ...auditRows,
        ...packet.integrityRows,
      ];
      const reviewRows = statusRows.filter((row) => row.status !== "Pass");
      packet.reviewItems = reviewRows;
      packet.manifestRows = buildManifestRows(packet);

      auditOutput.append(
        makeStatus(
          reviewRows.length
            ? `${reviewRows.length} packet item(s) need review. Downloads remain available with the review status recorded in the manifest.`
            : "Packet audit passed. Required fields and archive integrity checks are present.",
          reviewRows.length > 0
        )
      );
      auditOutput.append(renderTable(statusRows, [
        { key: "field", label: "Audit item" },
        { key: "status", label: "Status" },
        { key: "contents", label: "Contents" },
      ]));
      auditOutput.append(renderTable(packet.warningRows, [
        { key: "level", label: "Level" },
        { key: "message", label: "Message" },
        { key: "action", label: "Review action" },
      ]));
      auditOutput.append(renderPreview(packet));
      renderDownloads();
    }

    function renderDownloads() {
      downloadOutput.replaceChildren();
      if (!state.packet) {
        downloadOutput.append(makeStatus("Build and audit the packet before downloads are created."));
        return;
      }
      const files = buildPacketFiles(state.packet);
      if (!files.length) {
        downloadOutput.append(makeStatus("No export files are selected.", true));
        return;
      }
      downloadOutput.append(
        makeStatus(
          state.packet.reviewItems.length
            ? "Selected downloads include the current review status in packet_manifest.csv."
            : "Selected downloads are ready."
        )
      );
      downloadOutput.append(downloadMany(files));
    }

    function renderBuildSummary(packet) {
      buildOutput.replaceChildren(
        metricGrid([
          { label: "Dataset", value: state.dataset.status },
          { label: "Samples", value: packet.selectedSamples.length },
          { label: "Signatures", value: Object.keys(packet.signatures).length },
          { label: "Low-count review", value: packet.lowBurdenRows.length },
          { label: "Exports", value: selectedExports().length },
        ]),
        renderTable(packet.lowBurdenRows, [
          { key: "sample", label: "Sample" },
          { key: "mutations", label: "Mutations" },
          { key: "status", label: "Review status" },
        ])
      );
    }

    async function buildPacket({ silent = false } = {}) {
      const selected = selectedSamples();
      if (!selected.length) {
        buildOutput.replaceChildren(makeStatus("Select at least one sample before building the packet.", true));
        return;
      }

      const burdenCutoff = Math.max(1, Number(burdenCutoffInput.value || 1));
      const spectra = subsetMatrix(state.dataset.spectra, selected);
      const signatures = state.dataset.signatures;
      const analysis = await mSigSDK.workflows.analyzeSpectraWithSignatures(spectra, signatures, {
        exposureThreshold: 0.01,
        expectedContexts: state.dataset.contexts,
        mutationBurdenOptions: {
          lowBurdenThresholdMode: "fixed",
          lowBurdenThreshold: burdenCutoff,
        },
        parameters: {
          packetTitle: titleInput.value.trim() || "mSigSDK signature fitting report",
          dataset: state.dataset.source,
          samples: selected,
          signatureSetName: state.dataset.selection?.signatureSetName,
          matrix: "SBS96",
          mutationCountReviewCutoff: burdenCutoff,
        },
        catalogVersion: state.dataset.selection?.signatureSetName,
        catalogSource: state.dataset.source,
        reportFormat: "object",
      });

      const lowBurdenRows = selected
        .map((sample) => ({
          sample,
          mutations: totalMutations(spectra[sample]),
          status: totalMutations(spectra[sample]) < burdenCutoff ? "Review" : "Pass",
        }))
        .filter((row) => row.status === "Review");

      const report = mSigSDK.reports.createAnalysisReport({
        title: titleInput.value.trim() || "mSigSDK signature fitting report",
        summary: `Report packet for ${selected.length} SBS96 sample(s) fitted against ${Object.keys(signatures).length} reference signatures.`,
        workflowRole: analysis.workflowRole,
        scopeStatement: analysis.scopeStatement,
        methodBasis: analysis.methodBasis,
        primaryInterpretationFields: analysis.primaryInterpretationFields,
        parameters: selectedSection("parameters") ? analysis.parameters : null,
        validation: selectedSection("validation") ? analysis.validation : null,
        qc: selectedSection("qc") ? analysis.qc : null,
        exposures: selectedSection("exposures") ? analysis.fit?.exposures : null,
        provenance: selectedSection("provenance") ? analysis.provenance : null,
        citations: selectedSection("notes") ? analysis.report?.citations || [] : [],
        notes: selectedSection("notes")
          ? [
              ...(analysis.report?.notes || []),
              ...lowBurdenRows.map((row) => `${row.sample} has ${row.mutations} mutations, below the selected review cutoff.`),
            ]
          : [],
      });

      const spectraTsv = mSigSDK.io.exportSigProfilerMatrix(spectra, {
        contexts: state.dataset.contexts,
      });
      const roundTrip = mSigSDK.io.importSigProfilerMatrix(spectraTsv);
      const exposuresCsv = rowsToCsv(exposureRows(analysis.fit?.exposures, {
        minExposure: 0,
        topN: 1000,
      }));
      const reportHtml = mSigSDK.reports.createAnalysisReportHTML(report);
      const integrityRows = [
        {
          field: "Spectra round trip",
          status: Object.keys(roundTrip).length === selected.length ? "Pass" : "Review",
          contents: `${Object.keys(roundTrip).length} of ${selected.length} sample(s) parsed from spectra.tsv`,
        },
        {
          field: "Exposures file",
          status: exposuresCsv.trim() ? "Pass" : "Review",
          contents: exposuresCsv.trim() ? "exposures.csv has rows" : "no fitted exposure rows",
        },
      ];
      const warningRows = [
        ...lowBurdenRows.map((row) => ({
          level: "review",
          message: `${row.sample} is below the mutation-count review cutoff.`,
          action: "Check burden, reconstruction error, and residuals before interpreting fitted exposures.",
        })),
        ...(analysis.warnings || []).map((warning) => ({
          level: warning.level || "warning",
          message: warning.message || String(warning),
          action: warning.resolution || "Review the source analysis before reporting.",
        })),
      ];

      state.packet = {
        selectedSamples: selected,
        spectra,
        signatures,
        analysis,
        report,
        reportHtml,
        spectraTsv,
        exposuresCsv,
        runRecord: analysis.provenance,
        lowBurdenRows,
        integrityRows,
        warningRows: warningRows.length
          ? warningRows
          : [{ level: "info", message: "No packet warnings generated.", action: "Proceed with archive review." }],
        manifestRows: [],
        reviewItems: [],
      };
      state.packet.manifestRows = buildManifestRows(state.packet);

      if (!silent) {
        renderBuildSummary(state.packet);
      }
      syncPreviewOptions();
      renderAudit();
    }

    function syncPreviewOptions() {
      const options = selectedExports();
      previewSelect.replaceChildren(
        ...options.map((option) => {
          const node = document.createElement("option");
          node.value = option.key;
          node.textContent = `${option.label} (${option.filename})`;
          return node;
        })
      );
      if (!options.some((option) => option.key === previewSelect.value)) {
        previewSelect.value = options[0]?.key || "";
      }
    }

    function queuePacketRefresh(event) {
      syncPreviewOptions();
      if (state.packet) {
        buildPacket({ silent: event?.type === "input" }).catch((error) => {
          buildOutput.replaceChildren(makeStatus(error.message, true));
        });
      }
    }

    async function initialize() {
      buildOutput.append(makeStatus("Loading a compact public SBS96 dataset for packet building."));
      auditOutput.append(makeStatus("Build the packet to populate the audit."));
      downloadOutput.append(makeStatus("Build and audit the packet before downloads are created."));
      previewSelect.append(new Option("Build the packet to preview artifacts", ""));

      state.dataset = await loadPublicSbs96Dataset(mSigSDK, {
        study: "PCAWG",
        genomeDataType: "WGS",
        cancerType: "Lung-AdenoCA",
        mutationType: "SBS",
        matrixSize: 96,
        signatureSetName: "COSMIC_v3_Signatures_GRCh37_SBS96",
        sampleNames: ["SP50611", "SP50592", "SP52284", "SP50406", "SP55004"],
        sampleLimit: 5,
        signatureNames: ["SBS1", "SBS2", "SBS4", "SBS5", "SBS13", "SBS17a", "SBS17b", "SBS18", "SBS40"],
        allowAlternate: true,
        allowDemoFallback: true,
      });

      const sampleRows = Object.keys(state.dataset.spectra).map((sample) => ({
        key: sample,
        label: `${sample} (${formatNumber(totalMutations(state.dataset.spectra[sample]))} mutations)`,
        checked: true,
        name: "packet-sample",
      }));
      for (const option of sampleRows) {
        const { labelNode, input } = makeCheckbox(option);
        input.value = option.key;
        input.addEventListener("change", queuePacketRefresh);
        sampleControls.append(labelNode);
      }

      for (const option of REPORT_SECTION_OPTIONS) {
        const { labelNode, input } = makeCheckbox({ ...option, name: "packet-section" });
        input.addEventListener("change", queuePacketRefresh);
        state.sectionInputs[option.key] = input;
        sectionControls.append(labelNode);
      }

      for (const option of EXPORT_OPTIONS) {
        const { labelNode, input } = makeCheckbox({ ...option, name: "packet-export" });
        input.addEventListener("change", queuePacketRefresh);
        state.exportInputs[option.key] = input;
        exportControls.append(labelNode);
      }

      buildOutput.replaceChildren(
        metricGrid([
          { label: "Dataset", value: state.dataset.status },
          { label: "Samples loaded", value: Object.keys(state.dataset.spectra).length },
          { label: "Signatures", value: Object.keys(state.dataset.signatures).length },
          { label: "Files selected", value: selectedExports().length },
        ])
      );
      syncPreviewOptions();
    }

    titleInput.addEventListener("input", queuePacketRefresh);
    burdenCutoffInput.addEventListener("change", queuePacketRefresh);
    previewSelect.addEventListener("change", renderAudit);
    refreshDownloadsButton.addEventListener("click", renderDownloads);
    buildButton.addEventListener("click", async () => {
      buildButton.disabled = true;
      buildButton.textContent = "Building...";
      buildOutput.replaceChildren(makeStatus("Building report packet from selected samples and sections."));
      try {
        await buildPacket();
      } catch (error) {
        buildOutput.replaceChildren(makeStatus(error.message, true));
      } finally {
        buildButton.disabled = false;
        buildButton.textContent = "Build packet";
      }
    });

    initialize().catch((error) => {
      buildOutput.replaceChildren(makeStatus(`Dataset loading failed: ${error.message}`, true));
    });
  </script>
</notebook>
