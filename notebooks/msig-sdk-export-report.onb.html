<!doctype html>
<notebook theme="air">
  <title>mSigSDK export and reports</title>

  <script type="text/markdown">
    # Export and reports

    The reporting layer turns exploratory analysis into reusable files. It covers SigProfiler-style table export/import, run records, structured reports, and the high-level workflow helper that bundles input checks, fitting, quality checks, and reporting.

    The workflow moves from input to saved output: load a small analysis, prove that the table can be exported and read back, compare the high-level workflow helper with manual report assembly, and save the bundle that another researcher would need to reproduce the run.
  </script>

  <script type="module" pinned id="1">
    const repSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-report", location.href).href;
    const { mSigSDK } = await import(repSdkUrl);
    const {
      loadPublicSbs96Dataset,
    } = await import("./msig-notebook-fixtures.js");
    const {
      burdenSampleRows,
      details,
      metrics,
      reportFieldRows,
      table,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Workflow", value: "Reproducible outputs" },
      { label: "Main namespaces", value: "io, workflows, reports" },
    ]));
    display(table(
      [
        { functionName: "io.exportSigProfilerMatrix", workflowValue: "Exports spectra to a common table format" },
        { functionName: "io.importSigProfilerMatrix", workflowValue: "Reads the same format back into SDK objects" },
        { functionName: "workflows.analyzeSpectraWithSignatures", workflowValue: "Bundles input checks, fitting, quality checks, run records, and reports" },
        { functionName: "reports.createAnalysisReport", workflowValue: "Creates a structured report that can be saved or rendered" },
        { functionName: "presentation.reportFieldRows", workflowValue: "Summarizes report objects without dumping nested JSON" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "workflowValue", label: "What it demonstrates" },
      ]
    ));
  </script>
<script type="text/markdown">
    ## Step 1. Load a small dataset for reporting

    The reporting workflow starts from the same input shape as fitting: count spectra by sample and signatures by signature name. This cell uses a compact set of public PCAWG WGS Lung-AdenoCA spectra with both adequate and low mutation counts, so the report demonstrates useful input-check and quality-check fields.

    At this point, the researcher is not judging signatures yet. The question is whether the inputs, sample count, signature count, and source details are clear enough to make the rest of the report interpretable.
  </script>
<script type="module" pinned id="2">
    const repContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const repStudy = "PCAWG";
    const repGenomeDataType = "WGS";
    const repCancerType = "Lung-AdenoCA";
    const repMutationType = "SBS";
    const repMatrixSize = 96;
    const repSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const repExampleSampleNames = [
      "SP50611",
      "SP50592",
      "SP52284",
      "SP50406",
      "SP55004",
    ];
    const repSampleLimit = repExampleSampleNames.length;
    const repMutationBurdenThreshold = 5000;
    const repExposureThreshold = 0.01;
    const repPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    const repDataset = await loadPublicSbs96Dataset(mSigSDK, {
      study: repStudy,
      genomeDataType: repGenomeDataType,
      cancerType: repCancerType,
      mutationType: repMutationType,
      matrixSize: repMatrixSize,
      signatureSetName: repSignatureSetName,
      sampleNames: repExampleSampleNames,
      sampleLimit: repSampleLimit,
      signatureNames: repPreferredSignatureNames,
      allowAlternate: false,
    });
    const repDataSourceStatus = repDataset.status;
    const repAllGroupedSpectra = repDataset.spectra;
    const repAllReferenceSignatures = repDataset.allSignatures;
    const repAllBurden = mSigSDK.qc.summarizeMutationBurden(repAllGroupedSpectra, {
      expectedContexts: repContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: repMutationBurdenThreshold,
    });
    const repSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      repAllBurden,
      {
        sampleNames: repExampleSampleNames.filter((sample) => repAllGroupedSpectra[sample]).length
          ? repExampleSampleNames.filter((sample) => repAllGroupedSpectra[sample])
          : Object.keys(repAllGroupedSpectra),
        minTotalMutations: 1,
        limit: repSampleLimit,
      }
    );
    const repSelectedSampleNames = repSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const repGroupedSpectra = Object.fromEntries(
      repSelectedSampleNames.map((sample) => [sample, repAllGroupedSpectra[sample]])
    );
    const repPreferredAvailableSignatures = repPreferredSignatureNames.filter(
      (signature) => repAllReferenceSignatures[signature]
    );
    const repSelectedSignatureNames = repPreferredAvailableSignatures.length
      ? repPreferredAvailableSignatures
      : Object.keys(repAllReferenceSignatures).slice(0, 8);
    const repReferenceSignatures = Object.fromEntries(
      repSelectedSignatureNames.map((signature) => [
        signature,
        repAllReferenceSignatures[signature],
      ])
    );

    display(metrics([
      { label: "Data source", value: repDataSourceStatus },
      { label: "Samples", value: repSelectedSampleNames.length },
      { label: "Reference signatures", value: repSelectedSignatureNames.length },
      { label: "Mutation-count cutoff", value: repMutationBurdenThreshold },
      {
        label: "Low mutation-count samples",
        value: repSelectedBurdenSamples.filter(
          (sample) => sample.totalMutations < repMutationBurdenThreshold
        ).length,
      },
      { label: "Minimum signature contribution", value: repExposureThreshold },
    ]));
    display(table(
      burdenSampleRows(repAllBurden, repSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero contexts" },
        { key: "lowBurden", label: "Low mutation-count review cue" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Export and read back a SigProfiler-style table

    Tool compatibility matters because signature analysts often move between mSigSDK, SigProfiler, COSMIC tables, R/Bioconductor workflows, and supplemental tables. Exporting and reading back is a practical check that the exported table can be parsed back into the SDK's object shape.

    If the row and column counts change after import, stop here. A report built on a table that cannot be read back will be difficult to reproduce or compare with external tools.
  </script>
<script type="module" pinned id="3">
    const repSigProfilerTsv = mSigSDK.io.exportSigProfilerMatrix(
      repGroupedSpectra,
      { contexts: repContexts }
    );
    const repRoundTripSpectra =
      mSigSDK.io.importSigProfilerMatrix(repSigProfilerTsv);

    const repTsvLines = repSigProfilerTsv.split("\n");
    display(metrics([
      { label: "Exported TSV lines", value: repTsvLines.length },
      { label: "Round-trip samples", value: Object.keys(repRoundTripSpectra).length },
      { label: "First column", value: repTsvLines[0].split("\t")[0] },
    ]));
    display(details("Preview first five TSV lines", repTsvLines.slice(0, 5).join("\n")));
  </script>

  <script type="text/markdown">
    ## Step 3. Use the high-level workflow helper

    The workflow helper performs fitting, input checking, quality-check object creation, run-record creation, and report assembly in one call. The reusable bundle is the focus here, not interpretation of the fitted signatures.

    Read the workflow output as the standard project bundle: settings, input checks, warnings, fit evidence, report fields, and run record together. The helper is useful when consistency matters more than hand-building every intermediate object.
  </script>
<script type="module" pinned id="4">
    const repWorkflowAnalysis =
      await mSigSDK.workflows.analyzeSpectraWithSignatures(
        repGroupedSpectra,
        repReferenceSignatures,
        {
          exposureThreshold: repExposureThreshold,
          expectedContexts: repContexts,
          mutationBurdenOptions: {
            lowBurdenThresholdMode: "fixed",
            lowBurdenThreshold: repMutationBurdenThreshold,
          },
          parameters: {
            dataset: `${repStudy} ${repCancerType}`,
            genomeDataType: repGenomeDataType,
            signatureSetName: repSignatureSetName,
            samples: repSelectedSampleNames,
            signatures: repSelectedSignatureNames,
            matrix: "SBS96",
          },
        }
      );

    display(metrics([
      { label: "Spectra validation", value: repWorkflowAnalysis.validation.spectra.valid ? "Pass" : "Review" },
      { label: "Signature validation", value: repWorkflowAnalysis.validation.signatures.valid ? "Pass" : "Review" },
      { label: "Report title", value: repWorkflowAnalysis.report.title },
      { label: "Run record SDK version", value: repWorkflowAnalysis.provenance.sdk?.version || mSigSDK.version },
    ]));
    display(table(
      reportFieldRows(repWorkflowAnalysis.report).map((row) => ({
        section: row.field,
        contents: row.summary,
      })),
      [
        { key: "section", label: "Report field" },
        { key: "contents", label: "Contents" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 4. Assemble a report manually

    You can also build a report from individual pieces when you want full control over what gets included. This pattern is useful for notebooks, manuscripts, or applications where you want to keep the analysis result, settings, SDK version, source URLs, and warnings together.

    Manual assembly is most useful when an application has already computed some pieces itself or needs to attach study-specific sample details. The responsibility is the same: do not export signature contributions without the quality-check and run-record fields that explain them.
  </script>
<script type="module" pinned id="5">
    const repProvenance = mSigSDK.provenance.createProvenance({
      analysis: "focused export report workflow",
      parameters: {
        sdkUrl: repSdkUrl,
        study: repStudy,
        genomeDataType: repGenomeDataType,
        cancerType: repCancerType,
        signatureSetName: repSignatureSetName,
        mutationBurdenThreshold: repMutationBurdenThreshold,
        exposureThreshold: repExposureThreshold,
      },
      sourceUrls: [
        repSdkUrl,
        "https://analysistools.cancer.gov/mutational-signatures/api/mutational_spectrum",
        "https://analysistools.cancer.gov/mutational-signatures/api/mutational_signature",
      ],
    });
    const repManualReport = mSigSDK.reports.createAnalysisReport({
      title: "Focused mSigSDK tool-compatible report",
      validation: repWorkflowAnalysis.validation,
      qc: repWorkflowAnalysis.qc,
      provenance: repProvenance,
    });

    display(metrics([
      { label: "Report title", value: repManualReport.title },
      { label: "Top-level fields", value: Object.keys(repManualReport).length },
      { label: "Generated at", value: repManualReport.generatedAt || "recorded" },
    ]));
    const repManualFieldLabels = {
      schemaVersion: "Report format version",
      title: "Report title",
      summary: "Summary",
      generatedAt: "Created time",
      parameters: "Run settings",
      validation: "Input checks",
      qc: "Quality checks",
      provenance: "Run record",
      citations: "Citations",
      notes: "Notes",
    };
    display(table(
      reportFieldRows(repManualReport).map((row) => ({
        section: repManualFieldLabels[row.field] || row.field,
        contents: row.summary,
      })),
      [
        { key: "section", label: "Report section" },
        { key: "contents", label: "Contents" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 5. Check required report fields and save the bundle

    A reusable report should include input settings, input checks, quality checks, a run record, warnings or caveats, and the table export needed to rerun the analysis outside the browser page.

    Treat the final download list as a reproducibility checklist. If a collaborator received only these files, they should be able to identify the inputs, rerun the fit, inspect warnings, and understand how the report was generated.
  </script>
<script type="module" pinned id="6">
    const repRequiredFields = [
      "schemaVersion",
      "title",
      "summary",
      "generatedAt",
      "parameters",
      "validation",
      "qc",
      "provenance",
      "citations",
      "notes",
    ];
    const repFieldLabels = {
      schemaVersion: "Report format version",
      title: "Report title",
      summary: "Summary",
      generatedAt: "Created time",
      parameters: "Run settings",
      validation: "Input checks",
      qc: "Quality checks",
      provenance: "Run record",
      citations: "Citations",
      notes: "Notes",
    };
    const repFieldChecklist = repRequiredFields.map((field) => ({
      field,
      fieldLabel: repFieldLabels[field] || field,
      presentInWorkflowReport: repWorkflowAnalysis.report?.[field] !== undefined,
      presentInManualReport: repManualReport?.[field] !== undefined,
    }));
    const repReproducibilityRows = [
      { file: "spectra TSV", purpose: "Input table for rerun or external tool comparison" },
      { file: "workflow report JSON", purpose: "Input checks, quality checks, fitting, run record, and report fields" },
      { file: "manual report JSON", purpose: "Minimal structured report assembled from selected pieces" },
      { file: "field checklist CSV", purpose: "Presence check for required report fields" },
    ];

    display(table(
      repFieldChecklist,
      [
        { key: "fieldLabel", label: "Report section" },
        { key: "presentInWorkflowReport", label: "Workflow report" },
        { key: "presentInManualReport", label: "Manual report" },
      ]
    ));
    display(table(
      repReproducibilityRows,
      [
        { key: "file", label: "File" },
        { key: "purpose", label: "Purpose" },
      ]
    ));
    display(downloadMany([
      {
        filename: "export_report_spectra.tsv",
        text: repSigProfilerTsv,
        label: "Download spectra TSV",
      },
      {
        filename: "export_report_field_checklist.csv",
        text: rowsToCsv(repFieldChecklist),
        label: "Download field checklist CSV",
      },
      {
        filename: "export_report_workflow.json",
        type: "json",
        value: {
          dataSourceStatus: repDataSourceStatus,
          workflowAnalysis: repWorkflowAnalysis,
          fieldChecklist: repFieldChecklist,
        },
        label: "Download workflow report JSON",
      },
      {
        filename: "export_report_manual.json",
        type: "json",
        value: repManualReport,
        label: "Download manual report JSON",
      },
    ]));
  </script>
</notebook>
