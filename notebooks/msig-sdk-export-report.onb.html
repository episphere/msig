<!doctype html>
<notebook theme="air">
  <title>mSigSDK export and reports</title>

  <script type="text/markdown">
    # Export, reports, and workflow helpers

    This notebook teaches the utility layer that helps users move from exploratory code to reproducible analysis artifacts. It covers SigProfiler-style matrix export/import, provenance, structured reports, and the high-level workflow helper that bundles validation, fitting, QC, and reporting.

    Use this notebook when you want to understand what to save after an analysis. The examples are deliberately small so you can inspect the returned strings and objects.
  </script>

  <script type="module" pinned id="1">
    const repSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-report", location.href).href;
    const { mSigSDK } = await import(repSdkUrl);
    const {
      burdenSampleRows,
      details,
      metrics,
      reconstructionRows,
      reportFieldRows,
      table,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Workflow", value: "Reproducible outputs" },
      { label: "Main namespaces", value: "io, workflows, reports" },
    ]));
    display(table(
      [
        { functionName: "io.exportSigProfilerMatrix", reviewerValue: "Exports spectra to a common matrix format" },
        { functionName: "io.importSigProfilerMatrix", reviewerValue: "Reads the same format back into SDK objects" },
        { functionName: "workflows.analyzeSpectraWithSignatures", reviewerValue: "Bundles validation, fitting, QC, provenance, and reports" },
        { functionName: "reports.createAnalysisReport", reviewerValue: "Creates a structured artifact that can be saved or rendered" },
        { functionName: "presentation.reportFieldRows", reviewerValue: "Summarizes report objects without dumping nested JSON" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "reviewerValue", label: "What it demonstrates" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 1. Load a small dataset for reporting

    The reporting workflow starts from the same input shape as fitting: count spectra by sample and signatures by signature name. This cell uses a compact set of public PCAWG WGS Lung-AdenoCA spectra with both adequate and low mutation burdens, so the report demonstrates useful validation and QC fields. In your own analysis, replace this cell with your local spectra and reference signatures.
  </script>

  <script type="module" pinned id="2">
    const repContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const repStudy = "PCAWG";
    const repGenomeDataType = "WGS";
    const repCancerType = "Lung-AdenoCA";
    const repMutationType = "SBS";
    const repMatrixSize = 96;
    const repSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const repExampleSampleNames = [
      "SP50611",
      "SP50592",
      "SP52284",
      "SP50406",
      "SP55004",
    ];
    const repSampleLimit = repExampleSampleNames.length;
    const repMutationBurdenThreshold = 5000;
    const repExposureThreshold = 0.01;
    const repPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    const [repRawSpectrumRows, repRawSignatureRows] = await Promise.all([
      mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
        repStudy,
        repExampleSampleNames,
        repGenomeDataType,
        repCancerType,
        repMutationType,
        repMatrixSize
      ),
      mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
        repGenomeDataType,
        repSignatureSetName,
        repMutationType,
        repMatrixSize,
        10000
      ),
    ]);

    const repSpectrumRows = Array.isArray(repRawSpectrumRows)
      ? repRawSpectrumRows.flat()
      : [];
    const repSignatureRows = Array.isArray(repRawSignatureRows)
      ? repRawSignatureRows.flat()
      : [];
    const repAllGroupedSpectra =
      mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(repSpectrumRows);
    const repAllReferenceSignatures =
      mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
        repSignatureRows,
        "signatureName"
      );
    const repAllBurden = mSigSDK.qc.summarizeMutationBurden(repAllGroupedSpectra, {
      expectedContexts: repContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: repMutationBurdenThreshold,
    });
    const repSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      repAllBurden,
      {
        sampleNames: repExampleSampleNames,
        minTotalMutations: 1,
        limit: repSampleLimit,
      }
    );
    const repSelectedSampleNames = repSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const repGroupedSpectra = Object.fromEntries(
      repSelectedSampleNames.map((sample) => [sample, repAllGroupedSpectra[sample]])
    );
    const repSelectedSignatureNames = repPreferredSignatureNames.filter(
      (signature) => repAllReferenceSignatures[signature]
    );
    const repReferenceSignatures = Object.fromEntries(
      repSelectedSignatureNames.map((signature) => [
        signature,
        repAllReferenceSignatures[signature],
      ])
    );

    display(metrics([
      { label: "Samples", value: repSelectedSampleNames.length },
      { label: "Reference signatures", value: repSelectedSignatureNames.length },
      { label: "Burden cutoff", value: repMutationBurdenThreshold },
      {
        label: "Low-burden samples",
        value: repSelectedBurdenSamples.filter(
          (sample) => sample.totalMutations < repMutationBurdenThreshold
        ).length,
      },
      { label: "Exposure floor", value: repExposureThreshold },
    ]));
    display(table(
      burdenSampleRows(repAllBurden, repSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero contexts" },
        { key: "lowBurden", label: "Low burden flag" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 2. Export and round trip a SigProfiler-style matrix

    Interoperability matters because signature analysts often move between mSigSDK, SigProfiler, COSMIC tables, R/Bioconductor workflows, and supplemental tables. A round trip is a practical check that the exported matrix can be parsed back into the SDK's object shape.
  </script>

  <script type="module" pinned id="3">
    const repSigProfilerTsv = mSigSDK.io.exportSigProfilerMatrix(
      repGroupedSpectra,
      { contexts: repContexts }
    );
    const repRoundTripSpectra =
      mSigSDK.io.importSigProfilerMatrix(repSigProfilerTsv);

    const repTsvLines = repSigProfilerTsv.split("\n");
    display(metrics([
      { label: "Exported TSV lines", value: repTsvLines.length },
      { label: "Round-trip samples", value: Object.keys(repRoundTripSpectra).length },
      { label: "First column", value: repTsvLines[0].split("\t")[0] },
    ]));
    display(details("Preview first five TSV lines", repTsvLines.slice(0, 5).join("\n")));
  </script>

  <script type="text/markdown">
    ## 3. Use the high-level workflow helper

    The workflow helper performs fitting, validation, QC object creation, provenance, and report assembly in one call. Use this when you want a consistent result bundle. Use the lower-level functions when you need finer control over one step.
  </script>

  <script type="module" pinned id="4">
    const repWorkflowAnalysis =
      await mSigSDK.workflows.analyzeSpectraWithSignatures(
        repGroupedSpectra,
        repReferenceSignatures,
        {
          exposureThreshold: repExposureThreshold,
          expectedContexts: repContexts,
          mutationBurdenOptions: {
            lowBurdenThresholdMode: "fixed",
            lowBurdenThreshold: repMutationBurdenThreshold,
          },
          parameters: {
            dataset: `${repStudy} ${repCancerType}`,
            genomeDataType: repGenomeDataType,
            signatureSetName: repSignatureSetName,
            samples: repSelectedSampleNames,
            signatures: repSelectedSignatureNames,
            matrix: "SBS96",
          },
        }
      );

    display(metrics([
      { label: "Spectra validation", value: repWorkflowAnalysis.validation.spectra.valid ? "Pass" : "Review" },
      { label: "Signature validation", value: repWorkflowAnalysis.validation.signatures.valid ? "Pass" : "Review" },
      { label: "Report title", value: repWorkflowAnalysis.report.title },
      { label: "Provenance SDK version", value: repWorkflowAnalysis.provenance.sdk?.version || mSigSDK.version },
    ]));
    display(table(
      reconstructionRows(repWorkflowAnalysis.qc.reconstructionError),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
        { key: "rmse", label: "RMSE" },
      ]
    ));
    display(details("Full workflow analysis object", repWorkflowAnalysis));
  </script>

  <script type="text/markdown">
    ## 4. Assemble a report manually

    You can also build a report from individual pieces when you want full control over what gets included. This pattern is useful for notebooks, manuscripts, or applications where you want to keep the analysis result, parameters, SDK version, source URLs, and warnings together.
  </script>

  <script type="module" pinned id="5">
    const repProvenance = mSigSDK.provenance.createProvenance({
      analysis: "focused export report notebook",
      parameters: {
        sdkUrl: repSdkUrl,
        study: repStudy,
        genomeDataType: repGenomeDataType,
        cancerType: repCancerType,
        signatureSetName: repSignatureSetName,
        mutationBurdenThreshold: repMutationBurdenThreshold,
        exposureThreshold: repExposureThreshold,
      },
      sourceUrls: [
        repSdkUrl,
        "https://analysistools.cancer.gov/mutational-signatures/api/mutational_spectrum",
        "https://analysistools.cancer.gov/mutational-signatures/api/mutational_signature",
      ],
    });
    const repManualReport = mSigSDK.reports.createAnalysisReport({
      title: "Focused mSigSDK interoperability report",
      validation: repWorkflowAnalysis.validation,
      qc: repWorkflowAnalysis.qc,
      provenance: repProvenance,
    });

    display(metrics([
      { label: "Report title", value: repManualReport.title },
      { label: "Top-level fields", value: Object.keys(repManualReport).length },
      { label: "Generated at", value: repManualReport.generatedAt || "recorded" },
    ]));
    display(table(
      reportFieldRows(repManualReport),
      [
        { key: "field", label: "Report field" },
        { key: "summary", label: "Contents" },
      ]
    ));
    display(details("Full manual report object", repManualReport));
  </script>
</notebook>
