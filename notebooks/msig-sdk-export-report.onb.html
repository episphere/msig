    function setStatus(text, tone = "") {
      statusNode.textContent = text;
      statusNode.className = `packet-status ${tone}`.trim();
      statusHelpNode.textContent = STATUS_MESSAGES[text] || "The packet console is waiting for the next input.";
    }

    function formatBytes(text) {
      const bytes = new TextEncoder().encode(String(text || "")).length;
      if (bytes < 1024) return `${bytes} B`;
      return `${(bytes / 1024).toFixed(1)} KB`;
    }

    function totalMutations(record = {}) {
      return Object.values(record || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function makeCheck({ key, label, checked }, host, registry, onChange) {
      const wrapper = document.createElement("label");
      wrapper.className = "packet-check";
      const input = document.createElement("input");
      input.type = "checkbox";
      input.checked = checked;
      input.value = key;
      input.addEventListener("change", () => {
        onChange();
        updatePanelCounts();
      });
      const text = document.createElement("span");
      text.textContent = label;
      wrapper.append(input, text);
      registry[key] = input;
      host.append(wrapper);
    }

    function selectedKeys(registry) {
      return Object.entries(registry)
        .filter(([, input]) => input.checked)
        .map(([key]) => key);
    }

    function selectedSamples() {
      return selectedKeys(state.sampleInputs);
    }

    function selectedSections() {
      return new Set(selectedKeys(state.sectionInputs));
    }

    function selectedExports() {
      const keys = new Set(selectedKeys(state.exportInputs));
      return EXPORT_OPTIONS.filter((option) => keys.has(option.key));
    }

    function subsetMatrix(matrix, samples) {
      return Object.fromEntries(samples.map((sample) => [sample, matrix[sample]]).filter(([, value]) => value));
    }

    function hasContent(value) {
      if (value === null || value === undefined) return false;
      if (typeof value === "string") return value.trim().length > 0;
      if (Array.isArray(value)) return value.length > 0;
      if (typeof value === "object") return Object.keys(value).length > 0;
      return true;
    }

    function parseCsvLike(text) {
      const lines = String(text || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
      if (!lines.length) return [];
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(delimiter).map((header) => header.trim());
      return lines.slice(1).map((line) => {
        const values = line.split(delimiter);
        return Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]));
      });
    }

    function parseMetadata(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && typeof parsed === "object") {
          return Object.entries(parsed).map(([sample, fields]) => ({ sample, ...(fields || {}) }));
        }
      } catch (_error) {
        return parseCsvLike(trimmed);
      }
      return [];
    }

    function normalizeMetadata(metadata) {
      return (Array.isArray(metadata) ? metadata : [])
        .map((row) => ({
          ...row,
          sample: row.sample || row.Sample || row.sample_id || row.sampleId || row.id,
        }))
        .filter((row) => row.sample);
    }

    function parseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind === "spectra" ? "Spectra" : "Signature"} table is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Fall through to the matrix importers.
      }
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed)
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed);
    }

    function inferContexts(spectra, signatures) {
      const firstSpectrum = Object.values(spectra || {}).find((record) => record && typeof record === "object");
      if (firstSpectrum && Object.keys(firstSpectrum).length) return Object.keys(firstSpectrum);
      const firstSignature = Object.values(signatures || {}).find((record) => record && typeof record === "object");
      if (firstSignature && Object.keys(firstSignature).length) return Object.keys(firstSignature);
      return sbs96Contexts();
    }

    function validateMatrixObject(matrix, label) {
      if (!matrix || typeof matrix !== "object" || Array.isArray(matrix) || !Object.keys(matrix).length) {
        throw new Error(`${label} must be a non-empty object or importable table.`);
      }
      const firstRecord = Object.values(matrix).find((record) => record && typeof record === "object");
      if (!firstRecord || !Object.keys(firstRecord).length) {
        throw new Error(`${label} must contain at least one context-count record.`);
      }
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

    function setSourceMessage(text) {
      state.sourceMessage = text;
      sourceMessageNode.textContent = text;
    }

    function datasetShortLabel() {
      if (!state.dataset) return "Loading";
      if (state.dataset.selection?.study) return state.dataset.selection.study;
      return state.dataset.status || "User data";
    }

    function updatePanelCounts() {
      const sampleTotal = Object.keys(state.dataset?.spectra || {}).length;
      sourceCountNode.textContent = datasetShortLabel();
      setupCountNode.textContent = state.packet ? (state.packet.reviewCount ? "Review" : "Ready") : "Not built";
      sampleCountNode.textContent = `${selectedSamples().length}/${sampleTotal}`;
      sectionCountNode.textContent = `${selectedSections().size}/${SECTION_OPTIONS.length}`;
      exportCountNode.textContent = `${selectedExports().length}/${EXPORT_OPTIONS.length}`;
    }

    function metricGrid(rows) {
      const node = document.createElement("div");
      node.className = "packet-metrics";
      for (const row of rows) {
        const item = document.createElement("div");
        item.className = "packet-metric";
        const label = document.createElement("span");
        label.textContent = row.label;
        const value = document.createElement("strong");
        value.textContent = row.value;
        item.append(label, value);
        node.append(item);
      }
      return node;
    }

    function badge(value) {
      const node = document.createElement("span");
      node.className = `packet-badge ${String(value).toLowerCase() === "pass" ? "pass" : "review"}`;
      node.textContent = value;
      return node;
    }

    function statusGuide() {
      const node = document.createElement("div");
      node.className = "packet-status-guide";
      const title = document.createElement("strong");
      title.textContent = "Status guide";
      const pass = document.createElement("p");
      pass.textContent = "Pass means the selected packet was generated and the packet audit found the required fields, provenance, format round trip, and selected file inventory in order.";
      const review = document.createElement("p");
      review.textContent = "Review means the file is still generated, but the audit or warning table contains an item to inspect before using the packet as a final archive.";
      node.append(title, pass, review);
      return node;
    }

    function table(rows, columns) {
      const wrap = document.createElement("div");
      wrap.className = "packet-table-wrap";
      const node = document.createElement("table");
      node.className = "packet-table";
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      columns.forEach((column) => {
        const th = document.createElement("th");
        th.textContent = column.label;
        headRow.append(th);
      });
      thead.append(headRow);
      const tbody = document.createElement("tbody");
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        columns.forEach((column) => {
          const td = document.createElement("td");
          const value = row[column.key];
          if (column.badge) {
            td.append(badge(value));
          } else {
            td.textContent = String(value ?? "");
          }
          tr.append(td);
        });
        tbody.append(tr);
      });
      node.append(thead, tbody);
      wrap.append(node);
      return wrap;
    }

    function emptyState(text) {
      const node = document.createElement("p");
      node.className = "packet-empty";
      node.textContent = text;
      return node;
    }

    function markNeedsBuild() {
      state.needsBuild = true;
      if (!state.dataset) {
        setStatus("Data loading", "review");
        render();
        return;
      }
      if (state.packet) {
        setStatus("Updating", "review");
      }
      clearTimeout(buildTimer);
      buildTimer = setTimeout(() => {
        buildAnalysis().catch((error) => {
          setStatus("Build failed", "review");
          viewHost.replaceChildren(emptyState(error.message));
        });
      }, 350);
      updatePanelCounts();
      render();
    }

    function refreshPacketOnly() {
      if (state.analysis) {
        assemblePacket();
        state.needsBuild = false;
        setStatus(state.packet.reviewCount ? "Review needed" : "Packet ready", state.packet.reviewCount ? "review" : "ready");
      }
      updatePanelCounts();
      render();
    }

    function reportInputFromAnalysis() {
      const sections = selectedSections();
      const analysis = state.analysis.analysis;
      const lowBurdenRows = state.analysis.lowBurdenRows;
      return {
        title: titleInput.value.trim() || "mSigSDK signature fitting report",
        summary: `Report packet for ${state.analysis.selectedSamples.length} SBS96 sample(s) fitted against ${Object.keys(state.analysis.signatures).length} reference signatures.`,
        workflowRole: analysis.workflowRole,
        scopeStatement: analysis.scopeStatement,
        methodBasis: analysis.methodBasis,
        primaryInterpretationFields: analysis.primaryInterpretationFields,
        parameters: sections.has("parameters") ? analysis.parameters : null,
        validation: sections.has("validation") ? analysis.validation : null,
        qc: sections.has("qc") ? analysis.qc : null,
        exposures: sections.has("exposures") ? analysis.fit?.exposures : null,
        provenance: sections.has("provenance") ? analysis.provenance : null,
        citations: sections.has("notes") ? analysis.report?.citations || [] : [],
        notes: sections.has("notes")
          ? [
              ...(analysis.report?.notes || []),
              ...lowBurdenRows.map((row) => `${row.sample} has ${row.mutations} mutations, below the selected review cutoff.`),
            ]
          : [],
      };
    }

    function makeFile(key, filename, text, type = "text", value = null) {
      return {
        key,
        filename,
        text,
        type,
        value,
        size: formatBytes(type === "json" ? JSON.stringify(value, null, 2) : text),
        purpose: FILE_PURPOSES[key],
      };
    }

    function assemblePacket() {
      const { analysis, spectra, selectedSamples: samples } = state.analysis;
      const report = mSigSDK.reports.createAnalysisReport(reportInputFromAnalysis());
      const reportJsonText = JSON.stringify(report, null, 2);
      const reportHtml = mSigSDK.reports.createAnalysisReportHTML(report);
      const spectraTsv = mSigSDK.io.exportSigProfilerMatrix(spectra, { contexts: state.dataset.contexts });
      const roundTrip = mSigSDK.io.importSigProfilerMatrix(spectraTsv);
      const exposureTableRows = exposureRows(analysis.fit?.exposures, { minExposure: 0, topN: 1000 });
      const exposuresCsv = rowsToCsv(exposureTableRows);

      const auditRows = REQUIRED_FIELDS.map((field) => ({
        item: FIELD_LABELS[field] || field,
        status: hasContent(report[field]) ? "Pass" : "Review",
        detail: hasContent(report[field]) ? summarizeField(report[field]) : "Not included",
      }));
      auditRows.push(
        {
          item: "Spectra TSV",
          status: Object.keys(roundTrip).length === samples.length ? "Pass" : "Review",
          detail: `${Object.keys(roundTrip).length} of ${samples.length} selected sample(s) parse back`,
        },
        {
          item: "Exposures CSV",
          status: exposureTableRows.length ? "Pass" : "Review",
          detail: `${exposureTableRows.length} exposure row(s)`,
        }
      );

      const warningRows = [
        ...state.analysis.lowBurdenRows.map((row) => ({
          level: "Review",
          item: row.sample,
          detail: `${row.mutations} mutations is below the selected cutoff`,
        })),
        ...(analysis.warnings || []).map((warning) => ({
          level: "Review",
          item: warning.code || "Workflow warning",
          detail: warning.message || String(warning),
        })),
      ];

      const reviewCount = auditRows.filter((row) => row.status !== "Pass").length + warningRows.length;
      const manifestRows = selectedExports().map((option) => ({
        file: option.filename,
        purpose: FILE_PURPOSES[option.key],
        samples: samples.length,
        status: reviewCount ? "Review" : "Pass",
      }));
      const manifestCsv = rowsToCsv(manifestRows);

      const fileMap = {
        reportJson: makeFile("reportJson", "analysis_report.json", reportJsonText, "json", report),
        reportHtml: makeFile("reportHtml", "analysis_report.html", reportHtml),
        manifestCsv: makeFile("manifestCsv", "packet_manifest.csv", manifestCsv),
        spectraTsv: makeFile("spectraTsv", "spectra.tsv", spectraTsv),
        exposuresCsv: makeFile("exposuresCsv", "exposures.csv", exposuresCsv),
        runRecordJson: makeFile("runRecordJson", "run_record.json", JSON.stringify(analysis.provenance, null, 2), "json", analysis.provenance),
      };

      state.packet = {
        report,
        reportHtml,
        auditRows,
        warningRows: warningRows.length ? warningRows : [{ level: "Info", item: "Warnings", detail: "No packet warnings generated" }],
        reviewCount,
        manifestRows,
        exposureTableRows,
        fileMap,
        files: selectedExports().map((option) => fileMap[option.key]).filter(Boolean),
      };
    }

    function summarizeField(value) {
      if (Array.isArray(value)) return `${value.length} item(s)`;
      if (value && typeof value === "object") return `${Object.keys(value).length} field(s)`;
      if (typeof value === "string") return value.length > 48 ? `${value.slice(0, 45)}...` : value;
      return "Recorded";
    }

    function renderSampleControls() {
      sampleHost.replaceChildren();
      state.sampleInputs = {};
      Object.keys(state.dataset?.spectra || {}).forEach((sample) => {
        makeCheck(
          {
            key: sample,
            label: `${sample} (${formatNumber(totalMutations(state.dataset.spectra[sample]))})`,
            checked: true,
          },
          sampleHost,
          state.sampleInputs,
          markNeedsBuild
        );
      });
      updatePanelCounts();
    }

    function setDataset(dataset, message) {
      const spectra = JSON.parse(JSON.stringify(dataset.spectra || {}));
      const signatures = JSON.parse(JSON.stringify(dataset.signatures || {}));
      validateMatrixObject(spectra, "Spectra");
      validateMatrixObject(signatures, "Signatures");
      const contexts = dataset.contexts?.length ? [...dataset.contexts] : inferContexts(spectra, signatures);
      state.dataset = {
        ...dataset,
        spectra,
        signatures,
        metadata: normalizeMetadata(dataset.metadata),
        contexts,
        selection: {
          signatureSetName: "User supplied signatures",
          ...(dataset.selection || {}),
        },
        status: dataset.status || "user supplied",
        source: dataset.source || "browser-local input",
      };
      state.analysis = null;
      state.packet = null;
      state.needsBuild = true;
      renderSampleControls();
      setSourceMessage(message || `${Object.keys(spectra).length} sample(s), ${Object.keys(signatures).length} signature(s), and ${contexts.length} context(s) are active.`);
      updatePanelCounts();
      render();
    }

    async function loadDefaultDataset() {
      setStatus("Data loading", "review");
      setSourceMessage("Loading the default public SBS96 dataset and reference signatures.");
      publicDataButton.disabled = true;
      try {
        const dataset = await loadPublicSbs96Dataset(mSigSDK, {
          study: "PCAWG",
          genomeDataType: "WGS",
          cancerType: "Lung-AdenoCA",
          mutationType: "SBS",
          matrixSize: 96,
          signatureSetName: "COSMIC_v3_Signatures_GRCh37_SBS96",
          sampleNames: ["SP50611", "SP50592", "SP52284", "SP50406", "SP55004"],
          sampleLimit: 5,
          signatureNames: null,
          allowAlternate: true,
          allowDemoFallback: true,
        });
        setDataset(dataset, `${dataset.source}. ${Object.keys(dataset.spectra).length} sample(s) are selected for the packet.`);
        setStatus("Building", "review");
        await buildAnalysis();
      } finally {
        publicDataButton.disabled = false;
      }
    }

    async function applyCustomDataset() {
      setStatus("Checking data", "review");
      applyCustomButton.disabled = true;
      try {
        const spectra = parseMatrix(spectraInput.value, "spectra");
        const signatures = parseMatrix(signaturesInput.value, "signatures");
        const metadata = parseMetadata(metadataInput.value);
        const contexts = inferContexts(spectra, signatures);
        setDataset(
          {
            spectra,
            signatures,
            metadata,
            contexts,
            source: "browser-local input",
            status: "user supplied",
            selection: {
              study: "User supplied",
              cancerType: "not specified",
              genomeDataType: "SBS96",
              mutationType: "SBS",
              matrixSize: contexts.length,
              signatureSetName: "User supplied signatures",
              sampleNames: Object.keys(spectra),
              signatureNames: Object.keys(signatures),
            },
          },
          `${Object.keys(spectra).length} user-supplied sample(s), ${Object.keys(signatures).length} signature(s), and ${metadata.length} sample-detail row(s) are active.`
        );
        setStatus("Building", "review");
        await buildAnalysis();
      } catch (error) {
        setStatus("Input review", "review");
        setSourceMessage(error.message);
        viewHost.replaceChildren(emptyState(error.message));
      } finally {
        applyCustomButton.disabled = false;
      }
    }

    function bindFileInput(input, target, label) {
      input.addEventListener("change", async () => {
        if (!input.files?.[0]) return;
        try {
          target.value = await readFileAsText(input.files[0]);
          setSourceMessage(`${label} loaded from ${input.files[0].name}. Apply my data to rebuild the packet.`);
        } catch (error) {
          setStatus("Input review", "review");
          setSourceMessage(error.message);
        }
      });
    }

    async function buildAnalysis() {
      if (!state.dataset) {
        setStatus("Data loading", "review");
        return;
      }
      const samples = selectedSamples();
      if (!samples.length) {
        setStatus("Select a sample", "review");
        updatePanelCounts();
        return;
      }
      const burdenCutoff = Math.max(1, Number(burdenCutoffInput.value || 1));
      const spectra = subsetMatrix(state.dataset.spectra, samples);
      const signatures = state.dataset.signatures;
      const analysis = await mSigSDK.workflows.analyzeSpectraWithSignatures(spectra, signatures, {
        exposureThreshold: 0.01,
        expectedContexts: state.dataset.contexts,
        mutationBurdenOptions: {
          lowBurdenThresholdMode: "fixed",
          lowBurdenThreshold: burdenCutoff,
        },
        parameters: {
          packetTitle: titleInput.value.trim() || "mSigSDK signature fitting report",
          dataset: state.dataset.source,
          samples,
          signatureSetName: state.dataset.selection?.signatureSetName,
          matrix: state.dataset.contexts?.length === 96 ? "SBS96" : `${state.dataset.contexts?.length || 0} contexts`,
          mutationCountReviewCutoff: burdenCutoff,
          metadataRows: state.dataset.metadata?.length || 0,
        },
        catalogVersion: state.dataset.selection?.signatureSetName,
        catalogSource: state.dataset.source,
        reportFormat: "object",
      });
      const lowBurdenRows = samples
        .map((sample) => ({
          sample,
          mutations: totalMutations(spectra[sample]),
          status: totalMutations(spectra[sample]) < burdenCutoff ? "Review" : "Pass",
        }))
        .filter((row) => row.status === "Review");

      state.analysis = { analysis, spectra, signatures, selectedSamples: samples, lowBurdenRows, burdenCutoff };
      assemblePacket();
      state.needsBuild = false;
      setStatus(state.packet.reviewCount ? "Review needed" : "Packet ready", state.packet.reviewCount ? "review" : "ready");
      updatePanelCounts();
      render();
    }

    function renderTabs() {
      const tabs = [
        ["summary", "Summary"],
        ["audit", "Audit"],
        ["files", "Files"],
        ["preview", "Preview"],
      ];
      tabsHost.replaceChildren();
      tabs.forEach(([key, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `packet-tab${state.activeView === key ? " active" : ""}`;
        button.textContent = label;
        button.addEventListener("click", () => {
          state.activeView = key;
          render();
        });
        tabsHost.append(button);
      });
    }

    function renderSummary() {
      viewHost.replaceChildren();
      if (!state.dataset) {
        viewHost.append(emptyState("Loading dataset."));
        return;
      }
      updatePanelCounts();
      const selected = selectedSamples();
      viewHost.append(metricGrid([
        { label: "Source", value: state.dataset.status },
        { label: "Selected samples", value: selected.length },
        { label: "Reference signatures", value: Object.keys(state.dataset.signatures || {}).length },
        { label: "Selected files", value: selectedExports().length },
        { label: "Review items", value: state.packet ? state.packet.reviewCount : "-" },
      ]));
      viewHost.append(table([
        {
          step: "Data",
          action: state.dataset.source,
          output: `${Object.keys(state.dataset.spectra || {}).length} sample(s), ${Object.keys(state.dataset.signatures || {}).length} signature(s), ${state.dataset.contexts?.length || 0} context(s)`,
        },
        {
          step: "Build",
          action: "Run analyzeSpectraWithSignatures on the selected samples",
          output: state.analysis ? `${state.analysis.selectedSamples.length} sample fit(s) complete` : "Waiting for packet build",
        },
        {
          step: "Audit",
          action: "Check required report fields, provenance, warnings, and format round trip",
          output: state.packet ? `${state.packet.reviewCount} review item(s)` : "Audit not built",
        },
        {
          step: "Download",
          action: "Create only the selected archive files",
          output: state.packet ? `${state.packet.files.length} file(s) ready` : "Downloads hidden until build",
        },
      ], [
        { key: "step", label: "Step" },
        { key: "action", label: "What happens" },
        { key: "output", label: "Current state" },
      ]));
      const sampleRows = selected.map((sample) => ({
        sample,
        mutations: formatNumber(totalMutations(state.dataset.spectra[sample])),
        status: state.analysis?.lowBurdenRows.some((row) => row.sample === sample) ? "Review" : "Pass",
      }));
      viewHost.append(table(sampleRows, [
        { key: "sample", label: "Sample" },
        { key: "mutations", label: "Mutations" },
        { key: "status", label: "Status", badge: true },
      ]));
      if (state.needsBuild) {
        viewHost.append(emptyState("Build the packet to create the audit and download inventory."));
      }
    }

    function renderAudit() {
      viewHost.replaceChildren();
      if (!state.packet) {
        viewHost.append(emptyState("Build the packet to populate the audit."));
        return;
      }
      viewHost.append(metricGrid([
        { label: "Required fields", value: REQUIRED_FIELDS.length },
        { label: "Review items", value: state.packet.reviewCount },
        { label: "Files selected", value: state.packet.files.length },
      ]));
      viewHost.append(statusGuide());
      viewHost.append(table(state.packet.auditRows, [
        { key: "item", label: "Audit item" },
        { key: "status", label: "Status", badge: true },
        { key: "detail", label: "Detail" },
      ]));
      viewHost.append(table(state.packet.warningRows, [
        { key: "level", label: "Level" },
        { key: "item", label: "Item" },
        { key: "detail", label: "Detail" },
      ]));
    }

    function makeDownloadLink(file) {
      const link = file.type === "json"
        ? downloadJson(file.filename, file.value, file.filename)
        : downloadText(file.filename, file.text, file.filename);
      link.className = "packet-download-link";
      return link;
    }

    function renderFiles() {
      viewHost.replaceChildren();
      if (!state.packet) {
        viewHost.append(emptyState("Build the packet to create downloads."));
        return;
      }
      const grid = document.createElement("div");
      grid.className = "packet-file-grid";
      state.packet.files.forEach((file) => {
        const item = document.createElement("article");
        item.className = "packet-file";
        const title = document.createElement("strong");
        title.textContent = file.filename;
        const purpose = document.createElement("span");
        purpose.textContent = file.purpose;
        const size = document.createElement("span");
        size.textContent = file.size;
        item.append(title, purpose, size, makeDownloadLink(file));
        grid.append(item);
      });
      viewHost.append(grid);
      viewHost.append(statusGuide());
      viewHost.append(table(state.packet.manifestRows, [
        { key: "file", label: "File" },
        { key: "purpose", label: "Purpose" },
        { key: "samples", label: "Samples" },
        { key: "status", label: "Status", badge: true },
      ]));
    }

    function renderPreview() {
      viewHost.replaceChildren();
      if (!state.packet) {
        viewHost.append(emptyState("Build the packet to preview selected artifacts."));
        return;
      }
      const tools = document.createElement("div");
      tools.className = "packet-preview-tools";
      const select = document.createElement("select");
      select.className = "packet-select";
      state.packet.files.forEach((file) => {
        const option = document.createElement("option");
        option.value = file.key;
        option.textContent = file.filename;
        select.append(option);
      });
      if (!state.packet.files.some((file) => file.key === state.activePreview)) {
        state.activePreview = state.packet.files[0]?.key || "reportJson";
      }
      select.value = state.activePreview;
      select.addEventListener("change", () => {
        state.activePreview = select.value;
        renderPreview();
      });
      tools.append(select);
      viewHost.append(tools);

      const file = state.packet.fileMap[state.activePreview] || state.packet.files[0];
      const box = document.createElement("div");
      box.className = "packet-preview-box";
      if (file.key === "reportHtml") {
        const frame = document.createElement("iframe");
        frame.title = "Report HTML preview";
        frame.srcdoc = state.packet.reportHtml;
        box.append(frame);
      } else if (file.key === "exposuresCsv") {
        box.append(table(state.packet.exposureTableRows.slice(0, 18), [
          { key: "sample", label: "Sample" },
          { key: "signature", label: "Signature" },
          { key: "exposure", label: "Exposure" },
        ]));
      } else if (file.key === "manifestCsv") {
        box.append(table(state.packet.manifestRows, [
          { key: "file", label: "File" },
          { key: "purpose", label: "Purpose" },
          { key: "status", label: "Status", badge: true },
        ]));
        box.prepend(statusGuide());
      } else if (file.key === "spectraTsv") {
        const rows = state.analysis.selectedSamples.map((sample) => ({
          sample,
          mutations: formatNumber(totalMutations(state.analysis.spectra[sample])),
          contexts: Object.keys(state.analysis.spectra[sample] || {}).length,
        }));
        box.append(table(rows, [
          { key: "sample", label: "Sample" },
          { key: "mutations", label: "Mutations" },
          { key: "contexts", label: "Contexts" },
        ]));
      } else if (file.key === "runRecordJson") {
        const provenance = state.analysis.analysis.provenance;
        box.append(table([
          { field: "Generated", value: provenance.generatedAt },
          { field: "SDK", value: `${provenance.sdk?.name || "mSigSDK"} ${provenance.sdk?.version || ""}` },
          { field: "Analysis", value: provenance.analysis },
          { field: "Source URLs", value: provenance.sourceUrls?.length || 0 },
          { field: "Runtime", value: provenance.runtime?.platform || "browser" },
        ], [
          { key: "field", label: "Field" },
          { key: "value", label: "Value" },
        ]));
      } else {
        const report = state.packet.report;
        box.append(table([
          { field: "Title", value: report.title },
          { field: "Schema", value: report.schemaVersion },
          { field: "Generated", value: report.generatedAt },
          { field: "Top-level fields", value: Object.keys(report).length },
          { field: "Citations", value: report.citations?.length || 0 },
          { field: "Notes", value: report.notes?.length || 0 },
        ], [
          { key: "field", label: "Field" },
          { key: "value", label: "Value" },
        ]));
      }
      viewHost.append(box);
    }

    function render() {
      renderTabs();
      if (state.activeView === "audit") return renderAudit();
      if (state.activeView === "files") return renderFiles();
      if (state.activeView === "preview") return renderPreview();
      return renderSummary();
    }

    async function initialize() {
      setStatus("Data loading", "review");
      viewHost.replaceChildren(emptyState("Loading dataset."));
      SECTION_OPTIONS.forEach((option) => {
        makeCheck(option, sectionHost, state.sectionInputs, refreshPacketOnly);
      });
      EXPORT_OPTIONS.forEach((option) => {
        makeCheck(option, exportHost, state.exportInputs, refreshPacketOnly);
      });
      bindFileInput(spectraFileInput, spectraInput, "Spectra table");
      bindFileInput(signaturesFileInput, signaturesInput, "Signature catalog");
      bindFileInput(metadataFileInput, metadataInput, "Sample details");
      publicDataButton.addEventListener("click", () => {
        loadDefaultDataset().catch((error) => {
          setStatus("Data failed", "review");
          setSourceMessage(error.message);
          viewHost.replaceChildren(emptyState(error.message));
        });
      });
      applyCustomButton.addEventListener("click", applyCustomDataset);
      titleInput.addEventListener("input", refreshPacketOnly);
      burdenCutoffInput.addEventListener("change", markNeedsBuild);
      buildButton.addEventListener("click", async () => {
        buildButton.disabled = true;
        buildButton.textContent = "Building...";
        setStatus("Building", "review");
        try {
          await buildAnalysis();
        } catch (error) {
          setStatus("Build failed", "review");
          viewHost.replaceChildren(emptyState(error.message));
        } finally {
          buildButton.disabled = false;
          buildButton.textContent = state.analysis ? "Refresh packet" : "Build packet";
        }
      });
      updatePanelCounts();
      await loadDefaultDataset();
      buildButton.textContent = "Refresh packet";
    }

    initialize().catch((error) => {
      setStatus("Data failed", "review");
      viewHost.replaceChildren(emptyState(error.message));
    });
  </script>
</notebook>
