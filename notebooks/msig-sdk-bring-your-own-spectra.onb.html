<!doctype html>
<notebook theme="air">
  <title>mSigSDK bring your own spectra</title>

  <script type="text/markdown">
    # Bring your own spectra

    A researcher often begins with spectra that already exist outside mSigPortal: a private cohort, a collaborator's matrix, a pipeline export, or a pasted supplemental table. The workflow here keeps those spectra local, validates the matrix shape, fits a reference catalog, checks whether the fit is interpretable, and exports the files needed to reproduce the result.

    Walk through the cells in order. First confirm that the input objects have the expected sample-by-context and signature-by-context shapes. Then inspect validation and burden before reading exposures. Finally, save the report and provenance bundle so the same result can be checked outside the browser.
  </script>

  <script type="module" pinned id="1">
    const localSdkUrl = new URL("../main.js?v=2026-05-14-local-spectra", location.href).href;
    const { mSigSDK } = await import(localSdkUrl);
    const {
      demoMetadata,
      demoSignatures,
      demoSpectra,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const { details, exposureRows, metrics, reconstructionRows, table } = mSigSDK.presentation;

    const localContexts = sbs96Contexts();
    const localSpectra = demoSpectra();
    const localSignatures = demoSignatures();
    const localMetadata = demoMetadata;
    const localMutationBurdenThreshold = 100;
    const localExposureThreshold = 0.01;

    display(metrics([
      { label: "Input source", value: "Local spectra object" },
      { label: "Samples", value: Object.keys(localSpectra).length },
      { label: "Signatures", value: Object.keys(localSignatures).length },
      { label: "Matrix", value: "SBS96" },
    ]));
  </script>

  <script type="text/markdown">
    ## Step 1. Replace the example matrices with project inputs

    The first decision is whether the incoming matrix is already in the shape mSigSDK expects. `localSpectra` should be keyed by sample name, with one SBS96 count for each context. `localSignatures` should be keyed by signature name, with one proportion for each matching context. The metadata table is optional, but it preserves cohort labels, assay labels, or clinical groups for later review.

    Before changing any analysis parameters, replace only the input objects and confirm that the template table still describes the project accurately. A confusing result at this stage usually means the matrix is transposed, normalized when counts are expected, or missing contexts.
  </script>

  <script type="module" pinned id="2">
    display(table(
      [
        { field: "Spectra", value: "{ sample: { 'A[C>A]A': count, ... } }" },
        { field: "Signatures", value: "{ signature: { 'A[C>A]A': proportion, ... } }" },
        { field: "Metadata", value: "Array of sample-level records with a sample column" },
        { field: "Minimum checks", value: "validateSpectra, summarizeMutationBurden, reconstruction error, residual review" },
        { field: "Outputs to save", value: "spectra TSV, exposures CSV, QC JSON, report JSON, provenance JSON" },
      ],
      [
        { key: "field", label: "Project item" },
        { key: "value", label: "Required shape or action" },
      ]
    ));
    display(details("Local spectra template", {
      localSpectra,
      localSignatures,
      localMetadata,
    }));
  </script>

  <script type="text/markdown">
    ## Step 2. Validate the matrix before interpreting exposures

    Validation answers whether the spectra and signatures can be compared at all. The workflow checks context coverage, mutation burden, reconstruction quality, warnings, recommended actions, and report fields in one object. Low-burden samples remain visible because silent filtering can hide exactly the samples that need caveats.

    Read the reconstruction table before the exposure table. A large exposure to a named signature is not useful if the fitted spectrum does not reconstruct the observed spectrum well.
  </script>

  <script type="module" pinned id="3">
    const localAnalysis = await mSigSDK.workflows.runCohortFit(
      {
        spectra: localSpectra,
        signatures: localSignatures,
        metadata: localMetadata,
      },
      {
        contexts: localContexts,
        groupKey: "group",
        exposureThreshold: localExposureThreshold,
        lowBurdenThreshold: localMutationBurdenThreshold,
        runBootstrap: false,
        runThresholdSensitivity: true,
        reportFormat: "object",
      }
    );

    display(metrics([
      { label: "Workflow", value: localAnalysis.workflow },
      { label: "Warnings", value: localAnalysis.warnings.length },
      { label: "Recommended actions", value: localAnalysis.recommendedActions.length },
      { label: "Report fields", value: Object.keys(localAnalysis.report || {}).length },
    ]));
    display(table(
      reconstructionRows(localAnalysis.fit.reconstructionError),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
        { key: "rmse", label: "RMSE" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      exposureRows(localAnalysis.fit.exposures, { minExposure: 0, topN: 12 }),
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      { maxRows: 12 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 3. Interpret warnings and recommended actions

    Exposures are estimates, not final conclusions. The warnings and recommended actions explain whether the matrix had low burden, weak reconstruction, catalog limitations, or other issues that should be carried into a report. Treat this section as the handoff from computation to interpretation.

    If this section contains warnings, adapt the workflow by changing the catalog, reviewing low-burden samples separately, or adding uncertainty analysis before reporting signature activity.
  </script>

  <script type="module" pinned id="4">
    display(table(
      warningRows(localAnalysis.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ],
      { maxRows: 10 }
    ));
    display(table(
      (localAnalysis.recommendedActions || []).map((action) => ({ action })),
      [{ key: "action", label: "Recommended action" }],
      { maxRows: 10 }
    ));
    display(table(
      publicationFigureRows(localAnalysis.publicationFigures),
      [
        { key: "id", label: "Figure id" },
        { key: "title", label: "Title" },
        { key: "renderer", label: "Renderer" },
        { key: "dataFields", label: "Data fields" },
      ],
      { maxRows: 10 }
    ));
    display(details("Fit-quality evidence", localAnalysis.fitQualityEvidence, { open: true }));
  </script>

  <script type="text/markdown">
    ## Step 4. Export a reproducible local-analysis bundle

    The reusable output is not just an exposure table. A complete bundle includes the input spectra, fitted exposures, QC and report objects, provenance, and the fitting parameters. Saving these files makes the analysis portable across a local script, a manuscript supplement, or another review application.
  </script>

  <script type="module" pinned id="5">
    const localExposureCsv = rowsToCsv(
      exposureRows(localAnalysis.fit.exposures, { minExposure: 0, topN: 100 }),
      [
        { key: "sample", label: "sample" },
        { key: "signature", label: "signature" },
        { key: "exposure", label: "relative_exposure" },
      ]
    );
    display(downloadMany([
      {
        filename: "local_sbs96_spectra.tsv",
        text: spectraMatrixToTsv(localSpectra, localContexts),
        label: "Download spectra TSV",
      },
      {
        filename: "local_signature_exposures.csv",
        text: localExposureCsv,
        label: "Download exposures CSV",
      },
      {
        filename: "local_msig_qc_report.json",
        type: "json",
        value: {
          validation: localAnalysis.validation,
          fitQualityEvidence: localAnalysis.fitQualityEvidence,
          warnings: localAnalysis.warnings,
          recommendedActions: localAnalysis.recommendedActions,
          report: localAnalysis.report,
          provenance: localAnalysis.provenance,
          parameters: localAnalysis.parameters,
        },
        label: "Download report JSON",
      },
    ]));
  </script>
</notebook>
