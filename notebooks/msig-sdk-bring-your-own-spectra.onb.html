<!doctype html>
<notebook theme="air">
  <title>mSigSDK bring your own spectra</title>

  <script type="text/markdown">
    # Bring your own spectra

    A researcher often begins with spectra that already exist outside mSigPortal: a private cohort, a collaborator's table, a pipeline export, or a pasted supplemental table. The workflow here keeps those spectra local, checks the table shape, fits a reference catalog, checks whether the fit is interpretable, and exports the files needed to reproduce the result.

    Walk through the cells in order. First confirm that the input objects have the expected sample-by-context and signature-by-context shapes. Then inspect input checks and mutation counts before reading signature contributions. Finally, save the report and run-record bundle so the same result can be checked outside the browser.
  </script>

  <script type="module" pinned id="1">
    const localSdkUrl = new URL("../main.js?v=2026-05-14-local-spectra", location.href).href;
    const { mSigSDK } = await import(localSdkUrl);
    const {
      demoMetadata,
      demoSignatures,
      demoSpectra,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const { details, exposureRows, metrics, reconstructionRows, table } = mSigSDK.presentation;

    const localContexts = sbs96Contexts();
    const localSpectra = demoSpectra();
    const localSignatures = demoSignatures();
    const localMetadata = demoMetadata;
    const localMutationBurdenThreshold = 100;
    const localExposureThreshold = 0.01;

    display(metrics([
      { label: "Input source", value: "Local spectra object" },
      { label: "Samples", value: Object.keys(localSpectra).length },
      { label: "Signatures", value: Object.keys(localSignatures).length },
      { label: "Table type", value: "SBS96" },
    ]));
  </script>

  <script type="text/markdown">
    ## Interactive workspace

    Use this workspace to load sample data, paste or upload your own data, adjust settings, run the notebook workflow, inspect visual results, and download the exact files produced by your settings.
  </script>

  <script type="module" pinned id="interactive-workspace">
    const { renderInteractiveNotebook } = await import("./msig-notebook-interactive.js?v=2026-05-15-all-notebooks");
    renderInteractiveNotebook({ mode: "bring-your-own-spectra", mSigSDK, display });
  </script>

  <script type="text/markdown">
    ## Step 1. Replace the example tables with project inputs

    The first decision is whether the incoming table is already in the shape mSigSDK expects. `localSpectra` should be keyed by sample name, with one SBS96 count for each context. `localSignatures` should be keyed by signature name, with one proportion for each matching context. The sample-details table is optional, but it preserves cohort labels, assay labels, or clinical groups for later review.

    Before changing any analysis settings, replace only the input objects and confirm that the template table still describes the project accurately. A confusing result at this stage usually means the table is transposed, normalized when counts are expected, or missing contexts.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "bring-your-own-spectra", step: 1, phase: "data", title: "Step 1. Replace the example tables with project inputs", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    display(table(
      [
        { field: "Spectra", value: "{ sample: { 'A[C>A]A': count, ... } }" },
        { field: "Signatures", value: "{ signature: { 'A[C>A]A': proportion, ... } }" },
        { field: "Sample details", value: "Array of sample-level records with a sample column" },
        { field: "Minimum checks", value: "validateSpectra, summarizeMutationBurden, reconstruction error, residual review" },
        { field: "Outputs to save", value: "spectra TSV, signature contributions CSV, quality-check JSON, report JSON, run-record JSON" },
      ],
      [
        { key: "field", label: "Project item" },
        { key: "value", label: "Required shape or action" },
      ]
    ));
    display(details("Local spectra template", {
      localSpectra,
      localSignatures,
      localMetadata,
    }));
  </script>

  <script type="text/markdown">
    ## Step 2. Check the table before interpreting signature contributions

    Input checking answers whether the spectra and signatures can be compared at all. The workflow checks context coverage, mutation counts, reconstruction quality, warnings, suggested review steps, and report fields in one object. Low-count samples remain visible because silent filtering can hide exactly the samples that need caveats.

    Read the reconstruction table before the signature contribution table. A large contribution from a named signature is not useful if the fitted spectrum does not reconstruct the observed spectrum well.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "bring-your-own-spectra", step: 2, phase: "review", title: "Step 2. Check the table before interpreting signature contributions", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const localAnalysis = await mSigSDK.workflows.runCohortFit(
      {
        spectra: localSpectra,
        signatures: localSignatures,
        metadata: localMetadata,
      },
      {
        contexts: localContexts,
        groupKey: "group",
        exposureThreshold: localExposureThreshold,
        lowBurdenThreshold: localMutationBurdenThreshold,
        runBootstrap: false,
        runThresholdSensitivity: true,
        reportFormat: "object",
      }
    );

    display(metrics([
      { label: "Workflow", value: localAnalysis.workflow },
      { label: "Warnings", value: localAnalysis.warnings.length },
      { label: "Recommended actions", value: localAnalysis.recommendedActions.length },
      { label: "Report fields", value: Object.keys(localAnalysis.report || {}).length },
    ]));
    display(table(
      reconstructionRows(localAnalysis.fit.reconstructionError),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
        { key: "rmse", label: "RMSE" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      exposureRows(localAnalysis.fit.exposures, { minExposure: 0, topN: 12 }),
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      { maxRows: 12 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 3. Interpret warnings and recommended actions

    Signature contributions are estimates, not final conclusions. The warnings and suggested review steps explain whether the table had low counts, weak reconstruction, catalog limitations, or other issues that should be carried into a report. Treat this section as the bridge from computation to interpretation.

    If this section contains warnings, adapt the workflow by changing the catalog, reviewing low-count samples separately, or adding uncertainty analysis before reporting signature activity.
  </script>

  <script type="module" pinned id="interactive-step-3">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "bring-your-own-spectra", step: 3, phase: "review", title: "Step 3. Interpret warnings and recommended actions", mSigSDK, display });
  </script>

  <script type="module" pinned id="4">
    display(table(
      warningRows(localAnalysis.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ],
      { maxRows: 10 }
    ));
    display(table(
      (localAnalysis.recommendedActions || []).map((action) => ({ action })),
      [{ key: "action", label: "Recommended action" }],
      { maxRows: 10 }
    ));
    display(table(
      publicationFigureRows(localAnalysis.publicationFigures),
      [
        { key: "id", label: "Figure id" },
        { key: "title", label: "Title" },
        { key: "renderer", label: "Renderer" },
        { key: "dataFields", label: "Data fields" },
      ],
      { maxRows: 10 }
    ));
    display(details("Fit-quality evidence", localAnalysis.fitQualityEvidence, { open: true }));
  </script>

  <script type="text/markdown">
    ## Step 4. Export a reproducible local-analysis bundle

    The reusable output is not just a signature contribution table. A complete bundle includes the input spectra, fitted contributions, quality-check and report objects, a run record, and the fitting settings. Saving these files makes the analysis portable across a local script, a manuscript supplement, or another review application.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "bring-your-own-spectra", step: 4, phase: "export", title: "Step 4. Export a reproducible local-analysis bundle", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    const localExposureCsv = rowsToCsv(
      exposureRows(localAnalysis.fit.exposures, { minExposure: 0, topN: 100 }),
      [
        { key: "sample", label: "sample" },
        { key: "signature", label: "signature" },
        { key: "exposure", label: "relative_exposure" },
      ]
    );
    display(downloadMany([
      {
        filename: "local_sbs96_spectra.tsv",
        text: spectraMatrixToTsv(localSpectra, localContexts),
        label: "Download spectra TSV",
      },
      {
        filename: "local_signature_exposures.csv",
        text: localExposureCsv,
        label: "Download signature contributions CSV",
      },
      {
        filename: "local_msig_qc_report.json",
        type: "json",
        value: {
          validation: localAnalysis.validation,
          fitQualityEvidence: localAnalysis.fitQualityEvidence,
          warnings: localAnalysis.warnings,
          recommendedActions: localAnalysis.recommendedActions,
          report: localAnalysis.report,
          provenance: localAnalysis.provenance,
          parameters: localAnalysis.parameters,
        },
        label: "Download report JSON",
      },
    ]));
  </script>
</notebook>
