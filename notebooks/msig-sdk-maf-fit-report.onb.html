<!doctype html>
<notebook theme="air">
  <title>mSigSDK MAF to report</title>

  <script type="text/markdown">
    # MAF to report

    Many projects start from variant rows rather than a finished signature table. This workflow converts local MAF-like rows into SBS96 spectra, checks whether the conversion preserved the expected SNV counts, fits a compatible reference catalog, reviews quality-check evidence, renders plots, and exports report-ready objects.

    The example uses row-supplied trinucleotide contexts so it runs without a genome sequence request. In a production pipeline, the same checkpoints apply after genome-backed context annotation: count reconciliation first, fitting second, interpretation third.
  </script>

  <script type="module" pinned id="1">
    const mafSdkUrl = new URL("../main.js?v=2026-05-14-maf-workflow", location.href).href;
    const { mSigSDK } = await import(mafSdkUrl);
    const {
      demoMafRows,
      demoSignatures,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const {
      exposureRows,
      metrics,
      reconstructionRows,
      table,
    } = mSigSDK.presentation;

    const mafContexts = sbs96Contexts();
    const mafRows = demoMafRows;
    const mafSignatures = demoSignatures();
    const mafOptions = {
      groupBy: "project_code",
      genome: "hg19",
      offline: true,
      contextSource: "row-supplied trinucleotide context field",
      exposureThreshold: 0.01,
    };

    display(metrics([
      { label: "Rows", value: mafRows.length },
      { label: "Context mode", value: "offline row-supplied contexts" },
      { label: "Grouping field", value: mafOptions.groupBy },
      { label: "Signatures", value: Object.keys(mafSignatures).length },
    ]));
    display(table(
      [
        { notebookObject: "mafRows", replaceWith: "MAF rows with chromosome, position, alleles, sample/project field, and context source" },
        { notebookObject: "mafOptions.groupBy", replaceWith: "Tumor_Sample_Barcode, project_code, sample, or another sample identifier" },
        { notebookObject: "mafOptions.offline", replaceWith: "true for a pinned context table; false for live UCSC context lookup" },
        { notebookObject: "mafSignatures", replaceWith: "COSMIC or project-specific reference signature table" },
      ],
      [
        { key: "notebookObject", label: "Object to edit" },
        { key: "replaceWith", label: "Project-specific replacement" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Interactive workspace

    Use this workspace to load sample data, paste or upload your own data, adjust settings, run the notebook workflow, inspect visual results, and download the exact files produced by your settings.
  </script>

  <script type="module" pinned id="interactive-workspace">
    const { renderInteractiveNotebook } = await import("./msig-notebook-interactive.js?v=2026-05-15-all-notebooks");
    renderInteractiveNotebook({ mode: "maf-fit-report", mSigSDK, display });
  </script>

  <script type="text/markdown">
    ## Step 1. Convert variant rows into an SBS96 table

    `analyzeMafFiles` accepts either a flat row array or nested per-file arrays. The conversion record stores the genome build, context source, lookup mode, timestamp, and a count reconciliation check between convertible SNV rows and observed SBS96 counts.

    Before reading signature contributions, confirm that the number of convertible SNVs agrees with the total SBS96 counts. A mismatch here points to context annotation, filtering, sample naming, or input-shape problems.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "maf-fit-report", step: 1, phase: "data", title: "Step 1. Convert variant rows into an SBS96 table", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const mafAnalysis = await mSigSDK.workflows.analyzeMafFiles(
      mafRows,
      mafSignatures,
      {
        groupBy: mafOptions.groupBy,
        genome: mafOptions.genome,
        offline: mafOptions.offline,
        contextSource: mafOptions.contextSource,
        expectedContexts: mafContexts,
        reportFormat: "object",
        fitting: {
          exposureThreshold: mafOptions.exposureThreshold,
          exposureType: "relative",
          renormalize: true,
          mutationBurdenOptions: {
            lowBurdenThresholdMode: "fixed",
            lowBurdenThreshold: 50,
          },
        },
      }
    );
    const mafConversionRows = [
      { field: "Convertible SNV rows", value: mafAnalysis.mafConversion.expectedConvertibleSnvCount },
      { field: "Observed SBS96 counts", value: mafAnalysis.mafConversion.observedSbs96Count },
      { field: "Count reconciliation", value: mafAnalysis.mafConversion.sbs96CountMatchesConvertibleSnvCount ? "pass" : "review" },
      { field: "Context source", value: mafAnalysis.mafConversion.contextSource },
      { field: "Context lookup mode", value: mafAnalysis.mafConversion.contextLookupMode },
    ];

    display(metrics([
      { label: "Workflow", value: mafAnalysis.workflow },
      { label: "Samples", value: Object.keys(mafAnalysis.spectra).length },
      { label: "SBS96 counts", value: mafAnalysis.mafConversion.observedSbs96Count },
      { label: "Warnings", value: mafAnalysis.warnings.length },
      { label: "Figures", value: mafAnalysis.publicationFigures.length },
    ]));
    display(table(
      mafRows.slice(0, 8),
      [
        { key: "project_code", label: "Group" },
        { key: "chromosome", label: "Chromosome" },
        { key: "start_position", label: "Position" },
        { key: "reference_allele", label: "Reference" },
        { key: "tumor_seq_allele2", label: "Alternate" },
        { key: "context", label: "Trinucleotide context" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      mafConversionRows,
      [
        { key: "field", label: "Conversion field" },
        { key: "value", label: "Value" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Inspect fit evidence after conversion

    The same result object contains fitted signature contributions, mutation-count checks, reconstruction metrics, warning codes, suggested review steps, and figure descriptors. This is the minimum evidence trail to keep with a converted MAF analysis.

    Interpret the tables in order: mutation counts tell whether the spectra contain enough signal, reconstruction metrics tell whether the catalog explains the spectra, and signature contributions tell which signatures contribute after those checks pass.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "maf-fit-report", step: 2, phase: "review", title: "Step 2. Inspect fit evidence after conversion", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    display(table(
      exposureRows(mafAnalysis.fit.exposures, { minExposure: 0, topN: 12 }),
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      { maxRows: 12 }
    ));
    display(table(
      reconstructionRows(mafAnalysis.fit.reconstructionError),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
        { key: "rmse", label: "RMSE" },
      ]
    ));
    display(table(
      warningRows(mafAnalysis.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ]
    ));
    display(table(
      publicationFigureRows(mafAnalysis.publicationFigures),
      [
        { key: "id", label: "Figure id" },
        { key: "title", label: "Figure title" },
        { key: "renderer", label: "Renderer" },
        { key: "dataFields", label: "Required fields" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 3. Render quality-check plots for visual review

    Plots help identify problems that summary tables can hide: a low-count sample, a systematic residual pattern, or a contribution profile dominated by a questionable signature. Use the plots to decide which samples need manual review before the report is exported.
  </script>

  <script type="module" pinned id="interactive-step-3">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "maf-fit-report", step: 3, phase: "visualize", title: "Step 3. Render quality-check plots for visual review", mSigSDK, display });
  </script>

  <script type="module" pinned id="4">
    const mafBurdenDiv = document.createElement("div");
    mafBurdenDiv.style.width = "100%";
    display(mafBurdenDiv);
    await mSigSDK.qcPlots.plotMutationBurdenSummary(mafBurdenDiv, mafAnalysis.qc.mutationBurden);

    const mafSpectrumDiv = document.createElement("div");
    mafSpectrumDiv.style.width = "100%";
    display(mafSpectrumDiv);
    await mSigSDK.userData.plotPatientMutationalSpectrumuserData(
      mafAnalysis.spectra,
      96,
      mafSpectrumDiv
    );
  </script>

  <script type="text/markdown">
    ## Step 4. Save the converted spectra and report

    The saved bundle should include the MAF conversion summary, SBS96 table, fitted signature contributions, quality-check evidence, warnings, suggested review steps, report fields, and a run record. These pieces let another researcher trace the result from variant rows to signature interpretation.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "maf-fit-report", step: 4, phase: "export", title: "Step 4. Save the converted spectra and report", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    display(downloadMany([
      {
        filename: "maf_converted_spectra.tsv",
        text: spectraMatrixToTsv(mafAnalysis.spectra, mafContexts),
        label: "Download spectra TSV",
      },
      {
        filename: "maf_exposures.csv",
        text: rowsToCsv(exposureRows(mafAnalysis.fit.exposures, { minExposure: 0, topN: 100 })),
        label: "Download signature contributions CSV",
      },
      {
        filename: "maf_report.json",
        type: "json",
        value: {
          options: mafOptions,
          conversion: mafAnalysis.mafConversion,
          validation: mafAnalysis.validation,
          qc: mafAnalysis.qc,
          warnings: mafAnalysis.warnings,
          recommendedActions: mafAnalysis.recommendedActions,
          publicationFigures: mafAnalysis.publicationFigures,
          report: mafAnalysis.report,
        },
        label: "Download report JSON",
      },
    ]));
  </script>
</notebook>
