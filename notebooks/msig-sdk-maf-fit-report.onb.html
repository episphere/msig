<!doctype html>
<notebook theme="air">
  <title>mSigSDK variant rows to mutation patterns</title>

  <script type="text/markdown">
    # Variant rows to mutation patterns

    Raw DNA-change rows must be converted into a mutation pattern that signature tools can read.

    The raw file is a pile of receipts. Each receipt says, "At this DNA position, one letter changed into another." A mutational signature analysis cannot use that pile directly. First, the receipts must be sorted into 96 labeled bins. Each bin says what changed and what the neighboring DNA letters were. That sorted 96-bin table is called an SBS96 spectrum.

    A reviewer can read the first tables like a chain of custody: which rows were usable, how rows were grouped into samples, where the neighboring DNA letters came from, and whether the final 96-bin counts equal the usable input rows.
  </script>

  <script type="module" pinned id="1">
    const mafSdkUrl = new URL("../main.js?v=2026-05-15-cosmic-sbs96", location.href).href;
    const { mSigSDK } = await import(mafSdkUrl);
    const {
      loadPublicMafRows,
      loadPublicSbs96Dataset,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const {
      metrics,
      reconstructionRows,
      table,
    } = mSigSDK.presentation;

    const mafContexts = sbs96Contexts();
    const [mafPublicRows, mafReferenceDataset] = await Promise.all([
      loadPublicMafRows(mSigSDK, { projects: ["TCGA-LUAD"], maxFiles: 1, maxVariants: 80 }),
      loadPublicSbs96Dataset(mSigSDK, { sampleLimit: 3 }),
    ]);
    const mafRows = mafPublicRows.rows;
    const mafSignatures = mafReferenceDataset.signatures;
    const mafOptions = {
      groupBy: "sample",
      genome: "hg19",
      offline: false,
      contextSource: "live UCSC genome sequence lookup for TCGA/GDC MAF rows",
      exposureThreshold: 0.01,
    };

    function mafLowerRow(row) {
      return Object.fromEntries(
        Object.entries(row || {}).map(([key, value]) => [String(key).toLowerCase(), value])
      );
    }

    function mafGroupValue(row, groupBy) {
      const lower = mafLowerRow(row);
      return String(lower[String(groupBy).toLowerCase()] || row?.[groupBy] || lower.sample || lower.sample_id || "unassigned");
    }

    function mafIsConvertibleSnv(row) {
      const lower = mafLowerRow(row);
      const variantType = String(lower.variant_type || "").toLowerCase();
      const reference = String(lower.reference_allele || "").toUpperCase();
      const alternate = String(lower.tumor_seq_allele2 || "").toUpperCase();
      return (
        ["snp", "single base substitution", "single_base_substitution"].includes(variantType) &&
        /^[ACGT]$/.test(reference) &&
        /^[ACGT]$/.test(alternate)
      );
    }

    function mafContextValue(row) {
      const lower = mafLowerRow(row);
      return String(
        lower.trinucleotide_context ||
        lower.trinucleotide ||
        lower.sequence_context ||
        lower.context_sequence ||
        lower.context ||
        ""
      ).toUpperCase();
    }

    function sumSpectrum(record = {}) {
      return Object.values(record).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function mafAuditRows(rows, { groupBy }) {
      const groups = new Set();
      let convertibleSnvs = 0;
      let rowsWithContext = 0;
      let nonConvertibleRows = 0;
      let missingContext = 0;
      for (const row of rows) {
        groups.add(mafGroupValue(row, groupBy));
        if (mafIsConvertibleSnv(row)) {
          convertibleSnvs += 1;
          if (/^[ACGT]{3}$/.test(mafContextValue(row))) {
            rowsWithContext += 1;
          } else {
            missingContext += 1;
          }
        } else {
          nonConvertibleRows += 1;
        }
      }
      return [
        { checkpoint: "Input rows", value: rows.length, why: "All rows received before filtering." },
        { checkpoint: "Groups from field", value: `${groups.size} via ${groupBy}`, why: "This identifies which rows belong to the same sample or project." },
        { checkpoint: "Rows that can become 96-bin counts", value: convertibleSnvs, why: "Only clean one-letter DNA changes belong in this specific mutation-pattern table." },
        { checkpoint: "Rows with neighborhood already supplied", value: rowsWithContext, why: "Some rows already include the nearby DNA letters needed for sorting." },
        { checkpoint: "Rows needing neighborhood lookup", value: missingContext, why: "These rows need the genome sequence lookup to find the nearby DNA letters." },
        { checkpoint: "Rows skipped by this 96-bin pattern", value: nonConvertibleRows, why: "Insertions, deletions, invalid letters, or incomplete rows do not fit this one-letter-change pattern." },
      ];
    }

    function mafGroupAuditRows(rows, spectra, groupBy) {
      const groups = new Map();
      for (const row of rows) {
        const group = mafGroupValue(row, groupBy);
        if (!groups.has(group)) groups.set(group, { group, inputRows: 0, convertibleSnvs: 0, contextRows: 0 });
        const entry = groups.get(group);
        entry.inputRows += 1;
        if (mafIsConvertibleSnv(row)) {
          entry.convertibleSnvs += 1;
          if (/^[ACGT]{3}$/.test(mafContextValue(row))) entry.contextRows += 1;
        }
      }
      return [...groups.values()].map((entry) => {
        const observedSbs96Counts = sumSpectrum(spectra?.[entry.group] || {});
        return {
          ...entry,
          observedSbs96Counts,
          countCheck: observedSbs96Counts === entry.convertibleSnvs ? "pass" : "review",
        };
      });
    }

    display(metrics([
      { label: "Data source", value: mafPublicRows.source },
      { label: "Rows", value: mafRows.length },
      { label: "Neighborhood lookup", value: "live genome lookup" },
      { label: "Grouping field", value: mafOptions.groupBy },
      { label: "Signatures", value: Object.keys(mafSignatures).length },
    ]));
    display(table(
      [
        { term: "Variant row", plainMeaning: "One recorded DNA change, like C becoming T at a specific chromosome position." },
        { term: "MAF", plainMeaning: "A common spreadsheet-like format for storing many variant rows." },
        { term: "DNA neighborhood", plainMeaning: "The changed letter plus one nearby letter on each side, like a three-letter word." },
        { term: "SBS96 spectrum", plainMeaning: "The final 96-bin mutation pattern created after sorting the variant rows." },
        { term: "Quick sanity check", plainMeaning: "A small follow-up check that the converted pattern can be used by the normal fitting workflow." },
      ],
      [
        { key: "term", label: "Term" },
        { key: "plainMeaning", label: "Plain meaning" },
      ]
    ));
    display(table(
      mafAuditRows(mafRows, mafOptions),
      [
        { key: "checkpoint", label: "Sorting checkpoint" },
        { key: "value", label: "Value" },
        { key: "why", label: "Why it matters" },
      ]
    ));
  </script>
<script type="text/markdown">
    ## Step 1. Sort the variant rows into 96 bins

    Each row tells us the chromosome position and the before/after DNA letters. The converter looks up the neighboring DNA letters, then sorts the change into one of 96 possible bins.

    The most important check is simple counting. If 80 usable single-letter changes go in, the finished 96-bin table should contain 80 counts. If those numbers do not match, something went wrong before signature analysis even began.
  </script>
<script type="module" pinned id="2">
    const mafAnalysis = await mSigSDK.workflows.analyzeMafFiles(
      mafRows,
      mafSignatures,
      {
        groupBy: mafOptions.groupBy,
        genome: mafOptions.genome,
        offline: mafOptions.offline,
        contextSource: mafOptions.contextSource,
        expectedContexts: mafContexts,
        reportFormat: "object",
        fitting: {
          exposureThreshold: mafOptions.exposureThreshold,
          exposureType: "relative",
          renormalize: true,
          mutationBurdenOptions: {
            lowBurdenThresholdMode: "fixed",
            lowBurdenThreshold: 50,
          },
        },
      }
    );
    const mafConversionRows = [
      { field: "Usable single-letter changes", value: mafAnalysis.mafConversion.expectedConvertibleSnvCount },
      { field: "Counts after sorting into 96 bins", value: mafAnalysis.mafConversion.observedSbs96Count },
      { field: "Do the counts match?", value: mafAnalysis.mafConversion.sbs96CountMatchesConvertibleSnvCount ? "yes" : "review" },
      { field: "DNA neighborhood source", value: mafAnalysis.mafConversion.contextSource },
      { field: "Lookup mode", value: mafAnalysis.mafConversion.contextLookupMode },
    ];

    display(metrics([
      { label: "Workflow", value: mafAnalysis.workflow },
      { label: "Samples", value: Object.keys(mafAnalysis.spectra).length },
      { label: "Counts in 96-bin pattern", value: mafAnalysis.mafConversion.observedSbs96Count },
      { label: "Warnings", value: mafAnalysis.warnings.length },
    ]));
    display(table(
      mafRows.slice(0, 8),
      [
        { key: "project_code", label: "Group" },
        { key: "chromosome", label: "Chromosome" },
        { key: "start_position", label: "Position" },
        { key: "reference_allele", label: "Reference" },
        { key: "tumor_seq_allele2", label: "New DNA letter" },
        { key: "context", label: "Three-letter neighborhood" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      mafConversionRows,
      [
        { key: "field", label: "Check" },
        { key: "value", label: "Value" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Check that the converted pattern behaves normally

    This step is like plugging in a newly assembled lamp just long enough to see whether it turns on. A quick fit checks that the converted 96-bin pattern can enter the normal SDK workflow.

    Read the tables in order: first confirm the counts still match, then look for warnings, then use the reconstruction numbers as a basic health check.
  </script>
<script type="module" pinned id="3">
    display(table(
      mafGroupAuditRows(mafRows, mafAnalysis.spectra, mafOptions.groupBy),
      [
        { key: "group", label: "Group" },
        { key: "inputRows", label: "Input rows" },
        { key: "convertibleSnvs", label: "Usable single-letter changes" },
        { key: "contextRows", label: "Rows with neighborhood already supplied" },
        { key: "observedSbs96Counts", label: "Counts after sorting" },
        { key: "countCheck", label: "Counts match?" },
      ]
    ));
    display(table(
      reconstructionRows(mafAnalysis.fit.reconstructionError),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Pattern match score" },
        { key: "rmse", label: "Average leftover error" },
      ]
    ));
    display(table(
      warningRows(mafAnalysis.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 3. Look at the mutation pattern

    A table of 96 numbers is hard to understand at a glance, so this step turns it into a picture. The burden plot shows how many mutations each group has. The SBS96 profile shows which kinds of DNA-letter changes are most common.

    A good first read is: are the totals plausible, and does the pattern look like a real sorted pattern rather than an empty or scrambled table?
  </script>
<script type="module" pinned id="4">
    const mafBurdenDiv = document.createElement("div");
    mafBurdenDiv.style.width = "100%";
    display(mafBurdenDiv);
    await mSigSDK.qcPlots.plotMutationBurdenSummary(mafBurdenDiv, mafAnalysis.qc.mutationBurden);

    const mafSpectrumSamples = Object.keys(mafAnalysis.spectra || {});
    const mafSpectrumControls = document.createElement("div");
    mafSpectrumControls.className = "workflow-plot-controls";
    const mafSpectrumSelect = document.createElement("select");
    mafSpectrumSelect.replaceChildren(
      ...mafSpectrumSamples.map((sample) => {
        const option = document.createElement("option");
        option.value = sample;
        option.textContent = sample;
        return option;
      })
    );
    const mafSpectrumField = document.createElement("label");
    mafSpectrumField.className = "workflow-field";
    const mafSpectrumLabel = document.createElement("span");
    mafSpectrumLabel.textContent = "Group shown in mutation-pattern plot";
    const mafSpectrumHelp = document.createElement("small");
    mafSpectrumHelp.textContent = "Switch groups to redraw the 96-bin pattern. Hover over bars for the exact DNA-neighborhood labels and counts.";
    mafSpectrumField.append(mafSpectrumLabel, mafSpectrumSelect, mafSpectrumHelp);
    mafSpectrumControls.append(mafSpectrumField);
    display(mafSpectrumControls);

    const mafSpectrumDiv = document.createElement("div");
    mafSpectrumDiv.style.width = "100%";
    display(mafSpectrumDiv);

    function renderMafCosmicSpectrum() {
      return mSigSDK.qcPlots.plotCosmicSbs96Profile(
        mafSpectrumDiv,
        mafAnalysis.spectra,
        {
          sample: mafSpectrumSelect.value,
          contexts: mafContexts,
          title: "Converted 96-bin mutation pattern",
          subtitle:
            "The converted mutation pattern created from variant rows. Colors group related DNA-letter changes so the 96 bins are easier to scan.",
        }
      );
    }

    mafSpectrumSelect.addEventListener("change", renderMafCosmicSpectrum);
    await renderMafCosmicSpectrum();
  </script>

  <script type="text/markdown">
    ## Step 4. Save the conversion record

    The saved files are the receipt trail. They keep the converted 96-bin table together with the source summary, grouping rule, DNA-neighborhood source, count check, and warnings.

    The next analysis can then start from a checked mutation pattern rather than an unexplained pile of variant rows.
  </script>
<script type="module" pinned id="5">
    display(downloadMany([
      {
        filename: "maf_converted_spectra.tsv",
        text: spectraMatrixToTsv(mafAnalysis.spectra, mafContexts),
        label: "Download 96-bin pattern TSV",
      },
      {
        filename: "maf_conversion_audit.csv",
        text: rowsToCsv([
          ...mafAuditRows(mafRows, mafOptions).map((row) => ({ auditLevel: "input", ...row })),
          ...mafGroupAuditRows(mafRows, mafAnalysis.spectra, mafOptions.groupBy).map((row) => ({ auditLevel: "group", ...row })),
        ]),
        label: "Download conversion audit CSV",
      },
      {
        filename: "maf_conversion_audit.json",
        type: "json",
        value: {
          options: mafOptions,
          conversionAudit: {
            input: mafAuditRows(mafRows, mafOptions),
            groups: mafGroupAuditRows(mafRows, mafAnalysis.spectra, mafOptions.groupBy),
          },
          conversion: mafAnalysis.mafConversion,
          validation: mafAnalysis.validation,
          qc: mafAnalysis.qc,
          warnings: mafAnalysis.warnings,
          smokeTest: {
            reconstructionError: mafAnalysis.fit.reconstructionError,
          },
        },
        label: "Download conversion audit JSON",
      },
    ]));
  </script>
