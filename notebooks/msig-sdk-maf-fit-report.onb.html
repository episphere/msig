  <script type="text/markdown">
    # MAF to report

    Many projects start from variant rows rather than a finished signature table. This workflow adds the piece that the end-to-end notebook deliberately skips: an auditable conversion from MAF-like rows into SBS96 spectra before any signature interpretation is trusted.

    The example uses row-supplied trinucleotide contexts so it runs without a genome sequence request. In a production pipeline, the same checkpoints apply after genome-backed context annotation: normalize the variant rows, group them intentionally, reconcile convertible SNV rows against observed SBS96 counts, and only then use fitting as a downstream smoke test.

    **Unique role:** teach MAF field mapping, context provenance, grouping, and count reconciliation.

    **Leave to focused notebooks:** broad beginner orientation, public cohort discovery, detailed uncertainty analysis, and multi-tool concordance.

    **After running it you should know:** whether a set of variant rows was converted into spectra cleanly enough to hand to the analysis notebooks.
  </script>

  <script type="module" pinned id="1">
    const mafSdkUrl = new URL("../main.js?v=2026-05-14-maf-workflow", location.href).href;
    const { mSigSDK } = await import(mafSdkUrl);
    const {
      demoMafRows,
      demoSignatures,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const {
      exposureRows,
      metrics,
      reconstructionRows,
      table,
    } = mSigSDK.presentation;

    const mafContexts = sbs96Contexts();
    const mafRows = demoMafRows;
    const mafSignatures = demoSignatures();
    const mafOptions = {
      groupBy: "project_code",
      genome: "hg19",
      offline: true,
      contextSource: "row-supplied trinucleotide context field",
      exposureThreshold: 0.01,
    };

    function mafLowerRow(row) {
      return Object.fromEntries(
        Object.entries(row || {}).map(([key, value]) => [String(key).toLowerCase(), value])
      );
    }

    function mafGroupValue(row, groupBy) {
      const lower = mafLowerRow(row);
      return String(lower[String(groupBy).toLowerCase()] || row?.[groupBy] || lower.sample || lower.sample_id || "unassigned");
    }

    function mafIsConvertibleSnv(row) {
      const lower = mafLowerRow(row);
      const variantType = String(lower.variant_type || "").toLowerCase();
      const reference = String(lower.reference_allele || "").toUpperCase();
      const alternate = String(lower.tumor_seq_allele2 || "").toUpperCase();
      return (
        ["snp", "single base substitution", "single_base_substitution"].includes(variantType) &&
        /^[ACGT]$/.test(reference) &&
        /^[ACGT]$/.test(alternate)
      );
    }

    function mafContextValue(row) {
      const lower = mafLowerRow(row);
      return String(
        lower.trinucleotide_context ||
        lower.trinucleotide ||
        lower.sequence_context ||
        lower.context_sequence ||
        lower.context ||
        ""
      ).toUpperCase();
    }

    function sumSpectrum(record = {}) {
      return Object.values(record).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function mafAuditRows(rows, { groupBy }) {
      const groups = new Set();
      let convertibleSnvs = 0;
      let rowsWithContext = 0;
      let nonConvertibleRows = 0;
      let missingContext = 0;
      for (const row of rows) {
        groups.add(mafGroupValue(row, groupBy));
        if (mafIsConvertibleSnv(row)) {
          convertibleSnvs += 1;
          if (/^[ACGT]{3}$/.test(mafContextValue(row))) {
            rowsWithContext += 1;
          } else {
            missingContext += 1;
          }
        } else {
          nonConvertibleRows += 1;
        }
      }
      return [
        { checkpoint: "Input rows", value: rows.length, why: "All rows received by the notebook before filtering." },
        { checkpoint: "Groups from field", value: `${groups.size} via ${groupBy}`, why: "The grouping field becomes the sample key in the SBS96 table." },
        { checkpoint: "Convertible SNV rows", value: convertibleSnvs, why: "Only valid single-base substitutions should contribute to SBS96 counts." },
        { checkpoint: "Rows with supplied context", value: rowsWithContext, why: "Offline conversion needs a three-base context or a pinned lookup table." },
        { checkpoint: "Missing context among convertible rows", value: missingContext, why: "These rows need genome-backed annotation before fitting." },
        { checkpoint: "Rows not convertible to SBS96", value: nonConvertibleRows, why: "Indels, invalid alleles, or incomplete rows are outside SBS96 conversion." },
      ];
    }

    function mafGroupAuditRows(rows, spectra, groupBy) {
      const groups = new Map();
      for (const row of rows) {
        const group = mafGroupValue(row, groupBy);
        if (!groups.has(group)) groups.set(group, { group, inputRows: 0, convertibleSnvs: 0, contextRows: 0 });
        const entry = groups.get(group);
        entry.inputRows += 1;
        if (mafIsConvertibleSnv(row)) {
          entry.convertibleSnvs += 1;
          if (/^[ACGT]{3}$/.test(mafContextValue(row))) entry.contextRows += 1;
        }
      }
      return [...groups.values()].map((entry) => {
        const observedSbs96Counts = sumSpectrum(spectra?.[entry.group] || {});
        return {
          ...entry,
          observedSbs96Counts,
          countCheck: observedSbs96Counts === entry.convertibleSnvs ? "pass" : "review",
        };
      });
    }

    display(metrics([
      { label: "Rows", value: mafRows.length },
      { label: "Context mode", value: "offline row-supplied contexts" },
      { label: "Grouping field", value: mafOptions.groupBy },
      { label: "Signatures", value: Object.keys(mafSignatures).length },
    ]));
    display(table(
      [
        { notebookObject: "mafRows", replaceWith: "MAF rows with chromosome, position, alleles, sample/project field, and context source" },
        { notebookObject: "mafOptions.groupBy", replaceWith: "Tumor_Sample_Barcode, project_code, sample, or another sample identifier" },
        { notebookObject: "mafOptions.offline", replaceWith: "true for a pinned context table; false for live UCSC context lookup" },
        { notebookObject: "mafSignatures", replaceWith: "COSMIC or project-specific reference signature table" },
      ],
      [
        { key: "notebookObject", label: "Object to edit" },
        { key: "replaceWith", label: "Project-specific replacement" },
      ]
    ));
    display(table(
      mafAuditRows(mafRows, mafOptions),
      [
        { key: "checkpoint", label: "Conversion checkpoint" },
        { key: "value", label: "Value" },
        { key: "why", label: "Why it matters" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 1. Convert variant rows into an SBS96 table

    `analyzeMafFiles` accepts either a flat row array or nested per-file arrays. The conversion record stores the genome build, context source, lookup mode, timestamp, and a count reconciliation check between convertible SNV rows and observed SBS96 counts.

    Before reading signature contributions, confirm that the number of convertible SNVs agrees with the total SBS96 counts. A mismatch here points to context annotation, filtering, sample naming, or input-shape problems.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "maf-fit-report", step: 1, phase: "data", title: "Step 1. Convert variant rows into an SBS96 table", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const mafAnalysis = await mSigSDK.workflows.analyzeMafFiles(
      mafRows,
      mafSignatures,
      {
        groupBy: mafOptions.groupBy,
        genome: mafOptions.genome,
        offline: mafOptions.offline,
        contextSource: mafOptions.contextSource,
        expectedContexts: mafContexts,
        reportFormat: "object",
        fitting: {
          exposureThreshold: mafOptions.exposureThreshold,
          exposureType: "relative",
          renormalize: true,
          mutationBurdenOptions: {
            lowBurdenThresholdMode: "fixed",
            lowBurdenThreshold: 50,
          },
        },
      }
    );
    const mafConversionRows = [
      { field: "Convertible SNV rows", value: mafAnalysis.mafConversion.expectedConvertibleSnvCount },
      { field: "Observed SBS96 counts", value: mafAnalysis.mafConversion.observedSbs96Count },
      { field: "Count reconciliation", value: mafAnalysis.mafConversion.sbs96CountMatchesConvertibleSnvCount ? "pass" : "review" },
      { field: "Context source", value: mafAnalysis.mafConversion.contextSource },
      { field: "Context lookup mode", value: mafAnalysis.mafConversion.contextLookupMode },
    ];

    display(metrics([
      { label: "Workflow", value: mafAnalysis.workflow },
      { label: "Samples", value: Object.keys(mafAnalysis.spectra).length },
      { label: "SBS96 counts", value: mafAnalysis.mafConversion.observedSbs96Count },
      { label: "Warnings", value: mafAnalysis.warnings.length },
      { label: "Figures", value: mafAnalysis.publicationFigures.length },
    ]));
    display(table(
      mafRows.slice(0, 8),
      [
        { key: "project_code", label: "Group" },
        { key: "chromosome", label: "Chromosome" },
        { key: "start_position", label: "Position" },
        { key: "reference_allele", label: "Reference" },
        { key: "tumor_seq_allele2", label: "Alternate" },
        { key: "context", label: "Trinucleotide context" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      mafConversionRows,
      [
        { key: "field", label: "Conversion field" },
        { key: "value", label: "Value" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Use fitting as a downstream smoke test

    The fitting output is included to prove that the converted spectra can enter the standard SDK workflow. In this notebook, the fitted signatures are not the main lesson; they are a smoke test for the conversion handoff.

    Interpret the tables in order: group-level count reconciliation first, reconstruction metrics second, and signature contributions last. If the conversion check fails, fix context annotation or grouping before reading any exposure table.
  </script>

  </script>
