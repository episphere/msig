    A MAF-like row records where a variant happened and which allele changed. COSMIC profile matrices use that event evidence differently across SBS, DBS, and indel contexts. This notebook follows rows from raw MAF fields into profile-specific bins, audit checks, exports, and compatible signature review inputs.

    function mafButton(label, kind = "") {
      const control = document.createElement("button");
      control.type = "button";
      control.className = kind === "primary" ? "primary" : "";
      control.textContent = label;
      return control;
    }

    function mafField(label, control, help = "") {
      const wrapper = document.createElement("label");
      wrapper.className = "workflow-field";
      const title = document.createElement("span");
      title.textContent = label;
      wrapper.append(title, control);
      if (help) {
        const helper = document.createElement("small");
        helper.textContent = help;
        wrapper.append(helper);
      }
      return wrapper;
    }

    function mafRowsToCsv(rows) {
      if (!rows.length) return "";
      const headers = [...new Set(rows.flatMap((row) => Object.keys(row)))];
      const escapeValue = (value) => {
        const text = String(value ?? "");
        return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
      };
      return [
        headers.join(","),
        ...rows.map((row) => headers.map((header) => escapeValue(row[header])).join(",")),
      ].join("\n");
    }

    function canonicalHeader(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function parseDelimitedLine(line, delimiter) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const character = line[index];
        if (character === '"') {
          if (quoted && line[index + 1] === '"') {
            cell += '"';
            index += 1;
          } else {
            quoted = !quoted;
          }
        } else if (character === delimiter && !quoted) {
          cells.push(cell);
          cell = "";
        } else {
          cell += character;
        }
      }
      cells.push(cell);
      return cells.map((value) => value.trim());
    }

    function parseDelimitedText(text) {
      const lines = String(text || "")
        .trim()
        .split(/\r?\n/)
        .filter((line) => line.trim() !== "" && !line.startsWith("#"));
      if (!lines.length) return [];
      const delimiter =
        (lines[0].match(/\t/g) || []).length >= (lines[0].match(/,/g) || []).length
          ? "\t"
          : ",";
      const rows = lines.map((line) => parseDelimitedLine(line, delimiter));
      const headers = rows[0].map((header) => String(header || "").trim());
      return rows.slice(1).map((values, index) => {
        const row = { __rowIndex: index };
        headers.forEach((header, headerIndex) => {
          row[header] = values[headerIndex] ?? "";
        });
        return row;
      });
    }

    function findField(row, field) {
      const normalizedRow = Object.fromEntries(
        Object.entries(row || {}).map(([key, value]) => [canonicalHeader(key), value])
      );
      for (const alias of FIELD_ALIASES[field] || []) {
        const value = normalizedRow[canonicalHeader(alias)];
        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return String(value).trim();
        }
      }
      return "";
    }

    function normalizeRows(rows) {
      return (rows || []).map((row, index) => {
        const chromosome = findField(row, "chromosome");
        const normalizedChromosome = normalizeChromosome(chromosome) || chromosome;
        return {
          id: row.id || `maf_row_${index + 1}`,
          index,
          sample: findField(row, "sample") || "sample_1",
          chromosome: normalizedChromosome,
          start_position: findField(row, "start_position"),
          reference_allele: findField(row, "reference_allele").toUpperCase(),
          tumor_seq_allele2: findField(row, "tumor_seq_allele2").toUpperCase(),
          variant_type: findField(row, "variant_type") || "SNP",
          context: findField(row, "context"),
          build: findField(row, "build") || state?.sourceGenome || "hg19",
          raw: row,
        };
      });
    }

    function contextFromRow(row, size = activeContextSize()) {
      return normalizeSequenceWindow(findField(row?.raw || row, "context"), size);
    }

    function lookupKey(row) {
      const chromosome = normalizeChromosome(row.chromosome) || row.chromosome;
      return `${chromosome}:${row.start_position}`;
    }

    function reverseComplement(sequence) {
      return String(sequence || "")
        .toUpperCase()
        .split("")
        .reverse()
        .map((base) => COMPLEMENT[base] || "N")
        .join("");
    }

    function zeroSpectrum() {
      return Object.fromEntries(activeContexts().map((context) => [context, 0]));
    }

    function profileOptionsFromKey(key = state.selectedProfile) {
      const match = String(key || "SBS96").match(/^([A-Z-]+)(\d+)$/);
      return match ? { profile: match[1], matrix: Number(match[2]) } : { profile: "SBS", matrix: 96 };
    }

    function activeProfileDefinition() {
      return PROFILE_BY_KEY[state.selectedProfile] || PROFILE_BY_KEY.SBS96;
    }

    function activeContexts() {
      return mSigSDK.validation.getExpectedContexts(profileOptionsFromKey()) || SBS96_CONTEXTS;
    }

    function activeContextSize() {
      return activeProfileDefinition()?.matrix === 1536 ? 5 : 3;
    }

    function activeProfileUsesReferenceApi() {
      return state.selectedProfile === "SBS96" || state.selectedProfile === "SBS1536";
    }

    function apiReferenceContextSize() {
      return activeProfileUsesReferenceApi() ? 5 : activeContextSize();
    }

    function sdkProfileReady() {
      return Boolean(state.profileConversion?.spectraByProfile?.[state.selectedProfile]);
    }

    function sdkAuditForActiveProfile() {
      const profileAudit = state.profileConversion?.audit?.profiles?.[state.selectedProfile];
      if (!profileAudit) return null;
      return {
        rows: [
          { checkpoint: "Input rows", value: state.rows.length },
          { checkpoint: `Source rows used for ${state.selectedProfile}`, value: profileAudit.countedRows },
          { checkpoint: "Profile events counted", value: profileAudit.countedEvents ?? profileAudit.countedRows },
          { checkpoint: "Rows skipped", value: profileAudit.skippedRows },
        ],
        groupRows: (profileAudit.samples || []).map((row) => ({
          sample: row.sample,
          inputRows: row.inputRows ?? state.rows.filter((inputRow) => inputRow.sample === row.sample).length,
          countedRows: row.countedRows,
          countedEvents: row.countedEvents ?? row.spectrumTotal,
          spectrumTotal: row.spectrumTotal,
          countCheck: row.countCheck,
        })),
      };
    }

    function variantTypeIsSnv(value) {
      return ACCEPTED_VARIANT_TYPES.has(String(value || "").toLowerCase());
    }

    function lookupContextForRow(row, size = activeContextSize()) {
      const entry = state.lookupTable[lookupKey(row)];
      if (!entry) return { context: "", source: "" };
      if (typeof entry === "string") {
        return { context: normalizeSequenceWindow(entry, size), source: "reference lookup table" };
      }
      return {
        context: normalizeSequenceWindow(entry.context, size),
        source: entry.source || "reference lookup table",
      };
    }

    function contextSourceLabel(row, hasRowContext, lookupSource) {
      if (lookupSource) {
        return lookupSource;
      }
      if (hasRowContext) {
        return state.inputSource === "tcga-gdc" ? "GDC CONTEXT column" : "uploaded context column";
      }
      return lookupSource || "missing";
    }

    function buildTraceRow(row, index) {
      const contextSize = activeContextSize();
      const missingFields = REQUIRED_FIELDS
        .filter(([field]) => field !== "sample" && !row[field])
        .map(([, label]) => label.toLowerCase());
      const ref = String(row.reference_allele || "").toUpperCase();
      const alt = String(row.tumor_seq_allele2 || "").toUpperCase();
      const variantTypeOk = variantTypeIsSnv(row.variant_type);
      const alleleOk = /^[ACGT]$/.test(ref) && /^[ACGT]$/.test(alt);
      const rowSuppliedContext = contextFromRow(row, contextSize);
      const lookupContext = lookupContextForRow(row, contextSize);
      const referenceContext = lookupContext.context || rowSuppliedContext;
      const contextSource = contextSourceLabel(row, Boolean(rowSuppliedContext), lookupContext.source);
      const referenceMatchesContext = Boolean(
        referenceContext && referenceContext[Math.floor(referenceContext.length / 2)] === ref
      );
      const purineReference = /^[AG]$/.test(ref);
      const normalizedContext = referenceContext ? standardize_sequence_context(referenceContext, contextSize) : null;
      const normalizedSubstitution = alleleOk ? standardize_substitution(ref, alt) : null;
      const finalBin = sbsContextLabel(normalizedContext, normalizedSubstitution);
      let skippedReason = "";

      if (missingFields.length) {
        skippedReason = `missing ${missingFields.join(", ")}`;
      } else if (!variantTypeOk) {
        skippedReason = "not a single-nucleotide variant";
      } else if (!alleleOk) {
        skippedReason = "ref/alt are not single A/C/G/T bases";
      } else if (!referenceContext) {
        skippedReason = `missing ${contextSize}-base reference context`;
      } else if (!referenceMatchesContext) {
        skippedReason = "reference allele does not match context center";
      } else if (!finalBin || !activeContexts().includes(finalBin) || finalBin.includes("N")) {
        skippedReason = `final ${state.selectedProfile} bin is not valid`;
      }

      return {
        index,
        id: row.id,
        sample: row.sample,
        chromosome: row.chromosome,
        start_position: row.start_position,
        ref,
        alt,
        variantType: row.variant_type,
        build: row.build || state.sourceGenome,
        originalSubstitution: alleleOk ? `${ref}>${alt}` : `${ref || "?"}>${alt || "?"}`,
        lookupKey: lookupKey(row),
        referenceContext,
        contextSource,
        referenceMatchesContext,
        purineReference,
        reverseComplementContext: referenceContext ? reverseComplement(referenceContext) : null,
        normalizedContext,
        normalizedSubstitution,
        finalBin,
        counted: !skippedReason,
        skippedReason,
        row,
      };
    }

    function sbsContextLabel(standardizedContext, standardizedSubstitution) {
      if (!standardizedContext || !standardizedSubstitution) return null;
      if (standardizedContext.length === 3) {
        return `${standardizedContext[0]}[${standardizedSubstitution}]${standardizedContext[2]}`.toUpperCase();
      }
      if (standardizedContext.length === 5) {
        return `${standardizedContext[0]}${standardizedContext[1]}[${standardizedSubstitution}]${standardizedContext[3]}${standardizedContext[4]}`.toUpperCase();
      }
      return null;
    }

    function recompute() {
      if (sdkProfileReady()) {
        state.trace = state.profileConversion.traceByProfile[state.selectedProfile] || [];
        state.spectra = state.profileConversion.spectraByProfile[state.selectedProfile] || {};
        const groups = Object.keys(state.spectra);
        if (!groups.includes(state.selectedGroup)) state.selectedGroup = groups[0] || "";
        if (state.selectedIndex >= state.rows.length) state.selectedIndex = 0;
        state.audit = sdkAuditForActiveProfile();
        return;
      }
      state.trace = state.rows.map(buildTraceRow);
      const spectra = {};
      for (const traceRow of state.trace) {
        if (!spectra[traceRow.sample]) spectra[traceRow.sample] = zeroSpectrum();
        if (traceRow.counted) spectra[traceRow.sample][traceRow.finalBin] += 1;
      }
      state.spectra = spectra;
      const groups = Object.keys(spectra);
      if (!groups.includes(state.selectedGroup)) state.selectedGroup = groups[0] || "";
      if (state.selectedIndex >= state.rows.length) state.selectedIndex = 0;
      state.audit = buildAudit();
    }

    function buildAudit() {
      const inputRows = state.rows.length;
      const countedRows = state.trace.filter((row) => row.counted).length;
      const skippedRows = inputRows - countedRows;
      const rowContexts = state.rows.filter((row) => contextFromRow(row, activeContextSize())).length;
      const missingLookup = state.trace.filter((row) => row.contextSource === "missing").length;
      const purineRows = state.trace.filter((row) => row.purineReference && row.counted).length;
      const groupRows = Object.keys(state.spectra).map((sample) => {
        const inputForGroup = state.trace.filter((row) => row.sample === sample).length;
        const countedForGroup = state.trace.filter((row) => row.sample === sample && row.counted).length;
        const observedSbs96Count = Object.values(state.spectra[sample] || {}).reduce(
          (sum, value) => sum + Number(value || 0),
          0
        );
        return {
          sample,
          inputRows: inputForGroup,
          countedRows: countedForGroup,
          countedEvents: countedForGroup,
          spectrumTotal: observedSbs96Count,
          countCheck: countedForGroup === observedSbs96Count ? "pass" : "review",
        };
      });
      return {
        rows: [
          { checkpoint: "Input rows", value: inputRows },
          { checkpoint: "Rows with row-supplied context", value: rowContexts },
          { checkpoint: "Rows still missing context", value: missingLookup },
          { checkpoint: "Rows needing reverse complement", value: purineRows },
          { checkpoint: `Rows counted into ${state.selectedProfile}`, value: countedRows },
          { checkpoint: "Profile events counted", value: countedRows },
          { checkpoint: "Rows skipped", value: skippedRows },
        ],
        groupRows,
      };
    }

    function selectedTrace() {
      return state.trace[state.selectedIndex] || state.trace[0] || null;
    }

    function normalizationExampleTrace() {
      const current = selectedTrace();
      if (current?.purineReference && current.referenceContext && current.normalizedContext) {
        return current;
      }
      return (
        state.trace.find((row) => row.purineReference && row.counted) ||
        state.trace.find((row) => row.purineReference && row.referenceContext && row.normalizedContext) ||
        current
      );
    }

    function selectNormalizationExample() {
      const example = normalizationExampleTrace();
      if (example) state.selectedIndex = example.index;
    }

    function setStatus(title, message, type = "ready") {
      state.statusTitle = title;
      state.status = message;
      state.statusType = type;
      render();
    }

    function pushProgress(label, message) {
      state.progress = [
        ...state.progress,
        {
          time: new Date().toLocaleTimeString(),
          label,
          message,
        },
      ].slice(-8);
    }

    function lookupEntryContext(entry) {
      if (!entry) return "";
      return typeof entry === "string" ? entry : entry.context;
    }

    function lookupHasRequiredContext(row, size) {
      return Boolean(normalizeSequenceWindow(lookupEntryContext(state.lookupTable[lookupKey(row)]), size));
    }

    function apiContextCandidateRows(size, { force = false, limit = MAX_API_CONTEXT_LOOKUP } = {}) {
      if (!activeProfileUsesReferenceApi()) return [];
      return state.rows
        .filter((row) =>
          row.chromosome &&
          row.start_position &&
          /^[ACGT]$/.test(row.reference_allele) &&
          /^[ACGT]$/.test(row.tumor_seq_allele2) &&
          variantTypeIsSnv(row.variant_type) &&
          (force || !lookupHasRequiredContext(row, size))
        )
        .slice(0, limit);
    }

    function storeApiContext(row, context, size) {
      const normalizedContext = normalizeSequenceWindow(context, size);
      if (!normalizedContext) return false;
      const key = lookupKey(row);
      const existing = lookupEntryContext(state.lookupTable[key]);
      if (existing && String(existing).length > normalizedContext.length) {
        return false;
      }
      state.lookupTable[key] = {
        context: normalizedContext,
        source: "UCSC Genome Browser API",
        genome: row.build || state.sourceGenome || "hg19",
        contextSize: size,
      };
      return true;
    }

    async function resolveApiContextsForActiveProfile({
      force = false,
      limit = MAX_API_CONTEXT_LOOKUP,
      renderAfter = false,
    } = {}) {
      if (!state.rows.length || !activeProfileUsesReferenceApi()) return { resolved: 0, failed: 0, requested: 0 };
      const contextSize = apiReferenceContextSize();
      const candidates = apiContextCandidateRows(contextSize, { force, limit });
      if (!candidates.length) {
        await refreshProfileConversion({ renderAfter });
        return { resolved: 0, failed: 0, requested: 0 };
      }

      setStatus(
        "Resolving reference sequence",
        `Querying the UCSC Genome Browser API for ${candidates.length} 5-base reference window(s).`,
        "running"
      );

      let cursor = 0;
      let resolved = 0;
      let failed = 0;
      async function worker() {
        while (cursor < candidates.length) {
          const row = candidates[cursor];
          cursor += 1;
          try {
            const context = await getMutationalContext(
              normalizeChromosome(row.chromosome) || row.chromosome,
              row.build || state.sourceGenome || "hg19",
              Number(row.start_position),
              { offline: false, contextSize }
            );
            if (storeApiContext(row, context, contextSize)) {
              resolved += 1;
            }
          } catch (error) {
            failed += 1;
            console.warn("Reference API context lookup failed.", row, error);
          }
        }
      }

      await Promise.all(
        Array.from({ length: Math.min(CONTEXT_LOOKUP_CONCURRENCY, candidates.length) }, () => worker())
      );
      pushProgress(
        "context-api",
        `Resolved ${resolved}/${candidates.length} 5-base reference window(s) from the UCSC Genome Browser API${failed ? `; ${failed} failed` : ""}.`
      );
      await refreshProfileConversion({ renderAfter: false });
      recompute();
      setStatus(
        "Reference context ready",
        `Resolved ${resolved}/${candidates.length} 5-base reference window(s) from the UCSC Genome Browser API${failed ? `; ${failed} failed and kept row-supplied context when available` : ""}.`,
        failed ? "ready" : "ready"
      );
      if (renderAfter) render();
      return { resolved, failed, requested: candidates.length };
    }

    async function refreshProfileConversion({ renderAfter = false } = {}) {
      if (!state.rows.length) {
        state.profileConversion = null;
        return;
      }
      try {
        state.profileConversion = await mSigSDK.userData.convertMafToProfileSpectra(state.rows, {
          profiles: PROFILE_DEFINITIONS.map((profile) => profile.key),
          groupBy: "sample",
          genome: state.sourceGenome,
          offline: true,
          contextLookupTable: state.lookupTable,
        });
        recompute();
        if (renderAfter) render();
      } catch (error) {
        console.warn("Profile conversion failed.", error);
        state.profileConversion = null;
      }
    }

    function setActiveStep(step) {
      state.activeStep = step;
      if (step === "normalize") selectNormalizationExample();
      render();
    }

    function setSelectedIndex(index) {
      state.selectedIndex = Math.max(0, Math.min(state.rows.length - 1, Number(index) || 0));
      render();
    }

    function parseProjects(value) {
      return String(value || "")
        .split(/[,\s]+/)
        .map((project) => project.trim())
        .filter(Boolean);
    }

    function clamp(value, min, max, fallback) {
      const parsed = Math.round(Number(value));
      if (!Number.isFinite(parsed)) return fallback;
      return Math.max(min, Math.min(max, parsed));
    }

    function rowsToMafText(rows, delimiter = "\t") {
      const preferredHeaders = [
        "Tumor_Sample_Barcode",
        "Chromosome",
        "Start_Position",
        "Reference_Allele",
        "Tumor_Seq_Allele2",
        "Variant_Type",
        "CONTEXT",
        "NCBI_Build",
        "Project",
        "GDC_File_ID",
      ];
      const extras = [];
      rows.forEach((row) => {
        Object.keys(row.raw || {}).forEach((key) => {
          if (!preferredHeaders.includes(key) && !key.startsWith("__") && !extras.includes(key)) {
            extras.push(key);
          }
        });
      });
      const headers = [...preferredHeaders, ...extras].filter((header) =>
        rows.some((row) => row.raw?.[header] !== undefined && row.raw?.[header] !== "")
      );
      const finalHeaders = headers.length ? headers : preferredHeaders.slice(0, 6);
      const escapeValue = (value) => {
        const text = String(value ?? "");
        if (delimiter === "," && /[",\n]/.test(text)) return `"${text.replaceAll('"', '""')}"`;
        return text;
      };
      return [
        finalHeaders.join(delimiter),
        ...rows.map((row) => finalHeaders.map((header) => escapeValue(row.raw?.[header])).join(delimiter)),
      ].join("\n");
    }

    function currentSpectraToTsv(spectra) {
      const samples = Object.keys(spectra || {});
      const contexts = activeContexts();
      return [
        ["MutationType", ...samples].join("\t"),
        ...contexts.map((context) =>
          [context, ...samples.map((sample) => spectra[sample]?.[context] || 0)].join("\t")
        ),
      ].join("\n");
    }

    function mafDownloadText(filename, text, type = "text/plain;charset=utf-8") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    function mafDownloadJson(filename, value) {
      mafDownloadText(filename, JSON.stringify(value, null, 2), "application/json;charset=utf-8");
    }

    function downloadCurrentMaf(format = "tsv") {
      const delimiter = format === "csv" ? "," : "\t";
      const extension = format === "csv" ? "csv" : "tsv";
      mafDownloadText(`current_maf_rows.${extension}`, rowsToMafText(state.rows, delimiter));
    }

    function downloadCurrentSpectra() {
      mafDownloadText(`maf_converted_${state.selectedProfile.toLowerCase()}.tsv`, currentSpectraToTsv(state.spectra));
    }

    function applyRows(rows, {
      source,
      filename = "",
      loadedText = "",
      metadata = null,
      selectedTcgaRows = [],
      preserveProgress = false,
    } = {}) {
      state.rows = normalizeRows(rows);
      state.inputSource = source || "uploaded";
      state.sourceFilename = filename;
      state.loadedMafText = loadedText || rowsToMafText(state.rows);
      state.pastedText = loadedText || rowsToMafText(state.rows);
      state.tcgaMetadata = metadata;
      state.selectedTcgaRows = selectedTcgaRows;
      state.lookupTable = {};
      state.profileConversion = null;
      state.selectedIndex = 0;
      state.activeStep = "fields";
      if (!preserveProgress) state.progress = [];
      recompute();
      setStatus(
        "MAF loaded",
        `Loaded ${state.rows.length} row(s) from ${source === "tcga-gdc" ? "TCGA/GDC" : filename || "pasted/uploaded text"}.`,
        "ready"
      );
      if (activeProfileUsesReferenceApi()) {
        resolveApiContextsForActiveProfile({ renderAfter: true });
      } else {
        refreshProfileConversion({ renderAfter: true });
      }
    }

    function applyPastedData(text, filename = "pasted-maf") {
      const parsed = parseDelimitedText(text);
      if (!parsed.length) {
        setStatus("No rows found", "Paste or upload a CSV/TSV file with MAF-like headers.", "error");
        return;
      }
      applyRows(parsed, {
        source: filename === "pasted-maf" ? "pasted" : "uploaded",
        filename,
        loadedText: text,
      });
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener("load", () => resolve(String(reader.result || "")));
        reader.addEventListener("error", () => reject(reader.error || new Error("File read failed.")));
        reader.readAsText(file);
      });
    }

    function selectGdcFiles(metadata, projects, maxFiles) {
      const subset = {};
      const selectedRows = [];
      for (const project of projects) {
        const rows = metadata?.[project]?.samples_description || [];
        for (const row of rows) {
          if (selectedRows.length >= maxFiles) break;
          if (!row.file_id) continue;
          if (!subset[project]) subset[project] = { maf_files: [], samples_description: [] };
          subset[project].maf_files.push(row.file_id);
          subset[project].samples_description.push(row);
          selectedRows.push(row);
        }
      }
      return { subset, selectedRows };
    }

    function gdcProgressMessage(event) {
      const total = event.total || state.tcgaSelection.maxFiles || 0;
      const completed = event.completed || 0;
      const progress = total ? `${completed}/${total} file(s)` : "selected file(s)";
      if (event.stage === "download") return `Downloading ${event.project} MAF file ${event.fileIndex}/${event.files}.`;
      if (event.stage === "parse") return `Parsing ${event.project} MAF file ${event.fileIndex}/${event.files}.`;
      if (event.stage === "file-complete") return `Loaded ${event.variants} row(s) from ${event.project} file ${event.fileIndex}/${event.files}.`;
      if (event.stage === "file-error") return `Skipped a ${event.project} file after a load error.`;
      if (event.stage === "convert") return `Converting ${event.variants} row(s) with row-supplied GDC contexts when available.`;
      if (event.stage === "project-complete") return `Converted ${event.project}; ${event.samples} sample spectrum/spectra.`;
      if (event.stage === "complete") return `Finished ${progress}. Preparing the explainer rows.`;
      return `Preparing ${progress}.`;
    }

    function mapGdcVariantRow(row, fileMetadata) {
      const fileId = row.sample || row.file_id || "";
      const meta = fileMetadata.get(fileId) || {};
      const sample = meta.case_submitter_id || meta.case_id || fileId || row.project_code || "TCGA_sample";
      return {
        Tumor_Sample_Barcode: sample,
        Chromosome: row.chromosome,
        Start_Position: row.chromosome_start,
        Reference_Allele: row.reference_genome_allele,
        Tumor_Seq_Allele2: row.mutated_to_allele,
        Variant_Type: row.mutation_type,
        CONTEXT: row.trinucleotide_context || "",
        NCBI_Build: row.build || "hg19",
        Project: row.project_code || meta.project_id || "",
        GDC_File_ID: fileId,
      };
    }

    async function loadTcgaMafSample() {
      const projects = parseProjects(state.tcgaSelection.projects);
      const maxFiles = clamp(state.tcgaSelection.maxFiles, 1, MAX_GDC_FILES, 1);
      const rowCap = clamp(state.tcgaSelection.rowCap, 1, MAX_GDC_ROWS, DEFAULT_GDC_ROWS);
      if (!projects.length) {
        setStatus("Choose a TCGA project", "Enter at least one TCGA project ID.", "error");
        return;
      }

      try {
        state.progress = [];
        pushProgress("metadata", `Querying GDC metadata for ${projects.join(", ")}.`);
        setStatus("Querying GDC metadata", `Looking for public masked somatic MAF files in ${projects.join(", ")}.`, "running");
        const metadata = await mSigSDK.TCGA.getMafInformationFromProjects(projects);
        const { subset, selectedRows } = selectGdcFiles(metadata, projects, maxFiles);
        if (!selectedRows.length) {
          throw new Error("No public GDC MAF files were found for the selected project set.");
        }

        pushProgress("metadata", `Selected ${selectedRows.length} GDC MAF file(s).`);
        setStatus("Loading TCGA/GDC MAF", `Downloading ${selectedRows.length} file(s) and reading GDC CONTEXT values.`, "running");
        const variantResult = await mSigSDK.TCGA.getVariantInformationFromMafFiles(subset, {
          fileConcurrency: 1,
          includeVariantInformation: true,
          onProgress: (event) => {
            pushProgress(event.stage || "gdc", gdcProgressMessage(event));
            state.statusTitle = "Loading TCGA/GDC MAF";
            state.status = gdcProgressMessage(event);
            state.statusType = "running";
            render();
          },
        });
        const fileMetadata = new Map(selectedRows.map((row) => [row.file_id, row]));
        const variantRows = Object.values(variantResult || {}).flatMap((payload) => payload.variant_information || []);
        const cappedRows = variantRows.slice(0, rowCap).map((row) => mapGdcVariantRow(row, fileMetadata));
        if (!cappedRows.length) {
          throw new Error("The selected GDC MAF files did not return usable variant rows.");
        }
        const text = rowsToMafText(cappedRows.map((raw, index) => ({ raw, index })));
        applyRows(cappedRows, {
          source: "tcga-gdc",
          filename: `${projects.join("_")}_gdc_maf.tsv`,
          loadedText: text,
          metadata,
          selectedTcgaRows: selectedRows,
          preserveProgress: true,
        });
        state.progress = [
          ...state.progress,
          {
            time: new Date().toLocaleTimeString(),
            label: "ready",
            message: `Using ${cappedRows.length}/${variantRows.length} variant row(s) from ${selectedRows.length} GDC file(s).`,
          },
        ].slice(-8);
        state.statusTitle = "TCGA/GDC MAF ready";
        state.status = `Using ${cappedRows.length}/${variantRows.length} row(s), capped at ${rowCap} for the explainer.`;
        state.statusType = "ready";
        render();
      } catch (error) {
        console.error(error);
        setStatus("TCGA/GDC load failed", error.message, "error");
      }
    }

    async function runLiveLookup() {
      const limit = Math.max(1, Math.min(MAX_LIVE_LOOKUP, Number(state.liveLimit) || MAX_LIVE_LOOKUP));
      const result = await resolveApiContextsForActiveProfile({ force: true, limit, renderAfter: true });
      if (!result.requested) {

    function renderMetrics() {
      const profileAudit = state.profileConversion?.audit?.profiles?.[state.selectedProfile];
      const counted = profileAudit?.countedEvents ?? state.trace.filter((row) => row.counted).length;
      const skipped = profileAudit?.skippedRows ?? state.trace.length - counted;
      const missing = state.trace.filter((row) => row.contextSource === "missing").length;
      return metrics([
        { label: "Input source", value: state.inputSource === "none" ? "not loaded" : state.inputSource },
        { label: "Rows", value: state.rows.length },
        { label: "Samples", value: Object.keys(state.spectra).length },
        { label: "Events counted", value: counted },
        { label: "Rows skipped", value: skipped },
        { label: "Missing contexts", value: missing },
      ]);

        const control = document.createElement("button");
        control.type = "button";

        const number = document.createElement("span");
        number.className = "maf-step-number";
        number.textContent = String(index + 1);
        const text = document.createElement("span");
        text.textContent = label;
        control.append(number, text);
        control.addEventListener("click", () => setActiveStep(id));
        nav.append(control);
      });
      return nav;

    function renderStepFooter() {
      const current = STEP_ORDER.findIndex(([id]) => id === state.activeStep);
      const row = document.createElement("div");
      row.className = "maf-action-row";
      const previous = mafButton("Previous");
      previous.disabled = current <= 0;
      previous.addEventListener("click", () => setActiveStep(STEP_ORDER[Math.max(0, current - 1)][0]));
      const next = mafButton("Next", "primary");
      next.disabled = current >= STEP_ORDER.length - 1;
      next.addEventListener("click", () => setActiveStep(STEP_ORDER[Math.min(STEP_ORDER.length - 1, current + 1)][0]));
      row.append(previous, next);
      return row;

      });

      });

      textarea.className = "maf-editor";
      textarea.placeholder = "Paste MAF-like CSV or TSV rows with chromosome, position, ref, alt, and variant type columns.";

    function renderNoRowsMessage() {
      return note("Load TCGA/GDC data or upload/paste a MAF-like table before using this step.");
    }

    function columnCoverageRows() {
      return REQUIRED_FIELDS.map(([field, label]) => {
        const presentRows = state.rows.filter((row) => findField(row.raw, field)).length;
        return {
          field: label,
          acceptedHeaders: (FIELD_ALIASES[field] || []).slice(0, 5).join(", "),
          rowsPresent: `${presentRows}/${state.rows.length}`,
          status: presentRows === state.rows.length ? "present" : presentRows ? "partial" : "missing",
        };
      });
    }

    function renderSelectedMafCard() {
      const traceRow = selectedTrace();
      const card = document.createElement("div");
      card.className = "maf-flow-card";
      const heading = document.createElement("h4");
      heading.textContent = "Selected row MAF fields";

        card.append(heading, renderNoRowsMessage());
        return card;
      }
      const rows = [
        { field: "Sample", value: traceRow.sample },
        { field: "Chromosome", value: traceRow.chromosome },
        { field: "Position", value: traceRow.start_position },
        { field: "Ref", value: traceRow.ref },
        { field: "Alt", value: traceRow.alt },
        { field: "Variant type", value: traceRow.variantType },

      ];

        heading,

          { key: "field", label: "Field" },
          { key: "value", label: "Value" },
        ], { maxRows: 8 })
      );

    function renderRowTable(maxRows = 30) {
      if (!state.rows.length) return renderNoRowsMessage();
      const wrapper = document.createElement("div");
      wrapper.className = "maf-row-table-wrap";
      const tableElement = document.createElement("table");
      tableElement.className = "maf-row-table";
      const head = document.createElement("thead");
      head.innerHTML = `
        <tr>
          <th>Row</th>
          <th>Sample</th>
          <th>Chrom</th>
          <th>Position</th>
          <th>Ref</th>
          <th>Alt</th>
          <th>Type</th>
          <th>Context source</th>
          <th>Result</th>
        </tr>
      `;
      const body = document.createElement("tbody");
      state.trace.slice(0, maxRows).forEach((traceRow) => {
        const tr = document.createElement("tr");
        tr.className = traceRow.index === state.selectedIndex ? "selected" : "";
        const selectButton = mafButton(String(traceRow.index + 1));
        selectButton.addEventListener("click", () => setSelectedIndex(traceRow.index));
        [
          selectButton,
          traceRow.sample,
          traceRow.chromosome,
          traceRow.start_position,
          traceRow.ref || "-",
          traceRow.alt || "-",
          traceRow.variantType || "-",
          traceRow.contextSource,
          traceRow.counted ? traceRow.finalBin : traceRow.skippedReason,
        ].forEach((value) => {
          const td = document.createElement("td");
          if (value instanceof Node) td.append(value);
          else td.textContent = String(value ?? "");
          tr.append(td);
        });
        tr.addEventListener("click", (event) => {
          if (event.target.tagName !== "BUTTON") setSelectedIndex(traceRow.index);
        });
        body.append(tr);
      });
      tableElement.append(head, body);
      wrapper.append(tableElement);
      return wrapper;
    }

    function renderInspectStep() {
      const panel = document.createElement("section");
      panel.className = "maf-step-panel";
      const heading = document.createElement("h3");
      heading.textContent = "2. Inspect MAF fields";
      if (!state.rows.length) {
        panel.append(heading, renderNoRowsMessage(), renderStepFooter());
        return panel;
      }
      const grid = document.createElement("div");
      grid.className = "maf-two-column";
      grid.append(
        table(columnCoverageRows(), [
          { key: "field", label: "Required field" },
          { key: "acceptedHeaders", label: "Accepted headers" },
          { key: "rowsPresent", label: "Rows present" },
          { key: "status", label: "Status" },
        ], { title: "Column coverage", maxRows: 8 }),
        renderSelectedMafCard()
      );
      panel.append(
        heading,
        note("MAF supplies the coordinate and alleles. The context column is optional; most ordinary MAFs do not include it."),
        grid,
        renderRowTable(),
        renderStepFooter()
      );
      return panel;
    }

    function mafCaption(text) {
      const copy = document.createElement("p");
      copy.className = "maf-caption";
      copy.textContent = text;
      return copy;
    }

    function renderFactGrid(rows) {
      const grid = document.createElement("div");
      grid.className = "maf-fact-grid";
      rows.forEach(([label, value]) => {
        const item = document.createElement("div");
        item.className = "maf-fact";
        const labelNode = document.createElement("span");
        labelNode.textContent = label;
        const valueNode = document.createElement("strong");
        valueNode.textContent = value == null || value === "" ? "-" : String(value);
        item.append(labelNode, valueNode);
        grid.append(item);
      });
      return grid;
    }

    function renderContextSourceSummary(sourceRows) {
      const row = document.createElement("div");
      row.className = "maf-source-summary";
      sourceRows.forEach(({ source, rows }) => {
        const pill = document.createElement("span");
        pill.className = source === "missing" ? "maf-pill warning" : "maf-pill";
        pill.textContent = `${source}: ${rows}`;
        row.append(pill);
      });
      return row;
    }

    function renderContextStrip(context, ref) {
      const strip = document.createElement("div");
      strip.className = "maf-base-strip";
      const labels = ["5' base", "reference", "3' base"];
      const bases = context ? context.split("") : ["?", ref || "?", "?"];
      bases.forEach((base, index) => {
        const node = document.createElement("div");
        node.className = `maf-base ${index === 1 ? "center" : ""}`.trim();
        const big = document.createElement("span");
        big.textContent = base || "?";
        const small = document.createElement("small");
        small.textContent = labels[index];
        node.append(big, small);
        strip.append(node);
      });
      return strip;
    }

    function renderLookupStep() {
      const panel = document.createElement("section");
      panel.className = "maf-step-panel";
      const heading = document.createElement("h3");
      heading.textContent = "3. Resolve reference context";
      if (!state.rows.length) {
        panel.append(heading, renderNoRowsMessage(), renderStepFooter());
        return panel;
      }
      const traceRow = selectedTrace();
      if (!state.selectedProfile.startsWith("SBS")) {
        heading.textContent = "3. Resolve profile evidence";
        const rows = state.trace.slice(0, 50).map((row) => ({
          row: (row.rowIndices || [row.index]).map((value) => Number(value) + 1).join(", "),
          sample: row.sample,
          event: row.originalChange || `${row.ref || "-"}>${row.alt || "-"}`,
          evidence: row.contextSource || "-",
          status: row.counted ? "counted" : row.skippedReason,
        }));
        const sourceRows = Object.entries(
          state.trace.reduce((acc, row) => {
            const source = row.contextSource || "missing";
            acc[source] = (acc[source] || 0) + 1;
            return acc;
          }, {})
        ).map(([source, rows]) => ({ source, rows }));
        panel.append(
          heading,
          mafCaption("DBS78 uses explicit DNP rows or adjacent SNV pairs. ID83 uses insertion/deletion alleles and repeat or microhomology annotations when present."),
          table(rows, [
            { key: "row", label: "Row" },
            { key: "sample", label: "Sample" },
            { key: "event", label: "Event" },
            { key: "evidence", label: "Evidence" },
            { key: "status", label: "Status" },
          ], { title: `${state.selectedProfile} evidence source`, maxRows: 50 }),
          renderContextSourceSummary(sourceRows),
          renderStepFooter()
        );
        return panel;
      }
      const liveLimit = document.createElement("input");
      liveLimit.type = "number";
      liveLimit.min = "1";
      liveLimit.max = String(MAX_LIVE_LOOKUP);
      liveLimit.step = "1";
      liveLimit.value = String(state.liveLimit);
      liveLimit.addEventListener("input", () => {
        state.liveLimit = clamp(liveLimit.value, 1, MAX_LIVE_LOOKUP, MAX_LIVE_LOOKUP);
        liveLimit.value = String(state.liveLimit);
      });
      const genome = document.createElement("select");
      ["hg19", "hg38"].forEach((build) => {
        const option = document.createElement("option");
        option.value = build;
        option.textContent = build;
        genome.append(option);
      });
      genome.value = state.sourceGenome;
      genome.addEventListener("change", () => {
        state.sourceGenome = genome.value;
      });
      const liveButton = mafButton("Refresh API context", "primary");
      liveButton.addEventListener("click", runLiveLookup);
      const controlRow = document.createElement("div");
      controlRow.className = "maf-lookup-controls";
      controlRow.append(
        mafField("API lookup row cap", liveLimit, `Maximum ${MAX_LIVE_LOOKUP} rows per manual refresh.`),
        mafField("Genome build", genome, "Used for UCSC Genome Browser API context lookup."),
        liveButton
      );
      const lookupCard = document.createElement("div");
      lookupCard.className = "maf-flow-card";
      const lookupHeader = document.createElement("div");
      lookupHeader.className = "maf-card-header";
      const lookupHeading = document.createElement("h4");
      lookupHeading.textContent = `${traceRow.lookupKey}: ${traceRow.ref}>${traceRow.alt}`;
      const sourceBadge = document.createElement("span");
      sourceBadge.className = traceRow.contextSource === "missing" ? "maf-pill warning" : "maf-pill highlight";
      sourceBadge.textContent = traceRow.contextSource;
      lookupHeader.append(lookupHeading, sourceBadge);
      lookupCard.append(
        lookupHeader,
        renderContextStrip(traceRow.referenceContext, traceRow.ref),
        renderFactGrid([
          [
            state.selectedProfile === "SBS1536"
              ? "Reference pentanucleotide"
              : "Reference trinucleotide",
            traceRow.referenceContext || "-",
          ],
          ["Center matches ref", traceRow.referenceMatchesContext ? "Yes" : "Review"],
          ["Lookup key", traceRow.lookupKey],
        ])
      );
      const sourceRows = Object.entries(
        state.trace.reduce((acc, row) => {
          acc[row.contextSource] = (acc[row.contextSource] || 0) + 1;
          return acc;
        }, {})
      ).map(([source, rows]) => ({ source, rows }));
      panel.append(
        heading,
        mafCaption(state.selectedProfile.startsWith("SBS")
          ? "SBS profiles use 5-base reference windows fetched from the UCSC Genome Browser API. SBS96 uses the centered trinucleotide; SBS1536 uses the full pentanucleotide."
          : "DBS and ID profiles use allele-level event evidence; sequence context is used only when the selected profile requires it."),
        controlRow,
        lookupCard,
        renderContextSourceSummary(sourceRows),
        renderStepFooter()
      );
      return panel;
    }

    function renderNormalizationStep() {
      const panel = document.createElement("section");
      panel.className = "maf-step-panel";
      const heading = document.createElement("h3");
      heading.textContent = state.selectedProfile.startsWith("SBS") ? "4. Pyrimidine-normalize" : "4. Classify event evidence";
      if (!state.rows.length) {
        panel.append(heading, renderNoRowsMessage(), renderStepFooter());
        return panel;
      }
      if (!state.selectedProfile.startsWith("SBS")) {
        const rows = state.trace.slice(0, 50).map((row) => ({
          row: (row.rowIndices || [row.index]).map((value) => Number(value) + 1).join(", "),
          sample: row.sample,
          event: row.originalChange || `${row.ref || "-"}>${row.alt || "-"}`,
          evidence: row.contextSource || "-",
          bin: row.counted ? row.finalBin : "-",
          status: row.counted ? "counted" : row.skippedReason,
        }));
        panel.append(
          heading,
          note("The selected profile uses the MAF event type and alleles to classify rows before binning. DBS78 accepts explicit DNP rows or adjacent SNV pairs; ID83 accepts insertion and deletion alleles with repeat or microhomology annotations when present."),
          table(rows, [
            { key: "row", label: "Row" },
            { key: "sample", label: "Sample" },
            { key: "event", label: "Event" },
            { key: "evidence", label: "Evidence" },
            { key: "bin", label: `${state.selectedProfile} bin` },
            { key: "status", label: "Status" },
          ], { title: "Profile-specific event classification", maxRows: 50 }),
          renderStepFooter()
        );
        return panel;
      }
      const traceRow = normalizationExampleTrace();
      const before = document.createElement("div");
      before.className = "maf-flow-card";
      before.append(
        Object.assign(document.createElement("h4"), { textContent: "Original row view" }),
        renderContextStrip(traceRow.referenceContext, traceRow.ref),
        pillRow([
          ["Context", traceRow.referenceContext || "-"],
          ["Change", traceRow.originalSubstitution || "-"],
          ["Reference base", traceRow.purineReference ? "purine" : "pyrimidine"],
        ])
      );
      const after = document.createElement("div");
      after.className = "maf-flow-card";
      after.append(
        Object.assign(document.createElement("h4"), { textContent: "COSMIC pyrimidine view" }),
        renderContextStrip(traceRow.normalizedContext, traceRow.normalizedSubstitution?.[0]),
        pillRow([
          ["Normalized context", traceRow.normalizedContext || "-"],
          ["Normalized change", traceRow.normalizedSubstitution || "-"],
          ["Action", traceRow.purineReference ? "reverse-complemented" : "already C/T-centered"],
        ], traceRow.purineReference)
      );
      const complement = table([
        { base: "A", complement: "T" },
        { base: "C", complement: "G" },
        { base: "G", complement: "C" },
        { base: "T", complement: "A" },
      ], [
        { key: "base", label: "Base" },
        { key: "complement", label: "Complement" },
      ], { title: "Reverse-complement map", maxRows: 4 });
      const grid = document.createElement("div");
      grid.className = "maf-three-column";
      grid.append(before, after, complement);
      panel.append(
        heading,
        note("COSMIC SBS96 records substitutions from the pyrimidine base. A/G-reference rows are reverse-complemented so the changed base is represented as C or T."),
        grid,
        traceRow.purineReference
          ? codeBlock(`${traceRow.referenceContext} ${traceRow.originalSubstitution} -> reverse complement ${traceRow.reverseComplementContext} -> ${traceRow.normalizedContext} ${traceRow.normalizedSubstitution}`)
          : note("The selected row already uses a C/T reference base, so no reverse complement is needed."),
        renderStepFooter()
      );
      return panel;
    }

    function pillRow(items, highlight = false) {
      const row = document.createElement("div");
      row.className = "maf-pill-row";
      items.forEach(([label, value]) => {
        const pill = document.createElement("span");
        pill.className = `maf-pill ${highlight ? "highlight" : ""}`.trim();
        pill.textContent = `${label}: ${value}`;
        row.append(pill);
      });
      return row;
    }

    function codeBlock(text) {
      const code = document.createElement("pre");
      code.className = "maf-code";
      code.textContent = text;
      return code;
    }

    function countedBinRows() {
      const counts = new Map();
      state.trace.forEach((row) => {
        if (!row.counted) return;
        const key = `${row.sample}\t${row.finalBin}`;
        counts.set(key, {
          sample: row.sample,
          profileBin: row.finalBin,
          count: (counts.get(key)?.count || 0) + 1,
        });
      });
      return [...counts.values()].sort((a, b) => b.count - a.count || a.sample.localeCompare(b.sample)).slice(0, 20);
    }

    function binningStats() {
      const countedRows = state.trace.filter((row) => row.counted).length;
      const skippedRows = Math.max(0, state.trace.length - countedRows);
      const uniqueBins = new Set(state.trace.filter((row) => row.counted).map((row) => row.finalBin)).size;
      return [
        { label: "Rows counted", value: countedRows },
        { label: "Rows skipped", value: skippedRows },
        { label: "Non-zero bins", value: uniqueBins },
        { label: "Profile bins", value: activeContexts().length },
      ];
    }

    function renderBinningOverview() {
      const overview = document.createElement("div");
      overview.className = "maf-bin-overview";
      binningStats().forEach(({ label, value }) => {
        const item = document.createElement("div");
        item.className = "maf-bin-stat";
        item.append(
          Object.assign(document.createElement("span"), { textContent: label }),
          Object.assign(document.createElement("strong"), { textContent: String(value) })
        );
        overview.append(item);
      });
      return overview;
    }

    function metaItem(label, value) {
      const item = document.createElement("div");
      item.append(
        Object.assign(document.createElement("span"), { textContent: label }),
        Object.assign(document.createElement("strong"), { textContent: String(value || "-") })
      );
      return item;
    }

    function renderSelectedBinCard(traceRow) {
      const card = document.createElement("div");
      card.className = "maf-bin-card";
      const value = document.createElement("div");
      value.className = `maf-bin-value ${traceRow.counted ? "" : "warning"}`.trim();
      value.textContent = traceRow.counted ? traceRow.finalBin : "Skipped";
      const meta = document.createElement("div");
      meta.className = "maf-bin-meta";
      meta.append(
        metaItem("Sample", traceRow.sample),
        metaItem("Row", traceRow.index + 1),
        metaItem("Original", traceRow.originalSubstitution),
        metaItem("Profile change", traceRow.normalizedSubstitution || traceRow.originalChange || "-"),
        metaItem("Context", traceRow.referenceContext || "-"),
        metaItem("Status", traceRow.counted ? "counted" : traceRow.skippedReason)
      );
      card.append(
        Object.assign(document.createElement("h4"), { textContent: "Selected row" }),
        value,
        meta
      );
      return card;
    }

    function renderTopBinList(rows) {
      const card = document.createElement("div");
      card.className = "maf-bin-card";
      card.append(Object.assign(document.createElement("h4"), { textContent: `Top ${state.selectedProfile} bins` }));
      const list = document.createElement("div");
      list.className = "maf-bin-list";
      const maxCount = Math.max(1, ...rows.map((row) => row.count));
      rows.slice(0, 8).forEach((row) => {
        const item = document.createElement("div");
        item.className = "maf-bin-list-row";
        const label = document.createElement("div");
        label.className = "maf-bin-label";
        label.textContent = row.profileBin;
        const bar = document.createElement("div");
        bar.className = "maf-bin-bar";
        const fill = document.createElement("span");
        fill.style.width = `${Math.max(4, Math.round((row.count / maxCount) * 100))}%`;
        bar.append(fill);
        const count = document.createElement("div");
        count.className = "maf-bin-count";
        count.textContent = `${row.count} row${row.count === 1 ? "" : "s"}`;
        item.append(label, bar, count);
        list.append(item);
      });
      if (!rows.length) {
        list.append(note("No counted bins are available for the selected profile."));
      }
      card.append(list);
      return card;
    }

    function renderTraceDetails(traceRows) {
      const detailsNode = document.createElement("details");
      detailsNode.className = "maf-trace-details";
      const summary = document.createElement("summary");
      summary.textContent = `Row-level binning trace (${Math.min(50, state.trace.length)} shown)`;
      detailsNode.append(
        summary,
        table(traceRows, [
          { key: "row", label: "Row" },
          { key: "sample", label: "Sample" },
          { key: "originalChange", label: "Original ref>alt" },
          { key: "normalizedChange", label: "Profile change" },
          { key: "finalBin", label: `${state.selectedProfile} bin` },
          { key: "status", label: "Status" },
        ], { maxRows: 50 })
      );
      return detailsNode;
    }

    function renderBinningStep() {
      const panel = document.createElement("section");
      panel.className = "maf-step-panel";
      const heading = document.createElement("h3");
      heading.textContent = `5. Assign ${state.selectedProfile} bins`;
      if (!state.rows.length) {
        panel.append(heading, renderNoRowsMessage(), renderStepFooter());
        return panel;
      }
      const traceRow = selectedTrace();
      const topBins = countedBinRows();
      const grid = document.createElement("div");
      grid.className = "maf-bin-layout";
      grid.append(
        renderSelectedBinCard(traceRow),
        renderTopBinList(topBins)
      );
      const traceRows = state.trace.slice(0, 50).map((row) => ({
        row: row.index + 1,
        sample: row.sample,
        originalChange: row.originalSubstitution,
        normalizedChange: row.normalizedSubstitution || "-",
        finalBin: row.counted ? row.finalBin : "-",
        status: row.counted ? "counted" : row.skippedReason,
      }));
      panel.append(
        heading,
        renderBinningOverview(),
        grid,
        renderTraceDetails(traceRows),
        renderStepFooter()
      );
      return panel;
    }

    function renderExportStep() {
      const panel = document.createElement("section");
      panel.className = "maf-step-panel";
      const heading = document.createElement("h3");
      heading.textContent = "6. Export spectra";
      if (!state.rows.length) {
        panel.append(heading, renderNoRowsMessage(), renderStepFooter());
        return panel;
      }
      const groupSelect = document.createElement("select");
      Object.keys(state.spectra).forEach((sample) => {
        const option = document.createElement("option");
        option.value = sample;
        option.textContent = sample;
        groupSelect.append(option);
      });
      groupSelect.value = state.selectedGroup;
      groupSelect.addEventListener("change", () => {
        state.selectedGroup = groupSelect.value;
        render();
      });
      const plotFrame = document.createElement("div");
      plotFrame.className = "maf-plot-frame";
      if (state.selectedProfile === "DBS78") {
        plotFrame.style.minHeight = "620px";
        plotFrame.style.width = "1680px";
      } else if (state.selectedProfile === "ID83") {
        plotFrame.style.minHeight = "720px";
        plotFrame.style.width = "1960px";
      } else if (state.selectedProfile === "SBS1536") {
        plotFrame.style.minHeight = "680px";
      }
      const plotScroll = document.createElement("div");
      plotScroll.className = "maf-plot-scroll";
      plotScroll.append(plotFrame);
      const traceRow = selectedTrace();
      const highlightedContext =
        traceRow?.counted && traceRow.sample === state.selectedGroup
          ? traceRow.finalBin
          : null;
      const downloads = document.createElement("div");
      downloads.className = "maf-button-row";
      [
        ["Current MAF TSV", () => downloadCurrentMaf("tsv")],
        ["Current MAF CSV", () => downloadCurrentMaf("csv")],
        ["Trace JSON", () => mafDownloadJson("maf_conversion_trace.json", state.trace)],
        [`${state.selectedProfile} TSV`, downloadCurrentSpectra],
        ["Audit CSV", () => mafDownloadText("maf_conversion_audit.csv", mafRowsToCsv([
          ...(state.audit?.rows || []).map((row) => ({ level: "input", ...row })),
          ...(state.audit?.groupRows || []).map((row) => ({ level: "group", ...row })),
        ]))],
        ["TCGA metadata JSON", () => mafDownloadJson("tcga_gdc_maf_metadata.json", state.tcgaMetadata || {})],
      ].forEach(([label, handler]) => {
        const control = mafButton(`Download ${label}`);
        if (label.startsWith("TCGA") && !state.tcgaMetadata) control.disabled = true;
        control.addEventListener("click", handler);
        downloads.append(control);
      });
      panel.append(
        heading,
        mafField("Sample shown", groupSelect, "The selected row's bin is highlighted when it belongs to this sample."),
        plotScroll,
        table(state.audit?.rows || [], [
          { key: "checkpoint", label: "Checkpoint" },
          { key: "value", label: "Value" },
        ], { title: "Conversion audit", maxRows: 10 }),
        table(state.audit?.groupRows || [], [
          { key: "sample", label: "Sample" },
          { key: "inputRows", label: "Input rows" },
          { key: "countedRows", label: "Source rows used" },
          { key: "countedEvents", label: "Events counted" },
          { key: "spectrumTotal", label: "Spectrum total" },
          { key: "countCheck", label: "Count check" },
        ], { title: "Group count reconciliation", maxRows: 10 }),
        downloads,
        details("Selected row trace JSON", traceRow || {}),
        renderStepFooter()
      );
      requestAnimationFrame(() => {
        if (!state.selectedGroup) return;
        mSigSDK.qcPlots.plotCosmicProfile(plotFrame, state.spectra, {
          profileKey: state.selectedProfile,
          profile: activeProfileDefinition()?.profile,
          matrix: activeProfileDefinition()?.matrix || activeContexts().length,
          sample: state.selectedGroup,
          contexts: activeContexts(),
          title: `Converted ${state.selectedProfile} spectrum`,
          subtitle:
            state.selectedProfile === "SBS96"
              ? "Every x-axis label is a trinucleotide bin. The selected row's bin is outlined when it contributes to this sample."
              : `${state.selectedProfile} is rendered with its profile-specific COSMIC bin order.`,
          dataset: "MAF-derived profile",
          height:
            state.selectedProfile === "DBS78"
              ? 580
              : state.selectedProfile === "ID83"
                ? 660
              : state.selectedProfile === "SBS1536"
                ? 640
                : undefined,
          width:
            state.selectedProfile === "DBS78"
              ? 1680
              : state.selectedProfile === "ID83"
                ? 1960
                : undefined,
          scale: ["DBS78", "ID83"].includes(state.selectedProfile) ? "percent" : undefined,
          tickFontSize: state.selectedProfile === "DBS78" ? 10 : undefined,
          showContextLabels: state.selectedProfile === "SBS96",
          highlightContexts: highlightedContext ? [highlightedContext] : [],
        });
      });
      return panel;
    }

    function renderActiveStep() {
      if (state.activeStep === "fields") return renderInspectStep();
      if (state.activeStep === "lookup") return renderLookupStep();
      if (state.activeStep === "normalize") return renderNormalizationStep();
      if (state.activeStep === "binning") return renderBinningStep();
      if (state.activeStep === "export") return renderExportStep();
      return renderLoadStep();
    }

    function render() {
      recompute();
      root.replaceChildren(
        renderHero(),
        statusCard(),
        renderProfilePanel(),
        renderMetrics(),
        renderStepper(),
        renderActiveStep()
      );
    }

    const app = {
      state,
      get inputSource() {
        return state.inputSource;
      },
      get sourceFilename() {
        return state.sourceFilename;
      },
      get tcgaSelection() {
        return state.tcgaSelection;
      },
      get loadedMafText() {
        return state.loadedMafText;
      },
      loadTcgaMafSample,
      parseText: applyPastedData,
      runLiveLookup,
      setSelectedRow: setSelectedIndex,
      setActiveStep,
      downloadCurrentMaf,
      downloadCurrentSpectra,
      render,
    };
    window.mafConversionApp = app;

    recompute();
    render();
  </script>
</notebook>
