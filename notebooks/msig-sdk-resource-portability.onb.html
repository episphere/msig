    function clampSampleLimit(value) {
      const numeric = Math.round(Number(value));
      if (!Number.isFinite(numeric)) return DEFAULT_SAMPLE_LIMIT;
      return Math.max(1, Math.min(MAX_SAMPLES, numeric));
    }

    function createButton(label, variant = "") {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `workflow-button ${variant}`.trim();
      button.textContent = label;
      return button;
    }

    function createField(label, control, helper = "") {
      const wrapper = document.createElement("label");
      wrapper.className = "workflow-field";
      const title = document.createElement("span");
      title.textContent = label;
      wrapper.append(title, control);
      if (helper) {
        const small = document.createElement("small");
        small.textContent = helper;
        wrapper.append(small);
      }
      return wrapper;
    }

    function statusCard(title, detail, tone = "ready") {
      const node = document.createElement("div");
      node.className = `resource-status ${tone === "ready" ? "" : tone}`.trim();
      const dot = document.createElement("span");
      dot.className = "resource-status-dot";

      span.textContent = detail;

    }

    function setStatus(status, detail, error = null) {
      state.status = status;
      state.statusDetail = detail;
      state.error = error;
      render();
    }

    function matrixNames(matrix = {}) {
      return Object.keys(matrix || {});
    }

    function matrixTotal(matrix = {}, contexts = CONTEXTS) {
      return Object.values(matrix || {}).reduce((sum, record) => {
        const contextList = contexts?.length ? contexts : Object.keys(record || {});
        return sum + contextList.reduce(
          (recordSum, context) => recordSum + Number(record?.[context] || 0),
          0
        );
      }, 0);
    }

    function sameSet(left = [], right = []) {
      return left.length === right.length && left.every((value) => right.includes(value));
    }

    function maxAbsMatrixDelta(left = {}, right = {}, contexts = CONTEXTS) {
      let maxDelta = 0;
      for (const name of Object.keys(left || {})) {
        const contextList = contexts?.length ? contexts : Object.keys(left[name] || {});
        for (const context of contextList) {
          const delta = Math.abs(
            Number(left?.[name]?.[context] || 0) - Number(right?.[name]?.[context] || 0)
          );
          if (delta > maxDelta) maxDelta = delta;
        }
      }
      return maxDelta;
    }

    function pass(condition) {
      return condition ? "Pass" : "Review";
    }

    function basename(path) {
      return String(path || "file.txt").split("/").filter(Boolean).pop() || "file.txt";
    }

    function selectedToolIds() {
      const selected = [...root.querySelectorAll("input[name='resource-tool']:checked")]
        .map((input) => input.value);
      return selected.length ? selected : OUTBOUND_TOOLS.filter((tool) => tool.defaultChecked).map((tool) => tool.id);
    }

    function generatedFileRows(files = state.generatedFiles) {
      return files.map((file) => ({
        tool: file.tool,
        file: file.filename,
        purpose: file.purpose,
      }));
    }

    function generatedFilePurpose(tool, file) {
      const filename = basename(file?.path || "").toLowerCase();
      if (filename.includes("signature")) return "Signature catalog input";
      if (
        filename.includes("spectra") ||
        filename.includes("sample") ||
        filename.includes("matrix")
      ) {
        return "SBS96 sample matrix input";
      }
      return `${tool.label} input`;
    }

    function removeSampleScripts(bundle) {
      return {
        ...bundle,
        tools: Object.fromEntries(
          Object.entries(bundle?.tools || {}).map(([key, prepared]) => {
            const { pythonSnippet, rSnippet, ...withoutSnippets } = prepared || {};
            const manifest = withoutSnippets.manifest && typeof withoutSnippets.manifest === "object"
              ? { ...withoutSnippets.manifest }
              : withoutSnippets.manifest;
            if (manifest && typeof manifest === "object") {
              delete manifest.pythonSnippet;
              delete manifest.rSnippet;
              delete manifest.script;
              delete manifest.scripts;
            }
            return [key, { ...withoutSnippets, manifest }];
          })
        ),
      };
    }

    function flattenGeneratedFiles(bundle) {
      const files = [];
      for (const tool of OUTBOUND_TOOLS) {
        const prepared = bundle?.tools?.[tool.key];
        if (!prepared) continue;
        for (const file of prepared.files || []) {
          files.push({
            key: `${tool.key}:${file.path}`,
            tool: tool.label,
            filename: `${tool.key}_${basename(file.path)}`,
            path: file.path,
            kind: "input file",
            environment: tool.environment,
            orientation: tool.orientation,
            purpose: generatedFilePurpose(tool, file),
            text: file.text || "",
          });
        }
      }
      return files;
    }

    function previewText(text, rowLimit = 80) {
      return String(text || "").split(/\r?\n/).slice(0, rowLimit).join("\n");
    }

    function exposureExampleText({ signatureRows = false } = {}) {
      const samples = matrixNames(state.spectra).slice(0, 3);
      const signatures = matrixNames(state.signatures).slice(0, 4);
      const values = [
        [0.62, 0.2, 0.13, 0.05],
        [0.1, 0.56, 0.22, 0.12],
        [0.18, 0.12, 0.58, 0.12],
      ];
      if (signatureRows) {
        return [
          ["Signature", ...samples].join("\t"),
          ...signatures.map((signature, signatureIndex) => [
            signature,
            ...samples.map((_, sampleIndex) => values[sampleIndex]?.[signatureIndex] ?? 0),
          ].join("\t")),
        ].join("\n");
      }
      return [
        ["sample", ...signatures].join("\t"),
        ...samples.map((sample, sampleIndex) => [
          sample,
          ...signatures.map((_, signatureIndex) => values[sampleIndex]?.[signatureIndex] ?? 0),
        ].join("\t")),
      ].join("\n");
    }

    function sigProfilerExtractorExample() {
      const signatures = takeMatrixColumns(state.signatures, matrixNames(state.signatures).slice(0, 3));
      const signatureText = mSigSDK.io.exportCOSMICSignatureMatrix(signatures, {
        contexts: state.contexts,

      return JSON.stringify(
        [
          {
            path: "/output/SBS96/Suggested_Solution/Signatures/SBS96_Signatures.txt",
            text: signatureText,
          },
          {
            path: "/output/SBS96/Suggested_Solution/Activities/SBS96_Activities.txt",
            text: exposureExampleText(),

        null,
        2

    function matrixGeneratorExample() {

    function exampleTextForPlatform(platformId = state.selectedInboundPlatform) {
      if (!state.spectra || !state.signatures) return "";
      switch (platformId) {
        case "sigprofilerextractor":
          return sigProfilerExtractorExample();
        case "sigprofilermatrixgenerator":
          return matrixGeneratorExample();
        case "musical":
          return exposureExampleText({ signatureRows: true });
        default:
          return exposureExampleText();
      }
    }

    function takeMatrixColumns(matrix, names) {
      return Object.fromEntries(
        names.filter((name) => matrix?.[name]).map((name) => [name, matrix[name]])
      );
    }

    function parseJsonFiles(text) {
      const files = JSON.parse(text);
      if (!Array.isArray(files)) {
        throw new Error("Paste a JSON array of { path, text } objects.");
      }
      return files;
    }

    function summarizeParsedResult(platformId, parsed) {
      if (platformId === "sigprofilerextractor") {
        const signatureValidation = mSigSDK.validation.validateSignatureMatrix(
          parsed.signatures || {},
          { expectedContexts: state.contexts }
        );
        const exposureValidation = mSigSDK.validation.validateExposureMatrix(
          parsed.exposures || {}
        );
        return {
          type: "signatures_and_exposures",
          rows: [
            {
              object: "Extracted signatures",
              count: matrixNames(parsed.signatures).length,
              dimensions: `${matrixNames(parsed.signatures).length} x ${signatureValidation.contexts.length}`,
              validation: pass(signatureValidation.valid),
            },
            {
              object: "Activities",
              count: matrixNames(parsed.exposures).length,
              dimensions: `${matrixNames(parsed.exposures).length} x ${exposureValidation.signatures.length}`,
              validation: pass(exposureValidation.valid),
            },
          ],
          validation: { signatureValidation, exposureValidation },
        };
      }
      if (platformId === "sigprofilermatrixgenerator") {
        const key = Object.keys(parsed.matrices || {})[0] || "matrix";
        const matrix = parsed.matrices?.[key] || {};
        const validation = mSigSDK.validation.validateSpectra(matrix, {
          expectedContexts: state.contexts,
        });
        return {
          type: "spectra",
          rows: [
            {
              object: key,
              count: matrixNames(matrix).length,
              dimensions: `${matrixNames(matrix).length} x ${validation.contexts.length}`,
              validation: pass(validation.valid),
            },
          ],
          validation,
        };
      }
      const validation = mSigSDK.validation.validateExposureMatrix(parsed || {});
      return {
        type: "exposures",
        rows: [
          {
            object: "Exposure matrix",
            count: matrixNames(parsed).length,
            dimensions: `${matrixNames(parsed).length} x ${validation.signatures.length}`,
            validation: pass(validation.valid),
          },
        ],
        validation,
      };
    }

    function parseExternalText(platformId, text) {
      switch (platformId) {
        case "sigprofilerassignment":
          return mSigSDK.adapters.parseExposureTables(
            [{ path: "sigprofilerassignment_activities.tsv", text }],
            { normalize: true }
          ).exposures;
        case "deconstructsigs":
          return mSigSDK.adapters.parseDeconstructSigsOutput(text, { normalize: true });
        case "sigminer":
          return mSigSDK.adapters.parseSigminerOutput(text, { normalize: true });
        case "musical":
          return mSigSDK.io.importMuSiCalOutput(text, { normalize: true });
        case "sigprofilerextractor":
          return mSigSDK.adapters.parseSigProfilerExtractorOutput(
            parseJsonFiles(text),
            { normalize: true }
          );
        case "sigprofilermatrixgenerator":
          return mSigSDK.adapters.parseSigProfilerMatrixGeneratorOutput(parseJsonFiles(text));
        default:
          throw new Error(`Unsupported platform: ${platformId}`);
      }
    }

    function exposureLongRows(exposures = {}) {
      return Object.entries(exposures).flatMap(([sample, row]) =>
        Object.entries(row || {}).map(([signature, exposure]) => ({
          sample,
          signature,
          exposure,
        }))
      );
    }

    function buildRoundTripReport() {
      const spectraTsv = mSigSDK.io.exportSigProfilerMatrix(state.spectra, {
        contexts: state.contexts,
      });
      const signatureTsv = mSigSDK.io.exportCOSMICSignatureMatrix(state.signatures, {
        contexts: state.contexts,
      });
      const importedSpectra = mSigSDK.io.importSigProfilerMatrix(spectraTsv);
      const importedSignatures = mSigSDK.io.importCOSMICSignatureMatrix(signatureTsv);
      const externalExposures = mSigSDK.io.importMuSiCalOutput(exposureExampleText(), {
        normalize: true,
      });
      const exposureRows = exposureLongRows(externalExposures);
      const spectraDelta = maxAbsMatrixDelta(state.spectra, importedSpectra, state.contexts);
      const signatureDelta = maxAbsMatrixDelta(state.signatures, importedSignatures, state.contexts);
      const exposureValidation = mSigSDK.validation.validateExposureMatrix(externalExposures);

      const checks = [
        {
          check: "Sample names preserved",
          status: pass(sameSet(matrixNames(state.spectra), matrixNames(importedSpectra))),
          observed: `${matrixNames(importedSpectra).length} samples`,
        },
        {
          check: "SBS96 contexts preserved",
          status: pass(Object.values(importedSpectra).every((row) => Object.keys(row || {}).length === state.contexts.length)),
          observed: `${state.contexts.length} contexts`,
        },
        {
          check: "Spectra counts preserved",
          status: pass(Math.abs(matrixTotal(state.spectra, state.contexts) - matrixTotal(importedSpectra, state.contexts)) < 1e-9),
          observed: formatNumber(matrixTotal(importedSpectra, state.contexts)),
        },
        {
          check: "Spectra cells match",
          status: pass(spectraDelta === 0),
          observed: String(spectraDelta),
        },
        {
          check: "Signature names preserved",
          status: pass(sameSet(matrixNames(state.signatures), matrixNames(importedSignatures))),
          observed: `${matrixNames(importedSignatures).length} signatures`,
        },
        {
          check: "Signature probabilities match",
          status: pass(signatureDelta === 0),
          observed: String(signatureDelta),
        },
        {
          check: "External exposure parser works",
          status: pass(exposureValidation.valid && exposureRows.length > 0),
          observed: `${exposureRows.length} long-form rows`,
        },
      ];

      return {
        generatedAt: new Date().toISOString(),
        source: state.dataset?.source || "mSigPortal public API",
        spectraTsv,
        signatureTsv,
        importedSpectra,
        importedSignatures,
        externalExposures,
        exposureRows,
        checks,
      };
    }

    function coreDownloadFiles() {
      const spectraTsv = state.roundTripReport?.spectraTsv ||
        (state.spectra ? mSigSDK.io.exportSigProfilerMatrix(state.spectra, { contexts: state.contexts }) : "");
      const signatureTsv = state.roundTripReport?.signatureTsv ||
        (state.signatures ? mSigSDK.io.exportCOSMICSignatureMatrix(state.signatures, { contexts: state.contexts }) : "");

      return [
        {
          filename: "msigportal_external_tool_bundle.json",
          type: "json",
          value: state.generatedBundle || {},
          label: "Bundle JSON",
        },
        {
          filename: "msigportal_sigprofiler_spectra.tsv",
          text: spectraTsv,
          label: "SigProfiler spectra TSV",
        },
        {
          filename: "msigportal_cosmic_signatures.tsv",
          text: signatureTsv,
          label: "COSMIC signatures TSV",
        },
        {
          filename: "external_output_parsed_as_msig.json",
          type: "json",
          value: state.parsedExternalOutput || {},
          label: "Parsed external JSON",
        },
        {
          filename: "interoperability_roundtrip_report.json",
          type: "json",
          value: state.roundTripReport || {},
          label: "Round-trip report JSON",
        },
      ];
    }

    function fallbackDataset(sampleLimit) {
      const spectraNames = matrixNames(demoSpectra()).slice(0, sampleLimit);
      const signatureNames = matrixNames(demoSignatures());
      const spectra = takeMatrixColumns(demoSpectra(), spectraNames);
      const signatures = takeMatrixColumns(demoSignatures(), signatureNames);
      return {
        contexts: CONTEXTS,
        spectra,
        signatures,
        sampleNames: spectraNames,
        signatureNames,
        source: "Local SBS96 portability fixture",
        status: "Local fallback fixture",
      };
    }

    async function loadDefaultDataset(sampleLimit) {
      try {
        return await loadPublicSbs96Dataset(mSigSDK, {
          study: "PCAWG",
          genomeDataType: "WGS",
          cancerType: "Lung-AdenoCA",
          mutationType: "SBS",
          matrixSize: 96,
          signatureSetName: SIGNATURE_SET,
          sampleLimit,
          signatureNames: publicSbs96SignatureNames,
          allowAlternate: true,
        });
      } catch (error) {
        console.warn("Using local resource portability fixture.", error);
        return fallbackDataset(sampleLimit);
      }
    }

    async function buildInteroperability(options = {}) {
      const sampleInput = root.querySelector("#resource-sample-count");
      const sampleLimit = clampSampleLimit(sampleInput?.value || DEFAULT_SAMPLE_LIMIT);
      const include = options.include || selectedToolIds();
      if (sampleInput) sampleInput.value = String(sampleLimit);
      setStatus("running", "Loading a small public SBS96 cohort and COSMIC signature catalog.");

      try {
        const dataset = await loadDefaultDataset(sampleLimit);
        state.dataset = dataset;
        state.contexts = dataset.contexts || CONTEXTS;
        state.spectra = dataset.spectra;
        state.signatures = dataset.signatures;

        const bundle = removeSampleScripts(mSigSDK.adapters.createInteroperabilityBundle(
          {
            spectra: state.spectra,
            signatures: state.signatures,
          },
          {
            contexts: state.contexts,
            include,
          }
        ));
        state.generatedBundle = bundle;
        state.generatedFiles = flattenGeneratedFiles(bundle);
        state.selectedPreviewKey = state.generatedFiles[0]?.key || "";
        state.roundTripReport = buildRoundTripReport();
        if (!state.parsedExternalOutput) {
          const platform = state.selectedInboundPlatform;
          const parsed = parseExternalText(platform, exampleTextForPlatform(platform));
          state.parsedExternalOutput = {
            platform,
            label: INBOUND_TOOLS.find((tool) => tool.id === platform)?.label || platform,
            parsed,
            summary: summarizeParsedResult(platform, parsed),
            inputText: exampleTextForPlatform(platform),
          };
        }
        setStatus(
          "ready",
          `Loaded ${matrixNames(state.spectra).length} sample spectra, ${matrixNames(state.signatures).length} signatures, and ${state.generatedFiles.length} handoff data files.`
        );
      } catch (error) {
        setStatus("error", error.message || "Interoperability build failed.", error);
      }
    }

    async function parseExternalInput(platformId = state.selectedInboundPlatform, text = null) {
      if (!state.spectra || !state.signatures) {
        await buildInteroperability();
      }
      const editor = root.querySelector("#resource-external-editor");
      const inputText = text ?? editor?.value ?? exampleTextForPlatform(platformId);
      const platform = INBOUND_TOOLS.find((tool) => tool.id === platformId);
      try {
        const parsed = parseExternalText(platformId, inputText);
        state.selectedInboundPlatform = platformId;
        state.parsedExternalOutput = {
          platform: platformId,
          label: platform?.label || platformId,
          parsed,
          summary: summarizeParsedResult(platformId, parsed),
          inputText,
        };
        setStatus("ready", `${platform?.label || platformId} output parsed into mSigSDK objects.`);
        return state.parsedExternalOutput;
      } catch (error) {
        state.parsedExternalOutput = {
          platform: platformId,
          label: platform?.label || platformId,
          parsed: null,
          summary: null,
          inputText,
          error: error.message,
        };
        setStatus("error", error.message || "External output parsing failed.", error);
        return state.parsedExternalOutput;
      }
    }

    function renderHeader() {
      const header = document.createElement("div");
      header.className = "resource-app-header";
      const title = document.createElement("h3");
      title.textContent = "mSigSDK platform support";
      const copy = document.createElement("p");
      copy.textContent = "mSigSDK supports SBS96 handoff files, selected browser/Pyodide/WebR execution paths, common output parsers, and round-trip validation.";
      header.append(title, copy);
      return header;
    }

    function renderControls() {
      const grid = document.createElement("div");
      grid.className = "workflow-control-grid compact";
      const sampleInput = document.createElement("input");
      sampleInput.id = "resource-sample-count";
      sampleInput.type = "number";
      sampleInput.min = "1";
      sampleInput.max = String(MAX_SAMPLES);
      sampleInput.step = "1";
      sampleInput.value = String(state.dataset?.sampleNames?.length || DEFAULT_SAMPLE_LIMIT);
      sampleInput.addEventListener("input", () => {
        sampleInput.value = String(clampSampleLimit(sampleInput.value));
      });
      grid.append(
        createField(
          "Public mSigPortal samples",
          sampleInput,
          `Capped at ${MAX_SAMPLES} samples for this notebook.`
        )
      );

      const buttonRow = document.createElement("div");
      buttonRow.className = "workflow-button-row";
      const buildButton = createButton("Build SBS96 handoff files", "primary");
      buildButton.addEventListener("click", () => buildInteroperability());
      buttonRow.append(buildButton);

      const wrapper = document.createElement("div");
      wrapper.className = "workflow-output-stack";
      wrapper.append(grid, buttonRow);
      return wrapper;
    }

    function renderTabs() {
      const tabs = document.createElement("div");
      tabs.className = "resource-tabs";
      [
        ["outbound", "Export to tools"],
        ["inbound", "Import outputs"],
        ["roundtrip", "Round-trip checks"],
      ].forEach(([id, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `resource-tab ${state.activeTab === id ? "active" : ""}`.trim();
        button.textContent = label;
        button.addEventListener("click", () => {
          state.activeTab = id;
          render();
        });
        tabs.append(button);
      });
      return tabs;
    }

    function renderToolCheckboxes() {
      const wrapper = document.createElement("div");
      wrapper.className = "resource-checkbox-grid";
      OUTBOUND_TOOLS.forEach((tool) => {
        const label = document.createElement("label");
        label.className = "resource-checkbox";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.name = "resource-tool";
        checkbox.value = tool.id;
        checkbox.checked = state.generatedBundle
          ? Boolean(state.generatedBundle.tools?.[tool.key])
          : tool.defaultChecked;
        label.append(checkbox, document.createTextNode(tool.label));
        wrapper.append(label);
      });
      return wrapper;
    }

    function renderOutboundTab() {
      const panel = document.createElement("section");
      panel.className = "resource-tab-panel";
      const heading = document.createElement("h3");
      heading.textContent = "Export to tools";

      const buildButton = createButton("Build SBS96 handoff files", "primary");
      buildButton.addEventListener("click", () => buildInteroperability());

      const previewControls = document.createElement("div");
      previewControls.className = "resource-preview-controls";
      const previewSelect = document.createElement("select");
      state.generatedFiles.forEach((file) => {
        const option = document.createElement("option");
        option.value = file.key;
        option.textContent = `${file.tool}: ${file.filename}`;
        previewSelect.append(option);
      });
      previewSelect.value = state.selectedPreviewKey;
      previewSelect.addEventListener("change", () => {
        state.selectedPreviewKey = previewSelect.value;
        render();
      });
      previewControls.append(createField("Preview file", previewSelect));

      const selectedFile =
        state.generatedFiles.find((file) => file.key === state.selectedPreviewKey) ||
        state.generatedFiles[0];
      const preview = document.createElement("pre");
      preview.className = "resource-preview";
      preview.tabIndex = 0;
      preview.setAttribute("aria-label", selectedFile ? `Preview of ${selectedFile.filename}` : "Generated file preview");
      preview.textContent = selectedFile
        ? previewText(selectedFile.text)
        : "Build handoff files to preview generated TSV content.";

      panel.append(
        heading,
        renderToolCheckboxes(),
        buildButton,
        table(SUPPORTED_TOOL_ROWS, [
          { key: "platform", label: "Platform" },
          { key: "sdkExports", label: "mSigSDK exports" },
          { key: "directSdkRun", label: "Direct SDK run" },
          { key: "sdkImports", label: "mSigSDK imports" },
          { key: "generatedArtifacts", label: "Generated artifacts" },
        ], { title: "Supported platform features", maxRows: 12 }),
        table(generatedFileRows(), [
          { key: "tool", label: "Tool" },
          { key: "file", label: "File" },
          { key: "purpose", label: "Purpose" },
        ], { title: "Generated file manifest", maxRows: 30 }),
        previewControls,
        preview,
        downloadMany([
          ...coreDownloadFiles(),
          ...state.generatedFiles.map((file) => ({
            filename: file.filename,
            text: file.text,
            label: file.filename,
          })),
        ])
      );
      return panel;
    }

    function renderInboundTab() {
      const panel = document.createElement("section");
      panel.className = "resource-tab-panel";
      const heading = document.createElement("h3");
      heading.textContent = "Import outputs";

      const select = document.createElement("select");
      INBOUND_TOOLS.forEach((tool) => {
        const option = document.createElement("option");
        option.value = tool.id;
        option.textContent = tool.label;
        select.append(option);
      });
      select.value = state.selectedInboundPlatform;

      const editor = document.createElement("textarea");
      editor.id = "resource-external-editor";
      editor.className = "resource-editor";
      editor.value =
        state.parsedExternalOutput?.platform === state.selectedInboundPlatform
          ? state.parsedExternalOutput.inputText
          : exampleTextForPlatform(state.selectedInboundPlatform);

      select.addEventListener("change", () => {
        state.selectedInboundPlatform = select.value;
        editor.value = exampleTextForPlatform(select.value);
        render();
      });

      const controls = document.createElement("div");
      controls.className = "workflow-control-grid compact";
      controls.append(
        createField("Source platform", select, "Example outputs are editable before parsing."),
      );

      const buttonRow = document.createElement("div");
      buttonRow.className = "workflow-button-row";
      const loadButton = createButton("Load example");
      loadButton.addEventListener("click", () => {
        editor.value = exampleTextForPlatform(state.selectedInboundPlatform);
      });
      const parseButton = createButton("Parse into mSigSDK", "primary");
      parseButton.addEventListener("click", () => parseExternalInput(state.selectedInboundPlatform, editor.value));
      buttonRow.append(loadButton, parseButton);

      const parsed = state.parsedExternalOutput;
      const summaryRows = parsed?.summary?.rows || [];
      const errorNode = parsed?.error ? note(parsed.error, "warning") : null;

      panel.append(
        heading,
        controls,
        editor,
        buttonRow,
        table(summaryRows, [
          { key: "object", label: "mSigSDK object" },
          { key: "count", label: "Rows" },
          { key: "dimensions", label: "Dimensions" },
          { key: "validation", label: "Validation" },
        ], { title: "Parsed external output summary", maxRows: 8 })
      );
      if (errorNode) panel.append(errorNode);
      panel.append(
        details("Parsed object JSON", parsed?.parsed || {}),
        downloadMany(coreDownloadFiles())
      );
      return panel;
    }

    function renderRoundTripTab() {
      const panel = document.createElement("section");
      panel.className = "resource-tab-panel";
      const heading = document.createElement("h3");
      heading.textContent = "Round-trip checks";
      const report = state.roundTripReport;

      panel.append(
        heading,
        table(report?.checks || [], [
          { key: "check", label: "Check" },
          { key: "status", label: "Status" },
          { key: "observed", label: "Observed" },
        ], { title: "Round-trip checks", maxRows: 12 }),
        table(report?.exposureRows || [], [
          { key: "sample", label: "Sample" },
          { key: "signature", label: "Signature" },
          { key: "exposure", label: "Exposure", format: (value) => formatNumber(value) },
        ], { title: "External exposure long-form export", maxRows: 16 }),
        downloadMany(coreDownloadFiles())
      );
      return panel;
    }

    function renderDatasetMetrics() {
      return metrics([
        { label: "Source", value: state.dataset?.source || "Pending" },
        { label: "Samples", value: matrixNames(state.spectra).length || "-" },
        { label: "Signatures", value: matrixNames(state.signatures).length || "-" },
        { label: "Contexts", value: state.contexts?.length || "-" },
        { label: "Generated files", value: state.generatedFiles.length || "-" },
      ]);
    }

    function render() {
      root.replaceChildren();
      const tone =
        state.status === "error" ? "error" :
          state.status === "running" ? "running" :
            "ready";
      root.append(
        renderHeader(),
        renderControls(),
        statusCard(
          state.status === "running" ? "Working" : state.status === "error" ? "Review needed" : "Ready",
          state.statusDetail,
          tone
        ),
        renderDatasetMetrics(),
        renderTabs()
      );

      if (state.activeTab === "inbound") {
        root.append(renderInboundTab());
      } else if (state.activeTab === "roundtrip") {
        root.append(renderRoundTripTab());
      } else {
        root.append(renderOutboundTab());
      }
    }

    window.resourcePortabilityApp = {
      state,
      get selectedTool() {
        return state.selectedPreviewKey;
      },
      get spectra() {
        return state.spectra;
      },
      get signatures() {
        return state.signatures;
      },
      get generatedBundle() {
        return state.generatedBundle;
      },
      get parsedExternalOutput() {
        return state.parsedExternalOutput;
      },
      get roundTripReport() {
        return state.roundTripReport;
      },
      buildInteroperability,
      parseExternalInput,
      exampleTextForPlatform,
      render,
    };

    render();
    await buildInteroperability();
  </script>
</notebook>
