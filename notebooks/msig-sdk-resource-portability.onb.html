  <title>mSigSDK resource portability</title>

  <script type="text/markdown">
    # Resource portability

    This notebook answers one practical question: can a public mutational-signature resource be turned into stable SDK objects, checked, exported, reloaded, and handed to another workflow without changing what the data mean?

    The goal is not to teach every mSigPortal, TCGA/GDC, fitting, or reporting API. The goal is a short audit trail: source resource -> SDK table shape -> round-trip check -> downloadable handoff package.

    **Unique role:** prove that resource-derived spectra and signatures survive format changes and can be reused outside the notebook.

    **Leave to focused notebooks:** biological interpretation, uncertainty review, package concordance, and variant-row conversion auditing.

    **After running it you should know:** which object shape or file format to hand to the next workflow without losing source metadata.
  </script>

  <script type="module" pinned id="setup">
    const portabilitySdkUrl = new URL("../main.js?v=2026-05-15-resource-portability-redesign", location.href).href;
    const { mSigSDK } = await import(portabilitySdkUrl);
    const {
      demoSignatures,
      demoSpectra,
      gdcResourceFallback,
    } = await import("./msig-notebook-fixtures.js");

    const {
      burdenSampleRows,
      details,
      exposureRows,
      formatNumber,
      metrics,
      note,
      table,
    } = mSigSDK.presentation;

    const portabilityContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const portabilityStudy = "PCAWG";
    const portabilityGenomeDataType = "WGS";
    const portabilityCancerType = "Lung-AdenoCA";
    const portabilityMutationType = "SBS";
    const portabilityMatrixSize = 96;
    const portabilitySignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const portabilitySummarySignatureSet = "COSMIC_v3.3_Signatures";
    const portabilityTcgaProjectOptions = [
      "TCGA-LUAD",
      "TCGA-LUSC",
      "TCGA-BRCA",
      "TCGA-COAD",
      "TCGA-SKCM",
      "TCGA-UCEC",
    ];
    const portabilityGeneOptions = [
      { value: "ENSG00000141510", label: "TP53 - ENSG00000141510" },
      { value: "ENSG00000133703", label: "KRAS - ENSG00000133703" },
      { value: "ENSG00000146648", label: "EGFR - ENSG00000146648" },
      { value: "ENSG00000157764", label: "BRAF - ENSG00000157764" },
      { value: "ENSG00000121879", label: "PIK3CA - ENSG00000121879" },
      { value: "ENSG00000138413", label: "IDH1 - ENSG00000138413" },
    ];
    const portabilityQueryParams = new URLSearchParams(location.search);
    const portabilityTcgaProject =
      portabilityTcgaProjectOptions.includes(portabilityQueryParams.get("tcgaProject"))
        ? portabilityQueryParams.get("tcgaProject")
        : "TCGA-LUAD";
    const portabilityGeneChoice =
      portabilityGeneOptions.find((option) => option.value === portabilityQueryParams.get("geneId")) ||
      portabilityGeneOptions[0];
    const portabilityGeneIds = [portabilityGeneChoice.value];
    const portabilityGeneLabel = portabilityGeneChoice.label;
    const portabilityEndpointUrls = [
      "https://analysistools.cancer.gov/mutational-signatures/api/mutational_spectrum",
      "https://analysistools.cancer.gov/mutational-signatures/api/mutational_signature",
      "https://api.gdc.cancer.gov/files",
    ];

    function pass(condition) {
      return condition ? "Pass" : "Review";
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function matrixTotal(matrix = {}, contexts = portabilityContexts) {
      return Object.values(matrix || {}).reduce((sum, record) => {
        const contextList = contexts?.length ? contexts : Object.keys(record || {});
        return sum + contextList.reduce((recordSum, context) => recordSum + Number(record?.[context] || 0), 0);
      }, 0);
    }

    function nonZeroContextCount(matrix = {}, contexts = portabilityContexts) {
      const seen = new Set();
      Object.values(matrix || {}).forEach((record) => {
        (contexts?.length ? contexts : Object.keys(record || {})).forEach((context) => {
          if (Number(record?.[context] || 0) > 0) seen.add(context);
        });
      });
      return seen.size;
    }

    function sameSet(left = [], right = []) {
      return left.length === right.length && left.every((value) => right.includes(value));
    }

    function maxAbsMatrixDelta(left = {}, right = {}, contexts = portabilityContexts) {
      let maxDelta = 0;
      for (const name of Object.keys(left || {})) {
        const contextList = contexts?.length ? contexts : Object.keys(left[name] || {});
        for (const context of contextList) {
          const delta = Math.abs(Number(left?.[name]?.[context] || 0) - Number(right?.[name]?.[context] || 0));
          if (delta > maxDelta) maxDelta = delta;
        }
      }
      return maxDelta;
    }

    function tsvRowCount(text) {
      return String(text || "").trim().split(/\r?\n/).filter(Boolean).length;
    }

    function previewText(text, rows = 8) {
      return String(text || "").split(/\r?\n/).slice(0, rows).join("\n");
    }

    function optionLabel(option) {
      return typeof option === "string" ? option : option.label;
    }

    function optionValue(option) {
      return typeof option === "string" ? option : option.value;
    }

    function selectorField(label, control, helper = "") {
      const field = document.createElement("label");
      field.className = "workflow-field";
      const title = document.createElement("span");
      title.textContent = label;
      field.append(title, control);
      if (helper) {
        const small = document.createElement("small");
        small.textContent = helper;
        field.append(small);
      }
      return field;
    }

    function dropdown(options, selectedValue) {
      const select = document.createElement("select");
      options.forEach((option) => {
        const choice = document.createElement("option");
        choice.value = optionValue(option);
        choice.textContent = optionLabel(option);
        select.append(choice);
      });
      select.value = selectedValue;
      return select;
    }

    function renderResourceSelectors() {
      const wrapper = document.createElement("div");
      wrapper.className = "workflow-output-stack";
      const grid = document.createElement("div");
      grid.className = "workflow-control-grid compact";
      const projectSelect = dropdown(portabilityTcgaProjectOptions, portabilityTcgaProject);
      const geneSelect = dropdown(portabilityGeneOptions, portabilityGeneChoice.value);
      const buttonRow = document.createElement("div");
      buttonRow.className = "workflow-button-row";
      const applyButton = document.createElement("button");
      applyButton.type = "button";
      applyButton.className = "workflow-button primary";
      applyButton.textContent = "Apply selections";

      function syncSelection() {
        const nextParams = new URLSearchParams(location.search);
        nextParams.set("tcgaProject", projectSelect.value);
        nextParams.set("geneId", geneSelect.value);
        history.replaceState(null, "", `${location.pathname}?${nextParams.toString()}`);
      }

      projectSelect.addEventListener("change", syncSelection);
      geneSelect.addEventListener("change", syncSelection);
      applyButton.addEventListener("click", () => {
        syncSelection();
        const runButton = document.getElementById("run-button");
        if (runButton && !runButton.disabled) runButton.click();
      });

      grid.append(
        selectorField("TCGA project", projectSelect, "Controls the GDC MAF index lookup."),
        selectorField("Gene lookup", geneSelect, "Controls the GDC project-by-gene discovery call.")
      );
      buttonRow.append(applyButton);
      wrapper.append(grid, buttonRow);
      return wrapper;
    }

    display(note(
      "Portability succeeds only if the resource identity is recorded, the SDK table shape validates, exported files reload to the same samples and counts, and the handoff package carries provenance."
    ));
    display(renderResourceSelectors());
    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "TCGA project", value: portabilityTcgaProject },
      { label: "Gene lookup", value: portabilityGeneLabel },
    ]));
    display(table(
      [
        {
          checkpoint: "Source",
          passCondition: "Public resource IDs, query settings, and fallback status are visible.",
          whyItMatters: "A collaborator can tell which resource was used.",
        },
        {
          checkpoint: "Shape",
          passCondition: "Spectra validate as sample x SBS96 counts; signatures validate as signature x SBS96 weights.",
          whyItMatters: "Downstream analysis does not care whether data came from mSigPortal or a local file.",
        },
        {
          checkpoint: "Round trip",
          passCondition: "Exported TSV files reload with the same names, contexts, and totals.",
          whyItMatters: "The data can move between notebooks, scripts, and external tools.",
        },
        {
          checkpoint: "Handoff",
          passCondition: "Downloads include spectra, signatures, an interoperability bundle, and provenance.",
          whyItMatters: "The run can be reviewed or rerun outside this browser session.",
        },
      ],
      [
        { key: "checkpoint", label: "Checkpoint" },
        { key: "passCondition", label: "Pass condition" },
        { key: "whyItMatters", label: "Why it matters" },
      ],
      {
        title: "Notebook success criteria",
        caption: "These are the checks this notebook is built around.",
      }
    ));
  </script>

  <script type="text/markdown">

  <script type="text/markdown">
    ## 2. Normalize resources into SDK table shapes

    The central move is small: public API rows become ordinary JavaScript objects. Spectra are keyed by sample, signatures are keyed by signature name, and both share the same ordered SBS96 context list.
  </script>

  <script type="module" pinned id="normalize-resources">
    let portabilityMatrixStatus = "live mSigPortal data";
    let portabilitySampleNames = ["SP50611", "SP50406", "SP55004"];
    const portabilityPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    let portabilityGroupedSpectra;
    let portabilityReferenceSignatures;
    let portabilitySelectedSignatureNames;

    try {
      const [rawSpectrumRows, rawSignatureRows] = await Promise.all([
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          portabilityStudy,
          portabilitySampleNames,
          portabilityGenomeDataType,
          portabilityCancerType,
          portabilityMutationType,
          portabilityMatrixSize
        ),
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          portabilityGenomeDataType,
          portabilitySignatureSetName,
          portabilityMutationType,
          portabilityMatrixSize,
          10000
        ),
      ]);
      const spectrumRows = asArray(rawSpectrumRows).flat();
      const signatureRows = asArray(rawSignatureRows).flat();
      if (!spectrumRows.length || !signatureRows.length) {
        throw new Error("public APIs returned empty matrix rows");
      }
      portabilityGroupedSpectra =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(spectrumRows);
      const allReferenceSignatures =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
          signatureRows,
          "signatureName"
        );
      portabilitySelectedSignatureNames = portabilityPreferredSignatureNames.filter(
        (signature) => allReferenceSignatures[signature]
      );
      if (!portabilitySelectedSignatureNames.length) {
        throw new Error("preferred SBS signatures were not present in the public catalog");
      }
      portabilityReferenceSignatures = Object.fromEntries(
        portabilitySelectedSignatureNames.map((signature) => [
          signature,
          allReferenceSignatures[signature],
        ])
      );
    } catch (error) {
      portabilityMatrixStatus = `embedded fallback: ${error.message}`;
      portabilityGroupedSpectra = demoSpectra();
      portabilityReferenceSignatures = demoSignatures();
      portabilitySampleNames = Object.keys(portabilityGroupedSpectra);
      portabilitySelectedSignatureNames = Object.keys(portabilityReferenceSignatures);
    }

    const portabilitySpectraValidation = mSigSDK.validation.validateSpectra(
      portabilityGroupedSpectra,
      { expectedContexts: portabilityContexts, minTotalMutations: 500 }
    );
    const portabilitySignatureValidation = mSigSDK.validation.validateSignatureMatrix(
      portabilityReferenceSignatures,
      { expectedContexts: portabilityContexts }
    );
    const portabilityBurden = mSigSDK.qc.summarizeMutationBurden(
      portabilityGroupedSpectra,
      {
        expectedContexts: portabilityContexts,
        lowBurdenThresholdMode: "fixed",
        lowBurdenThreshold: 5000,
      }
    );
    const portabilityLongRows = mSigSDK.io.spectraToRows(portabilityGroupedSpectra);

    display(metrics([
      { label: "Matrix source", value: portabilityMatrixStatus },
      { label: "Samples", value: Object.keys(portabilityGroupedSpectra).length },
      { label: "Reference signatures", value: Object.keys(portabilityReferenceSignatures).length },
      { label: "Total mutations", value: formatNumber(matrixTotal(portabilityGroupedSpectra)) },
    ]));
    display(table(
      [
        {
          object: "portabilityGroupedSpectra",
          shape: "sample -> SBS96 context -> count",
          count: Object.keys(portabilityGroupedSpectra).length,
          validation: pass(portabilitySpectraValidation.valid),
        },
        {
          object: "portabilityReferenceSignatures",
          shape: "signature -> SBS96 context -> weight",
          count: Object.keys(portabilityReferenceSignatures).length,
          validation: pass(portabilitySignatureValidation.valid),
        },
        {
          object: "portabilityLongRows",
          shape: "sample, mutationType, mutations",
          count: portabilityLongRows.length,
          validation: `${nonZeroContextCount(portabilityGroupedSpectra)} non-zero contexts`,
        },
      ],
      [
        { key: "object", label: "SDK object" },
        { key: "shape", label: "Shape" },
        { key: "count", label: "Count" },
        { key: "validation", label: "Check" },
      ],
      {
        title: "Portable SDK objects",
        caption: "Once data have these shapes, downstream SDK calls do not need to know the original resource.",
      }
    ));
    display(table(
      burdenSampleRows(portabilityBurden, portabilitySampleNames),
      [
        { key: "sample", label: "Sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low mutation-count review cue" },
      ],
      {
        maxRows: 8,
        title: "Spectra sanity check",
        caption: "Mutation counts are the quickest way to notice an unexpected conversion.",
      }
    ));
    display(note(
      "This is the notebook's main claim: resource-specific rows have been reduced to two stable table contracts."
    ));
  </script>

  <script type="text/markdown">
    ## 3. Prove the tables can leave and come back

    Portability is not an idea until the files round trip. This cell exports spectra and signatures, imports them again, and checks the names and values that should survive the move.
  </script>

  <script type="module" pinned id="round-trip">
    const portabilitySpectraTsv = mSigSDK.io.exportSigProfilerMatrix(
      portabilityGroupedSpectra,
      { contexts: portabilityContexts }
    );
    const portabilitySignaturesTsv = mSigSDK.io.exportCOSMICSignatureMatrix(
      portabilityReferenceSignatures,
      { contexts: portabilityContexts }
    );
    const portabilityRoundTripSpectra =
      mSigSDK.io.importSigProfilerMatrix(portabilitySpectraTsv);
    const portabilityRoundTripSignatures =
      mSigSDK.io.importCOSMICSignatureMatrix(portabilitySignaturesTsv);

    const spectraNames = Object.keys(portabilityGroupedSpectra);
    const spectraRoundTripNames = Object.keys(portabilityRoundTripSpectra);
    const signatureNames = Object.keys(portabilityReferenceSignatures);
    const signatureRoundTripNames = Object.keys(portabilityRoundTripSignatures);
    const spectraMaxDelta = maxAbsMatrixDelta(
      portabilityGroupedSpectra,
      portabilityRoundTripSpectra
    );
    const signatureMaxDelta = maxAbsMatrixDelta(
      portabilityReferenceSignatures,
      portabilityRoundTripSignatures
    );
    const portabilityRoundTripChecks = [
      {
        check: "Sample names preserved",
        result: pass(sameSet(spectraNames, spectraRoundTripNames)),
        evidence: `${spectraNames.length} original, ${spectraRoundTripNames.length} reloaded`,
      },
      {
        check: "Signature names preserved",
        result: pass(sameSet(signatureNames, signatureRoundTripNames)),
        evidence: `${signatureNames.length} original, ${signatureRoundTripNames.length} reloaded`,
      },
      {
        check: "Spectra counts preserved",
        result: pass(spectraMaxDelta === 0),
        evidence: `maximum cell delta ${formatNumber(spectraMaxDelta)}`,
      },
      {
        check: "Signature weights preserved",
        result: pass(signatureMaxDelta < 1e-12),
        evidence: `maximum cell delta ${formatNumber(signatureMaxDelta)}`,
      },
      {
        check: "Context order explicit",
        result: pass(tsvRowCount(portabilitySpectraTsv) === portabilityContexts.length + 1),
        evidence: `${portabilityContexts.length} SBS96 contexts plus header`,
      },
    ];
    const portabilityRoundTripPassed =
      portabilityRoundTripChecks.every((row) => row.result === "Pass");

    display(metrics([
      { label: "Round-trip verdict", value: pass(portabilityRoundTripPassed) },
      { label: "Spectra TSV rows", value: tsvRowCount(portabilitySpectraTsv) },
      { label: "Signature TSV rows", value: tsvRowCount(portabilitySignaturesTsv) },
      { label: "Reloaded mutations", value: formatNumber(matrixTotal(portabilityRoundTripSpectra)) },
    ]));
    display(table(
      portabilityRoundTripChecks,
      [
        { key: "check", label: "Check" },
        { key: "result", label: "Result" },
        { key: "evidence", label: "Evidence" },
      ],
      {
        title: "Round-trip audit",
        caption: "Every row should pass before treating the exported data as portable.",
      }
    ));
    display(details(
      "SigProfiler-style spectra TSV preview",
      previewText(portabilitySpectraTsv),
      { open: true }
    ));
    display(details(
      "COSMIC-style signature TSV preview",
      previewText(portabilitySignaturesTsv)
    ));
  </script>

  <script type="text/markdown">
    ## 4. Build the handoff package

    A portable run needs more than TSV text. The bundle should include the exported tables, tool-specific file manifests, a provenance record, and a minimal downstream smoke test showing that the reloaded objects still fit.
  </script>

  <script type="module" pinned id="handoff-package">
    const portabilityExposures =
      await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
        portabilityRoundTripSignatures,
        portabilityRoundTripSpectra,
        {
          exposureThreshold: 0.01,
          exposureType: "relative",
          renormalize: true,
        }
      );
    const portabilityInteroperabilityBundle =
      mSigSDK.adapters.createInteroperabilityBundle(
        {
          spectra: portabilityRoundTripSpectra,
          signatures: portabilityRoundTripSignatures,
        },
        {
          contexts: portabilityContexts,
          include: [
            "sigProfilerAssignment",
            "sigProfilerExtractor",
            "deconstructSigs",
            "musical",
          ],
        }
      );
    const portabilityProvenance = mSigSDK.provenance.createProvenance({
      analysis: "mSigSDK resource portability notebook",
      parameters: portabilitySourceManifest.parameters,
      sourceUrls: portabilityEndpointUrls,
      dataSources: [
        {
          source: "mSigPortal mutational spectrum API",
          status: portabilityMatrixStatus,
          samples: Object.keys(portabilityGroupedSpectra).length,
        },
        {
          source: "mSigPortal mutational signature API",
          signatureSetName: portabilitySignatureSetName,
          signatures: Object.keys(portabilityReferenceSignatures).length,
        },
        {
          source: "TCGA/GDC MAF index",
          project: portabilityTcgaProject,
          geneLookup: portabilityGeneLabel,
          mafFiles: portabilityTcgaMafFiles.length,
        },
      ],
      notes: [
        "Spectra and signatures were exported, reloaded, and checked before package creation.",
      ],
    });
    const portabilityToolRows = Object.entries(portabilityInteroperabilityBundle.tools || {})
      .map(([tool, value]) => ({
        tool,
        files: asArray(value.files || value.input?.files).length,
        manifestFields: Object.keys(value.manifest || {}).length,
      }));

    display(metrics([
      { label: "Fit smoke test", value: `${Object.keys(portabilityExposures).length} samples fit` },
      { label: "External tool targets", value: portabilityToolRows.length },
      { label: "Download files", value: 4 },
      { label: "Run record", value: portabilityProvenance.generatedAt ? "Created" : "Missing" },
    ]));
    display(table(
      exposureRows(portabilityExposures, { minExposure: 0, topN: 10 }),
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      {
        maxRows: 10,
        title: "Reloaded-data fit smoke test",
        caption: "This is only a smoke test. The notebook's purpose is to prove the reloaded objects are analysis-ready.",
      }
    ));
    display(table(
      portabilityToolRows,
      [
        { key: "tool", label: "Tool target" },
        { key: "files", label: "Files prepared" },
