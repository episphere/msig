    ## Inspect before trusting results

    Check the SDK import path, data provenance, validation result, warning table, recommended actions, local computation boundary, report/provenance output, and any external-tool handoff. Plots should be read together with the returned JavaScript objects and thresholds that generated them.

    ## Replace for a local project

    Replace sample spectra, signature catalog, mutation-burden thresholds, exposure thresholds, metadata, panel opportunity masks, and report parameters. Keep the validation, burden, reconstruction, residual, uncertainty, warning, and export cells in place so the adapted notebook still produces a complete analysis record.

    For local development, keep the SDK server running while you use the notebooks:

    ```bash
    npm run serve:observable
    ```
