    # mSigSDK workflow guide

    Choose the mSigSDK workflow that matches your question.

    Common questions: What data do I have? Is it ready to analyze? Which mutation patterns appear in my samples? Can I trust the result enough to report it? What files should I save so another person can check the work?

    The code is hidden by default. Each workflow starts with public example data that can be replaced with project data.

    ## Start with your question

    - **I want the complete workflow:** open [End-to-end workflow](?notebook=msig-sdk-end-to-end-workflow.onb.html).
    - **I need public example data:** open [Public cohort explorer](?notebook=msig-sdk-public-cohort-exploration.onb.html).
    - **I have raw variant rows:** open [Variant rows to mutation patterns](?notebook=msig-sdk-maf-fit-report.onb.html).
    - **I already fit signatures and need to judge the result:** open [Known-signature quality check](?notebook=msig-sdk-qc-walkthrough.onb.html).
    - **I need a report or files for review:** open [Export and reports](?notebook=msig-sdk-export-report.onb.html).

    ## Suggested path

    Suggested order:

    1. [End-to-end workflow](?notebook=msig-sdk-end-to-end-workflow.onb.html)
    2. [Public cohort explorer](?notebook=msig-sdk-public-cohort-exploration.onb.html)
    3. [Known-signature quality check](?notebook=msig-sdk-qc-walkthrough.onb.html)
    4. [Uncertainty and cutoffs](?notebook=msig-sdk-uncertainty-thresholds.onb.html)
    5. [Export and reports](?notebook=msig-sdk-export-report.onb.html)
    6. [Resource portability](?notebook=msig-sdk-resource-portability.onb.html) or [Variant rows to mutation patterns](?notebook=msig-sdk-maf-fit-report.onb.html)
    7. [Panel/WES evidence review](?notebook=msig-sdk-panel-evidence-tiers.onb.html), [Discovery extraction (NMF)](?notebook=msig-sdk-nmf-extraction.onb.html), or [Multi-tool comparison](?notebook=msig-sdk-multi-engine-comparison.onb.html)

    ## Terms

    - **Mutation spectrum:** a counted pattern of DNA changes in a sample.
    - **Signature:** a recurring mutation pattern that may point to a biological process or exposure.
    - **Signature fitting:** estimating how much each known signature contributes to a sample.
    - **Quality check:** evidence that helps decide whether a fit is believable.
    - **Uncertainty:** how much the answer changes when the data or cutoffs are tested.
    - **Provenance:** the record of data, settings, and software used to make the result.

    ## Important reading rule

    Do not read a signature contribution table by itself. A number in that table is only meaningful beside the evidence around it: input checks, mutation counts, reconstruction quality, residual patterns, warnings, review steps, uncertainty, assay limits, and provenance.

    ## Adapting a workflow

    For a local project, replace the input-loading step first. Keep the validation, warning, quality-check, uncertainty, report, and export sections in place so the adapted workflow still leaves a complete review trail.

    For local development, keep the SDK server running.

    ```bash
    npm run serve:observable
    ```
