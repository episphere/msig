    # mSigSDK workflow guide

    Find the notebook that matches the SDK task you want to understand.

    The notebooks use public or bundled demo inputs to show how mSigSDK loads data, validates spectra, fits signatures, reviews QC, creates plots, and exports results. They are not designed for private datasets, regulated data, or large production cohorts.

    Open the hidden cells to see the JavaScript behind each result. For real studies, run adapted code in your own controlled environment.

    - **Find a starting point:** stay on [Workflow guide](?notebook=msig-sdk-notebooks.onb.html).
    - **Fit signatures and review outputs:** open [End-to-end workflow](?notebook=msig-sdk-end-to-end-workflow.onb.html).
    - **Load public spectra and cohort examples:** open [Public cohort explorer](?notebook=msig-sdk-public-cohort-exploration.onb.html).
    - **Move SBS96 matrices between tools:** open [Resource portability](?notebook=msig-sdk-resource-portability.onb.html).
    - **Convert MAF rows into COSMIC profile matrices:** open [MAF to COSMIC profiles](?notebook=msig-sdk-maf-fit-report.onb.html).
    - **Review fitted-sample QC:** open [Cohort QC triage](?notebook=msig-sdk-qc-walkthrough.onb.html).

    - **Review panel or WES evidence tiers:** open [Panel/WES evidence review](?notebook=msig-sdk-panel-evidence-tiers.onb.html).
    - **Screen candidate signatures:** open [Discovery extraction (NMF)](?notebook=msig-sdk-nmf-extraction.onb.html).
    - **Check cutoffs and uncertainty:** open [Uncertainty and cutoffs](?notebook=msig-sdk-uncertainty-thresholds.onb.html).

    ## Complete notebook map

    Each notebook demonstrates one browser-scale SDK pattern on demo inputs. Production work belongs in an environment where data access, scale, and validation are controlled.

    1. [Workflow guide](?notebook=msig-sdk-notebooks.onb.html): choose a notebook and learn the shared terms.
    2. [End-to-end workflow](?notebook=msig-sdk-end-to-end-workflow.onb.html): inspect the complete fit-review-export path.
    3. [Public cohort explorer](?notebook=msig-sdk-public-cohort-exploration.onb.html): inspect public mSigPortal and TCGA/GDC-derived examples.
    4. [Resource portability](?notebook=msig-sdk-resource-portability.onb.html): normalize, export, and round-trip SBS96 matrices.
    5. [MAF to COSMIC profiles](?notebook=msig-sdk-maf-fit-report.onb.html): convert variant rows into SBS, DBS, and indel mutation spectra.
    6. [Cohort QC triage](?notebook=msig-sdk-qc-walkthrough.onb.html): rank fitted samples by quality concern.
    7. [Panel/WES assay planning](?notebook=msig-sdk-cohort-panel-workflow.onb.html): test whether a BED target retains enough evidence for selected signature review.
    8. [Panel/WES evidence review](?notebook=msig-sdk-panel-evidence-tiers.onb.html): review support tiers for restricted assays.
    9. [Discovery extraction (NMF)](?notebook=msig-sdk-nmf-extraction.onb.html): extract candidate signatures from demo spectra.
    10. [Uncertainty and cutoffs](?notebook=msig-sdk-uncertainty-thresholds.onb.html): stress-test fit stability and reporting thresholds.
    11. [Report packet builder](?notebook=msig-sdk-export-report.onb.html): build a reviewable report archive.
    12. [Multi-tool comparison](?notebook=msig-sdk-multi-engine-comparison.onb.html): compare fitting-engine outputs on the same spectra.

    ## Terms

    - **Mutation spectrum:** a counted pattern of DNA changes in a sample.
    - **Signature:** a recurring mutation pattern that may point to a biological process or exposure.
    - **Signature fitting:** estimating how much each known signature contributes to a sample.
    - **Quality check:** evidence that helps decide whether a fit is believable.
    - **Uncertainty:** how much the answer changes when the data or cutoffs are tested.
    - **Provenance:** the record of data, settings, and software used to make the result.
