<!doctype html>
<notebook theme="air">
  <title>mSigSDK panel/WES evidence review</title>

  <script type="text/markdown">
    # Panel and WES evidence review

    Panel and WES data do not observe the same mutation contexts as WGS. This workflow shows how mSigSDK reports that limitation explicitly through coverage information, restricted-assay evidence, support levels, review reasons, and report fields.

    Read the notebook as an evidence review, not a WGS-equivalent decomposition. The central question is whether a signature can be reviewed under the assay design and whether the reported support level is backed by input checks, mutation counts, and panel/WES coverage.
  </script>

  <script type="module" pinned id="1">
    const panelSdkUrl = new URL("../main.js?v=2026-05-14-panel-workflow", location.href).href;
    const { mSigSDK } = await import(panelSdkUrl);
    const {
      demoSignatures,
      demoSpectra,
      panelValidationSummary,
      sbs96Contexts,
      sharedCallableOpportunities,
    } = await import("./msig-notebook-fixtures.js");
    const { exposureRows, metrics, panelEvidenceTable, table, tooltipTable } = mSigSDK.presentation;

    const panelContexts = sbs96Contexts();
    const panelSpectra = {
      panel_high: demoSpectra().local_high_smoking_like,
      panel_low: demoSpectra().local_low_burden_review,
      wes_apobec: demoSpectra().local_apobec_pattern,
    };
    const panelSignatures = demoSignatures();
    const callableOpportunities = sharedCallableOpportunities();
    const panelOptions = {
      minAssessableMutations: 30,
      limitedSupportExposureThreshold: 0.05,
      higherSupportExposureThreshold: 0.20,
      lowBurdenThreshold: 50,
      genomeBuild: "GRCh37",
    };

    display(metrics([
      { label: "Samples", value: Object.keys(panelSpectra).length },
      { label: "Reference signatures", value: Object.keys(panelSignatures).length },
      { label: "Covered contexts", value: Object.values(callableOpportunities).filter((value) => Number(value) > 0).length },
      { label: "Assay type", value: "panel/WES review" },
    ]));
    display(tooltipTable(
      [
        { tier: "higher_review_support", definition: "Reviewable sample with signature contribution at or above the configured higher-support cutoff and acceptable fit evidence." },
        { tier: "limited_review_support", definition: "Reviewable sample with signature contribution at or above the lower review cutoff but below the higher-support cutoff." },
        { tier: "not_detected_within_review_settings", definition: "Reviewable sample with fitted contribution below the configured review cutoff." },
        { tier: "not_assessable", definition: "Mutation count, panel/WES coverage, or fit-quality evidence does not support an interpretable support level." },
      ],
      [
        { key: "tier", label: "Tier" },
        { key: "definition", label: "Definition" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Interactive workspace

    Use this workspace to load sample data, paste or upload your own data, adjust settings, run the notebook workflow, inspect visual results, and download the exact files produced by your settings.
  </script>

  <script type="module" pinned id="interactive-workspace">
    const { renderInteractiveNotebook } = await import("./msig-notebook-interactive.js?v=2026-05-15-all-notebooks");
    renderInteractiveNotebook({ mode: "panel-evidence", mSigSDK, display });
  </script>

  <script type="text/markdown">
    ## Step 1. Run panel/WES evidence review

    The panel workflow combines spectra, signatures, assay details, and coverage summaries. It returns fitted signature contributions plus support levels that explain whether each signature can be reviewed under the restricted assay.

    Start with the support level and review-reason fields before interpreting contribution magnitude. A high contribution can still have limited review support if the assay has poor coverage for the relevant contexts.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "panel-evidence", step: 1, phase: "review", title: "Step 1. Run panel/WES evidence review", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const panelResult = await mSigSDK.workflows.runPanelWorkflow(
      { spectra: panelSpectra, signatures: panelSignatures, callableOpportunities },
      {
        contexts: panelContexts,
        expectedContexts: panelContexts,
        runBootstrap: false,
        runThresholdSensitivity: false,
        minAssessableMutations: panelOptions.minAssessableMutations,
        limitedSupportExposureThreshold: panelOptions.limitedSupportExposureThreshold,
        higherSupportExposureThreshold: panelOptions.higherSupportExposureThreshold,
        lowBurdenThreshold: panelOptions.lowBurdenThreshold,
        opportunitySource: "user_supplied",
        genomeBuild: panelOptions.genomeBuild,
        reportFormat: "object",
      }
    );

    display(metrics([
      { label: "Workflow", value: panelResult.workflow },
      { label: "Evidence calls", value: panelResult.panel.evidenceSummary.callCount },
      { label: "Opportunity coverage", value: panelResult.opportunityMetadata.opportunityCoverage },
      { label: "Warnings", value: panelResult.warnings.length },
    ]));
    display(table(
      exposureRows(panelResult.fit.exposures, { minExposure: 0, topN: 12 }),
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      { maxRows: 12 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Read the evidence heatmap and review table

    The evidence heatmap explains which signatures are supported, limited, or not reviewable and why. This is the section that should travel with any panel-derived signature call. It prevents a downstream reader from interpreting a restricted-assay fit as if it came from complete WGS coverage.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "panel-evidence", step: 2, phase: "review", title: "Step 2. Read the evidence heatmap and review table", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const panelMatrixDiv = document.createElement("div");
    panelMatrixDiv.style.width = "100%";
    display(panelMatrixDiv);
    await mSigSDK.qcPlots.plotPanelEvidenceMatrix(panelMatrixDiv, panelResult);

    const panelRows = Object.entries(panelResult.panel.evidenceCalls).flatMap(
      ([sample, calls]) =>
        calls.map((call) => ({
          sample,
          signature: call.signatureName,
          exposure: call.exposure,
          tier: call.tier,
          assessability: call.assessabilityClass,
          totalMutations: call.totalMutations,
          reasons: (call.assessabilityReasons || [])
            .map((reason) => reason.detail || reason.code)
            .join("; "),
        }))
    );
    display(panelEvidenceTable(panelResult, { maxRows: 12 }));
  </script>

  <script type="text/markdown">
    ## Step 3. Review validation evidence and limitations

    The validation summary below is a compact fixture that mirrors the kind of WGS-to-panel sensitivity table a project should include when using restricted-assay support levels. Replace these rows with study-specific simulation, dilution, or matched WGS validation results before making inferential detection claims.

    If a signature is marked limited or not reviewable, the limitation is part of the result. The correct adaptation is not to hide the row, but to calibrate or replace the evidence model with assay-specific validation.
  </script>

  <script type="module" pinned id="interactive-step-3">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "panel-evidence", step: 3, phase: "review", title: "Step 3. Review validation evidence and limitations", mSigSDK, display });
  </script>

  <script type="module" pinned id="4">
    display(table(
      panelValidationSummary,
      [
        { key: "callableContextCount", label: "Covered contexts" },
        { key: "truthExposureBin", label: "Truth exposure bin" },
        { key: "panelBurdenBin", label: "Panel burden bin" },
        { key: "calls", label: "Validation calls" },
        { key: "tierAccuracy", label: "Tier accuracy" },
        { key: "meanPanelVsWgsExposureCosine", label: "Mean panel-WGS cosine" },
        { key: "medianPanelTotal", label: "Median panel mutations" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      panelResult.limitations.map((limitation) => ({ limitation })),
      [{ key: "limitation", label: "Reporting limitation" }]
    ));
    display(table(
      warningRows(panelResult.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ],
      { maxRows: 8 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 4. Save evidence calls and report fields

    The exported bundle should include the assay definition, support levels, review reasons, limitations, validation rows, warnings, suggested review steps, and report fields. These files allow a panel or WES interpretation to be reviewed without losing the assay context.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "panel-evidence", step: 4, phase: "export", title: "Step 4. Save evidence calls and report fields", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    display(downloadMany([
      {
        filename: "panel_evidence_calls.csv",
        text: rowsToCsv(panelRows),
        label: "Download evidence calls CSV",
      },
      {
        filename: "panel_validation_summary.csv",
        text: rowsToCsv(panelValidationSummary),
        label: "Download validation summary CSV",
      },
      {
        filename: "panel_workflow_report.json",
        type: "json",
        value: {
          options: panelOptions,
          opportunityMetadata: panelResult.opportunityMetadata,
          tierRules: panelResult.tierRules,
          evidenceSummary: panelResult.panel.evidenceSummary,
          warnings: panelResult.warnings,
          recommendedActions: panelResult.recommendedActions,
          publicationFigures: panelResult.publicationFigures,
          report: panelResult.report,
        },
        label: "Download report JSON",
      },
    ]));
  </script>
</notebook>
