<!doctype html>
<notebook theme="air">
  <title>mSigSDK panel/WES evidence review</title>

  <script type="text/markdown">
    # Panel/WES evidence review

    **Start with one question. When a panel or WES run shows a signature, did the test see enough of that pattern to talk about it?**

    A signature is a repeat pattern in the DNA changes found in a tumor. Whole-genome sequencing gives the widest view. Panel and WES tests see only part of the genome. So a fitted signature needs a review before anyone treats it as evidence.

    Each call gets one label. It can be higher support, limited support, below the line, or not assessable.
  </script>

  <script type="module" pinned id="1">
    const panelSdkUrl = new URL("../main.js?v=2026-05-15-panel-layperson-redesign", location.href).href;
    const { mSigSDK } = await import(panelSdkUrl);
    const {
      loadPublicSbs96Dataset,
      panelValidationSummary,
      sbs96Contexts,
      sharedCallableOpportunities,
    } = await import("./msig-notebook-fixtures.js");
    const {
      metrics,
      note,
      table,
      tooltipTable,
    } = mSigSDK.presentation;

    function ensurePanelReviewStyles() {
      if (document.getElementById("panel-review-styles")) return;
      const style = document.createElement("style");
      style.id = "panel-review-styles";
      style.textContent = `
        .panel-review-stack {
          display: grid;
          gap: 14px;
        }
        .panel-review-card {
          border: 1px solid #d8ded8;
          border-radius: 8px;
          background: #fbfcfa;
          padding: 14px;
          min-width: 0;
        }
        .panel-review-card h3,
        .panel-review-card h4 {
          margin: 0 0 8px;
          color: #17201d;
          font-size: 15px;
          line-height: 1.25;
        }
        .panel-review-card p {
          margin: 0;
          color: #5f6d67;
          font-size: 13px;
          line-height: 1.45;
        }
        .panel-review-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          gap: 12px;
        }
        .panel-review-flow {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 10px;
          align-items: stretch;
        }
        .panel-flow-step {
          position: relative;
          border: 1px solid #d8ded8;
          border-radius: 8px;
          background: #f4f7f4;
          padding: 12px;
          min-height: 110px;
        }
        .panel-flow-step strong {
          display: block;
          margin-bottom: 6px;
          color: #17201d;
          font-size: 13px;
        }
        .panel-flow-step span {
          display: block;
          color: #5f6d67;
          font-size: 12px;
          line-height: 1.4;
        }
        .panel-tile-grid {
          display: grid;
          grid-template-columns: repeat(12, minmax(0, 1fr));
          gap: 4px;
          margin-top: 10px;
        }
        .panel-context-tile {
          aspect-ratio: 1;
          border-radius: 4px;
          border: 1px solid rgba(23, 32, 29, 0.08);
        }
        .panel-context-tile.covered {
          background: #2d6a4f;
        }
        .panel-context-tile.partial {
          background: #d49b39;
        }
        .panel-context-tile.blind {
          background: #cfd7d2;
        }
        .panel-context-tile.signature {
          box-shadow: inset 0 0 0 2px #17201d;
        }
        .panel-legend {
          display: flex;
          flex-wrap: wrap;
          gap: 8px 12px;
          margin-top: 10px;
          color: #5f6d67;
          font-size: 12px;
        }
        .panel-legend span {
          display: inline-flex;
          align-items: center;
          gap: 6px;
        }
        .panel-legend i {
          display: inline-block;
          width: 11px;
          height: 11px;
          border-radius: 3px;
          border: 1px solid rgba(23, 32, 29, 0.12);
        }
        .panel-tier-card {
          border-left: 5px solid #147d7f;
        }
        .panel-tier-card.higher {
          border-left-color: #2d6a4f;
        }
        .panel-tier-card.limited {
          border-left-color: #d49b39;
        }
        .panel-tier-card.below {
          border-left-color: #6f7f78;
        }
        .panel-tier-card.blocked {
          border-left-color: #b85c38;
        }
        .panel-reading-list {
          margin: 8px 0 0;
          padding-left: 18px;
          color: #5f6d67;
          font-size: 13px;
          line-height: 1.45;
        }
        .panel-callout {
          border-left: 4px solid #147d7f;
          background: #edf7f7;
          color: #5f6d67;
          padding: 12px 14px;
          font-size: 13px;
          line-height: 1.45;
        }
        .panel-callout strong {
          color: #17201d;
        }
        .panel-mini-bar {
          display: grid;
          grid-template-columns: var(--covered, 1fr) var(--partial, 0fr) var(--blind, 0fr);
          overflow: hidden;
          height: 14px;
          margin-top: 10px;
          border-radius: 999px;
          background: #cfd7d2;
        }
        .panel-mini-bar .covered {
          background: #2d6a4f;
        }
        .panel-mini-bar .partial {
          background: #d49b39;
        }
        .panel-mini-bar .blind {
          background: #cfd7d2;
        }
      `;
      document.head.append(style);
    }

    function element(tag, className, text = null) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== null) node.textContent = text;
      return node;
    }

    function append(parent, children) {
      children.filter(Boolean).forEach((child) => parent.append(child));
      return parent;
    }

    function card(title, body, className = "") {
      const wrapper = element("section", `panel-review-card ${className}`.trim());
      wrapper.append(element("h3", "", title), element("p", "", body));
      return wrapper;
    }

    function stack(children) {
      return append(element("div", "panel-review-stack"), children);
    }

    function grid(children) {
      return append(element("div", "panel-review-grid"), children);
    }

    function formatPercent(value, digits = 0) {
      if (!Number.isFinite(Number(value))) return "NA";
      return `${(Number(value) * 100).toFixed(digits)}%`;
    }

    function formatDecimal(value, digits = 2) {
      if (!Number.isFinite(Number(value))) return "NA";
      return Number(value).toFixed(digits);
    }

    function tierLabel(tier) {
      return {
        higher_review_support: "Higher review support",
        limited_review_support: "Limited review support",
        not_detected_within_review_settings: "Below review threshold",
        not_assessable: "Not assessable",
      }[tier] || tier;
    }

    function tierPlainMeaning(tier) {
      return {
        higher_review_support:
          "There is enough data to review. The fitted share is above the high line. The fit checks did not block the call.",
        limited_review_support:
          "There is a result to review, but support is weaker or has limits. Read it as a cautious call.",
        not_detected_within_review_settings:
          "The sample can be reviewed, but the fitted share is below the report line.",
        not_assessable:
          "There is not enough test or fit proof to say support or no support. Pause the call.",
      }[tier] || "Review the tier definition and reasons.";
    }

    function renderConceptCards() {
      return grid([
        card(
          "1. A signature is a pattern",
          "A tumor has many DNA changes. We group them by letter change and nearby letters. A signature is a repeat shape in those groups."
        ),
        card(
          "2. Panel and WES see less",
          "WGS can look across the genome. Panel and WES tests look at less. Some parts of a signature may be clear. Some may be hard to see."
        ),
        card(
          "3. The result is a review label",
          "For each signature, the review checks four things. What can the test see? How many DNA changes are there? Did the fit pass? How big is the fitted share?"
        ),
      ]);
    }

    function renderTileGrid(items, options = {}) {
      const gridNode = element("div", "panel-tile-grid");
      items.forEach((item, index) => {
        const value = Number(item.value);
        const status = value <= 0 ? "blind" : value < 1 ? "partial" : "covered";
        const tile = element("div", `panel-context-tile ${status}${item.signature ? " signature" : ""}`);
        tile.title =
          item.label ||
          `${options.label || "Context"} ${index + 1}: ${
            status === "covered" ? "covered" : status === "partial" ? "partly covered" : "not covered"
          }`;
        gridNode.append(tile);
      });
      return gridNode;
    }

    function renderCoverageLegend() {
      const legend = element("div", "panel-legend");
      [
        ["covered", "covered"],
        ["partial", "partly covered"],
        ["blind", "not covered"],
        ["covered", "heavy outline = important for a toy signature"],
      ].forEach(([status, label], index) => {
        const row = element("span", "");
        const swatch = element("i", status);
        if (index === 3) swatch.style.boxShadow = "inset 0 0 0 2px #17201d";
        row.append(swatch, document.createTextNode(label));
        legend.append(row);
      });
      return legend;
    }

    function renderCoverageStory(callableOpportunities, contexts) {
      const actualValues = contexts.map((context) => ({
        label: context,
        value: Number(callableOpportunities[context] ?? 1),
      }));
      const covered = actualValues.filter((item) => item.value >= 1).length;
      const partial = actualValues.filter((item) => item.value > 0 && item.value < 1).length;
      const blind = actualValues.filter((item) => item.value <= 0).length;
      const blindVerb = blind === 1 ? "is" : "are";
      const actual = card(
        "The real example: test view",
        `${covered} bins are fully covered. ${partial} are partly covered. ${blind} ${blindVerb} not available for this test. The review keeps these blind spots because each signature uses bins in a different way.`
      );
      const bar = element("div", "panel-mini-bar");
      bar.style.setProperty("--covered", `${covered}fr`);
      bar.style.setProperty("--partial", `${partial}fr`);
      bar.style.setProperty("--blind", `${blind || 0.0001}fr`);
      bar.append(element("span", "covered"), element("span", "partial"), element("span", "blind"));
      actual.append(bar, renderTileGrid(actualValues, { label: "SBS96 context" }));

      const toyValues = Array.from({ length: 24 }, (_, index) => ({
        value: [0, 2, 5, 8, 9, 13, 18].includes(index) ? 0 : [4, 14].includes(index) ? 0.45 : 1,
        signature: [2, 4, 5, 8, 13, 20].includes(index),
        label: `Toy context ${index + 1}`,
      }));
      const toy = card(
        "Toy example: why blind spots matter",
        "Imagine a signature needs the outlined bins. If several are gray or partly covered, the fitted number is harder to trust."
      );
      toy.append(renderTileGrid(toyValues, { label: "Toy context" }));

      const footer = element("div", "panel-callout");
      footer.innerHTML =
        "<strong>Reporting rule:</strong> a panel/WES result should travel with the test view. Otherwise a reader may treat a narrow test like a whole-genome test.";

      return stack([grid([actual, toy]), renderCoverageLegend(), footer]);
    }

    function renderDecisionPath(panelOptions) {
      const wrapper = element("div", "panel-review-flow");
      [
        [
          "Can the test see it?",
          "Record which mutation bins the panel or exome can see."
        ],
        [
          "Are there enough DNA changes?",
          `This review needs at least ${panelOptions.minAssessableMutations} DNA changes. Below that, it cannot assess a signature.`
        ],
        [
          "Does the fit pass review?",
          "Fit checks flag cases where the fitted mix needs care."
        ],
        [
          "How large is the fitted share?",
          `At ${formatPercent(panelOptions.higherSupportExposureThreshold)} or more, the call gets higher support. From ${formatPercent(panelOptions.limitedSupportExposureThreshold)} to that line, it gets limited support.`
        ],
        [
          "What should we report?",
          "Use one label. Pick higher support, limited support, below the line, or not assessable."
        ],
      ].forEach(([title, body]) => {
        const step = element("section", "panel-flow-step");
        step.append(element("strong", "", title), element("span", "", body));
        wrapper.append(step);
      });
      return wrapper;
    }

    function renderTierCards() {
      return grid([
        card("Higher review support", tierPlainMeaning("higher_review_support"), "panel-tier-card higher"),
        card("Limited review support", tierPlainMeaning("limited_review_support"), "panel-tier-card limited"),
        card("Below review threshold", tierPlainMeaning("not_detected_within_review_settings"), "panel-tier-card below"),
        card("Not assessable", tierPlainMeaning("not_assessable"), "panel-tier-card blocked"),
      ]);
    }

    function evidenceCallsToRows(panelResult) {
      return Object.entries(panelResult.panel.evidenceCalls).flatMap(
        ([sample, calls]) =>
          calls.map((call) => ({
            sample,
            signature: call.signatureName,
            exposure: call.exposure,
            exposureDisplay: formatPercent(call.exposure, 1),
            tier: call.tier,
            tierLabel: tierLabel(call.tier),
            plainMeaning: tierPlainMeaning(call.tier),
            assessability: call.assessabilityClass,
            totalMutations: call.totalMutations,
            reasons: (call.assessabilityReasons || [])
              .map((reason) => reason.detail || reason.code)
              .join("; "),
          }))
      );
    }

    function renderTierSummary(panelRows) {
      const counts = panelRows.reduce((acc, row) => {
        acc[row.tier] = (acc[row.tier] || 0) + 1;
        return acc;
      }, {});
      return metrics([
        { label: "Higher support", value: counts.higher_review_support || 0 },
        { label: "Limited support", value: counts.limited_review_support || 0 },
        { label: "Below line", value: counts.not_detected_within_review_settings || 0 },
        { label: "Not assessable", value: counts.not_assessable || 0 },
      ]);
    }

    function plainFirstCheck(row) {
      return {
        higher_review_support:
          "Check that test view, change count, and fit checks match the report.",
        limited_review_support:
          "Check test view and fit checks before using this as support.",
        not_detected_within_review_settings:
          "Check whether the fitted share is below the report line.",
        not_assessable:
          "Check change count and test view before making a call.",
      }[row.tier] || "Check test view, change count, and fit checks.";
    }

    function pickPlainExamples(panelRows) {
      const priority = [
        "higher_review_support",
        "limited_review_support",
        "not_detected_within_review_settings",
        "not_assessable",
      ];
      return priority
        .map((tier) => panelRows.find((row) => row.tier === tier))
        .filter(Boolean)
        .map((row) => ({
          sample: row.sample,
          signature: row.signature,
          fittedContribution: row.exposureDisplay,
          evidenceTier: row.tierLabel,
          interpretation: row.plainMeaning,
          firstThingToCheck: plainFirstCheck(row),
        }));
    }

    function panelReviewRows(panelRows) {
      return panelRows.map((row) => ({
        sample: row.sample,
        signature: row.signature,
        fittedShare: row.exposureDisplay,
        supportLabel: row.tierLabel,
        mutations: row.totalMutations,
        reason: plainFirstCheck(row),
      }));
    }

    function validationRowsForReaders(rows) {
      return rows.map((row) => ({
        coveredContexts: row.callableContextCount,
        trueContributionRange: row.truthExposureBin,
        panelMutationCountRange: row.panelBurdenBin,
        casesReviewed: row.calls,
        tierAccuracy: formatPercent(row.tierAccuracy, 1),
        panelWgsAgreement: formatDecimal(row.meanPanelVsWgsExposureCosine, 2),
          interpretation:
            row.panelBurdenBin === "<30"
            ? "Very few DNA changes: often the right answer is not assessable."
            : row.callableContextCount >= 72
              ? "More coverage makes panel and WGS results line up better."
              : "This can help, but keep the support label visible.",
      }));
    }

    ensurePanelReviewStyles();

    const panelDataset = await loadPublicSbs96Dataset(mSigSDK, { sampleLimit: 3 });
    const panelContexts = panelDataset.contexts || sbs96Contexts();
    const panelSpectra = panelDataset.spectra;
    const panelSignatures = panelDataset.signatures;
    const callableOpportunities = sharedCallableOpportunities();
    const panelOptions = {
      minAssessableMutations: 30,
      limitedSupportExposureThreshold: 0.05,
      higherSupportExposureThreshold: 0.20,
      lowBurdenThreshold: 50,
      genomeBuild: "GRCh37",
    };

    display(note(
      "Core idea: check the test before you use the call. Panel and WES data are not whole-genome data."
    ));
    display(renderConceptCards());
    display(metrics([
      { label: "Data source", value: panelDataset.status },
      { label: "Samples", value: Object.keys(panelSpectra).length },
      { label: "Known signatures", value: Object.keys(panelSignatures).length },
      { label: "Mutation bins", value: panelContexts.length },
      { label: "Assay type", value: "Panel/WES review" },
    ]));
  </script>

  <script type="text/markdown">
    ## Step 1. Check what the test can see

    Start with the view. Before the fit, ask what the test can see. Here, each DNA change goes into one of 96 SBS bins. WGS can see all bins across the genome in principle. A panel or WES test sees less.

    The real example shows the visibility data used by the SDK. The toy example shows why blind spots matter. If key bins for a signature are not covered, a fitted number is not enough.
  </script>

  <script type="module" pinned id="2">
    display(renderCoverageStory(callableOpportunities, panelContexts));
    display(tooltipTable(
      [
        {
          term: "Mutation bin",
          plainMeaning: "A bin for one DNA letter change and its nearby letters.",
          whyItMatters: "Signatures are patterns across these bins.",
        },
        {
          term: "Test view",
          plainMeaning: "How much of that bin the test can see.",
          whyItMatters: "A blind or partly covered bin weakens support for signatures that need it.",
        },
        {
          term: "Fitted share",
          plainMeaning: "The model estimate for how much a known signature helps explain the sample.",
          whyItMatters: "It is a model output, not proof by itself.",
        },
        {
          term: "Support label",
          plainMeaning: "The label after all checks are done.",
          whyItMatters: "It keeps test limits visible.",
        },
      ],
      [
        { key: "term", label: "Term" },
        { key: "plainMeaning", label: "Meaning" },
        { key: "whyItMatters", label: "Why it matters" },
      ],
      {
        title: "Tiny glossary",
        caption: "Read these four terms before using the review table.",
      }
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Run the review, not just the fit

    Run the fit. Then run the review. The workflow carries the test view into the result. It checks change count and fit quality. Then it assigns a support label for each fitted signature.

    The review has five gates. If an early gate fails, the fair answer may be **not assessable**, even when the model prints a number.
  </script>

  <script type="module" pinned id="3">
    display(renderDecisionPath(panelOptions));
    display(renderTierCards());

    const panelResult = await mSigSDK.workflows.runPanelWorkflow(
      { spectra: panelSpectra, signatures: panelSignatures, callableOpportunities },
      {
        contexts: panelContexts,
        expectedContexts: panelContexts,
        runBootstrap: false,
        runThresholdSensitivity: false,
        minAssessableMutations: panelOptions.minAssessableMutations,
        limitedSupportExposureThreshold: panelOptions.limitedSupportExposureThreshold,
        higherSupportExposureThreshold: panelOptions.higherSupportExposureThreshold,
        lowBurdenThreshold: panelOptions.lowBurdenThreshold,
        opportunitySource: "user_supplied",
        genomeBuild: panelOptions.genomeBuild,
        reportFormat: "object",
      }
    );
    const panelRows = evidenceCallsToRows(panelResult);
    const plainExampleRows = pickPlainExamples(panelRows);

    display(metrics([
      { label: "Workflow", value: "panel review" },
      { label: "Calls", value: panelResult.panel.evidenceSummary.callCount },
      { label: "Test view", value: formatPercent(panelResult.opportunityMetadata.opportunityCoverage, 1) },
      { label: "Warnings", value: panelResult.warnings.length },
    ]));
    display(renderTierSummary(panelRows));
  </script>

  <script type="text/markdown">
    ## Step 3. Read the results like a reviewer

    Read the label first. Then read the reason. Look at the fitted share last.

    That order helps because a number can look exact while the test is weak. The heat map gives a quick scan across samples and signatures. The table puts the same result into plain review notes.
  </script>

  <script type="module" pinned id="4">
    const panelMatrixDiv = document.createElement("div");
    panelMatrixDiv.style.width = "100%";
    display(panelMatrixDiv);
    await mSigSDK.qcPlots.plotPanelEvidenceMatrix(panelMatrixDiv, panelResult);

    display(table(
      plainExampleRows,
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "fittedContribution", label: "Fitted share" },
        { key: "evidenceTier", label: "Support label" },
        { key: "interpretation", label: "Read" },
        { key: "firstThingToCheck", label: "First thing to check" },
      ],
      {
        maxRows: 8,
        title: "Plain reads from this run",
        caption: "One row for each label that appears in this example.",
      }
    ));

    display(table(panelReviewRows(panelRows), [
      { key: "sample", label: "Sample" },
      { key: "signature", label: "Signature" },
      { key: "fittedShare", label: "Fitted share" },
      { key: "supportLabel", label: "Support label" },
      { key: "mutations", label: "Change count" },
      { key: "reason", label: "Reason" },
    ], {
      maxRows: 12,
      title: "Full panel/WES review table",
      caption: "Each row keeps sample, signature, fitted share, support label, count, and reason in one place.",
    }));
  </script>

  <script type="text/markdown">
    ## Step 4. Check the model against known data

    Use known truth. Each project should test the labels with known data. Good checks include spike-in mixes, dilution runs, or matched WGS data.

    The rows below are examples. In a study report, replace them with checks for your own test before you claim a signature was found.
  </script>

  <script type="module" pinned id="5">
    display(table(
      validationRowsForReaders(panelValidationSummary),
      [
        { key: "coveredContexts", label: "Bins seen by test" },
        { key: "trueContributionRange", label: "Known share range" },
        { key: "panelMutationCountRange", label: "Panel change count" },
        { key: "casesReviewed", label: "Cases reviewed" },
        { key: "tierAccuracy", label: "Label accuracy" },
        { key: "panelWgsAgreement", label: "Panel-WGS agreement" },
        { key: "interpretation", label: "Read" },
      ],
      {
        maxRows: 8,
        title: "Checks a project should show",
        caption: "Example rows for the checks needed before you treat support labels as evidence.",
      }
    ));

    display(table(
      panelResult.limitations.map((limitation) => ({
        limitation: limitation.includes("detection probabilities")
          ? "Do not read a label as a true probability."
          : "Do not use a panel or WES call like a WGS call.",
        plainMeaning:
          limitation.includes("detection probabilities")
            ? "The SDK does not give the chance that a signature is truly present."
            : "A narrow test should be reported as a review result, not as a full whole-genome fit.",
      })),
      [
        { key: "limitation", label: "Limit" },
        { key: "plainMeaning", label: "Meaning" },
      ],
      {
        title: "Limits to keep with the result",
      }
    ));

    const warningTableRows = warningRows(panelResult.warnings).map((warning) => ({
      code: {
        HETEROGENEOUS_COHORT: "Mixed cohort",
        CATALOG_INCOMPLETE_SUSPECTED: "Catalog check",
        EXTRACTION_NOT_RECOMMENDED: "Fit choice",
        PANEL_SIGNATURE_NOT_ASSESSABLE: "Not enough data",
      }[warning.code] || "Review cue",
      message: warning.code === "PANEL_SIGNATURE_NOT_ASSESSABLE"
        ? "This sample and signature need more data."
        : "Needs extra review.",
      resolution: warning.code === "PANEL_SIGNATURE_NOT_ASSESSABLE"
        ? "Keep the warning. Check test view, count, and fit."
        : "Keep the warning. Review the source data.",
    }));
    if (warningTableRows.length) {
      display(table(
        warningTableRows,
        [
          { key: "code", label: "Cue" },
          { key: "message", label: "Message" },
          { key: "resolution", label: "Next step" },
        ],
        {
          maxRows: 8,
          title: "Warnings from this run",
        }
      ));
    } else {
      display(note("No warnings were raised in this example. In your own panel/WES report, keep warnings visible."));
    }
  </script>

  <script type="text/markdown">
    ## Step 5. Save the evidence, not just the numbers

    Keep the proof with the call. Include the test setup. Include support labels, review reasons, limits, checks, and warnings. That bundle lets another scientist see whether the test supports the claim.
  </script>

  <script type="module" pinned id="6">
    display(table(
      [
        {
          file: "Call table",
          use: "Sample, signature, fitted share, label, count, and reason.",
        },
        {
          file: "Check table",
