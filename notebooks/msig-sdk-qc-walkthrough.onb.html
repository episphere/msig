    function qcElement(tag, className = "", text = "") {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text) element.textContent = text;
      return element;
    }

    function qcYield() {
      return new Promise((resolve) => setTimeout(resolve, 0));
    }

    function qcSetRunStatus(message) {
      if (qcHosts.runStatus) qcHosts.runStatus.replaceChildren(qcPlaceholder(message));
    }

    function qcButton(label, kind = "") {
      const button = qcElement("button", `qc-button ${kind}`.trim(), label);
      button.type = "button";
      return button;
    }

    function qcField(label, control, help = "") {
      const wrapper = qcElement("label", "qc-field");
      if (!control.getAttribute("aria-label")) control.setAttribute("aria-label", label);
      wrapper.append(qcElement("span", "", label), control);
      if (help) wrapper.append(qcElement("small", "", help));
      return wrapper;
    }

    function qcCheckField(label, control, help = "") {
      const wrapper = qcElement("label", "qc-check-field");
      if (!control.getAttribute("aria-label")) control.setAttribute("aria-label", label);
      const copy = qcElement("span");
      copy.append(qcElement("span", "", label));
      if (help) copy.append(qcElement("small", "", help));
      wrapper.append(control, copy);
      return wrapper;
    }

    function qcNumberInput(value, { min = null, max = null, step = "any" } = {}) {
      const input = document.createElement("input");
      input.type = "number";
      input.value = String(value);
      input.step = String(step);
      if (min !== null) input.min = String(min);
      if (max !== null) input.max = String(max);
      return input;
    }

    function qcOption(label, value = label) {
      const option = document.createElement("option");
      option.value = String(value);
      option.textContent = String(label);
      return option;
    }

    function qcSetSelectOptions(select, items, preferred = "") {
      const normalized = items.map((item) =>
        typeof item === "object" ? item : { label: item, value: item }
      );
      select.replaceChildren(...normalized.map((item) => qcOption(item.label, item.value)));
      const preferredValue = String(preferred || "");
      if (preferredValue && normalized.some((item) => String(item.value) === preferredValue)) {
        select.value = preferredValue;
      } else if (normalized.length) {
        select.value = String(normalized[0].value);
      }
      return select.value;
    }

    function qcPlaceholder(text) {
      return qcElement("div", "qc-placeholder", text);
    }

    function qcCell(content, className = "") {
      const td = document.createElement("td");
      if (className) td.className = className;
      if (content instanceof Node) {
        td.append(content);
      } else {
        td.textContent = String(content);
      }
      return td;
    }

    function qcMetadataForSample(sample) {
      return qcState.metadata.find((row) => row.sample === sample) || {};
    }

    function qcMeterCell(label, value, width, tone = "") {
      const meter = qcElement("div", "qc-meter");
      const meterLabel = qcElement("div", "qc-meter-label");
      meterLabel.append(qcElement("span", "", label), qcElement("strong", "", value));
      const track = qcElement("div", "qc-meter-track");
      const fill = qcElement("div", `qc-meter-fill ${tone}`.trim());
      fill.style.setProperty("--qc-meter-width", `${Number.isFinite(width) ? qcBound(width, 0, 100) : 0}%`);
      track.append(fill);
      meter.append(meterLabel, track);
      return meter;
    }

    function qcPolicyClass(status) {
      return status === "priority" ? "restrict" : status === "review" ? "review" : "pass";
    }

    function qcPolicyLabel(status) {
      return {
        priority: "Priority",
        review: "Review",
        pass: "Pass",
      }[status] || "Review";
    }

    function qcRenderPolicyStatus(status) {
      const badge = qcElement("span", `qc-status ${qcPolicyClass(status)}`);
      badge.textContent = qcPolicyLabel(status);
      return badge;
    }

    function qcRenderFlagList(flags = []) {
      const list = qcElement("div", "qc-flag-list");
      if (!flags.length) {
        list.append(qcElement("span", "qc-flag pass", "No policy flag"));
        return list;
      }
      flags.forEach((flag) => {
        list.append(qcElement("span", `qc-flag ${flag.severity}`, flag.label || flag.code));
      });
      return list;
    }

    function qcManualPolicyOptions() {
      return {
        enabled: true,
        source: qcState.settingsMode === "smart" ? "cohort_preset" : "manual",
        thresholds: {
          lowBurdenThreshold: qcState.settings.lowBurdenThreshold,
          reconstructionCosineThreshold: qcState.settings.reconstructionCosineThreshold,
          residualUnexplainedThreshold: qcState.settings.residualUnexplainedThreshold,
          residualStructureCosineThreshold: qcState.settings.residualStructureCosineThreshold,
          minBurdenForResidualStructure: qcState.settings.minBurdenForResidualStructure,
        },
        rules: {
          lowBurden: qcState.flagRules.lowBurden,
          reconstruction: qcState.flagRules.reconstruction,
          residualUnexplained: qcState.flagRules.residualUnexplained,
          structuredResidual: qcState.flagRules.structuredResidual,
        },
      };
    }

    function qcFallbackManualPolicy() {
      return {
        status: "pass",
        score: 0,
        primaryCue: "No manual policy cue",
        flags: [],
        thresholds: qcManualPolicyOptions().thresholds,
        rules: qcManualPolicyOptions().rules,
      };
    }

    function qcSearchMatches(row, query) {
      const normalized = String(query || "").trim().toLowerCase();
      if (!normalized) return true;
      const metadata = qcMetadataForSample(row.sample);
      return [
        row.sample,
        qcPolicyLabel(row.policyStatus),
        row.mainCue,
        row.burdenClass,
        ...(row.policyFlags || []).map((flag) => flag.label || flag.code),
        metadata.cancer,
        metadata.strategy,
        metadata.source,
      ]
        .filter(Boolean)
        .some((value) => String(value).toLowerCase().includes(normalized));
    }

    function qcFilteredTriageRows() {
      return qcState.triageRows.filter((row) =>
        (!qcState.flaggedOnly || row.policyStatus !== "pass") &&
        qcSearchMatches(row, qcState.tableSearch)
      );
    }

    function qcDisplayedTriageRows(rows) {
      if (qcState.tableLimit === "all") return rows;
      const limit = Math.max(1, Math.round(Number(qcState.tableLimit) || 50));
      return rows.slice(0, limit);
    }

    function qcFormat(value, digits = 3) {
      return Number.isFinite(value) ? formatNumber(value, digits) : "n/a";
    }

    function qcPercent(value, digits = 1) {
      return Number.isFinite(value) ? `${formatNumber(value * 100, digits)}%` : "n/a";
    }

    function qcPercentPrecise(value, digits = 1) {
      return Number.isFinite(value) ? `${(value * 100).toFixed(digits)}%` : "n/a";
    }

    function qcQuantile(values, probability) {
      const sorted = values.filter(Number.isFinite).sort((a, b) => a - b);
      if (!sorted.length) return null;
      const position = (sorted.length - 1) * Math.min(Math.max(probability, 0), 1);
      const lower = Math.floor(position);
      const upper = Math.ceil(position);
      if (lower === upper) return sorted[lower];
      return sorted[lower] + (sorted[upper] - sorted[lower]) * (position - lower);
    }

    function qcMedian(values) {
      return qcQuantile(values, 0.5);
    }

    function qcMad(values, center = qcMedian(values)) {
      if (!Number.isFinite(center)) return 0;
      return qcMedian(values.map((value) => Math.abs(value - center)).filter(Number.isFinite)) || 0;
    }

    function qcRoundBurden(value) {
      if (!Number.isFinite(value)) return qcFallbackMutationBurdenThreshold;
      if (value >= 10000) return Math.round(value / 1000) * 1000;
      if (value >= 1000) return Math.round(value / 100) * 100;
      if (value >= 100) return Math.round(value / 10) * 10;
      return Math.max(1, Math.round(value));
    }

    function qcBound(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function qcParseNumber(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function qcStringify(value) {
      return JSON.stringify(value, null, 2);
    }

    function qcParseCsvLike(text) {
      const lines = String(text || "").trim().split(/\r?\n/).filter(Boolean);
      if (!lines.length) return [];
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(delimiter).map((header) => header.trim());
      return lines.slice(1).map((line) => {
        const values = line.split(delimiter);
        return Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]));
      });
    }

    function qcParseMetadata(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return qcNormalizeMetadata(parsed);
        if (parsed && typeof parsed === "object") {
          return qcNormalizeMetadata(Object.entries(parsed).map(([sample, fields]) => ({
            sample,
            ...(fields || {}),
          })));
        }
      } catch (_error) {
        return qcNormalizeMetadata(qcParseCsvLike(trimmed));
      }
      return [];
    }

    function qcParseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind} input is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Fall through to delimited matrix import.
      }
      const delimiter = trimmed.split(/\r?\n/)[0]?.includes(",") ? "," : "\t";
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed, { delimiter })
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed, { delimiter });
    }

    function qcReadFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

    function qcFileInput(target) {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json,.txt,.tsv,.csv";
      input.addEventListener("change", async () => {
        if (input.files?.[0]) target.value = await qcReadFileAsText(input.files[0]);
      });
      return input;
    }

    function qcNormalizeMetadata(metadata) {
      return (Array.isArray(metadata) ? metadata : [])
        .map((row) => ({
          ...row,
          sample: row.sample || row.Sample || row.sample_id || row.sampleId || row.id,
        }))
        .filter((row) => row.sample);
    }

    function qcInferContexts(...matrices) {
      const contexts = [
        ...new Set(
          matrices.flatMap((matrix) =>
            Object.values(matrix || {}).flatMap((record) => Object.keys(record || {}))
          )
        ),
      ];
      return contexts.length
        ? contexts
        : mSigSDK.validation.getExpectedContexts({ profile: "SBS", matrix: 96 });
    }

    function qcPublicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, qcPublicApiBase);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      }
      return url;
    }

    async function qcFetchPublicApiRows(endpoint, params = {}, limit = 100000) {
      const rows = [];
      let offset = 0;
      for (let page = 0; page < 10; page += 1) {
        const response = await fetch(qcPublicApiUrl(endpoint, { ...params, limit, offset }).href);
        if (!response.ok) throw new Error(`${endpoint} returned ${response.status}`);
        const pageRows = await response.json();
        if (!Array.isArray(pageRows)) throw new Error(`${endpoint} response was not an array.`);
        rows.push(...pageRows);
        if (pageRows.length < limit) break;
        offset += limit;
      }
      return rows;
    }

    function qcChunks(items, size) {
      const chunkSize = Math.max(1, Math.round(Number(size) || 1));
      const chunks = [];
      for (let index = 0; index < items.length; index += chunkSize) {
        chunks.push(items.slice(index, index + chunkSize));
      }
      return chunks;
    }

    function qcUniqueSorted(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
        .map(String)
        .sort((a, b) => a.localeCompare(b));
    }

    function qcStatusLabel(mode) {
      return {
        standard_qc_passed: "Pass",
        report_with_caveats: "Caveat",
        restricted_interpretation: "Restricted",
        not_assessable: "Not assessable",
      }[mode] || mode || "Review";
    }

    function qcStatusClass(mode) {
      if (mode === "standard_qc_passed") return "pass";
      if (mode === "restricted_interpretation" || mode === "not_assessable") return "restrict";
      return "review";
    }

    function qcWarningSample(warning) {
      return warning?.sample || warning?.details?.sample || null;
    }

    function qcWarningRowsFor(sample) {
      const analysis = qcState.analysis;
      if (!analysis) return [];
      const fitQualitySample = analysis.fitQualityBySample.get(sample);
      const residualSample = analysis.residualBySample.get(sample);
      const warnings = [
        ...(analysis.burden.warnings || []),
        ...(residualSample?.warnings || []),
        ...(fitQualitySample?.warnings || []),
      ]
        .filter((warning) => !qcWarningSample(warning) || qcWarningSample(warning) === sample)
        .map((warning) => ({
          code: warning.code || "review_cue",
          message: warning.message || "Review this sample before reporting.",
          action: warning.resolution || warning.recommendedAction || "",
        }));
      const seen = new Set();
      return warnings.filter((warning) => {
        const key = `${warning.code}|${warning.message}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function qcSetDataset({ spectra, signatures, metadata = [], source, contexts = null, publicSelection = null }) {
      qcState.spectra = JSON.parse(JSON.stringify(spectra || {}));
      qcState.signatures = JSON.parse(JSON.stringify(signatures || {}));
      qcState.metadata = qcNormalizeMetadata(metadata);
      qcState.contexts = contexts?.length ? [...contexts] : qcInferContexts(qcState.spectra, qcState.signatures);
      qcState.source = source || "user supplied";
      qcState.publicSelection = publicSelection;
      qcState.analysis = null;
      qcState.triageRows = [];
      qcState.tableSearch = "";
      if (qcTableSearchInput) qcTableSearchInput.value = "";
      qcRenderInputSummary();
    }

    function qcMutationTotals() {
      return Object.values(qcState.spectra || {}).map((record) =>
        Object.values(record || {}).reduce((sum, value) => sum + (Number(value) || 0), 0)
      );
    }

    function qcApplySmartInputDefaults() {
      const nonZeroTotals = qcMutationTotals().filter((total) => Number.isFinite(total) && total > 0);
      const q10 = qcQuantile(nonZeroTotals, 0.1);
      const median = qcMedian(nonZeroTotals);
      const lowBurden = nonZeroTotals.length
        ? qcRoundBurden(Math.max(qcFallbackResidualStructureBurdenThreshold, q10 || nonZeroTotals[0] || qcFallbackResidualStructureBurdenThreshold))
        : qcFallbackMutationBurdenThreshold;
      qcState.settings.lowBurdenThreshold = lowBurden;
      qcState.settings.moderateBurdenThreshold = nonZeroTotals.length
        ? qcRoundBurden(Math.max(lowBurden * 2, median || lowBurden * 2))
        : qcFallbackModerateBurdenThreshold;
      qcState.settings.exposureThreshold = qcFallbackExposureThreshold;
      qcState.settings.residualStructureCosineThreshold = qcFallbackResidualStructureCosineThreshold;
      qcState.settings.minBurdenForResidualStructure = qcFallbackResidualStructureBurdenThreshold;
    }

    function qcApplySmartResultDefaults(reconstruction, residuals) {
      const cosines = (reconstruction?.samples || [])
        .map((sample) => sample.cosineSimilarity)
        .filter(Number.isFinite);
      const residualFractions = (residuals?.samples || [])
        .map((sample) => sample.metrics?.relativeUnexplainedFraction)
        .filter(Number.isFinite);
      const medianCosine = qcMedian(cosines);
      const cosineMad = qcMad(cosines, medianCosine);
      const cosineThreshold = Number.isFinite(medianCosine)
        ? medianCosine - 2 * cosineMad
        : qcFallbackReconstructionCosineThreshold;
      const residualThreshold = qcQuantile(residualFractions, 0.75);
      qcState.settings.reconstructionCosineThreshold = Number.isFinite(cosineThreshold)
        ? Number(qcBound(cosineThreshold, 0.85, 0.98).toFixed(3))
        : qcFallbackReconstructionCosineThreshold;
      qcState.settings.residualUnexplainedThreshold = Number.isFinite(residualThreshold)
        ? Number(qcBound(residualThreshold, qcFallbackResidualUnexplainedThreshold, 0.25).toFixed(3))
        : qcFallbackResidualUnexplainedThreshold;
    }

    function qcReadManualSettingsFromControls() {
      if (!qcSettingControls.lowBurdenThreshold) return;
      qcState.settings.exposureThreshold = qcBound(qcParseNumber(qcSettingControls.exposureThreshold.value, qcFallbackExposureThreshold), 0, 0.5);
      qcState.settings.lowBurdenThreshold = Math.max(0, Math.round(qcParseNumber(qcSettingControls.lowBurdenThreshold.value, qcFallbackMutationBurdenThreshold)));
      qcState.settings.moderateBurdenThreshold = Math.max(
        qcState.settings.lowBurdenThreshold,
        Math.round(qcParseNumber(qcSettingControls.moderateBurdenThreshold.value, qcState.settings.lowBurdenThreshold * 2))
      );
      qcState.settings.reconstructionCosineThreshold = qcBound(qcParseNumber(qcSettingControls.reconstructionCosineThreshold.value, qcFallbackReconstructionCosineThreshold), 0, 1);
      qcState.settings.residualUnexplainedThreshold = qcBound(qcParseNumber(qcSettingControls.residualUnexplainedThreshold.value, qcFallbackResidualUnexplainedThreshold), 0, 1);
      qcState.settings.residualStructureCosineThreshold = qcBound(qcParseNumber(qcSettingControls.residualStructureCosineThreshold.value, qcFallbackResidualStructureCosineThreshold), 0, 1);
      qcState.settings.minBurdenForResidualStructure = Math.max(0, Math.round(qcParseNumber(qcSettingControls.minBurdenForResidualStructure.value, qcFallbackResidualStructureBurdenThreshold)));
      for (const key of Object.keys(qcState.flagRules)) {
        if (qcSettingControls[key]) qcState.flagRules[key] = qcSettingControls[key].checked;
      }
    }

    function qcSyncSettingControls() {
      if (!qcSettingControls.lowBurdenThreshold) return;
      qcSettingControls.exposureThreshold.value = String(qcState.settings.exposureThreshold);
      qcSettingControls.lowBurdenThreshold.value = String(qcState.settings.lowBurdenThreshold);
      qcSettingControls.moderateBurdenThreshold.value = String(qcState.settings.moderateBurdenThreshold);
      qcSettingControls.reconstructionCosineThreshold.value = String(qcState.settings.reconstructionCosineThreshold);
      qcSettingControls.residualUnexplainedThreshold.value = String(qcState.settings.residualUnexplainedThreshold);
      qcSettingControls.residualStructureCosineThreshold.value = String(qcState.settings.residualStructureCosineThreshold);
      qcSettingControls.minBurdenForResidualStructure.value = String(qcState.settings.minBurdenForResidualStructure);
      for (const key of Object.keys(qcState.flagRules)) {
        if (qcSettingControls[key]) qcSettingControls[key].checked = qcState.flagRules[key];
      }
      qcRenderSettingsSummary();
    }

    function qcRenderSettingsSummary() {
      if (!qcHosts.settingsSummary) return;
      const mode = qcState.settingsMode === "smart" ? "Smart defaults" : "Manual flags";
      qcHosts.settingsSummary.replaceChildren(
        ...[
          `Mode: ${mode}`,
          `Exposure >= ${qcPercentPrecise(qcState.settings.exposureThreshold, 1)}`,
          `Low burden < ${formatNumber(qcState.settings.lowBurdenThreshold)}`,
          `Cosine < ${qcFormat(qcState.settings.reconstructionCosineThreshold, 3)}`,
          `Residual >= ${qcPercentPrecise(qcState.settings.residualUnexplainedThreshold, 1)}`,
          `Structure cosine >= ${qcFormat(qcState.settings.residualStructureCosineThreshold, 2)}`,
          `Structure burden >= ${formatNumber(qcState.settings.minBurdenForResidualStructure)}`,
        ].map((item) => qcElement("span", "qc-chip", item))
      );
    }

    function qcCompactSource(source) {
      const value = String(source || "");
      if (/embedded demo/i.test(value)) return "Embedded SBS96 demo";
      return value
        .replace(/^live mSigPortal:\s*/i, "")
        .replace(/^mSigPortal public API:\s*/i, "mSigPortal: ")
        .slice(0, 140);
    }

    function qcRenderInputSummary() {
      if (!qcHosts.inputSummary) return;
      qcHosts.inputSummary.replaceChildren();
      if (!qcState.spectra || !qcState.signatures) {
        qcHosts.inputSummary.append(qcPlaceholder("No active cohort yet."));
        return;
      }
      const spectraValidation = mSigSDK.validation.validateSpectra(qcState.spectra, {
        expectedContexts: qcState.contexts,
        minTotalMutations: qcState.settings.lowBurdenThreshold,
      });
      const signatureValidation = mSigSDK.validation.validateSignatureMatrix(qcState.signatures, {
        expectedContexts: qcState.contexts,
      });
      const validationStatus = spectraValidation.valid && signatureValidation.valid ? "Pass" : "Review";
      const summary = qcElement("div", "qc-summary-strip");
      [
        ["Source", qcCompactSource(qcState.source)],
        ["Samples", Object.keys(qcState.spectra).length],
        ["Signatures", Object.keys(qcState.signatures).length],
        ["Contexts", qcState.contexts.length],
        ["Validation", validationStatus],
      ].forEach(([label, value]) => {
        const item = qcElement("span", "qc-summary-item");
        item.append(qcElement("strong", "", `${label}:`), document.createTextNode(` ${value}`));
        summary.append(item);
      });
      qcHosts.inputSummary.append(summary);
    }

    function qcPolicyRank(status) {
      return status === "priority" ? 2 : status === "review" ? 1 : 0;
    }

    function qcReconstructionFromResiduals(residuals) {
      return {
        schemaVersion: residuals.schemaVersion,
        workflowRole: "reconstruction_error_qc",
        scopeStatement: residuals.scopeStatement,
        methodBasis: residuals.methodBasis,
        contexts: residuals.contexts,
        samples: (residuals.samples || []).map((sample) => ({
          sample: sample.sample,
          normalizationMode: sample.normalizationMode,
          ...sample.metrics,
        })),
        warnings: [],
        recommendedActions: residuals.recommendedActions || [],
      };
    }

    async function qcRunTriage() {
      if (!qcState.spectra || !qcState.signatures) return;
      qcSetRunStatus("Preparing cohort QC triage...");
      await qcYield();
      if (qcState.settingsMode === "smart") {
        qcApplySmartInputDefaults();
        qcSyncSettingControls();
      }
      qcSetRunStatus("Fitting exposures...");
      await qcYield();
      const exposures = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
        qcState.signatures,
        qcState.spectra,
        {
          exposureThreshold: qcState.settings.exposureThreshold,
          exposureType: "relative",
          renormalize: true,
        }
      );
      qcSetRunStatus("Summarizing mutation burden...");
      await qcYield();
      const burden = mSigSDK.qc.summarizeMutationBurden(qcState.spectra, {
        expectedContexts: qcState.contexts,
        lowBurdenThresholdMode: "fixed",
        lowBurdenThreshold: qcState.settings.lowBurdenThreshold,
        moderateBurdenThreshold: qcState.settings.moderateBurdenThreshold,
      });
      qcSetRunStatus("Calculating residuals and reconstruction...");
      await qcYield();
      let residuals = mSigSDK.qc.calculateFitResiduals(
        qcState.signatures,
        qcState.spectra,
        exposures,
        {
          contexts: qcState.contexts,
          lowBurdenThreshold: qcState.settings.lowBurdenThreshold,
          moderateBurdenThreshold: qcState.settings.moderateBurdenThreshold,
          weakUnexplainedThreshold: qcState.settings.residualUnexplainedThreshold,
        }
      );
      let reconstruction = qcReconstructionFromResiduals(residuals);
      if (qcState.settingsMode === "smart") {
        qcApplySmartResultDefaults(reconstruction, residuals);
        qcSyncSettingControls();
        qcSetRunStatus("Applying smart defaults...");
        await qcYield();
        residuals = mSigSDK.qc.calculateFitResiduals(
          qcState.signatures,
          qcState.spectra,
          exposures,
          {
            contexts: qcState.contexts,
            lowBurdenThreshold: qcState.settings.lowBurdenThreshold,
            moderateBurdenThreshold: qcState.settings.moderateBurdenThreshold,
            weakUnexplainedThreshold: qcState.settings.residualUnexplainedThreshold,
          }
        );
        reconstruction = qcReconstructionFromResiduals(residuals);
      }
      qcSetRunStatus("Ranking samples with manual policy...");
      await qcYield();
      const fitQuality = mSigSDK.advisor.computeFitQualityEvidence(
        {
          signatures: qcState.signatures,
          spectra: qcState.spectra,
          exposures,
          burdenSummary: burden,
          reconstructionError: reconstruction,
          residuals,
        },
        {
          lowBurdenThreshold: qcState.settings.lowBurdenThreshold,
          moderateBurdenThreshold: qcState.settings.moderateBurdenThreshold,
          activeExposureThreshold: qcState.settings.exposureThreshold,
          manualPolicy: qcManualPolicyOptions(),
        }
      );
      qcSetRunStatus("Rendering cohort results...");
      await qcYield();
      qcRenderInputSummary();
      const analysis = {
        exposures,
        burden,
        reconstruction,
        residuals,
        fitQuality,
        burdenBySample: new Map(burden.samples.map((sample) => [sample.sample, sample])),
        reconstructionBySample: new Map(reconstruction.samples.map((sample) => [sample.sample, sample])),
        residualBySample: new Map(residuals.samples.map((sample) => [sample.sample, sample])),
        fitQualityBySample: new Map(fitQuality.samples.map((sample) => [sample.sample, sample])),
      };
      qcState.analysis = analysis;
      qcState.triageRows = Object.keys(qcState.spectra)
        .map((sample) => {
          const burdenSample = analysis.burdenBySample.get(sample) || {};
          const reconstructionSample = analysis.reconstructionBySample.get(sample) || {};
          const residualSample = analysis.residualBySample.get(sample) || {};
          const fitQualitySample = analysis.fitQualityBySample.get(sample) || {};
          const manualPolicy = fitQualitySample.manualPolicy || qcFallbackManualPolicy();
          const row = {
            sample,
            reportingMode: fitQualitySample.reportingMode || "standard_qc_passed",
            manualPolicy,
            policyStatus: manualPolicy.status,
            totalMutations: burdenSample.totalMutations ?? 0,
            burdenClass: burdenSample.burdenClass || "n/a",
            cosineSimilarity: reconstructionSample.cosineSimilarity ?? 0,
            rmse: reconstructionSample.rmse ?? null,
            residualUnexplained: residualSample.metrics?.relativeUnexplainedFraction ?? null,
            residualStructure: residualSample.residualStructure || null,
            catalogEvidence: fitQualitySample.componentEvidence?.catalog || null,
            sdkWarningCodes: fitQualitySample.reviewFlagCodes || [],
            warningCount: qcWarningRowsFor(sample).length,
          };
          row.triageScore = manualPolicy.score || 0;
          row.mainCue = manualPolicy.primaryCue || "No manual policy cue";
          row.policyFlags = manualPolicy.flags || [];
          return row;
        })
        .sort(
          (a, b) =>
            qcPolicyRank(b.policyStatus) - qcPolicyRank(a.policyStatus) ||
            b.triageScore - a.triageScore ||
            a.cosineSimilarity - b.cosineSimilarity ||
            (b.residualUnexplained || 0) - (a.residualUnexplained || 0) ||
            a.totalMutations - b.totalMutations
        );
      await qcRenderTriage();
      qcRenderCohortTable(qcState.flaggedOnly);
    }

    async function qcRenderTriage() {
      if (!qcState.analysis || !qcHosts.triageMetrics || !qcHosts.plots) return;
      const rows = qcState.triageRows;
      const flaggedRows = rows.filter((row) => row.policyStatus !== "pass");
      const priorityRows = rows.filter((row) => row.policyStatus === "priority");
      const reviewRows = rows.filter((row) => row.policyStatus === "review");
      const sortedCosines = qcState.analysis.reconstruction.samples
        .map((sample) => sample.cosineSimilarity)
        .filter(Number.isFinite)
        .sort((a, b) => a - b);
      const medianCosine = sortedCosines[Math.floor(sortedCosines.length / 2)] ?? null;
      qcHosts.triageMetrics.replaceChildren(metrics([
        { label: "Samples triaged", value: rows.length },
        { label: "Flagged samples", value: flaggedRows.length },
        { label: "Priority samples", value: priorityRows.length },
        { label: "Review samples", value: reviewRows.length },
        { label: "Median cosine", value: qcFormat(medianCosine, 3) },
        { label: "Top priority sample", value: rows[0]?.sample || "n/a" },
      ]));
      qcHosts.plots.replaceChildren();
      const plotGrid = qcElement("div", "qc-two-up");
      const burdenPanel = qcElement("section", "qc-panel");
      burdenPanel.append(qcElement("h3", "", "Mutation burden"));
      const burdenDiv = qcElement("div", "qc-plot-host");
      await mSigSDK.qcPlots.plotMutationBurdenSummary(burdenDiv, qcState.analysis.burden);
      burdenPanel.append(burdenDiv);
      const reconstructionPanel = qcElement("section", "qc-panel");
      reconstructionPanel.append(qcElement("h3", "", "Reconstruction quality"));
      const reconstructionDiv = qcElement("div", "qc-plot-host");
      await mSigSDK.qcPlots.plotReconstructionError(reconstructionDiv, qcState.analysis.reconstruction);
      reconstructionPanel.append(reconstructionDiv);
      plotGrid.append(burdenPanel, reconstructionPanel);
      qcHosts.plots.append(plotGrid);
      if (qcHosts.runStatus) qcHosts.runStatus.replaceChildren();
    }

    function qcRenderStatus(mode) {
      const status = qcElement("span", `qc-status ${qcStatusClass(mode)}`);
      status.textContent = qcStatusLabel(mode);
      return status;
    }

    function qcRenderCohortRows(rows) {
      const tableElement = qcElement("table", "qc-table");
      const caption = tableElement.createCaption();
      caption.textContent = "Ranked by manual policy status, score, reconstruction cosine, residual burden, and mutation count.";
      const thead = document.createElement("thead");
      const header = document.createElement("tr");
      [
        "Sample",
        "Policy",
        "Score",
        "Main cue",
        "Mutations",
        "Cosine",
        "Residual / threshold",
        "Policy flags",
      ].forEach((label) => {
        const th = document.createElement("th");
        th.textContent = label;
        header.append(th);
      });
      thead.append(header);
      tableElement.append(thead);

      const tbody = document.createElement("tbody");
      const maxScore = Math.max(1, ...qcState.triageRows.map((row) => row.triageScore));
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        const metadata = qcMetadataForSample(row.sample);
        const sampleCell = qcElement("div", "qc-sample-cell");
        sampleCell.append(qcElement("strong", "", row.sample));
        sampleCell.append(qcElement("small", "", [metadata.cancer, metadata.strategy].filter(Boolean).join(" / ") || row.burdenClass));
        const scoreTone = row.policyStatus === "priority" ? "concern" : row.policyStatus === "review" ? "warning" : "";
        const residualLabel = `${qcPercentPrecise(row.residualUnexplained, 1)} / ${qcPercentPrecise(qcState.settings.residualUnexplainedThreshold, 1)}`;
        tr.append(
          qcCell(sampleCell),
          qcCell(qcRenderPolicyStatus(row.policyStatus)),
          qcCell(qcMeterCell("Score", String(row.triageScore), (row.triageScore / maxScore) * 100, scoreTone)),
          qcCell(row.mainCue),
          qcCell(formatNumber(row.totalMutations)),
          qcCell(qcMeterCell("Cosine", qcFormat(row.cosineSimilarity, 3), row.cosineSimilarity * 100)),
          qcCell(qcMeterCell("Residual", residualLabel, (row.residualUnexplained / Math.max(qcState.settings.residualUnexplainedThreshold, 0.01)) * 70)),
          qcCell(qcRenderFlagList(row.policyFlags))
        );
        tbody.append(tr);
      });
      tableElement.append(tbody);
      return tableElement;
    }

    function qcRenderCohortTable(flaggedOnly = qcState.flaggedOnly) {
      if (!qcHosts.cohortTable) return;
      qcState.flaggedOnly = Boolean(flaggedOnly);
      if (qcFlagToggle) qcFlagToggle.checked = qcState.flaggedOnly;
      const rows = qcFilteredTriageRows();
      const visibleRows = qcDisplayedTriageRows(rows);
      if (qcHosts.tableCount) {
        const total = qcState.flaggedOnly
          ? qcState.triageRows.filter((row) => row.policyStatus !== "pass").length
          : qcState.triageRows.length;
        const filteredNote = qcState.tableSearch ? ` after search, ${total} before search` : "";
        qcHosts.tableCount.textContent = `Showing ${visibleRows.length} of ${rows.length}${filteredNote}`;
      }
      if (qcTableLimitSelect) qcTableLimitSelect.value = String(qcState.tableLimit);
      if (qcTableSearchInput && qcTableSearchInput.value !== qcState.tableSearch) {
        qcTableSearchInput.value = qcState.tableSearch;
      }
      if (!visibleRows.length) {
        const empty = qcElement("div", "qc-empty-state");
        empty.append(qcElement("strong", "", "No samples match this view."));
        empty.append(qcElement("span", "", "Clear the search, show all samples, or relax the manual flag rules."));
        qcHosts.cohortTable.replaceChildren(empty);
      } else {
        const frame = qcElement("div", "qc-table-frame");
        const scroller = qcElement("div", "qc-table-scroll");
        scroller.append(qcRenderCohortRows(visibleRows));
        frame.append(scroller);
        qcHosts.cohortTable.replaceChildren(frame);
      }
    }

    async function qcLoadDefaultDataset() {
      const dataset = await loadPublicSbs96Dataset(mSigSDK, {
        study: qcDefaultStudy,
        genomeDataType: qcDefaultGenomeDataType,
        cancerType: qcDefaultCancerType,
        mutationType: qcDefaultMutationType,
        matrixSize: qcDefaultMatrixSize,
        signatureSetName: qcDefaultSignatureSetName,
        sampleLimit: qcDefaultSampleLimit,
        signatureNames: qcDefaultSignatureNames,
        allowAlternate: true,
        allowDemoFallback: true,
      });
      const datasetSelection = dataset.selection || {};
      const allSignatures = dataset.allSignatures || dataset.signatures || {};
      const selectedSamples = dataset.sampleNames.filter((sample) => dataset.spectra[sample]);
      const availableDefaultSamples = [
        ...new Set(
          (dataset.optionRows || [])
            .filter((row) =>
              row.study === qcDefaultStudy &&
              row.strategy === qcDefaultGenomeDataType &&
              row.profile === qcDefaultMutationType &&
              Number(row.matrix) === Number(qcDefaultMatrixSize) &&
              row.cancer === qcDefaultCancerType
            )
            .map((row) => row.sample)
            .filter(Boolean)
        ),
      ];
      const spectra = Object.fromEntries(selectedSamples.map((sample) => [sample, dataset.spectra[sample]]));
      const requestedSignatureNames = Array.isArray(qcDefaultSignatureNames)
        ? qcDefaultSignatureNames.filter((signature) => allSignatures[signature])
        : [];
      const fallbackSignatureNames = (dataset.signatureNames || Object.keys(allSignatures))
        .filter((signature) => allSignatures[signature]);
      const signatureNames = requestedSignatureNames.length ? requestedSignatureNames : fallbackSignatureNames;
      const signatures = Object.fromEntries(signatureNames.map((signature) => [signature, allSignatures[signature]]));
      const metadataBySample = new Map((dataset.metadata || []).map((row) => [row.sample, row]));
      const datasetSource = dataset.status
        ? `${dataset.status}: ${dataset.source || "SBS96 dataset"}`
        : (dataset.source || "SBS96 dataset");
      qcSetDataset({
        spectra,
        signatures,
        metadata: selectedSamples.map((sample) => ({
          ...(metadataBySample.get(sample) || {}),
          sample,
          study: metadataBySample.get(sample)?.study || datasetSelection.study || qcDefaultStudy,
          cancer: metadataBySample.get(sample)?.cancer || datasetSelection.cancerType || qcDefaultCancerType,
          strategy: metadataBySample.get(sample)?.strategy || datasetSelection.genomeDataType || qcDefaultGenomeDataType,
          profile: metadataBySample.get(sample)?.profile || datasetSelection.mutationType || qcDefaultMutationType,
          matrix: metadataBySample.get(sample)?.matrix || datasetSelection.matrixSize || qcDefaultMatrixSize,
          source: metadataBySample.get(sample)?.source || dataset.source || "mSigPortal API",
        })),
        source: datasetSource,
        contexts: dataset.contexts || mSigSDK.validation.getExpectedContexts({ profile: "SBS", matrix: 96 }),
        publicSelection: {
          study: datasetSelection.study || qcDefaultStudy,
          cancer: datasetSelection.cancerType || qcDefaultCancerType,
          strategy: datasetSelection.genomeDataType || qcDefaultGenomeDataType,
          profile: datasetSelection.mutationType || qcDefaultMutationType,
          matrix: datasetSelection.matrixSize || qcDefaultMatrixSize,
          signatureSetName: datasetSelection.signatureSetName || qcDefaultSignatureSetName,
          requestedSampleLimit: datasetSelection.sampleLimit || qcDefaultSampleLimit,
          availableSampleCount: availableDefaultSamples.length || selectedSamples.length,
          loadedSampleCount: selectedSamples.length,
        },
      });
    }
  </script>

  <script type="text/markdown">
    ## Step 1. Load cohort

    Start with the default PCAWG Lung-AdenoCA example, choose another public mSigPortal cohort, or paste/upload your own spectra and signature catalog.
  </script>

  <script type="module" pinned id="2">
    const qcInputRoot = qcElement("div", "qc-shell");
    const qcWorkbenchHeader = qcElement("div", "qc-workbench-header");
    const qcLoadHeader = qcElement("section", "qc-header-panel");
    qcLoadHeader.append(qcElement("h3", "", "Cohort source"));
    qcLoadHeader.append(qcElement("p", "", "Load public spectra at cohort scale, or bring matching spectra and signatures from your own analysis."));
    const qcScaleHeader = qcElement("section", "qc-header-panel");
    qcScaleHeader.append(metrics([
      { label: "Default request", value: qcDefaultSampleLimit },
      { label: "Public load cap", value: qcPublicSampleLimitMax },
      { label: "Initial view", value: "Flagged ranking" },
    ]));
    qcWorkbenchHeader.append(qcLoadHeader, qcScaleHeader);
    const qcSourceTabs = qcElement("div", "qc-source-tabs");
    const qcPublicTab = qcButton("Public API");
    const qcOwnTab = qcButton("My cohort");
    qcSourceTabs.append(qcPublicTab, qcOwnTab);
    const qcPublicPanel = qcElement("section", "qc-panel");
    qcPublicPanel.append(qcElement("h3", "", "Public cohort"));
    qcPublicPanel.append(qcElement("p", "", "The loaded cohort is ready for review. Open the controls to switch datasets."));
    const qcPublicDetails = qcElement("details", "qc-source-details");
    qcPublicDetails.append(qcElement("summary", "", "Change public cohort"));

    const qcPublicOptions = {
      spectra: [],
      signatures: [],
      loaded: false,
    };
    const qcStudySelect = document.createElement("select");
    const qcCancerSelect = document.createElement("select");
    const qcStrategySelect = document.createElement("select");
    const qcProfileSelect = document.createElement("select");
    const qcMatrixSelect = document.createElement("select");
    const qcSignatureSetSelect = document.createElement("select");
    const qcMaxSamplesInput = document.createElement("input");
    qcMaxSamplesInput.type = "number";
    qcMaxSamplesInput.min = "1";
    qcMaxSamplesInput.max = String(qcPublicSampleLimitMax);
    qcMaxSamplesInput.step = "1";
    qcMaxSamplesInput.value = String(qcDefaultSampleLimit);
    const qcPublicStatus = qcPlaceholder("Loading public dataset options...");
    const qcRefreshPublic = qcButton("Refresh public menu");
    const qcLoadPublic = qcButton("Load selected public cohort", "primary");

    function qcSelectedPublicRows() {
      const matrix = Number(qcMatrixSelect.value);
      return qcPublicOptions.spectra.filter((row) =>
        row.study === qcStudySelect.value &&
        row.strategy === qcStrategySelect.value &&
        row.profile === qcProfileSelect.value &&
        Number(row.matrix) === matrix &&
        (qcCancerSelect.value === qcPancancerValue || row.cancer === qcCancerSelect.value)
      );
    }

    function qcPublicSampleOptions() {
      const bySample = new Map();
      for (const row of qcSelectedPublicRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

    function qcUpdatePublicStatus() {
      const samples = qcPublicSampleOptions();
      const requested = Math.max(1, Math.min(qcPublicSampleLimitMax, Math.round(qcParseNumber(qcMaxSamplesInput.value, qcDefaultSampleLimit))));
      const willLoad = Math.min(requested, samples.length);
      const availabilityNote = requested > samples.length && samples.length
        ? ` Only ${samples.length} are available for this exact study/cancer/profile/matrix selection.`
        : "";
      qcPublicStatus.textContent = qcPublicOptions.loaded
        ? `${samples.length} public samples match this selection. Requested max ${requested}; loading will fetch ${willLoad}.${availabilityNote}`
        : "Public API menu has not loaded yet.";
    }

    function qcPopulateSignatureSets({ strategy, profile, matrix, preferred = qcDefaultSignatureSetName }) {
      const exactRows = qcPublicOptions.signatures.filter((row) =>
        row.strategy === strategy &&
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const fallbackRows = qcPublicOptions.signatures.filter((row) =>
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const rows = exactRows.length ? exactRows : fallbackRows;
      qcSetSelectOptions(qcSignatureSetSelect, qcUniqueSorted(rows.map((row) => row.signatureSetName)), preferred);
    }

    function qcPopulatePublicMenus(preferred = {}) {
      const current = {
        study: qcStudySelect.value || preferred.study || qcDefaultStudy,
        strategy: qcStrategySelect.value || preferred.strategy || qcDefaultGenomeDataType,
        profile: qcProfileSelect.value || preferred.profile || qcDefaultMutationType,
        matrix: qcMatrixSelect.value || preferred.matrix || String(qcDefaultMatrixSize),
        cancer: qcCancerSelect.value || preferred.cancer || qcDefaultCancerType,
        signatureSetName: qcSignatureSetSelect.value || preferred.signatureSetName || qcDefaultSignatureSetName,
      };
      const study = qcSetSelectOptions(qcStudySelect, qcUniqueSorted(qcPublicOptions.spectra.map((row) => row.study)), current.study);
      const studyRows = qcPublicOptions.spectra.filter((row) => row.study === study);
      const strategy = qcSetSelectOptions(qcStrategySelect, qcUniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
      const strategyRows = studyRows.filter((row) => row.strategy === strategy);
      const profile = qcSetSelectOptions(qcProfileSelect, qcUniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
      const profileRows = strategyRows.filter((row) => row.profile === profile);
      const matrix = qcSetSelectOptions(qcMatrixSelect, qcUniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
      const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
      const cancerItems = qcUniqueSorted(matrixRows.map((row) => row.cancer)).map((value) => ({ label: value, value }));
      if (study === "PCAWG" || study === "TCGA") {
        cancerItems.unshift({ label: "PanCancer (all cancer types)", value: qcPancancerValue });
      }
      qcSetSelectOptions(qcCancerSelect, cancerItems, current.cancer);
      qcPopulateSignatureSets({ strategy, profile, matrix, preferred: current.signatureSetName });
      qcUpdatePublicStatus();
    }

    async function qcLoadPublicMenus() {
      qcPublicStatus.textContent = "Loading public dataset options from mSigPortal APIs...";
      qcRefreshPublic.disabled = true;
      qcLoadPublic.disabled = true;
      try {
        const [spectraOptions, signatureOptions] = await Promise.all([
          qcFetchPublicApiRows("mutational_spectrum_options"),
          qcFetchPublicApiRows("mutational_signature_options", { source: "Reference_signatures" }),
        ]);
        qcPublicOptions.spectra = spectraOptions;
        qcPublicOptions.signatures = signatureOptions;
        qcPublicOptions.loaded = true;
        qcPopulatePublicMenus({
          study: qcDefaultStudy,
          strategy: qcDefaultGenomeDataType,
          profile: qcDefaultMutationType,
          matrix: qcDefaultMatrixSize,
          cancer: qcDefaultCancerType,
          signatureSetName: qcDefaultSignatureSetName,
        });
      } catch (error) {
        qcPublicStatus.textContent = `Public menu failed: ${error.message}`;
      } finally {
        qcRefreshPublic.disabled = false;
        qcLoadPublic.disabled = false;
      }
    }

    async function qcLoadSelectedPublicDataset() {
      if (!qcPublicOptions.loaded) await qcLoadPublicMenus();
      const requestedSamples = Math.max(1, Math.min(qcPublicSampleLimitMax, Math.round(qcParseNumber(qcMaxSamplesInput.value, qcDefaultSampleLimit))));
      qcMaxSamplesInput.value = String(requestedSamples);
      const availableSamples = qcPublicSampleOptions();
      const selectedSamples = availableSamples.slice(0, requestedSamples);
      if (!selectedSamples.length) throw new Error("No public samples match the selected menu values.");
      const selection = {
        study: qcStudySelect.value,
        cancer: qcCancerSelect.value === qcPancancerValue ? "PanCancer" : qcCancerSelect.value,
        strategy: qcStrategySelect.value,
        profile: qcProfileSelect.value,
        matrix: Number(qcMatrixSelect.value),
        signatureSetName: qcSignatureSetSelect.value,
      };
      if (!selection.signatureSetName) {
        throw new Error("No compatible reference signature set is available for this profile and matrix size.");
      }
      qcPublicStatus.textContent = `Fetching ${selectedSamples.length} of ${availableSamples.length} available public spectra in batches of ${qcPublicFetchBatchSize}...`;
      qcHosts.inputSummary.replaceChildren(qcPlaceholder(`Fetching ${selectedSamples.length} public spectra...`));
      const sampleGroups = new Map();
      selectedSamples.forEach((sample) => {
        const key = [sample.study, sample.cancer, sample.strategy, sample.profile, sample.matrix].join("||");
        if (!sampleGroups.has(key)) {
          sampleGroups.set(key, {
            study: sample.study,
            cancer: sample.cancer,
            strategy: sample.strategy,
            profile: sample.profile,
            matrix: sample.matrix,
            samples: [],
          });
        }
        sampleGroups.get(key).samples.push(sample.sample);
      });
      const spectrumRows = [];
      let fetchedSamples = 0;
      for (const group of sampleGroups.values()) {
        for (const batch of qcChunks(group.samples, qcPublicFetchBatchSize)) {
          const rawRows = await mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
            group.study,
            batch,
            group.strategy,
            group.cancer,
            group.profile,
            group.matrix
          );
          spectrumRows.push(...(Array.isArray(rawRows) ? rawRows.flat() : []));
          fetchedSamples += batch.length;
          qcHosts.inputSummary.replaceChildren(qcPlaceholder(`Fetched ${fetchedSamples}/${selectedSamples.length} public spectra...`));
          await qcYield();
        }
      }
      qcHosts.inputSummary.replaceChildren(qcPlaceholder("Fetching reference signatures..."));
      await qcYield();
      const signatureRows = await mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
        selection.strategy,
        selection.signatureSetName,
        selection.profile,
        selection.matrix,
        100000
      );
      const spectra = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(spectrumRows);
      const signatures = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(signatureRows, "signatureName");
      const loadedSampleNames = selectedSamples.map((sample) => sample.sample).filter((sample) => spectra[sample]);
      const loadedSampleSet = new Set(loadedSampleNames);
      const metadata = selectedSamples.filter((sample) => loadedSampleSet.has(sample.sample)).map((sample) => ({
        sample: sample.sample,
        study: sample.study,
        cancer: sample.cancer,
        strategy: sample.strategy,
        profile: sample.profile,
        matrix: sample.matrix,
        source: "mSigPortal API",
      }));
      const selectedSpectra = Object.fromEntries(loadedSampleNames.map((sample) => [sample, spectra[sample]]));
      qcSetDataset({
        spectra: selectedSpectra,
        signatures,
        metadata,
        source: `mSigPortal public API: ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix} (${loadedSampleNames.length}/${availableSamples.length} available samples)`,
        contexts: qcInferContexts(selectedSpectra, signatures),
        publicSelection: {
          ...selection,
          requestedSampleLimit: requestedSamples,
          availableSampleCount: availableSamples.length,
          loadedSampleCount: loadedSampleNames.length,
        },
      });
      qcPublicStatus.textContent = `Loaded ${loadedSampleNames.length} samples. Requested max ${requestedSamples}; ${availableSamples.length} are available for this selection.`;
      await qcRunTriage();
    }

    [qcStudySelect, qcCancerSelect, qcStrategySelect, qcProfileSelect, qcMatrixSelect, qcSignatureSetSelect].forEach((select) => {
      select.addEventListener("change", () => {
        if (select !== qcCancerSelect && select !== qcSignatureSetSelect) qcPopulatePublicMenus();
        qcUpdatePublicStatus();
      });
    });
    qcMaxSamplesInput.addEventListener("input", qcUpdatePublicStatus);
    qcRefreshPublic.addEventListener("click", () => void qcLoadPublicMenus());
    qcLoadPublic.addEventListener("click", async () => {
      qcLoadPublic.disabled = true;
      qcLoadPublic.textContent = "Loading...";
      try {
        await qcLoadSelectedPublicDataset();
      } catch (error) {
        qcHosts.inputSummary.replaceChildren(qcElement("pre", "qc-error", error.stack || error.message));
      } finally {
        qcLoadPublic.disabled = false;
        qcLoadPublic.textContent = "Load selected public cohort";
      }
    });

    const qcPublicGrid = qcElement("div", "qc-input-grid");
    qcPublicGrid.append(
      qcField("Study", qcStudySelect),
      qcField("Cancer type", qcCancerSelect),
      qcField("Strategy", qcStrategySelect),
      qcField("Profile", qcProfileSelect),
      qcField("Matrix size", qcMatrixSelect),
      qcField("Signature set", qcSignatureSetSelect),
      qcField("Max samples", qcMaxSamplesInput, `Upper bound for loading; the final count is capped by samples available for the selected cohort.`)
    );
    const qcPublicButtons = qcElement("div", "qc-button-row");
    qcPublicButtons.append(qcLoadPublic, qcRefreshPublic);
    qcPublicDetails.append(qcPublicGrid, qcPublicButtons, qcPublicStatus);
    qcPublicPanel.append(qcPublicDetails);

    const qcOwnPanel = qcElement("section", "qc-panel");
    qcOwnPanel.append(qcElement("h3", "", "Local cohort"));
    qcOwnPanel.append(qcElement("p", "", "Paste or upload spectra and matching signatures."));
    const qcSpectraText = document.createElement("textarea");
    qcSpectraText.placeholder = "Paste spectra JSON or SigProfiler-style MutationType-by-sample TSV";
    const qcSignaturesText = document.createElement("textarea");
    qcSignaturesText.placeholder = "Paste signature JSON or COSMIC-style MutationType-by-signature TSV";
    const qcMetadataText = document.createElement("textarea");
    qcMetadataText.placeholder = "Optional sample metadata JSON, CSV, or TSV";
    const qcApplyOwn = qcButton("Apply my cohort", "primary");
    const qcUseDefault = qcButton("Reload default example");
    qcApplyOwn.addEventListener("click", async () => {
      try {
        const spectra = qcParseMatrix(qcSpectraText.value, "spectra");
        const signatures = qcParseMatrix(qcSignaturesText.value, "signatures");
        qcSetDataset({
          spectra,
          signatures,
          metadata: qcParseMetadata(qcMetadataText.value),
          source: "user supplied browser input",
          contexts: qcInferContexts(spectra, signatures),
          publicSelection: null,
        });
        await qcRunTriage();
      } catch (error) {
        qcHosts.inputSummary.replaceChildren(qcElement("pre", "qc-error", error.stack || error.message));
      }
    });
    qcUseDefault.addEventListener("click", async () => {
      try {
        await qcLoadDefaultDataset();
        await qcRunTriage();
      } catch (error) {
        qcHosts.inputSummary.replaceChildren(qcElement("pre", "qc-error", error.stack || error.message));
      }
    });
    const qcOwnGrid = qcElement("div", "qc-input-grid");
    qcOwnGrid.append(
      qcField("Spectra", qcSpectraText, "JSON or SigProfiler-style TSV/CSV."),
      qcField("Signatures", qcSignaturesText, "JSON or COSMIC-style TSV/CSV."),
      qcField("Metadata", qcMetadataText, "Optional sample details."),
      qcField("Upload spectra", qcFileInput(qcSpectraText)),
      qcField("Upload signatures", qcFileInput(qcSignaturesText)),
      qcField("Upload metadata", qcFileInput(qcMetadataText))
    );
    const qcOwnButtons = qcElement("div", "qc-button-row");
    qcOwnButtons.append(qcApplyOwn, qcUseDefault);
    qcOwnPanel.append(qcOwnGrid, qcOwnButtons);

    function qcSetSourceTab(source) {
      const isPublic = source === "public";
      qcPublicPanel.hidden = !isPublic;
      qcOwnPanel.hidden = isPublic;
      qcPublicTab.setAttribute("aria-pressed", String(isPublic));
      qcOwnTab.setAttribute("aria-pressed", String(!isPublic));
    }

    qcPublicTab.addEventListener("click", () => qcSetSourceTab("public"));
    qcOwnTab.addEventListener("click", () => qcSetSourceTab("own"));
    qcSetSourceTab("public");

    qcHosts.inputSummary = qcElement("div");
    qcInputRoot.append(qcSourceTabs, qcPublicPanel, qcOwnPanel, qcHosts.inputSummary);
    display(qcInputRoot);

    await qcLoadDefaultDataset();
    qcRenderInputSummary();
    void qcLoadPublicMenus();
  </script>

  <script type="text/markdown">
    ## Step 2. Triage cohort

    Smart defaults adapt to the loaded cohort. Switch to manual flags when your assay, study design, or reporting policy needs different review cutoffs.
  </script>

  <script type="module" pinned id="3">
    const qcTriageRoot = qcElement("div", "qc-layout");
    const qcSettingsPanel = qcElement("details", "qc-panel qc-collapsible");
    qcSettingsPanel.append(qcElement("summary", "qc-panel-summary", "QC flag settings"));
    qcHosts.settingsSummary = qcElement("div", "qc-settings-summary");

    qcSettingControls.exposureThreshold = qcNumberInput(qcState.settings.exposureThreshold, { min: 0, max: 0.5, step: 0.001 });
    qcSettingControls.lowBurdenThreshold = qcNumberInput(qcState.settings.lowBurdenThreshold, { min: 0, step: 1 });
    qcSettingControls.moderateBurdenThreshold = qcNumberInput(qcState.settings.moderateBurdenThreshold, { min: 0, step: 1 });
    qcSettingControls.reconstructionCosineThreshold = qcNumberInput(qcState.settings.reconstructionCosineThreshold, { min: 0, max: 1, step: 0.001 });
    qcSettingControls.residualUnexplainedThreshold = qcNumberInput(qcState.settings.residualUnexplainedThreshold, { min: 0, max: 1, step: 0.001 });
    qcSettingControls.residualStructureCosineThreshold = qcNumberInput(qcState.settings.residualStructureCosineThreshold, { min: 0, max: 1, step: 0.001 });
    qcSettingControls.minBurdenForResidualStructure = qcNumberInput(qcState.settings.minBurdenForResidualStructure, { min: 0, step: 1 });

    qcSettingControls.lowBurden = document.createElement("input");
    qcSettingControls.lowBurden.type = "checkbox";
    qcSettingControls.reconstruction = document.createElement("input");
    qcSettingControls.reconstruction.type = "checkbox";
    qcSettingControls.residualUnexplained = document.createElement("input");
    qcSettingControls.residualUnexplained.type = "checkbox";
    qcSettingControls.structuredResidual = document.createElement("input");
    qcSettingControls.structuredResidual.type = "checkbox";

    const qcThresholdGrid = qcElement("div", "qc-settings-grid");
    qcThresholdGrid.append(
      qcField("Minimum contribution", qcSettingControls.exposureThreshold, "Fit contributions below this fraction are dropped before QC."),
      qcField("Low-burden cutoff", qcSettingControls.lowBurdenThreshold, "Flag samples below this mutation count."),
      qcField("Moderate-burden reference", qcSettingControls.moderateBurdenThreshold, "Used by burden classes and review context."),
      qcField("Flag cosine below", qcSettingControls.reconstructionCosineThreshold, "Flag weak reconstruction."),
      qcField("Flag residual above", qcSettingControls.residualUnexplainedThreshold, "Fraction of unexplained spectrum."),
      qcField("Structured residual cosine", qcSettingControls.residualStructureCosineThreshold, "Nearest positive-residual catalog cosine needed for priority status."),
      qcField("Structured residual min burden", qcSettingControls.minBurdenForResidualStructure, "Minimum mutation count for structured-residual priority flags.")
    );

    const qcRuleGrid = qcElement("div", "qc-settings-grid");
    qcRuleGrid.append(
      qcCheckField("Flag low burden", qcSettingControls.lowBurden, "Uses the low-burden mutation cutoff."),
      qcCheckField("Flag low reconstruction", qcSettingControls.reconstruction, "Uses the reconstruction cosine cutoff."),
      qcCheckField("Flag high unexplained residual", qcSettingControls.residualUnexplained, "Review cue based on unexplained residual fraction."),
      qcCheckField("Flag structured residual", qcSettingControls.structuredResidual, "Priority cue based on residual fraction, residual structure, and mutation burden.")
    );

    const qcSettingsActions = qcElement("div", "qc-button-row");
    const qcApplySettings = qcButton("Apply manual flags", "primary");
    const qcUseSmartSettings = qcButton("Use smart defaults");
    qcApplySettings.addEventListener("click", async () => {
      qcState.settingsMode = "manual";
      qcReadManualSettingsFromControls();
      qcSyncSettingControls();
      await qcRunTriage();
    });
    qcUseSmartSettings.addEventListener("click", async () => {
      qcState.settingsMode = "smart";
      await qcRunTriage();
    });
    qcSettingsActions.append(qcApplySettings, qcUseSmartSettings);
    qcSettingsPanel.append(qcHosts.settingsSummary, qcThresholdGrid, qcRuleGrid, qcSettingsActions);
    qcSyncSettingControls();

    qcHosts.runStatus = qcElement("div");
    qcHosts.triageMetrics = qcElement("div");
    qcHosts.plots = qcElement("div");
    qcTriageRoot.append(qcSettingsPanel, qcHosts.runStatus, qcHosts.triageMetrics, qcHosts.plots);
    display(qcTriageRoot);
    await qcRunTriage();
  </script>

  <script type="text/markdown">
    ## Step 3. Review ranked samples

    Use the ranked cohort table to identify samples that need manual review, caveats, or rerun decisions. The table keeps the decision drivers in one place: policy status, primary cue, mutation burden, reconstruction cosine, residual fraction, and enabled policy flags.
  </script>

  <script type="module" pinned id="4">
    const qcInspector = qcElement("section", "qc-panel");
    qcInspector.append(qcElement("h3", "", "Cohort ranking"));
    const qcControls = qcElement("div", "qc-toolbar");
    const qcToolbarLeft = qcElement("div", "qc-toolbar-group");
    const qcToolbarRight = qcElement("div", "qc-toolbar-group");

    qcTableSearchInput = document.createElement("input");
    qcTableSearchInput.type = "search";
    qcTableSearchInput.placeholder = "Sample, cue, status, cancer";
    qcTableSearchInput.value = qcState.tableSearch;
    qcTableSearchInput.addEventListener("input", () => {
      qcState.tableSearch = qcTableSearchInput.value;
      qcRenderCohortTable(qcState.flaggedOnly);
    });

    qcTableLimitSelect = document.createElement("select");
    qcSetSelectOptions(qcTableLimitSelect, [
      { label: "25 rows", value: "25" },
      { label: "50 rows", value: "50" },
      { label: "100 rows", value: "100" },
      { label: "All rows", value: "all" },
    ], String(qcState.tableLimit));
    qcTableLimitSelect.addEventListener("change", () => {
      qcState.tableLimit = qcTableLimitSelect.value === "all" ? "all" : Number(qcTableLimitSelect.value);
      qcRenderCohortTable(qcState.flaggedOnly);
    });

    const qcFlagLabel = qcElement("label", "qc-switch");
    qcFlagToggle = document.createElement("input");
    qcFlagToggle.type = "checkbox";
    qcFlagToggle.setAttribute("aria-label", "Flagged only");
    qcFlagToggle.checked = qcState.flaggedOnly;
    qcFlagToggle.addEventListener("change", () => {
      qcRenderCohortTable(qcFlagToggle.checked);
    });
    qcFlagLabel.append(qcFlagToggle, document.createTextNode("Flagged only"));

    qcHosts.tableCount = qcElement("div", "qc-count-note");
    const qcSearchField = qcField("Search table", qcTableSearchInput);
    qcSearchField.classList.add("qc-search-field");
    qcToolbarLeft.append(qcSearchField, qcField("Show", qcTableLimitSelect), qcFlagLabel);
    qcToolbarRight.append(qcHosts.tableCount);
    qcControls.append(qcToolbarLeft, qcToolbarRight);
    qcHosts.cohortTable = qcElement("div");
    qcInspector.append(qcControls, qcHosts.cohortTable);
    display(qcInspector);
    qcRenderCohortTable(qcState.flaggedOnly);
  </script>
