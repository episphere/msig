  <title>mSigSDK known-signature quality check</title>

  <script type="text/markdown">
    # Known-signature quality check

    Use this notebook first if you are new to mSigSDK. It demonstrates the complete known-signature fitting workflow: import the SDK, define an SBS96 analysis, load count-scale public spectra and COSMIC reference signatures, reshape the API rows into SDK tables, check inputs, estimate signature contributions, and inspect quality-check plots.

    The story is intentionally sequential. A researcher chooses an analysis profile, checks the table, reviews mutation counts, fits signatures, inspects reconstruction and residuals, then packages the same logic as a reusable workflow result. To reuse the pattern with your own data, replace the mSigPortal loading block and keep the input-check and quality-check sections intact.
  </script>

  <script type="module" pinned id="1">
    const qcSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-qc", location.href).href;
    const { mSigSDK } = await import(qcSdkUrl);
    const {
      demoSignatures,
      demoSpectra,
    } = await import("./msig-notebook-fixtures.js");
    const {
      burdenSampleRows,
      details,
      exposureRows,
      fitQualityEvidenceTable,
      formatNumber,
      metrics,
      reconstructionRows,
      table,
      tooltipTable,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Import target", value: "../main.js" },
      { label: "Workflow", value: "Known signatures" },
    ]));
    display(table(
      [
        { namespace: "mSigPortal", role: "Fetch public example spectra and signatures" },
        { namespace: "validation", role: "Check table shape and missing contexts" },
        { namespace: "signatureFitting", role: "Estimate relative signature contributions" },
        { namespace: "qc", role: "Create burden, reconstruction, and residual objects" },
        { namespace: "qcPlots", role: "Render quality-check figures for reports and notebooks" },
        { namespace: "presentation", role: "Create reusable metrics, tables, and object summaries" },
      ],
      [
        { key: "namespace", label: "SDK namespace" },
        { key: "role", label: "Used here for" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 1. Choose the profile, example data, and fitting settings

    The first analysis decision is the mutation table. Here we use SBS96, so `getExpectedContexts` returns the 96 trinucleotide contexts used to check spectra and signatures. The mSigPortal calls fetch specific PCAWG WGS Lung-AdenoCA samples with real mutation counts, including high-count and low-count examples so the review cues are visible. In your own project, replace `qcExampleSampleNames` with your local sample IDs or replace the fetch with your own spectra object.

    Edit `qcSampleLimit`, `qcMutationBurdenThreshold`, or `qcPreferredSignatureNames` to see how the analysis changes. In a real project, these settings should come from the assay design, expected mutation count, and the reference catalog being tested.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 1, phase: "data", title: "Step 1. Choose the profile, example data, and fitting settings", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const qcContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const qcStudy = "PCAWG";
    const qcGenomeDataType = "WGS";
    const qcCancerType = "Lung-AdenoCA";
    const qcMutationType = "SBS";
    const qcMatrixSize = 96;
    const qcSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const qcExampleSampleNames = [
      "SP53810",
      "SP55142",
      "SP55235",
      "SP54113",
      "SP50611",
      "SP50592",
      "SP50406",
      "SP55004",
    ];
    const qcSampleLimit = qcExampleSampleNames.length;
    const qcMutationBurdenThreshold = 5000;
    const qcExposureThreshold = 0.01;
    const qcPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    let qcDataSourceStatus = "live mSigPortal";
    let qcAllGroupedSpectra;
    let qcAllReferenceSignatures;
    try {
      const [qcRawSpectrumRows, qcRawSignatureRows] = await Promise.all([
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          qcStudy,
          qcExampleSampleNames,
          qcGenomeDataType,
          qcCancerType,
          qcMutationType,
          qcMatrixSize
        ),
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          qcGenomeDataType,
          qcSignatureSetName,
          qcMutationType,
          qcMatrixSize,
          10000
        ),
      ]);
      const qcSpectrumRows = Array.isArray(qcRawSpectrumRows)
        ? qcRawSpectrumRows.flat()
        : [];
      const qcSignatureRows = Array.isArray(qcRawSignatureRows)
        ? qcRawSignatureRows.flat()
        : [];
      qcAllGroupedSpectra =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(qcSpectrumRows);
      qcAllReferenceSignatures =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
          qcSignatureRows,
          "signatureName"
        );
      if (Object.keys(qcAllGroupedSpectra).length < 2 || Object.keys(qcAllReferenceSignatures).length < 3) {
        throw new Error("mSigPortal returned too few tables for quality-check review.");
      }
    } catch (error) {
      qcDataSourceStatus = `embedded fallback: ${error.message}`;
      qcAllGroupedSpectra = demoSpectra();
      qcAllReferenceSignatures = demoSignatures();
    }

    const qcAllBurden = mSigSDK.qc.summarizeMutationBurden(qcAllGroupedSpectra, {
      expectedContexts: qcContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: qcMutationBurdenThreshold,
    });
    const qcSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      qcAllBurden,
      {
        sampleNames: qcExampleSampleNames.filter((sample) => qcAllGroupedSpectra[sample]).length
          ? qcExampleSampleNames.filter((sample) => qcAllGroupedSpectra[sample])
          : Object.keys(qcAllGroupedSpectra),
        minTotalMutations: 1,
        limit: qcSampleLimit,
      }
    );
    const qcSelectedSampleNames = qcSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const qcGroupedSpectra = Object.fromEntries(
      qcSelectedSampleNames.map((sample) => [sample, qcAllGroupedSpectra[sample]])
    );

    const qcAvailablePreferredSignatures = qcPreferredSignatureNames.filter(
      (signature) => qcAllReferenceSignatures[signature]
    );
    const qcSelectedSignatureNames =
      qcAvailablePreferredSignatures.length > 0
        ? qcAvailablePreferredSignatures
        : Object.keys(qcAllReferenceSignatures).slice(0, 8);
    const qcReferenceSignatures = Object.fromEntries(
      qcSelectedSignatureNames.map((signature) => [
        signature,
        qcAllReferenceSignatures[signature],
      ])
    );

    display(metrics([
      { label: "Data source", value: qcDataSourceStatus },
      { label: "Study", value: qcStudy },
      { label: "Cancer type", value: qcCancerType },
      { label: "Samples selected", value: qcSelectedSampleNames.length },
      { label: "Reference signatures", value: qcSelectedSignatureNames.length },
      { label: "Mutation-count cutoff", value: qcMutationBurdenThreshold },
      {
        label: "Low mutation-count samples",
        value: qcSelectedBurdenSamples.filter(
          (sample) => sample.totalMutations < qcMutationBurdenThreshold
        ).length,
      },
      { label: "Minimum signature contribution", value: qcExposureThreshold },
    ]));
    display(table(
      burdenSampleRows(qcAllBurden, qcSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low mutation-count review cue" },
      ],
      { maxRows: 8 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Check inputs, fit, and build review objects

    Input checking is not optional boilerplate. It confirms that spectra and signatures share the expected contexts before fitting. The fitting call estimates relative signature contributions, and the quality-check functions return plain result objects that can be inspected, saved, or passed into plotting functions.

    If validation fails, interpretation stops here. A fit produced from mismatched contexts can look numerical and still be biologically meaningless.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 2, phase: "analysis", title: "Step 2. Check inputs, fit, and build review objects", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const qcSpectraValidation = mSigSDK.validation.validateSpectra(
      qcGroupedSpectra,
      {
        expectedContexts: qcContexts,
        minTotalMutations: qcMutationBurdenThreshold,
      }
    );
    const qcSignatureValidation = mSigSDK.validation.validateSignatureMatrix(
      qcReferenceSignatures,
      { expectedContexts: qcContexts }
    );
    const qcExposures = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
      qcReferenceSignatures,
      qcGroupedSpectra,
      {
        exposureThreshold: qcExposureThreshold,
        exposureType: "relative",
        renormalize: true,
      }
    );
    const qcBurden = mSigSDK.qc.summarizeMutationBurden(qcGroupedSpectra, {
      expectedContexts: qcContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: qcMutationBurdenThreshold,
    });
    const qcReconstruction = mSigSDK.qc.calculateReconstructionError(
      qcReferenceSignatures,
      qcGroupedSpectra,
      qcExposures,
      { contexts: qcContexts }
    );
    const qcResiduals = mSigSDK.qc.calculateFitResiduals(
      qcReferenceSignatures,
      qcGroupedSpectra,
      qcExposures,
      { contexts: qcContexts }
    );
    const qcResidualSample =
      qcReconstruction.samples
        .slice()
        .sort((a, b) => a.cosineSimilarity - b.cosineSimilarity)[0]?.sample ||
      qcSelectedSampleNames[0];

    const qcExposureRows = exposureRows(qcExposures, {
      minExposure: 0,
      topN: 10,
    });

    display(metrics([
      { label: "Spectra validation", value: qcSpectraValidation.valid ? "Pass" : "Review" },
      { label: "Signature validation", value: qcSignatureValidation.valid ? "Pass" : "Review" },
      { label: "Total mutations", value: formatNumber(qcBurden.overall.totalMutations) },
      { label: "Residual sample", value: qcResidualSample },
    ]));
    display(table(
      reconstructionRows(qcReconstruction),
      [
        { key: "sample", label: "Sample" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
        { key: "rmse", label: "RMSE" },
        { key: "normalizationMode", label: "Residual scale" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      qcExposureRows,
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "exposure", label: "Relative exposure" },
      ],
      { maxRows: 10 }
    ));
    display(details("Validation and reconstruction objects", {
      spectraValidation: qcSpectraValidation,
      signatureValidation: qcSignatureValidation,
      reconstruction: qcReconstruction,
    }));
  </script>

  <script type="text/markdown">
    ## Step 3. Check mutation counts

    Mutation count affects how much information is available for fitting. Samples below the cutoff marker should be interpreted cautiously, especially for weak or rare signatures. In your own workflow, set this cutoff from your study design or assay characteristics rather than treating this example value as universal.

    A low-count warning does not always require removing a sample. It does require that downstream signature contribution estimates be reported with more caution.
  </script>

    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 3, phase: "visualize", title: "Step 3. Check mutation counts", mSigSDK, display });

  <script type="text/markdown">
    ## Step 4. Inspect reconstruction quality

    Cosine similarity measures profile-shape agreement; RMSE measures residual magnitude on the relative-profile scale used for fitting. Inspect both because a fit can have good shape agreement while still leaving systematic residuals in specific mutation contexts. Use the mutation-count table above for count totals.

    This is the main checkpoint before reading signature contribution values as evidence. A poor reconstruction usually means the catalog is incomplete, the sample is noisy, or the table needs additional review.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 4, phase: "review", title: "Step 4. Inspect reconstruction quality", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    const qcReconstructionDiv = document.createElement("div");
    qcReconstructionDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotReconstructionError(
      qcReconstructionDiv,
      qcReconstruction
    );
    display(qcReconstructionDiv);
  </script>

  <script type="text/markdown">
    ## Step 5. Inspect residual spectra

    Residual plots show where the fitted signature mixture does not reconstruct the observed spectrum. Positive residuals are underfit contexts; negative residuals are overfit contexts. This is often where you identify missing reference signatures, context-specific technical effects, or samples that need a different analysis strategy.

    Read residuals as diagnostic evidence, not as a decorative plot. Repeated residual structure across samples may point to a missing signature or a systematic preprocessing issue.
  </script>

  <script type="module" pinned id="interactive-step-5">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 5, phase: "visualize", title: "Step 5. Inspect residual spectra", mSigSDK, display });
  </script>

  <script type="module" pinned id="6">
    const qcResidualDiv = document.createElement("div");
    qcResidualDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotFitResiduals(

  <script type="text/markdown">
    ## Step 6. Package the same fit as a workflow result

    The lower-level cells above teach each review step. The high-level workflow returns the same analysis as a reviewable bundle with warnings, suggested review steps, fit-quality evidence, figure descriptors, report fields, and exports.

    The workflow result is the object to give an application or report generator because it keeps the signature contribution estimates connected to the evidence that qualifies them.
  </script>

  <script type="module" pinned id="interactive-step-6">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "qc-walkthrough", step: 6, phase: "analysis", title: "Step 6. Package the same fit as a workflow result", mSigSDK, display });
  </script>

  <script type="module" pinned id="7">
    const qcWorkflowAnalysis = await mSigSDK.workflows.runCohortFit(
      {
        spectra: qcGroupedSpectra,
        signatures: qcReferenceSignatures,
      },
      {
        contexts: qcContexts,
        exposureThreshold: qcExposureThreshold,
        lowBurdenThreshold: qcMutationBurdenThreshold,
        thresholds: [0, 0.01, 0.03, 0.05],
        runBootstrap: false,
        runThresholdSensitivity: true,
        runSubgroupDiscovery: false,
        reportFormat: "object",
      }
    );
    display(metrics([
      { label: "Workflow warnings", value: qcWorkflowAnalysis.warnings.length },
      { label: "Recommended actions", value: qcWorkflowAnalysis.recommendedActions.length },
      { label: "Figure descriptors", value: qcWorkflowAnalysis.publicationFigures.length },
      { label: "Report fields", value: Object.keys(qcWorkflowAnalysis.report || {}).length },
    ]));
    display(fitQualityEvidenceTable(qcWorkflowAnalysis.fitQualityEvidence, { maxRows: 8 }));
    display(tooltipTable(
      warningRows(qcWorkflowAnalysis.warnings),
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      publicationFigureRows(qcWorkflowAnalysis.publicationFigures),
      [
        { key: "id", label: "Figure id" },
        { key: "title", label: "Figure title" },
        { key: "renderer", label: "Renderer" },
        { key: "dataFields", label: "Required fields" },
      ],
      { maxRows: 8 }
    ));
    display(downloadMany([
      {
        filename: "known_signature_qc_spectra.tsv",
        text: spectraMatrixToTsv(qcGroupedSpectra, qcContexts),
        label: "Download spectra TSV",
      },
      {
        filename: "known_signature_qc_exposures.csv",
        text: rowsToCsv(qcExposureRows),
        label: "Download signature contributions CSV",
      },
      {
        filename: "known_signature_qc_report.json",
        type: "json",
        value: {
          dataSourceStatus: qcDataSourceStatus,
          validation: qcWorkflowAnalysis.validation,
          qc: qcWorkflowAnalysis.qc,
          warnings: qcWorkflowAnalysis.warnings,
          recommendedActions: qcWorkflowAnalysis.recommendedActions,
          publicationFigures: qcWorkflowAnalysis.publicationFigures,
          fitQualityEvidence: qcWorkflowAnalysis.fitQualityEvidence,
          report: qcWorkflowAnalysis.report,
        },
        label: "Download report JSON",
      },
    ]));
  </script>
