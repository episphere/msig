<notebook theme="air">
  <title>mSigSDK discovery extraction (NMF)</title>

  <script type="text/markdown">
    # Discovery extraction (NMF)

    Non-negative matrix factorization (NMF) is the exploratory discovery path. Instead of fitting known reference signatures, NMF learns a small set of candidate signature patterns and sample contributions directly from the spectra.

    Browser-scale extraction is useful for screening, not as a full production extraction recipe. For project data, increase the sample count, rank grid, number of random starts, and maximum iterations only after confirming that the browser can handle the workload.

    Discovery starts by checking whether the cohort has enough signal, then inspecting learned profiles, sample contributions, rank diagnostics, and production handoff files.
  </script>

  <script type="module" pinned id="1">
    const nmfSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-nmf", location.href).href;
    const { mSigSDK } = await import(nmfSdkUrl);
    const {
      loadPublicSbs96Dataset,
    } = await import("./msig-notebook-fixtures.js");
    const {
      burdenSampleRows,
      formatNumber,
      metrics,
      nmfMatchRows,
      table,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Workflow", value: "Exploratory extraction" },
      { label: "Main namespace", value: "signatureExtraction" },
    ]));
    display(table(
      [
        { functionName: "extractSignaturesNMF", workflowValue: "Runs exploratory discovery directly in the browser" },
        { functionName: "compareExtractedToReference", workflowValue: "Compares learned patterns to known COSMIC profiles" },
        { functionName: "selectNMFRank", workflowValue: "Provides rank diagnostics instead of a fixed black-box rank" },
        { functionName: "presentation.nmfMatchRows", workflowValue: "Formats reference matching as a compact table" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "workflowValue", label: "Workflow capability" },
      ]
    ));
  </script>
<script type="text/markdown">
    ## Step 1. Choose data and NMF settings

    NMF is more sensitive to cohort size, mutation count, number of patterns, and random starts than known-signature fitting. This example fetches specific high-count PCAWG WGS Lung-AdenoCA spectra so the browser has enough count-scale signal to extract simple patterns quickly.

    Edit `nmfRank`, `nmfRuns`, and `nmfMaxIterations` to see the speed and stability tradeoff. In a larger analysis, use more random starts and a broader rank grid.

    Underpowered discovery usually reflects limited cohort size, low mutation count, or too few repeated optimizations.
  </script>
<script type="module" pinned id="2">
    const nmfContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const nmfStudy = "PCAWG";
    const nmfGenomeDataType = "WGS";
    const nmfCancerType = "Lung-AdenoCA";
    const nmfMutationType = "SBS";
    const nmfMatrixSize = 96;
    const nmfSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const nmfExampleSampleNames = [
      "SP53810",
      "SP55142",
      "SP55235",
      "SP54113",
      "SP55509",
      "SP53618",
    ];
    const nmfSampleLimit = nmfExampleSampleNames.length;
    const nmfRank = 3;
    const nmfRuns = 3;
    const nmfMaxIterations = 180;

    const nmfDataset = await loadPublicSbs96Dataset(mSigSDK, {
      study: nmfStudy,
      genomeDataType: nmfGenomeDataType,
      cancerType: nmfCancerType,
      mutationType: nmfMutationType,
      matrixSize: nmfMatrixSize,
      signatureSetName: nmfSignatureSetName,
      sampleNames: nmfExampleSampleNames,
      sampleLimit: nmfSampleLimit,
      allowAlternate: false,
    });
    const nmfDataSourceStatus = nmfDataset.status;
    const nmfAllGroupedSpectra = nmfDataset.spectra;
    const nmfAllReferenceSignatures = nmfDataset.allSignatures;
    const nmfAllBurden = mSigSDK.qc.summarizeMutationBurden(nmfAllGroupedSpectra, {
      expectedContexts: nmfContexts,
    });
    const nmfSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      nmfAllBurden,
      {
        sampleNames: nmfExampleSampleNames.filter((sample) => nmfAllGroupedSpectra[sample]).length
          ? nmfExampleSampleNames.filter((sample) => nmfAllGroupedSpectra[sample])
          : Object.keys(nmfAllGroupedSpectra),
        minTotalMutations: 1,
        limit: nmfSampleLimit,
      }
    );
    const nmfSelectedSampleNames = nmfSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const nmfGroupedSpectra = Object.fromEntries(
      nmfSelectedSampleNames.map((sample) => [sample, nmfAllGroupedSpectra[sample]])
    );

    display(metrics([
      { label: "Data source", value: nmfDataSourceStatus },
      { label: "Samples", value: nmfSelectedSampleNames.length },
      { label: "Rank", value: nmfRank },
      { label: "Random starts", value: nmfRuns },
      { label: "Max iterations", value: nmfMaxIterations },
    ]));
    display(table(
      burdenSampleRows(nmfAllBurden, nmfSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low mutation-count review cue" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Extract signatures and compare them to references

    `extractSignaturesNMF` returns learned patterns, sample contributions, fit measurements, and run details. `compareExtractedToReference` is an interpretation aid used after fitting: it finds similar COSMIC profiles, but it does not prove that a learned pattern is biologically identical to a named signature.

    Read the reference-match table as a labeling aid, not as the extraction result itself. A learned pattern with a weak match may still be meaningful, and a learned pattern with a strong match still needs stability and cohort-context review.
  </script>
<script type="module" pinned id="3">
    const nmfResult = mSigSDK.signatureExtraction.extractSignaturesNMF(
      nmfGroupedSpectra,
      {
        rank: nmfRank,
        nRuns: nmfRuns,
        maxIterations: nmfMaxIterations,
        tolerance: 1e-5,
        seed: 123,
        contexts: nmfContexts,
        signaturePrefix: "NMF",
      }
    );
    const nmfMatches = mSigSDK.signatureExtraction.compareExtractedToReference(
      nmfResult.signatures,
      nmfAllReferenceSignatures,
      { contexts: nmfContexts, topN: 3 }
    );

    const nmfReferenceMatchRows = nmfMatchRows(nmfMatches, { maxRows: 9 });

    display(metrics([
      { label: "Extracted rank", value: nmfResult.rank },
      { label: "Converged", value: nmfResult.converged ? "Yes" : "No" },
      { label: "Reconstruction error", value: formatNumber(nmfResult.reconstructionError) },
      { label: "Mean sample cosine", value: formatNumber(nmfResult.averageSampleCosineSimilarity) },
      { label: "Best run", value: nmfResult.bestRun },
    ]));
    display(table(
      nmfReferenceMatchRows,
      [
        { key: "extractedSignature", label: "Extracted component" },
        { key: "referenceSignature", label: "Closest reference" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
      ],
      { maxRows: 9 }
    ));
    display(table(
      nmfReferenceMatchRows.map((row) => ({
        extractedSignature: row.extractedSignature,
        closestReference: row.referenceSignature,
        interpretation: "Similarity aid; not an etiologic assignment",
      })),
      [
        { key: "extractedSignature", label: "Extracted component" },
        { key: "closestReference", label: "Closest reference" },
        { key: "interpretation", label: "Interpretation boundary" },
      ],
      { maxRows: 9 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 3. Inspect extracted signature profiles

    Profiles are shown through the established mSigPortal SBS96 renderer so the mutation-context colors match COSMIC conventions. Check whether each learned component has a coherent profile before looking at sample contributions.

    A coherent profile is one that has recognizable context structure rather than scattered noise. If the profile looks unstable, return to sample selection, rank, or random starts before interpreting exposure heatmaps.
  </script>
<script type="module" pinned id="4">
    const nmfProfilesDiv = document.createElement("div");
    nmfProfilesDiv.style.width = "100%";
    await mSigSDK.signatureExtractionPlots.plotNMFSignatureProfiles(
      nmfProfilesDiv,
      nmfResult
    );
    display(nmfProfilesDiv);
  </script>

  <script type="text/markdown">
    ## Step 4. Inspect sample contributions

    The contribution heatmap shows whether learned patterns are broad cohort processes or concentrated in a few samples. A component driven by only one or two samples may still be useful, but it should be interpreted differently from a component distributed across the cohort.

    Broad components suggest cohort-wide processes, while concentrated components suggest outliers, technical effects, or rare biology that needs follow-up.
  </script>
<script type="module" pinned id="5">
    const nmfExposureDiv = document.createElement("div");
    nmfExposureDiv.style.width = "100%";
    await mSigSDK.signatureExtractionPlots.plotNMFExposureHeatmap(
      nmfExposureDiv,
      nmfResult,
      { relative: true }
    );
    display(nmfExposureDiv);
  </script>

  <script type="text/markdown">
    ## Step 5. Compare candidate ranks

    Rank selection is not a single-number decision. This small grid is intentionally modest for browser performance. In production, use more ranks and random starts, then judge reconstruction, stability, and interpretability together.

    A useful rank should improve reconstruction without splitting a biological process into unstable fragments. Use this table to decide what needs a production rerun, not to declare a final rank from the browser example alone.
  </script>
<script type="module" pinned id="6">
    const nmfRankSelection = mSigSDK.signatureExtraction.selectNMFRank(
      nmfGroupedSpectra,
      {
        ranks: [2, 3],
        nRuns: 2,
        maxIterations: 120,
        seed: 456,
        contexts: nmfContexts,
      }
    );
    const nmfRankDiv = document.createElement("div");
    nmfRankDiv.style.width = "100%";
    await mSigSDK.signatureExtractionPlots.plotNMFRankSelection(
      nmfRankDiv,
      nmfRankSelection
    );
    display(nmfRankDiv);
  </script>

  <script type="text/markdown">
    ## Step 6. Prepare files for production extraction

    Browser NMF is a screening tool. The same spectra can be exported as table-mode input for SigProfilerExtractor so production extraction and stability analysis can be run outside the browser.

    The browser screen identifies whether discovery is worth pursuing, and the production tool runs the heavier stability analysis.
  </script>
<script type="module" pinned id="7">
    const nmfExtractorInput = mSigSDK.adapters.sigProfilerExtractor.prepareInput(
      { spectra: nmfGroupedSpectra },
      {
        contexts: nmfContexts,
        minimumSignatures: 2,
        maximumSignatures: 6,
        nmfReplicates: 100,
      }
    );
    const nmfHandoffRows = nmfExtractorInput.files.map((file) => ({
      path: file.path,
      bytes: file.text.length,
      role: "SigProfilerExtractor table-mode input",
    }));
    display(table(
      nmfHandoffRows,
      [
        { key: "path", label: "File" },
        { key: "bytes", label: "Characters" },
        { key: "role", label: "Role" },
      ]
    ));
    display(downloadMany([
      ...nmfExtractorInput.files.map((file) => ({
        filename: file.path.split("/").pop(),
        text: file.text,
        label: `Download ${file.path.split("/").pop()}`,
      })),
      {
        filename: "nmf_extraction_bundle.json",
        type: "json",
        value: {
          dataSourceStatus: nmfDataSourceStatus,
          nmfSettings: {
            rank: nmfRank,
            randomStarts: nmfRuns,
            maxIterations: nmfMaxIterations,
          },
          extraction: nmfResult,
          referenceMatches: nmfMatches,
          rankSelection: nmfRankSelection,
          handoff: {
            manifest: nmfExtractorInput.manifest,
            pythonSnippet: nmfExtractorInput.pythonSnippet,
          },
        },
        label: "Download NMF extraction bundle JSON",
      },
    ]));
  </script>
