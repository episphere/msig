  <title>mSigSDK discovery extraction (NMF)</title>

  <script type="text/markdown">
    # Discovery extraction (NMF)

    Non-negative matrix factorization (NMF) learns candidate mutational signature patterns directly from a cohort. The browser workflow is a screening pass: choose a count-scale cohort, tune the extraction settings, inspect the learned patterns, compare candidate ranks, and save the files needed for a larger production extraction.

    A close reference match can help label a learned component, but it does not make the component a confirmed biological process. Discovery results need stability, cohort context, and external validation before they are used as manuscript-grade signature calls.
  </script>

    function nmfFormatElapsed(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes ? `${minutes}m ${seconds.toString().padStart(2, "0")}s` : `${seconds}s`;

    function nmfProgressFraction(progress) {
      if (!progress || !Number.isFinite(Number(progress.maxIterations))) return null;
      const totalRanks = Math.max(1, Math.round(Number(progress.totalRanks || 1)));
      const rankIndex = Math.max(1, Math.round(Number(progress.rankIndex || 1)));
      const totalRuns = Math.max(1, Math.round(Number(progress.totalRuns || 1)));
      const run = Math.max(1, Math.round(Number(progress.run || 1)));
      const maxIterations = Math.max(1, Math.round(Number(progress.maxIterations || 1)));
      const iteration = Math.max(0, Math.min(maxIterations, Math.round(Number(progress.iteration || 0))));
      const completedIterations =
        ((rankIndex - 1) * totalRuns + (run - 1)) * maxIterations + iteration;
      return Math.max(0.01, Math.min(0.99, completedIterations / (totalRanks * totalRuns * maxIterations)));
    }

    function nmfProgressDetail(progress, elapsedMs, fallbackDetail) {
      const elapsed = `elapsed ${nmfFormatElapsed(elapsedMs)}`;
      if (!progress) return `${fallbackDetail} ${elapsed}.`;
      if (progress.phase === "rank_start") {
        return `Starting rank ${progress.rank} (${progress.rankIndex}/${progress.totalRanks}); ${elapsed}.`;
      }
      if (progress.phase === "rank_complete") {
        return `Finished rank ${progress.rank} (${progress.rankIndex}/${progress.totalRanks}); loss ${nmfFormat(progress.reconstructionError)}; ${elapsed}.`;
      }
      const parts = [];
      if (progress.totalRanks) parts.push(`rank ${progress.rank} (${progress.rankIndex}/${progress.totalRanks})`);
      else if (progress.rank) parts.push(`rank ${progress.rank}`);
      if (progress.totalRuns) parts.push(`run ${progress.run}/${progress.totalRuns}`);
      if (progress.maxIterations) parts.push(`iteration ${progress.iteration}/${progress.maxIterations}`);
      if (Number.isFinite(Number(progress.reconstructionError))) parts.push(`loss ${nmfFormat(progress.reconstructionError)}`);
      if (progress.converged) parts.push("converged");
      parts.push(elapsed);
      return parts.join("; ") + ".";
    }

    function nmfRenderProgress(target, title, detail, fraction = null) {
      target.className = "nmf-status warning";
      target.replaceChildren(nmfNode("strong", "", title), nmfNode("span", "", detail));
      const track = nmfNode("div", `nmf-progress-track${fraction == null ? " indeterminate" : ""}`);

      if (fraction != null) fill.style.width = `${Math.round(Math.max(0.01, Math.min(0.99, fraction)) * 100)}%`;
      track.append(fill);
      target.append(track);
    }

    function nmfStartProgress(targets, { title, fallbackDetail }) {
      const statusTargets = Array.isArray(targets) ? targets : [targets];
      const startTime = performance.now();
      let lastProgress = null;
      const render = () => {
        const elapsedMs = performance.now() - startTime;
        const detail = nmfProgressDetail(lastProgress, elapsedMs, fallbackDetail);
        const fraction = nmfProgressFraction(lastProgress);
        statusTargets.forEach((target) => nmfRenderProgress(target, title, detail, fraction));
      };
      const interval = window.setInterval(render, 750);
      render();
      return {
        update(progress) {
          lastProgress = progress;
          render();
        },
        stop() {
          window.clearInterval(interval);
        },
      };
    }

      select.replaceChildren(...normalized.map((item) => nmfOption(item.label, item.value)));

      if (preferredValue && normalized.some((item) => String(item.value) === preferredValue)) {
        select.value = preferredValue;
      } else if (normalized.length) {
        select.value = String(normalized[0].value);
      }
      return select.value;
    }

      wrapper.append(input, readout);

    function nmfFormat(value, digits = 4) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "NA";
      if (Math.abs(number) >= 1000) return number.toLocaleString(undefined, { maximumFractionDigits: 0 });
      return number.toPrecision(digits);
    }

    function nmfUniqueSorted(values) {

    function nmfPublicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, nmfPublicApiBase);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      }
      return url;
    }

    async function nmfFetchPublicApiRows(endpoint, params = {}, limit = 100000) {
      const rows = [];
      let offset = 0;
      for (let page = 0; page < 10; page += 1) {
        const response = await fetch(nmfPublicApiUrl(endpoint, { ...params, limit, offset }).href);
        if (!response.ok) throw new Error(`${endpoint} returned ${response.status}`);
        const pageRows = await response.json();
        if (!Array.isArray(pageRows)) throw new Error(`${endpoint} response was not an array.`);
        rows.push(...pageRows);
        if (pageRows.length < limit) break;
        offset += limit;
      }
      return rows;
    }

    function nmfParseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind} input is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Fall through to delimited matrix import.
      }
      const delimiter = trimmed.split(/\r?\n/)[0]?.includes(",") ? "," : "\t";
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed, { delimiter })
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed, { delimiter });
    }

    function nmfInferContexts(...matrices) {
      const contexts = [
        ...new Set(
          matrices.flatMap((matrix) =>

      ];
      return contexts.length ? contexts : nmfContexts;

      const normalizedSpectra = spectra || {};
      const normalizedReference = referenceSignatures && Object.keys(referenceSignatures).length
        ? referenceSignatures
        : nmfApp.defaultReferenceSignatures;
      if (Object.keys(normalizedSpectra).length < 2) {
        throw new Error("NMF discovery needs at least two samples.");
      }
      nmfApp.spectra = normalizedSpectra;
      nmfApp.referenceSignatures = normalizedReference;
      nmfApp.contexts = contexts || nmfInferContexts(normalizedSpectra, normalizedReference);
      nmfApp.sampleOrder = Array.isArray(sampleOrder) && sampleOrder.length
        ? sampleOrder.filter((sample) => normalizedSpectra[sample])
        : Object.keys(normalizedSpectra);
      nmfApp.sourceLabel = sourceLabel;
      nmfApp.dataSourceStatus = dataSourceStatus;
      nmfApp.publicSelection = publicSelection;
      nmfApp.burden = mSigSDK.qc.summarizeMutationBurden(nmfApp.spectra, {
        expectedContexts: nmfApp.contexts,
      });
      const requestedLimit = Math.max(2, Math.min(nmfPublicSampleLimitMax, Math.round(Number(nmfState.sampleLimit || 6))));
      nmfState.sampleLimit = publicSelection
        ? requestedLimit
        : Math.max(2, Math.min(requestedLimit, nmfApp.sampleOrder.length));
      nmfInvalidateExtraction();
    }

    function nmfSelectedSampleNames() {
      const preferred = (nmfApp.sampleOrder || []).filter((sample) => nmfApp.spectra[sample]);
      const candidates = preferred.length ? preferred : Object.keys(nmfApp.spectra);
      return mSigSDK.qc.selectSamplesByMutationBurden(nmfApp.burden, {
        sampleNames: candidates,
        minTotalMutations: 1,
        limit: Math.max(2, Math.min(candidates.length, Math.round(Number(nmfState.sampleLimit || 2)))),
      }).map((sample) => sample.sample);
    }

    function nmfAnalysisSampleNames() {
      return nmfSelectedSampleNames();
    }

    function nmfGroupedSpectra(sampleNames = nmfSelectedSampleNames()) {
      return Object.fromEntries(
        sampleNames.map((sample) => [sample, nmfApp.spectra[sample]])
      );
    }

    function nmfSignatureNames() {
      return Object.keys(nmfApp.result?.signatures || {});
    }

    function nmfResultBestRunLabel(result) {
      if (!result?.bestRun) return "not run";
      return `run ${result.bestRun.run}, seed ${result.bestRun.seed}`;
    }

    function nmfConvergenceState(result) {
      const iterationLimit = result?.analysisSettings?.maxIterations || nmfState.maxIterations;
      if (result?.converged) {
        return {
          label: "Reached tolerance",
          detail: "The optimizer met the stopping tolerance before the iteration limit.",
          tone: "success",
        };
      }
      return {
        label: "Iteration limit reached",
        detail: `The run still returned the best solution. Increase max iterations above ${iterationLimit} for a stricter convergence check.`,
        tone: "",
      };
    }

    function nmfTopContextRows(signatureRecord, maxRows = 8) {
      return Object.entries(signatureRecord || {})
        .map(([context, weight]) => ({ context, weight: Number(weight || 0) }))
        .sort((left, right) => right.weight - left.weight)
        .slice(0, maxRows)
        .map((row) => ({
          context: row.context,
          weight: nmfFormat(row.weight, 3),
        }));
    }

    function nmfSampleExposureRows(sample) {
      const exposures = nmfApp.result?.exposures?.[sample] || {};
      const total = Object.values(exposures).reduce((sum, value) => sum + Number(value || 0), 0);
      return Object.entries(exposures)
        .map(([signature, exposure]) => {
          const raw = Number(exposure || 0);
          return {
            signature,
            rawExposure: raw,
            fraction: total > 0 ? raw / total : 0,
          };
        })
        .sort((left, right) => right.fraction - left.fraction)
        .map((row) => ({
          component: row.signature,
          rawExposure: nmfFormat(row.rawExposure, 4),
          withinSampleFraction: `${(row.fraction * 100).toFixed(1)}%`,
        }));
    }

    function nmfFilteredMatchRows() {
      const topN = Math.max(1, Math.round(Number(nmfState.matchTopN || 1)));
      const floor = Number(nmfState.matchFloor);
      const groups = new Map((nmfApp.matches || []).map((group) => [group.signatureName, group]));
      return nmfSignatureNames().flatMap((signatureName) => {
        const matches = (groups.get(signatureName)?.matches || []).slice(0, topN);
        if (!matches.length) {
          return [{
            extractedSignature: signatureName,
            referenceSignature: "No catalog match",
            cosineSimilarity: "NA",
            matchStatus: "No match",
          }];
        }
        return matches.map((match) => {
          const cosine = Number(match.cosineSimilarity);
          return {
            extractedSignature: signatureName,
            referenceSignature: match.referenceName,
            cosineSimilarity: nmfFormat(cosine, 3),
            matchStatus: cosine >= floor ? "Passes floor" : "Below floor",
          };
        });
      });
    }

    function nmfRankList() {
      const min = Math.max(2, Math.round(Number(nmfState.rankMin || 2)));
      const max = Math.max(min, Math.round(Number(nmfState.rankMax || min)));
      return Array.from({ length: max - min + 1 }, (_, index) => min + index);
    }

    function nmfRankCriterionLabel(criterion) {
      const labels = {
        diminishing_returns: "first rank with diminishing reconstruction-loss returns",
        elbow: "maximum curvature in reconstruction loss",
        reconstruction_error: "lowest reconstruction loss",
        cophenetic: "highest cophenetic correlation",
        silhouette: "highest silhouette score",
      };
      return labels[criterion] || String(criterion || "rank criterion");
    }

    function nmfRankCriterionDetail(rankSelection) {
      if (rankSelection?.rankSelectionCriterion === "diminishing_returns") {
        return `Criterion: first low-gain rank after the largest reconstruction-loss drop. Production extraction should use a broader grid and more starts.`;
      }
      return `Criterion: ${nmfRankCriterionLabel(rankSelection?.rankSelectionCriterion)}. Production extraction should use a broader grid and more starts.`;
    }

    function nmfElbowScores(runs = []) {
      const sorted = [...runs]
        .filter((run) => Number.isFinite(Number(run.rank)) && Number.isFinite(Number(run.reconstructionError)))
        .sort((left, right) => Number(left.rank) - Number(right.rank));
      const scores = new Map(sorted.map((run) => [run.rank, 0]));
      if (sorted.length < 3) return scores;

      const xValues = sorted.map((run) => Number(run.rank));
      const yValues = sorted.map((run) => Number(run.reconstructionError));
      const xMin = Math.min(...xValues);
      const xMax = Math.max(...xValues);
      const yMin = Math.min(...yValues);
      const yMax = Math.max(...yValues);
      const xRange = xMax - xMin;
      const yRange = yMax - yMin;
      if (xRange <= 0 || yRange <= 0) return scores;

      const normalized = sorted.map((run) => ({
        rank: run.rank,
        x: (Number(run.rank) - xMin) / xRange,
        y: (Number(run.reconstructionError) - yMin) / yRange,
      }));
      const first = normalized[0];
      const last = normalized[normalized.length - 1];
      const dx = last.x - first.x;
      const dy = last.y - first.y;
      const denominator = Math.hypot(dx, dy) || 1;

      for (const point of normalized) {
        const distance = Math.abs(dy * point.x - dx * point.y + last.x * first.y - last.y * first.x) / denominator;
        scores.set(point.rank, distance);
      }
      return scores;
    }

    function nmfRankMarginalLossGains(runs = []) {
      const sorted = [...runs]
        .filter((run) => Number.isFinite(Number(run.rank)) && Number.isFinite(Number(run.reconstructionError)))
        .sort((left, right) => Number(left.rank) - Number(right.rank));
      const gains = new Map(sorted.map((run) => [run.rank, null]));
      for (let index = 0; index < sorted.length - 1; index += 1) {
        const currentLoss = Number(sorted[index].reconstructionError);
        const nextLoss = Number(sorted[index + 1].reconstructionError);
        const gain = Math.max(0, (currentLoss - nextLoss) / Math.max(Math.abs(currentLoss), 1e-12));
        gains.set(sorted[index].rank, gain);
      }
      return gains;
    }

    function nmfApplyRankRecommendation(rankSelection) {
      const elbowScores = nmfElbowScores(rankSelection?.runs || []);
      const lossGains = nmfRankMarginalLossGains(rankSelection?.runs || []);
      const runs = (rankSelection?.runs || []).map((run) => ({
        ...run,
        elbowScore: elbowScores.get(run.rank) || 0,
        nextLossGain: lossGains.get(run.rank) ?? null,
      }));
      if (nmfState.rankCriterion === "diminishing_returns") {
        const candidates = runs.filter((run) => Number.isFinite(Number(run.nextLossGain)));
        const largestGainRank = candidates.reduce((best, run) => {
          if (!best) return run;
          return Number(run.nextLossGain) > Number(best.nextLossGain) ? run : best;
        }, null)?.rank;
        const postDropCandidates = Number.isFinite(Number(largestGainRank))
          ? candidates.filter((run) => Number(run.rank) > Number(largestGainRank))
          : candidates;
        const recommended = postDropCandidates.find((run) => Number(run.nextLossGain) <= nmfDiminishingReturnLossGainFloor)
          || postDropCandidates[0]
          || candidates[candidates.length - 1]
          || runs[runs.length - 1];
        return {
          ...rankSelection,
          rankSelectionCriterion: "diminishing_returns",
          criterionDirection: "first_below_threshold",
          criterionUsed: "next_loss_gain",
          criterionValue: recommended?.nextLossGain ?? null,
          recommendedRank: recommended?.rank ?? rankSelection?.recommendedRank,
          runs,
        };
      }
      if (nmfState.rankCriterion !== "elbow") {
        return { ...rankSelection, runs };
      }
      const candidates = runs.filter((run) => Number.isFinite(Number(run.elbowScore)));
      const recommended = candidates.reduce((best, run) => {
        if (!best) return run;
        if (run.elbowScore > best.elbowScore) return run;
        if (run.elbowScore === best.elbowScore && run.rank < best.rank) return run;
        return best;
      }, null);
      return {
        ...rankSelection,
        rankSelectionCriterion: "elbow",
        criterionDirection: "maximize",
        criterionUsed: "elbow",
        criterionValue: recommended?.elbowScore ?? null,
        recommendedRank: recommended?.rank ?? rankSelection?.recommendedRank,
        runs,
      };
    }

    function nmfInvalidateExtraction() {
      nmfApp.result = null;
      nmfApp.matches = [];
      nmfApp.matchRows = [];
      nmfApp.rankSelection = null;
      nmfState.selectedSignature = "";
      nmfState.selectedSample = "";
    }

    async function nmfRenderAll() {
      for (const renderer of Object.values(nmfApp.renderers)) {
        await renderer();
      }
    }

    function nmfNextPaint() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function nmfEffectiveExtractionSettings() {
      const requestedRuns = Math.max(1, Math.round(Number(nmfState.nRuns || 1)));
      const requestedIterations = Math.max(20, Math.round(Number(nmfState.maxIterations || 80)));
      return {
        nRuns: requestedRuns,
        maxIterations: requestedIterations,
        capped: false,
      };
    }

    function nmfRunExtractionWorker(method, spectra, options, onProgress = null) {
      if (typeof Worker === "undefined" || typeof Blob === "undefined" || typeof URL === "undefined") {
        const fallback = method === "selectNMFRank"
          ? mSigSDK.signatureExtraction.selectNMFRank
          : mSigSDK.signatureExtraction.extractSignaturesNMF;
        return Promise.resolve(fallback(spectra, { ...options, onProgress }));
      }

      const moduleUrl = new URL("../mSigSDKScripts/signatureExtraction.js", document.baseURI).href;
      const workerSource = `
        import { extractSignaturesNMF, selectNMFRank } from ${JSON.stringify(moduleUrl)};

        self.onmessage = function (event) {
          try {
            const { method, spectra, options } = event.data;
            const fn = method === "selectNMFRank" ? selectNMFRank : extractSignaturesNMF;
            self.postMessage({
              result: fn(spectra, {
                ...options,
                onProgress: (progress) => self.postMessage({ progress }),
              }),
            });
          } catch (error) {
            self.postMessage({ error: error && error.message ? error.message : String(error) });
          }
        };
      `;
      const workerUrl = URL.createObjectURL(new Blob([workerSource], { type: "text/javascript" }));
      const worker = new Worker(workerUrl, { type: "module" });
      return new Promise((resolve, reject) => {
        worker.onmessage = (event) => {
          if (event.data?.progress) {
            if (typeof onProgress === "function") onProgress(event.data.progress);
            return;
          }
          worker.terminate();
          URL.revokeObjectURL(workerUrl);
          if (event.data?.error) {
            reject(new Error(event.data.error));
          } else {
            resolve(event.data.result);
          }
        };
        worker.onerror = (error) => {
          worker.terminate();
          URL.revokeObjectURL(workerUrl);
          reject(new Error(error.message || "NMF worker failed"));
        };
        worker.postMessage({ method, spectra, options });
      });
    }

    async function nmfRunExtraction() {
      if (nmfApp.running) return;
      nmfApp.running = true;
      const analysisSamples = nmfAnalysisSampleNames();
      const spectra = nmfGroupedSpectra(analysisSamples);
      const sampleCount = analysisSamples.length;
      const extractionSettings = nmfEffectiveExtractionSettings();
      const progress = nmfStartProgress(Object.values(nmfApp.statuses), {
        title: "Running NMF",
        fallbackDetail: `${sampleCount} samples, rank ${nmfState.rank}, ${extractionSettings.nRuns} random start${extractionSettings.nRuns === 1 ? "" : "s"}, ${extractionSettings.maxIterations} iterations.`,
      });
      await nmfNextPaint();
      try {
        const result = await nmfRunExtractionWorker("extractSignaturesNMF", spectra, {
          rank: Number(nmfState.rank),
          nRuns: extractionSettings.nRuns,
          maxIterations: extractionSettings.maxIterations,
          progressInterval: Math.max(1, Math.floor(extractionSettings.maxIterations / 20)),
          tolerance: 1e-5,
          seed: Number(nmfState.seed),
          contexts: nmfApp.contexts,
          signaturePrefix: "NMF",
        }, (event) => progress.update(event));
        result.analysisSettings = {
          selectedSamples: sampleCount,
          analyzedSamples: sampleCount,
          nRuns: extractionSettings.nRuns,
          maxIterations: extractionSettings.maxIterations,
          capped: extractionSettings.capped,
          worker: typeof Worker !== "undefined",
        };
        Object.values(nmfApp.statuses).forEach((target) =>
          nmfStatus(target, "Rendering NMF results", "Drawing profiles, exposure heatmap, metrics, and reference matches.", "warning")
        );
        await nmfNextPaint();
        const matches = mSigSDK.signatureExtraction.compareExtractedToReference(
          result.signatures,
          nmfApp.referenceSignatures,
          { contexts: nmfApp.contexts, topN: 8 }
        );
        nmfApp.result = result;
        nmfApp.matches = matches;
        nmfApp.matchRows = nmfMatchRows(matches, { maxRows: 40 });
        nmfApp.rankSelection = null;
        nmfState.selectedSignature = nmfSignatureNames()[0] || "";
        nmfState.selectedSample = Object.keys(result.exposures || {})[0] || "";
        await nmfRenderAll();
      } catch (error) {
        Object.values(nmfApp.statuses).forEach((target) =>
          nmfStatus(target, "NMF failed", error.message, "warning")
        );
      } finally {
        progress.stop();
        nmfApp.running = false;
      }
    }

    async function nmfRunRankGrid() {
      if (!nmfApp.result || nmfApp.running) {
        await nmfApp.renderers.rankExport?.();
        return;
      }
      const status = nmfApp.statuses.rankExport;
      const analysisSamples = nmfAnalysisSampleNames();
      const sampleCount = analysisSamples.length;
      const progress = nmfStartProgress(status, {
        title: "Running rank grid",
        fallbackDetail: `Testing ranks ${nmfRankList().join(", ")} on ${sampleCount} samples with ${nmfState.rankRuns} starts each.`,
      });
      await nmfNextPaint();
      try {
        const sdkCriterion = ["diminishing_returns", "elbow"].includes(nmfState.rankCriterion)
          ? "reconstruction_error"
          : nmfState.rankCriterion;
        const rankSelection = await nmfRunExtractionWorker("selectNMFRank", nmfGroupedSpectra(analysisSamples), {
          ranks: nmfRankList(),
          nRuns: Number(nmfState.rankRuns),
          maxIterations: Number(nmfState.rankIterations),
          progressInterval: Math.max(1, Math.floor(Number(nmfState.rankIterations) / 20)),
          tolerance: 1e-5,
          seed: Number(nmfState.seed) + 1000,
          contexts: nmfApp.contexts,
          rankSelectionCriterion: sdkCriterion,
        }, (event) => progress.update(event));
        nmfStatus(status, "Rendering rank diagnostics", "Drawing the rank diagnostic plot and result table.", "warning");
        await nmfNextPaint();
        nmfApp.rankSelection = nmfApplyRankRecommendation(rankSelection);
        await nmfApp.renderers.rankExport?.();
      } catch (error) {
        nmfStatus(status, "Rank grid failed", error.message, "warning");
      } finally {
        progress.stop();
      }
    }
  </script>

  <script type="module" pinned id="2">

    const nmfOwnControls = nmfNode("div", "workflow-control-grid");
    const nmfPublicActions = nmfNode("div", "workflow-button-row");
    const nmfOwnActions = nmfNode("div", "workflow-button-row");
    const nmfSetupControls = nmfNode("div", "workflow-control-grid compact");
    const nmfSetupActions = nmfNode("div", "workflow-button-row");

    const nmfSetupOutput = nmfNode("div", "nmf-workflow-output");

    const sourceMode = nmfSelect(
      [
        ["public", "mSigPortal public API"],

      ],

    );
    const sampleLimit = nmfNumberInput(nmfState.sampleLimit, { min: 2, max: nmfPublicSampleLimitMax, step: 1 });
    const rank = nmfRangeInput(nmfState.rank, { min: 2, max: 8 });
    const starts = nmfRangeInput(nmfState.nRuns, { min: 1, max: 5 });
    const iterations = nmfRangeInput(nmfState.maxIterations, { min: 80, max: 260, step: 20 });
    const seed = nmfNumberInput(nmfState.seed, { min: 1, max: 999999, step: 1 });
    const publicStudy = document.createElement("select");
    const publicCancer = document.createElement("select");
    const publicStrategy = document.createElement("select");
    const publicProfile = document.createElement("select");
    const publicMatrix = document.createElement("select");
    const publicSignatureSet = document.createElement("select");
    const publicStatus = nmfNode("div", "nmf-status");
    const refreshPublicMenu = nmfButton("Load public cohort menu");
    const loadPublicData = nmfButton("Load public cohort", "primary");
    const ownSpectraText = nmfTextArea("", 9);
    const ownReferenceText = nmfTextArea("", 7);
    const ownStatus = nmfNode("div", "nmf-status");
    const fillTemplate = nmfButton("Use current dataset as template");
    const applyOwnData = nmfButton("Apply own data", "primary");
    const runExtraction = nmfButton("Run extraction", "primary");

    function nmfUpdateSourcePanels() {
      nmfState.sourceMode = sourceMode.value;
      nmfPublicPanel.hidden = nmfState.sourceMode !== "public";
      nmfOwnPanel.hidden = nmfState.sourceMode !== "own";
    }

    function nmfMergePublicRows(primaryRows, fallbackRows, fields) {
      const merged = [];
      const seen = new Set();
      for (const row of [...(primaryRows || []), ...(fallbackRows || [])]) {
        const key = fields.map((field) => String(row?.[field] ?? "")).join("|");
        if (seen.has(key)) continue;
        seen.add(key);
        merged.push(row);
      }
      return merged;
    }

    function nmfPublicSpectrumRows() {
      return nmfApp.publicOptions.spectra.length
        ? nmfApp.publicOptions.spectra
        : nmfFallbackPublicSpectrumRows();
    }

    function nmfPublicSignatureRows() {
      return nmfApp.publicOptions.signatures.length
        ? nmfApp.publicOptions.signatures
        : nmfFallbackPublicSignatureRows();
    }

    function nmfCurrentPublicSelection() {
      return {
        study: publicStudy.value || nmfPreset.study,
        strategy: publicStrategy.value || nmfPreset.genomeDataType,
        profile: publicProfile.value || nmfPreset.mutationType,
        matrix: publicMatrix.value || String(nmfPreset.matrixSize),
        cancer: publicCancer.value || nmfPreset.cancerType,
        signatureSetName: publicSignatureSet.value || nmfPreset.signatureSetName,
      };
    }

    function nmfSeedPublicDefaults() {
      nmfApp.publicOptions.spectra = nmfFallbackPublicSpectrumRows();
      nmfApp.publicOptions.signatures = nmfFallbackPublicSignatureRows();
      nmfApp.publicOptions.loaded = false;
      nmfPopulatePublicMenus({
        study: nmfPreset.study,
        strategy: nmfPreset.genomeDataType,
        profile: nmfPreset.mutationType,
        matrix: nmfPreset.matrixSize,
        cancer: nmfPreset.cancerType,
        signatureSetName: nmfPreset.signatureSetName,
      });
    }

    function nmfSelectedPublicRows() {
      const matrix = Number(publicMatrix.value);
      return nmfPublicSpectrumRows().filter((row) =>
        row.study === publicStudy.value &&
        row.strategy === publicStrategy.value &&
        row.profile === publicProfile.value &&
        Number(row.matrix) === matrix &&
        row.cancer === publicCancer.value
      );
    }

    function nmfPublicSampleOptions() {
      const bySample = new Map();
      for (const row of nmfSelectedPublicRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

    function nmfFallbackPublicCohort() {
      const matrix = Number(publicMatrix.value);
      return nmfFallbackPublicCatalog.find((row) =>
        row.study === publicStudy.value &&
        row.genomeDataType === publicStrategy.value &&
        row.mutationType === publicProfile.value &&
        Number(row.matrixSize) === matrix &&
        row.cancerType === publicCancer.value
      );
    }

    function nmfPublicSampleCapacity() {
      const listedCount = nmfPublicSampleOptions().length;
      const fallbackCount = Number(nmfFallbackPublicCohort()?.sampleCountHint || 0);
      return nmfApp.publicOptions.loaded ? listedCount : Math.max(listedCount, fallbackCount);
    }

    function nmfPopulatePublicSignatureSets({ strategy, profile, matrix, preferred = nmfPreset.signatureSetName }) {
      const exactRows = nmfPublicSignatureRows().filter((row) =>
        row.strategy === strategy &&
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const fallbackRows = nmfPublicSignatureRows().filter((row) =>
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const rows = exactRows.length ? exactRows : fallbackRows;
      const options = nmfUniqueSorted(rows.map((row) => row.signatureSetName));
      nmfSetSelectOptions(publicSignatureSet, options.length ? options : [preferred], preferred);
    }

    function nmfUpdatePublicStatus() {
      const samples = nmfPublicSampleOptions();
      const requested = Math.max(2, Math.min(nmfPublicSampleLimitMax, Math.round(Number(sampleLimit.value || nmfState.sampleLimit))));
      const listedCount = samples.length;
      const capacity = nmfPublicSampleCapacity();
      const willLoad = capacity ? Math.min(requested, capacity) : requested;
      const cohortLimitNote = capacity && capacity < requested
        ? ` The selected cohort has ${capacity} available samples.`
        : "";
      nmfStatus(
        publicStatus,
        nmfApp.publicOptions.loaded ? "Public menu ready" : "Public cohort menu ready",
        capacity
          ? `${capacity} public samples are available for this selection. Loading will fetch up to ${willLoad}.${cohortLimitNote}`
          : "No samples match this public selection.",
        capacity && capacity >= requested ? "success" : "warning"
      );
    }

    function nmfPopulatePublicMenus(preferred = {}) {
      const current = {
        study: publicStudy.value || preferred.study || nmfPreset.study,
        strategy: publicStrategy.value || preferred.strategy || nmfPreset.genomeDataType,
        profile: publicProfile.value || preferred.profile || nmfPreset.mutationType,
        matrix: publicMatrix.value || preferred.matrix || String(nmfPreset.matrixSize),
        cancer: publicCancer.value || preferred.cancer || nmfPreset.cancerType,
        signatureSetName: publicSignatureSet.value || preferred.signatureSetName || nmfPreset.signatureSetName,
      };
      const spectrumRows = nmfPublicSpectrumRows();
      const study = nmfSetSelectOptions(publicStudy, nmfUniqueSorted(spectrumRows.map((row) => row.study)), current.study);
      const studyRows = spectrumRows.filter((row) => row.study === study);
      const strategy = nmfSetSelectOptions(publicStrategy, nmfUniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
      const strategyRows = studyRows.filter((row) => row.strategy === strategy);
      const profile = nmfSetSelectOptions(publicProfile, nmfUniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
      const profileRows = strategyRows.filter((row) => row.profile === profile);
      const matrix = nmfSetSelectOptions(publicMatrix, nmfUniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
      const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
      nmfSetSelectOptions(publicCancer, nmfUniqueSorted(matrixRows.map((row) => row.cancer)), current.cancer);
      nmfPopulatePublicSignatureSets({ strategy, profile, matrix, preferred: current.signatureSetName });
      nmfUpdatePublicStatus();
    }

    async function nmfLoadPublicMenus() {
      nmfStatus(publicStatus, "Loading public menu", "Fetching mSigPortal cohort and reference catalog options.", "warning");
      refreshPublicMenu.disabled = true;
      loadPublicData.disabled = true;
      const preferred = nmfCurrentPublicSelection();
      try {
        const [spectraOptions, signatureOptions] = await Promise.all([
          nmfFetchPublicApiRows("mutational_spectrum_options"),
          nmfFetchPublicApiRows("mutational_signature_options", { source: "Reference_signatures" }),
        ]);
        nmfApp.publicOptions.spectra = nmfMergePublicRows(
          spectraOptions,
          nmfFallbackPublicSpectrumRows(),
          ["study", "strategy", "profile", "matrix", "cancer", "sample"]
        );
        nmfApp.publicOptions.signatures = nmfMergePublicRows(
          signatureOptions,
          nmfFallbackPublicSignatureRows(),
          ["strategy", "profile", "matrix", "signatureSetName"]
        );
        nmfApp.publicOptions.loaded = true;
        nmfPopulatePublicMenus(preferred);
      } catch (error) {
        nmfApp.publicOptions.spectra = nmfFallbackPublicSpectrumRows();
        nmfApp.publicOptions.signatures = nmfFallbackPublicSignatureRows();
        nmfApp.publicOptions.loaded = false;
        nmfPopulatePublicMenus(preferred);
        nmfStatus(
          publicStatus,
          "Public cohort menu ready",
          `The listed cohorts can be loaded directly. Remote menu refresh failed: ${error.message}`,
          "warning"
        );
      } finally {
        refreshPublicMenu.disabled = false;
        loadPublicData.disabled = false;
      }
    }

    async function nmfLoadSelectedPublicData() {
      const requested = Math.max(2, Math.min(nmfPublicSampleLimitMax, Math.round(Number(sampleLimit.value || nmfState.sampleLimit))));
      const available = nmfPublicSampleOptions();
      const selected = available.slice(0, requested);
      const hasEnoughListedSamples = selected.length >= requested;
      if (!selected.length && nmfApp.publicOptions.loaded) throw new Error("No public samples match the selected cohort.");
      if (!publicSignatureSet.value) throw new Error("No compatible reference signature set is available.");
      const sampleNames = hasEnoughListedSamples && requested <= nmfPublicFetchBatchSize
        ? selected.map((row) => row.sample)
        : [];
      const loadCount = hasEnoughListedSamples || !nmfApp.publicOptions.loaded
        ? requested
        : selected.length;
      nmfStatus(publicStatus, "Loading public cohort", `Fetching up to ${loadCount} public spectra and the selected signature catalog.`, "warning");
      nmfState.sampleLimit = requested;
      const dataset = await loadPublicSbs96Dataset(mSigSDK, {
        study: publicStudy.value,
        genomeDataType: publicStrategy.value,
        cancerType: publicCancer.value,
        mutationType: publicProfile.value,
        matrixSize: Number(publicMatrix.value),
        signatureSetName: publicSignatureSet.value,
        ...(sampleNames.length ? { sampleNames } : {}),
        sampleLimit: loadCount,
        allowAlternate: false,
        allowDemoFallback: true,
      });
      const loadedCount = Object.keys(dataset.spectra || {}).length;
      nmfSetDataset({
        spectra: dataset.spectra,
        referenceSignatures: dataset.allSignatures || dataset.signatures,
        contexts: dataset.contexts || nmfContexts,
        sourceLabel: dataset.source,
        dataSourceStatus: dataset.status,
        sampleOrder: dataset.sampleNames,
        publicSelection: dataset.selection,
      });
      sampleLimit.value = String(nmfState.sampleLimit);
      nmfStatus(
        publicStatus,
        "Public cohort loaded",
        loadedCount < requested
          ? `${loadedCount} samples are active. This cohort has fewer samples than the requested cap.`
          : `${loadedCount} samples are active.`,
        loadedCount < requested ? "warning" : "success"
      );
      await nmfRenderAll();
    }

    function nmfApplyOwnData() {
      const spectra = nmfParseMatrix(ownSpectraText.value, "spectra");
      const reference = String(ownReferenceText.value || "").trim()
        ? nmfParseMatrix(ownReferenceText.value, "reference signatures")
        : nmfApp.defaultReferenceSignatures;
      nmfSetDataset({
        spectra,
        referenceSignatures: reference,
        contexts: nmfInferContexts(spectra, reference),
        sourceLabel: "Pasted SBS96 spectra",
        dataSourceStatus: "custom SBS96 matrix",
        sampleOrder: Object.keys(spectra),
        publicSelection: null,
      });
      sampleLimit.value = String(nmfState.sampleLimit);
      nmfStatus(ownStatus, "Own data loaded", `${Object.keys(spectra).length} samples are active.`, "success");
    }

    sourceMode.addEventListener("change", async () => {
      nmfUpdateSourcePanels();
      await nmfApp.renderers.setup();
    });
    async function nmfApplySampleLimit() {
      const activeAvailable = Object.keys(nmfApp.spectra || {}).length || nmfPublicSampleLimitMax;
      const max = nmfState.sourceMode === "public"
        ? nmfPublicSampleLimitMax
        : Math.max(2, Math.min(nmfPublicSampleLimitMax, activeAvailable));
      nmfState.sampleLimit = Math.max(2, Math.min(max, Math.round(Number(sampleLimit.value || nmfState.sampleLimit))));
      sampleLimit.value = String(nmfState.sampleLimit);
      nmfInvalidateExtraction();
      nmfUpdatePublicStatus();
      await nmfRenderAll();
    }
    sampleLimit.addEventListener("input", nmfApplySampleLimit);
    sampleLimit.addEventListener("change", nmfApplySampleLimit);
    rank.input.addEventListener("input", async () => {
      nmfState.rank = Number(rank.input.value);
      nmfInvalidateExtraction();
      await nmfRenderAll();
    });
    starts.input.addEventListener("input", async () => {
      nmfState.nRuns = Number(starts.input.value);
      nmfInvalidateExtraction();
      await nmfRenderAll();
    });
    iterations.input.addEventListener("input", async () => {
      nmfState.maxIterations = Number(iterations.input.value);
      nmfInvalidateExtraction();
      await nmfRenderAll();
    });
    seed.addEventListener("change", async () => {
      nmfState.seed = Math.max(1, Math.round(Number(seed.value || 123)));
      seed.value = String(nmfState.seed);
      nmfInvalidateExtraction();
      await nmfRenderAll();
    });
    runExtraction.addEventListener("click", nmfRunExtraction);
    [publicStudy, publicCancer, publicStrategy, publicProfile, publicMatrix, publicSignatureSet].forEach((select) => {
      select.addEventListener("change", () => {
        if (select !== publicCancer && select !== publicSignatureSet) nmfPopulatePublicMenus();
        nmfUpdatePublicStatus();
      });
    });
    refreshPublicMenu.addEventListener("click", () => void nmfLoadPublicMenus());
    loadPublicData.addEventListener("click", async () => {
      loadPublicData.disabled = true;
      try {
        await nmfLoadSelectedPublicData();
      } catch (error) {
        nmfStatus(publicStatus, "Public cohort failed", error.message, "warning");
      } finally {
        loadPublicData.disabled = false;
      }
    });
    fillTemplate.addEventListener("click", () => {
      ownSpectraText.value = JSON.stringify(nmfApp.spectra, null, 2);
      ownReferenceText.value = JSON.stringify(nmfApp.referenceSignatures, null, 2);
      nmfStatus(ownStatus, "Template loaded", "Edit the JSON or replace it with a SigProfiler-style SBS96 matrix.", "success");
    });
    applyOwnData.addEventListener("click", async () => {
      try {
        nmfApplyOwnData();
        await nmfRenderAll();
      } catch (error) {
        nmfStatus(ownStatus, "Own data failed", error.message, "warning");
      }
    });

    nmfSourceControls.append(
      nmfField("Data source", sourceMode, "Switch between public mSigPortal data and a pasted project matrix."),
      nmfField("Sample cap", sampleLimit, "Loads up to 200 public samples; pasted data is capped by the submitted matrix.")
    );
    nmfPublicControls.append(
      nmfField("Study", publicStudy),
      nmfField("Cancer type", publicCancer),
      nmfField("Strategy", publicStrategy),
      nmfField("Profile", publicProfile),
      nmfField("Matrix", publicMatrix),
      nmfField("Signature set", publicSignatureSet)
    );
    nmfPublicActions.append(refreshPublicMenu, loadPublicData);
    nmfPublicPanel.append(nmfPublicControls, nmfPublicActions, publicStatus);

    ownSpectraText.placeholder = [
      "Paste JSON {\"SampleA\":{\"ACA\":12,...}}",
      "or a SigProfiler-style SBS96 matrix with mutation types in rows and samples in columns.",
    ].join("\n");
    ownReferenceText.placeholder = [
      "Optional: paste COSMIC-style signature matrix JSON/TSV.",
      "If left blank, the current public reference catalog is used only for post hoc similarity labels.",
    ].join("\n");
    nmfOwnControls.append(
      nmfField("SBS96 spectra", ownSpectraText, "Required. Counts must be sample by SBS96 context."),
      nmfField("Reference signatures", ownReferenceText, "Optional. Used for similarity labels after extraction.")
    );
    nmfOwnActions.append(fillTemplate, applyOwnData);
    nmfOwnPanel.append(nmfOwnControls, nmfOwnActions, ownStatus);
    nmfSetupControls.append(
      nmfField("Rank", rank.wrapper, "Candidate signatures to extract from the selected samples."),
      nmfField("Random starts", starts.wrapper, "Repeated initializations for the same rank."),
      nmfField("Max iterations", iterations.wrapper, "Higher values can improve convergence at a time cost."),
      nmfField("Seed", seed, "Reproducible browser run.")
    );
    nmfSetupActions.append(runExtraction);
    nmfSetupRoot.append(nmfSourceControls, nmfPublicPanel, nmfOwnPanel, nmfSetupControls, nmfSetupActions, nmfSetupStatus, nmfSetupOutput);
    nmfApp.statuses.setup = nmfSetupStatus;

    nmfApp.renderers.setup = async () => {
      const selectedSamples = nmfSelectedSampleNames();
      const analysisSamples = nmfAnalysisSampleNames();
      const extractionSettings = nmfEffectiveExtractionSettings();
      sampleLimit.value = String(nmfState.sampleLimit);
      nmfUpdateSourcePanels();
      nmfStatus(
        nmfSetupStatus,
        nmfApp.result ? "Extraction settings applied" : "Settings ready",
        nmfApp.result
          ? "Change a setting to revise the analysis, then rerun extraction."
          : "Run extraction to learn candidate patterns from the selected samples.",
        nmfApp.result ? "success" : ""
      );
      nmfSetupOutput.replaceChildren(
        metrics([
          { label: "Data source", value: nmfApp.dataSourceStatus },
          { label: "Active cohort", value: nmfApp.sourceLabel },
          { label: "Selected samples", value: selectedSamples.length },
          { label: "Samples analyzed", value: analysisSamples.length },
          { label: "Compute budget", value: `${extractionSettings.nRuns} x ${extractionSettings.maxIterations}` },
        ]),
        table(
          burdenSampleRows(nmfApp.burden, selectedSamples),
          [
            { key: "sample", label: "Sample" },
            { key: "mutations", label: "Total mutations" },
            { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
            { key: "lowBurden", label: "Low-count cue" },
          ],
          {
            maxRows: 12,
            caption: "Mutation counts and low-count review cues for the active sample set.",
          }
        )
      );
    };

    nmfSeedPublicDefaults();
    nmfUpdatePublicStatus();
    nmfStatus(ownStatus, "Own data ready", "Paste SBS96 spectra or load the active dataset as a template.");
    nmfUpdateSourcePanels();
    await nmfApp.renderers.setup();
    display(nmfSetupRoot);
  </script>

  <script type="text/markdown">
    ## Step 2. Run discovery screen

    The extraction returns learned profiles, sample contributions, run metrics, and reference similarities. Read the reference table as a labeling aid, not as a final assignment.
  </script>

  <script type="module" pinned id="3">
    const nmfDiscoveryRoot = nmfNode("section", "nmf-workflow");
    const nmfDiscoveryControls = nmfNode("div", "workflow-control-grid compact");
    const nmfDiscoveryActions = nmfNode("div", "workflow-button-row");
    const nmfDiscoveryStatus = nmfNode("div", "nmf-status");
    const nmfDiscoveryOutput = nmfNode("div", "nmf-workflow-output");

    const matchCount = nmfSelect([["1", "Top 1"], ["2", "Top 2"], ["3", "Top 3"]], nmfState.matchTopN);
    const matchFloor = nmfRangeInput(nmfState.matchFloor, { min: 0.5, max: 0.95, step: 0.05 });
    const rerunExtraction = nmfButton("Rerun extraction", "primary");

    matchCount.addEventListener("change", async () => {
      nmfState.matchTopN = Number(matchCount.value);
      await nmfApp.renderers.discovery();
    });
    matchFloor.input.addEventListener("input", async () => {
      nmfState.matchFloor = Number(matchFloor.input.value);
      await nmfApp.renderers.discovery();
    });
    rerunExtraction.addEventListener("click", nmfRunExtraction);

    nmfDiscoveryControls.append(
      nmfField("Reference matches", matchCount, "Closest reference rows shown for each learned component."),
      nmfField("Similarity floor", matchFloor.wrapper, "Flags weak labeling candidates without hiding learned components.")
    );
    nmfDiscoveryActions.append(rerunExtraction);
    nmfDiscoveryRoot.append(nmfDiscoveryControls, nmfDiscoveryActions, nmfDiscoveryStatus, nmfDiscoveryOutput);
    nmfApp.statuses.discovery = nmfDiscoveryStatus;

    nmfApp.renderers.discovery = async () => {
      if (!nmfApp.result) {
        nmfStatus(nmfDiscoveryStatus, "Extraction not run", "Run extraction from Step 1 or this section.", "warning");
        nmfDiscoveryOutput.replaceChildren(nmfEmpty("No learned components are available yet."));
        return;
      }
      const rows = nmfFilteredMatchRows();
      const convergence = nmfConvergenceState(nmfApp.result);
      nmfStatus(
        nmfDiscoveryStatus,
        "Discovery screen complete",
        `${nmfResultBestRunLabel(nmfApp.result)}; reconstruction loss ${nmfFormat(nmfApp.result.reconstructionError)}. ${convergence.detail}`,
        convergence.tone
      );
      nmfDiscoveryOutput.replaceChildren(
        metrics([
          { label: "Extracted rank", value: nmfApp.result.rank },
          { label: "Mean sample cosine", value: nmfFormat(nmfApp.result.averageSampleCosineSimilarity) },
          { label: "Reconstruction loss", value: nmfFormat(nmfApp.result.reconstructionError) },
          { label: "Convergence", value: convergence.label },
          { label: "Iterations", value: nmfApp.result.iterations },
          { label: "Samples analyzed", value: nmfApp.result.analysisSettings?.analyzedSamples || Object.keys(nmfApp.result.exposures || {}).length },
          { label: "Compute budget", value: `${nmfApp.result.analysisSettings?.nRuns || nmfState.nRuns} x ${nmfApp.result.analysisSettings?.maxIterations || nmfState.maxIterations}` },
          { label: "Best run", value: nmfResultBestRunLabel(nmfApp.result) },
        ]),
        table(
          rows,
          [
            { key: "extractedSignature", label: "Component" },
            { key: "referenceSignature", label: "Closest reference" },
            { key: "cosineSimilarity", label: "Cosine similarity" },
            { key: "matchStatus", label: "Match status" },
          ],
          {
            maxRows: 12,
            caption: "Similarity summarizes profile shape only. It does not establish etiology.",
          }
        )
      );
    };

    display(nmfDiscoveryRoot);
    await nmfRunExtraction();
  </script>

  <script type="text/markdown">
    ## Step 3. Review interpretability

    A useful discovery screen shows coherent SBS96 structure, interpretable sample-level contributions, and a cohort-wide exposure map. Inspect one learned component and one sample first, then review the cohort exposure structure.
  </script>

  <script type="module" pinned id="4">
    const nmfReviewRoot = nmfNode("section", "nmf-workflow");
    const nmfReviewStatus = nmfNode("div", "nmf-status");
    const nmfDetailTitle = nmfNode("h3", "nmf-section-heading", "Selected component and sample");
    const nmfDetailControls = nmfNode("div", "workflow-control-grid compact");
    const nmfProfilePlot = nmfNode("div", "nmf-plot");
    nmfProfilePlot.classList.add("nmf-profile-plot");
    const nmfProfileOutput = nmfNode("div", "nmf-workflow-output");
    const nmfSampleOutput = nmfNode("div", "nmf-workflow-output");
    const nmfDetailSummaries = nmfNode("div", "nmf-detail-grid");
    const nmfHeatmapTitle = nmfNode("h3", "nmf-section-heading", "Cohort exposure map");
    const nmfHeatmapControls = nmfNode("div", "workflow-control-grid compact");
    const nmfExposurePlot = nmfNode("div", "nmf-plot");
    nmfExposurePlot.classList.add("nmf-compact-heatmap");

    const componentSelect = nmfSelect([], "");
    const exposureScale = nmfSelect([["relative", "Relative per sample"], ["raw", "Raw contribution"]], nmfState.exposureScale);
    const sampleSelect = nmfSelect([], "");

    componentSelect.addEventListener("change", async () => {
      nmfState.selectedSignature = componentSelect.value;
      await nmfApp.renderers.review();
    });
    exposureScale.addEventListener("change", async () => {
      nmfState.exposureScale = exposureScale.value;
      await nmfApp.renderers.review();
    });
    sampleSelect.addEventListener("change", async () => {
      nmfState.selectedSample = sampleSelect.value;
      await nmfApp.renderers.review();
    });

    nmfDetailControls.append(
      nmfField("Component", componentSelect, "Redraws the SBS96 profile for one learned pattern."),
      nmfField("Sample", sampleSelect, "Shows the component mix for one sample.")
    );
    nmfHeatmapControls.append(
      nmfField("Exposure scale", exposureScale, "Redraws the cohort heatmap using relative or raw component contributions.")
    );
    nmfDetailSummaries.append(nmfProfileOutput, nmfSampleOutput);
    nmfReviewRoot.append(
      nmfReviewStatus,
      nmfDetailTitle,
      nmfDetailControls,
      nmfProfilePlot,
      nmfDetailSummaries,
      nmfHeatmapTitle,
      nmfHeatmapControls,
      nmfExposurePlot
    );
    nmfApp.statuses.review = nmfReviewStatus;

    nmfApp.renderers.review = async () => {
      const signatureNames = nmfSignatureNames();
      const sampleNames = Object.keys(nmfApp.result?.exposures || {});
      if (!signatureNames.length || !sampleNames.length) {
        componentSelect.replaceChildren();
        sampleSelect.replaceChildren();
        nmfStatus(nmfReviewStatus, "Review not available", "Run extraction before inspecting learned profiles and exposures.", "warning");
        nmfProfilePlot.replaceChildren(nmfEmpty("No profile is available yet."));
        nmfExposurePlot.replaceChildren(nmfEmpty("No exposure heatmap is available yet."));
        nmfProfileOutput.replaceChildren();
        nmfSampleOutput.replaceChildren();
        return;
      }

      componentSelect.replaceChildren(...signatureNames.map((signature) => {
        const option = document.createElement("option");
        option.value = signature;
        option.textContent = signature;
        return option;
      }));
      sampleSelect.replaceChildren(...sampleNames.map((sample) => {
        const option = document.createElement("option");
        option.value = sample;
        option.textContent = sample;
        return option;
      }));
      if (!signatureNames.includes(nmfState.selectedSignature)) {
        nmfState.selectedSignature = signatureNames[0];
      }
      if (!sampleNames.includes(nmfState.selectedSample)) {
        nmfState.selectedSample = sampleNames[0];
      }
      componentSelect.value = nmfState.selectedSignature;
      sampleSelect.value = nmfState.selectedSample;
      exposureScale.value = nmfState.exposureScale;

      nmfStatus(
        nmfReviewStatus,
        "Profiles and exposures ready",
        sampleNames.length > 60
          ? `The component and sample controls update the detail panel; the exposure-scale control updates the ${sampleNames.length}-sample cohort heatmap.`
          : "Use the detail panel and cohort heatmap together before interpreting a learned pattern.",
        "success"
      );

      const selectedProfile = nmfApp.result.signatures[nmfState.selectedSignature];
      nmfProfilePlot.replaceChildren();
      await mSigSDK.signatureExtractionPlots.plotNMFSignatureProfiles(
        nmfProfilePlot,
        {
          ...nmfApp.result,
          signatures: { [nmfState.selectedSignature]: selectedProfile },
        },
        { maxSignatures: 1 }
      );
      nmfProfileOutput.replaceChildren(
        table(
          nmfTopContextRows(selectedProfile),
          [
            { key: "context", label: "Highest-weight context" },
            { key: "weight", label: "Profile weight" },
          ],
          {
            maxRows: 8,
            caption: "Highest-weight contexts provide a quick profile coherence check.",
          }
        )
      );

      nmfExposurePlot.replaceChildren();
      await mSigSDK.signatureExtractionPlots.plotNMFExposureHeatmap(
        nmfExposurePlot,
        nmfApp.result,
        { relative: nmfState.exposureScale === "relative" }
      );
      nmfSampleOutput.replaceChildren(
        table(
          nmfSampleExposureRows(nmfState.selectedSample),
          [
            { key: "component", label: "Component" },
            { key: "rawExposure", label: "Raw exposure" },
            { key: "withinSampleFraction", label: "Within-sample fraction" },
          ],
          {
            maxRows: 6,
            caption: `Component contributions for ${nmfState.selectedSample}.`,
          }
        )
      );
    };

    display(nmfReviewRoot);
    await nmfApp.renderers.review();
  </script>

  <script type="text/markdown">
    ## Step 4. Compare ranks and export

    A browser rank grid is a triage check. Use it to decide whether discovery is worth a heavier production run, then export the spectra and settings for SigProfilerExtractor.
  </script>

  <script type="module" pinned id="5">
    const nmfRankExportRoot = nmfNode("section", "nmf-workflow");
    const nmfRankControls = nmfNode("div", "workflow-control-grid compact");
    const nmfExportControls = nmfNode("div", "workflow-control-grid compact");
    const nmfRankActions = nmfNode("div", "workflow-button-row");
    const nmfRankExportStatus = nmfNode("div", "nmf-status");
    const nmfRankPlot = nmfNode("div", "nmf-plot");
    const nmfRankOutput = nmfNode("div", "nmf-workflow-output");
    const nmfExportOutput = nmfNode("div", "nmf-workflow-output");

    const rankMin = nmfNumberInput(nmfState.rankMin, { min: 2, max: 8 });
    const rankMax = nmfNumberInput(nmfState.rankMax, { min: 2, max: 8 });
    const rankRuns = nmfNumberInput(nmfState.rankRuns, { min: 1, max: 5 });
    const rankIterations = nmfNumberInput(nmfState.rankIterations, { min: 80, max: 300, step: 20 });
    const rankCriterion = nmfSelect(
      [
        ["diminishing_returns", "Diminishing returns in loss"],
        ["reconstruction_error", "Lowest reconstruction loss"],
        ["cophenetic", "Highest cophenetic correlation"],
        ["silhouette", "Highest silhouette score"],
      ],
      nmfState.rankCriterion
    );
    const exportMin = nmfNumberInput(nmfState.exportMinimumSignatures, { min: 1, max: 8 });
    const exportMax = nmfNumberInput(nmfState.exportMaximumSignatures, { min: 2, max: 10 });
    const exportReplicates = nmfSelect([["50", "50"], ["100", "100"], ["200", "200"]], nmfState.exportReplicates);
    const runRankGrid = nmfButton("Run rank grid", "primary");

    function applyRankControlChanges() {
      nmfState.rankMin = Math.max(2, Math.round(Number(rankMin.value || 2)));
      nmfState.rankMax = Math.max(nmfState.rankMin, Math.round(Number(rankMax.value || nmfState.rankMin)));
      nmfState.rankRuns = Math.max(1, Math.round(Number(rankRuns.value || 1)));
      nmfState.rankIterations = Math.max(80, Math.round(Number(rankIterations.value || 140)));
      nmfState.rankCriterion = rankCriterion.value;
      rankMin.value = String(nmfState.rankMin);
      rankMax.value = String(nmfState.rankMax);
      rankRuns.value = String(nmfState.rankRuns);
      rankIterations.value = String(nmfState.rankIterations);
      nmfApp.rankSelection = null;
    }

    function applyExportControlChanges() {
      nmfState.exportMinimumSignatures = Math.max(1, Math.round(Number(exportMin.value || 1)));
      nmfState.exportMaximumSignatures = Math.max(
        nmfState.exportMinimumSignatures,
        Math.round(Number(exportMax.value || nmfState.exportMinimumSignatures))
      );
      nmfState.exportReplicates = Math.max(1, Math.round(Number(exportReplicates.value || 100)));
      exportMin.value = String(nmfState.exportMinimumSignatures);
      exportMax.value = String(nmfState.exportMaximumSignatures);
      exportReplicates.value = String(nmfState.exportReplicates);
    }

    [rankMin, rankMax, rankRuns, rankIterations, rankCriterion].forEach((control) => {
      control.addEventListener("change", async () => {
        applyRankControlChanges();
        await nmfApp.renderers.rankExport();
      });
    });
    [exportMin, exportMax, exportReplicates].forEach((control) => {
      control.addEventListener("change", async () => {
        applyExportControlChanges();
        await nmfApp.renderers.rankExport();
      });
    });
    runRankGrid.addEventListener("click", async () => {
      applyRankControlChanges();
      await nmfRunRankGrid();
    });

    nmfRankControls.append(
      nmfField("Minimum rank", rankMin, "Smallest candidate rank in the browser grid."),
      nmfField("Maximum rank", rankMax, "Largest candidate rank in the browser grid."),
      nmfField("Grid starts", rankRuns, "Random starts per candidate rank."),
      nmfField("Grid iterations", rankIterations, "Iteration limit per candidate rank."),
      nmfField("Rank criterion", rankCriterion, "Criterion used to mark the recommended rank.")
    );
    nmfExportControls.append(
      nmfField("Minimum signatures", exportMin, "Lower bound for the production extraction run."),
      nmfField("Maximum signatures", exportMax, "Upper bound for the production extraction run."),
      nmfField("Production replicates", exportReplicates, "Replicate count saved in the handoff metadata.")
    );
    nmfRankActions.append(runRankGrid);
    nmfRankExportRoot.append(
      nmfRankControls,
      nmfRankActions,
      nmfRankExportStatus,
      nmfRankPlot,
      nmfRankOutput,
      nmfExportControls,
      nmfExportOutput
    );
    nmfApp.statuses.rankExport = nmfRankExportStatus;

    nmfApp.renderers.rankExport = async () => {
      applyExportControlChanges();
      if (!nmfApp.result) {
        nmfStatus(nmfRankExportStatus, "Extraction required", "Run the discovery screen before comparing ranks or exporting review bundles.", "warning");
        nmfRankPlot.replaceChildren(nmfEmpty("No rank diagnostics are available yet."));
        nmfRankOutput.replaceChildren();
        nmfExportOutput.replaceChildren();
        return;
      }

      if (nmfApp.rankSelection) {
        nmfStatus(
          nmfRankExportStatus,
          `Recommended rank ${nmfApp.rankSelection.recommendedRank}`,
          nmfRankCriterionDetail(nmfApp.rankSelection),
          "success"
        );
        nmfRankPlot.replaceChildren();
        await mSigSDK.signatureExtractionPlots.plotNMFRankSelection(nmfRankPlot, nmfApp.rankSelection);
        nmfRankOutput.replaceChildren(
          table(
            nmfApp.rankSelection.runs.map((run) => ({
              rank: run.rank,
              reconstructionError: nmfFormat(run.reconstructionError),
              meanSampleCosine: nmfFormat(run.averageSampleCosineSimilarity),
              nextLossGain: Number.isFinite(Number(run.nextLossGain)) ? `${(Number(run.nextLossGain) * 100).toFixed(1)}%` : "NA",
              cophenetic: nmfFormat(run.copheneticCorrelation),
              silhouette: nmfFormat(run.averageSilhouette),
              converged: run.converged ? "yes" : "no",
            })),
            [
              { key: "rank", label: "Rank" },
              { key: "reconstructionError", label: "Reconstruction loss" },
              { key: "meanSampleCosine", label: "Mean sample cosine" },
              { key: "nextLossGain", label: "Next loss gain" },
              { key: "cophenetic", label: "Cophenetic" },
              { key: "silhouette", label: "Silhouette" },
              { key: "converged", label: "Converged" },
            ],
            { maxRows: 8 }
          )
        );
      } else {
        nmfStatus(nmfRankExportStatus, "Rank grid not current", "Run the rank grid for the current extraction settings.", "warning");
        nmfRankPlot.replaceChildren(nmfEmpty("Rank diagnostics will appear here after the grid run."));
        nmfRankOutput.replaceChildren();
      }

      const handoff = mSigSDK.adapters.sigProfilerExtractor.prepareInput(
        { spectra: nmfGroupedSpectra() },
        {
          contexts: nmfApp.contexts,
          minimumSignatures: nmfState.exportMinimumSignatures,
          maximumSignatures: nmfState.exportMaximumSignatures,
          nmfReplicates: nmfState.exportReplicates,
        }
      );
      const handoffRows = handoff.files.map((file) => ({
        file: file.path,
        characters: file.text.length,
        role: "SigProfilerExtractor table-mode input",
      }));
      nmfExportOutput.replaceChildren(
        table(
          handoffRows,
          [
            { key: "file", label: "File" },
            { key: "characters", label: "Characters" },
            { key: "role", label: "Role" },
          ],
          {
            maxRows: 4,
            caption: "The export preserves the screened spectra and production extraction settings.",
          }
        ),
        details("Review bundle contents", {
          selectedSamples: nmfSelectedSampleNames(),
          analyzedSamples: nmfAnalysisSampleNames(),
          extractionSettings: {
            rank: nmfState.rank,
            randomStarts: nmfState.nRuns,
            maxIterations: nmfState.maxIterations,
            seed: nmfState.seed,
          },
          productionHandoff: {
            minimumSignatures: nmfState.exportMinimumSignatures,
            maximumSignatures: nmfState.exportMaximumSignatures,
            nmfReplicates: nmfState.exportReplicates,
          },
        }),
        downloadMany([
          ...handoff.files.map((file) => ({
            filename: file.path.split("/").pop(),
            text: file.text,
            label: `Download ${file.path.split("/").pop()}`,
          })),
          {
            filename: "nmf_extraction_bundle.json",
            type: "json",
            value: {
              dataSourceStatus: nmfApp.dataSourceStatus,
              selectedSamples: nmfSelectedSampleNames(),
              browserAnalysis: {
                settings: {
                  rank: nmfState.rank,
                  randomStarts: nmfState.nRuns,
                  maxIterations: nmfState.maxIterations,
                  seed: nmfState.seed,
                },
                extraction: nmfApp.result,
                referenceMatches: nmfApp.matches,
                rankSelection: nmfApp.rankSelection,
              },
              productionHandoff: {
                settings: {
                  minimumSignatures: nmfState.exportMinimumSignatures,
                  maximumSignatures: nmfState.exportMaximumSignatures,
                  nmfReplicates: nmfState.exportReplicates,
                },
                manifest: handoff.manifest,
                pythonSnippet: handoff.pythonSnippet,
              },
            },
            label: "Download NMF review bundle JSON",
          },
        ])
      );
    };

    display(nmfRankExportRoot);
    await nmfRunRankGrid();
  </script>
</notebook>
