  <title>mSigSDK NMF extraction</title>

  <script type="text/markdown">
    # Exploratory NMF signature extraction

    This notebook demonstrates mSigSDK's exploratory de novo extraction path. Instead of fitting known reference signatures, non-negative matrix factorization (NMF) learns a small set of component profiles and sample exposures directly from the spectra.

    Use this as a browser-sized teaching example, not as a full production extraction recipe. For your own data, increase the sample count, rank grid, number of random starts, and maximum iterations only after confirming that the browser can handle the workload.

    The narrative is deliberately different from known-signature fitting. First choose whether the cohort has enough signal for extraction, then inspect extracted profiles, then ask whether sample exposures and rank diagnostics support a stable interpretation, and finally prepare a handoff for production extraction.
  </script>

  <script type="module" pinned id="1">
    const nmfSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-nmf", location.href).href;
    const { mSigSDK } = await import(nmfSdkUrl);
    const {
      demoSignatures,
      demoSpectra,
    } = await import("./msig-notebook-fixtures.js");
    const {
      burdenSampleRows,
      details,
      formatNumber,
      metrics,
      nmfMatchRows,
      table,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Workflow", value: "Exploratory extraction" },
      { label: "Main namespace", value: "signatureExtraction" },
    ]));
    display(table(
      [
        { functionName: "extractSignaturesNMF", workflowValue: "Runs de novo extraction directly in the browser" },
        { functionName: "compareExtractedToReference", workflowValue: "Compares extracted components to known COSMIC profiles" },
        { functionName: "selectNMFRank", workflowValue: "Provides rank diagnostics instead of a fixed black-box rank" },
        { functionName: "presentation.nmfMatchRows", workflowValue: "Formats reference matching as a compact table" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "workflowValue", label: "Workflow capability" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 1. Choose data and NMF settings

    NMF is more sensitive to cohort size, mutation burden, rank, and random starts than known-signature fitting. This example fetches specific high-burden PCAWG WGS Lung-AdenoCA spectra so the browser has enough count-scale signal to extract simple components quickly.

    Edit `nmfRank`, `nmfRuns`, and `nmfMaxIterations` to see the speed and stability tradeoff. In a larger analysis, use more random starts and a broader rank grid.

    If this first step feels underpowered, that is the intended lesson: extraction depends on cohort size, burden, and repeated optimization far more than a quick refit does.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 1, phase: "data", title: "1. Choose data and NMF settings", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const nmfContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const nmfStudy = "PCAWG";
    const nmfGenomeDataType = "WGS";
    const nmfCancerType = "Lung-AdenoCA";
    const nmfMutationType = "SBS";
    const nmfMatrixSize = 96;
    const nmfSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const nmfExampleSampleNames = [
      "SP53810",
      "SP55142",
      "SP55235",
      "SP54113",
      "SP55509",
      "SP53618",
    ];
    const nmfSampleLimit = nmfExampleSampleNames.length;
    const nmfRank = 3;
    const nmfRuns = 3;
    const nmfMaxIterations = 180;

    let nmfDataSourceStatus = "live mSigPortal";
    let nmfAllGroupedSpectra;
    let nmfAllReferenceSignatures;
    try {
      const [nmfRawSpectrumRows, nmfRawSignatureRows] = await Promise.all([
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          nmfStudy,
          nmfExampleSampleNames,
          nmfGenomeDataType,
          nmfCancerType,
          nmfMutationType,
          nmfMatrixSize
        ),
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          nmfGenomeDataType,
          nmfSignatureSetName,
          nmfMutationType,
          nmfMatrixSize,
          10000
        ),
      ]);
      const nmfSpectrumRows = Array.isArray(nmfRawSpectrumRows)
        ? nmfRawSpectrumRows.flat()
        : [];
      const nmfSignatureRows = Array.isArray(nmfRawSignatureRows)
        ? nmfRawSignatureRows.flat()
        : [];
      nmfAllGroupedSpectra =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(nmfSpectrumRows);
      nmfAllReferenceSignatures =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
          nmfSignatureRows,
          "signatureName"
        );
      if (Object.keys(nmfAllGroupedSpectra).length < 3 || Object.keys(nmfAllReferenceSignatures).length < 3) {
        throw new Error("mSigPortal returned too few matrices for NMF review.");
      }
    } catch (error) {
      nmfDataSourceStatus = `embedded fallback: ${error.message}`;
      nmfAllGroupedSpectra = demoSpectra();
      nmfAllReferenceSignatures = demoSignatures();
    }
    const nmfAllBurden = mSigSDK.qc.summarizeMutationBurden(nmfAllGroupedSpectra, {
      expectedContexts: nmfContexts,
    });
    const nmfSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      nmfAllBurden,
      {
        sampleNames: nmfExampleSampleNames.filter((sample) => nmfAllGroupedSpectra[sample]).length
          ? nmfExampleSampleNames.filter((sample) => nmfAllGroupedSpectra[sample])
          : Object.keys(nmfAllGroupedSpectra),
        minTotalMutations: 1,
        limit: nmfSampleLimit,
      }
    );
    const nmfSelectedSampleNames = nmfSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const nmfGroupedSpectra = Object.fromEntries(
      nmfSelectedSampleNames.map((sample) => [sample, nmfAllGroupedSpectra[sample]])
    );

    display(metrics([
      { label: "Data source", value: nmfDataSourceStatus },
      { label: "Samples", value: nmfSelectedSampleNames.length },
      { label: "Rank", value: nmfRank },
      { label: "Random starts", value: nmfRuns },
      { label: "Max iterations", value: nmfMaxIterations },
    ]));
    display(table(
      burdenSampleRows(nmfAllBurden, nmfSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low burden flag" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 2. Extract signatures and compare them to references

    `extractSignaturesNMF` returns extracted profiles, exposures, reconstruction metrics, and run metadata. `compareExtractedToReference` is a post hoc interpretation aid: it finds similar COSMIC profiles, but it does not prove that an extracted component is biologically identical to a named signature.

    Read the reference-match table as an annotation step, not as the extraction result itself. A component with a weak match may still be meaningful, and a component with a strong match still needs stability and cohort-context review.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 2, phase: "analysis", title: "2. Extract signatures and compare them to references", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const nmfResult = mSigSDK.signatureExtraction.extractSignaturesNMF(
      nmfGroupedSpectra,
      {
        rank: nmfRank,
        nRuns: nmfRuns,
        maxIterations: nmfMaxIterations,
        tolerance: 1e-5,
        seed: 123,
        contexts: nmfContexts,
        signaturePrefix: "NMF",
      }
    );
    const nmfMatches = mSigSDK.signatureExtraction.compareExtractedToReference(
      nmfResult.signatures,
      nmfAllReferenceSignatures,
      { contexts: nmfContexts, topN: 3 }
    );

    const nmfReferenceMatchRows = nmfMatchRows(nmfMatches, { maxRows: 9 });

    display(metrics([
      { label: "Extracted rank", value: nmfResult.rank },
      { label: "Converged", value: nmfResult.converged ? "Yes" : "No" },
      { label: "Reconstruction error", value: formatNumber(nmfResult.reconstructionError) },
      { label: "Mean sample cosine", value: formatNumber(nmfResult.averageSampleCosineSimilarity) },
      { label: "Best run", value: nmfResult.bestRun },
    ]));
    display(table(
      nmfReferenceMatchRows,
      [
        { key: "extractedSignature", label: "Extracted component" },
        { key: "referenceSignature", label: "Closest reference" },
        { key: "cosineSimilarity", label: "Cosine similarity" },
      ],
      { maxRows: 9 }
    ));
    display(table(
      nmfReferenceMatchRows.map((row) => ({
        extractedSignature: row.extractedSignature,
        closestReference: row.referenceSignature,
        interpretation: "Similarity aid; not an etiologic assignment",
      })),
      [
        { key: "extractedSignature", label: "Extracted component" },
        { key: "closestReference", label: "Closest reference" },
        { key: "interpretation", label: "Interpretation boundary" },
      ],
      { maxRows: 9 }
    ));
    display(details("Full NMF result and match objects", {
      nmfResult,
      nmfMatches,
    }));
  </script>

  <script type="text/markdown">
    ## 3. Inspect extracted signature profiles

    Profiles are shown through the established mSigPortal SBS96 renderer so the mutation-context colors match COSMIC conventions. New users should first check whether each extracted component has a coherent profile before looking at sample exposures.

    A coherent profile is one that has recognizable context structure rather than scattered noise. If the profile looks unstable, return to sample selection, rank, or random starts before interpreting exposure heatmaps.
  </script>

    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 3, phase: "visualize", title: "3. Inspect extracted signature profiles", mSigSDK, display });
  </script>

  <script type="text/markdown">
    ## 4. Inspect sample exposures

    The exposure heatmap shows whether extracted signatures are broad cohort processes or concentrated in a few samples. A component driven by only one or two samples may still be useful, but it should be interpreted differently from a component distributed across the cohort.

    This is where the extraction story becomes sample-specific: broad components suggest cohort-wide processes, while concentrated components suggest outliers, artifacts, or rare biology that needs follow-up.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 4, phase: "visualize", title: "4. Inspect sample exposures", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    const nmfExposureDiv = document.createElement("div");
    nmfExposureDiv.style.width = "100%";
    await mSigSDK.signatureExtractionPlots.plotNMFExposureHeatmap(
      nmfExposureDiv,
      nmfResult,
      { relative: true }
    );
    display(nmfExposureDiv);
  </script>

  <script type="text/markdown">
    ## 5. Compare candidate ranks

    Rank selection is not a single-number decision. This small grid is intentionally modest for browser performance. In production, use more ranks and random starts, then judge reconstruction, stability, and interpretability together.

    A useful rank should improve reconstruction without splitting a biological process into unstable fragments. Use this table to decide what needs a production rerun, not to declare a final rank from the browser example alone.
  </script>

  <script type="module" pinned id="interactive-step-5">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 5, phase: "review", title: "5. Compare candidate ranks", mSigSDK, display });
  </script>

  <script type="module" pinned id="6">
    const nmfRankSelection = mSigSDK.signatureExtraction.selectNMFRank(
      nmfGroupedSpectra,
      {
        ranks: [2, 3],
        nRuns: 2,
        maxIterations: 120,
        seed: 456,
        contexts: nmfContexts,
      }
    );
    const nmfRankDiv = document.createElement("div");
    nmfRankDiv.style.width = "100%";
    await mSigSDK.signatureExtractionPlots.plotNMFRankSelection(
      nmfRankDiv,
      nmfRankSelection
    );
    display(nmfRankDiv);
  </script>

  <script type="text/markdown">
    ## 6. Prepare production extraction handoff

    Browser NMF is a screening tool. The same spectra can be exported as matrix-mode input for SigProfilerExtractor so production extraction and stability analysis can be run outside the browser.

    The handoff keeps the story connected: the browser identifies whether extraction is worth pursuing, and the production engine runs the heavier stability analysis.
  </script>

  <script type="module" pinned id="interactive-step-6">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "nmf-extraction", step: 6, phase: "export", title: "6. Prepare production extraction handoff", mSigSDK, display });
  </script>

  <script type="module" pinned id="7">
    const nmfExtractorInput = mSigSDK.adapters.sigProfilerExtractor.prepareInput(
      { spectra: nmfGroupedSpectra },
      {
        contexts: nmfContexts,
        minimumSignatures: 2,
        maximumSignatures: 6,
        nmfReplicates: 100,
      }
    );
    const nmfHandoffRows = nmfExtractorInput.files.map((file) => ({
      path: file.path,
      bytes: file.text.length,
      role: "SigProfilerExtractor matrix-mode input",
    }));
    display(table(
      nmfHandoffRows,
      [
        { key: "path", label: "File" },
        { key: "bytes", label: "Characters" },
        { key: "role", label: "Role" },
      ]
    ));

    display(details("SigProfilerExtractor Python handoff snippet", nmfExtractorInput.pythonSnippet, {
      open: true,
    }));
    display(downloadMany([
      ...nmfExtractorInput.files.map((file) => ({
        filename: file.path.split("/").pop(),
        text: file.text,
        label: `Download ${file.path.split("/").pop()}`,
      })),
      {
        filename: "nmf_extraction_report.json",
        type: "json",
        value: {
          dataSourceStatus: nmfDataSourceStatus,
          nmfSettings: {
            rank: nmfRank,
            randomStarts: nmfRuns,
            maxIterations: nmfMaxIterations,
          },
          extraction: nmfResult,
          referenceMatches: nmfMatches,
          rankSelection: nmfRankSelection,
          handoff: {
            manifest: nmfExtractorInput.manifest,
            pythonSnippet: nmfExtractorInput.pythonSnippet,
          },
        },
        label: "Download NMF report JSON",
      },
    ]));
  </script>
