<!doctype html>
<notebook theme="air">
  <title>mSigSDK Panel/WES assay planning</title>

  <script type="text/markdown">
    # Panel/WES assay planning

    Use this page to decide whether a WES or targeted-panel BED file leaves enough usable mutation evidence to review selected mutational signatures.

    The inputs are WGS-like variant rows, a BED target file, a signature catalog, and optional sample details. The notebook filters variants through the selected target territory, builds restricted-assay SBS96 spectra, fits the original and restricted spectra, and summarizes whether the target is usable for signature review.

    If the starting data already came from WES or a panel, load the matching BED file and read the result as an assay planning check for that territory.
  </script>

      loadPublicSbs96Dataset,

          "chr1\t10325411\t10325414\trs17401966.chr1.10385470.10385472",

          "chr1\t17018879\t17018959\tSDHB.chr1.17345375.17345454",
          "chr1\t43672180\t43672278\tMPL.chr1.43871049.43871146",
          "chr2\t47630204\t47630380\tMSH2.chr2.47799426.47799601",
        ].join("\n"),
      },
      wes: {

        url: new URL("../examples/maf/illumina_exome_targeted_regions_v1_2_hg38.bed", location.href).href,
        sourceUrl: "https://support.illumina.com/content/dam/illumina-support/documents/downloads/productfiles/trusight/hg38/Illumina_Exome_TargetedRegions_v1.2.hg38.bed",
        genomeBuild: "GRCh38",
        fallback: [
          "chr1\t12098\t12258\tCEX-chr1-12099-12258",
          "chr1\t12553\t12721\tCEX-chr1-12554-12721",
          "chr1\t13331\t13701\tCEX-chr1-13332-13701",
          "chr1\t30334\t30503\tCEX-chr1-30335-30503",
          "chr1\t35045\t35544\tCEX-chr1-35046-35544",

    const state = {
      variantRows: [],

      signatures: null,
      metadata: [],
      source: "No data loaded",
      callableOpportunities: null,
      referenceOpportunities: null,
      opportunityMode: "not_supplied",
      opportunitySourceLabel: "No callable-opportunity table loaded",
      downsamplingSummary: null,
      publicSelection: null,
      targetPreset: targetPresets.wes,
      cohort: null,
      panel: null,
      lastOpportunityInputs: null,
    };
    const publicCohortOptions = [
      { label: "TCGA LUAD: lung adenocarcinoma", value: "TCGA-LUAD" },
      { label: "TCGA LUSC: lung squamous cell carcinoma", value: "TCGA-LUSC" },
      { label: "TCGA BRCA: breast invasive carcinoma", value: "TCGA-BRCA" },
      { label: "TCGA COAD: colon adenocarcinoma", value: "TCGA-COAD" },
      { label: "TCGA SKCM: skin cutaneous melanoma", value: "TCGA-SKCM" },
      { label: "TCGA HNSC: head and neck squamous carcinoma", value: "TCGA-HNSC" },
    ];

    const root = document.createElement("section");
    root.className = "workflow-panel cohort-panel-lab";
    root.innerHTML = `

        .cohort-panel-plot.primary { border-color: rgba(15, 142, 163, 0.5); background: rgba(15, 142, 163, 0.05); }
        .cohort-panel-plot h3 { margin: 0 0 0.55rem; font-size: 1rem; }
        .cohort-panel-plot-host { min-height: 24rem; overflow: auto; }
        .cohort-panel-plot.primary .cohort-panel-plot-host { min-height: 31rem; }
        .cohort-panel-plot.secondary .cohort-panel-plot-host { min-height: 0; overflow: visible; }
        .cohort-panel-status { font-weight: 700; color: #0d6f7f; }
        .cohort-panel-table-wrap { overflow-x: auto; border: 1px solid rgba(16, 82, 100, 0.18); border-radius: 8px; }
        .cohort-panel-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
        .cohort-panel-table th,
        .cohort-panel-table td { padding: 0.55rem 0.65rem; border-bottom: 1px solid rgba(16, 82, 100, 0.16); text-align: left; vertical-align: top; }
        .cohort-panel-table th { font-weight: 800; color: #123245; background: rgba(255,255,255,0.24); }
        .cohort-panel-table tr:last-child td { border-bottom: 0; }
        .cohort-panel-review-summary { display: grid; gap: 0.7rem; }

        .cohort-panel-review-list li { margin: 0.25rem 0; }
        .cohort-panel-plot-host svg { display: block; width: 100%; height: auto; min-width: 560px; }
        .cohort-panel-plot.secondary .cohort-panel-plot-host svg { max-width: 760px; min-width: 0; }
        .cohort-panel-chart-note { margin-top: 0.5rem; color: #547184; font-size: 0.85rem; }
        @media (max-width: 760px) {
          .cohort-panel-grid,
          .cohort-panel-grid.three,
          .cohort-panel-guide-grid,

          .cohort-panel-plots { grid-template-columns: 1fr; }
        }
      </style>
    `;

    const stepData = section(
      "1. Choose data",
      "Load WGS-like variant rows, a panel or WES BED target file, signatures, and sample details."
    );
    const dataGuide = div(
      "cohort-panel-guide",
      focusMessage(
        "Signature fitting and assay support answer different questions.",
        "The fit asks which known signatures explain the observed mutations. The panel/WES review asks whether the assay could observe enough of the relevant sequence contexts to trust that fitted signature."
      ),
      infoCards([
        {
          title: "WGS-derived spectra",
          text: "Load public TCGA/GDC MAF rows or project variant rows. The page measures how many mutations remain after the selected BED target is applied.",
        },
        {
          title: "Already WES or panel",
          text: "Load those variant rows with the matching target BED. The result describes whether the target supports review of the selected signatures.",
        },
        {
          title: "BED target files",
          text: "Use the bundled real Illumina Exome hg38 BED, the real TruSight Cancer hg38 BED, or paste a project capture BED. WES downsampling is interval filtering through exonic or capture-kit targets.",
        },
      ])
    );
    const publicProjectSelect = select(publicCohortOptions);
    const publicTargetSelect = select([
      { label: "WES: Illumina Exome v1.2 hg38", value: "wes" },
      { label: "Panel: TruSight Cancer v1.0 hg38", value: "panel" },
    ]);
    const publicMaxFilesInput = input("8", "number", "1");
    publicMaxFilesInput.max = "12";
    const publicMaxVariantsInput = input("2000", "number", "20");
    publicMaxVariantsInput.max = "2000";
    const loadPublicButton = button("Load selected public cohort", "primary");
    const applyDataButton = button("Apply pasted/uploaded data", "primary");
    const publicSource = div(
      "cohort-panel-source",
      (() => {
        const title = document.createElement("strong");
        title.textContent = "Public TCGA/GDC variant rows";
        return title;
      })(),
      p("cohort-panel-status", "Choose a public cohort and assay target. The loader fetches masked somatic mutation rows from GDC and uses the selected real BED target file."),
      div(
        "cohort-panel-grid",
        field("Public cohort", publicProjectSelect),
        field("Assay target", publicTargetSelect),
        field("MAF files", publicMaxFilesInput, "Each GDC MAF file represents one tumor sample."),
        field("Variant row cap", publicMaxVariantsInput, "Rows are sampled across loaded MAF files to keep browser execution responsive.")
      ),
      div("cohort-panel-actions", loadPublicButton)
    );

    const variantRowsText = textarea("Paste variant rows as JSON, CSV, or TSV", 7);
    const bedText = textarea("Paste BED intervals: chrom, start, end", 5);
    const signaturesText = textarea("Paste signature JSON or COSMIC-style TSV");
    const metadataText = textarea("Optional sample details CSV, TSV, or JSON", 5);
    const ownData = document.createElement("details");
    ownData.open = true;
    ownData.append(
      summary("Paste small local inputs"),
      div(
        "cohort-panel-grid",
        field("WGS-like variant rows", variantRowsText, "Rows need sample, chromosome, position, reference allele, alternate allele, and variant type. Row-supplied trinucleotide context is used when present."),
        field("BED target file", bedText, "BED uses 0-based start and half-open end. A 1-based variant position is retained when position > start and position <= end. For WES, use exonic or exome capture intervals from the assay kit."),
        field("Upload variant rows", fileInput(variantRowsText)),
        field("Upload BED", fileInput(bedText, ".bed,.txt,.tsv,.csv")),
        field("Signature catalog", signaturesText, "Object keyed by signature or COSMIC-style matrix."),
        field("Upload signatures", fileInput(signaturesText)),
        field("Sample details", metadataText, "Optional rows with sample plus group columns."),
        field("Upload sample details", fileInput(metadataText))
      ),
      div("cohort-panel-actions", applyDataButton)
    );

    const dataOutput = div("cohort-panel-output");
    stepData.append(dataGuide, publicSource, ownData, dataOutput);

    const stepRun = section(
      "2. Set planning rules and run",
      "Set the mutation-count and evidence-tier thresholds used to judge whether the target can support signature review."
    );
    const groupKeyInput = input("burdenGroup");
    const exposureThresholdInput = input("0.01", "number", "0.005");
    const lowBurdenInput = input("100", "number", "10");
    const minAssessableInput = input("30", "number", "5");
    const limitedSupportInput = input("0.05", "number", "0.01");
    const higherSupportInput = input("0.20", "number", "0.01");
    const coverageScaleInput = input("1", "number", "0.1");
    const genomeBuildInput = input("GRCh38");
    const signaturesToPlanInput = input("");
    signaturesToPlanInput.placeholder = "All loaded signatures";
    const runButton = button("Run assay plan", "primary");
    const runStatus = p("cohort-panel-status", "Load data, then run.");
    const advancedRules = document.createElement("details");
    advancedRules.open = true;
    advancedRules.append(
      summary("Assay planning settings"),
      div(
        "cohort-panel-grid",
        field("Low mutation-count cutoff", lowBurdenInput),
        field("Minimum assessable mutations", minAssessableInput),
        field("BED downsampling scale", coverageScaleInput, "1 uses the BED target as loaded. Lower values simulate stricter callable territory by scaling retained-context opportunities after BED filtering."),
        field("Genome build label", genomeBuildInput)
      )
    );
    stepRun.append(
      div(
        "cohort-panel-grid",
        field("Sample group column", groupKeyInput, "Use a column from the sample details table."),
        field("Minimum signature contribution", exposureThresholdInput),
        field("Signatures to plan for", signaturesToPlanInput, "Comma-separated signature names. Leave blank to include every loaded signature."),
        field("Limited-support cutoff", limitedSupportInput),
        field("Higher-support cutoff", higherSupportInput)
      ),
      advancedRules,
      div("cohort-panel-actions", runButton, runStatus)
    );

    const stepReview = section(
      "3. Review assay plan",
      "Read target retention, assessability, and review blockers before using the assay for signature interpretation."
    );
    const reviewOutput = div("cohort-panel-output");
    const plotOutput = div("cohort-panel-plots");
    stepReview.append(reviewOutput, plotOutput);

    const stepDownload = section(
      "4. Download files",
      "Save the assay-planning summaries, evidence calls, and full run bundle."
    );
    const downloadOutput = div("cohort-panel-output");
    stepDownload.append(downloadOutput);

    root.append(stepData, stepRun, stepReview, stepDownload);
    display(root);

    loadPublicButton.addEventListener("click", () => loadSelectedPublicCohort());

    async function loadSelectedPublicCohort() {
      await withBusy(loadPublicButton, "Loading...", async () => {
        const targetMode = publicTargetSelect.value || "wes";
        const project = publicProjectSelect.value || "TCGA-LUAD";
        const preset = targetPresets[targetMode] || targetPresets.wes;
        const maxFiles = Math.max(1, Math.min(12, Math.round(numberValue(publicMaxFilesInput.value, 8))));
        const maxVariants = Math.max(20, Math.min(2000, Math.round(numberValue(publicMaxVariantsInput.value, 2000))));
        dataOutput.replaceChildren(note(`Loading ${project} public MAF rows and ${preset.label}...`));
        genomeBuildInput.value = preset.genomeBuild || "GRCh38";
        const [dataset, mafData] = await Promise.all([
          loadPublicSbs96Dataset(mSigSDK, publicSbs96SelectionForProject(project, { sampleLimit: Math.min(maxFiles, 8) })),
          loadPublicMafRows(mSigSDK, { projects: [project], maxFiles, maxVariants }),
        ]);
        const publicVariants = normalizeVariantRows(mafData.rows);
        if (!publicVariants.length) {
          throw new Error(`No usable SNV rows were loaded from ${project}.`);
        }
        const defaultBedText = await loadDefaultBedText(targetMode);
        const bedRows = parseBed(defaultBedText);
        const derived = await deriveBedRestrictedData(publicVariants, bedRows, { genomeBuild: genomeBuildInput.value || preset.genomeBuild || "GRCh38" });
        state.variantRows = publicVariants;
        state.bedRows = bedRows;
        state.bedText = defaultBedText;
        state.bedSource = preset.source;
        state.targetMode = targetMode;
        state.targetPreset = preset;
        state.spectra = derived.spectra;
        state.restrictedSpectra = derived.restrictedSpectra;
        state.signatures = dataset.signatures;
        state.metadata = publicMafMetadata(mafData, publicVariants);
        state.source = `${mafData.source} variant rows with ${preset.label} downsampling`;
        state.publicSelection = {
          project,
          maxFiles,
          maxVariants,
          selectedFiles: mafData.selectedFiles,
          signatureCatalog: dataset.selection?.signatureSetName || "COSMIC_v3_Signatures_GRCh37_SBS96",
          targetName: preset.source,
          targetSourceUrl: preset.sourceUrl,
        };
        state.callableOpportunities = derived.callableOpportunities;
        state.referenceOpportunities = derived.referenceOpportunities;
        state.opportunityMode = "bed";
        state.opportunitySourceLabel = "BED-derived retained-context opportunities";
        state.downsamplingSummary = derived.summary;
        variantRowsText.value = cpRowsToCsv(publicVariants);
        bedText.value = defaultBedText;
        signaturesText.value = JSON.stringify(state.signatures, null, 2);
        signaturesToPlanInput.placeholder = Object.keys(state.signatures || {}).join(", ") || "All loaded signatures";
        metadataText.value = cpRowsToCsv(state.metadata);
        renderDataPreview();
        clearResults();
        runStatus.textContent = `${project} public cohort loaded with ${preset.label}. Adjust settings or run.`;
      });
    }

    applyDataButton.addEventListener("click", async () => {
      await withBusy(applyDataButton, "Applying...", async () => {
        try {
        const variantRows = parseVariantRows(variantRowsText.value);
        const bedRows = parseBed(bedText.value);
        const derived = await deriveBedRestrictedData(variantRows, bedRows, { genomeBuild: genomeBuildInput.value || "GRCh38" });
        state.variantRows = variantRows;
        state.bedRows = bedRows;
        state.bedText = bedText.value;
        state.bedSource = "Project BED";
        state.targetMode = "custom";
        state.targetPreset = null;
        state.spectra = derived.spectra;
        state.restrictedSpectra = derived.restrictedSpectra;
        state.signatures = parseMatrix(signaturesText.value, "signatures");
        state.metadata = parseMetadata(metadataText.value);
        state.callableOpportunities = derived.callableOpportunities;
        state.referenceOpportunities = derived.referenceOpportunities;
        state.opportunityMode = "bed";
        state.opportunitySourceLabel = "BED-derived retained-context opportunities";
        state.downsamplingSummary = derived.summary;
        state.source = "Project variant rows with BED target downsampling";
        state.publicSelection = null;
        signaturesToPlanInput.placeholder = Object.keys(state.signatures || {}).join(", ") || "All loaded signatures";
        renderDataPreview();
        clearResults();
        runStatus.textContent = "Project data applied. Adjust settings or run.";
        } catch (error) {
          dataOutput.replaceChildren(errorBox(error));
          runStatus.textContent = "Fix the input tables before running.";
        }
      });
    });

    runButton.addEventListener("click", async () => {
      await withBusy(runButton, "Running...", async () => {
        if (!state.spectra || !state.restrictedSpectra || !state.signatures) {
          throw new Error("Load a public cohort or apply project variant rows, a BED target file, and signatures before running.");
        }
        runStatus.textContent = "Running WGS fit, BED-restricted fit, and assay planning summary...";
        reviewOutput.replaceChildren(note("Running current data and settings."));
        plotOutput.replaceChildren();
        downloadOutput.replaceChildren();
        const params = readParams();
        const opportunityInputs = activeOpportunityInputs(params);
        const runParams = {
          ...params,
          callableOpportunitySource: opportunityInputs.sourceLabel,
          callableOpportunityMode: opportunityInputs.mode,
        };
        const cohort = await mSigSDK.workflows.runCohortFit(
          { spectra: state.spectra, signatures: state.signatures, metadata: state.metadata },
          {
            contexts,
            expectedContexts: contexts,
            groupKey: params.groupKey,
            exposureThreshold: params.exposureThreshold,
            lowBurdenThreshold: params.lowBurdenThreshold,
            thresholds: [0, params.exposureThreshold, params.limitedSupportExposureThreshold, params.higherSupportExposureThreshold],
            runThresholdSensitivity: true,
            runBootstrap: false,
            reportFormat: "object",
          }
        );
        const panel = await mSigSDK.workflows.runPanelWorkflow(
          {
            spectra: state.restrictedSpectra,
            signatures: state.signatures,
            ...(opportunityInputs.callableOpportunities ? { callableOpportunities: opportunityInputs.callableOpportunities } : {}),
            ...(opportunityInputs.referenceOpportunities ? { referenceOpportunities: opportunityInputs.referenceOpportunities } : {}),
            opportunitySource: opportunityInputs.opportunitySource,
            referenceOpportunitySource: opportunityInputs.referenceOpportunitySource,
          },
          {
            contexts,
            expectedContexts: contexts,
            minAssessableMutations: params.minAssessableMutations,
            limitedSupportExposureThreshold: params.limitedSupportExposureThreshold,
            higherSupportExposureThreshold: params.higherSupportExposureThreshold,
            lowBurdenThreshold: params.lowBurdenThreshold,
            genomeBuild: params.genomeBuild,
            runBootstrap: false,
            runThresholdSensitivity: false,
            reportFormat: "object",
          }
        );
        state.cohort = cohort;
        state.panel = panel;
        state.lastOpportunityInputs = opportunityInputs;
        renderResults(runParams, cohort, panel);
        renderDownloads(runParams, cohort, panel, opportunityInputs);
        runStatus.textContent = `Updated ${new Date().toLocaleTimeString()}.`;
      }).catch((error) => {
        reviewOutput.replaceChildren(errorBox(error));
        runStatus.textContent = "Run failed.";
      });
    });

    await loadSelectedPublicCohort();

    function renderDataPreview() {
      const samples = Object.keys(state.spectra || {});
      const signatures = Object.keys(state.signatures || {});
      const opportunitySummary = summarizeOpportunityInput(state.callableOpportunities, state.referenceOpportunities);
      const downsampleSummary = state.downsamplingSummary || {};
      const previewDetails = document.createElement("details");
      previewDetails.append(
        summary("Inspect loaded tables"),
        div(
          "cohort-panel-data-preview",
          compactTable((state.variantRows || []).slice(0, 8), ["sample", "chromosome", "start_position", "reference_allele", "tumor_seq_allele2", "context"]),
          compactTable((state.bedRows || []).slice(0, 8), ["chrom", "start", "end", "name"]),
          compactTable(sampleRows(state.spectra).slice(0, 6), ["sample", "mutations", "nonZeroContexts"]),
          compactTable(sampleRows(state.restrictedSpectra).slice(0, 6), ["sample", "mutations", "nonZeroContexts"]),
          state.metadata.length
            ? compactTable(state.metadata.slice(0, 6), previewColumns(state.metadata))

    function readParams() {
      const availableSignatures = Object.keys(state.signatures || {});
      return {
        groupKey: groupKeyInput.value.trim() || "burdenGroup",
        exposureThreshold: numberValue(exposureThresholdInput.value, 0.01),
        lowBurdenThreshold: numberValue(lowBurdenInput.value, 100),
        minAssessableMutations: Math.max(1, Math.round(numberValue(minAssessableInput.value, 30))),
        limitedSupportExposureThreshold: numberValue(limitedSupportInput.value, 0.05),
        higherSupportExposureThreshold: numberValue(higherSupportInput.value, 0.2),
        coverageScale: numberValue(coverageScaleInput.value, 1),
        genomeBuild: genomeBuildInput.value.trim() || "GRCh38",
        selectedSignatures: signatureSelectionFromInput(signaturesToPlanInput.value, availableSignatures),
      };
    }

    function signatureSelectionFromInput(value, availableSignatures = []) {
      const available = availableSignatures.filter(Boolean);
      const requested = String(value || "")
        .split(",")
        .map((entry) => entry.trim())
        .filter(Boolean);
      if (!requested.length) return available;
      const availableSet = new Set(available);
      const unknown = requested.filter((signature) => !availableSet.has(signature));
      if (unknown.length) {
        throw new Error(`Unknown signature name${unknown.length === 1 ? "" : "s"}: ${unknown.join(", ")}`);
      }
      return requested;
    }

    function parseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind === "spectra" ? "Spectra" : "Signature"} table is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      } catch (_error) {
        // Try table formats below.
      }
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed)
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed);
    }

    function parseMetadata(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      try {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return normalizeMetadata(parsed);
        if (parsed && typeof parsed === "object") {
          return normalizeMetadata(Object.entries(parsed).map(([sample, fields]) => ({ sample, ...(fields || {}) })));
        }
      } catch (_error) {
        return normalizeMetadata(parseCsv(trimmed));
      }
      return [];
    }

    function publicSbs96SelectionForProject(project, overrides = {}) {
      const cancerByProject = {
        "TCGA-LUAD": "Lung-AdenoCa",
        "TCGA-LUSC": "Lung-SCC",
        "TCGA-BRCA": "Breast-AdenoCa",
        "TCGA-COAD": "ColoRect-AdenoCa",
        "TCGA-SKCM": "Skin-Melanoma",
        "TCGA-HNSC": "Head-SCC",
      };
      return {
        study: "TCGA",
        cancerType: cancerByProject[project] || "Lung-AdenoCa",
        genomeDataType: "WES",
        mutationType: "SBS",
        matrixSize: 96,
        signatureSetName: "COSMIC_v3_Signatures_GRCh37_SBS96",
        sampleLimit: 4,
        ...overrides,
      };
    }

    function publicMafMetadata(mafData, variantRows = []) {
      const rowsByFile = new Map((mafData?.mafIndex?.[mafData.projects?.[0]]?.samples_description || []).map((row) => [row.file_id, row]));
      const samples = cpUnique(variantRows.map((row) => row.sample));
      const mutationCounts = Object.fromEntries(samples.map((sample) => [
        sample,
        variantRows.filter((row) => row.sample === sample).length,
      ]));
      const ranked = [...samples].sort((a, b) => mutationCounts[b] - mutationCounts[a]);
      const higherBurden = new Set(ranked.slice(0, Math.max(1, Math.ceil(ranked.length / 2))));
      return samples.map((sample) => {
        const match = rowsByFile.get(sample) || {};
        return {
          sample,
          case: match.case_submitter_id || sample,
          project: match.project_id || mafData.projects?.[0] || "",
          sex: match.gender || "",
          race: match.race || "",
          tissueType: match.tissue_type || "",
          tumorDescriptor: match.tumor_descriptor || "",
          mutationRows: mutationCounts[sample] || 0,
          burdenGroup: higherBurden.has(sample) ? "higher" : "lower",
          source: "TCGA/GDC MAF",
        };
      });
    }

    async function loadDefaultBedText(targetMode = "wes") {
      const preset = targetPresets[targetMode] || targetPresets.wes;
      try {
        const response = await fetch(preset.url);
        if (response.ok) return await response.text();
      } catch (_error) {
        // Use the embedded fallback below when the local file is unavailable.
      }
      return preset.fallback;
    }

    function parseVariantRows(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error("Variant rows are required for BED downsampling.");
      let rows;
      try {
        const parsed = JSON.parse(trimmed);
        rows = Array.isArray(parsed) ? parsed : Object.values(parsed || {}).flat();
      } catch (_error) {
        rows = parseCsv(trimmed);
      }
      const normalized = normalizeVariantRows(rows);
      if (!normalized.length) {
        throw new Error("No usable variant rows were found. Provide sample, chromosome, position, reference allele, alternate allele, and variant type.");
      }
      return normalized;
    }

    function normalizeVariantRows(rows) {
      return (Array.isArray(rows) ? rows : [])
        .map((row, index) => {
          const chromosome = firstValue(row, ["chromosome", "Chromosome", "chrom", "Chrom", "chr", "Chr"]);
          const position = firstValue(row, [
            "start_position",
            "Start_Position",
            "chromosome_start",
            "Chromosome_Start",
            "position",
            "Position",
            "pos",
          ]);
          const sample = firstValue(row, ["sample", "Sample", "sample_id", "sampleId", "Tumor_Sample_Barcode", "project_code"]) || "sample_1";
          const reference = firstValue(row, ["reference_allele", "Reference_Allele", "reference_genome_allele", "ref", "Ref"]);
          const alternate = firstValue(row, ["tumor_seq_allele2", "Tumor_Seq_Allele2", "mutated_to_allele", "alt", "Alt"]);
          const variantType = firstValue(row, ["variant_type", "Variant_Type", "mutation_type", "Mutation_Type"]) || "SNP";
          return {
            ...row,
            sample: String(sample),
            chromosome: normalizeChromosomeLabel(chromosome),
            start_position: Number(position),
            reference_allele: String(reference || "").toUpperCase(),
            tumor_seq_allele2: String(alternate || "").toUpperCase(),
            variant_type: String(variantType || "SNP"),
            context: firstValue(row, ["context", "Context", "trinucleotide_context", "sequence_context", "context_sequence"]),
            build: firstValue(row, ["build", "Build", "genome", "Genome"]) || "hg19",
            variant_id: firstValue(row, ["variant_id", "id", "ID"]) || `variant_${index + 1}`,
          };
        })
        .filter((row) =>
          row.chromosome &&
          Number.isFinite(row.start_position) &&
          /^[ACGT]$/.test(row.reference_allele) &&
          /^[ACGT]$/.test(row.tumor_seq_allele2)
        );
    }

    function parseBed(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error("A BED target file is required.");
      const rows = [];
      for (const line of trimmed.split(/\r?\n/)) {
        const clean = line.trim();
        if (!clean || clean.startsWith("#") || /^track\b/i.test(clean) || /^browser\b/i.test(clean)) continue;
        const cells = clean.includes("\t") ? clean.split(/\t+/) : clean.split(/[,\s]+/);
        if (/^(chrom|chromosome|chr)$/i.test(cells[0]) && /start/i.test(cells[1] || "")) continue;
        const chrom = normalizeChromosomeLabel(cells[0]);
        const start = Number(cells[1]);
        const end = Number(cells[2]);
        if (!chrom || !Number.isFinite(start) || !Number.isFinite(end) || end <= start) continue;
        rows.push({ chrom, start, end, name: cells[3] || `target_${rows.length + 1}` });
      }
      if (!rows.length) throw new Error("No valid BED intervals were found. Each row needs chrom, start, and end.");
      return rows;
    }

    async function deriveBedRestrictedData(variantRows, bedRows, { genomeBuild = "GRCh38" } = {}) {
      const normalizedVariants = normalizeVariantRows(variantRows);
      const normalizedBed = bedRows.map((row) => ({
        chrom: normalizeChromosomeLabel(row.chrom || row.chromosome),
        start: Number(row.start),
        end: Number(row.end),
        name: row.name || "",
      })).filter((row) => row.chrom && Number.isFinite(row.start) && Number.isFinite(row.end) && row.end > row.start);
      const bedIndex = buildBedIndex(normalizedBed);
      const retainedVariants = normalizedVariants.filter((variant) => variantInBed(variant, bedIndex));
      if (!retainedVariants.length) {
        throw new Error("The BED file did not retain any variants. Check chromosome labels, coordinate system, and genome build.");
      }
      const sampleNames = cpUnique(normalizedVariants.map((row) => row.sample));
      const spectra = await variantsToSpectra(normalizedVariants, sampleNames, genomeBuild);
      const restrictedSpectra = await variantsToSpectra(retainedVariants, sampleNames, genomeBuild);
      const referenceOpportunities = contextTotals(spectra);
      const callableOpportunities = contextTotals(restrictedSpectra);
      const retainedFraction = retainedVariants.length / Math.max(normalizedVariants.length, 1);
      return {
        spectra,
        restrictedSpectra,
        callableOpportunities,
        referenceOpportunities,
        retainedVariants,
        summary: {
          totalVariants: normalizedVariants.length,
          retainedVariants: retainedVariants.length,
          retainedFraction,
          bedIntervals: normalizedBed.length,
          originalMutations: Math.round(sumRecord(contextTotals(spectra))),
          restrictedMutations: Math.round(sumRecord(contextTotals(restrictedSpectra))),
          method: "Variant rows were filtered by BED intervals before SBS96 conversion.",
          coordinateSystem: "BED 0-based half-open intervals; variant positions 1-based.",
        },
      };
    }

    async function variantsToSpectra(rows, sampleNames, genomeBuild) {
      const rowsWithProjectCode = rows.map((row) => ({
        ...row,
        project_code: row.sample,
      }));
      const hasContext = rowsWithProjectCode.every((row) => row.context || row.trinucleotide_context || row.sequence_context || row.context_sequence);
      const spectra = await mSigSDK.userData.convertMatrix(
        rowsWithProjectCode,
        "sample",
        50,
        normalizeGenomeBuild(genomeBuild),
        false,
        { offline: hasContext }
      );
      return ensureSpectraSamples(spectra, sampleNames);
    }

    function ensureSpectraSamples(spectra, sampleNames) {
      const output = { ...(spectra || {}) };
      for (const sample of sampleNames) {
        if (!output[sample]) {
          output[sample] = Object.fromEntries(contexts.map((context) => [context, 0]));
        }
      }
      return output;
    }

    function buildBedIndex(bedRows) {
      const index = new Map();
      for (const interval of bedRows || []) {
        const chrom = normalizeChromosomeLabel(interval.chrom);
        if (!index.has(chrom)) index.set(chrom, []);
        index.get(chrom).push({
          start: Number(interval.start),
          end: Number(interval.end),
        });
      }
      for (const intervals of index.values()) {
        intervals.sort((a, b) => a.start - b.start || a.end - b.end);
        let writeIndex = 0;
        for (const interval of intervals) {
          const previous = intervals[writeIndex - 1];
          if (previous && interval.start <= previous.end) {
            previous.end = Math.max(previous.end, interval.end);
          } else {
            intervals[writeIndex] = { ...interval };
            writeIndex += 1;
          }
        }
        intervals.length = writeIndex;
      }
      return index;
    }

    function variantInBed(variant, bedIndex) {
      const position = Number(variant.start_position);
      const intervals = bedIndex.get(normalizeChromosomeLabel(variant.chromosome)) || [];
      let left = 0;
      let right = intervals.length - 1;
      while (left <= right) {
        const middle = Math.floor((left + right) / 2);
        const interval = intervals[middle];
        if (position <= interval.start) {
          right = middle - 1;
        } else if (position > interval.end) {
          left = middle + 1;
        } else {
          return true;
        }
      }
      return false;
    }

    function contextTotals(spectra = {}) {
      const totals = Object.fromEntries(contexts.map((context) => [context, 0]));
      for (const spectrum of Object.values(spectra || {})) {
        for (const context of contexts) {
          totals[context] += Number(spectrum?.[context] || 0);
        }
      }
      return totals;
    }

    function firstValue(row, keys) {
      for (const key of keys) {
        if (row && row[key] !== undefined && row[key] !== null && row[key] !== "") return row[key];
      }
      return null;
    }

    function normalizeChromosomeLabel(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return text.replace(/^chr/i, "");
    }

    function normalizeGenomeBuild(value) {
      const text = String(value || "hg19").trim().toLowerCase();
      if (text === "grch37") return "hg19";
      if (text === "grch38") return "hg38";
      return text || "hg19";
    }

    function targetModeLabel(mode) {
      if (mode === "wes") return "Illumina Exome hg38 BED";
      if (mode === "panel") return "TruSight Cancer hg38 BED";
      return "Project BED";
    }

    function activeOpportunityInputs(params) {
      if (state.opportunityMode === "bed") {
        return {
          callableOpportunities: scaleOpportunityRecord(state.callableOpportunities, params.coverageScale),
          referenceOpportunities: state.referenceOpportunities,
          mode: "bed",
          opportunitySource: "user_supplied",
          referenceOpportunitySource: state.referenceOpportunities ? "user_supplied_reference_opportunities" : "not_supplied",
          sourceLabel: `BED-derived retained-context opportunities, scale ${params.coverageScale}`,
        };
      }
      if (state.callableOpportunities) {
        return {
          callableOpportunities: state.callableOpportunities,
          referenceOpportunities: state.referenceOpportunities,
          mode: "project",
          opportunitySource: "user_supplied",
          referenceOpportunitySource: state.referenceOpportunities ? "user_supplied_reference_opportunities" : "not_supplied",
          sourceLabel: state.opportunitySourceLabel,
        };
      }
      return {
        callableOpportunities: null,
        referenceOpportunities: null,
        mode: "not_supplied",
        opportunitySource: "not_supplied",
        referenceOpportunitySource: "not_supplied",
        sourceLabel: "Full-context coverage assumed for screening",
      };
    }

    function parseCsv(text) {
      const delimiter = String(text).includes("\t") ? "\t" : ",";
      const rows = String(text).trim().split(/\r?\n/).filter(Boolean).map((line) => splitDelimited(line, delimiter));
      const headers = rows.shift() || [];
      return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header.trim(), values[index] ?? ""])));
    }

    function splitDelimited(line, delimiter) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const character = line[index];
        const next = line[index + 1];
        if (character === "\"" && quoted && next === "\"") {
          cell += "\"";
          index += 1;
        } else if (character === "\"") {
          quoted = !quoted;
        } else if (character === delimiter && !quoted) {
          cells.push(cell);
          cell = "";
        } else {
          cell += character;
        }
      }
      cells.push(cell);
      return cells;
    }

    function normalizeMetadata(rows) {
      return (Array.isArray(rows) ? rows : [])
        .map((row) => ({
          ...row,
          sample: row.sample || row.Sample || row.sample_id || row.sampleId || row.Tumor_Sample_Barcode || row.id,
        }))
        .filter((row) => row.sample);
    }

    function cpRowsToCsv(rows = []) {
      const data = Array.isArray(rows) ? rows : [];
      if (!data.length) return "";
      const headers = [...new Set(data.flatMap((row) => Object.keys(row || {})))];
      const escape = (value) => {
        const text = value == null ? "" : String(value);
        return /[",\n\r]/.test(text) ? `"${text.replaceAll("\"", "\"\"")}"` : text;
      };
      return [headers.join(","), ...data.map((row) => headers.map((header) => escape(row?.[header])).join(","))].join("\n");
    }

    function sampleRows(spectra = {}) {
      return Object.entries(spectra || {}).map(([sample, record]) => ({
        sample,
        mutations: Math.round(sumRecord(record)),
        nonZeroContexts: Object.values(record || {}).filter((value) => Number(value) > 0).length,
      }));
    }

    function opportunityPreviewRows(callable = {}, reference = null) {
      return Object.entries(callable || {}).map(([context, callableOpportunity]) => ({
        context,
        callableOpportunity,
        referenceOpportunity: reference?.[context] ?? "",
      }));
    }

    function opportunityRowsToCsv(callable = {}, reference = null) {
      return cpRowsToCsv(opportunityPreviewRows(callable, reference));
    }

    function summarizeOpportunityInput(callable = null, reference = null) {
      const callableContexts = callable ? Object.values(callable).filter((value) => Number(value) > 0).length : 0;
      const referenceContexts = reference ? Object.values(reference).filter((value) => Number(value) > 0).length : 0;
      return { callableContexts, referenceContexts };
    }

    function panelRows(result) {
      return Object.entries(result?.panel?.evidenceCalls || {}).flatMap(([sample, calls]) =>
        (calls || []).map((call) => ({
          sample,
          signature: call.signatureName,
          exposure: call.exposure,
          tier: call.tier,
          assessability: call.assessabilityClass,
          totalMutations: call.totalMutations,
          expectedSignatureMutations: call.restrictedAssayEvidence?.expectedSignatureMutations,
          expectedCallableSignatureMutations: call.restrictedAssayEvidence?.expectedCallableSignatureMutations,
          callableSignatureMass: call.restrictedAssayEvidence?.callableEvidence?.signatureMassInCallableContexts,
          reasons: (call.assessabilityReasons || []).map((reason) => reason.detail || reason.code).join("; "),
        }))
      );
    }

    function planningSignatureRows(cohort, panel, params) {
      const signatures = params.selectedSignatures || Object.keys(state.signatures || {});
      const sampleCount = Object.keys(state.spectra || {}).length;
      const fullExposures = cohort?.fit?.exposures || {};
      const calls = panelRows(panel).filter((row) => signatures.includes(row.signature));
      const restrictedSignatures =
        panel?.panel?.restrictedAssayEvidenceSummary?.signatures ||
        panel?.restrictedAssayEvidenceSummary?.signatures ||
        [];
      const restrictedBySignature = new Map(restrictedSignatures.map((row) => [row.signatureName, row]));

      return signatures.map((signature) => {
        const signatureCalls = calls.filter((row) => row.signature === signature);
        const tierCounts = summarizeTiers(signatureCalls);
        const originalFitCount = Object.values(fullExposures).filter(
          (row) => Number(row?.[signature] || 0) >= params.exposureThreshold
        ).length;
        const callableMass =
          restrictedBySignature.get(signature)?.callableEvidence?.signatureMassInCallableContexts ??
          firstFinite(signatureCalls.map((row) => row.callableSignatureMass));
        const higherSupport = tierCounts.high || 0;
        const limitedSupport = tierCounts.limited || 0;
        const notDetected = tierCounts["not detected"] || 0;
        const notAssessable = tierCounts["not assessable"] || 0;

        return {
          signature,
          callableSignatureMass: formatFractionPercent(callableMass),
          callableSignatureMassValue: Number.isFinite(Number(callableMass)) ? Number(callableMass) : null,
          originalFitSamples: `${originalFitCount}/${sampleCount}`,
          originalFitSampleCount: originalFitCount,
          higherSupport,
          limitedSupport,
          notDetected,
          notAssessable,
          recommendation: signaturePlanningRecommendation({
            sampleCount,
            callableMass,
            originalFitCount,
            higherSupport,
            limitedSupport,
            notDetected,
            notAssessable,
          }),
        };
      });
    }

    function planningSampleRows(cohort, panel, params) {
      const signatures = params.selectedSignatures || Object.keys(state.signatures || {});
      const calls = panelRows(panel).filter((row) => signatures.includes(row.signature));
      const callsBySample = groupRowsBy(calls, "sample");
      const sampleNames = cpUnique([
        ...Object.keys(state.spectra || {}),
        ...Object.keys(state.restrictedSpectra || {}),
        ...Object.keys(cohort?.fit?.exposures || {}),
      ]);

      return sampleNames.map((sample) => {
        const sampleCalls = callsBySample.get(sample) || [];
        const tierCounts = summarizeTiers(sampleCalls);
        const originalMutationCount = Math.round(sumRecord(state.spectra?.[sample] || {}));
        const retainedMutationCount = Math.round(sumRecord(state.restrictedSpectra?.[sample] || {}));
        const retentionFraction = originalMutationCount ? retainedMutationCount / originalMutationCount : null;
        const strongest = strongestSignature(cohort?.fit?.exposures?.[sample], signatures);
        const highSupport = tierCounts.high || 0;
        const limitedSupport = tierCounts.limited || 0;
        const notDetected = tierCounts["not detected"] || 0;
        const notAssessable = tierCounts["not assessable"] || 0;

        return {
          sample,
          originalMutationCount,
          retainedMutationCount,
          retentionFraction,
          originalMutations: originalMutationCount,
          retainedMutations: retainedMutationCount,
          retention: formatFractionPercent(retentionFraction),
          strongestOriginalSignature: strongest,
          highSupport,
          limitedSupport,
          notDetected,
          notAssessable,
          restrictedAssaySupport: supportSummary({ highSupport, limitedSupport, notDetected, notAssessable }),
          blockerOrReviewNote: samplePlanningNote({
            retainedMutationCount,
            minAssessableMutations: params.minAssessableMutations,
            highSupport,
            limitedSupport,
            notDetected,
            notAssessable,
            signatureCount: signatures.length,
          }),
        };
      }).sort((a, b) => b.retainedMutationCount - a.retainedMutationCount || a.sample.localeCompare(b.sample));
    }

    function planningVerdict(signatureRows = [], sampleRows = [], params = {}) {
      const assessableSamples = sampleRows.filter((row) => row.notAssessable < (params.selectedSignatures || []).length).length;
      const assessableSignatures = signatureRows.filter((row) => row.notAssessable < sampleRows.length).length;
      const totalSupported = signatureRows.reduce((sum, row) => sum + row.higherSupport + row.limitedSupport, 0);
      const retained = state.downsamplingSummary?.retainedVariants ?? 0;
      let mainBlocker = "Review supported signatures";
      if (!retained) {
        mainBlocker = "No variants retained";
      } else if (!assessableSamples) {
        mainBlocker = "Restricted burden too low";
      } else if (!assessableSignatures) {
        mainBlocker = "Target lacks callable context";
      } else if (!totalSupported) {
        mainBlocker = "No selected signature support";
      }
      return { assessableSamples, assessableSignatures, mainBlocker };
    }

    function signaturePlanningRecommendation(values) {
      if (!values.sampleCount) return "Load samples before planning.";
      if (Number(values.callableMass) === 0) return "Target does not cover this signature context.";
      if (values.notAssessable >= values.sampleCount) return "Not assessable under the current target and burden settings.";
      if (values.higherSupport > 0) return "Target supports review in higher-support samples.";
      if (values.limitedSupport > 0) return "Target can support limited review with caveats.";
      if (values.originalFitCount > 0) return "Original signal is not supported after target restriction.";
      return "No selected-cohort signal to plan around in this run.";
    }

    function samplePlanningNote(values) {
      if (values.retainedMutationCount < values.minAssessableMutations) {
        return `Retained burden is below ${values.minAssessableMutations} mutations.`;
      }
      if (values.highSupport + values.limitedSupport > 0) {
        return "Review supported signatures and fit-quality warnings.";
      }
      if (values.notAssessable >= values.signatureCount) {
        return "No selected signature is assessable in this sample.";
      }
      return "Assay is assessable, but selected signatures are below review thresholds.";
    }

    function supportSummary(counts) {
      const high = counts.highSupport ?? counts.higherSupport ?? 0;
      const limited = counts.limitedSupport ?? 0;
      const notDetected = counts.notDetected ?? 0;
      const notAssessable = counts.notAssessable ?? 0;
      return [
        high ? `${high} high` : null,
        limited ? `${limited} limited` : null,
        notDetected ? `${notDetected} not detected` : null,
        notAssessable ? `${notAssessable} not assessable` : null,
      ].filter(Boolean).join(", ") || "No calls";
    }

    function firstFinite(values = []) {
      for (const value of values) {
        const number = finiteNumber(value);
        if (number !== null) return number;
      }
      return null;
    }

    function finiteNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function groupRowsBy(rows = [], key) {
      const grouped = new Map();
      for (const row of rows) {
        const value = row?.[key];
        if (!grouped.has(value)) grouped.set(value, []);
        grouped.get(value).push(row);
      }
      return grouped;
    }

    function strongestSignature(exposures = {}, signatures = []) {
      const candidates = signatures.length ? signatures : Object.keys(exposures || {});
      let bestSignature = "";
      let bestExposure = 0;
      for (const signature of candidates) {
        const exposure = Number(exposures?.[signature] || 0);
        if (exposure > bestExposure) {
          bestSignature = signature;
          bestExposure = exposure;
        }
      }
      return bestSignature ? `${bestSignature} (${formatPercentPrecise(bestExposure)})` : "none";
    }

    function formatFractionPercent(value) {
      const number = finiteNumber(value);
      if (number === null) return "not available";
      return formatPercentPrecise(number);
    }

    function renderRetainedBurdenFigure(rows = []) {
      const data = [...rows]
        .sort((a, b) => b.retainedMutationCount - a.retainedMutationCount || a.sample.localeCompare(b.sample))
        .slice(0, 30);
      if (!data.length) return note("No samples to plot.");
      const node = div("cohort-panel-chart");
      const width = 760;
      const rowHeight = 28;
      const margin = { top: 48, right: 90, bottom: 42, left: 170 };
      const plotWidth = width - margin.left - margin.right;
      const height = margin.top + margin.bottom + data.length * rowHeight;
      const maxValue = Math.max(1, ...data.flatMap((row) => [row.originalMutationCount, row.retainedMutationCount]));
      const x = (value) => margin.left + (Math.max(0, Number(value) || 0) / maxValue) * plotWidth;
      const svg = svgElement("svg", { viewBox: `0 0 ${width} ${height}`, role: "img", "aria-label": "Retained mutation burden by sample" });
      svg.append(svgElement("text", { x: margin.left, y: 22, fill: "#123245", "font-size": 16, "font-weight": 800 }, "Original and BED-retained mutations"));
      svg.append(svgElement("text", { x: margin.left, y: 40, fill: "#547184", "font-size": 12 }, "Gray bars show original mutations. Teal bars show variants retained inside the selected target."));
      [0, 0.5, 1].forEach((fraction) => {
        const value = Math.round(maxValue * fraction);
        const gx = x(value);
        svg.append(svgElement("line", { x1: gx, x2: gx, y1: margin.top - 4, y2: height - margin.bottom + 4, stroke: "rgba(16,82,100,0.18)" }));
        svg.append(svgElement("text", { x: gx, y: height - 15, fill: "#547184", "font-size": 11, "text-anchor": "middle" }, String(value)));
      });
      data.forEach((row, index) => {
        const y = margin.top + index * rowHeight;
        const label = shortSample(row.sample);
        svg.append(svgElement("text", { x: margin.left - 10, y: y + 15, fill: "#244c60", "font-size": 11, "text-anchor": "end" }, label));
        svg.append(svgElement("rect", { x: margin.left, y: y + 3, width: Math.max(1, x(row.originalMutationCount) - margin.left), height: 18, rx: 3, fill: "#d7e2e8" }));
        svg.append(svgElement("rect", { x: margin.left, y: y + 7, width: Math.max(1, x(row.retainedMutationCount) - margin.left), height: 10, rx: 3, fill: "#087f8c" }));
        svg.append(svgElement("text", { x: Math.min(width - 10, x(row.retainedMutationCount) + 6), y: y + 16, fill: "#123245", "font-size": 11 }, String(row.retainedMutationCount)));
      });
      node.append(svg);
      if (rows.length > data.length) {
        node.append(chartNote(`Showing the 30 samples with the most retained mutations. The table contains all ${rows.length} samples.`));
      }
      return node;
    }

    function renderSignatureAssessabilityFigure(rows = []) {
      const maxRows = 12;
      const data = rankSignatureDecisionRows(rows, maxRows);
      if (!data.length) return note("No signatures to plot.");
      const node = div("cohort-panel-chart");
      const width = 760;
      const rowHeight = 34;
      const margin = { top: 128, right: 160, bottom: 42, left: 112 };
      const plotWidth = width - margin.left - margin.right;
      const visibleRows = Math.max(4, data.length);
      const height = margin.top + margin.bottom + visibleRows * rowHeight;
      const tiers = [
        { key: "higherSupport", label: "Higher", color: "#087f8c" },
        { key: "limitedSupport", label: "Limited", color: "#56b4a2" },
        { key: "notDetected", label: "Below", color: "#cfe5ee" },
        { key: "notAssessable", label: "Blocked", color: "#b9c6cf" },
      ];
      const maxCalls = Math.max(1, ...data.map((row) => tiers.reduce((sum, tier) => sum + Number(row[tier.key] || 0), 0)));
      const x = (value) => margin.left + (Math.max(0, Number(value) || 0) / maxCalls) * plotWidth;
      const summary = summarizeSignatureDecisionRows(rows, data.length);
      const svg = svgElement("svg", { viewBox: `0 0 ${width} ${height}`, role: "img", "aria-label": "Key signature decisions" });
      svg.append(svgElement("text", { x: margin.left, y: 22, fill: "#123245", "font-size": 16, "font-weight": 800 }, "Key signature decisions"));
      svg.append(svgElement("text", { x: margin.left, y: 42, fill: "#547184", "font-size": 12 }, "Ranked signatures with support, original signal, or review blockers."));

      [
        { label: "Selected", value: summary.selected },
        { label: "Supported", value: summary.supported },
        { label: "Limited only", value: summary.limitedOnly },
        { label: "Blocked", value: summary.blocked },
        { label: "Omitted", value: summary.omitted },
      ].forEach((chip, index) => {
        const chipX = margin.left + index * 118;
        svg.append(svgElement("rect", { x: chipX, y: 56, width: 108, height: 24, rx: 5, fill: "rgba(15,142,163,0.08)", stroke: "rgba(16,82,100,0.16)" }));
        svg.append(svgElement("text", { x: chipX + 9, y: 72, fill: "#244c60", "font-size": 11, "font-weight": 700 }, `${chip.value} ${chip.label}`));
      });

      let legendX = margin.left;
      tiers.forEach((tier) => {
        svg.append(svgElement("rect", { x: legendX, y: 96, width: 12, height: 12, rx: 3, fill: tier.color }));
        svg.append(svgElement("text", { x: legendX + 18, y: 106, fill: "#244c60", "font-size": 11 }, tier.label));
        legendX += 92;
      });
      [0, 0.5, 1].forEach((fraction) => {
        const value = Math.round(maxCalls * fraction);
        const gx = x(value);
        svg.append(svgElement("line", { x1: gx, x2: gx, y1: margin.top - 8, y2: height - margin.bottom + 4, stroke: "rgba(16,82,100,0.18)" }));
        svg.append(svgElement("text", { x: gx, y: height - 12, fill: "#547184", "font-size": 11, "text-anchor": "middle" }, String(value)));
      });
      data.forEach((row, index) => {
        const y = margin.top + index * rowHeight;
        let cursor = margin.left;
        svg.append(svgElement("text", { x: margin.left - 10, y: y + 19, fill: "#244c60", "font-size": 12, "font-weight": 700, "text-anchor": "end" }, row.signature));
        svg.append(svgElement("rect", { x: margin.left, y: y + 7, width: plotWidth, height: 20, rx: 4, fill: "rgba(207,229,238,0.28)" }));
        tiers.forEach((tier) => {
          const count = Number(row[tier.key] || 0);
          const segmentWidth = x(count) - margin.left;
          if (count > 0) {
            svg.append(svgElement("rect", { x: cursor, y: y + 7, width: Math.max(1, segmentWidth), height: 20, rx: 4, fill: tier.color }));
          }
          cursor += segmentWidth;
        });
        svg.append(svgElement("text", { x: width - 10, y: y + 20, fill: "#123245", "font-size": 11, "text-anchor": "end" }, compactSupportSummary(row)));
      });
      node.append(svg);
      node.append(chartNote(`Showing ${data.length} key signatures; all ${rows.length} are in the table and exports.`));
      return node;
    }

    function rankSignatureDecisionRows(rows = [], limit = 12) {
      const unused = new Set(rows.map((_, index) => index));
      const ranked = [];
      const appendGroup = (predicate, comparator) => {
        rows
          .map((row, index) => ({ row, index }))
          .filter((entry) => unused.has(entry.index) && predicate(decisionStats(entry.row)))
          .sort((left, right) => comparator(decisionStats(left.row), decisionStats(right.row)) || String(left.row.signature || "").localeCompare(String(right.row.signature || "")))
          .forEach((entry) => {
            unused.delete(entry.index);
            ranked.push(entry.row);
          });
      };
      appendGroup(
        (stats) => stats.supported > 0,
        (left, right) =>
          right.supported - left.supported ||
          right.higher - left.higher ||
          right.limited - left.limited ||
          right.originalFit - left.originalFit
      );
      appendGroup(
        (stats) => stats.supported === 0 && stats.originalFit > 0,
        (left, right) =>
          right.originalFit - left.originalFit ||
          right.notAssessable - left.notAssessable ||
          right.callableMass - left.callableMass
      );
      appendGroup(
        (stats) => stats.notAssessable > 0,
        (left, right) =>
          right.notAssessable - left.notAssessable ||
          right.callableMass - left.callableMass ||
          right.originalFit - left.originalFit
      );
      appendGroup(
        () => true,
        (left, right) =>
          right.callableMass - left.callableMass ||
          right.originalFit - left.originalFit ||
          right.supported - left.supported
      );
      return ranked.slice(0, limit);
    }

    function summarizeSignatureDecisionRows(rows = [], shownCount = 0) {
      return {
        selected: rows.length,
        supported: rows.filter((row) => decisionStats(row).supported > 0).length,
        limitedOnly: rows.filter((row) => {
          const stats = decisionStats(row);
          return stats.higher === 0 && stats.limited > 0;
        }).length,
        blocked: rows.filter((row) => decisionStats(row).notAssessable > 0).length,
        omitted: Math.max(0, rows.length - shownCount),
      };
    }

    function compactSupportSummary(row) {
      const stats = decisionStats(row);
      return [
        stats.supported ? `${stats.supported} support` : null,
        stats.notDetected ? `${stats.notDetected} below` : null,
        stats.notAssessable ? `${stats.notAssessable} blocked` : null,
      ].filter(Boolean).join(" / ") || "No calls";
    }

    function decisionStats(row = {}) {
      const higher = Math.max(0, Number(row.higherSupport ?? row.highSupport ?? 0) || 0);
      const limited = Math.max(0, Number(row.limitedSupport || 0) || 0);
      return {
        higher,
        limited,
        supported: higher + limited,
        notDetected: Math.max(0, Number(row.notDetected || 0) || 0),
        notAssessable: Math.max(0, Number(row.notAssessable || 0) || 0),
        originalFit: Math.max(0, Number(row.originalFitSampleCount || 0) || 0),
        callableMass: Number.isFinite(Number(row.callableSignatureMassValue)) ? Number(row.callableSignatureMassValue) : -1,
      };
    }

    function svgElement(name, attributes = {}, text = null) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attributes).forEach(([key, value]) => {
        if (value !== null && value !== undefined) element.setAttribute(key, String(value));
      });
      if (text !== null) element.textContent = text;
      return element;
    }

    function chartNote(text) {
      const element = document.createElement("p");
      element.className = "cohort-panel-chart-note";
      element.textContent = text;
      return element;
    }

    function focusMessage(title, text) {
      const node = div("cohort-panel-focus");
      const strong = document.createElement("strong");
      strong.textContent = title;
      const span = document.createElement("span");
      span.textContent = text;
      node.append(strong, span);
      return node;
    }

    function infoCards(items = []) {
      const node = div("cohort-panel-guide-grid");
      for (const item of items) {
        const card = div("cohort-panel-guide-card");
        const title = document.createElement("strong");
        title.textContent = item.title;
        const text = document.createElement("span");
        text.textContent = item.text;
        card.append(title, text);
        node.append(card);
      }
      return node;
    }

    function miniMetrics(items = []) {
      const node = div("cohort-panel-mini-metrics");
      for (const item of items) {
        const pill = div("cohort-panel-pill");
        const label = document.createElement("span");
        label.textContent = item.label;
        const value = document.createElement("strong");
        value.textContent = item.value == null ? "not available" : String(item.value);
        pill.append(label, value);
        node.append(pill);
      }
      return node;
    }

    function renderReviewSummary(cohort, panel, panelCallRows = []) {
      const node = div("cohort-panel-review-summary");
      const tierCounts = Object.entries(summarizeTiers(panelCallRows)).map(([tier, count]) => ({
        evidenceTier: tier,
        calls: count,
      }));
      const messages = [
        ...cpWarningRows(cohort.warnings, "cohort"),
        ...cpWarningRows(panel.warnings, "panel"),
        ...actionRows(cohort.recommendedActions, "cohort"),
        ...actionRows(panel.recommendedActions, "panel"),
      ];
      node.append(compactTable(tierCounts, ["evidenceTier", "calls"]));
      const list = document.createElement("ul");
      list.className = "cohort-panel-review-list";
      for (const item of messages.slice(0, 4)) {
        const entry = document.createElement("li");
        entry.textContent = `${item.source}: ${shortMessage(item.message)}`;
        list.append(entry);
      }
      if (!list.children.length) {
        const entry = document.createElement("li");
        entry.textContent = "No warning or action messages were returned under the current settings.";
        list.append(entry);
      }
      node.append(list);
      return node;
    }

    function summarizeTiers(rows = []) {
      return rows.reduce((counts, row) => {
        const label = tierLabel(row);
        counts[label] = (counts[label] || 0) + 1;
        return counts;
      }, {});
    }

    function tierClass(call) {
      const value = `${call?.tier || ""} ${call?.assessability || ""}`.toLowerCase();
      if (!call) return "not-assessable";
      if (value.includes("higher")) return "high";
      if (value.includes("limited")) return "limited";
      if (value.includes("not_detected") || value.includes("not detected")) return "not-detected";
      if (value.includes("not_assessable") || value.includes("insufficient")) return "not-assessable";
      return "detected";
    }

    function tierLabel(call) {
      const tier = String(call?.tier || call?.assessability || "review").toLowerCase();
      if (tier.includes("higher")) return "high";
      if (tier.includes("limited")) return "limited";
      if (tier.includes("not_detected") || tier.includes("not detected")) return "not detected";
      if (tier.includes("not_assessable") || tier.includes("not assessable")) return "not assessable";
      return "review";
    }

    function formatPercent(value) {
      const number = Number(value);
      return Number.isFinite(number) ? `${Math.round(number * 100)}%` : "";
    }

    function formatPercentPrecise(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "not available";
      if (number === 0) return "0%";
      return `${(number * 100).toFixed(number < 0.01 ? 2 : 1)}%`;
    }

    function cpUnique(values = []) {
      return [...new Set(values.filter(Boolean))];
    }

    function shortSample(sample) {
      const text = String(sample || "");
      const parts = text.split("-");
      return parts.length >= 3 ? parts.slice(0, 3).join("-") : text;
    }

    function shortMessage(message) {
      const text = String(message || "");
      return text.length > 140 ? `${text.slice(0, 137)}...` : text;
    }

    function previewColumns(rows = []) {
      const keys = [...new Set((rows[0] ? Object.keys(rows[0]) : ["sample"]).filter(Boolean))];
      const priority = ["sample", "study", "cancer", "strategy", "assay", "burdenGroup", "group", "projectGroup"];
      return [...priority.filter((key) => keys.includes(key)), ...keys.filter((key) => !priority.includes(key))].slice(0, 6);
    }

    function compactTable(rows = [], columns = null) {
      const data = Array.isArray(rows) ? rows : [];
      const selected = columns?.length ? columns : [...new Set(data.flatMap((row) => Object.keys(row || {})))].slice(0, 6);
      const wrap = div("cohort-panel-table-wrap");
      const tableNode = document.createElement("table");
      tableNode.className = "cohort-panel-table";
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      for (const column of selected) {
        const th = document.createElement("th");
        th.textContent = humanLabel(column);
        headerRow.append(th);
      }
      thead.append(headerRow);
      const tbody = document.createElement("tbody");
      if (!data.length) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = Math.max(1, selected.length);
        cell.textContent = "No rows to show.";
        row.append(cell);
        tbody.append(row);
      } else {
        for (const item of data) {
          const row = document.createElement("tr");
          for (const column of selected) {
            const cell = document.createElement("td");
            const value = item?.[column];
            cell.textContent = typeof value === "number" ? format(value) : value == null ? "" : String(value);
            row.append(cell);
          }
          tbody.append(row);
        }
      }
      tableNode.append(thead, tbody);
      wrap.append(tableNode);
      return wrap;
    }

    function humanLabel(key) {
      return String(key)
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/_/g, " ")
        .replace(/^./, (character) => character.toUpperCase());
    }

    function cpWarningRows(warnings = [], source = "workflow") {
      return (Array.isArray(warnings) ? warnings : []).map((warning) => ({
        source,
        type: warning.code || warning.warningCode || warning.status || "warning",
        message: warning.message || warning.detail || String(warning),
      }));
    }

    function actionRows(actions = [], source = "workflow") {
      return (Array.isArray(actions) ? actions : []).map((action) => ({
        source,
        type: "review action",
        message: typeof action === "string" ? action : action.message || action.detail || JSON.stringify(action),
      }));
    }

    function scaleOpportunityRecord(record, scale) {
      return Object.fromEntries(Object.entries(record || {}).map(([context, value]) => [
        context,
        Math.max(0, Number(value) * scale),
      ]));
    }

    function sumRecord(record = {}) {
      return Object.values(record || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function numberValue(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function format(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(3) : value ?? "not available";
    }

    function addPlot(title, renderer, fallback = null, options = {}) {
      const card = div(`cohort-panel-plot${options.primary ? " primary" : ""}${options.secondary ? " secondary" : ""}`);
      const heading = document.createElement("h3");
      heading.textContent = title;
      const host = div("cohort-panel-plot-host");
      card.append(heading, host);
      plotOutput.append(card);
      try {
        renderer(host);
      } catch (error) {
        host.replaceChildren(fallback ? fallback() : errorBox(error));
      }
    }

    function downloadList(items) {
      const list = div("download-list");
      for (const item of items) {
        const link = document.createElement("a");
        link.className = "download-link";
        link.download = item.filename;
        link.textContent = item.label || item.filename;
        const text = item.type === "json" ? JSON.stringify(item.value, null, 2) : item.text;
        link.href = URL.createObjectURL(new Blob([text || ""], { type: item.type === "json" ? "application/json" : "text/plain" }));
        list.append(link);
      }
      return list;
    }

    function fileInput(target, accept = ".json,.txt,.tsv,.csv") {
      const inputNode = document.createElement("input");
      inputNode.type = "file";
      inputNode.accept = accept;
      inputNode.addEventListener("change", async () => {
        if (inputNode.files?.[0]) target.value = await readFileAsText(inputNode.files[0]);
      });
      return inputNode;
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

    async function withBusy(control, label, task) {
      const original = control.textContent;
      control.disabled = true;
      control.textContent = label;
      try {
        return await task();
      } finally {
        control.disabled = false;
        control.textContent = original;
      }
    }

    function section(title, helper) {
      const node = document.createElement("section");
      node.className = "cohort-panel-step";
      const header = div("cohort-panel-heading");
      const heading = document.createElement("h2");
      heading.textContent = title;
      const text = document.createElement("span");
      text.textContent = helper;
      header.append(heading, text);
      node.append(header);
      return node;
    }

    function field(labelText, control, help = "") {
      const label = document.createElement("label");
      label.className = "cohort-panel-field";
      const title = document.createElement("span");
      title.textContent = labelText;
      label.append(title, control);
      if (help) {
        const small = document.createElement("small");
        small.textContent = help;
        label.append(small);
      }
      return label;
    }

    function textarea(placeholder, rows = 8) {
      const node = document.createElement("textarea");
      node.placeholder = placeholder;
      node.rows = rows;
      return node;
    }

    function input(value, type = "text", step = null) {
      const node = document.createElement("input");
      node.type = type;
      node.value = value;
      if (step) node.step = step;
      if (type === "number") node.min = "0";
      return node;
    }

    function select(options = []) {
      const node = document.createElement("select");
      node.replaceChildren(...options.map((item) => {
        const option = document.createElement("option");
        option.value = item.value ?? item.label ?? String(item);
        option.textContent = item.label ?? String(item);
        return option;
      }));
      return node;
    }

    function button(label, kind = "") {
      const node = document.createElement("button");
      node.type = "button";
      node.className = `workflow-button ${kind}`.trim();
      node.textContent = label;
      return node;
    }

    function blockTitle(text) {
      const heading = document.createElement("h3");
      heading.textContent = text;
      return heading;
    }

    function note(text) {
      const node = div("cohort-panel-note");
      node.textContent = text;
      return node;
    }

    function errorBox(error) {
      const node = document.createElement("pre");
      node.className = "output-error";
      node.textContent = error.stack || error.message || String(error);
      return node;
    }

    function summary(text) {
      const node = document.createElement("summary");
      node.textContent = text;
      return node;
    }

    function p(className, text) {
      const node = document.createElement("p");
      node.className = className;
      node.textContent = text;
      return node;
    }

    function div(className, ...children) {
      const node = document.createElement("div");
      node.className = className;
      node.append(...children.filter(Boolean));
      return node;
    }
  </script>
</notebook>
