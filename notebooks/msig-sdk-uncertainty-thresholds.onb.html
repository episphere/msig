<!doctype html>
<notebook theme="air">
  <title>mSigSDK uncertainty and thresholds</title>

  <script type="text/markdown">
    # Bootstrap uncertainty and threshold sensitivity

    Use this notebook after you understand the basic known-signature fitting workflow. It teaches two questions that come up immediately after fitting: are the estimated exposures stable, and do the conclusions depend on the exposure threshold?

    The code uses count-scale public mSigPortal spectra selected from moderate-to-high burden PCAWG WGS Lung-AdenoCA samples, but the same functions work with your own spectra and reference signatures. Replace the loading block with your own matrices, keep the bootstrap and threshold cells, and tune the iteration count and threshold grid for your analysis plan.
  </script>

  <script type="module" pinned id="1">
    const uncSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-uncertainty", location.href).href;
    const { mSigSDK } = await import(uncSdkUrl);
    const {
      bootstrapRows,
      burdenSampleRows,
      details,
      metrics,
      table,
      thresholdRows,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Question", value: "Are exposures stable?" },
      { label: "Main namespace", value: "qc" },
    ]));
    display(table(
      [
        { functionName: "qc.bootstrapSignatureFit", reviewerValue: "Shows confidence intervals and selection frequency for one sample" },
        { functionName: "qc.runThresholdSensitivity", reviewerValue: "Tests whether exposure conclusions depend on the reporting floor" },
        { functionName: "qcPlots.*", reviewerValue: "Turns the returned objects into interpretable figures" },
        { functionName: "presentation.*", reviewerValue: "Formats compact reviewer-facing evidence tables" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "reviewerValue", label: "Why reviewers should care" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 1. Set the analysis grid

    Bootstrap and threshold analyses can be expensive because they repeat fitting. Keep the defaults small while learning the API. Increase `uncBootstrapIterations` for smoother intervals, edit `uncThresholdGrid` to match the thresholds you plan to report, or replace `uncExampleSampleNames` with samples from your cohort.
  </script>

  <script type="module" pinned id="2">
    const uncContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const uncStudy = "PCAWG";
    const uncGenomeDataType = "WGS";
    const uncCancerType = "Lung-AdenoCA";
    const uncMutationType = "SBS";
    const uncMatrixSize = 96;
    const uncSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const uncExampleSampleNames = [
      "SP50611",
      "SP53387",
      "SP50827",
      "SP52779",
      "SP52667",
      "SP52232",
    ];
    const uncSampleLimit = uncExampleSampleNames.length;
    const uncExposureThreshold = 0.01;
    const uncBootstrapIterations = 40;
    const uncThresholdGrid = [0, 0.005, 0.01, 0.03, 0.05, 0.1];
    const uncPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    const [uncRawSpectrumRows, uncRawSignatureRows] = await Promise.all([
      mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
        uncStudy,
        uncExampleSampleNames,
        uncGenomeDataType,
        uncCancerType,
        uncMutationType,
        uncMatrixSize
      ),
      mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
        uncGenomeDataType,
        uncSignatureSetName,
        uncMutationType,
        uncMatrixSize,
        10000
      ),
    ]);

    const uncSpectrumRows = Array.isArray(uncRawSpectrumRows)
      ? uncRawSpectrumRows.flat()
      : [];
    const uncSignatureRows = Array.isArray(uncRawSignatureRows)
      ? uncRawSignatureRows.flat()
      : [];
    const uncAllGroupedSpectra =
      mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(uncSpectrumRows);
    const uncAllReferenceSignatures =
      mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
        uncSignatureRows,
        "signatureName"
      );
    const uncAllBurden = mSigSDK.qc.summarizeMutationBurden(
      uncAllGroupedSpectra,
      { expectedContexts: uncContexts }
    );
    const uncSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      uncAllBurden,
      {
        sampleNames: uncExampleSampleNames,
        minTotalMutations: 1,
        limit: uncSampleLimit,
      }
    );
    const uncSelectedSampleNames = uncSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const uncGroupedSpectra = Object.fromEntries(
      uncSelectedSampleNames.map((sample) => [sample, uncAllGroupedSpectra[sample]])
    );
    const uncSelectedSignatureNames = uncPreferredSignatureNames
      .filter((signature) => uncAllReferenceSignatures[signature])
      .slice(0, 8);
    const uncReferenceSignatures = Object.fromEntries(
      uncSelectedSignatureNames.map((signature) => [
        signature,
        uncAllReferenceSignatures[signature],
      ])
    );
    const uncBootstrapSample = uncSelectedSampleNames.includes("SP50611")
      ? "SP50611"
      : uncSelectedSampleNames[0];

    display(metrics([
      { label: "Samples", value: uncSelectedSampleNames.length },
      { label: "Signatures", value: uncSelectedSignatureNames.length },
      { label: "Bootstrap sample", value: uncBootstrapSample },
      { label: "Bootstrap iterations", value: uncBootstrapIterations },
      { label: "Thresholds tested", value: uncThresholdGrid.length },
    ]));
    display(table(
      burdenSampleRows(uncAllBurden, uncSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
      ],
      { maxRows: 6 }
    ));
    display(table(
      uncThresholdGrid.map((threshold) => ({
        threshold,
        meaning: threshold === 0 ? "Keep every fitted exposure" : `Zero exposures below ${threshold}`,
      })),
      [
        { key: "threshold", label: "Exposure threshold" },
        { key: "meaning", label: "Interpretation" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## 2. Run bootstrap resampling and a threshold sweep

    Bootstrap resampling repeatedly perturbs one sample and refits exposures. Threshold sensitivity fits the cohort across a grid of exposure floors. Read the returned objects first; the plots in the next cells are wrappers around these data structures.
  </script>

  <script type="module" pinned id="3">
    const uncBootstrapResult = await mSigSDK.qc.bootstrapSignatureFit(
      uncReferenceSignatures,
      uncGroupedSpectra[uncBootstrapSample],
      {
        iterations: uncBootstrapIterations,
        confidenceLevel: 0.95,
        exposureThreshold: uncExposureThreshold,
        seed: 42,
        contexts: uncContexts,
      }
    );
    const uncThresholdSensitivityResult = await mSigSDK.qc.runThresholdSensitivity(
      uncReferenceSignatures,
      uncGroupedSpectra,
      {
        thresholds: uncThresholdGrid,
        contexts: uncContexts,
      }
    );

    const uncBootstrapRows = bootstrapRows(uncBootstrapResult, { topN: 8 });
    const uncThresholdRows = thresholdRows(uncThresholdSensitivityResult);

    display(metrics([
      { label: "Bootstrap signatures", value: uncBootstrapResult.signatures.length },
      { label: "Threshold runs", value: uncThresholdSensitivityResult.runs.length },
      { label: "Confidence level", value: "95%" },
      { label: "Seed", value: 42 },
    ]));
    display(table(
      uncBootstrapRows,
      [
        { key: "signature", label: "Signature" },
        { key: "mean", label: "Mean exposure" },
        { key: "lower95", label: "Lower CI" },
        { key: "upper95", label: "Upper CI" },
        { key: "selectionFrequency", label: "Selection frequency" },
      ]
    ));
    display(table(
      uncThresholdRows,
      [
        { key: "threshold", label: "Threshold" },
        { key: "averageCosineSimilarity", label: "Mean cosine" },
        { key: "averageRmse", label: "Mean RMSE" },
        { key: "averageActiveSignatures", label: "Mean active signatures" },
      ]
    ));
    display(details("Full uncertainty result objects", {
      bootstrap: uncBootstrapResult,
      thresholdSensitivity: uncThresholdSensitivityResult,
    }));
  </script>

  <script type="text/markdown">
    ## 3. Read bootstrap exposure uncertainty

    The plot shows bootstrap draws, confidence intervals, mean exposures, and selection frequencies. Stable signatures have narrow intervals and high selection frequency. Wide intervals or low selection frequency suggest that a fitted exposure should be reported cautiously.
  </script>

  <script type="module" pinned id="4">
    const uncBootstrapDiv = document.createElement("div");
    uncBootstrapDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotBootstrapConfidenceIntervals(
      uncBootstrapDiv,
      uncBootstrapResult
    );
    display(uncBootstrapDiv);
  </script>

  <script type="text/markdown">
    ## 4. Check threshold stability

    The sensitivity plot compares every threshold against the baseline threshold. Large drift means the interpretation depends strongly on the threshold choice. In your own analyses, this is a useful place to document why you chose a reporting threshold.
  </script>

  <script type="module" pinned id="5">
    const uncThresholdDiv = document.createElement("div");
    uncThresholdDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotThresholdSensitivity(
      uncThresholdDiv,
      uncThresholdSensitivityResult
    );
    display(uncThresholdDiv);
  </script>
</notebook>
