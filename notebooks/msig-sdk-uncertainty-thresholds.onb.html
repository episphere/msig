<!doctype html>
<notebook theme="air">
  <title>mSigSDK uncertainty and cutoffs</title>

  <script type="text/markdown">
    # Uncertainty and cutoffs

    Post-fit stability review answers a narrow question: whether a fitted signature contribution is stable enough to report. Cohort QC, panel/WES evidence, cross-tool comparison, and report packaging live in separate notebooks.

    Choose a public mSigPortal dataset or provide project spectra and signatures, run the resampling and cutoff sweep, then read the decision table with the bootstrap and cutoff figures before reporting a fitted signature contribution.
  </script>

  <script type="module" pinned id="interactive-uncertainty-review">
const uncSdkUrl = new URL("../main.js?v=2026-05-20-publication-context-v2", location.href).href;
    const { mSigSDK } = await import(uncSdkUrl);
    const {
      bootstrapRows,
      burdenSampleRows,
      metrics,
      note,
      table,
      thresholdRows,
      uncertaintyDecisionRows,

      profile: "SBS",
      matrix: 96,

    const PUBLIC_API_BASE = "https://analysistools.cancer.gov/mutational-signatures/api/";
    const PANCANCER_VALUE = "__all_cancers__";

      study: "TCGA",
      strategy: "WES",
      profile: "SBS",
      matrix: "96",
      cancer: "Lung-AdenoCa",
      signatureSetName: "COSMIC_v3_Signatures_GRCh37_SBS96",
    };

    }

    function element(tag, className = "", text = "") {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text) node.textContent = text;
      return node;
    }

    function field(label, control, help = "") {
      const wrapper = element("label", "workflow-field");
      const labelNode = document.createElement("span");
      labelNode.textContent = label;
      wrapper.append(labelNode, control);
      if (help) {
        const helpNode = document.createElement("small");
        helpNode.textContent = help;
        wrapper.append(helpNode);
      }
      return wrapper;
    }

    function button(label, primary = false) {
      const node = document.createElement("button");
      node.type = "button";
      node.className = primary ? "workflow-button primary" : "workflow-button";
      node.textContent = label;
      return node;
    }

    function input(value, type = "text", step = null) {
      const node = document.createElement("input");
      node.type = type;
      node.value = String(value);
      if (step !== null) node.step = String(step);
      if (type === "number") node.min = "0";
      return node;
    }

    function textarea(placeholder, rows = 8) {
      const node = document.createElement("textarea");
      node.placeholder = placeholder;
      node.rows = rows;
      return node;
    }

    function select(values) {
      const node = document.createElement("select");
      node.replaceChildren(...values.map((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        return option;
      }));
      return node;
    }

    function optionNode(label, value = label) {
      const option = document.createElement("option");
      option.value = String(value);
      option.textContent = String(label);
      return option;
    }

    function fileInput(target) {
      const node = document.createElement("input");
      node.type = "file";
      node.accept = ".json,.txt,.tsv,.csv";
      node.addEventListener("change", async () => {
        if (!node.files?.[0]) return;
        target.value = await readFileAsText(node.files[0]);
      });
      return node;
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }

    function setStatus(title, detail = "", mode = "") {
      statusCard.className = `workflow-status-card uncertainty-review-status ${mode}`.trim();
      statusTitle.textContent = title;
      statusDetail.textContent = detail;
    }

    function parseNumber(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function parseThresholds(value) {
      const thresholds = String(value || "")
        .split(/[,\s]+/)
        .map((item) => Number(item.trim()))
        .filter(Number.isFinite)
        .filter((item) => item >= 0)
        .sort((a, b) => a - b);
      return [...new Set(thresholds)];
    }

    function formatFraction(value) {
      return Number.isFinite(value) ? Number(value.toFixed(4)) : null;
    }

    function parseMatrix(text, kind) {
      const trimmed = String(text || "").trim();
      if (!trimmed) throw new Error(`${kind} input is empty.`);
      try {
        const parsed = JSON.parse(trimmed);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
          return parsed;
        }
      } catch (_error) {
        // Try tabular matrix import after JSON parsing fails.
      }
      const firstLine = trimmed.split(/\r?\n/, 1)[0] || "";
      const delimiter = firstLine.includes("\t") ? "\t" : ",";
      return kind === "spectra"
        ? mSigSDK.io.importSigProfilerMatrix(trimmed, { delimiter })
        : mSigSDK.io.importCOSMICSignatureMatrix(trimmed, { delimiter });
    }

    function matrixNames(matrix) {
      return Object.keys(matrix || {});
    }

    function inferContexts(spectra, signatures) {
      const contexts = [
        ...Object.values(spectra || {}).flatMap((record) => Object.keys(record || {})),
        ...Object.values(signatures || {}).flatMap((record) => Object.keys(record || {})),
      ];
      const unique = [...new Set(contexts)];
      return unique.length ? unique : DEFAULT_CONTEXTS;
    }

    function sumRecord(record = {}) {
      return Object.values(record || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function sampleRows(spectra = {}) {
      return Object.entries(spectra).map(([sample, record]) => ({
        sample,
        mutations: sumRecord(record),
        nonZeroContexts: Object.values(record || {}).filter((value) => Number(value) > 0).length,
      }));
    }

    function signatureRows(signatures = {}) {
      return Object.entries(signatures).map(([signature, record]) => ({
        signature,
        nonZeroContexts: Object.values(record || {}).filter((value) => Number(value) > 0).length,
        totalWeight: formatFraction(sumRecord(record)),
      }));
    }

    function updateSampleSelect(preferred = "") {
      const samples = matrixNames(state.spectra);
      sampleSelect.replaceChildren(...samples.map((sample) => {
        const option = document.createElement("option");
        option.value = sample;
        option.textContent = sample;
        return option;
      }));
      sampleSelect.value = samples.includes(preferred) ? preferred : samples[0] || "";
    }

    function clearReview() {
      reviewState.sample = null;
      reviewState.iterations = null;
      reviewState.seed = null;
      reviewState.exposureThreshold = null;
      reviewState.thresholds = [];
      reviewState.bootstrap = null;
      reviewState.thresholdSensitivity = null;
      reviewState.bootstrapRows = [];
      reviewState.thresholdRows = [];
      reviewState.decisions = [];
      resultsOutput.replaceChildren(note("Run the stability review with the current data and settings.", "info"));
      figuresOutput.replaceChildren(note("Figures appear after the stability review finishes.", "info"));
      exportsOutput.replaceChildren();
    }

    function renderDataSummary() {
      const burden = mSigSDK.qc.summarizeMutationBurden(state.spectra, {
        expectedContexts: state.contexts,
      });
      const selectedSample = sampleSelect.value;
      const detailsNode = element("details", "output-details uncertainty-source-tables");
      const detailsSummary = element("summary", "", "Active dataset details");
      const detailsStack = element("div", "workflow-output-stack");
      detailsStack.append(
        table(
          [
            { field: "Data source", value: state.source },
            { field: "Selected public study", value: state.publicSelection ? `${state.publicSelection.study} ${state.publicSelection.cancer}` : "not public API data" },
            { field: "Profile and table size", value: state.publicSelection ? `${state.publicSelection.profile}${state.publicSelection.matrix}` : `${state.contexts.length} contexts` },
            { field: "Signature catalog", value: state.publicSelection?.signatureSetName || "user supplied" },
          ],
          [
            { key: "field", label: "Field" },
            { key: "value", label: "Value" },
          ],
          {
            title: "Loaded source",
            caption: "Records which data source and signature catalog are active for this stability review.",
          }
        ),
        table(
          signatureRows(state.signatures).slice(0, 12),
          [
            { key: "signature", label: "Signature" },
            { key: "nonZeroContexts", label: "Nonzero contexts" },
            { key: "totalWeight", label: "Total weight" },
          ],
          {
            title: "Reference signature catalog",
            caption: "The cutoff sweep uses the same signature catalog across all loaded samples.",
            maxRows: 12,
          }
        )
      );
      detailsNode.append(detailsSummary, detailsStack);
      dataOutput.replaceChildren(
        metrics([
          { label: "Data source", value: state.source },
          { label: "Samples", value: matrixNames(state.spectra).length },
          { label: "Signatures", value: matrixNames(state.signatures).length },
          { label: "Contexts", value: state.contexts.length },
        ]),
        table(
          burdenSampleRows(burden, selectedSample ? [selectedSample] : matrixNames(state.spectra)),
          [
            { key: "sample", label: "Sample" },
            { key: "mutations", label: "Total mutations" },
            { key: "nonZeroContexts", label: "Nonzero contexts" },
          ],
          {
            title: "Selected sample",
            caption: "The bootstrap uncertainty check runs on this sample.",
            maxRows: 8,
          }
        ),
        detailsNode
      );
    }

    function markStale() {
      clearReview();
      setStatus("Settings ready", "Run the stability review to refresh tables, figures, and downloads.", "");
    }

    const publicOptionsState = {
      spectra: [],
      signatures: [],
      loaded: false,
    };

    function publicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, PUBLIC_API_BASE);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      }
      return url;
    }

    async function fetchPublicApiRows(endpoint, params = {}, limit = 100000) {
      const rows = [];
      let offset = 0;
      for (let page = 0; page < 10; page += 1) {
        const url = publicApiUrl(endpoint, { ...params, limit, offset });
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${endpoint} API request failed with ${response.status}`);
        const pageRows = await response.json();
        if (!Array.isArray(pageRows)) throw new Error(`${endpoint} API response was not an array.`);
        rows.push(...pageRows);
        if (pageRows.length < limit) break;
        offset += limit;
      }
      return rows;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
        .map(String)
        .sort((a, b) => a.localeCompare(b));
    }

    function setSelectOptions(selectNode, items, preferredValue = "") {
      const normalized = items.map((item) =>
        typeof item === "string" ? { label: item, value: item } : item
      );
      selectNode.replaceChildren(...normalized.map((item) => optionNode(item.label, item.value)));
      const values = normalized.map((item) => String(item.value));
      if (preferredValue && values.includes(String(preferredValue))) {
        selectNode.value = String(preferredValue);
      } else if (values.length) {
        selectNode.value = values[0];
      }
      return selectNode.value;
    }

    function selectedPublicRows() {
      const matrix = Number(publicMatrixSelect.value);
      return publicOptionsState.spectra.filter((row) =>
        row.study === publicStudySelect.value &&
        row.strategy === publicStrategySelect.value &&
        row.profile === publicProfileSelect.value &&
        Number(row.matrix) === matrix &&
        (publicCancerSelect.value === PANCANCER_VALUE || row.cancer === publicCancerSelect.value)
      );
    }

    function publicSampleOptions() {
      const bySample = new Map();
      for (const row of selectedPublicRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

    function currentPublicSelection() {
      return {
        study: publicStudySelect.value,
        cancer: publicCancerSelect.value === PANCANCER_VALUE ? "PanCancer" : publicCancerSelect.value,
        strategy: publicStrategySelect.value,
        profile: publicProfileSelect.value,
        matrix: Number(publicMatrixSelect.value),
        signatureSetName: publicSignatureSetSelect.value,
      };
    }

    function updatePublicStatus() {
      const selection = currentPublicSelection();
      const samples = publicSampleOptions();
      publicStatus.textContent = publicOptionsState.loaded
        ? `${samples.length} public samples match ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix}. The loader will fetch up to ${maxSamplesInput.value} samples plus ${selection.signatureSetName || "a compatible signature set"}.`
        : "Load the public dataset menu to choose real API-backed spectra.";
    }

    function populatePublicMenus(preferred = {}) {
      const current = {
        study: publicStudySelect.value || preferred.study || DEFAULT_PUBLIC_SELECTION.study,
        strategy: publicStrategySelect.value || preferred.strategy || DEFAULT_PUBLIC_SELECTION.strategy,
        profile: publicProfileSelect.value || preferred.profile || DEFAULT_PUBLIC_SELECTION.profile,
        matrix: publicMatrixSelect.value || preferred.matrix || DEFAULT_PUBLIC_SELECTION.matrix,
        cancer: publicCancerSelect.value || preferred.cancer || DEFAULT_PUBLIC_SELECTION.cancer,
        signatureSetName: publicSignatureSetSelect.value || preferred.signatureSetName || DEFAULT_PUBLIC_SELECTION.signatureSetName,
      };

      const study = setSelectOptions(publicStudySelect, uniqueSorted(publicOptionsState.spectra.map((row) => row.study)), current.study);
      const studyRows = publicOptionsState.spectra.filter((row) => row.study === study);
      const strategy = setSelectOptions(publicStrategySelect, uniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
      const strategyRows = studyRows.filter((row) => row.strategy === strategy);
      const profile = setSelectOptions(publicProfileSelect, uniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
      const profileRows = strategyRows.filter((row) => row.profile === profile);
      const matrix = setSelectOptions(publicMatrixSelect, uniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
      const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
      const cancerItems = uniqueSorted(matrixRows.map((row) => row.cancer)).map((value) => ({ label: value, value }));
      if (study === "PCAWG" || study === "TCGA") {
        cancerItems.unshift({ label: "PanCancer (all cancer types)", value: PANCANCER_VALUE });
      }
      setSelectOptions(publicCancerSelect, cancerItems, current.cancer);

      const exactSignatureRows = publicOptionsState.signatures.filter((row) =>
        row.strategy === strategy &&
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const fallbackSignatureRows = publicOptionsState.signatures.filter((row) =>
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const signatureRows = exactSignatureRows.length ? exactSignatureRows : fallbackSignatureRows;
      setSelectOptions(publicSignatureSetSelect, uniqueSorted(signatureRows.map((row) => row.signatureSetName)), current.signatureSetName);
      updatePublicStatus();
    }

    async function loadPublicMenus(preferred = DEFAULT_PUBLIC_SELECTION) {
      publicStatus.textContent = "Loading public dataset options from mSigPortal APIs...";
      loadPublicButton.disabled = true;
      refreshPublicButton.disabled = true;
      try {
        const [spectraOptions, signatureOptions] = await Promise.all([
          fetchPublicApiRows("mutational_spectrum_options"),
          fetchPublicApiRows("mutational_signature_options", { source: "Reference_signatures" }),
        ]);
        publicOptionsState.spectra = spectraOptions;
        publicOptionsState.signatures = signatureOptions;
        publicOptionsState.loaded = true;
        populatePublicMenus(preferred);
      } catch (error) {
        publicOptionsState.loaded = false;
        publicStatus.textContent = `Could not load public dataset menu: ${error.message}`;
        throw error;
      } finally {
        loadPublicButton.disabled = false;
        refreshPublicButton.disabled = false;
      }
    }

    async function fetchSpectrumRowsForSamples(samples, selection) {
      const groups = [];
      for (let index = 0; index < samples.length; index += 1) {
        const sample = samples[index];
        publicStatus.textContent = `Fetching public spectra ${index + 1}/${samples.length}: ${sample.sample}`;
        dataOutput.replaceChildren(note(`Fetching ${index + 1}/${samples.length} public spectra from mSigPortal...`, "info"));
        groups.push(await fetchPublicApiRows("mutational_spectrum", {
          study: sample.study,
          sample: sample.sample,
          cancer: sample.cancer,
          strategy: sample.strategy,
          profile: sample.profile,
          matrix: sample.matrix,
        }, 100000));
      }
      publicStatus.textContent = `Loading reference signatures: ${selection.signatureSetName}`;
      return groups.flat();
    }

    async function loadPublicData() {
      if (!publicOptionsState.loaded) await loadPublicMenus();
      const limit = Math.max(1, Math.min(
        50,
        Math.round(parseNumber(maxSamplesInput.value, 6))
      ));
      const selectedSamples = publicSampleOptions().slice(0, limit);
      if (!selectedSamples.length) throw new Error("No public samples match the selected menu values.");
      const selection = {
        ...currentPublicSelection(),
        sampleCount: selectedSamples.length,
      };
      if (!selection.signatureSetName) {
        throw new Error("No compatible reference signature set is available for the selected profile and table size.");
      }
      setStatus("Loading selected public data", `Fetching ${selection.sampleCount} spectra and ${selection.signatureSetName}.`, "running");
      const spectrumRows = await fetchSpectrumRowsForSamples(selectedSamples, selection);
      const signatureRows = await mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
        selection.strategy,
        selection.signatureSetName,
        selection.profile,
        selection.matrix,
        100000
      );
      const spectra = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(spectrumRows);
      const signatures = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(signatureRows, "signatureName");
      state.spectra = spectra;
      state.signatures = signatures;
      state.contexts = inferContexts(spectra, signatures);
      state.source = `mSigPortal public API: ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix}`;
      state.datasetStatus = "mSigPortal API";
      state.publicSelection = selection;
      spectraText.value = mSigSDK.io.exportSigProfilerMatrix(state.spectra, { contexts: state.contexts });
      signaturesText.value = mSigSDK.io.exportCOSMICSignatureMatrix(state.signatures, { contexts: state.contexts });
      updateSampleSelect(selectedSamples[0]?.sample);
      renderDataSummary();
      clearReview();
      updatePublicStatus();
      setStatus("Public data loaded", "Choose a sample or run the stability review with the selected public dataset.", "success");
    }

    function applyUploadedData() {
      const spectra = parseMatrix(spectraText.value, "spectra");
      const signatures = parseMatrix(signaturesText.value, "signatures");
      if (!matrixNames(spectra).length) throw new Error("No spectra samples were found.");
      if (!matrixNames(signatures).length) throw new Error("No reference signatures were found.");
      state.spectra = spectra;
      state.signatures = signatures;
      state.contexts = inferContexts(spectra, signatures);
      state.source = "uploaded or pasted matrices";
      state.datasetStatus = "user supplied";
      state.publicSelection = null;
      updateSampleSelect(sampleSelect.value);
      renderDataSummary();
      clearReview();
      setStatus("Uploaded data applied", "Run the review after confirming the selected sample and settings.", "success");
    }

    function buildDecisionRows() {
      return uncertaintyDecisionRows(reviewState.bootstrap, reviewState.thresholdSensitivity, {
        sample: reviewState.sample,
        minSelectionFrequency: parseNumber(selectionInput.value, 0.8),
        maxUncertaintyWidth: parseNumber(widthInput.value, 0.2),
        topN: 12,
      });
    }

    function warningTableRows(warnings = []) {
      return warningRows(warnings).map((row) => ({
        code: row.code,
        message: row.message,
        resolution: row.resolution,
      }));
    }

    async function renderFigureCard(title, caption, render) {
      const card = element("section", "uncertainty-figure-card");
      card.append(element("h4", "", title), element("p", "", caption));
      const host = element("div", "uncertainty-plot-host");
      card.append(host);
      figuresGrid.append(card);
      try {
        await render(host);
      } catch (error) {
        host.replaceChildren(note(error.message, "warning"));
      }
    }

    function currentFigureContext() {
      const publicSelection = state.publicSelection || {};
      return {
        dataset: state.source,
        study: publicSelection.study,
        cancerType: publicSelection.cancer,
        strategy: publicSelection.strategy,
        profile: publicSelection.profile,
        matrix: publicSelection.matrix,
        signatureCatalog: publicSelection.signatureSetName || "user supplied",
        sample: reviewState.sample,
        sampleCount: matrixNames(state.spectra).length,
        signatureCount: matrixNames(state.signatures).length,
        fittingThreshold: reviewState.exposureThreshold,
        bootstrapIterations: reviewState.iterations,
        cutoffGrid: reviewState.thresholds.join(", "),
      };
    }

    async function renderFigures() {
      figuresOutput.replaceChildren();
      if (!reviewState.bootstrap || !reviewState.thresholdSensitivity) {
        figuresOutput.append(note("Figures appear after the stability review finishes.", "info"));
        return;
      }
      figuresGrid.replaceChildren();
      figuresOutput.append(figuresGrid);
      await renderFigureCard(
        "Bootstrap exposure uncertainty",
        "Top fitted signatures by mean exposure. Full signature names and all rows remain in the decision and diagnostic tables.",
        (host) => mSigSDK.qcPlots.plotBootstrapExposureSummary(host, reviewState.bootstrap, {
          topN: 8,
          figureContext: currentFigureContext(),
          dataset: state.source,
          sample: reviewState.sample,
          signatureCatalog: state.publicSelection?.signatureSetName || "user supplied",
        })
      );
      await renderFigureCard(
        "Cutoff sensitivity",
        "Contribution cutoffs, active-signature counts, and reconstruction quality on separate readable scales.",
        (host) => mSigSDK.qcPlots.plotThresholdSensitivitySummary(host, reviewState.thresholdSensitivity, {
          figureContext: currentFigureContext(),
          dataset: state.source,
          sample: reviewState.sample,
          signatureCatalog: state.publicSelection?.signatureSetName || "user supplied",
        })
      );
    }

    function renderEvidenceGuide() {
      const wrapper = element("div", "uncertainty-evidence-guide");
      [
        {
          title: "Reporting decision",
          text: "Combines exposure size, bootstrap interval width, selection frequency, and cutoff-driven range for each fitted signature.",
        },
        {
          title: "Bootstrap evidence",
          text: "Tests repeat-fit stability for the selected sample; it supplies the confidence interval and selection-frequency columns.",
        },
        {
          title: "Cutoff evidence",
          text: "Tests whether removing small contributions changes the fitted answer; it supplies cutoff range and cohort-level drift context.",
        },
      ].forEach((item) => {
        const card = element("div", "uncertainty-evidence-card");
        card.append(element("strong", "", item.title), element("span", "", item.text));
        wrapper.append(card);
      });
      return wrapper;
    }

    function selectedResultTable() {
      return table(
        reviewState.decisions,
        [
          { key: "signature", label: "Signature" },
          { key: "meanExposure", label: "Mean exposure" },
          { key: "ciWidth", label: "95% CI width" },
          { key: "selectionFrequency", label: "Selection frequency" },
          { key: "cutoffRange", label: "Cutoff range" },
          { key: "decision", label: "Decision" },
        ],
        {
          title: "Reporting decision",
          caption: "Translates uncertainty and cutoff drift into a compact reporting recommendation for each fitted signature.",
        }
      );
    }

    function renderDiagnosticTables() {
      const warnings = [
        ...warningTableRows(reviewState.bootstrap?.warnings || []),
        ...warningTableRows(reviewState.thresholdSensitivity?.warnings || []),
      ];
      const detailsNode = element("details", "output-details uncertainty-source-tables");
      const summary = element("summary", "", "Source diagnostic tables");
      const stack = element("div", "workflow-output-stack");
      stack.append(
        note(
          "These tables are audit details behind the decision table. Use them to check the calculation source rather than as separate interpretation views.",
          "info"
        ),
        table(
          reviewState.bootstrapRows,
          [
            { key: "signature", label: "Signature" },
            { key: "mean", label: "Mean exposure" },
            { key: "lower95", label: "Lower 95% CI" },
            { key: "upper95", label: "Upper 95% CI" },
            { key: "selectionFrequency", label: "Selection frequency" },
          ],
          {
            title: "Bootstrap uncertainty",
            caption: "Shows repeat-fit exposure estimates for the selected sample.",
          }
        ),
        table(
          reviewState.thresholdRows,
          [
            { key: "threshold", label: "Contribution cutoff" },
            { key: "averageCosineSimilarity", label: "Mean cosine" },
            { key: "averageRmse", label: "Mean RMSE" },
            { key: "averageActiveSignatures", label: "Mean active signatures" },
          ],
          {
            title: "Cutoff sensitivity",
            caption: "Shows whether reconstruction and active-signature counts change when small contributions are removed.",
          }
        )
      );
      if (warnings.length) {
        stack.append(
          table(
            warnings,
            [
              { key: "code", label: "Warning code" },
              { key: "message", label: "Message" },
              { key: "resolution", label: "Resolution" },
            ],
            {
              title: "Review warnings",
              caption: "Shows SDK cues raised by uncertainty or cutoff checks.",
            }
          )
        );
      } else {
        stack.append(note("No uncertainty or cutoff warnings were raised for the current settings.", "info"));
      }
      detailsNode.append(summary, stack);
      return detailsNode;
    }

    function artifactText({ text, value }) {
      return text ?? JSON.stringify(value ?? {}, null, 2);
    }

    function makeDownloadButton({ filename, label, type = "text/plain;charset=utf-8", text, value }) {
      const node = button(label);
      node.addEventListener("click", () => {
        const content = artifactText({ text, value });
        const blob = new Blob([String(content)], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.append(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
      return node;
    }

    function makeCopyButton({ filename, label, text, value }) {
      const node = button(label);
      node.addEventListener("click", async () => {
        const content = String(artifactText({ text, value }));
        try {
          await navigator.clipboard.writeText(content);
          setStatus("Output copied", `${filename} copied to the clipboard.`, "success");
        } catch (error) {
          setStatus("Copy failed", error.message, "error");
        }
      });
      return node;
    }

    function renderSdkRecipe() {
      const detailsNode = element("details", "output-details uncertainty-source-tables");
      const summary = element("summary", "", "Recreate outputs with SDK calls");
      const pre = element("pre", "msigsdk-output-inspector");
      pre.textContent = `const bootstrapRows = mSigSDK.presentation.bootstrapRows(bootstrap, { topN: 12 });
const thresholdRows = mSigSDK.presentation.thresholdRows(thresholdSensitivity);
const figureContext = {
  dataSource,
  sample,
  signatureCatalog,
  exposureThreshold,
  bootstrapIterations,
  cutoffs,
};
const decisions = mSigSDK.presentation.uncertaintyDecisionRows(bootstrap, thresholdSensitivity, {
  sample,
  minSelectionFrequency: 0.8,
  maxUncertaintyWidth: 0.2,
  topN: 12,
});

mSigSDK.presentation.table(decisions, decisionColumns, { title: "Reporting decision" });
mSigSDK.presentation.table(bootstrapRows, bootstrapColumns, { title: "Bootstrap uncertainty" });
mSigSDK.presentation.table(thresholdRows, thresholdColumns, { title: "Cutoff sensitivity" });

await mSigSDK.qcPlots.plotBootstrapExposureSummary(bootstrapFigure, bootstrap, {
  topN: 8,
  figureContext,
  signatureCatalog,
});
await mSigSDK.qcPlots.plotThresholdSensitivitySummary(cutoffFigure, thresholdSensitivity, {
  figureContext,
  sample,
  signatureCatalog,
});`;
      detailsNode.append(
        summary,
        note("The notebook result tables and figures are generated from public mSigSDK helpers so the same output can be recreated in another page or report.", "info"),
        pre
      );
      return detailsNode;
    }

    function renderDownloads() {
      exportsOutput.replaceChildren();
      if (!reviewState.bootstrap || !reviewState.thresholdSensitivity) return;
      const wrapper = element("div", "uncertainty-downloads");
      const reviewPayload = {
        dataSource: state.source,
        sample: reviewState.sample,
        settings: {
          iterations: reviewState.iterations,
          seed: reviewState.seed,
          exposureThreshold: reviewState.exposureThreshold,
          thresholds: reviewState.thresholds,
        },
        decisions: reviewState.decisions,
        bootstrap: reviewState.bootstrap,
        thresholdSensitivity: reviewState.thresholdSensitivity,
      };
      const artifacts = [
        {
          filename: "uncertainty_decisions.csv",
          label: "decisions CSV",
          text: rowsToCsv(reviewState.decisions),
        },
        {
          filename: "uncertainty_bootstrap.csv",
          label: "bootstrap CSV",
          text: rowsToCsv(reviewState.bootstrapRows),
        },
        {
          filename: "uncertainty_thresholds.csv",
          label: "cutoff CSV",
          text: rowsToCsv(reviewState.thresholdRows),
        },
        {
          filename: "uncertainty_review.json",
          label: "review JSON",
          type: "application/json;charset=utf-8",
          value: reviewPayload,
        },
      ];
      artifacts.forEach((artifact) => {
        wrapper.append(
          makeDownloadButton({
            ...artifact,
            label: `Download ${artifact.label}`,
          }),
          makeCopyButton({
            ...artifact,
            label: `Copy ${artifact.label}`,
          })
        );
      });
      exportsOutput.append(
        note(
          "Use Copy when the browser blocks native downloads, including some embedded preview browsers.",
          "info"
        ),
        wrapper,
        renderSdkRecipe()
      );
    }

    async function renderResults() {
      if (!reviewState.bootstrap || !reviewState.thresholdSensitivity) {
        resultsOutput.replaceChildren(note("Run the stability review with the current data and settings.", "info"));
        figuresOutput.replaceChildren(note("Figures appear after the stability review finishes.", "info"));
        exportsOutput.replaceChildren();
        return;
      }
      reviewState.decisions = buildDecisionRows();
      resultsOutput.replaceChildren(
        metrics([
          { label: "Data source", value: state.source },
          { label: "Bootstrap sample", value: reviewState.sample },
          { label: "Iterations", value: reviewState.iterations },
          { label: "Cutoffs tested", value: reviewState.thresholds.length },
          { label: "Max mean cutoff drift", value: formatFraction(reviewState.thresholdSensitivity.summary?.maxMeanL1ExposureDrift) },
        ]),
        renderEvidenceGuide(),
        selectedResultTable(),
        renderDiagnosticTables()
      );
      await renderFigures();
      renderDownloads();
    }

    async function runReview() {
      if (!matrixNames(state.spectra).length || !matrixNames(state.signatures).length) {
        setStatus("Load data first", "Use the public example or apply uploaded spectra and signatures.", "warning");
        return;
      }
      const thresholds = parseThresholds(thresholdInput.value);
      if (thresholds.length < 3) {
        setStatus("Add at least three cutoffs", "A cutoff sweep needs a small grid to show whether results drift.", "warning");
        return;
      }
      const sample = sampleSelect.value || matrixNames(state.spectra)[0];
      if (!state.spectra[sample]) {
        setStatus("Choose a valid sample", "The selected sample is not present in the current spectra table.", "warning");
        return;
      }
      const iterations = Math.max(5, Math.round(parseNumber(iterationsInput.value, 40)));
      const seed = Math.round(parseNumber(seedInput.value, 42));
      const exposureThreshold = parseNumber(exposureInput.value, 0.01);

      runButton.disabled = true;
      setStatus("Running stability review", `Computing ${iterations} bootstrap refits for ${sample} and ${thresholds.length} cutoff settings.`, "running");
      resultsOutput.replaceChildren(note("Running uncertainty and cutoff calculations...", "info"));
      figuresOutput.replaceChildren(note("Preparing figures...", "info"));
      exportsOutput.replaceChildren();

      try {
        const bootstrap = await mSigSDK.qc.bootstrapSignatureFit(
          state.signatures,
          state.spectra[sample],
          {
            iterations,
            confidenceLevel: 0.95,
            exposureThreshold,
            seed,
            contexts: state.contexts,
          }
        );
        const thresholdSensitivity = await mSigSDK.qc.runThresholdSensitivity(
          state.signatures,
          state.spectra,
          {
            thresholds,
            baselineThreshold: thresholds.includes(exposureThreshold) ? exposureThreshold : thresholds[0],
            contexts: state.contexts,
          }
        );
        bootstrap.sampleName = sample;
        bootstrap.dataset = state.source;
        bootstrap.signatureCatalog = state.publicSelection?.signatureSetName || "user supplied";
        thresholdSensitivity.sampleName = sample;
        thresholdSensitivity.dataset = state.source;
        thresholdSensitivity.signatureCatalog = state.publicSelection?.signatureSetName || "user supplied";
        reviewState.sample = sample;
        reviewState.iterations = iterations;
        reviewState.seed = seed;
        reviewState.exposureThreshold = exposureThreshold;
        reviewState.thresholds = thresholds;
        reviewState.bootstrap = bootstrap;
        reviewState.thresholdSensitivity = thresholdSensitivity;
        reviewState.bootstrapRows = bootstrapRows(bootstrap, { topN: 12 });
        reviewState.thresholdRows = thresholdRows(thresholdSensitivity);
        setStatus("Stability review complete", "Figures, tables, and download buttons reflect the current data and settings.", "success");
        await renderResults();
      } catch (error) {
        setStatus("Review failed", error.message, "error");
        resultsOutput.replaceChildren(note(error.message, "warning"));
        figuresOutput.replaceChildren();
        exportsOutput.replaceChildren();
      } finally {
        runButton.disabled = false;
      }
    }

    addUncertaintyStyles();

    const root = element("section", "workflow-panel uncertainty-review-grid");
    const statusCard = element("div", "workflow-status-card uncertainty-review-status");
    const statusDot = element("div", "workflow-status-dot");
    const statusText = element("div");
    const statusTitle = element("strong", "", "Loading public data menu");
    const statusDetail = element("span", "", "Preparing API-backed spectra and signatures.");
    statusText.append(statusTitle, statusDetail);
    statusCard.append(statusDot, statusText);
    root.append(statusCard);
    display(root);

    const state = {
      source: "not loaded",
      datasetStatus: "",
      publicSelection: null,
      spectra: {},
      signatures: {},
      contexts: DEFAULT_CONTEXTS,
    };
    const reviewState = {
      sample: null,
      iterations: null,
      seed: null,
      exposureThreshold: null,
      thresholds: [],
      bootstrap: null,
      thresholdSensitivity: null,
      bootstrapRows: [],
      thresholdRows: [],
      decisions: [],
    };

    const publicStudySelect = select([]);
    const publicCancerSelect = select([]);
    const publicStrategySelect = select([]);
    const publicProfileSelect = select([]);
    const publicMatrixSelect = select([]);
    const publicSignatureSetSelect = select([]);
    const maxSamplesInput = input(6, "number", 1);
    maxSamplesInput.max = "50";
    const spectraText = textarea("Paste spectra JSON or a SigProfiler-style TSV matrix.");
    const signaturesText = textarea("Paste signature JSON or a COSMIC-style TSV matrix.");
    const sampleSelect = select([]);
    const exposureInput = input(0.01, "number", 0.005);
    const thresholdInput = input("0, 0.005, 0.01, 0.03, 0.05, 0.1");
    const iterationsInput = input(40, "number", 5);
    const seedInput = input(42, "number", 1);
    const selectionInput = input(0.8, "number", 0.05);
    const widthInput = input(0.2, "number", 0.05);
    const loadPublicButton = button("Load selected public data", true);
    const refreshPublicButton = button("Refresh public menu");
    const applyUploadButton = button("Apply uploaded data", true);
    const runButton = button("Run stability review", true);
    const publicStatus = element("p", "uncertainty-public-status", "Loading public dataset options from mSigPortal APIs...");

    const dataOutput = element("div", "workflow-output-stack");
    const resultsOutput = element("div", "workflow-output-stack");
    const figuresOutput = element("div", "workflow-output-stack");
    const figuresGrid = element("div", "uncertainty-figure-grid");
    const exportsOutput = element("div", "workflow-output-stack");

    const step1 = element("section", "uncertainty-review-step");
    const step1Header = element("header");
    step1Header.append(
      element("h3", "", "1. Load data"),
      element("p", "", "Choose real public mSigPortal data or provide project matrices. The review sample is selected separately because it drives the downstream stability review.")
    );
    const publicPanel = element("section", "uncertainty-source-panel");
    publicPanel.append(
      element("strong", "", "Public API data"),
      element("p", "", "Choose study, cancer type, sequencing strategy, mutation pattern table, signature catalog, and sample count.")
    );
    const publicControls = element("div", "workflow-control-grid compact");
    publicControls.append(
      field("Study", publicStudySelect),
      field("Cancer type", publicCancerSelect),
      field("Sequencing strategy", publicStrategySelect),
      field("Mutation type", publicProfileSelect),
      field("Matrix size", publicMatrixSelect),
      field("Signature catalog", publicSignatureSetSelect),
      field("Max samples", maxSamplesInput, "Small values keep bootstrap runs responsive.")
    );
    const publicButtonRow = element("div", "workflow-button-row");
    publicButtonRow.append(loadPublicButton, refreshPublicButton);
    publicPanel.append(publicControls, publicStatus, publicButtonRow);

    const samplePanel = element("section", "uncertainty-sample-panel");
    samplePanel.append(
      element("strong", "", "Review sample"),
      element("p", "", "Bootstrap intervals, cutoff sensitivity, figures, and downloads are generated for this sample."),
      field("Selected sample", sampleSelect, "Change the sample before running the stability review.")
    );

    const uploadDetails = element("details", "workflow-step-details uncertainty-advanced-inputs");
    const uploadSummary = element("summary", "", "Use pasted or uploaded matrices");
    const uploadStack = element("div", "workflow-output-stack");
    const uploadGrid = element("div", "uncertainty-upload-grid");
    uploadGrid.append(
      field("Spectra matrix", spectraText, "JSON object keyed by sample or SigProfiler-style TSV."),
      field("Signature catalog", signaturesText, "JSON object keyed by signature or COSMIC-style TSV.")
    );
    const uploadControls = element("div", "workflow-control-grid compact");
    uploadControls.append(
      field("Upload spectra", fileInput(spectraText), "Optional file input for the spectra matrix."),
      field("Upload signatures", fileInput(signaturesText), "Optional file input for the signature catalog.")
    );
    const uploadActions = element("div", "workflow-button-row");
    uploadActions.append(applyUploadButton);
    uploadStack.append(uploadGrid, uploadControls, uploadActions);
    uploadDetails.append(uploadSummary, uploadStack);
    step1.append(step1Header, publicPanel, samplePanel, uploadDetails, dataOutput);

    const step2 = element("section", "uncertainty-review-step");
    const step2Header = element("header");
    step2Header.append(
      element("h3", "", "2. Run the stability test"),
      element("p", "", "Bootstrap iterations test repeat-fit stability. The cutoff grid tests whether small contribution thresholds change the answer.")
    );
    const settingsGrid = element("div", "workflow-control-grid compact");
    settingsGrid.append(
      field("Minimum contribution", exposureInput, "Relative exposure floor used for bootstrap selection."),
      field("Cutoffs to test", thresholdInput, "Comma-separated relative contribution cutoffs."),
      field("Bootstrap iterations", iterationsInput, "Increase for smoother intervals."),
      field("Random seed", seedInput, "Keeps the browser run reproducible.")
    );
    const runActions = element("div", "workflow-button-row");
    runActions.append(runButton);
    step2.append(step2Header, settingsGrid, runActions);

    const step3 = element("section", "uncertainty-review-step");
    const step3Header = element("header");
    step3Header.append(
      element("h3", "", "3. Inspect the decision, figures, and downloads"),
      element("p", "", "The decision table is the interpretation surface. Bootstrap and cutoff source tables remain available as audit details.")
    );
    const resultControls = element("div", "workflow-control-grid compact");
    resultControls.append(
      field("Minimum selection frequency", selectionInput, "A signature below this frequency is not emphasized."),
      field("Maximum uncertainty width", widthInput, "Applies to 95% CI width and cutoff-driven exposure range.")
    );
    step3.append(step3Header, resultControls, resultsOutput, figuresOutput, exportsOutput);

    root.append(step1, step2, step3);

    loadPublicButton.addEventListener("click", async () => {
      loadPublicButton.disabled = true;
      try {
        await loadPublicData();
      } catch (error) {
        setStatus("Public data load failed", error.message, "error");
        dataOutput.replaceChildren(note(error.message, "warning"));
      } finally {
        loadPublicButton.disabled = false;
      }
    });
    refreshPublicButton.addEventListener("click", async () => {
      try {
        await loadPublicMenus(currentPublicSelection());
      } catch (error) {
        setStatus("Public menu load failed", error.message, "error");
      }
    });
    [publicStudySelect, publicStrategySelect, publicProfileSelect, publicMatrixSelect].forEach((control) => {
      control.addEventListener("change", () => {
        populatePublicMenus(currentPublicSelection());
        markStale();
      });
    });
    [publicCancerSelect, publicSignatureSetSelect, maxSamplesInput].forEach((control) => {
      control.addEventListener("change", () => {
        updatePublicStatus();
        markStale();
      });
      control.addEventListener("input", updatePublicStatus);
    });
    applyUploadButton.addEventListener("click", () => {
      try {
        applyUploadedData();
      } catch (error) {
        setStatus("Uploaded data needs review", error.message, "error");
        dataOutput.replaceChildren(note(error.message, "warning"));
      }
    });
    sampleSelect.addEventListener("change", () => {
      renderDataSummary();
      markStale();
    });
    [exposureInput, thresholdInput, iterationsInput, seedInput].forEach((control) => {
      control.addEventListener("input", markStale);
    });
    [selectionInput, widthInput].forEach((control) => {
      control.addEventListener("input", renderResults);
      control.addEventListener("change", renderResults);
    });
    runButton.addEventListener("click", runReview);

    try {
      await loadPublicData();
      await runReview();
    } catch (error) {
      setStatus("Public data load failed", error.message, "error");
      dataOutput.replaceChildren(note(error.message, "warning"));
    }
  </script>
</notebook>
