  <title>mSigSDK uncertainty and cutoffs</title>

  <script type="text/markdown">
    # Uncertainty and cutoffs

    Use this notebook after you understand the basic known-signature fitting workflow. It teaches two questions that come up immediately after fitting: are the estimated signature contributions stable, and do the conclusions depend on the minimum contribution cutoff?

    The code uses count-scale public mSigPortal spectra selected from moderate-to-high mutation-count PCAWG WGS Lung-AdenoCA samples, but the same functions work with your own spectra and reference signatures. Replace the loading block with your own tables, keep the uncertainty and cutoff cells, and tune the iteration count and cutoff grid for your analysis plan.

    The story begins after a fit already exists. A researcher now asks which fitted signatures are stable enough to report and which depend too strongly on sampling noise or cutoff choice.

    **Unique role:** stress-test fitted contributions with bootstrap intervals and reporting cutoff sweeps.

    **Leave to focused notebooks:** input discovery, MAF conversion, panel coverage review, and report export mechanics.

    **After running it you should know:** which signature calls are stable, borderline, cutoff-dependent, or too uncertain to report.
  </script>

  <script type="module" pinned id="1">
    const uncSdkUrl = new URL("../main.js?v=2026-05-13-count-workflow-uncertainty", location.href).href;
    const { mSigSDK } = await import(uncSdkUrl);
    const {
      demoSignatures,
      demoSpectra,
    } = await import("./msig-notebook-fixtures.js");
    const {
      bootstrapRows,
      burdenSampleRows,
      details,
      metrics,
      table,
      thresholdRows,
    } = mSigSDK.presentation;

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Question", value: "Are signature contributions stable?" },
      { label: "Main namespace", value: "qc" },
    ]));
    display(table(
      [
        { functionName: "qc.bootstrapSignatureFit", workflowValue: "Shows confidence intervals and selection frequency for one sample" },
        { functionName: "qc.runThresholdSensitivity", workflowValue: "Tests whether signature contribution conclusions depend on the reporting floor" },
        { functionName: "qcPlots.*", workflowValue: "Turns the returned objects into interpretable figures" },
        { functionName: "presentation.*", workflowValue: "Formats compact evidence tables" },
      ],
      [
        { key: "functionName", label: "Function" },
        { key: "workflowValue", label: "Workflow value" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 1. Set the analysis grid

    Uncertainty and cutoff analyses can be expensive because they repeat fitting. Keep the defaults small while learning the API. Increase `uncBootstrapIterations` for smoother intervals, edit `uncThresholdGrid` to match the cutoffs you plan to report, or replace `uncExampleSampleNames` with samples from your cohort.

    This step defines the stress test. A confusing uncertainty result is often a sign that the grid does not match the cutoffs the project intends to use.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "uncertainty-thresholds", step: 1, phase: "data", title: "Step 1. Set the analysis grid", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const uncContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const uncStudy = "PCAWG";
    const uncGenomeDataType = "WGS";
    const uncCancerType = "Lung-AdenoCA";
    const uncMutationType = "SBS";
    const uncMatrixSize = 96;
    const uncSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const uncExampleSampleNames = [
      "SP50611",
      "SP53387",
      "SP50827",
      "SP52779",
      "SP52667",
      "SP52232",
    ];
    const uncSampleLimit = uncExampleSampleNames.length;
    const uncExposureThreshold = 0.01;
    const uncBootstrapIterations = 40;
    const uncThresholdGrid = [0, 0.005, 0.01, 0.03, 0.05, 0.1];
    const uncPreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];

    let uncDataSourceStatus = "live mSigPortal";
    let uncAllGroupedSpectra;
    let uncAllReferenceSignatures;
    try {
      const [uncRawSpectrumRows, uncRawSignatureRows] = await Promise.all([
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          uncStudy,
          uncExampleSampleNames,
          uncGenomeDataType,
          uncCancerType,
          uncMutationType,
          uncMatrixSize
        ),
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          uncGenomeDataType,
          uncSignatureSetName,
          uncMutationType,
          uncMatrixSize,
          10000
        ),
      ]);
      const uncSpectrumRows = Array.isArray(uncRawSpectrumRows)
        ? uncRawSpectrumRows.flat()
        : [];
      const uncSignatureRows = Array.isArray(uncRawSignatureRows)
        ? uncRawSignatureRows.flat()
        : [];
      uncAllGroupedSpectra =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(uncSpectrumRows);
      uncAllReferenceSignatures =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
          uncSignatureRows,
          "signatureName"
        );
      if (Object.keys(uncAllGroupedSpectra).length < 2 || Object.keys(uncAllReferenceSignatures).length < 3) {
        throw new Error("mSigPortal returned too few matrices for uncertainty review.");
      }
    } catch (error) {
      uncDataSourceStatus = `embedded fallback: ${error.message}`;
      uncAllGroupedSpectra = demoSpectra();
      uncAllReferenceSignatures = demoSignatures();
    }
    const uncAllBurden = mSigSDK.qc.summarizeMutationBurden(
      uncAllGroupedSpectra,
      { expectedContexts: uncContexts }
    );
    const uncAvailableSampleNames = uncExampleSampleNames.filter(
      (sample) => uncAllGroupedSpectra[sample]
    );
    const uncSelectedBurdenSamples = mSigSDK.qc.selectSamplesByMutationBurden(
      uncAllBurden,
      {
        sampleNames: uncAvailableSampleNames.length
          ? uncAvailableSampleNames
          : Object.keys(uncAllGroupedSpectra),
        minTotalMutations: 1,
        limit: uncSampleLimit,
      }
    );
    const uncSelectedSampleNames = uncSelectedBurdenSamples.map(
      (sample) => sample.sample
    );
    const uncGroupedSpectra = Object.fromEntries(
      uncSelectedSampleNames.map((sample) => [sample, uncAllGroupedSpectra[sample]])
    );
    const uncPreferredAvailableSignatures = uncPreferredSignatureNames
      .filter((signature) => uncAllReferenceSignatures[signature])
      .slice(0, 8);
    const uncSelectedSignatureNames = uncPreferredAvailableSignatures.length
      ? uncPreferredAvailableSignatures
      : Object.keys(uncAllReferenceSignatures).slice(0, 8);
    const uncReferenceSignatures = Object.fromEntries(
      uncSelectedSignatureNames.map((signature) => [
        signature,
        uncAllReferenceSignatures[signature],
      ])
    );
    const uncBootstrapSample = uncSelectedSampleNames.includes("SP50611")
      ? "SP50611"
      : uncSelectedSampleNames[0];

    display(metrics([
      { label: "Data source", value: uncDataSourceStatus },
      { label: "Samples", value: uncSelectedSampleNames.length },
      { label: "Signatures", value: uncSelectedSignatureNames.length },
      { label: "Bootstrap sample", value: uncBootstrapSample },
      { label: "Bootstrap iterations", value: uncBootstrapIterations },
      { label: "Cutoffs tested", value: uncThresholdGrid.length },
    ]));
    display(table(
      burdenSampleRows(uncAllBurden, uncSelectedSampleNames),
      [
        { key: "sample", label: "Selected sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
      ],
      { maxRows: 6 }
    ));
    display(table(
      uncThresholdGrid.map((threshold) => ({
        threshold,
        meaning: threshold === 0 ? "Keep every fitted exposure" : `Zero exposures below ${threshold}`,
      })),
      [
        { key: "threshold", label: "Contribution cutoff" },
        { key: "meaning", label: "Interpretation" },
      ]
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Run uncertainty resampling and a cutoff sweep

    Bootstrap resampling repeatedly perturbs one sample and refits signature contributions. Cutoff sensitivity fits the cohort across a grid of minimum contribution values. Read the returned objects first; the plots in the next cells are wrappers around these data structures.

    These computations are not alternative signature calls. They are checks on how much confidence to place in the fitted call from the main workflow.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "uncertainty-thresholds", step: 2, phase: "visualize", title: "Step 2. Run uncertainty resampling and a cutoff sweep", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const uncBootstrapResult = await mSigSDK.qc.bootstrapSignatureFit(
      uncReferenceSignatures,
      uncGroupedSpectra[uncBootstrapSample],
      {
        iterations: uncBootstrapIterations,
        confidenceLevel: 0.95,
        exposureThreshold: uncExposureThreshold,
        seed: 42,
        contexts: uncContexts,
      }
    );
    const uncThresholdSensitivityResult = await mSigSDK.qc.runThresholdSensitivity(
      uncReferenceSignatures,
      uncGroupedSpectra,
      {
        thresholds: uncThresholdGrid,
        contexts: uncContexts,
      }
    );

    const uncBootstrapRows = bootstrapRows(uncBootstrapResult, { topN: 8 });
    const uncThresholdRows = thresholdRows(uncThresholdSensitivityResult);

    display(metrics([
      { label: "Bootstrap signatures", value: uncBootstrapResult.signatures.length },
      { label: "Cutoff runs", value: uncThresholdSensitivityResult.runs.length },
      { label: "Confidence level", value: "95%" },
      { label: "Seed", value: 42 },
    ]));
    display(table(
      uncBootstrapRows,
      [
        { key: "signature", label: "Signature" },
        { key: "mean", label: "Mean exposure" },
        { key: "lower95", label: "Lower CI" },
        { key: "upper95", label: "Upper CI" },
        { key: "selectionFrequency", label: "Selection frequency" },
      ]
    ));
    display(table(
      uncThresholdRows,
      [
        { key: "threshold", label: "Cutoff" },
        { key: "averageCosineSimilarity", label: "Mean cosine" },
        { key: "averageRmse", label: "Mean RMSE" },
        { key: "averageActiveSignatures", label: "Mean active signatures" },
      ]
    ));
    display(details("Full uncertainty result objects", {
      bootstrap: uncBootstrapResult,
      thresholdSensitivity: uncThresholdSensitivityResult,
    }));
  </script>

  <script type="text/markdown">
    ## Step 3. Read signature contribution uncertainty

    The plot shows bootstrap draws, confidence intervals, mean exposures, and selection frequencies. Stable signatures have narrow intervals and high selection frequency. Wide intervals or low selection frequency suggest that a fitted exposure should be reported cautiously.

    Read this table as a statement about repeatability. A signature that appears in only a minority of bootstrap draws should not be described with the same certainty as a consistently selected signature.
  </script>

  <script type="module" pinned id="interactive-step-3">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "uncertainty-thresholds", step: 3, phase: "visualize", title: "Step 3. Read signature contribution uncertainty", mSigSDK, display });
  </script>

  <script type="module" pinned id="4">
    const uncBootstrapDiv = document.createElement("div");
    uncBootstrapDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotBootstrapConfidenceIntervals(
      uncBootstrapDiv,
      uncBootstrapResult
    );
    display(uncBootstrapDiv);
  </script>

  <script type="text/markdown">
    ## Step 4. Check cutoff stability

    The sensitivity plot compares every cutoff against the baseline cutoff. Large drift means the interpretation depends strongly on the cutoff choice. In your own analyses, this is a useful place to document why you chose a reporting cutoff.

    If a signature disappears or changes rank across reasonable cutoffs, report the dependence explicitly or revise the reporting cutoff before producing final figures.
  </script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "uncertainty-thresholds", step: 4, phase: "visualize", title: "Step 4. Check cutoff stability", mSigSDK, display });
  </script>

  <script type="module" pinned id="5">
    const uncThresholdDiv = document.createElement("div");
    uncThresholdDiv.style.width = "100%";
    await mSigSDK.qcPlots.plotThresholdSensitivity(
      uncThresholdDiv,
      uncThresholdSensitivityResult
    );
    display(uncThresholdDiv);
  </script>

  <script type="text/markdown">
    ## Step 5. Convert uncertainty output into reporting decisions

    Confidence intervals, selection frequency, and cutoff drift should be translated into a short decision table before signature contributions are reported. This table is a compact pattern for manuscript supplements, review memos, or application tooltips.

    The final decision table is where uncertainty becomes usable guidance: report, caveat, review manually, or omit from the main interpretation.
  </script>

  <script type="module" pinned id="interactive-step-5">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "uncertainty-thresholds", step: 5, phase: "review", title: "Step 5. Convert uncertainty output into reporting decisions", mSigSDK, display });
  </script>

  <script type="module" pinned id="6">
    const uncDecisionRows = uncBootstrapRows.map((row) => {
      const width = Number(row.upper95 || 0) - Number(row.lower95 || 0);
      const stableSelection = Number(row.selectionFrequency || 0) >= 0.8;
      const narrowInterval = width <= 0.2;
      return {
        signature: row.signature,
        meanExposure: row.mean,
        intervalWidth: width,
        selectionFrequency: row.selectionFrequency,
        reportingDecision:
          stableSelection && narrowInterval
            ? "routine_with_qc_context"
            : "report_with_uncertainty_caveat",
      };
    });
    const uncWarningRows = [
      ...warningRows(uncBootstrapResult.warnings || []),
      ...warningRows(uncThresholdSensitivityResult.warnings || []),
    ];

    display(table(
      uncDecisionRows,
      [
        { key: "signature", label: "Signature" },
        { key: "meanExposure", label: "Mean exposure" },
        { key: "intervalWidth", label: "95% CI width" },
        { key: "selectionFrequency", label: "Selection frequency" },
        { key: "reportingDecision", label: "Reporting decision" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      uncWarningRows,
      [
        { key: "code", label: "Warning code" },
        { key: "message", label: "Message" },
        { key: "resolution", label: "Resolution" },
      ],
      { maxRows: 8 }
    ));
    display(downloadMany([
      {
        filename: "uncertainty_bootstrap.csv",
        text: rowsToCsv(uncBootstrapRows),
        label: "Download bootstrap CSV",
      },
      {
        filename: "uncertainty_thresholds.csv",
        text: rowsToCsv(uncThresholdRows),
        label: "Download cutoff CSV",
      },
      {
        filename: "uncertainty_report.json",
        type: "json",
        value: {
          dataSourceStatus: uncDataSourceStatus,
          bootstrap: uncBootstrapResult,
          thresholdSensitivity: uncThresholdSensitivityResult,
          decisions: uncDecisionRows,
          warnings: uncWarningRows,
          parameters: {
            bootstrapIterations: uncBootstrapIterations,
            exposureThreshold: uncExposureThreshold,
            thresholdGrid: uncThresholdGrid,
          },
        },
        label: "Download uncertainty JSON",
      },
    ]));
  </script>
