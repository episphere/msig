<script type="text/markdown">
# Multi-tool comparison

Choose a public SBS96 dataset or upload one spectra table, then triage the samples where fitting engines disagree on the same spectra and reference-signature catalog.

The default benchmark uses 38 cached PCAWG lung adenocarcinoma WGS spectra and the full COSMIC v3 SBS96 catalog from the E2 adapter-fidelity experiment. mSigSDK is recomputed in the browser. The four executable external package adapters supported by the SDK are shown explicitly: deconstructSigs, sigminer, SigProfilerAssignment, and MuSiCal. Public API and uploaded SBS96 spectra use the selected reference catalog automatically; browser package engines run when their package builds are available. Displays reduce crowded full-catalog exposure matrices to top signatures plus explicit lower-ranked remainders when needed.

Read the outputs as disagreement triage, not a leaderboard. The useful result is the short list of samples where engine choice changes the exposure vector or dominant signature enough to require interpretation.
</script>

function engineParseCsv(text, delimiter = null) {
  const firstLine = String(text || "").split(/\r?\n/, 1)[0] || "";
  const separator = delimiter || (firstLine.includes("\t") ? "\t" : ",");
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;

  for (let i = 0; i < text.length; i += 1) {
    const character = text[i];
    const nextCharacter = text[i + 1];
    if (character === '"' && quoted && nextCharacter === '"') {
      cell += '"';
      i += 1;
    } else if (character === '"') {
      quoted = !quoted;
    } else if (character === separator && !quoted) {
      row.push(cell);
      cell = "";
    } else if ((character === "\n" || character === "\r") && !quoted) {
      if (character === "\r" && nextCharacter === "\n") i += 1;
      row.push(cell);
      if (row.some((value) => value !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += character;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    if (row.some((value) => value !== "")) rows.push(row);
  }

  const headers = rows.shift() || [];
  return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""])));
}

async function engineFetchCsv(path) {
  const response = await fetch(new URL(path, location.href));
  if (!response.ok) throw new Error(`Unable to load ${path}: ${response.status}`);
  return engineParseCsv(await response.text());
}

async function engineFetchJson(path) {

  return await response.json();
}

function engineNumericRows(rows, idColumn) {
  return rows.map((row) => {
    const numeric = { [idColumn]: row[idColumn] };
    for (const [key, value] of Object.entries(row)) {
      if (key !== idColumn) numeric[key] = Number(value) || 0;
    }
    return numeric;
  });
}

function engineMatrixFromRows(rows, idColumn) {
  const matrix = {};
  for (const row of engineNumericRows(rows, idColumn)) {
    const id = row[idColumn];
    matrix[id] = Object.fromEntries(Object.entries(row).filter(([key]) => key !== idColumn));
  }
  return matrix;
}

function engineSum(values) {
  return values.reduce((sum, value) => sum + value, 0);
}

function engineMean(values) {
  return values.length ? engineSum(values) / values.length : 0;
}

function engineMedian(values) {
  if (!values.length) return 0;
  const sorted = [...values].sort((a, b) => a - b);
  const middle = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[middle] : (sorted[middle - 1] + sorted[middle]) / 2;
}

function engineTopExposure(exposures) {
  const entries = Object.entries(exposures || {}).sort((left, right) => right[1] - left[1]);
  return {
    signature: entries[0]?.[0] || "NA",
    exposure: entries[0]?.[1] || 0,
    secondSignature: entries[1]?.[0] || "NA",
    secondExposure: entries[1]?.[1] || 0
  };
}

function engineExposureCosine(left, right, signatures) {
  const numerator = signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) * (right?.[signature] || 0), 0);
  const leftNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) ** 2, 0));
  const rightNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (right?.[signature] || 0) ** 2, 0));
  return leftNorm && rightNorm ? numerator / (leftNorm * rightNorm) : 0;
}

function engineRound(value, digits = 3) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : null;
}

function engineCsvNumber(value, digits = 6) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : "";
}

function engineFormatDecimal(value, digits = 3) {
  return Number.isFinite(value) ? formatNumber(engineRound(value, digits), digits + 1) : "n/a";
}

function engineFormatCount(value) {
  const numeric = Number(value);
  return Number.isFinite(numeric) ? Math.round(numeric).toLocaleString("en-US") : "n/a";
}

function engineSelect(options, value) {
  const select = document.createElement("select");
  select.replaceChildren(...options.map((option) => {
    const node = document.createElement("option");
    node.value = option.value;
    node.textContent = option.label;
    return node;
  }));
  select.value = value;
  return select;
}

function engineOptionNode(label, value = label) {
  const option = document.createElement("option");
  option.value = String(value);
  option.textContent = String(label);
  return option;
}

function engineSetSelectOptions(select, items, preferredValue = "") {
  const normalized = items.map((item) =>
    typeof item === "string" || typeof item === "number"
      ? { label: item, value: item }
      : item
  );
  select.replaceChildren(...normalized.map((item) => engineOptionNode(item.label, item.value)));
  const values = normalized.map((item) => String(item.value));
  if (preferredValue && values.includes(String(preferredValue))) {
    select.value = String(preferredValue);
  } else if (values.length) {
    select.value = values[0];
  }
  return select.value;
}

function engineReadFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
    reader.readAsText(file);
  });
}

function engineFileInput(target) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,.txt,.tsv,.csv";
  input.addEventListener("change", async () => {
    if (input.files?.[0]) {
      target.value = await engineReadFileAsText(input.files[0]);
      target.dispatchEvent(new Event("input", { bubbles: true }));
    }
  });
  return input;
}

function engineSafeSlug(value) {
  return String(value || "value")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .slice(0, 42) || "value";
}

function engineExportPrefix(state) {

  ].join("_");
}

function engineReviewLimit(rows) {
  return Math.min(10, rows.length);
}

function engineRowsWithSelected(rows, selectedSample, limit) {
  const visibleRows = rows.slice(0, limit);
  if (!selectedSample || visibleRows.some((row) => row.sample === selectedSample)) return visibleRows;
  const selectedRow = rows.find((row) => row.sample === selectedSample);
  if (!selectedRow) return visibleRows;
  return [...visibleRows.slice(0, Math.max(0, limit - 1)), selectedRow];
}

function engineSelectedSampleRow(state) {
  return engineSampleRows(state).find((row) => row.sample === state.sample) || null;
}

function engineParseMatrixText(text, kind) {
  const trimmed = String(text || "").trim();
  if (!trimmed) throw new Error(`${kind} table is empty.`);
  try {
    const parsed = JSON.parse(trimmed);
    if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
  } catch (_error) {
    // Try delimited matrix after JSON.
  }
  const delimiter = trimmed.split(/\r?\n/, 1)[0]?.includes("\t") ? "\t" : ",";
  return kind === "spectra"
    ? mSigSDK.io.importSigProfilerMatrix(trimmed, { delimiter })
    : mSigSDK.io.importCOSMICSignatureMatrix(trimmed, { delimiter });
}

function engineInferContexts(spectra, signatures) {
  const firstSpectrum = Object.values(spectra || {}).find((record) => record && typeof record === "object");
  if (firstSpectrum && Object.keys(firstSpectrum).length) return Object.keys(firstSpectrum);
  const firstSignature = Object.values(signatures || {}).find((record) => record && typeof record === "object");
  if (firstSignature && Object.keys(firstSignature).length) return Object.keys(firstSignature);
  return [];
}

function engineNotebookTable(rows, columns, options = {}) {
  const node = table(rows, columns, {
    title: options.title,
    caption: options.caption,
    maxRows: options.maxRows ?? 12
  });
  if (options.className) node.classList.add(options.className);
  if (options.selectedMarkerKey) {
    const markerColumnIndex = columns.findIndex((column) => column.key === options.selectedMarkerKey);
    if (markerColumnIndex >= 0) {
      node.querySelectorAll("tbody tr").forEach((row) => {
        const markerCell = row.children[markerColumnIndex];
        if (markerCell?.textContent.trim()) row.classList.add("is-selected");
      });
    }
  }
  return node;
}

function engineExposureLongRows(exposureSets, sampleNames, signatures) {
  const rows = [];
  for (const [engine, exposuresBySample] of Object.entries(exposureSets)) {
    for (const sample of sampleNames) {
      const exposures = exposuresBySample?.[sample];
      if (!exposures) continue;
      for (const signature of signatures) {
        rows.push({
          engine,
          sample,
          signature,
          exposure: engineCsvNumber(exposures[signature] || 0, 8)
        });
      }
    }
  }
  return rows;
}

function enginePairComparison(leftName, rightName, sampleNames, signatures) {
  const leftSet = engineExposureSets[leftName];
  const rightSet = engineExposureSets[rightName];
  const sampleRows = [];

  for (const sample of sampleNames) {
    const left = leftSet?.[sample];
    const right = rightSet?.[sample];
    if (!left || !right) continue;
    const leftTop = engineTopExposure(left);
    const rightTop = engineTopExposure(right);
    const cosine = engineExposureCosine(left, right, signatures);
    sampleRows.push({
      sample,
      mutations: engineMutationBurdens[sample],
      engine_a: leftName,
      engine_b: rightName,
      engine_a_top: leftTop.signature,
      engine_b_top: rightTop.signature,
      exposure_cosine: cosine,
      top_signature_match: leftTop.signature === rightTop.signature
    });
  }

  return sampleRows;
}

function enginePairSummary(leftName, rightName, sampleRows, cutoff) {
  const cosines = sampleRows.map((row) => row.exposure_cosine);
  const topMatches = sampleRows.filter((row) => row.top_signature_match).length;
  const belowCutoff = sampleRows.filter((row) => row.exposure_cosine < cutoff).length;
  const topDisagreements = sampleRows.length - topMatches;
  return {
    engine_a: leftName,
    engine_b: rightName,
    samples: sampleRows.length,
    mean_cosine: engineRound(engineMean(cosines), 4),
    median_cosine: engineRound(engineMedian(cosines), 4),
    minimum_cosine: cosines.length ? engineRound(Math.min(...cosines), 4) : null,
    samples_below_cutoff: belowCutoff,
    top_signature_disagreements: topDisagreements,
    top_signature_match_rate: sampleRows.length ? engineRound(topMatches / sampleRows.length, 4) : null,
    review_priority: belowCutoff || topDisagreements ? "Review" : "Aligned"
  };
}

function engineStatusForOutput(name, sourceKind, output = null) {
  const roster = ENGINE_ROSTER.find((engine) => engine.name === name) || { name };
  const existingExposures = output?.exposures || engineExposureSets[name] || null;
  if (output?.status === "running") {
    return {
      engine: name,
      runtime: output.runtime || (sourceKind === "benchmark" ? roster.runtime : roster.dynamicRuntime || roster.runtime),
      samples: existingExposures ? Object.keys(existingExposures).length : 0,
      loaded_output: output.loadedOutput || `Running ${name} for the active data.`,
      review_status: "Running"
    };
  }
  if (output?.error) {
    return {
      engine: name,
      runtime: output.runtime || (sourceKind === "benchmark" ? roster.runtime : roster.dynamicRuntime || roster.runtime),
      samples: existingExposures ? Object.keys(existingExposures).length : 0,
      loaded_output: existingExposures
        ? `${output.error} Existing browser-computed exposures remain available.`
        : output.error,
      review_status: existingExposures ? "Fallback" : "Failed"
    };
  }
  if (name === "mSigSDK live") {
    return {
      engine: name,
      runtime: roster.runtime,
      samples: Object.keys(engineMsiSdkLiveExposures || {}).length,
      loaded_output: roster.loadedOutput,
      review_status: "Ready"
    };
  }
  if (output?.exposures) {
    return {
      engine: name,
      runtime: output.runtime || (sourceKind === "benchmark" ? roster.runtime : roster.dynamicRuntime || roster.runtime),
      samples: Object.keys(output.exposures || {}).length,
      loaded_output: output.loadedOutput || (sourceKind === "benchmark" ? roster.loadedOutput : roster.dynamicLoadedOutput || "Computed for active data"),
      review_status: output.reviewStatus || "Ready"
    };
  }
  return {
    engine: name,
    runtime: sourceKind === "benchmark" ? roster.runtime : roster.dynamicRuntime || roster.runtime,
    samples: 0,
    loaded_output: sourceKind === "benchmark"
      ? `No cached ${name} output was loaded for this benchmark.`
      : `${name} exact package output is not generated for public or uploaded data in this notebook.`,
    review_status: roster.unavailable || "Not loaded"
  };
}

function engineBuildStatusRows(sourceKind, externalOutputs) {
  const outputByName = new Map((externalOutputs || [])
    .filter((output) => output?.name)
    .map((output) => [output.name, output]));

}

function engineUpdateReferenceOptions() {
  if (typeof engineReferenceSelect === "undefined" || !engineReferenceSelect) return;
  const previousReference = engineReferenceSelect.value;
  const options = engineStatusRows.map((row) => {
    const option = document.createElement("option");
    option.value = row.engine;
    option.textContent = engineExposureSets[row.engine] ? row.engine : `${row.engine} (${row.review_status})`;
    option.disabled = !engineExposureSets[row.engine];
    return option;
  });
  engineReferenceSelect.replaceChildren(...options);
  engineReferenceSelect.value = Object.keys(engineExposureSets).includes(previousReference)
    ? previousReference
    : "mSigSDK live";
}

function engineApplyExternalOutput(output) {
  if (!output?.name) return;
  engineExternalOutputs = [
    ...engineExternalOutputs.filter((candidate) => candidate?.name !== output.name),
    output
  ];
  if (output.exposures) {
    engineExposureSets[output.name] = output.exposures;
  } else if (!output.keepExisting) {
    delete engineExposureSets[output.name];
  }
  engineStatusRows = engineBuildStatusRows(engineActiveDataset.sourceKind, engineExternalOutputs);
  engineActiveDataset = {
    ...engineActiveDataset,
    externalOutputs: engineExternalOutputs.map((candidate) => candidate.name)
  };
  engineUpdateReferenceOptions();
  engineRender();
}

async function engineSetActiveDataset({
  spectra,
  signatures,
  sourceLabel,
  sourceKind,
  contexts = null,
  externalOutputs = []
}) {
  engineSpectra = JSON.parse(JSON.stringify(spectra || {}));
  engineReferenceSignatures = JSON.parse(JSON.stringify(signatures || {}));
  engineSampleNames = Object.keys(engineSpectra);
  engineSignatureNames = Object.keys(engineReferenceSignatures);
  engineContextNames = contexts?.length ? [...contexts] : engineInferContexts(engineSpectra, engineReferenceSignatures);
  engineMutationBurdens = Object.fromEntries(
    engineSampleNames.map((sample) => [sample, engineSum(Object.values(engineSpectra[sample] || {}))])
  );

  if (!engineSampleNames.length) throw new Error("The active spectra table has no samples.");
  if (!engineSignatureNames.length) throw new Error("The active signature catalog has no signatures.");
  if (!engineContextNames.length) throw new Error("The active dataset has no SBS contexts.");

  engineMsiSdkLiveExposures = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
    engineReferenceSignatures,
    engineSpectra,
    {
      contexts: engineContextNames,
      exposureThreshold: 0.01,
      exposureType: "relative",
      renormalize: true,
      includeFitDetails: true
    }
  );
  engineMsiSdkLiveExposures = engineMsiSdkLiveExposures?.exposures || engineMsiSdkLiveExposures || {};

  engineExposureSets = { "mSigSDK live": engineMsiSdkLiveExposures };
  for (const output of externalOutputs) {
    if (output?.name && output?.exposures) engineExposureSets[output.name] = output.exposures;
  }

  engineExternalOutputs = [...externalOutputs];
  engineStatusRows = engineBuildStatusRows(sourceKind, engineExternalOutputs);
  engineUpdateReferenceOptions();

  engineActiveDataset = {
    sourceLabel,
    sourceKind,
    contexts: engineContextNames.length,
    externalOutputs: externalOutputs.map((output) => output.name)
  };
  engineRender();
}

function engineExposureSetFromPairs(rows, tool, exposureKey = "browserExposure") {
  const exposures = {};

    if (!exposures[row.sample]) exposures[row.sample] = {};
    exposures[row.sample][row.signature] = Number(row[exposureKey] || 0);
  }
  return exposures;
}

function enginePackageErrorMessage(error, engineName = "") {
  const message = error?.message || String(error || "Package run failed.");
  if (engineName.includes("MuSiCal") && /ModuleNotFoundError|No module named|Can't find a pure Python/i.test(message)) {
    return "MuSiCal is not available in Pyodide without a compatible package or wheel.";
  }
  const moduleMatch = message.match(/ModuleNotFoundError:\s*No module named ['"]([^'"]+)['"]/i);
  if (moduleMatch) {
    return `${moduleMatch[1]} is not available in this browser package runtime.`;
  }
  const compact = message.replace(/\s+/g, " ").trim();
  return compact.slice(0, 260);
}

async function engineRunDynamicPackageEngines() {
  if (engineActiveDataset.sourceKind === "benchmark") return;
  const jobs = enginePackageJobs();
  for (const job of jobs) {
    engineApplyExternalOutput({
      name: job.name,
      runtime: job.runtime,
      status: "running",
      loadedOutput: job.running,
      keepExisting: job.keepExistingOnFailure
    });
    engineSetSourceStatus("Running package engines", job.running, "running");
    try {
      const result = await job.run();
      if (!result?.exposures || !Object.keys(result.exposures).length) {
        throw new Error(`${job.name} finished without a parsed exposure table.`);
      }
      engineApplyExternalOutput({
        name: job.name,
        runtime: result.displayRuntime || job.runtime,
        exposures: result.exposures,
        loadedOutput: result.loadedOutput || job.loadedOutput,
        reviewStatus: result.reviewStatus || "Ready",
        resultStatus: result.status || "completed"
      });
    } catch (error) {
      engineApplyExternalOutput({
        name: job.name,
        runtime: job.runtime,
        error: enginePackageErrorMessage(error, job.name),
        keepExisting: job.keepExistingOnFailure
      });
    }
  }
  engineSetSourceStatus("", "", "clear");
}

function engineReferenceRows(state) {
  const computedRows = Object.keys(engineExposureSets)
    .filter((engine) => engine !== state.reference)
    .map((engine) => {
      const sampleRows = enginePairComparison(state.reference, engine, engineSampleNames, engineSignatureNames);
      const row = enginePairSummary(state.reference, engine, sampleRows, state.cutoff);
      const status = engineStatusRows.find((candidate) => candidate.engine === engine);
      return {
        engine,
        availability: status?.review_status || "Ready",
        samples: row.samples,
        mean_cosine_to_reference: row.mean_cosine,
        median_cosine_to_reference: row.median_cosine,
        minimum_cosine_to_reference: row.minimum_cosine,
        samples_below_cutoff: row.samples_below_cutoff,
        top_signature_disagreements: row.top_signature_disagreements,
        top_signature_match_rate: row.top_signature_match_rate,
        review_priority: row.review_priority
      };
    });
  const notLoadedRows = engineMissingEngines(state.reference).map((row) => ({
    engine: row.engine,
    availability: row.review_status,
    samples: row.samples,
    mean_cosine_to_reference: null,
    median_cosine_to_reference: null,
    minimum_cosine_to_reference: null,
    samples_below_cutoff: null,
    top_signature_disagreements: null,
    top_signature_match_rate: null,
    review_priority: "Not loaded"
  }));
  return [...computedRows, ...notLoadedRows].sort((left, right) =>
    (left.availability === "Ready" ? 0 : 1) - (right.availability === "Ready" ? 0 : 1) ||
    (right.samples_below_cutoff || 0) - (left.samples_below_cutoff || 0) ||
    (right.top_signature_disagreements || 0) - (left.top_signature_disagreements || 0) ||
    (left.minimum_cosine_to_reference ?? Number.POSITIVE_INFINITY) - (right.minimum_cosine_to_reference ?? Number.POSITIVE_INFINITY)
  );
}

function enginePairwiseRows(state) {
  const engines = Object.keys(engineExposureSets);
  const rows = [];
  for (let i = 0; i < engines.length; i += 1) {
    for (let j = i + 1; j < engines.length; j += 1) {
      const left = engines[i];
      const right = engines[j];
      rows.push(enginePairSummary(left, right, enginePairComparison(left, right, engineSampleNames, engineSignatureNames), state.cutoff));
    }
  }
  return rows.sort((left, right) =>
    right.samples_below_cutoff - left.samples_below_cutoff ||
    right.top_signature_disagreements - left.top_signature_disagreements ||
    left.minimum_cosine - right.minimum_cosine
  );
}

function engineSampleRows(state) {
  return engineSampleNames.map((sample) => {
    const referenceExposure = engineExposureSets[state.reference]?.[sample];
    const referenceTop = engineTopExposure(referenceExposure);
    const comparisons = Object.keys(engineExposureSets)
      .filter((engine) => engine !== state.reference)
      .map((engine) => {
        const engineExposure = engineExposureSets[engine]?.[sample];
        const engineTop = engineTopExposure(engineExposure);
        return {
          engine,
          cosine: engineExposureCosine(referenceExposure, engineExposure, engineSignatureNames),
          engineTop,
          topMatch: referenceTop.signature === engineTop.signature
        };
      });
    if (!comparisons.length) {
      return {
        sample,
        mutations: engineMutationBurdens[sample],
        reference_top: referenceTop.signature,
        lowest_engine: "",
        lowest_cosine: null,
        engines_below_cutoff: 0,
        top_signature_disagreements: 0,
        competing_top_signatures: referenceTop.signature,
        ambiguous_signatures: "",
        review_action: "Load a comparison dataset",
        needs_review: false
      };
    }
    const lowest = comparisons.reduce((current, row) => row.cosine < current.cosine ? row : current, comparisons[0]);
    const topDisagreements = comparisons.filter((row) => !row.topMatch);
    const belowCutoff = comparisons.filter((row) => row.cosine < state.cutoff);
    const competingTops = [...new Set([referenceTop.signature, ...topDisagreements.map((row) => row.engineTop.signature)].filter((value) => value !== "NA"))];
    const ambiguity = engineAmbiguityRowsRaw.find((candidate) => candidate.sample === sample);
    const needsReview = belowCutoff.length > 0 || topDisagreements.length > 0;
    return {
      sample,
      mutations: engineMutationBurdens[sample],
      reference_top: referenceTop.signature,
      lowest_engine: lowest?.engine || "",
      lowest_cosine: engineRound(lowest?.cosine ?? null, 4),
      engines_below_cutoff: belowCutoff.length,
      top_signature_disagreements: topDisagreements.length,
      competing_top_signatures: competingTops.join(", "),
      ambiguous_signatures: ambiguity?.high_ambiguity_signatures_in_compared_tops || "",
      review_action: needsReview
        ? (topDisagreements.length > 1 ? "Compare dominant signatures" : "Inspect exposure spread")
        : "No focused review",
      needs_review: needsReview
    };
  }).sort((left, right) =>
    Number(right.needs_review) - Number(left.needs_review) ||
    right.engines_below_cutoff - left.engines_below_cutoff ||
    right.top_signature_disagreements - left.top_signature_disagreements ||
    left.lowest_cosine - right.lowest_cosine ||
    right.mutations - left.mutations
  );
}

function engineFilteredSampleRows(state) {

  };
}

function engineSelectedSampleComparisonRows(state) {
  const sample = state.sample || engineFilteredSampleRows(state)[0]?.sample || engineSampleNames[0];
  const referenceExposure = engineExposureSets[state.reference]?.[sample];
  const referenceTop = engineTopExposure(referenceExposure);
  return Object.keys(engineExposureSets)
    .filter((engine) => engine !== state.reference)
    .map((engine) => {
      const exposures = engineExposureSets[engine]?.[sample];
      const top = engineTopExposure(exposures);
      return {
        engine,
        exposure_cosine_to_reference: engineRound(engineExposureCosine(referenceExposure, exposures, engineSignatureNames), 4),
        reference_top: referenceTop.signature,
        engine_top: top.signature,
        engine_top_exposure: engineRound(top.exposure, 4),
        second_signature: top.secondSignature,
        second_exposure: engineRound(top.secondExposure, 4),
        review_flag: top.signature === referenceTop.signature ? "Top match" : "Top differs"
      };
    })
    .sort((left, right) =>
      (left.review_flag === "Top differs" ? -1 : 1) - (right.review_flag === "Top differs" ? -1 : 1) ||
      left.exposure_cosine_to_reference - right.exposure_cosine_to_reference
    );
}

function engineSelectedExposureRows(state) {
  const sample = state.sample || engineFilteredSampleRows(state)[0]?.sample || engineSampleNames[0];
  const engineNames = Object.keys(engineExposureSets);
  const signatureRows = engineSignatureNames.map((signature) => {
    const values = engineNames.map((engine) => engineExposureSets[engine]?.[sample]?.[signature] || 0);
    const maxExposure = Math.max(...values);
    const minExposure = Math.min(...values);
    const row = {
      signature,
      maximum_exposure: engineRound(maxExposure, 4),
      exposure_spread: engineRound(maxExposure - minExposure, 4)
    };
    for (const engine of engineNames) row[engine] = engineRound(engineExposureSets[engine]?.[sample]?.[signature] || 0, 4);
    return row;
  }).filter((row) => row.maximum_exposure >= state.minExposure);

  return signatureRows.sort((left, right) =>
    right.exposure_spread - left.exposure_spread ||
    right.maximum_exposure - left.maximum_exposure ||
    left.signature.localeCompare(right.signature)
  );
}

function engineSyncSampleOptions(state) {
  if (typeof engineSampleSelect === "undefined" || !engineSampleSelect) return state.sample;
  const reviewRows = engineFilteredSampleRows(state);
  const options = (reviewRows.length ? reviewRows : engineSampleRows(state)).map((row) => {
    const option = document.createElement("option");
    option.value = row.sample;
    option.textContent = row.needs_review
      ? `${row.sample} - ${row.lowest_cosine} min cosine`
      : row.sample;
    return option;
  });
  const previous = engineSampleSelect.value;
  engineSampleSelect.replaceChildren(...options);
  engineSampleSelect.value = options.some((option) => option.value === previous)
    ? previous
    : options[0]?.value || "";
  return engineSampleSelect.value;
}

function engineExportArtifacts(state) {
  const reviewRows = engineFilteredSampleRows(state);
  const sampleComparisonRows = engineSelectedSampleComparisonRows(state);
  const exposureRows = engineSelectedExposureRows(state);
  const concordance = engineConcordanceRows(state).rows;
  const prefix = engineExportPrefix(state);
  const samplePrefix = `${prefix}_${engineSafeSlug(state.sample)}`;
  const compactState = {
    dataSource: engineActiveDataset.sourceLabel,
    sourceKind: engineActiveDataset.sourceKind,
    referenceEngine: state.reference,
    comparisonLens: state.lens,
    cosineCutoff: state.cutoff,
    minimumExposure: state.minExposure,
    selectedSample: state.sample,
    samples: engineSampleNames.length,
    signatures: engineSignatureNames,
    comparedEngines: engineComparedEngines(state.reference),
    engineStatus: engineStatusRows,
    concordance,
    reviewRows,
    selectedSampleEngineComparison: sampleComparisonRows,
    selectedSampleExposures: exposureRows
  };

  if (state.exportScope === "current_sample") {
    return [
      { filename: `${samplePrefix}_engine_comparison.csv`, text: rowsToCsv(sampleComparisonRows), label: "Download selected-sample engine comparison CSV" },
      { filename: `${samplePrefix}_signature_exposures.csv`, text: rowsToCsv(exposureRows), label: "Download selected-sample exposures CSV" },
      { filename: `${samplePrefix}_state.json`, type: "json", value: compactState, label: "Download selected-sample state JSON" }
    ];
  }

  if (state.exportScope === "all_triage") {
    return [
      { filename: `${prefix}_engine_status.csv`, text: rowsToCsv(engineStatusRows), label: "Download engine status CSV" },
      { filename: `${prefix}_concordance.csv`, text: rowsToCsv(concordance), label: "Download concordance CSV" },
      { filename: `${prefix}_all_triage_samples.csv`, text: rowsToCsv(engineSampleRows(state)), label: "Download all sample triage CSV" },
      { filename: `${prefix}_exposure_long.csv`, text: rowsToCsv(engineExposureLongRows(engineExposureSets, engineSampleNames, engineSignatureNames)), label: "Download long-format exposures CSV" },
      { filename: `${prefix}_triage_state.json`, type: "json", value: compactState, label: "Download triage state JSON" }
    ];
  }

  return [
    { filename: `${prefix}_engine_status.csv`, text: rowsToCsv(engineStatusRows), label: "Download engine status CSV" },
    { filename: `${prefix}_concordance.csv`, text: rowsToCsv(concordance), label: "Download concordance CSV" },
    { filename: `${prefix}_filtered_disagreements.csv`, text: rowsToCsv(reviewRows), label: "Download filtered disagreements CSV" },
    { filename: `${prefix}_triage_state.json`, type: "json", value: compactState, label: "Download triage state JSON" }
  ];
}

function engineConcordanceCaption(state, rowCount) {
  const comparedCount = engineComparedEngines(state.reference).length;
  const notLoadedCount = engineMissingEngines(state.reference).length;
  if (state.lens === "pairwise") {
    return `Each row compares two engines across the active ${engineSampleNames.length}-sample dataset. Samples below cutoff counts spectra with exposure-vector cosine below ${engineFormatDecimal(state.cutoff, 2)}. Dominant-signature disagreements count samples where the largest fitted signature changes. Showing ${rowCount} pairwise comparison${rowCount === 1 ? "" : "s"}.`;
  }
  if (state.lens === "sample") {
    return `Rows list samples crossing the active review cutoff (${engineFormatDecimal(state.cutoff, 2)}) or changing the largest fitted signature against ${state.reference}. Values are ranked by disagreement severity.`;
  }
  const computedPhrase = comparedCount === 1 ? "1 engine has" : `${comparedCount} engines have`;
  const notLoadedPhrase = notLoadedCount === 1 ? "1 engine is" : `${notLoadedCount} engines are`;
  return `Each row tracks one engine against ${state.reference}. ${computedPhrase} computed exposures for ${engineSampleNames.length} samples; ${notLoadedPhrase} listed as not loaded for this source. Samples below cutoff uses cosine ${engineFormatDecimal(state.cutoff, 2)}.`;
}

function engineLensDetails(state, concordanceRows, reviewRows) {
  const comparedCount = engineComparedEngines(state.reference).length;
  if (state.lens === "pairwise") {
    return {
      title: "Pairwise lens",
      question: "Which engine pairs disagree with each other, independent of the selected reference?",
      output: `${concordanceRows.length} engine-pair rows`,
      action: "Use this lens to spot broad package clusters before reviewing individual samples."
    };
  }
  if (state.lens === "sample") {
    return {
      title: "Sample lens",
      question: "Which samples cross the review cutoff or change dominant signature against the selected reference?",
      output: `${reviewRows.length} review sample${reviewRows.length === 1 ? "" : "s"}`,
      action: "Use this lens to choose the next sample for the detailed review workspace."
    };
  }
  return {
    title: "Reference lens",
    question: `Which compared engines diverge from ${state.reference}?`,
    output: `${comparedCount} of ${Math.max(0, engineStatusRows.length - 1)} engines available`,
    action: "Use this lens to decide which compared engine deserves the first audit against the baseline."
  };
}

function engineLensPanel(state, concordanceRows, reviewRows) {
  const details = engineLensDetails(state, concordanceRows, reviewRows);
  const panel = document.createElement("div");
  panel.className = "multi-engine-lens-panel";
  const title = document.createElement("strong");
  title.textContent = `Read this view: ${details.title}`;
  const question = document.createElement("p");
  question.textContent = details.question;
  const terms = [
    {
      term: "Exposure cosine",
      detail: "1.0 means two engines returned the same signature mixture. Lower values mean the exposure vectors diverge."
    },
    {
      term: "Samples below cutoff",
      detail: `Samples with cosine below ${engineFormatDecimal(state.cutoff, 2)} are flagged because engine choice changes the fitted mixture.`
    },
    {
      term: "Dominant-signature disagreement",
      detail: "The largest fitted signature changes between engines. This can change the biological interpretation reported for a sample."
    },
    {
      term: "Exposure spread",
      detail: "The max-min range across engines for a signature. Large spread points to the signatures driving disagreement."
    }
  ];
  const termGrid = document.createElement("div");
  termGrid.className = "multi-engine-term-grid";
  termGrid.replaceChildren(...terms.map((item) => {
    const node = document.createElement("div");
    node.className = "multi-engine-term";
    const term = document.createElement("b");
    term.textContent = item.term;
    const detail = document.createElement("span");
    detail.textContent = item.detail;
    node.append(term, detail);
    return node;
  }));
  const status = engineSummaryStrip([
    { label: "Rows shown", value: details.output },
    { label: "Reference", value: state.reference },
    { label: "Review rule", value: `cosine < ${engineFormatDecimal(state.cutoff, 2)} or dominant signature changes` }
  ], "multi-engine-active-strip");
  panel.append(title, question, termGrid, status);
  return panel;
}

function engineLensStatus(state, concordanceRows, reviewRows) {
  const details = engineLensDetails(state, concordanceRows, reviewRows);
  const node = document.createElement("div");
  node.className = "multi-engine-lens-status";
  const label = document.createElement("span");
  label.textContent = "Current comparison lens";
  const title = document.createElement("strong");
  title.textContent = `${details.title}: ${details.output}`;
  const question = document.createElement("p");
  question.textContent = details.question;
  node.append(label, title, question);
  return node;
}

function engineReviewCaption(state, visibleCount, totalCount) {
  const comparedCount = engineComparedEngines(state.reference).length;
  return `Ranked by cutoff failures, dominant-signature disagreements, exposure-vector distance, and mutation burden. Showing ${visibleCount} of ${totalCount} review sample${totalCount === 1 ? "" : "s"}; the selected sample is marked for the detail tables below. Engines below cutoff is out of ${comparedCount} comparison engine${comparedCount === 1 ? "" : "s"} at cosine ${engineFormatDecimal(state.cutoff, 2)}.`;
}

function engineSelectedComparisonCaption(state) {
  return `For ${state.sample}, each row compares a non-reference engine with ${state.reference}. Cosine below ${engineFormatDecimal(state.cutoff, 2)} or a changed dominant signature marks the row for interpretation.`;
}

function engineSelectedExposureCaption(state) {
  return `Relative signature exposures for ${state.sample}; signatures are shown when any engine is at least ${engineFormatDecimal(state.minExposure, 3)}. Zero means the engine assigned no exposure after thresholding or sparse selection. Max-min exposure spread ranks the signatures where engines disagree most.`;
}

function engineSelectedSampleSummary(state, selectedRow) {
  const row = selectedRow || {};
  return engineSummaryStrip([
    { label: "Selected sample", value: state.sample },
    { label: "Mutation burden", value: engineFormatCount(row.mutations) },
    { label: "Reference dominant", value: row.reference_top || "n/a" },
    { label: "Lowest engine", value: row.lowest_engine || "n/a" },
    { label: "Lowest cosine", value: engineFormatDecimal(row.lowest_cosine, 3) },
    { label: "Review action", value: row.review_action || "No focused review" }
  ], "multi-engine-selected-summary");
}

function engineRender() {
  const state = engineCurrentState();
  state.sample = engineSyncSampleOptions(state);
  const reviewRows = engineFilteredSampleRows(state);
  const concordance = engineConcordanceRows(state);
  const selectedRows = engineSelectedSampleComparisonRows(state);
  const selectedExposureRows = engineSelectedExposureRows(state);
  const selectedSampleRow = engineSelectedSampleRow(state);
  const reviewLimit = engineReviewLimit(reviewRows);
  const visibleReviewRows = engineRowsWithSelected(reviewRows, state.sample, reviewLimit)
    .map((row) => ({
      selected_marker: row.sample === state.sample ? "Viewing" : "",
      ...row
    }));

  if (typeof engineActiveSummaryHost !== "undefined" && engineActiveSummaryHost) {
    const lensDetails = engineLensDetails(state, concordance.rows, reviewRows);
    engineActiveSummaryHost.replaceChildren(engineSummaryStrip([
      { label: "Data", value: engineDatasetShortLabel() },
      { label: "Samples", value: engineSampleNames.length },
      { label: "Reference", value: state.reference },
      { label: "Engines available", value: `${engineReadyCount()}/${engineStatusRows.length}` },
      { label: "Lens", value: lensDetails.title },
      { label: "Output", value: lensDetails.output }
    ], "multi-engine-active-strip"), engineSupportedPackagesPanel(), engineAvailabilityPanel(), engineLensStatus(state, concordance.rows, reviewRows));
  }

  if (typeof engineConcordanceLensHost !== "undefined" && engineConcordanceLensHost) {
    engineConcordanceLensHost.replaceChildren(engineLensPanel(state, concordance.rows, reviewRows));
  }

  if (typeof engineConcordanceHost !== "undefined" && engineConcordanceHost) {
    engineConcordanceHost.replaceChildren(
      engineNotebookTable(concordance.rows, concordance.columns, {
        title: concordance.title,
        caption: engineConcordanceCaption(state, concordance.rows.length),
        maxRows: Math.min(12, Math.max(8, concordance.rows.length))
      })
    );
  }

  if (typeof engineReviewHost !== "undefined" && engineReviewHost) {
    engineReviewHost.replaceChildren(
      reviewRows.length
        ? engineNotebookTable(visibleReviewRows, [
          { key: "selected_marker", label: "Detail" },
          { key: "sample", label: "Sample ID" },
          { key: "mutations", label: "Mutations" },
          { key: "reference_top", label: "Reference dominant" },
          { key: "lowest_engine", label: "Lowest engine" },
          { key: "lowest_cosine", label: "Lowest sample cosine" },
          { key: "engines_below_cutoff", label: "Engines below cutoff" },
          { key: "top_signature_disagreements", label: "Dominant-signature disagreements" },
          { key: "competing_top_signatures", label: "Competing dominant signatures" },
          { key: "review_action", label: "Review action" }
        ], {
          title: "Samples needing interpretation",
          caption: engineReviewCaption(state, visibleReviewRows.length, reviewRows.length),
          maxRows: visibleReviewRows.length,
          className: "multi-engine-review-table",
          selectedMarkerKey: "selected_marker"
        })
        : enginePlaceholder("No samples cross the current disagreement threshold.")
    );
  }

  if (typeof engineSelectedHost !== "undefined" && engineSelectedHost) {
    engineSelectedHost.replaceChildren(
      engineSelectedSampleSummary(state, selectedSampleRow),
      engineNotebookTable(selectedRows, [
        { key: "engine", label: "Engine" },
        { key: "exposure_cosine_to_reference", label: "Cosine to reference" },
        { key: "reference_top", label: "Reference dominant" },
        { key: "engine_top", label: "Engine dominant" },
        { key: "engine_top_exposure", label: "Dominant exposure" },
        { key: "second_signature", label: "Second signature" },
        { key: "second_exposure", label: "Second exposure" },
        { key: "review_flag", label: "Flag" }
      ], {
        title: `Selected sample engine comparison: ${state.sample}`,
        caption: engineSelectedComparisonCaption(state),
        maxRows: selectedRows.length
      }),
      engineNotebookTable(selectedExposureRows, [
        { key: "signature", label: "Signature" },
        ...Object.keys(engineExposureSets).map((engine) => ({ key: engine, label: engine })),
        { key: "maximum_exposure", label: "Maximum exposure" },
        { key: "exposure_spread", label: "Max-min exposure spread" }
      ], {
        title: "Selected sample signature exposures",
        caption: engineSelectedExposureCaption(state),
        maxRows: Math.min(12, selectedExposureRows.length)
      })
    );
  }

  if (typeof engineDownloadHost !== "undefined" && engineDownloadHost) {
    const selectedSample = typeof engineSampleSelect !== "undefined" ? engineSampleSelect.value : state.sample;
    engineDownloadHost.replaceChildren(downloadMany(engineExportArtifacts({ ...state, sample: selectedSample || state.sample })));
  }
}
</script>

<script type="text/markdown">
## Step 1. Choose data and triage settings

Start with the bundled E2 adapter-fidelity benchmark, choose a public mSigPortal dataset, or upload one SBS96 spectra table. The public menu retrieves real API-backed spectra and a compatible reference signature catalog. Uploaded spectra use the bundled COSMIC SBS96 reference catalog and can launch the supported browser package engines when the required Pyodide/WebR assets are available.
</script>
<script type="module">
const [
  engineBenchmarkInputRaw,
  engineExposurePairsRaw
] = await Promise.all([
  engineFetchJson(`${engineDataBase}adapter-fidelity-input.json`),
  engineFetchCsv(`${engineDataBase}adapter_fidelity_exposure_pairs.csv`)
]);

const engineAmbiguityRowsRaw = [];

const engineBenchmarkRaw = {
  spectra: engineBenchmarkInputRaw.spectra,
  signatures: engineBenchmarkInputRaw.signatures,
  exposurePairs: engineExposurePairsRaw,
};

async function engineLoadBenchmarkDataset() {
  engineSetSourceStatus("Loading benchmark", "Preparing the public PCAWG E2 adapter-fidelity benchmark.", "running");
  await engineSetActiveDataset({
    spectra: engineBenchmarkRaw.spectra,
    signatures: engineBenchmarkRaw.signatures,
    sourceLabel: "Public PCAWG E2 adapter-fidelity benchmark",
    sourceKind: "benchmark",
    externalOutputs: engineBenchmarkExternalOutputs(engineBenchmarkRaw)
  });
  engineSetSourceStatus("", "", "clear");
}

const enginePublicOptionsState = {
  spectra: [],
  signatures: [],
  loaded: false
};
const ENGINE_PUBLIC_API_BASE = "https://analysistools.cancer.gov/mutational-signatures/api/";
const ENGINE_PANCANCER_VALUE = "__all_cancers__";

function enginePublicApiUrl(endpoint, params = {}) {
  const url = new URL(endpoint, ENGINE_PUBLIC_API_BASE);
  for (const [key, value] of Object.entries(params)) {
    if (value !== undefined && value !== null && value !== "") url.searchParams.set(key, value);
  }
  return url;
}

async function engineFetchPublicApiRows(endpoint, params = {}, limit = 100000) {
  const rows = [];
  let offset = 0;
  for (let page = 0; page < 10; page += 1) {
    const response = await fetch(enginePublicApiUrl(endpoint, { ...params, limit, offset }));
    if (!response.ok) throw new Error(`${endpoint} API request failed with ${response.status}`);
    const pageRows = await response.json();
    if (!Array.isArray(pageRows)) throw new Error(`${endpoint} API response was not an array.`);
    rows.push(...pageRows);
    if (pageRows.length < limit) break;
    offset += limit;
  }
  return rows;
}

function engineUniqueSorted(values) {
  return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
    .map(String)
    .sort((left, right) => left.localeCompare(right));
}

async function engineMapPublicFetches(items, mapper, { concurrency = 10, onProgress = null } = {}) {
  const results = new Array(items.length);
  let nextIndex = 0;
  let completed = 0;
  const workerCount = Math.min(Math.max(1, concurrency), items.length);
  await Promise.all(Array.from({ length: workerCount }, async () => {
    while (nextIndex < items.length) {
      const index = nextIndex;
      nextIndex += 1;
      results[index] = await mapper(items[index], index);
      completed += 1;
      if (onProgress) onProgress({ completed, total: items.length, item: items[index] });
      await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }
  }));
  return results;
}

function engineSelectedPublicRows() {
  const matrix = Number(enginePublicMatrixSelect.value);
  return enginePublicOptionsState.spectra.filter((row) =>
    row.study === enginePublicStudySelect.value &&
    row.strategy === enginePublicStrategySelect.value &&
    row.profile === enginePublicProfileSelect.value &&
    Number(row.matrix) === matrix &&
    (enginePublicCancerSelect.value === ENGINE_PANCANCER_VALUE || row.cancer === enginePublicCancerSelect.value)
  );
}

function enginePublicSampleOptions() {
  const bySample = new Map();
  for (const row of engineSelectedPublicRows()) {
    if (!bySample.has(row.sample)) bySample.set(row.sample, row);
  }
  return [...bySample.values()];
}

function engineCurrentPublicSelection() {
  return {
    study: enginePublicStudySelect.value,
    cancer: enginePublicCancerSelect.value === ENGINE_PANCANCER_VALUE ? "PanCancer" : enginePublicCancerSelect.value,
    strategy: enginePublicStrategySelect.value,
    profile: enginePublicProfileSelect.value,
    matrix: Number(enginePublicMatrixSelect.value),
    signatureSetName: enginePublicSignatureSetSelect.value
  };
}

function engineUpdatePublicStatus() {
  const samples = enginePublicSampleOptions();
  const selection = engineCurrentPublicSelection();
  enginePublicStatus.textContent = enginePublicOptionsState.loaded
    ? `${samples.length} public samples match ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix}. The loader will fetch up to ${enginePublicSampleInput.value} samples, ${selection.signatureSetName || "a compatible signature set"}, and then run browser package engines.`
    : "Loading public dataset options from mSigPortal APIs.";
}

function enginePopulatePublicMenus(preferred = {}) {
  const current = {
    study: enginePublicStudySelect.value || preferred.study || "TCGA",
    strategy: enginePublicStrategySelect.value || preferred.strategy || "WES",
    profile: enginePublicProfileSelect.value || preferred.profile || "SBS",
    matrix: enginePublicMatrixSelect.value || preferred.matrix || "96",
    cancer: enginePublicCancerSelect.value || preferred.cancer || "Lung-AdenoCa",
    signatureSetName: enginePublicSignatureSetSelect.value || preferred.signatureSetName || "COSMIC_v3_Signatures_GRCh37_SBS96"
  };

  const study = engineSetSelectOptions(enginePublicStudySelect, engineUniqueSorted(enginePublicOptionsState.spectra.map((row) => row.study)), current.study);
  const studyRows = enginePublicOptionsState.spectra.filter((row) => row.study === study);
  const strategy = engineSetSelectOptions(enginePublicStrategySelect, engineUniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
  const strategyRows = studyRows.filter((row) => row.strategy === strategy);
  const profile = engineSetSelectOptions(enginePublicProfileSelect, engineUniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
  const profileRows = strategyRows.filter((row) => row.profile === profile);
  const matrix = engineSetSelectOptions(enginePublicMatrixSelect, engineUniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
  const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
  const cancerItems = engineUniqueSorted(matrixRows.map((row) => row.cancer)).map((value) => ({ label: value, value }));
  if (study === "PCAWG" || study === "TCGA") {
    cancerItems.unshift({ label: "PanCancer (all cancer types)", value: ENGINE_PANCANCER_VALUE });
  }
  engineSetSelectOptions(enginePublicCancerSelect, cancerItems, current.cancer);

  const exactSignatureRows = enginePublicOptionsState.signatures.filter((row) =>
    row.strategy === strategy &&
    row.profile === profile &&
    String(row.matrix) === String(matrix)
  );
  const fallbackSignatureRows = enginePublicOptionsState.signatures.filter((row) =>
    row.profile === profile &&
    String(row.matrix) === String(matrix)
  );
  const signatureRows = exactSignatureRows.length ? exactSignatureRows : fallbackSignatureRows;
  engineSetSelectOptions(enginePublicSignatureSetSelect, engineUniqueSorted(signatureRows.map((row) => row.signatureSetName)), current.signatureSetName);
  engineUpdatePublicStatus();
}

async function engineLoadPublicMenus() {
  enginePublicStatus.textContent = "Loading public dataset options from mSigPortal APIs...";
  engineLoadPublicButton.disabled = true;
  engineRefreshPublicButton.disabled = true;
  try {
    const [spectraOptions, signatureOptions] = await Promise.all([
      engineFetchPublicApiRows("mutational_spectrum_options"),
      engineFetchPublicApiRows("mutational_signature_options", { source: "Reference_signatures" })
    ]);
    enginePublicOptionsState.spectra = spectraOptions;
    enginePublicOptionsState.signatures = signatureOptions;
    enginePublicOptionsState.loaded = true;
    enginePopulatePublicMenus({
      study: "TCGA",
      strategy: "WES",
      profile: "SBS",
      matrix: "96",
      cancer: "Lung-AdenoCa",
      signatureSetName: "COSMIC_v3_Signatures_GRCh37_SBS96"
    });
  } catch (error) {
    enginePublicStatus.textContent = `Could not load public dataset menu: ${error.message}`;
  } finally {
    engineLoadPublicButton.disabled = false;
    engineRefreshPublicButton.disabled = false;
  }
}

async function engineLoadPublicApiDataset() {
  if (!enginePublicOptionsState.loaded) await engineLoadPublicMenus();
  const maxSamples = Math.max(1, Math.min(500, Math.round(Number(enginePublicSampleInput.value) || 8)));
  const selectedSamples = enginePublicSampleOptions().slice(0, maxSamples);
  if (!selectedSamples.length) throw new Error("No public samples match the selected menu values.");
  const selection = {
    ...engineCurrentPublicSelection(),
    sampleCount: selectedSamples.length
  };
  if (!selection.signatureSetName) throw new Error("No compatible reference signature set is available for the selected profile and table size.");
  engineSetSourceStatus("Loading public data", `Fetching ${selection.sampleCount} public spectra and ${selection.signatureSetName}.`, "running");

  const spectrumRowGroups = await engineMapPublicFetches(
    selectedSamples,
    (sample) => engineFetchPublicApiRows("mutational_spectrum", {
      study: sample.study,
      sample: sample.sample,
      cancer: sample.cancer,
      strategy: sample.strategy,
      profile: sample.profile,
      matrix: sample.matrix
    }),
    {
      concurrency: 10,
      onProgress: ({ completed, total }) => {
        engineSetSourceStatus("Loading public data", `Fetched ${completed}/${total} public spectra.`, "running");
      }
    }
  );
  const signatureRows = await mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
    selection.strategy,
    selection.signatureSetName,
    selection.profile,
    selection.matrix,
    100000
  );
  const spectra = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(spectrumRowGroups.flat());
  const signatures = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(signatureRows, "signatureName");
  const contexts = engineInferContexts(spectra, signatures);
  const externalOutputs = await engineAutomaticUploadedOutputs(spectra, signatures, contexts);
  await engineSetActiveDataset({
    spectra,
    signatures,
    sourceLabel: `mSigPortal public API: ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix}`,
    sourceKind: "public_api",
    contexts,
    externalOutputs
  });
  await engineRunDynamicPackageEngines();
  engineSetSourceStatus("", "", "clear");
}

async function engineApplyUploadedDataset({ runPackages = false } = {}) {
  const spectra = engineParseMatrixText(engineUploadSpectraText.value, "spectra");
  const signatures = engineMatrixFromRows(engineBenchmarkRaw.signatures, "signature");
  const contexts = engineInferContexts(spectra, signatures);
  const externalOutputs = await engineAutomaticUploadedOutputs(spectra, signatures, contexts);
  await engineSetActiveDataset({
    spectra,
    signatures,
    sourceLabel: "Uploaded SBS96 spectra",
    sourceKind: "uploaded",
    contexts,
    externalOutputs
  });
  if (runPackages) await engineRunDynamicPackageEngines();
  if (externalOutputs.length) {
    engineSetSourceStatus("", "", "clear");
  } else {
    engineSetSourceStatus(
      "Sparse comparator unavailable",
      "mSigSDK live was recomputed from the uploaded spectra. The browser sparse refit comparator was unavailable in this session.",
      "warning"
    );
  }
}

function engineSetSourceMode(mode) {
  engineSourceMode = mode;
  engineBenchmarkOption.classList.toggle("is-active", mode === "benchmark");
  enginePublicOption.classList.toggle("is-active", mode === "public_api");
  engineUploadOption.classList.toggle("is-active", mode === "uploaded");
  enginePublicPanel.hidden = mode !== "public_api";
  engineUploadPanel.hidden = mode !== "uploaded";
}

async function engineLoadSelectedSource() {
  try {
    if (engineSourceMode === "benchmark") {
      await engineLoadBenchmarkDataset();
    } else if (engineSourceMode === "public_api") {
      await engineLoadPublicApiDataset();
    } else {
      engineSetSourceStatus("", "", "clear");
    }
  } catch (error) {
    engineSetSourceStatus("Dataset load failed", error.message, "error");
  }
}

var engineUploadDebounceId = null;
async function engineAnalyzeUploadedSpectra(runPackages = false) {
  if (engineSourceMode !== "uploaded" || !engineUploadSpectraText.value.trim()) return;
  engineSetSourceStatus(
    "Analyzing uploaded spectra",
    runPackages
      ? "Fitting the uploaded SBS96 matrix, then running browser package engines."
      : "Fitting the uploaded SBS96 matrix with the bundled catalog and browser sparse comparator.",
    "running"
  );
  try {
    await engineApplyUploadedDataset({ runPackages });
  } catch (error) {
    engineSetSourceStatus("Uploaded spectra failed", error.message, "error");
  }
}

function engineScheduleUploadedAnalysis() {
  if (engineUploadDebounceId) clearTimeout(engineUploadDebounceId);
  if (engineSourceMode !== "uploaded" || !engineUploadSpectraText.value.trim()) return;
  engineUploadDebounceId = setTimeout(() => engineAnalyzeUploadedSpectra(false), 600);
}

engineBenchmarkButton.addEventListener("click", async () => {
  engineSetSourceMode("benchmark");
  await engineLoadSelectedSource();
});

engineLoadPublicButton.addEventListener("click", async () => {
  engineSetSourceMode("public_api");

});

});

engineUseUploadButton.addEventListener("click", () => {
  engineSetSourceMode("uploaded");
  engineSetSourceStatus("", "", "clear");
  if (engineUploadSpectraText.value.trim()) {
    engineAnalyzeUploadedSpectra(true);
  }
});

for (const select of [
  enginePublicStudySelect,
  enginePublicCancerSelect,
  enginePublicStrategySelect,
  enginePublicProfileSelect,

}
enginePublicSampleInput.addEventListener("input", engineUpdatePublicStatus);
engineUploadSpectraText.addEventListener("input", engineScheduleUploadedAnalysis);

for (const control of [engineReferenceSelect, engineLensSelect, engineCosineCutoffInput, engineMinExposureInput]) {
  control.addEventListener("change", engineRender);
  control.addEventListener("input", engineRender);
}

engineSetSourceMode("benchmark");
await engineLoadBenchmarkDataset();
engineLoadPublicMenus();

Use this step to decide where engine choice changes the interpretation enough to review. A high exposure cosine means two engines returned similar signature mixtures. A dominant-signature disagreement means the largest fitted signature changed, which can alter the biological label assigned to the sample even when the overall mixture still looks similar.
