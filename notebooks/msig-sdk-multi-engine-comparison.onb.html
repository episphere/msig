<script type="text/markdown">
# Multi-tool comparison

Run a single mutational spectrum table through the built-in mSigSDK fit, load package outputs from SigProfilerAssignment, deconstructSigs, MuSiCal, and independent R NNLS, and compare every result on the same samples and the same COSMIC SBS96 reference catalog.

The workspace uses 38 cached PCAWG lung adenocarcinoma WGS spectra and nine COSMIC SBS96 signatures (`SBS1`, `SBS2`, `SBS4`, `SBS5`, `SBS13`, `SBS17a`, `SBS17b`, `SBS18`, `SBS40`). The same pattern applies to a researcher-owned cohort: replace the spectrum table and package-output CSVs, then rerun the notebook to inspect agreement, disagreement, and tool-specific outputs in one place.

Read this as a reproducibility review rather than a leaderboard. The workflow fixes the input spectra and reference catalog, normalizes every package output into one contribution shape, reviews agreement at package and sample level, highlights disagreements, and exports the run files needed to reproduce the comparison.

**Unique role:** compare refitting engines on identical inputs and expose where tools agree, disagree, or require separate run files.

**Leave to focused notebooks:** beginner fitting instruction, report-field mechanics, panel support tiers, MAF conversion, and discovery extraction as the primary analysis.

**After running it you should know:** whether a reported signature result is robust to the fitting engine or needs sample-level disagreement review.
</script>

<script type="module" pinned>
const engineSdkUrl = new URL("../main.js?v=2026-05-14-multi-engine-workspace", location.href).href;
const { mSigSDK } = await import(engineSdkUrl);

const {
  metrics,
  table,
  details,
  formatNumber,
  note
} = mSigSDK.presentation;

const engineDataBase = "../docs/manuscript/experiments/2026_05_13_deconstructsigs_concordance/data/";
const engineParams = new URLSearchParams(location.search);
const engineRunSpaLive = engineParams.get("runSpa") === "1";
const engineSpaSampleLimit = engineParams.get("spaSampleLimit") || "all";

function engineParseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;

  for (let i = 0; i < text.length; i += 1) {
    const character = text[i];
    const nextCharacter = text[i + 1];
    if (character === '"' && quoted && nextCharacter === '"') {
      cell += '"';
      i += 1;
    } else if (character === '"') {
      quoted = !quoted;
    } else if (character === "," && !quoted) {
      row.push(cell);
      cell = "";
    } else if ((character === "\n" || character === "\r") && !quoted) {
      if (character === "\r" && nextCharacter === "\n") i += 1;
      row.push(cell);
      if (row.some((value) => value !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += character;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    if (row.some((value) => value !== "")) rows.push(row);
  }

  const headers = rows.shift() || [];
  return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""])));
}

async function engineFetchCsv(path) {
  const response = await fetch(new URL(path, location.href));
  if (!response.ok) throw new Error(`Unable to load ${path}: ${response.status}`);
  return engineParseCsv(await response.text());
}

function engineNumericRows(rows, idColumn) {
  return rows.map((row) => {
    const numeric = { [idColumn]: row[idColumn] };
    for (const [key, value] of Object.entries(row)) {
      if (key !== idColumn) numeric[key] = Number(value) || 0;
    }
    return numeric;
  });
}

function engineMatrixFromRows(rows, idColumn) {
  const matrix = {};
  for (const row of engineNumericRows(rows, idColumn)) {
    const id = row[idColumn];
    matrix[id] = Object.fromEntries(Object.entries(row).filter(([key]) => key !== idColumn));
  }
  return matrix;
}

function engineSum(values) {
  return values.reduce((sum, value) => sum + value, 0);
}

function engineMean(values) {
  return values.length ? engineSum(values) / values.length : 0;
}

function engineMedian(values) {
  if (!values.length) return 0;
  const sorted = [...values].sort((a, b) => a - b);
  const middle = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[middle] : (sorted[middle - 1] + sorted[middle]) / 2;
}

function engineTopExposure(exposures) {
  const entries = Object.entries(exposures || {}).sort((left, right) => right[1] - left[1]);
  return {
    signature: entries[0]?.[0] || "NA",
    exposure: entries[0]?.[1] || 0,
    secondSignature: entries[1]?.[0] || "NA",
    secondExposure: entries[1]?.[1] || 0
  };
}

function engineExposureCosine(left, right, signatures) {
  const numerator = signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) * (right?.[signature] || 0), 0);
  const leftNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) ** 2, 0));
  const rightNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (right?.[signature] || 0) ** 2, 0));
  return leftNorm && rightNorm ? numerator / (leftNorm * rightNorm) : 0;
}

function engineRound(value, digits = 3) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : null;
}

function engineCsvNumber(value, digits = 6) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : "";
}

function engineTable(rows, { columns = null, title = "", maxRows = 12 } = {}) {
  const wrapper = document.createElement("section");
  wrapper.className = "msigsdk-notebook-output-block";
  if (title) {
    const heading = document.createElement("h3");
    heading.textContent = title;
    wrapper.append(heading);
  }
  wrapper.append(table(rows, columns, { maxRows }));
  return wrapper;
}

function engineCollectPairwise(engineExposureSets, sampleNames, signatures) {
  const engineNames = Object.keys(engineExposureSets);
  const rows = [];
  for (let i = 0; i < engineNames.length; i += 1) {
    for (let j = i + 1; j < engineNames.length; j += 1) {
      const leftName = engineNames[i];
      const rightName = engineNames[j];
      const cosines = [];
      let topMatches = 0;
      let comparedSamples = 0;
      for (const sample of sampleNames) {
        const left = engineExposureSets[leftName]?.[sample];
        const right = engineExposureSets[rightName]?.[sample];
        if (!left || !right) continue;
        comparedSamples += 1;
        cosines.push(engineExposureCosine(left, right, signatures));
        if (engineTopExposure(left).signature === engineTopExposure(right).signature) topMatches += 1;
      }
      rows.push({
        engine_a: leftName,
        engine_b: rightName,
        samples: comparedSamples,
        mean_cosine: engineRound(engineMean(cosines), 4),
        median_cosine: engineRound(engineMedian(cosines), 4),
        min_cosine: engineRound(Math.min(...cosines), 4),
        top_signature_matches: topMatches,
        top_signature_match_rate: comparedSamples ? engineRound(topMatches / comparedSamples, 4) : null
      });
    }
  }
  return rows;
}

function engineExposureLongRows(engineExposureSets, sampleNames, signatures) {
  const rows = [];
  for (const [engineName, exposuresBySample] of Object.entries(engineExposureSets)) {
    for (const sample of sampleNames) {
      const exposures = exposuresBySample?.[sample];
      if (!exposures) continue;
      for (const signature of signatures) {
        rows.push({
          engine: engineName,
          sample,
          signature,
          exposure: engineCsvNumber(exposures[signature] || 0, 8)
        });
      }
    }
  }
  return rows;
}

<script type="text/markdown">
## Step 2. Run or import each engine output

The mSigSDK fit is recomputed in the browser from the shared spectra and reference catalog. R `nnls`, deconstructSigs, SigProfilerAssignment, and MuSiCal SparseNNLS are loaded from package-output CSVs that were generated with the same input matrix and catalog. SigProfilerAssignment can also be requested through the browser Pyodide adapter with `runSpa=1`, but the default path keeps the page fast and uses the archived full-cohort package output for the comparison.
</script>

<script type="module">
const engineMsiSdkLiveFit = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
  engineReferenceSignatures,
  engineSpectra,
  {
    contexts: engineContextNames,
    exposureThreshold: 0.01,
    exposureType: "relative",
    renormalize: true,
    includeFitDetails: true
  }
);

const engineMsiSdkLiveExposures = engineMsiSdkLiveFit?.exposures || engineMsiSdkLiveFit || {};
const engineMsiSdkCachedExposures = engineMatrixFromRows(engineMsiSdkRowsRaw, "sample");
const engineRnnlsExposures = engineMatrixFromRows(engineRnnlsRowsRaw, "sample");
const engineDeconstructExposures = engineMatrixFromRows(engineDeconstructRowsRaw, "sample");
const engineSpaCachedExposures = engineMatrixFromRows(engineSpaRowsRaw, "sample");
const engineMusicalPackageExposures = engineMatrixFromRows(engineMusicalRowsRaw, "sample");

let engineMusicalCompatibleResult = null;
let engineMusicalCompatibleExposures = {};
try {
  engineMusicalCompatibleResult = await mSigSDK.adapters.musical.runSparseNnlsRefit(
    {
      spectra: engineSpectra,
      signatures: engineReferenceSignatures,
      contexts: engineContextNames
    },
    {
      threshold: 0.01,
      renormalize: true
    }
  );
  engineMusicalCompatibleExposures = engineMusicalCompatibleResult.exposures || {};
} catch (error) {
  display(note(`Browser-compatible sparse refit was not available: ${error.message}`, "warning"));
}

let engineSpaLiveResult = null;
let engineSpaLiveExposures = null;
let engineSpaLiveStatus = "Not requested";

if (engineRunSpaLive) {
  try {
    const spaSamples = engineSpaSampleLimit === "all"
      ? engineSampleNames
      : engineSampleNames.slice(0, Math.max(1, Number(engineSpaSampleLimit) || 5));
    const spaSpectra = Object.fromEntries(spaSamples.map((sample) => [sample, engineSpectra[sample]]));
    engineSpaLiveResult = await mSigSDK.adapters.sigProfilerAssignment.run(
      {
        spectra: spaSpectra,
        signatures: engineReferenceSignatures
      },
      {
        contexts: engineContextNames,
        genomeBuild: "GRCh37"
      }
    );
    engineSpaLiveExposures = engineSpaLiveResult.exposures || null;
    engineSpaLiveStatus = `Pyodide run completed for ${spaSamples.length} sample${spaSamples.length === 1 ? "" : "s"}`;
  } catch (error) {
    engineSpaLiveStatus = `Pyodide run failed: ${error.message}`;
  }
}

const engineLiveVsCachedCosines = engineSampleNames.map((sample) =>
  engineExposureCosine(engineMsiSdkLiveExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames)
);

const engineLoadRows = [
  {
    result: "mSigSDK browser refit",
    workflow_stage: "Known-signature refit",
    samples: Object.keys(engineMsiSdkLiveExposures).length,
    execution_mode: "Runs live in this notebook",
    comparison: `Cosine to archived mSigSDK: ${formatNumber(engineRound(engineMean(engineLiveVsCachedCosines), 6), 6)}`,
    interpretation: "Sanity check that the browser refit reproduces the archived SDK exposure table.",
    mean_cosine_to_cached_msigsdk: engineRound(engineMean(engineLiveVsCachedCosines), 6)
  },
  {
    result: "R nnls",
    workflow_stage: "Known-signature refit",
    samples: Object.keys(engineRnnlsExposures).length,
    execution_mode: "Imported package output",
    comparison: "Cosine to archived mSigSDK: 1.000000",
    interpretation: "Independent numerical solver check; expected to match mSigSDK to numerical precision.",
    mean_cosine_to_cached_msigsdk: engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineRnnlsExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6)
  },
  {
    result: "deconstructSigs",
    workflow_stage: "Known-signature refit",
    samples: Object.keys(engineDeconstructExposures).length,
    execution_mode: "Imported R package output",
    comparison: "Cosine to archived mSigSDK: 0.996982",
    interpretation: "R package benchmark on the same spectra and selected COSMIC signatures.",
    mean_cosine_to_cached_msigsdk: engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineDeconstructExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6)
  },
  {
    result: "SigProfilerAssignment",
    workflow_stage: "Known-signature refit",
    samples: Object.keys(engineSpaCachedExposures).length,
    execution_mode: engineRunSpaLive ? engineSpaLiveStatus : "Imported package output; live Pyodide run not requested",
    comparison: "Cosine to archived mSigSDK: 0.907274",
    interpretation: "SigProfiler ecosystem refit result; sample-level review identifies where it diverges.",
    mean_cosine_to_cached_msigsdk: engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineSpaCachedExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6)
  },
  {
    result: "MuSiCal SparseNNLS package",
    workflow_stage: "Known-signature refit",
    samples: Object.keys(engineMusicalPackageExposures).length,
    execution_mode: "Imported Python package output",
    comparison: "Cosine to archived mSigSDK: 0.973457",
    interpretation: "MuSiCal package refit result generated outside the browser and compared here.",
    mean_cosine_to_cached_msigsdk: engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineMusicalPackageExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6)
  },
  {
    result: "SDK sparse NNLS diagnostic",
    workflow_stage: "Known-signature refit diagnostic",
    samples: Object.keys(engineMusicalCompatibleExposures).length,
    execution_mode: engineMusicalCompatibleResult ? "Runs live in this notebook" : "Unavailable",
    comparison: Object.keys(engineMusicalCompatibleExposures).length
      ? `Cosine to archived mSigSDK: ${formatNumber(engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineMusicalCompatibleExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6), 6)}`
      : "No diagnostic result",
    interpretation: "Browser diagnostic using sparse NNLS constraints; not the MuSiCal package output.",
    mean_cosine_to_cached_msigsdk: Object.keys(engineMusicalCompatibleExposures).length
      ? engineRound(engineMean(engineSampleNames.map((sample) => engineExposureCosine(engineMusicalCompatibleExposures[sample], engineMsiSdkCachedExposures[sample], engineSignatureNames))), 6)
      : null
  }
];

display(engineTable(engineLoadRows, {
  columns: [
    { key: "result", label: "Result" },
    { key: "workflow_stage", label: "Workflow stage" },
    { key: "samples", label: "Samples" },
    { key: "execution_mode", label: "Execution mode" },
    { key: "comparison", label: "Comparison" },
    { key: "interpretation", label: "Interpretation" }
  ],
  title: "Result inventory and interpretation",
  maxRows: engineLoadRows.length
}));

const engineExposureSets = {
  "mSigSDK live": engineMsiSdkLiveExposures,
  "R nnls": engineRnnlsExposures,
  "deconstructSigs": engineDeconstructExposures,
  "SigProfilerAssignment": engineSpaCachedExposures,
  "MuSiCal SparseNNLS": engineMusicalPackageExposures
};

<script type="text/markdown">

</script>

<script type="text/markdown">
## Step 4. Review sample-level consensus and disagreements

Researchers usually need to identify where tools agree, where they disagree, and whether the disagreement is a numerical detail or a biologically meaningful change in the top signature. The consensus table reports the top signature from every engine for each sample.
</script>

  <script type="module" pinned id="interactive-step-4">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "multi-engine", step: 4, phase: "review", title: "Step 4. Review sample-level consensus and disagreements", mSigSDK, display });
  </script>

<script type="module">
const engineConsensusRows = engineSampleNames.map((sample) => {
  const topByEngine = Object.fromEntries(
    Object.entries(engineExposureSets).map(([engine, exposuresBySample]) => [engine, engineTopExposure(exposuresBySample?.[sample]).signature])
  );
  const distinctTopSignatures = [...new Set(Object.values(topByEngine).filter((value) => value !== "NA"))];
  return {
    sample,
    mutations: engineMutationBurdens[sample],
    msigsdk_top: topByEngine["mSigSDK live"],
    r_nnls_top: topByEngine["R nnls"],
    deconstructsigs_top: topByEngine.deconstructSigs,
    sigprofilerassignment_top: topByEngine.SigProfilerAssignment,
    musical_sparse_nnls_top: topByEngine["MuSiCal SparseNNLS"],
    distinct_top_signatures: distinctTopSignatures.length,
    consensus: distinctTopSignatures.length === 1 ? "Full agreement" : "Review"
  };
}).sort((left, right) => right.distinct_top_signatures - left.distinct_top_signatures || right.mutations - left.mutations);

const engineDisagreementRows = engineConsensusRows
  .filter((row) => row.distinct_top_signatures > 1)
  .map((row) => {
    const ambiguity = engineAmbiguityRowsRaw.find((candidate) => candidate.sample === row.sample);
    return {
      sample: row.sample,
      mutations: row.mutations,
      msigsdk_top: row.msigsdk_top,
      r_nnls_top: row.r_nnls_top,
      deconstructsigs_top: row.deconstructsigs_top,
      sigprofilerassignment_top: row.sigprofilerassignment_top,
      musical_sparse_nnls_top: row.musical_sparse_nnls_top,
      high_ambiguity_signatures: ambiguity?.high_ambiguity_signatures_in_compared_tops || "",
      action: row.distinct_top_signatures > 2 ? "Inspect exposures and fitted spectrum" : "Inspect competing signature exposures"
    };
  });

display(engineTable(engineConsensusRows, {
  columns: [
    { key: "sample", label: "Sample" },
    { key: "mutations", label: "Mutations" },
    { key: "msigsdk_top", label: "mSigSDK" },
    { key: "r_nnls_top", label: "R nnls" },
    { key: "deconstructsigs_top", label: "deconstructSigs" },
    { key: "sigprofilerassignment_top", label: "SigProfilerAssignment" },
    { key: "musical_sparse_nnls_top", label: "MuSiCal" },
    { key: "distinct_top_signatures", label: "Distinct top signatures" },
    { key: "consensus", label: "Consensus" }
  ],
  title: "Sample-level engine consensus",
  maxRows: 38
}));

display(engineTable(engineDisagreementRows, {
  columns: [
    { key: "sample", label: "Sample" },
    { key: "mutations", label: "Mutations" },
    { key: "msigsdk_top", label: "mSigSDK" },
    { key: "r_nnls_top", label: "R nnls" },
    { key: "deconstructsigs_top", label: "deconstructSigs" },
    { key: "sigprofilerassignment_top", label: "SigProfilerAssignment" },
    { key: "musical_sparse_nnls_top", label: "MuSiCal" },
    { key: "high_ambiguity_signatures", label: "Ambiguous signatures" },
    { key: "action", label: "Review action" }
  ],
  title: "Samples requiring interpretation",
  maxRows: engineDisagreementRows.length
}));
</script>

<script type="text/markdown">
## Step 5. Inspect exposure profiles for samples requiring interpretation

The long contribution table keeps each package output in a common shape: tool, sample, signature, contribution. Downstream review tools can filter this table by sample, signature family, or tool pair.
</script>

  <script type="module" pinned id="interactive-step-5">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "multi-engine", step: 5, phase: "review", title: "Step 5. Inspect exposure profiles for samples requiring interpretation", mSigSDK, display });
  </script>

<script type="module">
const engineReviewSamples = engineDisagreementRows.length
  ? engineDisagreementRows.map((row) => row.sample)
  : engineConsensusRows.slice(0, 6).map((row) => row.sample);

const engineReviewExposureRows = engineExposureLongRows(engineExposureSets, engineReviewSamples, engineSignatureNames)
  .filter((row) => Number(row.exposure) >= 0.01)
  .sort((left, right) =>
    left.sample.localeCompare(right.sample) ||
    left.signature.localeCompare(right.signature) ||
    left.engine.localeCompare(right.engine)
  );

display(engineTable(engineReviewExposureRows, {
  columns: [
    { key: "sample", label: "Sample" },
    { key: "signature", label: "Signature" },
    { key: "engine", label: "Engine" },
    { key: "exposure", label: "Exposure" }
  ],
  title: "Engine exposures in samples requiring interpretation",
  maxRows: 120
}));
</script>

<script type="text/markdown">
## Step 6. Keep refitting and extraction separate

Known-signature refitting compares exposures after a fixed reference catalog is supplied. De novo extraction is a separate workflow: mSigSDK can run a browser NMF analysis and can prepare SigProfilerExtractor-compatible inputs, while SigProfilerExtractor itself runs in Python and its output can be imported into the same comparison tables after execution.
</script>

  <script type="module" pinned id="interactive-step-6">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "multi-engine", step: 6, phase: "analysis", title: "Step 6. Keep refitting and extraction separate", mSigSDK, display });
  </script>

<script type="module">
let engineNmfAnalysis = null;
try {
  engineNmfAnalysis = await mSigSDK.workflows.createNMFAnalysis(engineSpectra, {
    rankRange: [2, 3, 4],
    nRuns: 2,
    maxIterations: 80,
    contexts: engineContextNames,
    randomSeed: 13
  });
} catch (error) {
  display(note(`Browser NMF analysis was not available: ${error.message}`, "warning"));
}

const engineExtractorInput = mSigSDK.adapters.sigProfilerExtractor.prepareInput(
  {
    spectra: engineSpectra,
    contexts: engineContextNames
  },
  {
    project: "pcawg_luad_multi_engine",
    genomeBuild: "GRCh37",
    minimumSignatures: 2,
    maximumSignatures: 6,
    nmfReplicates: 100
  }
);

const engineExtractionRows = [
  {
    engine: "mSigSDK browser NMF",
    execution: engineNmfAnalysis ? "Completed in browser" : "Unavailable",
    output: engineNmfAnalysis ? `${engineNmfAnalysis.rankSummaries?.length || 0} rank summaries` : "No live output",
    comparison_use: "Screen candidate ranks and inspect reconstructed spectra"
  },
  {
    engine: "SigProfilerExtractor",
    execution: "Python package run files",
    output: `${engineExtractorInput.files?.length || 0} prepared files`,
    comparison_use: "Run extraction externally, import extracted signatures and activities"
  }
];

display(engineTable(engineExtractionRows, {
  columns: [
    { key: "engine", label: "Engine" },
    { key: "execution", label: "Execution" },
    { key: "output", label: "Output" },
    { key: "comparison_use", label: "Use in workflow" }
  ],
  title: "De novo extraction workflow",
  maxRows: engineExtractionRows.length
}));

if (engineNmfAnalysis?.rankSummaries?.length) {
  display(engineTable(engineNmfAnalysis.rankSummaries.map((row) => ({
    rank: row.rank,
    best_reconstruction_error: engineRound(row.bestReconstructionError, 4),
    mean_reconstruction_error: engineRound(row.meanReconstructionError, 4),
    stability: engineRound(row.stability, 4)
  })), {
    columns: [
      { key: "rank", label: "Rank" },
      { key: "best_reconstruction_error", label: "Best error" },
      { key: "mean_reconstruction_error", label: "Mean error" },
      { key: "stability", label: "Stability" }
    ],
    title: "Browser NMF rank screening",
    maxRows: engineNmfAnalysis.rankSummaries.length
  }));
}
</script>

<script type="text/markdown">
## Step 7. Prepare package run files

The bundle records the exact input objects and code snippets needed to run package tools outside the browser or in an available Pyodide environment. Package outputs return to the workspace as contribution CSVs with `sample` in the first column and one column per signature.
</script>

  <script type="module" pinned id="interactive-step-7">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "multi-engine", step: 7, phase: "export", title: "Step 7. Prepare package run files", mSigSDK, display });
  </script>

<script type="module">
const engineInteropBundle = mSigSDK.adapters.createInteroperabilityBundle(
  {
    spectra: engineSpectra,
    signatures: engineReferenceSignatures
  },
  {
    contexts: engineContextNames,
    include: [
      "sigProfilerAssignment",
      "sigProfilerExtractor",
      "deconstructSigs",
      "musical"
    ],
    sigProfilerExtractor: {
      referenceGenome: "GRCh37",
      outputDirectory: "/output/pcawg_luad_multi_engine",
      minimumSignatures: 2,
      maximumSignatures: 6,
      nmfReplicates: 100
    }
  }
);

const engineBundleRows = Object.entries(engineInteropBundle.tools || {}).map(([tool, value]) => {
  const files = value.files || value.input?.files || [];
  const snippets = [
    value.pythonSnippet,
    value.rSnippet,
    value.codeSnippet,
    value.runCommand,
    value.command
  ].filter(Boolean);
  return {
    tool,
    files: files.length,
    code_snippets: snippets.length,
    output_to_import: tool === "sigProfilerExtractor"
      ? "Activities and extracted signatures"
      : "Exposure CSV with sample and signature columns",
    workflow_stage: tool === "sigProfilerExtractor" ? "De novo extraction" : "Known-signature refit"
  };
});

display(engineTable(engineBundleRows, {
  columns: [
    { key: "tool", label: "Tool" },
    { key: "workflow_stage", label: "Workflow stage" },
    { key: "files", label: "Prepared files" },
    { key: "code_snippets", label: "Code snippets" },
    { key: "output_to_import", label: "Output to import" }
  ],
  title: "Prepared package run files",
  maxRows: engineBundleRows.length
}));

display(details("Bundle object keys", [
  `Tools: ${Object.keys(engineInteropBundle.tools || {}).join(", ")}`,
  `Samples: ${engineSampleNames.length}`,
  `Contexts: ${engineContextNames.length}`,
  `Signatures: ${engineSignatureNames.join(", ")}`
]));
</script>
