  <title>mSigSDK multi-engine comparison</title>

  <script type="text/markdown">
    # Multi-engine and interoperability comparison

    This notebook shows the complete browser and interoperability surface around mSigSDK mutational-signature workflows. It covers native JavaScript QC, refitting, reporting, and NMF; the generic Pyodide Python worker; SigProfilerAssignment matrix-mode execution; MuSiCal-compatible refitting; SigProfilerExtractor handoff; and deconstructSigs handoff.

    The displayed results focus on the practical review questions: which workflows execute directly in the browser, which tools are interoperable through prepared files or parsed outputs, which signatures are active, how closely comparable engines agree, and what support boundary applies to each external method.
  </script>

  <script type="module" pinned id="1">
    const engineSdkUrl = new URL("../main.js?v=2026-05-14-multi-engine-results", location.href).href;
    const { mSigSDK } = await import(engineSdkUrl);
    const {
      burdenSampleRows,
      details,
      formatNumber,
      metrics,
      note,
      table,
    } = mSigSDK.presentation;

    const engineContexts = mSigSDK.validation.getExpectedContexts({
      profile: "SBS",
      matrix: 96,
    });
    const engineSampleNames = [
      "SP53810",
      "SP55142",
      "SP55235",
      "SP54113",
      "SP50611",
    ];
    const enginePreferredSignatureNames = [
      "SBS1",
      "SBS2",
      "SBS4",
      "SBS5",
      "SBS13",
      "SBS17a",
      "SBS17b",
      "SBS18",
      "SBS40",
    ];
    const engineStudy = "PCAWG";
    const engineGenomeDataType = "WGS";
    const engineCancerType = "Lung-AdenoCA";
    const engineMutationType = "SBS";
    const engineMatrixSize = 96;
    const engineSignatureSetName = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const engineExposureThreshold = 0.01;
    const engineSparseThreshold = 0.03;
    const engineUrlParams = new URLSearchParams(location.search);
    const engineRunSigProfilerAssignment = engineUrlParams.get("runSpa") === "1";
    const engineRunPyodideSmoke = engineUrlParams.get("runPyodide") !== "0";
    const engineSupportRows = [
      {
        toolWorkflow: "Native mSigSDK QC/refitting/reporting/NMF",
        executesInBrowserNow: "Yes",
        interoperableNow: "Yes",
        currentSupport: "Fully browser-native JavaScript.",
      },
      {
        toolWorkflow: "Pyodide runner",
        executesInBrowserNow: "Yes",
        interoperableNow: "Yes",
        currentSupport:
          "Generic browser Python worker via mSigSDK.runners.pyodide.",
      },
      {
        toolWorkflow: "SigProfilerAssignment",
        executesInBrowserNow: "Yes",
        interoperableNow: "Yes",
        currentSupport:
          "Verified matrix-mode execution in Chrome/Pyodide; output exposure table is parsed back into SDK objects.",
      },
      {
        toolWorkflow: "MuSiCal-compatible refit",
        executesInBrowserNow: "Yes, SDK comparator",
        interoperableNow: "Yes",
        currentSupport:
          "Browser-native sparse NNLS comparator plus MuSiCal-compatible input/output. True MuSiCal package execution needs a Pyodide-compatible wheel or preloaded environment.",
      },
      {
        toolWorkflow: "SigProfilerExtractor",
        executesInBrowserNow: "No, handoff only",
        interoperableNow: "Yes",
        currentSupport:
          "SDK prepares matrix-mode input and Python snippet; can parse common output tables back into SDK matrices.",
      },
      {
        toolWorkflow: "deconstructSigs",
        executesInBrowserNow: "No, handoff only",
        interoperableNow: "Yes",
        currentSupport:
          "SDK prepares spectra/signature TSVs and R snippet; parses sample-by-signature exposure output.",
      },
    ];

    const engineZeroRecord = () =>
      Object.fromEntries(engineContexts.map((context) => [context, 0]));
    const engineMean = (values) => {
      const finite = values.filter(Number.isFinite);
      return finite.length
        ? finite.reduce((sum, value) => sum + value, 0) / finite.length
        : null;
    };
    const engineNormalizeRecord = (record) => {
      const total = Object.values(record).reduce(
        (sum, value) => sum + Number(value || 0),
        0
      );
      return Object.fromEntries(
        engineContexts.map((context) => [
          context,
          total ? Number(record[context] || 0) / total : 0,
        ])
      );
    };
    const engineExposureCosine = (left = {}, right = {}) => {
      const keys = [...new Set([...Object.keys(left), ...Object.keys(right)])];
      const dot = keys.reduce(
        (sum, key) => sum + Number(left[key] || 0) * Number(right[key] || 0),
        0
      );
      const leftNorm = Math.sqrt(
        keys.reduce((sum, key) => sum + Number(left[key] || 0) ** 2, 0)
      );
      const rightNorm = Math.sqrt(
        keys.reduce((sum, key) => sum + Number(right[key] || 0) ** 2, 0)
      );
      return leftNorm && rightNorm ? dot / (leftNorm * rightNorm) : null;
    };
    const engineExposureL1 = (left = {}, right = {}) => {
      const keys = [...new Set([...Object.keys(left), ...Object.keys(right)])];
      return keys.reduce(
        (sum, key) => sum + Math.abs(Number(left[key] || 0) - Number(right[key] || 0)),
        0
      );
    };
    const engineActiveSet = (record = {}, threshold = engineExposureThreshold) =>
      Object.entries(record)
        .filter(([, value]) => Number(value || 0) >= threshold)
        .map(([signature]) => signature);
    const engineDominantSignature = (record = {}) => {
      const entries = Object.entries(record);
      if (!entries.length) {
        return { signature: "n/a", exposure: null };
      }
      const [signature, exposure] = entries.reduce((best, current) =>
        Number(current[1] || 0) > Number(best[1] || 0) ? current : best
      );
      return { signature, exposure: Number(exposure || 0) };
    };
    const engineMetricForSample = (reconstruction, sample, metric) =>
      reconstruction?.samples?.find((row) => row.sample === sample)?.[metric] ?? null;
    const engineSubsetMatrix = (matrix, names) =>
      Object.fromEntries(names.filter((name) => matrix[name]).map((name) => [name, matrix[name]]));
    const engineLinePreview = (text, lineCount = 8) =>
      String(text || "").split(/\r?\n/).slice(0, lineCount).join("\n");

    function enginePatternSignature(patterns) {
      const record = engineZeroRecord();
      patterns.forEach(({ includes, weight }) => {
        const matches = engineContexts.filter((context) => context.includes(includes));
        matches.forEach((context, index) => {
          record[context] += weight * (1 + (matches.length - index) / matches.length);
        });
      });
      return engineNormalizeRecord(record);
    }

    function engineMixture(signatures, weights, totalMutations) {
      const profile = engineZeroRecord();
      Object.entries(weights).forEach(([signature, weight]) => {
        const row = signatures[signature] || {};
        engineContexts.forEach((context) => {
          profile[context] += Number(weight || 0) * Number(row[context] || 0);
        });
      });
      const normalized = engineNormalizeRecord(profile);
      return Object.fromEntries(
        engineContexts.map((context) => [
          context,
          Math.round(Number(normalized[context] || 0) * totalMutations),
        ])
      );
    }

    function engineFallbackMatrices() {
      const signatures = {
        SBS_demo_CA: enginePatternSignature([
          { includes: "[C>A]", weight: 1 },
          { includes: "[T>A]", weight: 0.15 },
        ]),
        SBS_demo_CT: enginePatternSignature([
          { includes: "[C>T]", weight: 1 },
          { includes: "[T>C]", weight: 0.2 },
        ]),
        SBS_demo_CG: enginePatternSignature([
          { includes: "[C>G]", weight: 1 },
          { includes: "[T>G]", weight: 0.2 },
        ]),
        SBS_demo_flat: engineNormalizeRecord(
          Object.fromEntries(engineContexts.map((context) => [context, 1]))
        ),
      };
      return {
        source: "Embedded SBS96 benchmark matrices",
        sourceStatus: "offline benchmark",
        spectra: {
          demo_CA_dominant: engineMixture(
            signatures,
            { SBS_demo_CA: 0.72, SBS_demo_CT: 0.18, SBS_demo_flat: 0.1 },
            9200
          ),
          demo_CT_mixed: engineMixture(
            signatures,
            { SBS_demo_CT: 0.52, SBS_demo_CG: 0.28, SBS_demo_flat: 0.2 },
            6100
          ),
          demo_CG_sparse: engineMixture(
            signatures,
            { SBS_demo_CG: 0.82, SBS_demo_flat: 0.18 },
            3400
          ),
        },
        signatures,
        warning:
          "Live mSigPortal data were unavailable, so the embedded count-scale SBS96 benchmark matrices were loaded.",
      };
    }

    display(metrics([
      { label: "SDK", value: mSigSDK.name },
      { label: "Version", value: mSigSDK.version },
      { label: "Matrix", value: "SBS96" },
      { label: "Primary import", value: "../main.js" },
    ]));
    display(table(
      engineSupportRows,
      [
        { key: "toolWorkflow", label: "Tool/workflow" },
        { key: "executesInBrowserNow", label: "Executes in browser now?" },
        { key: "interoperableNow", label: "Interoperable now?" },
        { key: "currentSupport", label: "Current support" },
      ],
      { maxRows: 12 }
    ));
  </script>

  <script type="text/markdown">
    ## 1. Browser Python execution layer

    The Pyodide runner is the generic Python execution layer used by package-specific adapters. This cell runs a small Python payload in a browser worker when `runPyodide` is not set to `0`; failures are reported as runtime evidence rather than stopping the notebook.
  </script>

  <script type="module" pinned id="2">
    const enginePyodideRuntime = mSigSDK.runners.pyodide.detect();
    let enginePyodideSmoke = {
      status: "not run",
      reason: engineRunPyodideSmoke
        ? "Runtime check did not start."
        : "Disabled with runPyodide=0.",
    };

    if (engineRunPyodideSmoke && enginePyodideRuntime.available) {
      try {
        const pyodideResult = await mSigSDK.runners.pyodide.runPython(
          [
            "import json",
            "inputs = json.loads(MSIG_INPUT_JSON)",
            "json.dumps({",
            "  'ok': True,",
            "  'engine': 'Pyodide',",
            "  'sample_count': len(inputs['samples']),",
            "  'signature_count': len(inputs['signatures'])",
            "})",
          ].join("\n"),
          {
            inputs: {
              samples: engineSampleNames,
              signatures: enginePreferredSignatureNames,
            },
            timeoutMs: 45000,
          }
        );
        enginePyodideSmoke = {
          status: pyodideResult.result?.ok ? "passed" : "review",
          elapsedMs: pyodideResult.elapsedMs,
          result: pyodideResult.result,
          loadedPyodidePackages: pyodideResult.loadedPyodidePackages,
        };
      } catch (error) {
        enginePyodideSmoke = {
          status: "unavailable in this browser session",
          detail: error.message,
        };
      }
    } else if (!enginePyodideRuntime.available) {
      enginePyodideSmoke = {
        status: "unavailable",
        missing: enginePyodideRuntime.missing,
      };
    }

    display(metrics([
      {
        label: "Pyodide worker prerequisites",
        value: enginePyodideRuntime.available ? "Available" : "Unavailable",
      },
      {
        label: "Missing browser capabilities",
        value: enginePyodideRuntime.missing.length
          ? enginePyodideRuntime.missing.join(", ")
          : "None",
      },
      {
        label: "Generic Python smoke test",
        value: enginePyodideSmoke.status,
      },
      {
        label: "Pyodide index",
        value: "v0.27.4",
        note: enginePyodideRuntime.defaultIndexURL,
      },
    ]));
    display(details("Pyodide runner result", enginePyodideSmoke, {
      open: true,
    }));
  </script>

  <script type="text/markdown">
    ## 2. Load spectra and signatures

    The primary example uses count-scale PCAWG Lung-AdenoCA SBS96 spectra and COSMIC SBS96 reference signatures from mSigPortal. The embedded fallback has the same sample-by-context and signature-by-context shape, so every downstream result cell remains runnable without a live network request.
  </script>

  <script type="module" pinned id="3">
    async function engineLoadPublicMatrices() {
      const [rawSpectrumRows, rawSignatureRows] = await Promise.all([
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          engineStudy,
          engineSampleNames,
          engineGenomeDataType,
          engineCancerType,
          engineMutationType,
          engineMatrixSize
        ),
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          engineGenomeDataType,
          engineSignatureSetName,
          engineMutationType,
          engineMatrixSize,
          10000
        ),
      ]);
      const spectrumRows = Array.isArray(rawSpectrumRows) ? rawSpectrumRows.flat() : [];
      const signatureRows = Array.isArray(rawSignatureRows) ? rawSignatureRows.flat() : [];
      const allSpectra =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(spectrumRows);
      const allSignatures =
        mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(
          signatureRows,
          "signatureName"
        );
      const selectedSamples = engineSampleNames.filter((sample) => allSpectra[sample]);
      const selectedSignatures = enginePreferredSignatureNames.filter(
        (signature) => allSignatures[signature]
      );

      if (selectedSamples.length < 2 || selectedSignatures.length < 3) {
        throw new Error("mSigPortal returned too few samples or signatures for comparison.");
      }

      return {
        source: `${engineStudy} ${engineGenomeDataType} ${engineCancerType}`,
        sourceStatus: "live mSigPortal",
        spectra: engineSubsetMatrix(allSpectra, selectedSamples),
        signatures: engineSubsetMatrix(allSignatures, selectedSignatures),
      };
    }

    let engineData;
    try {
      engineData = await engineLoadPublicMatrices();
    } catch (_error) {
      engineData = engineFallbackMatrices();
    }

    const engineSpectra = engineData.spectra;
    const engineSignatures = engineData.signatures;
    const engineLoadedSampleNames = Object.keys(engineSpectra);
    const engineLoadedSignatureNames = Object.keys(engineSignatures);
    const engineBurden = mSigSDK.qc.summarizeMutationBurden(engineSpectra, {
      expectedContexts: engineContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: 500,
    });
    const engineSpectraValidation = mSigSDK.validation.validateSpectra(
      engineSpectra,
      { expectedContexts: engineContexts, minTotalMutations: 500 }
    );
    const engineSignatureValidation = mSigSDK.validation.validateSignatureMatrix(
      engineSignatures,
      { expectedContexts: engineContexts }
    );

    display(metrics([
      { label: "Data source", value: engineData.source },
      { label: "Source status", value: engineData.sourceStatus },
      { label: "Samples", value: engineLoadedSampleNames.length },
      { label: "Reference signatures", value: engineLoadedSignatureNames.length },
      {
        label: "Total mutations",
        value: formatNumber(engineBurden.overall.totalMutations),
      },
      {
        label: "Validation",
        value:
          engineSpectraValidation.valid && engineSignatureValidation.valid
            ? "Pass"
            : "Review",
      },
    ]));
    if (engineData.warning) {
      display(note(engineData.warning, "warning"));
    }
    display(table(
      burdenSampleRows(engineBurden, engineLoadedSampleNames),
      [
        { key: "sample", label: "Sample" },
        { key: "mutations", label: "Total mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low-burden flag" },
      ],
      { maxRows: 8 }
    ));
    display(table(
      engineLoadedSignatureNames.map((signature) => ({
        signature,
        contexts: Object.keys(engineSignatures[signature] || {}).length,
      })),
      [
        { key: "signature", label: "Reference signature" },
        { key: "contexts", label: "Contexts" },
      ],
      { maxRows: 12 }
    ));
  </script>

  <script type="text/markdown">
    ## 3. Run native JavaScript workflows and the sparse refit comparator

    The baseline fit uses mSigSDK NNLS with a 0.01 relative-exposure floor. The same inputs are assembled into a structured report and a small NMF extraction analysis. The sparse comparator starts from the same spectra and catalog, removes signatures below a 0.03 relative-exposure floor, and refits the remaining active set.
  </script>

  <script type="module" pinned id="4">
    const engineSdkFit = await mSigSDK.qc.fitSpectraWithNNLS(
      engineSignatures,
      engineSpectra,
      {
        contexts: engineContexts,
        exposureThreshold: engineExposureThreshold,
        exposureType: "relative",
        renormalize: true,
        returnDetails: true,
      }
    );
    const engineSdkExposures = engineSdkFit.exposures;
    const engineSparseFit = await mSigSDK.adapters.musical.runSparseNnlsRefit(
      { spectra: engineSpectra, signatures: engineSignatures },
      {
        contexts: engineContexts,
        threshold: engineSparseThreshold,
        keepAtLeastOne: true,
      }
    );
    const engineSparseExposures = engineSparseFit.exposures;
    const engineSdkReconstruction = mSigSDK.qc.calculateReconstructionError(
      engineSignatures,
      engineSpectra,
      engineSdkExposures,
      { contexts: engineContexts, normalizeMode: "relative" }
    );
    const engineNativeFitAnalysis = mSigSDK.workflows.createSignatureFitAnalysis({
      spectra: engineSpectra,
      signatures: engineSignatures,
      exposures: engineSdkExposures,
      expectedContexts: engineContexts,
      mutationBurdenOptions: {
        lowBurdenThresholdMode: "fixed",
        lowBurdenThreshold: 500,
      },
      parameters: {
        exposureThreshold: engineExposureThreshold,
        exposureType: "relative",
        renormalize: true,
      },
      reportFormat: "object",
    });
    const engineNativeNmfAnalysis = mSigSDK.workflows.createNMFAnalysis({
      spectra: engineSpectra,
      referenceSignatures: engineSignatures,
      expectedContexts: engineContexts,
      nmfOptions: {
        rank: Math.min(2, engineLoadedSampleNames.length),
        nRuns: 2,
        maxIterations: 80,
        tolerance: 1e-4,
        seed: 20260514,
        signaturePrefix: "NMF_demo",
      },
      mutationBurdenOptions: {
        lowBurdenThresholdMode: "fixed",
        lowBurdenThreshold: 500,
      },
      parameters: {
        purpose: "browser-native NMF capability demonstration",
      },
      reportFormat: "object",
    });
    const engineSparseReconstruction = engineSparseFit.reconstructionError;
    const engineAmbiguity = mSigSDK.advisor.computeSignatureAmbiguity(
      engineSignatures,
      { contexts: engineContexts }
    );
    const engineAgreementValues = engineLoadedSampleNames.map((sample) =>
      engineExposureCosine(
        engineSdkExposures[sample],
        engineSparseExposures[sample]
      )
    );
    const engineSummaryRows = engineLoadedSampleNames.map((sample) => {
      const sdkTop = engineDominantSignature(engineSdkExposures[sample]);
      const sparseTop = engineDominantSignature(engineSparseExposures[sample]);
      return {
        sample,
        sdkTop: `${sdkTop.signature} (${formatNumber(sdkTop.exposure)})`,
        sparseTop: `${sparseTop.signature} (${formatNumber(sparseTop.exposure)})`,
        exposureCosine: engineExposureCosine(
          engineSdkExposures[sample],
          engineSparseExposures[sample]
        ),
        exposureL1: engineExposureL1(
          engineSdkExposures[sample],
          engineSparseExposures[sample]
        ),
        sdkActive: engineActiveSet(engineSdkExposures[sample]).join(", "),
        sparseActive: engineActiveSet(engineSparseExposures[sample]).join(", "),
        sdkReconstructionCosine: engineMetricForSample(
          engineSdkReconstruction,
          sample,
          "cosineSimilarity"
        ),
        sparseReconstructionCosine: engineMetricForSample(
          engineSparseReconstruction,
          sample,
          "cosineSimilarity"
        ),
      };
    });

    display(metrics([
      { label: "mSigSDK exposure floor", value: engineExposureThreshold },
      { label: "Sparse refit floor", value: engineSparseThreshold },
      {
        label: "Mean engine agreement",
        value: formatNumber(engineMean(engineAgreementValues)),
        note: "Exposure-vector cosine across samples",
      },
      {
        label: "High-ambiguity signatures",
        value: engineAmbiguity.catalogSummary.highAmbiguityCount,
      },
      {
        label: "Mean mSigSDK reconstruction",
        value: formatNumber(
          engineMean(
            engineSdkReconstruction.samples.map((row) => row.cosineSimilarity)
          )
        ),
      },
      {
        label: "Mean sparse reconstruction",
        value: formatNumber(
          engineMean(
            engineSparseReconstruction.samples.map((row) => row.cosineSimilarity)
          )
        ),
      },
      {
        label: "NMF rank",
        value: engineNativeNmfAnalysis.extraction.rank,
      },
      {
        label: "NMF average sample cosine",
        value: formatNumber(engineNativeNmfAnalysis.extraction.averageSampleCosineSimilarity),
      },
    ]));
    display(table(
      [
        {
          workflow: "QC",
          browserResult: `${engineNativeFitAnalysis.validation.spectra.samples.length} spectra checked; ${engineNativeFitAnalysis.qc.reconstructionError.samples.length} reconstruction rows returned`,
          reportObject: "qc.mutationBurden, qc.reconstructionError, qc.residuals",
        },
        {
          workflow: "Refitting",
          browserResult: `${Object.keys(engineSdkExposures).length} fitted samples across ${engineLoadedSignatureNames.length} signatures`,
          reportObject: "fit.exposures",
        },
        {
          workflow: "Reporting",
          browserResult: `${Object.keys(engineNativeFitAnalysis.report).length} structured report fields`,
          reportObject: "report.schemaVersion, parameters, validation, qc, citations",
        },
        {
          workflow: "NMF",
          browserResult: `Rank ${engineNativeNmfAnalysis.extraction.rank}; ${Object.keys(engineNativeNmfAnalysis.extraction.signatures).length} extracted profiles`,
          reportObject: "extraction.signatures, extraction.exposures, comparison",
        },
      ],
      [
        { key: "workflow", label: "Native workflow" },
        { key: "browserResult", label: "Browser result" },
        { key: "reportObject", label: "Returned object fields" },
      ]
    ));
    display(table(
      engineSummaryRows,
      [
        { key: "sample", label: "Sample" },
        { key: "sdkTop", label: "mSigSDK top exposure" },
        { key: "sparseTop", label: "Sparse top exposure" },
        { key: "exposureCosine", label: "Exposure cosine" },
        { key: "exposureL1", label: "Exposure L1 distance" },
        { key: "sdkActive", label: "mSigSDK active set" },
        { key: "sparseActive", label: "Sparse active set" },
        { key: "sdkReconstructionCosine", label: "mSigSDK reconstruction cosine" },
        { key: "sparseReconstructionCosine", label: "Sparse reconstruction cosine" },
      ],
      { maxRows: 8 }
    ));
    display(details("mSigSDK fit method basis", engineSdkFit.methodBasis));
    display(details("Native signature-fit report object", engineNativeFitAnalysis.report));
    display(details("Native NMF analysis object", {
      workflow: engineNativeNmfAnalysis.workflow,
      extraction: {
        rank: engineNativeNmfAnalysis.extraction.rank,
        reconstructionError: engineNativeNmfAnalysis.extraction.reconstructionError,
        averageSampleCosineSimilarity:
          engineNativeNmfAnalysis.extraction.averageSampleCosineSimilarity,
        bestRun: engineNativeNmfAnalysis.extraction.bestRun,
      },
      comparison: engineNativeNmfAnalysis.comparison,
      recommendedActions: engineNativeNmfAnalysis.recommendedActions,
    }));
    display(details("MuSiCal-compatible sparse refit provenance", engineSparseFit.provenance));
  </script>

  <script type="text/markdown">
    ## 4. Inspect exposure-level differences

    The sample summary above shows whether the engines agree overall. The table below shows which signatures changed after sparse refitting and by how much.
  </script>

  <script type="module" pinned id="5">
    const engineExposureDeltaRows = engineLoadedSampleNames
      .flatMap((sample) =>
        engineLoadedSignatureNames.map((signature) => {
          const sdkExposure = Number(engineSdkExposures[sample]?.[signature] || 0);
          const sparseExposure = Number(engineSparseExposures[sample]?.[signature] || 0);
          return {
            sample,
            signature,
            sdkExposure,
            sparseExposure,
            absoluteDelta: Math.abs(sdkExposure - sparseExposure),
          };
        })
      )
      .filter(
        (row) =>
          row.sdkExposure >= 0.005 ||
          row.sparseExposure >= 0.005 ||
          row.absoluteDelta >= 0.005
      )
      .sort(
        (left, right) =>
          left.sample.localeCompare(right.sample) ||
          right.absoluteDelta - left.absoluteDelta
      );

    function engineExposureChart(rows) {
      const host = document.createElement("div");
      host.style.display = "grid";
      host.style.gap = "14px";
      host.style.marginTop = "4px";
      host.style.font = "13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      const samples = [...new Set(rows.map((row) => row.sample))];
      samples.forEach((sample) => {
        const sampleRows = rows
          .filter((row) => row.sample === sample)
          .sort((left, right) => Math.max(right.sdkExposure, right.sparseExposure) - Math.max(left.sdkExposure, left.sparseExposure))
          .slice(0, 6);
        const block = document.createElement("div");
        block.style.border = "1px solid #d8ded8";
        block.style.borderRadius = "8px";
        block.style.padding = "12px";
        const heading = document.createElement("strong");
        heading.textContent = sample;
        heading.style.display = "block";
        heading.style.marginBottom = "8px";
        block.append(heading);
        sampleRows.forEach((row) => {
          const line = document.createElement("div");
          line.style.display = "grid";
          line.style.gridTemplateColumns = "92px minmax(140px, 1fr) 54px";
          line.style.gap = "8px";
          line.style.alignItems = "center";
          line.style.margin = "5px 0";

          const label = document.createElement("span");
          label.textContent = row.signature;

          const bars = document.createElement("div");
          bars.style.display = "grid";
          bars.style.gap = "3px";
          [
            { value: row.sdkExposure, color: "#0072B2", label: "mSigSDK" },
            { value: row.sparseExposure, color: "#D55E00", label: "Sparse" },
          ].forEach((bar) => {
            const outer = document.createElement("div");
            outer.title = `${bar.label}: ${formatNumber(bar.value)}`;
            outer.style.height = "8px";
            outer.style.background = "#eef2f0";
            outer.style.borderRadius = "999px";
            const inner = document.createElement("div");
            inner.style.width = `${Math.max(0, Math.min(1, bar.value)) * 100}%`;
            inner.style.height = "100%";
            inner.style.background = bar.color;
            inner.style.borderRadius = "999px";
            outer.append(inner);
            bars.append(outer);
          });

          const value = document.createElement("span");
          value.textContent = formatNumber(row.absoluteDelta);
          value.style.textAlign = "right";
          line.append(label, bars, value);
          block.append(line);
        });
        host.append(block);
      });
      return host;
    }

    display(table(
      engineExposureDeltaRows,
      [
        { key: "sample", label: "Sample" },
        { key: "signature", label: "Signature" },
        { key: "sdkExposure", label: "mSigSDK relative exposure" },
        { key: "sparseExposure", label: "Sparse relative exposure" },
        { key: "absoluteDelta", label: "Absolute difference" },
      ],
      { maxRows: 40 }
    ));
    display(engineExposureChart(engineExposureDeltaRows));
  </script>

  <script type="text/markdown">
    ## 5. Check external-engine handoff, parse-back, and optional SigProfilerAssignment execution

    SigProfilerAssignment executes through the Pyodide adapter when `runSpa=1` is present in the page URL. SigProfilerExtractor and deconstructSigs are handoff workflows: the SDK prepares the files and snippets now, then parses common output tables back into SDK matrices after those tools run elsewhere.
  </script>

  <script type="module" pinned id="6">
    const engineBundle = mSigSDK.adapters.createInteroperabilityBundle(
      { spectra: engineSpectra, signatures: engineSignatures },
      { contexts: engineContexts }
    );
    const engineSpaInput = engineBundle.tools.sigProfilerAssignment;
    const engineMusicalInput = engineBundle.tools.musical;
    const engineDeconstructInput = engineBundle.tools.deconstructSigs;
    const engineExtractorInput = engineBundle.tools.sigProfilerExtractor;
    const engineSpaRuntime = mSigSDK.runners.pyodide.detect();
    const engineExposureOutputText = [
      ["Sample", ...engineLoadedSignatureNames].join("\t"),
      ...engineLoadedSampleNames.map((sample) =>
        [
          sample,
          ...engineLoadedSignatureNames.map((signature) =>
            Number(engineSdkExposures[sample]?.[signature] || 0)
          ),
        ].join("\t")
      ),
    ].join("\n");
    const engineParsedSigProfilerExtractor =
      mSigSDK.adapters.sigProfilerExtractor.parseOutput(
        [
          {
            path: "/output/sigprofiler_extractor/Signatures/Extracted_Signatures.txt",
            text: mSigSDK.io.exportCOSMICSignatureMatrix(engineSignatures, {
              contexts: engineContexts,
            }),
          },
          {
            path: "/output/sigprofiler_extractor/Activities/Activities.txt",
            text: engineExposureOutputText,
          },
        ],
        { normalize: true }
      );
    const engineParsedDeconstructSigs =
      mSigSDK.adapters.deconstructSigs.parseOutput(engineExposureOutputText, {
        normalize: true,
      });
    const engineParsedMusical = mSigSDK.io.importMuSiCalOutput(
      engineExposureOutputText,
      { normalize: true }
    );
    async function engineLoadVerificationSnapshot() {
      try {
        const response = await fetch(
          "../docs/verification/tool-interoperability-results.json",
          { cache: "no-store" }
        );
        if (!response.ok) {
          throw new Error(`Verification artifact returned ${response.status}.`);
        }
        return await response.json();
      } catch (error) {
        return {
          status: "unavailable",
          detail: error.message,
        };
      }
    }
    const engineVerificationSnapshot = await engineLoadVerificationSnapshot();
    const engineVerificationRows =
      engineVerificationSnapshot.browserChecks?.checks
        ?.filter((check) =>
          /Pyodide|SigProfilerAssignment|SigProfilerExtractor|deconstructSigs|MuSiCal|interoperability/i.test(
            check.name
          )
        )
        .map((check) => ({
          check: check.name,
          status: check.passed ? "Pass" : "Review",
        })) || [];
    const engineHandoffRows = [
      {
        target: "SigProfilerAssignment",
        mode: engineSpaInput.mode,
        files: engineSpaInput.files.length,
        samples: engineSpaInput.manifest.sampleCount,
        signatures: engineSpaInput.manifest.signatureCount,
        executesInBrowserNow: "Yes through Pyodide",
        parseBack: "Exposure table parsed after run",
        status: engineRunSigProfilerAssignment
          ? "Live run requested"
          : "Verified; prepared for matrix-mode run",
      },
      {
        target: "MuSiCal",
        mode: engineMusicalInput.mode,
        files: engineMusicalInput.files.length,
        samples: engineMusicalInput.manifest.sampleCount,
        signatures: engineMusicalInput.manifest.signatureCount,
        executesInBrowserNow: "SDK comparator",
        parseBack: "MuSiCal output parser available",
        status: "Prepared and compared with browser sparse NNLS",
      },
      {
        target: "deconstructSigs",
        mode: engineDeconstructInput.mode,
        files: engineDeconstructInput.files.length,
        samples: engineDeconstructInput.manifest.sampleCount,
        signatures: engineDeconstructInput.manifest.signatureCount,
        executesInBrowserNow: "No, R handoff",
        parseBack: "Sample-by-signature table parsed",
        status: "Prepared R handoff",
      },
      {
        target: "SigProfilerExtractor",
        mode: engineExtractorInput.mode,
        files: engineExtractorInput.files.length,
        samples: engineExtractorInput.manifest.sampleCount,
        signatures: "n/a",
        executesInBrowserNow: "No, Python handoff",
        parseBack: "Signature and activity tables parsed",
        status: "Prepared extraction handoff",
      },
    ];
    const engineParseBackRows = [
      {
        target: "SigProfilerAssignment",
        parsedSamples: "Verified by Chrome/Pyodide artifact",
        parsedSignatures: "Exposure table parsed when runSpa=1",
        parser: "adapters.sigProfilerAssignment.parseOutput",
      },
      {
        target: "MuSiCal-compatible output",
        parsedSamples: Object.keys(engineParsedMusical).length,
        parsedSignatures: Object.keys(engineParsedMusical[engineLoadedSampleNames[0]] || {}).length,
        parser: "io.importMuSiCalOutput",
      },
      {
        target: "SigProfilerExtractor output",
        parsedSamples: Object.keys(engineParsedSigProfilerExtractor.exposures || {}).length,
        parsedSignatures:
          Object.keys(engineParsedSigProfilerExtractor.signatures || {}).length,
        parser: "adapters.sigProfilerExtractor.parseOutput",
      },
      {
        target: "deconstructSigs output",
        parsedSamples: Object.keys(engineParsedDeconstructSigs).length,
        parsedSignatures:
          Object.keys(engineParsedDeconstructSigs[engineLoadedSampleNames[0]] || {}).length,
        parser: "adapters.deconstructSigs.parseOutput",
      },
    ];

    display(metrics([
      {
        label: "Pyodide worker prerequisites",
        value: engineSpaRuntime.available ? "Available" : "Unavailable",
      },
      {
        label: "Missing browser capabilities",
        value: engineSpaRuntime.missing.length
          ? engineSpaRuntime.missing.join(", ")
          : "None",
      },
      {
        label: "SigProfilerAssignment package",
        value: mSigSDK.adapters.DEFAULT_SPA_PACKAGE,
      },
      {
        label: "Interop verification",
        value: engineVerificationSnapshot.status || "unavailable",
        note: engineVerificationSnapshot.browserChecks?.browserVersion
          ? `Chrome ${engineVerificationSnapshot.browserChecks.browserVersion}`
          : engineVerificationSnapshot.detail,
      },
      {
        label: "Live SigProfilerAssignment run",
        value: engineRunSigProfilerAssignment ? "Enabled" : "Disabled",
        note: "Set runSpa=1 in the URL to execute the Pyodide adapter.",
      },
    ]));
    display(table(
      engineHandoffRows,
      [
        { key: "target", label: "Target" },
        { key: "mode", label: "Mode" },
        { key: "files", label: "Prepared files" },
        { key: "samples", label: "Samples" },
        { key: "signatures", label: "Signatures" },
        { key: "executesInBrowserNow", label: "Browser execution" },
        { key: "parseBack", label: "Parse-back support" },
        { key: "status", label: "Status" },
      ]
    ));
    display(table(
      engineParseBackRows,
      [
        { key: "target", label: "Output source" },
        { key: "parsedSamples", label: "Parsed samples" },
        { key: "parsedSignatures", label: "Parsed signatures" },
        { key: "parser", label: "SDK parser" },
      ]
    ));
    if (engineVerificationRows.length) {
      display(table(
        engineVerificationRows,
        [
          { key: "check", label: "Chrome/Pyodide verification check" },
          { key: "status", label: "Status" },
        ],
        { maxRows: 20 }
      ));
    }
    display(details(
      "SigProfilerAssignment spectra TSV preview",
      engineLinePreview(engineSpaInput.files[0]?.text, 10),
      { open: true }
    ));
    display(details(
      "SigProfilerAssignment signature TSV preview",
      engineLinePreview(engineSpaInput.files[1]?.text, 10)
    ));
    display(details(
      "SigProfilerExtractor parsed output object",
      engineParsedSigProfilerExtractor
    ));
    display(details(
      "deconstructSigs parsed exposure object",
      engineParsedDeconstructSigs
    ));

    if (engineRunSigProfilerAssignment) {
      try {
        const engineSpaFit = await mSigSDK.adapters.sigProfilerAssignment.run(
          { spectra: engineSpectra, signatures: engineSignatures },
          {
            contexts: engineContexts,
            genomeBuild: "GRCh37",
            cosmicVersion: 3.5,
            cpu: 1,
            timeoutMs: 300000,
          }
        );
        const engineSpaRows = engineLoadedSampleNames.map((sample) => ({
          sample,
          sdkVsSpaCosine: engineExposureCosine(
            engineSdkExposures[sample],
            engineSpaFit.exposures?.[sample] || {}
          ),
          parsedExposureTable:
            engineSpaFit.candidateExposureTables?.[0]?.path || "not detected",
          outputFiles: engineSpaFit.rawRun?.files?.length ?? 0,
        }));
        display(table(
          engineSpaRows,
          [
            { key: "sample", label: "Sample" },
            { key: "sdkVsSpaCosine", label: "mSigSDK vs SPA exposure cosine" },
            { key: "parsedExposureTable", label: "Parsed SPA table" },
            { key: "outputFiles", label: "Collected output files" },
          ]
        ));
        display(details("SigProfilerAssignment adapter provenance", engineSpaFit.provenance));
      } catch (error) {
        display(table(
          [{ status: "SigProfilerAssignment run unavailable", detail: error.message }],
          [
            { key: "status", label: "Status" },
            { key: "detail", label: "Detail" },
          ]
        ));
      }
    }
  </script>

  </script>
