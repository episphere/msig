<title>mSigSDK multi-tool comparison</title>

<script type="text/markdown">
# Multi-tool comparison

Use the same SBS96 spectra and reference-signature catalog across several fitting engines, then triage the samples where the fitted signature recipes disagree.

The page uses 38 cached PCAWG lung adenocarcinoma WGS spectra and nine COSMIC SBS96 signatures (`SBS1`, `SBS2`, `SBS4`, `SBS5`, `SBS13`, `SBS17a`, `SBS17b`, `SBS18`, `SBS40`). mSigSDK is recomputed in the browser. R `nnls`, deconstructSigs, SigProfilerAssignment, and MuSiCal SparseNNLS are imported from package-output CSVs generated from the same input matrix and catalog.

Read the outputs as disagreement triage, not a leaderboard. The useful result is the short list of samples where engine choice changes the exposure vector or top signature enough to require interpretation.
</script>

<script type="module" pinned>
const engineSdkUrl = new URL("../main.js?v=2026-05-20-multi-engine-triage", location.href).href;
const { mSigSDK } = await import(engineSdkUrl);

const {
  metrics,
  table,
  formatNumber
} = mSigSDK.presentation;

const engineDataBase = "../docs/manuscript/experiments/2026_05_13_deconstructsigs_concordance/data/";
const engineParams = new URLSearchParams(location.search);
const engineRunSpaLive = engineParams.get("runSpa") === "1";
const engineSpaSampleLimit = engineParams.get("spaSampleLimit") || "all";

function engineParseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;

  for (let i = 0; i < text.length; i += 1) {
    const character = text[i];
    const nextCharacter = text[i + 1];
    if (character === '"' && quoted && nextCharacter === '"') {
      cell += '"';
      i += 1;
    } else if (character === '"') {
      quoted = !quoted;
    } else if (character === "," && !quoted) {
      row.push(cell);
      cell = "";
    } else if ((character === "\n" || character === "\r") && !quoted) {
      if (character === "\r" && nextCharacter === "\n") i += 1;
      row.push(cell);
      if (row.some((value) => value !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += character;
    }
  }

  if (cell.length || row.length) {
    row.push(cell);
    if (row.some((value) => value !== "")) rows.push(row);
  }

  const headers = rows.shift() || [];
  return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""])));
}

async function engineFetchCsv(path) {
  const response = await fetch(new URL(path, location.href));
  if (!response.ok) throw new Error(`Unable to load ${path}: ${response.status}`);
  return engineParseCsv(await response.text());
}

function engineNumericRows(rows, idColumn) {
  return rows.map((row) => {
    const numeric = { [idColumn]: row[idColumn] };
    for (const [key, value] of Object.entries(row)) {
      if (key !== idColumn) numeric[key] = Number(value) || 0;
    }
    return numeric;
  });
}

function engineMatrixFromRows(rows, idColumn) {
  const matrix = {};
  for (const row of engineNumericRows(rows, idColumn)) {
    const id = row[idColumn];
    matrix[id] = Object.fromEntries(Object.entries(row).filter(([key]) => key !== idColumn));
  }
  return matrix;
}

function engineSum(values) {
  return values.reduce((sum, value) => sum + value, 0);
}

function engineMean(values) {
  return values.length ? engineSum(values) / values.length : 0;
}

function engineMedian(values) {
  if (!values.length) return 0;
  const sorted = [...values].sort((a, b) => a - b);
  const middle = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[middle] : (sorted[middle - 1] + sorted[middle]) / 2;
}

function engineTopExposure(exposures) {
  const entries = Object.entries(exposures || {}).sort((left, right) => right[1] - left[1]);
  return {
    signature: entries[0]?.[0] || "NA",
    exposure: entries[0]?.[1] || 0,
    secondSignature: entries[1]?.[0] || "NA",
    secondExposure: entries[1]?.[1] || 0
  };
}

function engineExposureCosine(left, right, signatures) {
  const numerator = signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) * (right?.[signature] || 0), 0);
  const leftNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (left?.[signature] || 0) ** 2, 0));
  const rightNorm = Math.sqrt(signatures.reduce((sum, signature) => sum + (right?.[signature] || 0) ** 2, 0));
  return leftNorm && rightNorm ? numerator / (leftNorm * rightNorm) : 0;
}

function engineRound(value, digits = 3) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : null;
}

function engineCsvNumber(value, digits = 6) {
  return Number.isFinite(value) ? Number(value.toFixed(digits)) : "";
}

function engineFormatDecimal(value, digits = 3) {
  return Number.isFinite(value) ? formatNumber(engineRound(value, digits), digits + 1) : "n/a";
}

function engineField(label, control, help = "") {
  const wrapper = document.createElement("label");
  wrapper.className = "workflow-field";
  const text = document.createElement("span");
  text.textContent = label;
  wrapper.append(text, control);
  if (help) {
    const small = document.createElement("small");
    small.textContent = help;
    wrapper.append(small);
  }
  return wrapper;
}

function engineSelect(options, value) {
  const select = document.createElement("select");
  select.replaceChildren(...options.map((option) => {
    const node = document.createElement("option");
    node.value = option.value;
    node.textContent = option.label;
    return node;
  }));
  select.value = value;
  return select;
}

function engineNumberInput(value, step, min, max = null) {
  const input = document.createElement("input");
  input.type = "number";
  input.value = value;
  input.step = step;
  input.min = min;
  if (max != null) input.max = max;
  return input;
}

function enginePlaceholder(text) {
  const node = document.createElement("p");
  node.className = "workflow-placeholder";
  node.textContent = text;
  return node;
}

function engineNotebookTable(rows, columns, options = {}) {
  return table(rows, columns, {
    title: options.title,
    caption: options.caption,
    maxRows: options.maxRows ?? 12
  });
}

function engineExposureLongRows(exposureSets, sampleNames, signatures) {
  const rows = [];
  for (const [engine, exposuresBySample] of Object.entries(exposureSets)) {
    for (const sample of sampleNames) {
      const exposures = exposuresBySample?.[sample];
      if (!exposures) continue;
      for (const signature of signatures) {
        rows.push({
          engine,
          sample,
          signature,
          exposure: engineCsvNumber(exposures[signature] || 0, 8)
        });
      }
    }
  }
  return rows;
}

function enginePairComparison(leftName, rightName, sampleNames, signatures) {
  const leftSet = engineExposureSets[leftName];
  const rightSet = engineExposureSets[rightName];
  const sampleRows = [];

  for (const sample of sampleNames) {
    const left = leftSet?.[sample];
    const right = rightSet?.[sample];
    if (!left || !right) continue;
    const leftTop = engineTopExposure(left);
    const rightTop = engineTopExposure(right);
    const cosine = engineExposureCosine(left, right, signatures);
    sampleRows.push({
      sample,
      mutations: engineMutationBurdens[sample],
      engine_a: leftName,
      engine_b: rightName,
      engine_a_top: leftTop.signature,
      engine_b_top: rightTop.signature,
      exposure_cosine: cosine,
      top_signature_match: leftTop.signature === rightTop.signature
    });
  }

  return sampleRows;
}

function enginePairSummary(leftName, rightName, sampleRows, cutoff) {
  const cosines = sampleRows.map((row) => row.exposure_cosine);
  const topMatches = sampleRows.filter((row) => row.top_signature_match).length;
  const belowCutoff = sampleRows.filter((row) => row.exposure_cosine < cutoff).length;
  const topDisagreements = sampleRows.length - topMatches;
  return {
    engine_a: leftName,
    engine_b: rightName,
    samples: sampleRows.length,
    mean_cosine: engineRound(engineMean(cosines), 4),
    median_cosine: engineRound(engineMedian(cosines), 4),
    minimum_cosine: engineRound(Math.min(...cosines), 4),
    samples_below_cutoff: belowCutoff,
    top_signature_disagreements: topDisagreements,
    top_signature_match_rate: sampleRows.length ? engineRound(topMatches / sampleRows.length, 4) : null,
    review_priority: belowCutoff || topDisagreements ? "Review" : "Aligned"
  };
}

function engineCurrentState() {
  return {
    reference: typeof engineReferenceSelect !== "undefined" ? engineReferenceSelect.value : "mSigSDK live",
    lens: typeof engineLensSelect !== "undefined" ? engineLensSelect.value : "reference",
    cutoff: Math.min(1, Math.max(0, Number(typeof engineCosineCutoffInput !== "undefined" ? engineCosineCutoffInput.value : 0.95) || 0.95)),
    minExposure: Math.max(0, Number(typeof engineMinExposureInput !== "undefined" ? engineMinExposureInput.value : 0.01) || 0.01),
    sample: typeof engineSampleSelect !== "undefined" ? engineSampleSelect.value : "",
    exportScope: typeof engineExportScopeSelect !== "undefined" ? engineExportScopeSelect.value : "filtered_review"
  };
}

function engineReferenceRows(state) {
  return Object.keys(engineExposureSets)
    .filter((engine) => engine !== state.reference)
    .map((engine) => {
      const sampleRows = enginePairComparison(state.reference, engine, engineSampleNames, engineSignatureNames);
      const row = enginePairSummary(state.reference, engine, sampleRows, state.cutoff);
      return {
        engine,
        samples: row.samples,
        mean_cosine_to_reference: row.mean_cosine,
        median_cosine_to_reference: row.median_cosine,
        minimum_cosine_to_reference: row.minimum_cosine,
        samples_below_cutoff: row.samples_below_cutoff,
        top_signature_disagreements: row.top_signature_disagreements,
        top_signature_match_rate: row.top_signature_match_rate,
        review_priority: row.review_priority
      };
    })
    .sort((left, right) =>
      right.samples_below_cutoff - left.samples_below_cutoff ||
      right.top_signature_disagreements - left.top_signature_disagreements ||
      left.minimum_cosine_to_reference - right.minimum_cosine_to_reference
    );
}

function enginePairwiseRows(state) {
  const engines = Object.keys(engineExposureSets);
  const rows = [];
  for (let i = 0; i < engines.length; i += 1) {
    for (let j = i + 1; j < engines.length; j += 1) {
      const left = engines[i];
      const right = engines[j];
      rows.push(enginePairSummary(left, right, enginePairComparison(left, right, engineSampleNames, engineSignatureNames), state.cutoff));
    }
  }
  return rows.sort((left, right) =>
    right.samples_below_cutoff - left.samples_below_cutoff ||
    right.top_signature_disagreements - left.top_signature_disagreements ||
    left.minimum_cosine - right.minimum_cosine
  );
}

function engineSampleRows(state) {
  return engineSampleNames.map((sample) => {
    const referenceExposure = engineExposureSets[state.reference]?.[sample];
    const referenceTop = engineTopExposure(referenceExposure);
    const comparisons = Object.keys(engineExposureSets)
      .filter((engine) => engine !== state.reference)
      .map((engine) => {
        const engineExposure = engineExposureSets[engine]?.[sample];
        const engineTop = engineTopExposure(engineExposure);
        return {
          engine,
          cosine: engineExposureCosine(referenceExposure, engineExposure, engineSignatureNames),
          engineTop,
          topMatch: referenceTop.signature === engineTop.signature
        };
      });
    const lowest = comparisons.reduce((current, row) => row.cosine < current.cosine ? row : current, comparisons[0]);
    const topDisagreements = comparisons.filter((row) => !row.topMatch);
    const belowCutoff = comparisons.filter((row) => row.cosine < state.cutoff);
    const competingTops = [...new Set([referenceTop.signature, ...topDisagreements.map((row) => row.engineTop.signature)].filter((value) => value !== "NA"))];
    const ambiguity = engineAmbiguityRowsRaw.find((candidate) => candidate.sample === sample);
    const needsReview = belowCutoff.length > 0 || topDisagreements.length > 0;
    return {
      sample,
      mutations: engineMutationBurdens[sample],
      reference_top: referenceTop.signature,
      lowest_engine: lowest?.engine || "",
      lowest_cosine: engineRound(lowest?.cosine ?? null, 4),
      engines_below_cutoff: belowCutoff.length,
      top_signature_disagreements: topDisagreements.length,
      competing_top_signatures: competingTops.join(", "),
      ambiguous_signatures: ambiguity?.high_ambiguity_signatures_in_compared_tops || "",
      review_action: needsReview
        ? (topDisagreements.length > 1 ? "Compare competing top signatures" : "Inspect exposure spread")
        : "No focused review",
      needs_review: needsReview
    };
  }).sort((left, right) =>
    Number(right.needs_review) - Number(left.needs_review) ||
    right.engines_below_cutoff - left.engines_below_cutoff ||
    right.top_signature_disagreements - left.top_signature_disagreements ||
    left.lowest_cosine - right.lowest_cosine ||
    right.mutations - left.mutations
  );
}

function engineFilteredSampleRows(state) {
  return engineSampleRows(state).filter((row) => row.needs_review);
}

function engineConcordanceRows(state) {
  if (state.lens === "pairwise") {
    return {
      rows: enginePairwiseRows(state),
      columns: [
        { key: "engine_a", label: "Engine A" },
        { key: "engine_b", label: "Engine B" },
        { key: "samples", label: "Samples" },
        { key: "mean_cosine", label: "Mean cosine" },
        { key: "minimum_cosine", label: "Minimum cosine" },
        { key: "samples_below_cutoff", label: "Below cutoff" },
        { key: "top_signature_disagreements", label: "Top-signature disagreements" },
        { key: "review_priority", label: "Priority" }
      ],
      title: "All pairwise engine concordance"
    };
  }

  if (state.lens === "sample") {
    return {
      rows: engineFilteredSampleRows(state),
      columns: [
        { key: "sample", label: "Sample" },
        { key: "mutations", label: "Mutations" },
        { key: "reference_top", label: "Reference top" },
        { key: "lowest_engine", label: "Lowest engine" },
        { key: "lowest_cosine", label: "Lowest cosine" },
        { key: "top_signature_disagreements", label: "Top disagreements" },
        { key: "competing_top_signatures", label: "Competing tops" }
      ],
      title: "Samples crossing the review threshold"
    };
  }

  return {
    rows: engineReferenceRows(state),
    columns: [
      { key: "engine", label: "Engine" },
      { key: "samples", label: "Samples" },
      { key: "mean_cosine_to_reference", label: "Mean cosine" },
      { key: "median_cosine_to_reference", label: "Median cosine" },
      { key: "minimum_cosine_to_reference", label: "Minimum cosine" },
      { key: "samples_below_cutoff", label: "Below cutoff" },
      { key: "top_signature_disagreements", label: "Top disagreements" },
      { key: "review_priority", label: "Priority" }
    ],
    title: `Engine concordance against ${state.reference}`
  };
}

function engineSelectedSampleComparisonRows(state) {
  const sample = state.sample || engineFilteredSampleRows(state)[0]?.sample || engineSampleNames[0];
  const referenceExposure = engineExposureSets[state.reference]?.[sample];
  const referenceTop = engineTopExposure(referenceExposure);
  return Object.keys(engineExposureSets)
    .filter((engine) => engine !== state.reference)
    .map((engine) => {
      const exposures = engineExposureSets[engine]?.[sample];
      const top = engineTopExposure(exposures);
      return {
        engine,
        exposure_cosine_to_reference: engineRound(engineExposureCosine(referenceExposure, exposures, engineSignatureNames), 4),
        reference_top: referenceTop.signature,
        engine_top: top.signature,
        engine_top_exposure: engineRound(top.exposure, 4),
        second_signature: top.secondSignature,
        second_exposure: engineRound(top.secondExposure, 4),
        review_flag: top.signature === referenceTop.signature ? "Top match" : "Top differs"
      };
    })
    .sort((left, right) =>
      (left.review_flag === "Top differs" ? -1 : 1) - (right.review_flag === "Top differs" ? -1 : 1) ||
      left.exposure_cosine_to_reference - right.exposure_cosine_to_reference
    );
}

function engineSelectedExposureRows(state) {
  const sample = state.sample || engineFilteredSampleRows(state)[0]?.sample || engineSampleNames[0];
  const engineNames = Object.keys(engineExposureSets);
  const signatureRows = engineSignatureNames.map((signature) => {
    const values = engineNames.map((engine) => engineExposureSets[engine]?.[sample]?.[signature] || 0);
    const maxExposure = Math.max(...values);
    const minExposure = Math.min(...values);
    const row = {
      signature,
      maximum_exposure: engineRound(maxExposure, 4),
      exposure_spread: engineRound(maxExposure - minExposure, 4)
    };
    for (const engine of engineNames) row[engine] = engineRound(engineExposureSets[engine]?.[sample]?.[signature] || 0, 4);
    return row;
  }).filter((row) => row.maximum_exposure >= state.minExposure);

  return signatureRows.sort((left, right) =>
    right.exposure_spread - left.exposure_spread ||
    right.maximum_exposure - left.maximum_exposure ||
    left.signature.localeCompare(right.signature)
  );
}

function engineSyncSampleOptions(state) {
  if (typeof engineSampleSelect === "undefined" || !engineSampleSelect) return state.sample;
  const reviewRows = engineFilteredSampleRows(state);
  const options = (reviewRows.length ? reviewRows : engineSampleRows(state)).map((row) => {
    const option = document.createElement("option");
    option.value = row.sample;
    option.textContent = row.needs_review
      ? `${row.sample} - ${row.lowest_cosine} min cosine`
      : row.sample;
    return option;
  });
  const previous = engineSampleSelect.value;
  engineSampleSelect.replaceChildren(...options);
  engineSampleSelect.value = options.some((option) => option.value === previous)
    ? previous
    : options[0]?.value || "";
  return engineSampleSelect.value;
}

function engineExportArtifacts(state) {
  const reviewRows = engineFilteredSampleRows(state);
  const sampleComparisonRows = engineSelectedSampleComparisonRows(state);
  const exposureRows = engineSelectedExposureRows(state);
  const concordance = engineConcordanceRows(state).rows;
  const compactState = {
    referenceEngine: state.reference,
    comparisonLens: state.lens,
    cosineCutoff: state.cutoff,
    minimumExposure: state.minExposure,
    selectedSample: state.sample,
    samples: engineSampleNames.length,
    signatures: engineSignatureNames,
    engineStatus: engineStatusRows,
    concordance,
    reviewRows,
    selectedSampleEngineComparison: sampleComparisonRows,
    selectedSampleExposures: exposureRows
  };

  if (state.exportScope === "current_sample") {
    return [
      { filename: "multi_engine_selected_sample_engine_comparison.csv", text: rowsToCsv(sampleComparisonRows), label: "Download selected-sample engine comparison CSV" },
      { filename: "multi_engine_selected_sample_exposures.csv", text: rowsToCsv(exposureRows), label: "Download selected-sample exposures CSV" },
      { filename: "multi_engine_selected_sample_state.json", type: "json", value: compactState, label: "Download selected-sample state JSON" }
    ];
  }

  if (state.exportScope === "all_triage") {
    return [
      { filename: "multi_engine_engine_status.csv", text: rowsToCsv(engineStatusRows), label: "Download engine status CSV" },
      { filename: "multi_engine_concordance.csv", text: rowsToCsv(concordance), label: "Download concordance CSV" },
      { filename: "multi_engine_review_samples.csv", text: rowsToCsv(engineSampleRows(state)), label: "Download all sample triage CSV" },
      { filename: "multi_engine_exposure_long.csv", text: rowsToCsv(engineExposureLongRows(engineExposureSets, engineSampleNames, engineSignatureNames)), label: "Download long-format exposures CSV" },
      { filename: "multi_engine_triage_state.json", type: "json", value: compactState, label: "Download triage state JSON" }
    ];
  }

  return [
    { filename: "multi_engine_engine_status.csv", text: rowsToCsv(engineStatusRows), label: "Download engine status CSV" },
    { filename: "multi_engine_concordance.csv", text: rowsToCsv(concordance), label: "Download concordance CSV" },
    { filename: "multi_engine_filtered_disagreements.csv", text: rowsToCsv(reviewRows), label: "Download filtered disagreements CSV" },
    { filename: "multi_engine_triage_state.json", type: "json", value: compactState, label: "Download triage state JSON" }
  ];
}

function engineRender() {
  const state = engineCurrentState();
  state.sample = engineSyncSampleOptions(state);
  const reviewRows = engineFilteredSampleRows(state);
  const concordance = engineConcordanceRows(state);
  const selectedRows = engineSelectedSampleComparisonRows(state);
  const selectedExposureRows = engineSelectedExposureRows(state);

  if (typeof engineMetricsHost !== "undefined" && engineMetricsHost) {
    engineMetricsHost.replaceChildren(metrics([
      { label: "Samples", value: engineSampleNames.length },
      { label: "Reference", value: state.reference },
      { label: "Cutoff", value: engineFormatDecimal(state.cutoff, 2) },
      { label: "Samples needing review", value: reviewRows.length }
    ]));
  }

  if (typeof engineStatusHost !== "undefined" && engineStatusHost) {
    const rows = engineStatusRows.map((row) => ({
      ...row,
      reference_role: row.engine === state.reference ? "Reference engine" : "Compared engine"
    }));
    engineStatusHost.replaceChildren(engineNotebookTable(rows, [
      { key: "engine", label: "Engine" },
      { key: "runtime", label: "Runtime or source" },
      { key: "samples", label: "Samples" },
      { key: "loaded_output", label: "Loaded output" },
      { key: "reference_role", label: "Role" }
    ], {
      title: "Engine sources",
      caption: "Separates browser-native refitting, imported package outputs, and optional browser package execution.",
      maxRows: rows.length
    }));
  }

  if (typeof engineConcordanceHost !== "undefined" && engineConcordanceHost) {
    engineConcordanceHost.replaceChildren(
      engineNotebookTable(concordance.rows, concordance.columns, {
        title: concordance.title,
        caption: "Cosine values compare exposure vectors after normalization. Rows crossing the cutoff or changing the top signature are review candidates.",
        maxRows: Math.min(24, Math.max(8, concordance.rows.length))
      })
    );
  }

  if (typeof engineReviewHost !== "undefined" && engineReviewHost) {
    engineReviewHost.replaceChildren(
      reviewRows.length
        ? engineNotebookTable(reviewRows, [
          { key: "sample", label: "Sample" },
          { key: "mutations", label: "Mutations" },
          { key: "reference_top", label: "Reference top" },
          { key: "lowest_engine", label: "Lowest engine" },
          { key: "lowest_cosine", label: "Lowest cosine" },
          { key: "engines_below_cutoff", label: "Below cutoff" },
          { key: "top_signature_disagreements", label: "Top disagreements" },
          { key: "competing_top_signatures", label: "Competing tops" },
          { key: "review_action", label: "Review action" }
        ], {
          title: "Samples needing interpretation",
          caption: "Rows are ranked by cutoff failures, top-signature disagreements, exposure-vector distance, and mutation burden.",
          maxRows: Math.min(18, reviewRows.length)
        })
        : enginePlaceholder("No samples cross the current disagreement threshold.")
    );
  }

  if (typeof engineSelectedHost !== "undefined" && engineSelectedHost) {
    engineSelectedHost.replaceChildren(
      engineNotebookTable(selectedRows, [
        { key: "engine", label: "Engine" },
        { key: "exposure_cosine_to_reference", label: "Cosine to reference" },
        { key: "reference_top", label: "Reference top" },
        { key: "engine_top", label: "Engine top" },
        { key: "engine_top_exposure", label: "Top exposure" },
        { key: "second_signature", label: "Second signature" },
        { key: "second_exposure", label: "Second exposure" },
        { key: "review_flag", label: "Flag" }
      ], {
        title: `Selected sample engine comparison: ${state.sample}`,
        caption: "Shows which engines change the dominant signature or move the exposure vector furthest from the selected reference.",
        maxRows: selectedRows.length
      }),
      engineNotebookTable(selectedExposureRows, [
        { key: "signature", label: "Signature" },
        ...Object.keys(engineExposureSets).map((engine) => ({ key: engine, label: engine })),
        { key: "maximum_exposure", label: "Maximum exposure" },
        { key: "exposure_spread", label: "Exposure spread" }
      ], {
        title: "Selected sample signature exposures",
        caption: "Filtered to signatures with at least one engine above the minimum exposure control.",
        maxRows: Math.min(20, selectedExposureRows.length)
      })
    );
  }

  if (typeof engineDownloadHost !== "undefined" && engineDownloadHost) {
    const selectedSample = typeof engineSampleSelect !== "undefined" ? engineSampleSelect.value : state.sample;
    engineDownloadHost.replaceChildren(downloadMany(engineExportArtifacts({ ...state, sample: selectedSample || state.sample })));
  }
}
</script>

<script type="text/markdown">
## Step 1. Fix the shared input and triage settings

Every engine is evaluated against the same spectra and the same reference-signature matrix. Change the controls before reviewing agreement: the selected reference engine defines the comparison baseline, the cosine cutoff defines a review threshold, and the minimum exposure cutoff controls which signatures appear in the selected-sample table.
</script>
<script type="module">
const [
  engineSpectrumRowsRaw,
  engineReferenceRowsRaw,
  engineRnnlsRowsRaw,
  engineDeconstructRowsRaw,
  engineSpaRowsRaw,
  engineMusicalRowsRaw,
  engineAmbiguityRowsRaw
] = await Promise.all([
  engineFetchCsv(`${engineDataBase}concordance_input_spectra.csv`),
  engineFetchCsv(`${engineDataBase}concordance_reference_signatures.csv`),
  engineFetchCsv(`${engineDataBase}r_nnls_exposures.csv`),
  engineFetchCsv(`${engineDataBase}deconstructsigs_exposures.csv`),
  engineFetchCsv(`${engineDataBase}sigprofilerassignment_exposures.csv`),
  engineFetchCsv(`${engineDataBase}musical_sparse_nnls_exposures.csv`),
  engineFetchCsv(`${engineDataBase}cross_tool_ambiguity_disagreement.csv`)
]);

const engineSpectra = engineMatrixFromRows(engineSpectrumRowsRaw, "sample");
const engineReferenceSignatures = engineMatrixFromRows(engineReferenceRowsRaw, "signature");
const engineSampleNames = Object.keys(engineSpectra);
const engineSignatureNames = Object.keys(engineReferenceSignatures);
const engineContextNames = Object.keys(engineSpectra[engineSampleNames[0]]);
const engineMutationBurdens = Object.fromEntries(
  engineSampleNames.map((sample) => [sample, engineSum(Object.values(engineSpectra[sample]))])
);

const engineMsiSdkLiveFit = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
  engineReferenceSignatures,
  engineSpectra,
  {
    contexts: engineContextNames,
    exposureThreshold: 0.01,
    exposureType: "relative",
    renormalize: true,
    includeFitDetails: true
  }
);

const engineMsiSdkLiveExposures = engineMsiSdkLiveFit?.exposures || engineMsiSdkLiveFit || {};
const engineRnnlsExposures = engineMatrixFromRows(engineRnnlsRowsRaw, "sample");
const engineDeconstructExposures = engineMatrixFromRows(engineDeconstructRowsRaw, "sample");
const engineSpaCachedExposures = engineMatrixFromRows(engineSpaRowsRaw, "sample");
const engineMusicalPackageExposures = engineMatrixFromRows(engineMusicalRowsRaw, "sample");

let engineSpaLiveResult = null;
let engineSpaLiveExposures = null;
let engineSpaLiveStatus = "Optional Pyodide run not requested";

if (engineRunSpaLive) {
  try {
    const spaSamples = engineSpaSampleLimit === "all"
      ? engineSampleNames
      : engineSampleNames.slice(0, Math.max(1, Number(engineSpaSampleLimit) || 5));
    const spaSpectra = Object.fromEntries(spaSamples.map((sample) => [sample, engineSpectra[sample]]));
    engineSpaLiveResult = await mSigSDK.adapters.sigProfilerAssignment.run(
      {
        spectra: spaSpectra,
        signatures: engineReferenceSignatures
      },
      {
        contexts: engineContextNames,
        genomeBuild: "GRCh37"
      }
    );
    engineSpaLiveExposures = engineSpaLiveResult.exposures || null;
    engineSpaLiveStatus = `Pyodide run completed for ${spaSamples.length} sample${spaSamples.length === 1 ? "" : "s"}`;
  } catch (error) {
    engineSpaLiveStatus = `Pyodide run failed: ${error.message}`;
  }
}

const engineExposureSets = {
  "mSigSDK live": engineMsiSdkLiveExposures,
  "R nnls": engineRnnlsExposures,
  "deconstructSigs": engineDeconstructExposures,
  "SigProfilerAssignment": engineSpaCachedExposures,
  "MuSiCal SparseNNLS": engineMusicalPackageExposures
};

if (engineSpaLiveExposures) {
  engineExposureSets["SigProfilerAssignment Pyodide"] = engineSpaLiveExposures;
}

const engineStatusRows = [
  {
    engine: "mSigSDK live",
    runtime: "Browser-native JavaScript refit",
    samples: Object.keys(engineMsiSdkLiveExposures).length,
    loaded_output: "Live refit from the shared spectra and reference catalog"
  },
  {
    engine: "R nnls",
    runtime: "Imported R package output",
    samples: Object.keys(engineRnnlsExposures).length,
    loaded_output: "Cached R 4.1.1 nnls exposure CSV"
  },
  {
    engine: "deconstructSigs",
    runtime: "Imported R package output",
    samples: Object.keys(engineDeconstructExposures).length,
    loaded_output: "Cached deconstructSigs v1.8.0 exposure CSV"
  },
  {
    engine: "SigProfilerAssignment",
    runtime: `Imported Python package output; ${engineSpaLiveStatus}`,
    samples: Object.keys(engineSpaCachedExposures).length,
    loaded_output: "Cached SigProfilerAssignment v1.1.3 exposure CSV"
  },
  {
    engine: "MuSiCal SparseNNLS",
    runtime: "Imported Python package output",
    samples: Object.keys(engineMusicalPackageExposures).length,
    loaded_output: "Cached Park Lab MuSiCal SparseNNLS exposure CSV"
  }
];

if (engineSpaLiveExposures) {
  engineStatusRows.push({
    engine: "SigProfilerAssignment Pyodide",
    runtime: "Optional browser Pyodide package run",
    samples: Object.keys(engineSpaLiveExposures).length,
    loaded_output: engineSpaLiveStatus
  });
}

const engineReferenceSelect = engineSelect(
  Object.keys(engineExposureSets).map((engine) => ({ value: engine, label: engine })),
  "mSigSDK live"
);
const engineLensSelect = engineSelect([
  { value: "reference", label: "All engines versus reference" },
  { value: "pairwise", label: "All pairwise comparisons" },
  { value: "sample", label: "Samples crossing the review threshold" }
], "reference");
const engineCosineCutoffInput = engineNumberInput(0.95, 0.01, 0, 1);
const engineMinExposureInput = engineNumberInput(0.01, 0.005, 0, 1);

const engineControls = document.createElement("section");
engineControls.className = "workflow-panel";
const engineControlGrid = document.createElement("div");
engineControlGrid.className = "workflow-control-grid compact";
engineControlGrid.append(
  engineField("Reference engine", engineReferenceSelect, "Engine used as the comparison baseline."),
  engineField("Comparison lens", engineLensSelect, "Controls the concordance table in Step 2."),
  engineField("Review cosine cutoff", engineCosineCutoffInput, "Samples below this exposure-vector cosine enter the review list."),
  engineField("Minimum shown exposure", engineMinExposureInput, "Signature exposures below this value are hidden in the selected-sample table.")
);

const engineMetricsHost = document.createElement("div");
const engineStatusHost = document.createElement("div");
engineStatusHost.className = "workflow-output-stack";
engineControls.append(engineControlGrid, engineMetricsHost, engineStatusHost);
display(engineControls);

for (const control of [engineReferenceSelect, engineLensSelect, engineCosineCutoffInput, engineMinExposureInput]) {
  control.addEventListener("change", engineRender);
  control.addEventListener("input", engineRender);
}

engineRender();
</script>

<script type="text/markdown">
## Step 2. Compare engine concordance

The concordance table updates from the selected reference engine and comparison lens. A high exposure cosine indicates that two engines returned similar exposure vectors. Top-signature disagreements are flagged separately because a similar vector can still change the dominant biological interpretation.
</script>
<script type="module">
const engineConcordancePanel = document.createElement("section");
engineConcordancePanel.className = "workflow-panel";
var engineConcordanceHost = document.createElement("div");
engineConcordanceHost.className = "workflow-output-stack";
engineConcordancePanel.append(engineConcordanceHost);
display(engineConcordancePanel);

engineRender();
</script>

<script type="text/markdown">

The review table ranks samples by cutoff failures, top-signature disagreements, and mutation burden. Select a sample to inspect which engine moved furthest from the reference and which signatures account for the difference.
</script>
<script type="module">

</script>

<script type="text/markdown">

Download the files that match the current review state. The filtered export preserves the engine status table, the active concordance table, the samples requiring interpretation, and the control values used to generate the view.
</script>

  { value: "filtered_review", label: "Filtered review set" },
  { value: "current_sample", label: "Selected sample only" },

], "filtered_review");
