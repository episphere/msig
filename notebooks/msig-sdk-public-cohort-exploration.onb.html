  <title>mSigSDK public cohort explorer</title>

  <script type="text/markdown">
    # Public cohort explorer

    The public cohort explorer lets a researcher choose a public dataset, load it into the SDK spectra shape, and visualize the cohort without caring whether the source is mSigPortal spectra or TCGA/GDC MAF-derived spectra.

    Use it to explore what public API data are available, pick a cohort or file set, and immediately review mutation burden, SBS96 profiles, sample similarity, cohort projection, clustering, optional signature exposures, and exportable handoff files.
  </script>

  <script type="module" pinned id="setup">
    const publicSdkUrl = new URL("../main.js?v=2026-05-15-gdc-context-fast-path", location.href).href;
    const { mSigSDK } = await import(publicSdkUrl);
    const {
      burdenSampleRows,
      metrics,
      note,
      table,
    } = mSigSDK.presentation;

    const PUBLIC_API_BASE = "https://analysistools.cancer.gov/mutational-signatures/api/";
    const PANCANCER_VALUE = "__pancancer__";
    const DEFAULT_SIGNATURE_SET = "COSMIC_v3_Signatures_GRCh37_SBS96";
    const DEFAULT_MSIGPORTAL_SAMPLES = 100;
    const MAX_MSIGPORTAL_SAMPLES = 100;

    const PUBLIC_ENDPOINTS = [
      {
        endpoint: "mutational_spectrum_options",
        sdk: "getMutationalSpectrumOptions",
        returns: "Available public spectrum samples.",
        purpose: "Populate study, cancer, assay, profile, matrix, and sample menus.",
      },
      {
        endpoint: "mutational_spectrum",
        sdk: "getMutationalSpectrumData",
        returns: "Long-form mutation counts.",
        purpose: "Load mSigPortal spectra into the shared visualization dataset.",
      },
      {
        endpoint: "mutational_signature_options",
        sdk: "getMutationalSignaturesOptions",
        returns: "Available reference catalogs.",
        purpose: "Find compatible signature sets for fitting and exposure plots.",
      },
      {
        endpoint: "mutational_signature",
        sdk: "getMutationalSignaturesData",
        returns: "Reference signature matrices.",
        purpose: "Fit the active cohort to signatures when contexts match.",
      },
      {
        endpoint: "GDC files",
        sdk: "TCGA.getMafInformationFromProjects",

        sdk: "TCGA.getVariantInformationFromMafFiles",
        returns: "Variant rows and MAF-derived spectra.",
        purpose: "Convert selected TCGA/GDC files into the same spectra shape.",

    ];

    const TCGA_PROJECT_PRESETS = [

      { label: "Lung adenocarcinoma: TCGA-LUAD", value: "TCGA-LUAD" },
      { label: "Lung squamous: TCGA-LUSC", value: "TCGA-LUSC" },
      { label: "Breast: TCGA-BRCA", value: "TCGA-BRCA" },
      { label: "Colorectal: TCGA-COAD + TCGA-READ", value: "TCGA-COAD, TCGA-READ" },
      { label: "Uterine: TCGA-UCEC + TCGA-UCS", value: "TCGA-UCEC, TCGA-UCS" },
      { label: "Kidney: TCGA-KIRC + TCGA-KIRP + TCGA-KICH", value: "TCGA-KIRC, TCGA-KIRP, TCGA-KICH" },
      { label: "Glioma: TCGA-GBM + TCGA-LGG", value: "TCGA-GBM, TCGA-LGG" },
      { label: "Melanoma: TCGA-SKCM", value: "TCGA-SKCM" },
      { label: "Liver: TCGA-LIHC", value: "TCGA-LIHC" },
      { label: "Ovary: TCGA-OV", value: "TCGA-OV" },
      { label: "Prostate: TCGA-PRAD", value: "TCGA-PRAD" },
    ];

    const TCGA_GENE_PRESETS = [
      { label: "TTN - ENSG00000155657", value: "ENSG00000155657" },
      { label: "TP53 - ENSG00000141510", value: "ENSG00000141510" },
      { label: "EGFR - ENSG00000146648", value: "ENSG00000146648" },
      { label: "KRAS - ENSG00000133703", value: "ENSG00000133703" },
      { label: "BRCA1 - ENSG00000012048", value: "ENSG00000012048" },
      { label: "BRCA2 - ENSG00000139618", value: "ENSG00000139618" },
      { label: "PIK3CA - ENSG00000121879", value: "ENSG00000121879" },

    display(metrics([
      { label: "Dataset sources", value: "mSigPortal plus TCGA/GDC" },

  <script type="text/markdown">
    ## Select a public dataset and visualize it

    Select the source first. mSigPortal datasets load spectra directly from the public mSigPortal API. TCGA/GDC datasets list public GDC MAF files, convert the selected files into SBS96 spectra, then use the same QC, plotting, fitting, and export workflow.
  </script>

  <script type="module" pinned id="public-cohort-workflow">
    function asRows(value) {
      return Array.isArray(value) ? value.flat(Infinity).filter(Boolean) : [];
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && value !== ""))]
        .sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true }));
    }

    function optionNode(label, value = label) {
      const option = document.createElement("option");
      option.textContent = String(label);
      option.value = String(value);
      return option;
    }

    function selectInput(options = []) {
      const node = document.createElement("select");
      node.replaceChildren(...options.map((option) => optionNode(option.label || option, option.value || option)));
      return node;
    }

    function input(value, type = "text", step = null) {
      const node = document.createElement("input");
      node.type = type;
      node.value = String(value);
      if (step !== null) node.step = String(step);
      if (type === "number") node.min = "0";
      return node;
    }

    function button(label, kind = "") {
      const node = document.createElement("button");
      node.type = "button";
      node.className = `workflow-button ${kind}`.trim();
      node.textContent = label;
      return node;
    }

    function field(label, control, help = "") {
      const wrapper = document.createElement("label");
      wrapper.className = "workflow-field";
      const title = document.createElement("span");
      title.textContent = label;
      wrapper.append(title, control);
      if (help) {
        const small = document.createElement("small");
        small.textContent = help;
        wrapper.append(small);
      }
      return wrapper;
    }

    function placeholder(text) {
      const node = document.createElement("div");
      node.className = "workflow-placeholder";
      node.textContent = text;
      return node;
    }

    function statusCard(title, message, mode = "idle") {
      const node = document.createElement("div");
      node.className = `workflow-status-card ${mode}`.trim();
      const dot = document.createElement("span");
      dot.className = "workflow-status-dot";
      const copy = document.createElement("div");
      const strong = document.createElement("strong");
      strong.textContent = title;
      const span = document.createElement("span");
      span.textContent = message;
      copy.append(strong, span);
      node.append(dot, copy);
      return node;
    }

    function gdcProgressMessage(event, selection) {
      const total = event.total || selection.maxFiles || 0;
      const completed = event.completed || 0;
      const progress = total ? `${completed}/${total} file(s)` : "selected file(s)";
      if (event.stage === "download") {
        return `Downloading ${event.project} MAF file ${event.fileIndex}/${event.files}. ${progress} complete.`;
      }
      if (event.stage === "parse") {
        return `Parsing ${event.project} MAF file ${event.fileIndex}/${event.files} and reading GDC sequence contexts. ${progress} complete.`;
      }
      if (event.stage === "file-complete") {
        return `Loaded ${event.project} MAF file ${event.fileIndex}/${event.files} with ${event.variants} variant row(s). ${progress} complete.`;
      }
      if (event.stage === "file-error") {
        return `Skipped one ${event.project} MAF file after a load error. ${progress} complete.`;
      }
      if (event.stage === "convert") {
        return `Converting ${event.variants} variant row(s) into SBS96 spectra using row-supplied contexts when available.`;
      }
      if (event.stage === "project-complete") {
        return `Converted ${event.project} into ${event.samples} sample spectrum/spectra. ${progress} complete.`;
      }
      if (event.stage === "complete") {
        return `Converted ${progress}. Rendering the shared visualization workflow next.`;
      }
      return `Preparing ${selection.projects.length} TCGA/GDC project(s) and up to ${selection.maxFiles} MAF file(s).`;
    }

    function parseNumber(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function clampNumberInput(control, { min = 0, max = Infinity, fallback = min } = {}) {
      const parsed = Math.round(parseNumber(control.value, fallback));
      const clamped = Math.max(min, Math.min(max, parsed));
      control.value = String(clamped);
      return clamped;
    }

    function clampNumberInputMax(control, max) {
      const parsed = Number(control.value);
      if (Number.isFinite(parsed) && parsed > max) {
        control.value = String(max);
      }
    }

    function parseList(value) {
      return String(value || "")
        .split(/[,\s]+/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function publicApiUrl(endpoint, params = {}) {
      const url = new URL(endpoint, PUBLIC_API_BASE);
      for (const [key, value] of Object.entries(params)) {
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      }
      return url;
    }

    async function fetchPublicApiRows(endpoint, params = {}, { limit = 200000, offset = 0 } = {}) {
      const url = publicApiUrl(endpoint, { ...params, limit, offset });
      const response = await fetch(url.href);
      if (!response.ok) {
        throw new Error(`${endpoint} returned ${response.status}`);
      }
      return asRows(await response.json());
    }

    function setSelectOptions(select, values, preferred = null) {
      const items = values.map((value) =>
        typeof value === "object" ? value : { label: value, value }
      );
      select.replaceChildren(...items.map((item) => optionNode(item.label, item.value)));
      const preferredValue = preferred == null ? null : String(preferred);
      if (preferredValue && items.some((item) => String(item.value) === preferredValue)) {
        select.value = preferredValue;
      } else if (items.length) {
        select.value = String(items[0].value);
      }
      return select.value;
    }

    function inferContexts(...matrices) {
      return uniqueSorted(
        matrices.flatMap((matrix) =>
          Object.values(matrix || {}).flatMap((record) => Object.keys(record || {}))
        )
      );
    }

    function alignMatrix(matrix, contexts) {
      return Object.fromEntries(
        Object.entries(matrix || {}).map(([sample, record]) => [
          sample,
          Object.fromEntries(contexts.map((context) => [context, Number(record?.[context] || 0)])),
        ])
      );
    }

    function contextSetsMatch(left, right) {
      const leftContexts = inferContexts(left);
      const rightContexts = inferContexts(right);
      return leftContexts.length === rightContexts.length &&
        leftContexts.every((context, index) => context === rightContexts[index]);
    }

    function matrixToApiRows(spectra, metadata, selection) {
      const metaBySample = new Map((metadata || []).map((row) => [row.sample, row]));
      return Object.entries(spectra || {}).flatMap(([sample, record]) => {
        const meta = metaBySample.get(sample) || {};
        return Object.entries(record || {}).map(([mutationType, mutations]) => ({
          sample,
          study: meta.study || selection.study,
          cancer: meta.cancer || meta.project || selection.cancer,
          strategy: meta.strategy || selection.strategy,
          profile: meta.profile || selection.profile,
          matrix: meta.matrix || selection.matrix,
          mutationType,
          mutations: Number(mutations || 0),
        }));
      });
    }

    function flattenObjectRows(object, childKey) {
      return Object.entries(object || {}).flatMap(([project, payload]) =>
        (payload?.[childKey] || []).map((row) => ({ project, ...row }))
      );
    }

    function gdcFileRows(result) {
      const rows = flattenObjectRows(result, "samples_description")
        .map((row) => ({
          ...row,
          project: row.project || row.project_id,
          file_id: row.file_id,
        }))
        .filter((row) => row.file_id);
      if (rows.length) return rows;
      return Object.entries(result || {}).flatMap(([project, payload]) =>
        (payload?.maf_files || []).map((file_id) => ({ project, file_id }))
      );
    }

    function isTumorPrimary(row) {
      const tissue = String(row.tissue_type || "").toLowerCase();
      const descriptor = String(row.tumor_descriptor || "").toLowerCase();
      return tissue.includes("tumor") || descriptor.includes("primary");
    }

    function selectGdcFiles(metadataResult, projects, maxFiles) {
      const subset = {};
      const selectedRows = [];
      let remaining = maxFiles;
      for (const project of projects) {
        if (remaining <= 0) break;
        const projectRows = gdcFileRows({ [project]: metadataResult[project] })
          .sort((left, right) => Number(isTumorPrimary(right)) - Number(isTumorPrimary(left)));
        const selectedProjectRows = projectRows.slice(0, remaining);
        if (selectedProjectRows.length) {
          subset[project] = {
            ...metadataResult[project],
            maf_files: selectedProjectRows.map((row) => row.file_id),
          };
          selectedRows.push(...selectedProjectRows.map((row) => ({ project, ...row })));
          remaining -= selectedProjectRows.length;
        }
      }
      return { subset, selectedRows };
    }

    async function plotCard(grid, title, renderer, fallback = null) {
      const section = document.createElement("section");
      section.className = "workflow-plot-section";
      const heading = document.createElement("h3");
      heading.textContent = title;
      const host = document.createElement("div");
      host.id = `public-${title.toLowerCase().replace(/[^a-z0-9]+/g, "-")}-${Math.random().toString(36).slice(2)}`;
      host.className = "workflow-plot-host";
      section.append(heading, host);
      grid.append(section);
      try {
        await renderer(host);
      } catch (error) {
        host.replaceChildren(fallback || placeholder(`Could not render ${title}: ${error.message}`));
      }
    }

    function exposureSignatureNames(exposures) {
      const firstRow = Object.values(exposures || {}).find((row) => row && typeof row === "object") || {};
      return Object.keys(firstRow).filter((key) => key !== "rnorm");
    }

    function readableSignatureTickSpec(labels, maxTickLabels = 24) {
      const uniqueLabels = Array.from(new Set((labels || []).filter((label) => label != null).map(String)));
      if (!uniqueLabels.length) return null;
      const step = Math.max(1, Math.ceil(uniqueLabels.length / maxTickLabels));
      const selectedLabels = uniqueLabels.filter((_, index) => index % step === 0 || index === uniqueLabels.length - 1);
      return {
        tickmode: "array",
        tickvals: selectedLabels,
        ticktext: selectedLabels,
      };
    }

    const explorerRoot = document.createElement("div");
    explorerRoot.className = "workflow-panel";

    const explorerHeader = document.createElement("div");
    explorerHeader.className = "workflow-panel-header";
    const explorerTitle = document.createElement("h3");
    explorerTitle.textContent = "Public dataset selector and cohort visualizer";
    const explorerLead = document.createElement("p");
    explorerLead.textContent = "Choose a public source and dataset once. The workflow normalizes the result into one active dataset, then generates the same QC, plots, exposures, and exports.";
    explorerHeader.append(explorerTitle, explorerLead);

    const controlsGrid = document.createElement("div");
    controlsGrid.className = "workflow-control-grid compact";
    const buttonRow = document.createElement("div");
    buttonRow.className = "workflow-button-row";
    const catalogOutput = document.createElement("div");
    catalogOutput.className = "workflow-output-stack";
    const activeOutput = document.createElement("div");
    activeOutput.className = "workflow-output-stack";
    const plotGrid = document.createElement("div");
    plotGrid.className = "workflow-plot-grid";
    const exportOutput = document.createElement("div");
    exportOutput.className = "workflow-output-stack";

    const sourceSelect = selectInput([
      { label: "mSigPortal public spectra", value: "msigportal" },
      { label: "TCGA/GDC MAF-derived spectra", value: "gdc-maf" },
    ]);
    const studySelect = selectInput([]);
    const cancerSelect = selectInput([]);
    const strategySelect = selectInput([]);
    const profileSelect = selectInput([]);
    const matrixSelect = selectInput([]);
    const maxSamplesInput = input(DEFAULT_MSIGPORTAL_SAMPLES, "number");
    maxSamplesInput.max = String(MAX_MSIGPORTAL_SAMPLES);
    const endpointSelect = selectInput(PUBLIC_ENDPOINTS.filter((row) => row.endpoint.startsWith("mutational_")).map((row) => row.endpoint));
    const endpointLimitInput = input(25, "number");
    const projectPresetSelect = selectInput(TCGA_PROJECT_PRESETS);
    const projectInput = input("TCGA-LUAD, TCGA-LUSC");
    const maxGdcFilesInput = input(1, "number");
    const genePresetSelect = selectInput(TCGA_GENE_PRESETS);
    const geneInput = input("ENSG00000155657");
    const signatureSetSelect = selectInput([]);
    const lowBurdenInput = input(50, "number");
    const exposureThresholdInput = input(0.01, "number", "0.01");

    const refreshCatalog = button("Refresh API catalog");
    const loadDataset = button("Load dataset and render visualizations", "primary");
    const previewSource = button("Preview selected source");

    const sourceField = field("Dataset source", sourceSelect);
    const msigPortalFields = [
      field("Study", studySelect),
      field("Cancer type or group", cancerSelect),
      field("Experimental strategy", strategySelect),
      field("Mutational profile", profileSelect),
      field("Matrix size", matrixSelect),
      field("Max mSigPortal samples", maxSamplesInput, `Maximum ${MAX_MSIGPORTAL_SAMPLES}. Keep this modest while exploring; increase after the cohort looks right.`),
      field("Endpoint preview", endpointSelect),
      field("Preview row limit", endpointLimitInput),
    ];
    const gdcFields = [
      field("TCGA project dropdown", projectPresetSelect, "Choose a common TCGA project or project group."),
      field("TCGA projects", projectInput, "Edit for custom comma- or space-separated GDC project IDs."),
      field("Max GDC MAF files", maxGdcFilesInput, "MAF conversion is slower than API spectra. Start small, then increase."),
      field("Gene dropdown", genePresetSelect, "Optional metadata discovery preset."),
      field("Ensembl gene IDs", geneInput, "Used by the GDC gene-to-project preview."),
    ];
    const sharedFields = [
      field("Reference signature set", signatureSetSelect),
      field("Low burden cutoff", lowBurdenInput),
      field("Exposure threshold", exposureThresholdInput),
    ];

    controlsGrid.append(sourceField, ...msigPortalFields, ...gdcFields, ...sharedFields);
    buttonRow.append(refreshCatalog, loadDataset, previewSource);
    explorerRoot.append(explorerHeader, controlsGrid, buttonRow, catalogOutput, activeOutput, plotGrid, exportOutput);
    display(explorerRoot);

    const publicExplorerState = {
      spectraOptions: [],
      signatureOptions: [],
      catalogLoaded: false,
      active: null,
    };

    function currentMSigPortalSelection() {
      return {
        study: studySelect.value,
        cancer: cancerSelect.value === PANCANCER_VALUE ? "PanCancer" : cancerSelect.value,
        strategy: strategySelect.value,
        profile: profileSelect.value,
        matrix: Number(matrixSelect.value),
        signatureSetName: signatureSetSelect.value,
      };
    }

    function currentGdcSelection() {
      const projects = parseList(projectInput.value);
      return {
        study: "TCGA/GDC",
        cancer: projects.join(", "),
        strategy: "WXS",
        signatureStrategy: "WES",
        profile: "SBS",
        matrix: 96,
        signatureSetName: signatureSetSelect.value,
        projects,
        genes: parseList(geneInput.value),
        maxFiles: Math.max(1, Math.min(50, Math.round(parseNumber(maxGdcFilesInput.value, 1)))),
      };
    }

    function selectedRows() {
      const matrix = Number(matrixSelect.value);
      return publicExplorerState.spectraOptions.filter((row) =>
        row.study === studySelect.value &&
        row.strategy === strategySelect.value &&
        row.profile === profileSelect.value &&
        Number(row.matrix) === matrix &&
        (cancerSelect.value === PANCANCER_VALUE || row.cancer === cancerSelect.value)
      );
    }

    function selectedSamples() {
      const bySample = new Map();
      for (const row of selectedRows()) {
        if (!bySample.has(row.sample)) bySample.set(row.sample, row);
      }
      return [...bySample.values()];
    }

    function populatePublicMenus(preferred = {}) {
      const current = {
        study: studySelect.value || preferred.study || "TCGA",
        strategy: strategySelect.value || preferred.strategy || "WES",
        profile: profileSelect.value || preferred.profile || "SBS",
        matrix: matrixSelect.value || preferred.matrix || "96",
        cancer: cancerSelect.value || preferred.cancer || PANCANCER_VALUE,
        signatureSetName: signatureSetSelect.value || preferred.signatureSetName || DEFAULT_SIGNATURE_SET,
      };

      const study = setSelectOptions(studySelect, uniqueSorted(publicExplorerState.spectraOptions.map((row) => row.study)), current.study);
      const studyRows = publicExplorerState.spectraOptions.filter((row) => row.study === study);
      const strategy = setSelectOptions(strategySelect, uniqueSorted(studyRows.map((row) => row.strategy)), current.strategy);
      const strategyRows = studyRows.filter((row) => row.strategy === strategy);
      const profile = setSelectOptions(profileSelect, uniqueSorted(strategyRows.map((row) => row.profile)), current.profile);
      const profileRows = strategyRows.filter((row) => row.profile === profile);
      const matrix = setSelectOptions(matrixSelect, uniqueSorted(profileRows.map((row) => row.matrix)), current.matrix);
      const matrixRows = profileRows.filter((row) => String(row.matrix) === String(matrix));
      const cancers = uniqueSorted(matrixRows.map((row) => row.cancer)).map((value) => ({ label: value, value }));
      if (study === "PCAWG" || study === "TCGA") {
        cancers.unshift({ label: "PanCancer (all cancer types)", value: PANCANCER_VALUE });
      }
      setSelectOptions(cancerSelect, cancers, current.cancer);
      populateSignatureSets({ strategy, profile, matrix, preferred: current.signatureSetName });
      updateCatalogStatus();
    }

    function populateSignatureSets({ strategy, profile, matrix, preferred = DEFAULT_SIGNATURE_SET }) {
      const exactRows = publicExplorerState.signatureOptions.filter((row) =>
        row.strategy === strategy &&
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const fallbackRows = publicExplorerState.signatureOptions.filter((row) =>
        row.profile === profile &&
        String(row.matrix) === String(matrix)
      );
      const rows = exactRows.length ? exactRows : fallbackRows;
      setSelectOptions(signatureSetSelect, uniqueSorted(rows.map((row) => row.signatureSetName)), preferred);
    }

    function updateSourceControls() {
      const isMSigPortal = sourceSelect.value === "msigportal";
      for (const node of msigPortalFields) node.hidden = !isMSigPortal;
      for (const node of gdcFields) node.hidden = isMSigPortal;
      endpointSelect.disabled = !isMSigPortal;
      endpointLimitInput.disabled = !isMSigPortal;
      if (!isMSigPortal && publicExplorerState.signatureOptions.length) {
        populateSignatureSets({
          strategy: "WES",
          profile: "SBS",
          matrix: 96,
          preferred: DEFAULT_SIGNATURE_SET,
        });
      }
      updateCatalogStatus();
    }

    function updateCatalogStatus() {
      const source = sourceSelect.value;
      if (source === "msigportal") {
        const samples = selectedSamples();
        catalogOutput.replaceChildren(statusCard(
          publicExplorerState.catalogLoaded ? "mSigPortal catalog loaded" : "mSigPortal catalog not loaded",
          publicExplorerState.catalogLoaded
            ? `${samples.length} samples match ${studySelect.value} ${cancerSelect.value === PANCANCER_VALUE ? "PanCancer" : cancerSelect.value} ${strategySelect.value} ${profileSelect.value}${matrixSelect.value}.`
            : "Refresh the API catalog to populate the menus.",
          publicExplorerState.catalogLoaded ? "ready" : "idle"
        ));
        return;
      }
      const selection = currentGdcSelection();
      catalogOutput.replaceChildren(statusCard(
        "TCGA/GDC source selected",
        selection.projects.length
          ? `${selection.projects.length} project(s) selected. Preview file metadata or load up to ${selection.maxFiles} MAF file(s) into the shared visualization workflow.`
          : "Choose at least one TCGA project.",
        selection.projects.length ? "ready" : "idle"
      ));
    }

    function renderCatalogSummary() {
      const cohortGroups = new Map();
      for (const row of publicExplorerState.spectraOptions) {
        const key = [row.study, row.cancer, row.strategy, row.profile, row.matrix].join("|");
        if (!cohortGroups.has(key)) {
          cohortGroups.set(key, {
            study: row.study,
            cancer: row.cancer,
            strategy: row.strategy,
            profile: row.profile,
            matrix: row.matrix,
            samples: new Set(),
          });
        }
        cohortGroups.get(key).samples.add(row.sample);
      }
      const cohortRows = [...cohortGroups.values()]
        .map((row) => ({ ...row, sampleCount: row.samples.size, samples: undefined }))
        .sort((left, right) =>
          String(left.study).localeCompare(String(right.study)) ||
          String(left.cancer).localeCompare(String(right.cancer)) ||
          String(left.strategy).localeCompare(String(right.strategy)) ||
          String(left.profile).localeCompare(String(right.profile)) ||
          Number(left.matrix) - Number(right.matrix)
        );

      const signatureGroups = new Map();
      for (const row of publicExplorerState.signatureOptions) {
        const key = [row.strategy, row.profile, row.matrix, row.signatureSetName].join("|");
        if (!signatureGroups.has(key)) {
          signatureGroups.set(key, {
            strategy: row.strategy,
            profile: row.profile,
            matrix: row.matrix,
            signatureSetName: row.signatureSetName,
            signatures: new Set(),
          });
        }
        signatureGroups.get(key).signatures.add(row.signatureName);
      }
      const signatureRows = [...signatureGroups.values()]
        .map((row) => ({ ...row, signatureCount: row.signatures.size, signatures: undefined }));

      catalogOutput.replaceChildren(
        metrics([
          { label: "Spectrum option rows", value: publicExplorerState.spectraOptions.length },
          { label: "Public cohorts", value: cohortRows.length },
          { label: "Reference catalogs", value: signatureRows.length },
          { label: "Active source", value: sourceSelect.selectedOptions[0]?.textContent || "" },
        ]),
        table(cohortRows, [
          { key: "study", label: "Study" },
          { key: "cancer", label: "Cancer/group" },
          { key: "strategy", label: "Strategy" },
          { key: "profile", label: "Profile" },
          { key: "matrix", label: "Matrix" },
          { key: "sampleCount", label: "Samples" },
        ], { title: "mSigPortal public cohorts", maxRows: 15 }),
        table(signatureRows, [
          { key: "strategy", label: "Strategy" },
          { key: "profile", label: "Profile" },
          { key: "matrix", label: "Matrix" },
          { key: "signatureSetName", label: "Signature set" },
          { key: "signatureCount", label: "Signatures" },
        ], { title: "Reference signature catalogs", maxRows: 10 })
      );
    }

    async function loadCatalog(preferred = {}) {
      refreshCatalog.disabled = true;
      loadDataset.disabled = true;
      catalogOutput.replaceChildren(statusCard("Loading public API catalog", "Fetching live mSigPortal spectrum and reference catalog options.", "running"));
      try {
        const [spectraOptions, signatureOptions] = await Promise.all([
          fetchPublicApiRows("mutational_spectrum_options"),
          fetchPublicApiRows("mutational_signature_options", { source: "Reference_signatures" }),
        ]);
        publicExplorerState.spectraOptions = spectraOptions;
        publicExplorerState.signatureOptions = signatureOptions;
        publicExplorerState.catalogLoaded = true;
        populatePublicMenus({
          study: "TCGA",
          cancer: PANCANCER_VALUE,
          strategy: "WES",
          profile: "SBS",
          matrix: "96",
          signatureSetName: DEFAULT_SIGNATURE_SET,
          ...preferred,
        });
        updateSourceControls();
        renderCatalogSummary();
      } catch (error) {
        catalogOutput.replaceChildren(statusCard("Could not load API catalog", error.message, "error"));
      } finally {
        refreshCatalog.disabled = false;
        loadDataset.disabled = false;
      }
    }

    function endpointParams(endpoint) {
      const selection = currentMSigPortalSelection();
      const cancer = selection.cancer === "PanCancer" ? "" : selection.cancer;
      if (endpoint === "mutational_spectrum_options") return {};
      if (endpoint === "mutational_signature_options") {
        return { source: "Reference_signatures", strategy: selection.strategy, profile: selection.profile };
      }
      if (endpoint === "mutational_signature") {
        return {
          source: "Reference_signatures",
          strategy: selection.strategy,
          profile: selection.profile,
          matrix: selection.matrix,
          signatureSetName: selection.signatureSetName,
        };
      }
      if (endpoint === "mutational_spectrum") {
        return {
          study: selection.study,
          strategy: selection.strategy,
          cancer,
          profile: selection.profile,
          matrix: selection.matrix,
        };
      }
      return {};
    }

    async function previewMSigPortalSource() {
      if (!publicExplorerState.catalogLoaded) await loadCatalog();
      const endpoint = endpointSelect.value;
      const limit = Math.max(1, Math.min(500, Math.round(parseNumber(endpointLimitInput.value, 25))));
      const params = endpointParams(endpoint);
      activeOutput.replaceChildren(statusCard("Previewing mSigPortal endpoint", `${endpoint} with the current selection filters.`, "running"));
      try {
        const rows = await fetchPublicApiRows(endpoint, params, { limit });
        activeOutput.replaceChildren(
          metrics([
            { label: "Data source", value: "mSigPortal" },
            { label: "Endpoint", value: endpoint },
            { label: "Rows returned", value: rows.length },
            { label: "Preview limit", value: limit },
          ]),
          table([{ url: publicApiUrl(endpoint, { ...params, limit, offset: 0 }).href }], [{ key: "url", label: "Request URL" }], { title: "API request" }),
          table(rows, null, { title: "Response preview", maxRows: Math.min(12, rows.length) })
        );
      } catch (error) {
        activeOutput.replaceChildren(statusCard("mSigPortal preview failed", error.message, "error"));
      }
    }

    async function previewGdcSource() {
      const selection = currentGdcSelection();
      if (!selection.projects.length) {
        activeOutput.replaceChildren(statusCard("Choose TCGA projects", "Enter at least one TCGA project ID before previewing GDC data.", "error"));
        return;
      }
      activeOutput.replaceChildren(statusCard("Previewing TCGA/GDC files", "Querying public GDC metadata for the selected project set.", "running"));
      try {
        const metadataResult = await mSigSDK.TCGA.getMafInformationFromProjects(selection.projects);
        const fileRows = gdcFileRows(metadataResult);
        let geneRows = [];
        if (selection.genes.length) {
          const geneResult = await mSigSDK.TCGA.getProjectsByGene(selection.genes);
          geneRows = Object.entries(geneResult.projects_by_gene || {}).flatMap(([gene, projects]) =>
            (projects || []).map((project) => ({ gene, project }))
          );
        }
        activeOutput.replaceChildren(
          metrics([
            { label: "Data source", value: "TCGA/GDC" },
            { label: "Projects queried", value: selection.projects.length },
            { label: "MAF files found", value: fileRows.length },
            { label: "Max files to convert", value: selection.maxFiles },
          ]),
          table(fileRows, [
            { key: "project", label: "Project" },
            { key: "case_submitter_id", label: "Case" },
            { key: "gender", label: "Gender" },
            { key: "race", label: "Race" },
            { key: "age_at_diagnosis", label: "Age at diagnosis" },
            { key: "tissue_type", label: "Tissue" },
            { key: "tumor_descriptor", label: "Tumor descriptor" },
            { key: "file_id", label: "MAF file ID" },
          ], { title: "GDC masked somatic mutation files", maxRows: 20 }),
          table(geneRows, [
            { key: "gene", label: "Gene" },
            { key: "project", label: "Project" },
          ], { title: "Projects containing selected genes", maxRows: 20 }),
          downloadMany([
            {
              filename: "tcga_gdc_maf_file_metadata.json",
              type: "json",
              value: metadataResult,
              label: "Download GDC MAF metadata JSON",
            },
            {
              filename: "tcga_gdc_maf_file_metadata.csv",
              text: rowsToCsv(fileRows),
              label: "Download GDC MAF metadata CSV",
            },
          ])
        );
      } catch (error) {
        activeOutput.replaceChildren(statusCard("TCGA/GDC preview failed", error.message, "error"));
      }
    }

    async function previewSelectedSource() {
      if (sourceSelect.value === "gdc-maf") {
        await previewGdcSource();
      } else {
        await previewMSigPortalSource();
      }
    }

    async function loadReferenceSignatures(selection) {
      if (!selection.signatureSetName) return { signatureRows: [], signatures: {} };
      const strategies = [...new Set([
        selection.signatureStrategy || selection.strategy,
        selection.strategy === "WXS" ? "WES" : null,
        "WGS",
      ].filter(Boolean))];
      for (const strategy of strategies) {
        const signatureRows = asRows(await mSigSDK.mSigPortal.mSigPortalData.getMutationalSignaturesData(
          strategy,
          selection.signatureSetName,
          selection.profile,
          selection.matrix,
          10000
        ));
        if (signatureRows.length) {
          return {
            signatureRows,
            signatures: mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(signatureRows, "signatureName"),
          };
        }
      }
      return { signatureRows: [], signatures: {} };
    }

    async function activateDataset({
      source,
      selection,
      spectra,
      metadata,
      rawRows = null,
      variantRows = [],
      extraDownloads = [],
    }) {
      if (!spectra || !Object.keys(spectra).length) {
        throw new Error("The selected dataset did not produce any spectra.");
      }
      const normalizedRawRows = rawRows || matrixToApiRows(spectra, metadata, selection);
      const { signatureRows, signatures } = await loadReferenceSignatures(selection);
      const contexts = inferContexts(spectra);
      const lowBurdenThreshold = Math.round(parseNumber(lowBurdenInput.value, 50));
      const validation = mSigSDK.validation.validateSpectra(spectra, {
        expectedContexts: contexts,
        minTotalMutations: lowBurdenThreshold,
      });
      const burden = mSigSDK.qc.summarizeMutationBurden(spectra, {
        expectedContexts: contexts,
        lowBurdenThresholdMode: "fixed",
        lowBurdenThreshold,
      });

      let exposures = null;
      let exposureNote = null;
      if (Object.keys(signatures || {}).length && contextSetsMatch(spectra, signatures)) {
        try {
          const alignedContexts = inferContexts(spectra, signatures);
          exposures = await mSigSDK.signatureFitting.fitMutationalSpectraToSignatures(
            alignMatrix(signatures, alignedContexts),
            alignMatrix(spectra, alignedContexts),
            {
              exposureThreshold: parseNumber(exposureThresholdInput.value, 0.01),
              exposureType: "relative",
              renormalize: true,
            }
          );
        } catch (error) {
          exposureNote = note(`Reference-signature fitting was skipped: ${error.message}`, "warning");
        }
      } else {
        exposureNote = note("Reference-signature fitting was skipped because the selected spectra and signature catalog do not share the same mutation contexts.", "warning");
      }

      publicExplorerState.active = {
        source,
        selection,
        spectra,
        metadata,
        rawRows: normalizedRawRows,
        variantRows,
        signatureRows,
        signatures,
        contexts,
        validation,
        burden,
        exposures,
        exposureNote,
        extraDownloads,
      };

      await renderActiveSummary();
      await renderActivePlots();
    }

    async function renderActiveSummary() {
      const active = publicExplorerState.active;
      if (!active) return;
      const issueRows = (active.validation.issues || []).map((issue) => ({
        sample: issue.sample || "matrix",
        code: issue.code || issue.type || "validation_issue",
        message: issue.message || String(issue),
      }));
      activeOutput.replaceChildren(
        metrics([
          { label: "Active source", value: active.source },
          { label: "Samples loaded", value: Object.keys(active.spectra).length },
          { label: "Contexts", value: active.contexts.length },
          { label: "Raw spectrum rows", value: active.rawRows.length },
          { label: "Variant rows", value: active.variantRows.length },
          { label: "Reference signatures", value: Object.keys(active.signatures || {}).length },
          { label: "Input check", value: active.validation.valid ? "Pass" : "Review" },
          { label: "Fitted exposures", value: active.exposures ? "Rendered" : "Skipped" },
        ]),
        table(active.metadata, [
          { key: "sample", label: "Sample" },
          { key: "study", label: "Study" },
          { key: "cancer", label: "Cancer/group" },
          { key: "strategy", label: "Strategy" },
          { key: "profile", label: "Profile" },
          { key: "matrix", label: "Matrix" },
          { key: "source", label: "Source" },
        ], { title: "Loaded samples", maxRows: 15 }),
        table(burdenSampleRows(active.burden), undefined, { title: "Mutation burden review", maxRows: 15 }),
        table(issueRows, [
          { key: "sample", label: "Sample" },
          { key: "code", label: "Issue" },
          { key: "message", label: "Message" },
        ], { title: "Validation issues", maxRows: 8 }),
        active.exposureNote || note("Reference-signature fitting completed for the active dataset.", "success")
      );
    }

    async function renderActivePlots() {
      const active = publicExplorerState.active;
      plotGrid.replaceChildren();
      exportOutput.replaceChildren();
      const sampleNames = Object.keys(active.spectra);
      const label = `${active.selection.study} ${active.selection.cancer} ${active.selection.strategy} ${active.selection.profile}${active.selection.matrix}`;
      const profileSpectra = Object.fromEntries(sampleNames.slice(0, Math.min(2, sampleNames.length)).map((sample) => [sample, active.spectra[sample]]));

      await plotCard(plotGrid, "Mutation burden", (host) =>
        mSigSDK.qcPlots.plotMutationBurdenSummary(host, active.burden),
        table(burdenSampleRows(active.burden), undefined, { maxRows: 12 })
      );

      await plotCard(plotGrid, "Mutational profile", (host) =>
        mSigSDK.mSigPortal.mSigPortalPlots.plotPatientMutationalSpectrum(profileSpectra, host.id)
      );

      if (sampleNames.length >= 2) {
        await plotCard(plotGrid, "Cosine similarity", (host) =>
          mSigSDK.mSigPortal.mSigPortalPlots.plotCosineSimilarityHeatMap(
            active.spectra,
            active.selection.study,
            active.selection.strategy,
            active.selection.cancer,
            host,
            true,
            "Viridis",
            false
          )
        );
      }

      if (sampleNames.length >= 3) {
        await plotCard(plotGrid, "UMAP cohort projection", (host) =>
          mSigSDK.mSigPortal.mSigPortalPlots.plotUMAPVisualization(
            active.spectra,
            label,
            host.id,
            sampleNames.length >= 4 ? 3 : 2,
            0.1,
            Math.max(2, Math.min(15, sampleNames.length - 1))
          )
        );

        await plotCard(plotGrid, "Force-directed similarity tree", (host) =>
          mSigSDK.mSigPortal.mSigPortalPlots.plotForceDirectedTree(
            active.spectra,
            active.selection.study,
            active.selection.strategy,
            active.selection.cancer,
            host.id
          )
        );
      }

      await plotCard(plotGrid, "Burden by cohort group", (host) =>
        mSigSDK.mSigPortal.mSigPortalPlots.plotProjectMutationalBurdenByCancerType(active.rawRows, host.id)
      );

      if (active.exposures) {
        await plotCard(plotGrid, "Full-COSMIC cohort exposure landscape", (host) =>
          mSigSDK.qcPlots.plotCohortSignatureSummary(host, {
            spectra: active.spectra,
            exposures: active.exposures,
            metadata: active.metadata,
            signatureNames: Object.keys(active.signatures || {}),
            dataset: label,
            signatureCatalog: active.selection.signatureSetName,
          }, {
            topN: 12,
            exposureThreshold: parseNumber(exposureThresholdInput.value, 0.01),
            title: "Full-COSMIC cohort exposure landscape",
            subtitle: "Full reference-catalog fit; display summarizes the top 12 cohort signatures plus Other.",
            publication: {
              compact: true,
              rowHeight: 17,
              cellWidth: 56,
              maxWidth: "100%",
            },
          })
        );
      }

      const downloads = [
        {
          filename: "selected_public_dataset_spectra.tsv",
          text: spectraMatrixToTsv(active.spectra, active.contexts),
          label: "Download spectra TSV",
        },
        {
          filename: "selected_public_dataset_metadata.csv",
          text: rowsToCsv(active.metadata),
          label: "Download sample metadata CSV",
        },
        {
          filename: "selected_public_dataset_spectrum_rows.json",
          type: "json",
          value: active.rawRows,
          label: "Download spectrum rows JSON",
        },
        {
          filename: "selected_public_dataset_qc.json",
          type: "json",
          value: {
            selection: active.selection,
            validation: active.validation,
            burden: active.burden,
            contexts: active.contexts,
          },
          label: "Download QC JSON",
        },
      ];
      if (active.exposures) {
        downloads.push({
          filename: "selected_public_dataset_fitted_exposures.csv",
          text: rowsToCsv(Object.entries(active.exposures).flatMap(([sample, exposures]) =>
            Object.entries(exposures).map(([signature, exposure]) => ({ sample, signature, exposure }))
          )),
          label: "Download fitted exposures CSV",
        });
      }
      downloads.push(...active.extraDownloads);
      exportOutput.append(downloadMany(downloads));
    }

    async function loadMSigPortalDataset() {
      if (!publicExplorerState.catalogLoaded) await loadCatalog();
      const sampleLimit = clampNumberInput(maxSamplesInput, {
        min: 1,
        max: MAX_MSIGPORTAL_SAMPLES,
        fallback: DEFAULT_MSIGPORTAL_SAMPLES,
      });
      const samples = selectedSamples().slice(0, sampleLimit);
      if (!samples.length) {
        throw new Error("No samples match the selected mSigPortal filters.");
      }
      const selection = {
        ...currentMSigPortalSelection(),
        sampleCount: samples.length,
      };
      activeOutput.replaceChildren(statusCard("Loading mSigPortal public spectra", `Fetching ${samples.length} sample-level spectra and rendering the shared visualization workflow.`, "running"));
      plotGrid.replaceChildren();
      exportOutput.replaceChildren();

      const spectrumGroups = await Promise.all(samples.map((sample) =>
        mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
          sample.study,
          [sample.sample],
          sample.strategy,
          sample.cancer,
          sample.profile,
          sample.matrix
        )
      ));
      const rawRows = asRows(spectrumGroups);
      const spectra = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(rawRows);
      const metadata = samples.map((sample) => ({
        sample: sample.sample,
        study: sample.study,
        cancer: sample.cancer,
        strategy: sample.strategy,
        profile: sample.profile,
        matrix: sample.matrix,
        source: "mSigPortal API",
      })).filter((row) => spectra[row.sample]);

      await activateDataset({
        source: `mSigPortal public API: ${selection.study} ${selection.cancer} ${selection.strategy} ${selection.profile}${selection.matrix}`,
        selection,
        spectra,
        metadata,
        rawRows,
      });
    }

    async function loadGdcDataset() {
      const selection = currentGdcSelection();
      if (!selection.projects.length) {
        throw new Error("Enter at least one TCGA project ID.");
      }
      activeOutput.replaceChildren(statusCard(
        "Loading TCGA/GDC MAF-derived spectra",
        `Fetching GDC MAF metadata, converting up to ${selection.maxFiles} file(s), then rendering the shared visualization workflow.`,
        "running"
      ));
      plotGrid.replaceChildren();
      exportOutput.replaceChildren();

      const metadataResult = await mSigSDK.TCGA.getMafInformationFromProjects(selection.projects);
      const { subset, selectedRows } = selectGdcFiles(metadataResult, selection.projects, selection.maxFiles);
      if (!selectedRows.length) {
        throw new Error("No public GDC MAF files were found for the selected TCGA projects.");
      }
      activeOutput.replaceChildren(statusCard(
        "Loading TCGA/GDC MAF-derived spectra",
        `Selected ${selectedRows.length} GDC MAF file(s). Downloading and converting with the SDK context fast path.`,
        "running"
      ));
      const variantResult = await mSigSDK.TCGA.getVariantInformationFromMafFiles(subset, {
        fileConcurrency: Math.min(4, selectedRows.length),
        includeVariantInformation: true,
        onProgress: (event) => {
          activeOutput.replaceChildren(statusCard(
            "Loading TCGA/GDC MAF-derived spectra",
            gdcProgressMessage(event, selection),
            "running"
          ));
        },
      });
      activeOutput.replaceChildren(statusCard(
        "Rendering TCGA/GDC visualizations",
        "Building QC summaries, plots, exposure fits, and exports from the converted spectra.",
        "running"
      ));
      const fileMetadata = new Map(selectedRows.map((row) => [row.file_id, row]));
      const spectra = {};
      const metadata = [];
      const variantRows = [];

      for (const [project, payload] of Object.entries(variantResult || {})) {
        variantRows.push(...(payload.variant_information || []));
        for (const [fileId, record] of Object.entries(payload.mutational_spectra || {})) {
          const fileRow = fileMetadata.get(fileId) || {};
          const baseSample = fileRow.case_submitter_id || fileRow.case_id || fileId;
          let sample = baseSample;
          let suffix = 2;
          while (spectra[sample]) {
            sample = `${baseSample}_${suffix}`;
            suffix += 1;
          }
          spectra[sample] = record;
          metadata.push({
            sample,
            study: "TCGA/GDC",
            cancer: project,
            project,
            strategy: "WXS",
            profile: "SBS",
            matrix: 96,
            source: "GDC MAF",
            case_submitter_id: fileRow.case_submitter_id || "",
            file_id: fileId,
            tissue_type: fileRow.tissue_type || "",
            tumor_descriptor: fileRow.tumor_descriptor || "",
            gender: fileRow.gender || "",
            race: fileRow.race || "",
          });
        }
      }

      await activateDataset({
        source: `TCGA/GDC MAF-derived spectra: ${selection.projects.join(", ")}`,
        selection: {
          ...selection,
          sampleCount: Object.keys(spectra).length,
        },
        spectra,
        metadata,
        rawRows: matrixToApiRows(spectra, metadata, selection),
        variantRows,
        extraDownloads: [
          {
            filename: "tcga_gdc_selected_maf_files.csv",
            text: rowsToCsv(selectedRows),
            label: "Download selected GDC MAF files CSV",
          },
          {
            filename: "tcga_gdc_variant_rows.json",
            type: "json",
            value: variantRows,
            label: "Download GDC variant rows JSON",
          },
        ],
      });
    }

    async function loadSelectedDataset() {
      if (sourceSelect.value === "gdc-maf") {
        await loadGdcDataset();
      } else {
        await loadMSigPortalDataset();
      }
    }

    sourceSelect.addEventListener("change", updateSourceControls);
    projectPresetSelect.addEventListener("change", () => {
      projectInput.value = projectPresetSelect.value;
      updateCatalogStatus();
    });
    projectInput.addEventListener("input", updateCatalogStatus);
    maxGdcFilesInput.addEventListener("input", updateCatalogStatus);
    genePresetSelect.addEventListener("change", () => {
      geneInput.value = genePresetSelect.value;
    });
    for (const select of [studySelect, cancerSelect, strategySelect, profileSelect, matrixSelect]) {
      select.addEventListener("change", () => populatePublicMenus());
    }
    signatureSetSelect.addEventListener("change", updateCatalogStatus);
    maxSamplesInput.addEventListener("input", () => {
      clampNumberInputMax(maxSamplesInput, MAX_MSIGPORTAL_SAMPLES);
      updateCatalogStatus();
    });
    maxSamplesInput.addEventListener("change", () => {
      clampNumberInput(maxSamplesInput, {
        min: 1,
        max: MAX_MSIGPORTAL_SAMPLES,
        fallback: DEFAULT_MSIGPORTAL_SAMPLES,
      });
      updateCatalogStatus();
    });
    refreshCatalog.addEventListener("click", () => loadCatalog());
    previewSource.addEventListener("click", previewSelectedSource);
    loadDataset.addEventListener("click", async () => {
      loadDataset.disabled = true;
      const original = loadDataset.textContent;
      loadDataset.textContent = "Loading...";
      try {
        await loadSelectedDataset();
      } catch (error) {
        activeOutput.replaceChildren(statusCard("Could not load dataset", error.message, "error"));
      } finally {
        loadDataset.disabled = false;
        loadDataset.textContent = original;
      }
    });

    window.publicCohortExplorer = {
      state: publicExplorerState,
      loadCatalog,
      loadMSigPortalDataset,
      loadGdcDataset,
      loadSelectedDataset,
    };

    catalogOutput.replaceChildren(placeholder("Loading public API catalog..."));
    updateSourceControls();
    await loadCatalog();
  </script>
