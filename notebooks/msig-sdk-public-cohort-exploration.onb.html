  <title>mSigSDK public cohort exploration</title>

  <script type="text/markdown">
    # Public cohort exploration

    A signature analysis should start by understanding the spectra before fitting any signature contributions. This workflow loads public SBS96 spectra when mSigPortal is reachable, falls back to embedded SBS96 tables when offline, and inspects mutation counts, context coverage, similarity structure, input issues, and tables ready for downstream workflows.

    Use this notebook as the first pass on a cohort. The questions are simple: do the samples have enough mutations, do the spectra look valid, are there obvious outliers or duplicated profiles, and is the table ready for known-signature fitting, uncertainty analysis, or multi-tool comparison?
  </script>

  <script type="module" pinned id="1">
    const cohortSdkUrl = new URL("../main.js?v=2026-05-14-public-cohort", location.href).href;
    const { mSigSDK } = await import(cohortSdkUrl);
    const {
      demoMetadata,
      demoSpectra,
      sbs96Contexts,
    } = await import("./msig-notebook-fixtures.js");
    const { burdenSampleRows, metrics, note, table } = mSigSDK.presentation;

    const cohortContexts = sbs96Contexts();
    const cohortSamples = [
      "SP53810",
      "SP55142",
      "SP55235",
      "SP54113",
      "SP50611",
      "SP50592",
      "SP50406",
      "SP55004",
    ];
    const cohortSettings = {
      study: "PCAWG",
      genomeDataType: "WGS",
      cancerType: "Lung-AdenoCA",
      mutationType: "SBS",
      matrixSize: 96,
      lowBurdenThreshold: 500,
    };

    async function loadCohortSpectra() {
      const rows = (await mSigSDK.mSigPortal.mSigPortalData.getMutationalSpectrumData(
        cohortSettings.study,
        cohortSamples,
        cohortSettings.genomeDataType,
        cohortSettings.cancerType,
        cohortSettings.mutationType,
        cohortSettings.matrixSize
      )).flat();
      const spectra = mSigSDK.mSigPortal.mSigPortalData.extractMutationalSpectra(rows);
      if (Object.keys(spectra).length < 2) {
        throw new Error("mSigPortal returned too few spectra.");
      }
      return {
        spectra,
        metadata: cohortSamples.map((sample) => ({
          sample,
          cohort: cohortSettings.cancerType,
          assay: cohortSettings.genomeDataType,
          source: "mSigPortal",
        })),
        sourceStatus: "live mSigPortal",
      };
    }

    let cohortData;
    try {
      cohortData = await loadCohortSpectra();
    } catch (error) {
      cohortData = {
        spectra: demoSpectra(),
        metadata: demoMetadata,
        sourceStatus: `embedded fallback: ${error.message}`,
      };
    }

    const cohortSpectra = cohortData.spectra;
    const cohortMetadata = cohortData.metadata;
    const cohortSelectedSamples = Object.keys(cohortSpectra);
    const cohortBurden = mSigSDK.qc.summarizeMutationBurden(cohortSpectra, {
      expectedContexts: cohortContexts,
      lowBurdenThresholdMode: "fixed",
      lowBurdenThreshold: cohortSettings.lowBurdenThreshold,
    });
    const cohortValidation = mSigSDK.validation.validateSpectra(cohortSpectra, {
      expectedContexts: cohortContexts,
      minTotalMutations: cohortSettings.lowBurdenThreshold,
    });

    display(metrics([
      { label: "Data source", value: cohortData.sourceStatus },
      { label: "Samples", value: cohortSelectedSamples.length },
      { label: "Table type", value: "SBS96" },
      { label: "Input check", value: cohortValidation.valid ? "Pass" : "Review" },
    ]));
    if (!cohortValidation.valid) {
      display(note("Input issues are shown below and should be resolved before fitting signatures.", "warning"));
    }
  </script>

  <script type="text/markdown">
    ## Step 1. Review mutation counts, sample details, and input checks

    The first table describes what was loaded and whether the fallback path was used. The mutation-count and input-check outputs tell whether each spectrum contains enough signal and has the expected SBS96 context structure.

    Do not move directly to fitting if this section shows low mutation counts, missing contexts, or unexpected sample details. Those issues should be resolved or carried as caveats before signature contribution estimates are interpreted.
  </script>

  <script type="module" pinned id="interactive-step-1">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "public-cohort", step: 1, phase: "analysis", title: "Step 1. Review mutation counts, sample details, and input checks", mSigSDK, display });
  </script>

  <script type="module" pinned id="2">
    const cohortIssueRows = (cohortValidation.issues || []).map((issue) => ({
      sample: issue.sample || "matrix",
      code: issue.code || issue.type || "validation_issue",
      message: issue.message || String(issue),
    }));

    display(table(
      burdenSampleRows(cohortBurden, cohortSelectedSamples),
      [
        { key: "sample", label: "Sample" },
        { key: "mutations", label: "Mutations" },
        { key: "nonZeroContexts", label: "Nonzero SBS96 contexts" },
        { key: "lowBurden", label: "Low mutation-count review cue" },
      ],
      { maxRows: 12 }
    ));
    display(table(
      cohortMetadata,
      [
        { key: "sample", label: "Sample" },
        { key: "cohort", label: "Cohort/group" },
        { key: "group", label: "Fixture group" },
        { key: "assay", label: "Assay" },
        { key: "source", label: "Source" },
      ],
      { maxRows: 12 }
    ));
    display(table(
      cohortIssueRows,
      [
        { key: "sample", label: "Sample" },
        { key: "code", label: "Issue code" },
        { key: "message", label: "Message" },
      ],
      { maxRows: 8 }
    ));
  </script>

  <script type="text/markdown">
    ## Step 2. Plot burden and similarity structure

    These plots are input checks. They identify low-information spectra, duplicated or nearly identical profiles, and obvious sample structure before fitted exposures are introduced.

    Use the plots to decide whether the cohort should be analyzed together, stratified, filtered, or inspected manually before fitting.
  </script>

  <script type="module" pinned id="interactive-step-2">
    (await import("./msig-notebook-interactive.js?v=2026-05-15-stepwise")).renderInteractiveStep({ mode: "public-cohort", step: 2, phase: "visualize", title: "Step 2. Plot burden and similarity structure", mSigSDK, display });
  </script>

  <script type="module" pinned id="3">
    const cohortBurdenDiv = document.createElement("div");
    cohortBurdenDiv.style.width = "100%";
    display(cohortBurdenDiv);
    await mSigSDK.qcPlots.plotMutationBurdenSummary(cohortBurdenDiv, cohortBurden);

    const cohortHeatmapDiv = document.createElement("div");
    cohortHeatmapDiv.style.width = "100%";
    display(cohortHeatmapDiv);
    await mSigSDK.mSigPortal.mSigPortalPlots.plotCosineSimilarityHeatMap(
      cohortSpectra,
      cohortSettings.study,
      cohortSettings.genomeDataType,
      cohortSettings.cancerType,
      cohortHeatmapDiv,
      true,
      "Viridis",
      false
    );
  </script>
