<!doctype html>
<notebook theme="air">
  <title>mSigSDK experimental sandbox</title>

  <script type="text/markdown">
    # Experimental sandbox

    Screen variant rows for localized mutagenesis candidates, then keep the exploratory status, warnings, and validation requirements attached to every output.
  </script>

  <script type="module" pinned id="localized-mutagenesis-sandbox">
    const sandboxSdkUrl = new URL("../main.js?v=2026-05-20-experimental-sandbox", location.href).href;
    const { mSigSDK } = await import(sandboxSdkUrl);
    const { loadPublicMafRows } = await import("./msig-notebook-fixtures.js");
    const {
      metrics,
      note,
      table,
    } = mSigSDK.presentation;

    const state = {
      source: "No data loaded",
      variants: [],
      result: null,
      parameters: {
        genomeBuild: "GRCh37",
        maxIntermutationDistance: 700,
        minMutations: 3,
        minBurdenForLocalizedAnalysis: 3,
        clusterSignificanceThreshold: 0.05,
      },
    };

    const roadmapRows = [
      { check: "Input source", requirement: "Confirm chromosome, position, genome build, and context labels against a pinned variant file." },
      { check: "Null model", requirement: "Replace the descriptive distance rule with an assay-specific background model before inferential reporting." },
      { check: "Focal spectrum", requirement: "Compare focal contexts against matched genomic background and sequencing technical-effect filters." },
      { check: "External benchmark", requirement: "Benchmark candidate foci against localized-mutagenesis datasets before interpreting mechanism." },
      { check: "Reporting", requirement: "Keep experimental status, warnings, and required follow-up visible beside exported candidate regions." },
    ];

    const root = document.createElement("section");
    root.className = "localized-sandbox";

    const style = document.createElement("style");
    style.textContent = `
      .localized-sandbox {
        display: grid;
        gap: 12px;
        max-width: 100%;
      }

      .localized-sandbox * {
        min-width: 0;
      }

      .localized-step {
        display: grid;
        gap: 10px;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fbfcfa;
        padding: 14px;
      }

      .localized-step h2,
      .localized-step p {
        margin: 0;
      }

      .localized-step h2 {
        font-size: 17px;
        line-height: 1.25;
      }

      .localized-step p {
        max-width: 78ch;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .localized-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .localized-field {
        display: grid;
        gap: 6px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .localized-field small {
        color: var(--muted);
        font-weight: 500;
        line-height: 1.35;
      }

      .localized-field input,
      .localized-field select,
      .localized-field textarea {
        width: 100%;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 8px 10px;
        font: inherit;
        font-weight: 500;
      }

      .localized-field textarea {
        min-height: 150px;
        resize: vertical;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .localized-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .localized-button {
        display: inline-flex;
        min-height: 36px;
        max-width: 100%;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        padding: 8px 11px;
        text-align: center;
        white-space: normal;
      }

      .localized-button.primary {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .localized-button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .localized-output {
        display: grid;
        gap: 10px;
      }

      .localized-status {
        border-left: 4px solid var(--teal);
        background: #edf7f7;
        color: var(--muted);
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }

      .localized-status.warning {
        border-left-color: var(--coral);
        background: #fff3ec;
      }

      .localized-downloads {
        display: grid;
        gap: 10px;
      }

      .localized-sandbox .msigsdk-output-table,
      .localized-sandbox .output-table {
        table-layout: fixed;
      }

      .localized-sandbox .msigsdk-output-table th,
      .localized-sandbox .msigsdk-output-table td,
      .localized-sandbox .output-table th,
      .localized-sandbox .output-table td {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
    `;
    root.append(style);

    function button(label, kind = "") {
      const node = document.createElement("button");
      node.type = "button";
      node.className = `localized-button ${kind}`.trim();
      node.textContent = label;
      return node;
    }

    function field(label, control, help = "") {
      const wrapper = document.createElement("label");
      wrapper.className = "localized-field";
      control.setAttribute("aria-label", label);
      const title = document.createElement("span");
      title.textContent = label;
      wrapper.append(title, control);
      if (help) {
        const small = document.createElement("small");
        small.textContent = help;
        wrapper.append(small);
      }
      return wrapper;
    }

    function status(text, mode = "") {
      const node = document.createElement("div");
      node.className = `localized-status ${mode}`.trim();
      node.textContent = text;
      return node;
    }

    function section(title, copy) {
      const node = document.createElement("section");
      node.className = "localized-step";
      const heading = document.createElement("h2");
      heading.textContent = title;
      const paragraph = document.createElement("p");
      paragraph.textContent = copy;
      node.append(heading, paragraph);
      return node;
    }

    function textArea(value = "") {
      const node = document.createElement("textarea");
      node.spellcheck = false;
      node.value = value;
      return node;
    }

    function numberInput(value, { min = null, max = null, step = 1 } = {}) {
      const node = document.createElement("input");
      node.type = "number";
      node.value = String(value);
      node.step = String(step);
      if (min !== null) node.min = String(min);
      if (max !== null) node.max = String(max);
      return node;
    }

    function parseScalar(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      const numeric = Number(text);
      return Number.isFinite(numeric) && text !== "" ? numeric : text;
    }

    function splitDelimitedLine(line, delimiter) {
      const cells = [];
      let current = "";
      let quoted = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        if (char === '"' && line[index + 1] === '"') {
          current += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === delimiter && !quoted) {
          cells.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      cells.push(current);
      return cells.map((cell) => cell.trim());
    }

    function parseRows(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      if (trimmed.startsWith("[") || trimmed.startsWith("{")) {
        const parsed = JSON.parse(trimmed);
        if (Array.isArray(parsed)) return parsed;
        if (Array.isArray(parsed.rows)) return parsed.rows;
        if (Array.isArray(parsed.variants)) return parsed.variants;
        throw new Error("JSON input must be an array, or an object with rows or variants.");
      }
      const lines = trimmed.split(/\r?\n/).filter((line) => line.trim());
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const headers = splitDelimitedLine(lines[0], delimiter);
      return lines.slice(1).map((line) => {
        const values = splitDelimitedLine(line, delimiter);
        return Object.fromEntries(headers.map((header, index) => [header, parseScalar(values[index])]));
      });
    }

    function normalizeVariant(row, index) {
      const chromosome = row.chromosome ?? row.Chromosome ?? row.chr ?? row.Chrom ?? row.CHROM;
      const position =
        row.position ??
        row.start_position ??
        row.Start_Position ??
        row.pos ??
        row.POS;
      const ref = row.reference_allele ?? row.Reference_Allele ?? row.ref ?? row.REF ?? "N";
      const alt =
        row.tumor_seq_allele2 ??
        row.Tumor_Seq_Allele2 ??
        row.alt ??
        row.ALT ??
        "N";
      const numericPosition = Number(position);
      return {
        chromosome: String(chromosome ?? "").replace(/^chr/i, ""),
        position: numericPosition,
        context: row.context || row.Context || `${ref}>${alt}`,
        id: row.id || row.ID || row.variant_id || `variant_${index + 1}`,
        sample: row.sample || row.Tumor_Sample_Barcode || "",
        source: row.source || state.source,
      };
    }

    function readVariants() {
      const rows = parseRows(variantText.value);
      const variants = rows.map(normalizeVariant).filter((variant) =>
        variant.chromosome && Number.isFinite(variant.position)
      );
      if (!variants.length) {
        throw new Error("Provide at least one row with chromosome and numeric position.");
      }
      return variants;
    }

    function readParameters() {
      const maxIntermutationDistance = Math.max(1, Math.round(Number(distanceInput.value || 700)));
      const minMutations = Math.max(1, Math.round(Number(minMutationsInput.value || 3)));
      state.parameters = {
        genomeBuild: genomeBuildInput.value.trim() || "GRCh37",
        maxIntermutationDistance,
        minMutations,
        minBurdenForLocalizedAnalysis: minMutations,
        clusterSignificanceThreshold: 0.05,
      };
      return state.parameters;
    }

    function fociRows(result = state.result) {
      return (result?.foci || result?.localized?.foci || []).map((focus, index) => ({
        focus: index + 1,
        chromosome: focus.chromosome,
        start: focus.start,
        end: focus.end,
        mutations: focus.mutationCount,
        contextPattern: focus.contextPattern,
        apobecLikeFraction: focus.apobecLikeFraction,
        clusterPValue: focus.clusterPValue,
      }));
    }

    function rainfallRows(result = state.result) {
      return (result?.rainfall || result?.localized?.rainfall || []).map((variant) => ({
        id: variant.id,
        chromosome: variant.chromosome,
        position: variant.position,
        previousDistance: variant.previousDistance,
        log10PreviousDistance: variant.log10PreviousDistance,
        context: variant.context,
      }));
    }

    function warningTableRows(result = state.result) {
      return warningRows(result?.warnings || []);
    }

    function appendTable(target, rows, columns, options) {
      target.append(table(rows, columns, options));
    }

    function renderInputPreview(message = "") {
      inputOutput.replaceChildren();
      let variants;
      try {
        variants = readVariants();
        state.variants = variants;
      } catch (error) {
        inputOutput.append(status(error.message, "warning"));
        return;
      }
      inputOutput.append(metrics([
        { label: "Source", value: state.source },
        { label: "Variant rows", value: variants.length },
        { label: "Chromosomes", value: new Set(variants.map((variant) => variant.chromosome)).size },
        { label: "First position", value: variants[0]?.position ?? "n/a" },
      ]));
      if (message) inputOutput.append(status(message));
      appendTable(
        inputOutput,
        variants,
        [
          { key: "id", label: "Variant id" },
          { key: "chromosome", label: "Chromosome" },
          { key: "position", label: "Position" },
          { key: "context", label: "Context" },
        ],
        {
          maxRows: 8,
          title: "Input preview",
          caption: "Shows the normalized variant rows that will enter the localized-mutagenesis screen.",
        }
      );
    }

    function runLocalizedScreen() {
      state.variants = readVariants();
      const parameters = readParameters();
      state.result = mSigSDK.experimental.runLocalizedMutagenesisAnalysis(
        state.variants,
        parameters.genomeBuild,
        parameters
      );
      renderRunSummary();
      renderReview();
      renderDownloads();
    }

    function renderRunSummary() {
      const result = state.result;
      const foci = fociRows(result);
      const rainfall = rainfallRows(result);
      runOutput.replaceChildren();
      runOutput.append(metrics([
        { label: "Workflow", value: result?.workflow || "localized_mutagenesis" },
        { label: "Genome build", value: state.parameters.genomeBuild },
        { label: "Variants", value: state.variants.length },
        { label: "Foci", value: foci.length },
        { label: "Experimental status", value: result?.experimentalStatus?.state || "experimental" },
        { label: "Validated claim", value: result?.experimentalStatus?.validatedForManuscriptUse ? "Yes" : "No" },
      ]));
      runOutput.append(status(
        foci.length
          ? "Candidate foci met the current screening rule. Review warnings and validation requirements before interpretation."
          : "No focal clusters met the current screening rule. Adjust distance or mutation thresholds only when justified by the assay and study design.",
        foci.length ? "warning" : ""
      ));
      appendTable(
        runOutput,
        [
          { field: "maximum distance", value: state.parameters.maxIntermutationDistance },
          { field: "minimum clustered mutations", value: state.parameters.minMutations },
          { field: "cluster p value threshold", value: state.parameters.clusterSignificanceThreshold },
          { field: "rainfall rows", value: rainfall.length },
          { field: "scope statement", value: result?.scopeStatement || result?.experimentalStatus?.scopeStatement || "" },
        ],
        [
          { key: "field", label: "Setting or output" },
          { key: "value", label: "Value" },
        ],
        {
          maxRows: 8,
          title: "Run summary",
          caption: "Shows the active screen settings and the exploratory status attached to the result.",
        }
      );
    }

    function renderReview() {
      reviewOutput.replaceChildren();
      if (!state.result) {
        reviewOutput.append(status("Run the localized-mutagenesis screen before reviewing evidence."));
        return;
      }
      const view = reviewSelect.value;
      if (view === "foci") {
        appendTable(
          reviewOutput,
          fociRows(),
          [
            { key: "focus", label: "Focus" },
            { key: "chromosome", label: "Chromosome" },
            { key: "start", label: "Start" },
            { key: "end", label: "End" },
            { key: "mutations", label: "Mutations" },
            { key: "contextPattern", label: "Context pattern" },
            { key: "apobecLikeFraction", label: "APOBEC-like fraction" },
            { key: "clusterPValue", label: "Cluster p value" },
          ],
          {
            maxRows: 8,
            title: "Candidate foci",
            caption: "Shows focal regions that passed the current descriptive screen.",
          }
        );
      } else if (view === "rainfall") {
        appendTable(
          reviewOutput,
          rainfallRows(),
          [
            { key: "id", label: "Variant id" },
            { key: "chromosome", label: "Chromosome" },
            { key: "position", label: "Position" },
            { key: "previousDistance", label: "Previous distance" },
            { key: "log10PreviousDistance", label: "log10 distance" },
            { key: "context", label: "Context" },
          ],
          {
            maxRows: 12,
            title: "Rainfall evidence",
            caption: "Shows consecutive variant distances used to screen for localized mutation clusters.",
          }
        );
      } else if (view === "warnings") {
        reviewOutput.append(note("Warnings and suggested actions qualify the screen; they are part of the result."));
        appendTable(
          reviewOutput,
          warningTableRows(),
          [
            { key: "code", label: "Warning code" },
            { key: "message", label: "Message" },
            { key: "resolution", label: "Resolution" },
          ],
          {
            maxRows: 8,
            title: "Warnings",
            caption: "Shows review cues raised by the localized-mutagenesis screen.",
          }
        );
        appendTable(
          reviewOutput,
          (state.result?.recommendedActions || []).map((action) => ({ action })),
          [{ key: "action", label: "Recommended action" }],
          {
            maxRows: 6,
            title: "Recommended actions",
            caption: "Shows follow-up steps generated with the exploratory result.",
          }
        );
      } else {
        appendTable(
          reviewOutput,
          roadmapRows,
          [
            { key: "check", label: "Validation area" },
            { key: "requirement", label: "Requirement before inferential reporting" },
          ],
          {
            maxRows: 8,
            title: "Validation checklist",
            caption: "Shows the minimum checks that keep the exploratory result separate from a validated call.",
          }
        );
      }
    }

    function renderDownloads() {
      downloadsOutput.replaceChildren();
      if (!state.result) {
        downloadsOutput.append(status("Run the screen before building downloads."));
        return;
      }
      const bundle = {
        source: state.source,
        parameters: state.parameters,
        validation: state.result.validation,
        experimentalStatus: state.result.experimentalStatus,
        methodBasis: state.result.methodBasis,
        warnings: state.result.warnings,
        recommendedActions: state.result.recommendedActions,
        roadmap: roadmapRows,
        foci: fociRows(),
        rainfall: rainfallRows(),
        result: state.result,
      };
      downloadsOutput.append(status("Download the candidate tables with the experimental status and validation requirements."));
      downloadsOutput.append(downloadMany([
        {
          filename: "localized_mutagenesis_rainfall.csv",
          text: rowsToCsv(rainfallRows()),
          label: "Download rainfall CSV",
        },
        {
          filename: "localized_mutagenesis_foci.csv",
          text: rowsToCsv(fociRows()),
          label: "Download foci CSV",
        },
        {
          filename: "localized_mutagenesis_exploratory_bundle.json",
          type: "json",
          value: bundle,
          label: "Download exploratory bundle JSON",
        },
      ]));
    }

    async function loadDefaultRows() {
      defaultButton.disabled = true;
      defaultButton.textContent = "Loading...";
      inputOutput.replaceChildren(status("Loading public TCGA-LUAD variant rows."));
      try {
        const publicRows = await loadPublicMafRows(mSigSDK, {
          projects: ["TCGA-LUAD"],
          maxFiles: 1,
          maxVariants: 120,
        });
        state.source = publicRows.source || "TCGA/GDC MAF: TCGA-LUAD";
        const rows = publicRows.rows.map((row, index) => {
          const normalized = normalizeVariant(row, index);
          return {
            chromosome: normalized.chromosome,
            position: normalized.position,
            context: normalized.context,
            id: normalized.id,
            sample: normalized.sample,
            source: normalized.source,
          };
        });
        variantText.value = rowsToCsv(rows);
        renderInputPreview("Default public variant rows loaded.");
        runLocalizedScreen();
      } catch (error) {
        inputOutput.replaceChildren(status(`Default public data could not be loaded: ${error.message}`, "warning"));
      } finally {
        defaultButton.disabled = false;
        defaultButton.textContent = "Load TCGA-LUAD example";
      }
    }

    const inputStep = section(
      "1. Load variant rows",
      "Use the public TCGA-LUAD example or paste rows with chromosome, position, context, and id."
    );
    const variantText = textArea("chromosome,position,context,id\n1,11240376,C>A,example_1\n1,11240720,C>T,example_2\n1,11241010,C>G,example_3");
    const defaultButton = button("Load TCGA-LUAD example", "primary");
    const previewButton = button("Preview rows");
    const inputOutput = document.createElement("div");
    inputOutput.className = "localized-output";
    inputStep.append(
      field("Variant rows", variantText, "CSV, TSV, or JSON array. Rows without chromosome and numeric position are excluded."),
      (() => {
        const actions = document.createElement("div");
        actions.className = "localized-actions";
        actions.append(defaultButton, previewButton);
        return actions;
      })(),
      inputOutput
    );

    const runStep = section(
      "2. Run localized-mutagenesis screen",
      "Change the descriptive clustering rule, then rerun the screen with the current rows."
    );
    const genomeBuildInput = document.createElement("input");
    genomeBuildInput.value = state.parameters.genomeBuild;
    const distanceInput = numberInput(state.parameters.maxIntermutationDistance, { min: 1, step: 50 });
    const minMutationsInput = numberInput(state.parameters.minMutations, { min: 1, step: 1 });
    const runButton = button("Run screen", "primary");
    const runOutput = document.createElement("div");
    runOutput.className = "localized-output";
    const parameterGrid = document.createElement("div");
    parameterGrid.className = "localized-controls";
    parameterGrid.append(
      field("Genome build", genomeBuildInput),
      field("Maximum distance between nearby variants", distanceInput),
      field("Minimum clustered mutations", minMutationsInput)
    );
    runStep.append(parameterGrid, (() => {
      const actions = document.createElement("div");
      actions.className = "localized-actions";
      actions.append(runButton);
      return actions;
    })(), runOutput);

    const reviewStep = section(
      "3. Review evidence and warnings",
      "Switch between candidate foci, rainfall evidence, warnings, and validation requirements before interpreting any region."
    );
    const reviewSelect = document.createElement("select");
    [
      ["foci", "Candidate foci"],
      ["rainfall", "Rainfall evidence"],
      ["warnings", "Warnings and actions"],
      ["roadmap", "Validation checklist"],
    ].forEach(([value, label]) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = label;
      reviewSelect.append(option);
    });
    const reviewButton = button("Refresh review", "primary");
    const reviewOutput = document.createElement("div");
    reviewOutput.className = "localized-output";
    const reviewControls = document.createElement("div");
    reviewControls.className = "localized-controls";
    reviewControls.append(field("Evidence view", reviewSelect));
    reviewStep.append(reviewControls, (() => {
      const actions = document.createElement("div");
      actions.className = "localized-actions";
      actions.append(reviewButton);
      return actions;
    })(), reviewOutput);

    const downloadStep = section(
      "4. Save exploratory outputs",
      "Export candidate tables with the settings, experimental status, warnings, and validation requirements."
    );
    const downloadButton = button("Refresh downloads", "primary");
    const downloadsOutput = document.createElement("div");
    downloadsOutput.className = "localized-output localized-downloads";
    downloadStep.append((() => {
      const actions = document.createElement("div");
      actions.className = "localized-actions";
      actions.append(downloadButton);
      return actions;
    })(), downloadsOutput);

    defaultButton.addEventListener("click", loadDefaultRows);
    previewButton.addEventListener("click", () => renderInputPreview("Rows are ready for screening."));
    runButton.addEventListener("click", () => {
      try {
        runLocalizedScreen();
      } catch (error) {
        runOutput.replaceChildren(status(error.message, "warning"));
      }
    });
    reviewSelect.addEventListener("change", renderReview);
    reviewButton.addEventListener("click", renderReview);
    downloadButton.addEventListener("click", renderDownloads);

    inputOutput.append(status("Load the public example or paste rows, then preview the normalized input."));
    runOutput.append(status("Run the screen after checking the input rows."));
    reviewOutput.append(status("Run the screen before reviewing evidence."));
    downloadsOutput.append(status("Run the screen before building downloads."));

    root.append(inputStep, runStep, reviewStep, downloadStep);
    display(root);
    await loadDefaultRows();
  </script>
</notebook>
